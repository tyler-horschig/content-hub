List Endpoint Identity Group:
  ai_description: >-
    ### General Description

    Lists available endpoint entity groups in Cisco ISE based on specified filtering
    criteria. This action retrieves a list of endpoint groups, allowing users to filter
    the results by specific attributes such as Name, ID, or Description.


    ### Flow Description

    1. Extracts configuration parameters and action parameters (Filter Key, Filter
    Logic, Filter Value, Max Records To Return).

    2. Validates the provided filtering parameters and the maximum limit.

    3. Initializes the `CiscoISEManager` to interact with the Cisco ISE API.

    4. Makes a GET request to the `/ers/config/endpointgroup` endpoint to fetch the
    endpoint groups based on the provided filters and limit.

    5. Parses the API response into a list of endpoint group objects.

    6. Outputs the retrieved groups as a CSV data table and attaches the raw JSON
    results to the action.


    ### Additional Notes

    - The maximum number of records that can be returned is 100.

    - If "Equal" is selected for the filter logic, the action will try to find an
    exact match. If "Contains" is selected, it will search for a substring match.
