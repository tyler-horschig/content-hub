    1. Initializes the Cisco ISE manager using the provided integration configuration
    credentials.

    2. Makes an HTTP GET request to the Cisco ISE API to retrieve a list of endpoint
    IDs.

    3. Iterates through the retrieved IDs, making subsequent API calls to fetch detailed
    information for each endpoint.

    4. Flattens the retrieved endpoint dictionaries and constructs a CSV-formatted
    table.

