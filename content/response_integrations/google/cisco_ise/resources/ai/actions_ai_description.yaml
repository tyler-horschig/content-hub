Add Endpoint To Endpoint Identity Group:
  ai_description: >-
    ### General Description

    Adds a specific endpoint (IP Address or MAC Address) to a designated endpoint
    identity group in Cisco ISE. This action modifies the endpoint's group membership
    within the Cisco ISE platform.


    ### Flow Description

    1. Retrieves the specified endpoint identity group from Cisco ISE to obtain its
    internal Group ID.

    2. Iterates through the provided target entities (IP Address or MAC Address).

    3. If the entity is an IP Address, it queries Cisco ISE to resolve the corresponding
    MAC Address.

    4. Retrieves the list of endpoints from Cisco ISE to find the specific Endpoint
    ID matching the MAC Address.

    5. Executes a PUT request to update the endpoint's group membership, assigning
    it to the target endpoint identity group.

    6. Collects the results and returns a JSON object containing the API responses
    for the successfully processed entities.


    ### Additional Notes

    - Supported entity types: IP Address, MAC Address.

    - The action requires the exact name of the endpoint identity group as it appears
    in Cisco ISE.
  ai_short_description: >-
    Adds a specific endpoint (IP or MAC address) to a designated endpoint identity
    group in Cisco ISE by updating its group membership.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the endpoint's configuration in Cisco ISE to assign it to the specified
      endpoint identity group.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Cisco ISE (endpoint groups, MAC addresses, and
      endpoints) using GET requests. It then mutates external data by making a PUT
      request to update the endpoint's group membership in Cisco ISE. It does not
      update internal entities, create insights, modify alert data, or create case
      comments.
