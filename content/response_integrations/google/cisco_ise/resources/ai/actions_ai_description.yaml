Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches IP Address entities by retrieving endpoint data and enrichment details
    from Cisco ISE. This action fetches contextual metadata about the endpoint associated
    with the IP address and attaches it to the entity within the SecOps platform.


    ### Flow Description

    1. Iterates over all target entities, filtering for those of type `ADDRESS`.

    2. For each suitable entity, makes a GET request to the Cisco ISE API to retrieve
    the MAC address associated with the IP address.

    3. Makes a subsequent GET request to retrieve the endpoint data using the discovered
    MAC address.

    4. Makes a final GET request to retrieve additional endpoint enrichment data from
    the Cisco ISE UI API.

    5. Flattens the retrieved endpoint and enrichment data.

    6. Attaches the flattened data to the entity's `additional_properties` and creates
    an entity table with the results.

    7. Marks the entity as enriched and updates it within the platform.


    ### Additional Notes

    This action relies on both the standard Cisco ISE API and the UI API to gather
    comprehensive endpoint visibility data.
