Add IPS Policy Exception:
  ai_description: >-
    ### General Description

    Adds an IPS policy exception in FireEye NX for specific IP address entities. The
    action treats the target IP entities as the "Attacker IP Address" and configures
    the exception based on the provided victim IP subnet, interface, and mode.


    ### Flow Description

    1. Extracts configuration and action parameters including Victim IP Subnet, Interface,
    Mode, and Name.

    2. Iterates over target entities of type IP Address.

    3. Masks the IP address (appends `/32` if it is a valid IPv4 address).

    4. Makes a POST request to the FireEye NX API (`wsapis/v2.0.0/ips/policy_exceptions`)
    to create the IPS policy exception for each entity.

    5. Returns a summary message indicating successful and failed policy exception
    creations.


    ### Additional Notes

    IP entities are treated as "Attacker IP Address" in the context of the FireEye
    NX policy exception.
  ai_short_description: >-
    Adds an IPS policy exception in FireEye NX for specific IP address entities, treating
    them as attacker IPs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new IPS policy exception in FireEye NX.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the FireEye NX API to create an IPS policy
      exception, which mutates external data. It does not fetch additional enrichment
      data, nor does it update internal SecOps entities, create insights, or modify
      alert data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
