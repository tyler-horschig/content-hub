    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (a file) from an external system via an HTTP GET request.
      It does not mutate external data, mutate internal data, update entities, create
      insights, modify alert data, or create case comments.
