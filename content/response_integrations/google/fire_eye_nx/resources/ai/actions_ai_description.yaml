Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye NX server using the provided integration configuration
    parameters. This action ensures that the integration is properly configured and
    can communicate with the FireEye NX API.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEye NX Manager with the provided credentials.

    3. Makes a GET request to the `/wsapis/v2.0.0/health/system` endpoint to verify
    connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

    This action is primarily used for health checks and does not interact with alerts
    or entities.
  ai_short_description: >-
    Tests connectivity to the FireEye NX server to ensure the integration is configured
    correctly.
