      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` where `SUPPORTED_ENTITY_TYPES` contains `EntityTypes.ADDRESS`.
      Thus, it targets ADDRESS entities and filters strictly by the `entity_type`
      attribute.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: true
    add_ioc_to_blocklist: true
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action creates an IPS policy exception in FireEye NX for an IP address.
      Depending on the selected 'Mode' parameter (Block, Unblock, Suppress, Suppress-unblock),
      this action can block an IP, unblock an IP, suppress alerts for an IP (allowlist),
      or remove suppression (remove from allowlist). Therefore, it matches the expected
      outcomes for adding/removing IOCs to/from blocklists and allowlists.
    remove_ioc_from_allowlist: true
    remove_ioc_from_blocklist: true
