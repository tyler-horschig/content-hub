    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Victim IP Subnet | String | Yes | Specify the IP subnet of the victim that should
    be used to create a new policy exception. Format: x.x.x.x/xx Example: 10.0.0.1/24
    |

    | Interface | Dropdown | Yes | Specify what interface should be used in policy
    exceptions. |

    | Mode | Dropdown | Yes | Specify the mode that should be used in the policy exception.
    |

    | Name | String | No | Specify the name for the policy exception. If nothing is
    specified, action will add policy exception with name Siemplify_{Interface}_{Mode}
    |
Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads alert artifacts from FireEye NX based on a provided Alert UUID and saves
    them as a ZIP file to a specified local path.


    ### Flow Description

    1. Extracts the `Alert UUID` and `Download Path` parameters.

    2. Initializes the FireEye NX API manager with the provided credentials.

    3. Makes an HTTP GET request to the FireEye NX API (`wsapis/v2.0.0/artifacts/{alert_uuid}`)
    to download the artifacts for the specified Alert UUID.

    4. Saves the downloaded content to the specified local path as a ZIP file.

    5. Returns the absolute path of the saved file in the action's JSON result.


    ### Additional Notes

    Ensure the provided download path exists and is accessible by the integration.
    If a file with the same name already exists at the destination, the action will
    fail to overwrite it.
  ai_short_description: >-
    Downloads alert artifacts from FireEye NX for a specific Alert UUID and saves
    them to a designated local path.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
