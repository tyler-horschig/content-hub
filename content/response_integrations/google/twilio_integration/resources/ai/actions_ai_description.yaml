    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Twilio API to list a single message purely
      to test connectivity. It does not fetch contextual data for alerts/entities,
      nor does it mutate any external or internal data, update entities, or create
      insights.
