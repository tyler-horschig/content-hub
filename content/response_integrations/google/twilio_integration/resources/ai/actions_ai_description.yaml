Send SMS And Wait:
  ai_description: >-
    ### General Description

    Sends an SMS message to a specified phone number using Twilio and waits asynchronously
    for a reply containing a generated unique ID.


    ### Flow Description

    1. Extracts the target phone number and message content from the action parameters.

    2. Generates a unique 5 to 6-digit ID and appends it to the message with instructions
    for the recipient to include it in their reply.

    3. Makes an API call to Twilio to send the SMS message.

    4. Enters an asynchronous waiting state, periodically querying the Twilio API
    for new messages received from the target phone number.

    5. Completes execution when a reply containing the unique ID is found, returning
    the response message.


    ### Additional Notes

    This is an asynchronous action. It requires the Twilio integration to be configured
    with a valid Account SID, Authentication Token, and a sender phone number.
  ai_short_description: >-
    Sends an SMS message to a target phone number via Twilio and waits asynchronously
    for a user reply containing a uniquely generated tracking ID.
