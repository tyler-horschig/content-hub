Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using Nozomi Networks. This action retrieves
    contextual metadata about the nodes (such as OS, MAC address, vendor, and firmware
    version) from the Nozomi Guardian device and updates the entities with this information.


    ### Flow Description

    1. Iterates through the target entities, filtering for Hostname and IP Address
    types.

    2. For each suitable entity, makes a GET request to the Nozomi Networks API (`/api/open/query/do?query=nodes`)
    to fetch node information.

    3. If multiple matches are found, selects the most recent match based on last
    activity time.

    4. Extracts the node metadata and any specified additional fields.

    5. Updates the entity's additional properties with the retrieved enrichment data
    and marks it as enriched.

    6. Returns the enrichment data as JSON results.


    ### Additional Notes

    If an entity cannot be found in Nozomi Networks, it will be skipped and reported
    as failed in the output messages.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving contextual node metadata
    from Nozomi Networks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Nozomi Networks API to fetch node information
      for the given entities. It does not mutate external data but updates internal
      entities with the retrieved enrichment data.
