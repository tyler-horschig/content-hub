List Vulnerabilities:
  ai_description: >-
    ### General Description

    Lists vulnerabilities discovered by a Nozomi Networks device based on provided
    action input parameters. This action does not operate on Google SecOps entities
    but relies entirely on the provided input parameters to query the Nozomi Networks
    API.


    ### Flow Description

    1. Extracts action parameters such as IP Address, CVE Score, Vulnerability Name
    Contains, CVE ID, Record Limit, and whether to include resolved vulnerabilities.

    2. Validates the CVE Score to ensure it is between 0 and 10.

    3. Makes a GET request to the Nozomi Networks API (`/api/open/query/do`) to fetch
    vulnerabilities matching the specified criteria.

    4. Parses the response and returns the vulnerabilities as a JSON result and a
    data table.


    ### Additional Notes

    The action accepts multiple values as comma-separated strings for the IP Address
    and CVE ID parameters.
