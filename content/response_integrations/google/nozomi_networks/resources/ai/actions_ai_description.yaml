    alerts, or telemetry data. The action returns the raw query results as a JSON
    object for further analysis or processing within the playbook.


    ### Flow Description

    1. Extracts the `Query` and `Record Limit` parameters provided by the user.

    2. Initializes the Nozomi Networks API client using the integration's configuration.

    3. Makes an HTTP GET request to the Nozomi Networks `/api/open/query/do` endpoint
    to execute the query, appending a limit to the query string if a record limit
    is specified.

    4. Parses the response and attaches the returned records as JSON to the action's
    results.


    ### Additional Notes

    - This action does not operate on or interact with Siemplify entities.

    - Negative values provided for the `Record Limit` parameter are ignored.
