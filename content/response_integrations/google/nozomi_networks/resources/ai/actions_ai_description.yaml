Run a CLI Command:
  ai_description: >-
    ### General Description

    Executes a specified CLI command on a Nozomi Networks device. This action allows
    users to interact directly with the appliance's command-line interface via the
    API.


    ### Flow Description

    1. Extracts the provided `CLI Command` parameter.

    2. Initializes the Nozomi Networks API client.

    3. Makes a POST request to the `/api/open/cli` endpoint with the command payload.

    4. Returns a success message if the command is executed without errors.


    ### Additional Notes

    The Nozomi API does not provide validation for executed CLI commands; it is up
    to the user to ensure the provided command is correct. This action does not operate
    on Siemplify entities.
