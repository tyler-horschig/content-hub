Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Nozomi Networks instance to ensure the integration is
    configured correctly and can communicate with the API.


    ### Flow Description

    1. Extracts integration configuration parameters (API URL, Username, Password,
    Verify SSL, CA Certificate File).

    2. Initializes the Nozomi Networks manager with the provided credentials.

    3. Makes a GET request to the Nozomi Networks API (`/api/open/query/do?query=node_cpes
    | head 5`) to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action relies entirely on integration-level parameters and does not require
    any action-specific parameters.
