Attach a Policy:
  ai_description: >-
    ### General Description

    Attaches a specified managed policy to an identity (User, Group, or Role) in AWS
    IAM. This action modifies the permissions of the specified identity by associating
    it with an existing AWS IAM policy.


    ### Flow Description

    1. Validates the provided identity name and policy name to ensure they contain
    only allowed characters.

    2. Retrieves the Amazon Resource Name (ARN) for the specified policy using the
    AWS IAM API.

    3. Calls the AWS IAM API to attach the policy to the specified identity (User,
    Group, or Role).

    4. Returns a success message if the policy is successfully attached, or an error
    message if the identity or policy cannot be found.


    ### Additional Notes

    The identity name and policy name must contain only alphanumeric characters and/or
    the following: `+=.@_-`.
