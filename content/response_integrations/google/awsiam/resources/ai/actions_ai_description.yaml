Disable User Access:
  ai_description: >-
    ### General Description

    Disables user access in AWS Identity and Access Management (IAM) by attaching
    an explicit deny inline policy to the specified user. This action effectively
    revokes the user's permissions to interact with AWS resources.


    ### Flow Description

    1. The action iterates over the provided User entities.

    2. For each entity, it extracts the AWS IAM username from the entity's original
    identifier (which is expected to be the user's ARN).

    3. It makes an API call (`put_user_policy`) to AWS IAM to attach an inline policy
    named `DisableUserAccessPolicy` with a global deny rule (`{"Effect": "Deny", "Action":
    "*", "Resource": "*"}`) to the user.

    4. The action collects the results and returns a JSON object containing the success
    or failure status for each processed user.


    ### Additional Notes

    This action works specifically with SOAR User entities. The entity's original
    identifier must contain the user's ARN for the username extraction to work correctly.
  ai_short_description: >-
    Disables user access in AWS IAM by attaching an explicit deny inline policy to
    the specified User entities.
