Create a Group:
  ai_description: >-
    ### General Description

    Creates one or more new IAM groups in an AWS account. This action interacts with
    the AWS IAM service to provision new groups based on a provided list of names.


    ### Flow Description

    1. Extracts the comma-separated list of group names from the action parameters.

    2. Validates each group name to ensure it contains only alphanumeric characters
    and allowed symbols (`+=.@_-`).

    3. Establishes a connection to the AWS IAM service using the integration's credentials.

    4. Iterates through the validated group names and makes a `create_group` API call
    to AWS IAM for each one.

    5. Collects the details of the successfully created groups and returns them as
    a JSON result, while logging any errors for groups that already exist, fail validation,
    or exceed account limits.


    ### Additional Notes

    Group names must be unique within the AWS account. If a group already exists or
    the account limit is reached, the action will report the failure for that specific
    group but continue processing the remaining names in the list.
