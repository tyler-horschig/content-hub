Add a User to a Group:
  ai_description: >-
    ### General Description

    Adds specified users to a specified IAM group in AWS Identity and Access Management
    (IAM). This action modifies account metadata by updating group memberships, allowing
    permissions policies to be applied across multiple users at once.


    ### Flow Description

    1. Extracts the target group name and a comma-separated list of user names from
    the action parameters.

    2. Establishes a connection to the AWS IAM service using the provided integration
    credentials.

    3. Iterates through the provided user names and makes an API call (`add_user_to_group`)
    to AWS IAM to add each user to the specified group.

    4. Collects the results, handling any exceptions such as non-existent entities
    or account limit exceedances.

    5. Returns a summary message detailing the successful additions and any failures.


    ### Additional Notes

    Ensure that the provided user names and group name exist in AWS IAM before executing
    this action. Group and user names cannot include spaces and must contain only
    alphanumeric characters or specific symbols (`+=.@_-`).
  ai_short_description: >-
    Adds specified users to a specified IAM group in AWS Identity and Access Management
    (IAM) to update their group memberships and permissions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
