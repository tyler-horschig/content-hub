    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specified users to a specified IAM group in AWS.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a state-changing API call (`add_user_to_group`) to AWS IAM,
      which mutates external data by adding users to a group. It does not fetch data
      for enrichment, nor does it mutate internal SecOps data like entities, insights,
