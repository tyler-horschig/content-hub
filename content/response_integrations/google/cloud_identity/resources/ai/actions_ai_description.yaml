Create Policy:
  ai_description: >-
    ### General Description

    Creates a new policy entry within Google Cloud Identity. This action allows users
    to define and enforce policies (such as Data Loss Prevention rules or detector
    lists) across organizational units by submitting a structured JSON configuration.


    ### Flow Description

    1. Extracts the `Policy Entry` parameter provided by the user.

    2. Validates the input to ensure it is a properly formatted JSON dictionary.

    3. Makes a POST request to the Google Cloud Identity API (`/v1beta1/policies`)
    to create the new policy.

    4. Returns the created policy details as a JSON result and outputs a success message.


    ### Additional Notes

    The `Policy Entry` parameter must strictly adhere to the Google Cloud Identity
    Policy schema. Ensure the JSON includes required fields such as `type`, `customer`,
    `policyQuery`, and `setting`.
