Add Entity To Detector URL List:
  ai_description: >-
    ### General Description

    Adds specified URLs, domains, and URL/Hostname entities to a Cloud Identity URL
    list detector policy. This action initiates a state change on the external Cloud
    Identity service to append the provided indicators to the policy, effectively
    blocking or tracking navigation to these URLs within the Google Workspace environment.


    ### Flow Description

    1. Extracts the `Detector Policy ID`, `URL`, and `Domain` parameters from the
    action configuration.

    2. Collects the provided URLs and domains from the parameters into a unified list.

    3. Iterates through the target entities, filtering for `URL` and `HOSTNAME` entity
    types, and appends their identifiers to the list.

    4. Validates that at least one URL or domain has been identified for blocking.

    5. Calls the Cloud Identity API (`update_url_list_detector_policy`) to fetch the
    existing policy and patch it with the newly appended URLs.

    6. Returns a success message containing the list of blocked URLs.


    ### Additional Notes

    - The action requires a valid `Detector Policy ID` to function.

    - If no URLs, domains, or valid entities are provided, the action will fail and
    return a message indicating that no entities were provided to block.
  ai_short_description: >-
    Adds specified URLs, domains, and URL/Hostname entities to a Cloud Identity URL
    list detector policy to block or track navigation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a Cloud Identity URL list detector policy by appending the specified
      URLs and domains to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the Cloud Identity API to update a URL list
      detector policy, mutating external data. It does not fetch contextual data for
      enrichment, nor does it mutate internal SecOps data, update entities, or create
