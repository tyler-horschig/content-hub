List Policies:
  ai_description: >-
    ### General Description

    The List Policies action retrieves a list of Cloud Identity policies associated
    with a specific organizational unit. It allows users to filter the retrieved policies
    by policy type, setting type, and display names, returning the matching policies
    as structured JSON data for further use in the playbook.


    ### Flow Description

    1. Extracts the provided parameters, including the organizational unit name, policy
    type filter, setting type filter, display names, and the maximum number of results
    to return.

    2. Validates that the `Max Results To Return` parameter is within the allowed
    range (1 to 100).

    3. Makes an API call to Google Cloud Identity to fetch the organizational unit
    details and retrieve its unique ID based on the provided name.

    4. Makes a subsequent API call to Google Cloud Identity to list the policies associated
    with the retrieved organizational unit ID, applying the specified filters.

    5. Slices the results to ensure they do not exceed the maximum requested limit.

    6. Returns the retrieved policies as JSON results and outputs a success message.


    ### Additional Notes

    If the specified organizational unit is not found, the action will fail and raise
    an entity not found exception. The maximum number of policies that can be returned
    in a single execution is 100.
  ai_short_description: >-
    Retrieves a list of Cloud Identity policies for a specified organizational unit,
    applying optional filters for policy type, setting type, and display names.
