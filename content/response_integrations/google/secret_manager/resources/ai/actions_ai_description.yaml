Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Cloud Secret Manager API to ensure the integration
    is configured correctly and authentication is successful.


    ### Flow Description

    1. Initializes the Secret Manager client using the provided integration authentication
    credentials (Service Account JSON or Workload Identity).

    2. Makes a test API call (GET request to list secrets with a page size of 1) to
    verify access and permissions.

    3. Returns a success message and a boolean result indicating whether the connection
    was established successfully.


    ### Additional Notes

    This action does not run on Google SecOps entities and is primarily used for integration
    health checks and troubleshooting.
  ai_short_description: >-
    Tests connectivity to the Google Cloud Secret Manager API.
  capabilities:
