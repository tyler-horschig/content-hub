    1. Validates the provided time frame parameters (Start Time, End Time, Time Frame).

    2. Constructs a Devo query string using the specified `Table Name`, `Fields To
    Return`, and `Where Filter`.

    3. Makes an API call to the Devo service to execute the constructed query.

    4. Parses the response and attaches the results to the action as a JSON object
    and a CSV data table.


