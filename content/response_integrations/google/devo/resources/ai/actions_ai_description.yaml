    selected, you also need to provide 'Start Time'. |

    | Start Time | String | No | Specify a time frame for the results. If 'Custom'
    is selected, you also need to provide 'Start Time'. |

    | End Time | String | No | Specify the start time for the query. This parameter
    is mandatory, if 'Custom' is selected for the 'Time Frame' parameter. Format:
    ISO 8601. Example: 2021-08-05T05:18:42Z |

    | Max rows to return | String | No | Specify max number of rows the action should
    return. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Devo instance using the provided integration configuration
    parameters. This action verifies that the API URL and authentication credentials
    are valid and that the platform can successfully communicate with the Devo API.


    ### Flow Description

    1. Extracts integration configuration parameters (API URL, API Token, API Key,
    API Secret, and Verify SSL).

    2. Initializes the DevoManager with the provided credentials and forces a connectivity
    test.

    3. Executes a lightweight test query (`from siem.logtrust.alert.info`) against
    the Devo API to verify access.

    4. Returns a success message if the query executes without errors, or a failure
    message if the connection or authentication fails.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to ensure the integration
    is correctly configured and does not require any action-specific parameters or
    entities to run.
