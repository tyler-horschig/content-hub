Advanced Query:
  ai_description: >-
    ### General Description

    Executes an advanced query against a Devo instance based on the provided query
    string and time frame parameters. This action allows analysts to search for historical
    logs and telemetry data directly from the SecOps platform.


    ### Flow Description

    1. Extracts the action parameters including the query, time frame, and maximum
    rows to return.

    2. Validates the provided time frame and calculates the start and end timestamps.

    3. Initializes the DevoManager to connect to the Devo API.

    4. Makes a POST request to the Devo `/search/query` API endpoint to execute the
    query.

    5. Retrieves the query results and formats them.

    6. Returns the results as a JSON object and a CSV data table within the SecOps
    platform.


    ### Additional Notes

    This action does not operate on Siemplify entities. If querying a table other
    than `siem.logtrust.alert.info`, an additional token for that table must be created
    and specified in the integration configuration.
  ai_short_description: >-
    Executes an advanced query against a Devo instance and returns the results as
    JSON and a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a query against the Devo API. It does not
      mutate external data, update internal entities, create insights, modify alert
      data, or create case comments.
