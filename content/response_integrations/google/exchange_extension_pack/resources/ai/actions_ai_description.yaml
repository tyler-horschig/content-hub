Run Compliance Search:
  ai_description: >-
    ### General Description

    Runs an Exchange Compliance Search based on provided search conditions. If the
    fetch compliance search results checkbox is set, the action returns the search
    results similarly to the fetch compliance search results action. Exchange Compliance
    Search provides a fast mechanism to search in multiple mailboxes that will be
    most useful for large Organizations with 1000+ mailboxes.


    ### Flow Description

    1. Connects to the Exchange On-Prem or Office 365 server using PowerShell.

    2. Creates a new compliance search using the `New-ComplianceSearch` command with
    the provided filters or advanced query.

    3. Starts the compliance search using the `Start-ComplianceSearch` command.

    4. Periodically checks the status of the compliance search using the `Get-ComplianceSearch`
    command until it completes.

    5. If the "Fetch Compliance Search Results?" parameter is checked, it creates
    a compliance search preview using the `New-ComplianceSearchAction -Preview` command.

    6. Periodically checks the preview status and fetches the results using the `Get-ComplianceSearchAction`
    command.

    7. Returns the search results as JSON and optionally creates a case wall output
    table.


    ### Additional Notes

    - The action does not work on Siemplify entities.

    - If the "Fetch Compliance Search Results?" checkbox is checked, a maximum of
    200 elements will be displayed, but the actual search can have more findings than
    are shown.
