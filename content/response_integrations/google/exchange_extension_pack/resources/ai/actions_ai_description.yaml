"Add Senders to Exchange-Siemplify Mail Flow Rule":
  ai_description: >-
    ### General Description

    Adds specified email addresses (and optionally their domains) to an Exchange Mail
    Flow Rule. This action is typically used to filter or permanently delete emails
    from specific senders, effectively blocking them at the Exchange server level.


    ### Flow Description

    1. Connects to the Exchange On-Prem or Office 365 server via PowerShell.

    2. Retrieves the list of email addresses from the action parameters. If the parameter
    is empty, it extracts email addresses from the identifiers of User entities attached
    to the case.

    3. Validates the format of the provided email addresses.

    4. Fetches the existing Mail Flow Rules from the Exchange server.

    5. Executes a PowerShell command to add the valid email addresses to the specified
    Mail Flow Rule. If the rule does not exist, it creates a new one.

    6. If configured, extracts the domains from the email addresses and adds them
    to the corresponding domain-based Mail Flow Rule.


    ### Additional Notes

    To use this action, the configured account must have Organization Management permissions
    in Exchange.
