"Add Domains to Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    Adds a list of domains to a specified Exchange Mail Flow Rule. If the specified
    rule does not exist, the action will create it. This is typically used to filter
    or block emails originating from specific domains.


    ### Flow Description

    1. Extracts the list of domains and the target rule name from the action parameters.

    2. Validates the format of the provided domains.

    3. Establishes a PowerShell session with the Exchange server (On-Premises or Office
    365).

    4. Retrieves existing mail flow rules to check if the target rule exists.

    5. If the rule exists, updates it by appending the new valid domains.

    6. If the rule does not exist, creates a new mail flow rule with the provided
    domains.

    7. Returns a JSON result detailing successfully added domains, domains already
    present in the rule, and invalid domains.


    ### Additional Notes

    - Requires Organization Management permissions in Exchange.

    - The action executes PowerShell commands (`New-TransportRule`, `Set-TransportRule`)
    on the Siemplify server to interact with Exchange.
  ai_short_description: >-
    Adds a list of domains to a specified Exchange Mail Flow Rule, creating the rule
    if it does not already exist, to filter or block emails from those domains.
