"Remove Domains from Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    Removes specified domains from an existing mail flow rule in Microsoft Exchange
    (On-Premises or Office 365). This action is typically used to remove domains from
    a blocklist or deletion rule, restoring normal mail flow for those domains.


    ### Flow Description

    1. Extracts the list of domains and the target rule name from the action parameters.

    2. Validates the format of the provided domains.

    3. Connects to the Exchange or Office 365 environment via PowerShell.

    4. Retrieves the current configuration of the specified mail flow rule.

    5. Removes the valid domains from the rule's conditions.

    6. Updates the rule in Exchange (`Set-TransportRule`), or deletes the rule entirely
    (`Remove-TransportRule`) if no domains remain in it.

    7. Returns a summary of successfully removed domains, domains that didn't exist
    in the rule, and invalid domains.


    ### Additional Notes

    The action requires Organization Management permissions in Exchange. It operates
    asynchronously to handle potential network delays during PowerShell execution.
