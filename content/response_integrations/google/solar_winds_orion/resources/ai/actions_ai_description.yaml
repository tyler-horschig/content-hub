Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a custom query in SolarWinds Orion based on the provided IP Address and
    Hostname entities.


    ### Flow Description

    1. Extracts the provided query and entity keys from the action parameters.

    2. Filters the target entities to include only IP Address and Hostname types.

    3. Constructs a final query by appending a `WHERE` clause that matches the entity
    identifiers against the specified entity keys.

    4. Executes the constructed query against the SolarWinds Orion API.

    5. Retrieves the query results, limits them to the specified maximum, and attaches
    them to the action's JSON result and a data table.


    ### Additional Notes

    SolarWinds queries do not support the `*` notation. The provided query should
    not contain a `WHERE` clause, as the action automatically appends it based on
    the target entities.
