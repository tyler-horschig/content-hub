Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by fetching system information from
    SolarWinds Orion.


    ### Flow Description

    1. Filters target entities to include only Hostname and IP Address types.

    2. Constructs a query to fetch system information (e.g., OS version, CPU load,
    memory usage) for the targeted entities from SolarWinds Orion.

    3. Executes the query against the SolarWinds Orion API via an HTTP POST request.

    4. Matches the retrieved data with the corresponding entities based on their IP
    address or hostname.

    5. Enriches the matched entities' additional properties with the retrieved system
    information and marks them as enriched.

    6. Updates the entities in the Google SecOps platform and attaches the raw JSON
    results to the action.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by fetching detailed system information
    from SolarWinds Orion.
