Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SolarWinds Orion server using the integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (IP Address, Username, Password,
    Verify SSL).

    2. Initializes the SolarWinds Orion manager.

    3. Sends a POST request to the SolarWinds Orion API (`/SolarWinds/InformationService/v3/Json/Query`)
    to execute a simple SELECT query (`SELECT DisplayName FROM Orion.Nodes ORDER BY
    DisplayName WITH ROWS 1 TO 1`).

    4. Validates the response to confirm successful authentication and connectivity.

    5. Returns a success or failure message based on the response.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the SolarWinds Orion server. It does not require any
    action-specific parameters or entities to run.
