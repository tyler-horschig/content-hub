Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Opswat Metadefender API to ensure that the provided
    credentials and network configurations are valid.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, and
    Verify SSL).

    2. Initializes the Opswat Metadefender manager.

    3. Makes an HTTP GET request to the Opswat Metadefender API key information endpoint.

    4. Evaluates the HTTP response to determine if the connection was successful.

    5. Returns a boolean result and a corresponding output message indicating success
    or failure.


    ### Additional Notes

    This action is primarily used as a health check to verify that the Google SecOps
    platform can successfully communicate with the Opswat Metadefender instance.
  ai_short_description: >-
    Tests connectivity to the Opswat Metadefender API to ensure valid credentials
    and network access.
  capabilities:
