Scan Hash:
  ai_description: >-
    ### General Description

    Scans file hash entities in Opswat Metadefender to retrieve their reputation and
    scan results.


    ### Flow Description

    1. Filters the target entities to include only `FILEHASH` entities.

    2. Iterates through the filtered entities and makes a GET request to the Opswat
    Metadefender API to retrieve the hash reputation.

    3. If the scan result indicates the hash is "Infected", the action marks the entity
    as suspicious, updates the entity in the platform, and adds an insight.

    4. Converts the scan report into a CSV format and attaches it as a data table
    to the action's results.


    ### Additional Notes

    The action relies on the Opswat Metadefender integration configuration for API
    credentials and root URL.
  ai_short_description: >-
    Scans file hash entities in Opswat Metadefender to retrieve their reputation,
    updates the entity's suspicious status if infected, and attaches the scan results
    as a data table.
