Get Events Minutes Back:
  ai_description: >-
    ### General Description

    Searches and retrieves historical events from Symantec ICDX based on a specified
    query and a time range defined in minutes back. The action allows filtering by
    specific fields and limiting the number of returned events.


    ### Flow Description

    1. Initializes the connection to Symantec ICDX using the provided API credentials.

    2. Retrieves the action parameters including the search query, limit, minutes
    back, and specific fields to return.

    3. Calculates the start time in milliseconds by subtracting the specified minutes
    back from the current time.

    4. Makes a POST request to the Symantec ICDX search API (`/dx/archives/search`)
    to find events matching the criteria.

    5. If events are found, adds the raw JSON results to the action's output and constructs
    a CSV data table for display.


    ### Additional Notes

    The action handles pagination internally if the results exceed the initial response
    limit.
