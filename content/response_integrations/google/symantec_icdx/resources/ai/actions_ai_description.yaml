Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec ICDX platform.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, API Token, Verify
    SSL).

    2. Initializes the Symantec ICDX manager.

    3. Makes an API call (POST request to `/r3_epmp_i/dx/archives/search`) to fetch
    a specific event by a hardcoded UUID to verify connectivity.

    4. Returns a success message if the connection is established and the API responds
    correctly.


    ### Additional Notes

    This is a utility action used to verify that the integration is configured correctly
    and can communicate with the Symantec ICDX API.
