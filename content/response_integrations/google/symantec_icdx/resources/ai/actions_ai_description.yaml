Get Event:
  ai_description: >-
    ### General Description

    Retrieves specific event data from Symantec ICDX using a provided Event UUID.


    ### Flow Description

    1. Initializes the Symantec ICDX manager with the provided API credentials.

    2. Extracts the `Event UUID` parameter provided by the user.

    3. Makes an API call (POST request) to the Symantec ICDX search endpoint to fetch
    the event data associated with the given UUID.

    4. If the event is found, attaches the event data to the action's JSON result
    and creates a flat data table.

    5. Outputs a success message if the event is found, or a failure message if it
    is not.


    ### Additional Notes

    None.
  ai_short_description: >-
    Retrieves specific event data from Symantec ICDX using a provided Event UUID.
