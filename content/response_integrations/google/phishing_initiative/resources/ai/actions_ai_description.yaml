Get Url Status:
  ai_description: >-
    ### General Description

    Retrieves the status of URL entities using the Phishing Initiative API to determine
    if they are associated with phishing campaigns. It enriches the entities with
    the retrieved status and flags them as suspicious if they are identified as phishing.


    ### Flow Description

    1. Iterates through the target entities provided in the case and filters for URL
    entities.

    2. Makes a GET request to the Phishing Initiative API (`/api/v1/urls/lookup/`)
    for each URL to fetch its current status.

    3. Evaluates the returned status. If the URL has a status other than 'not submitted',
    it updates the entity's `additional_properties` with the status and marks the
    entity as enriched.

    4. If the status explicitly indicates the URL is 'phishing', it marks the entity
    as suspicious.

    5. Updates the modified entities within the Google SecOps platform and attaches
    the raw JSON results to the action.


    ### Additional Notes

    The action returns a result value of "true" if at least one URL is identified
    as phishing, and "false" otherwise.
  ai_short_description: >-
    Retrieves the status of URL entities using the Phishing Initiative API to determine
    if they are associated with phishing campaigns, updating entity properties and
    suspicious status accordingly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data via a GET request to the Phishing Initiative API (fetches_data=true).
      It does not mutate external data (can_mutate_external_data=false). It does not
      mutate internal data outside of entities (can_mutate_internal_data=false). It
      updates entities by calling `siemplify.update_entities` (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
