Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Rapid7 InsightIDR service. This action verifies that
    the integration configuration parameters (such as API Root and API Key) are correct
    and that the SecOps platform can successfully communicate with the Rapid7 InsightIDR
    API.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, API Key,
    Verify SSL).

    2. Initializes the Rapid7 InsightIDR manager with the provided credentials.

    3. Makes an HTTP GET request to the `/validate` endpoint of the Rapid7 InsightIDR
    API.

    4. Evaluates the HTTP response to determine if the connection was successful.

    5. Returns a success or failure message to the SecOps platform based on the result.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Rapid7 InsightIDR integration to ensure proper communication. It does not interact
    with cases, alerts, or entities.
