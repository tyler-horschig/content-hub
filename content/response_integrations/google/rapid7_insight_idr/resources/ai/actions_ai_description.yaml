Delete Saved Query:
  ai_description: >-
    ### General Description

    Deletes a specific saved query in Rapid7 InsightIDR. This action initiates a state
    change on the external Rapid7 platform to remove the specified query configuration.


    ### Flow Description

    1. Extracts the `Saved Query ID` parameter from the action configuration.

    2. Initializes the Rapid7 InsightIDR API client using the provided integration
    credentials.

    3. Sends an HTTP DELETE request to the Rapid7 InsightIDR API (`/log_search/query/saved_queries/{saved_query_id}`)
    to remove the specified saved query.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action does not operate on or interact with Google SecOps entities.
