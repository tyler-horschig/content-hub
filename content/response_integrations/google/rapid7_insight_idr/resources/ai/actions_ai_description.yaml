    ### General Description

    Retrieves a list of investigations from Rapid7 InsightIDR based on specified time
    frames and limits. This action allows analysts to query the external system for
    recent investigations, optionally including closed ones, and returns the data
    for review within the SecOps platform.


    ### Flow Description

    1. Extracts the action parameters: `Time Frame`, `Record limit`, and `Include
    Closed Investigations?`.

    2. Makes an HTTP GET request to the Rapid7 InsightIDR API (`/idr/v1/investigations`)
    using the provided time frame and status filters.

    3. Parses the returned investigations into structured objects.

    4. Outputs the results as a JSON array and constructs a formatted entity table
    containing the investigation details.


