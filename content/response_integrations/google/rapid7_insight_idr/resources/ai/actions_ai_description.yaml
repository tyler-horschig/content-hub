Create Saved Query:
  ai_description: >-
    ### General Description

    Creates a new saved query in Rapid7 InsightIDR based on the provided parameters.


    ### Flow Description

    1. Extracts the action parameters including the query name, statement, time frame,
    and target logs.

    2. If log names are provided, retrieves the corresponding log IDs from Rapid7
    InsightIDR via a GET request.

    3. Makes a POST request to the Rapid7 InsightIDR API to create the saved query.

    4. Returns the created saved query details as a JSON result.


    ### Additional Notes

    This action does not interact with or process Siemplify entities.
