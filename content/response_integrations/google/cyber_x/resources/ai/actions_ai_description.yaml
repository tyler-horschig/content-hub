Enrich Endpoints:
  ai_description: >-
    ### General Description

    Enriches Endpoint entities (IP Addresses and Hostnames) by fetching device information
    from CyberX. This action retrieves contextual metadata about the devices associated
    with the entities to aid in investigation and asset identification.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses and Hostnames.

    2. Iterates through the filtered entities.

    3. For each entity, makes an HTTP GET request to the CyberX API (`/api/v1/devices`)
    to retrieve all devices and matches the device by IP address or hostname.

    4. If a matching device is found, it formats the device information into a CSV
    table and attaches it to the action's results for the entity.

    5. Updates the entity's additional properties in memory with the retrieved device
    information.


    ### Additional Notes

    Although the action updates the entity's additional properties in memory, it does
    not explicitly call the SDK method (`siemplify.update_entities`) to save these
    entity updates back to the platform.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving device information from
    CyberX and attaching it as an entity table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from the CyberX API via HTTP GET requests (fetches_data=true).
      It does not perform any state-changing operations on external systems (can_mutate_external_data=false).
      While it updates entity additional properties in memory, it does not call `siemplify.update_entities`
      to save these changes to the platform (can_update_entities=false). It also does
      not create insights, modify alert data, or create case comments.
  entity_usage:
