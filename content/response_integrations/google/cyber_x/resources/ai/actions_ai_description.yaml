Get Connections for Endpoint:
  ai_description: >-
    ### General Description

    Retrieves a list of network connections for specific endpoint devices from CyberX.
    This action helps analysts understand the network activity and communication patterns
    of a given host or IP address.


    ### Flow Description

    1. Iterates through the provided target entities, filtering for IP Address and
    Hostname entity types.

    2. For each valid entity, makes a GET request to the CyberX API to resolve the
    entity's identifier to a specific CyberX device ID.

    3. Makes a subsequent GET request to the CyberX API to fetch the network connections
    associated with the resolved device ID.

    4. Formats the retrieved connection data and attaches it to the action results
    as an entity-specific table.


    ### Additional Notes

    If a device ID cannot be found for a given entity, or if no connections are available,
    the action will log an error for that specific entity and continue processing
    the remaining entities.
