Get Security Profiles:
  ai_description: >-
    ### General Description

    Retrieves all security profiles (policies) from Trend Micro Deep Security. This
    action fetches the global list of policies configured in the Deep Security environment
    and presents them as a data table.


    ### Flow Description

    1. Initializes the Trend Micro Deep Security manager using the integration-level
    API credentials.

    2. Sends a GET request to the Deep Security API to fetch all available security
    profiles (policies).

    3. Parses the response and extracts the Name, Description, and ID for each policy.

    4. Constructs a CSV-formatted data table with the extracted information.

    5. Attaches the data table to the action results for analyst review.


    ### Additional Notes

    This action does not operate on specific entities and relies solely on the integration's
    configuration parameters to authenticate and retrieve the data.
