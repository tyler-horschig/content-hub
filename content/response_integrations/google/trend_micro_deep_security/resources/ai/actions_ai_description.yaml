Scan Host:
  ai_description: >-
    ### General Description

    Requests a malware scan on specific Hostname entities using Trend Micro Deep Security.
    This action initiates a state change on the external device to enable anti-malware
    scanning for the targeted hosts.


    ### Flow Description

    1. Initializes the Trend Micro Deep Security manager with the provided API credentials.

    2. Iterates through the target entities and filters for Hostname entities.

    3. For each valid Hostname, retrieves the corresponding computer ID from Trend
    Micro Deep Security via a GET request.

    4. Sends a POST request to modify the computer's configuration, setting the anti-malware
    state to 'on' to trigger a scan.

    5. Returns a success message with the list of successfully processed hostnames.


    ### Additional Notes

    If a hostname cannot be found in Trend Micro Deep Security, the action will log
    an error and skip to the next entity.
