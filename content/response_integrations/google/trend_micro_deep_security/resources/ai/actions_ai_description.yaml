Assign Security Profile To Host:
  ai_description: >-
    ### General Description

    Assigns a specified security profile (policy) to target Hostname entities in Trend
    Micro Deep Security. This action modifies the configuration of the endpoint within
    the external system to enforce the selected security policy.


    ### Flow Description

    1. Initializes the Trend Micro Deep Security API client using the provided credentials.

    2. Retrieves the policy ID corresponding to the provided 'Security Profile Name'
    via a GET request to the Trend Micro API.

    3. Iterates through the target entities, filtering specifically for Hostname entities.

    4. For each valid Hostname, queries the API (GET request) to find the corresponding
    computer ID.

    5. Makes a POST request to the Trend Micro API to assign the retrieved policy
    ID to the computer.

    6. Returns a summary of the entities that were successfully updated.


    ### Additional Notes

    This action only operates on entities of type Hostname. Any other entity types
    will be skipped during execution.
  ai_short_description: >-
    Assigns a specified security profile to target Hostname entities in Trend Micro
    Deep Security.
