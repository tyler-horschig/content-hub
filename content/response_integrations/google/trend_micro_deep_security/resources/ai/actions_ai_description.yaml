    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Assigns a specified security policy to a computer in Trend Micro Deep Security
      via a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Trend Micro Deep Security API to modify
      a computer's assigned policy, which mutates external data. It does not fetch
      data for enrichment purposes, nor does it update internal entities, create insights,
