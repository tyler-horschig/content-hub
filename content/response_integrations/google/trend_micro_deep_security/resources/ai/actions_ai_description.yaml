Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Trend Micro Deep Security server. This action verifies
    that the provided integration configuration credentials and network settings are
    valid and operational.


    ### Flow Description

    1. Extracts integration-level configuration parameters (API Root, API Secret Key,
    API Version, Verify SSL).

    2. Initializes the Trend Micro Deep Security manager with the provided credentials.

    3. Calls the API to list all computers as a test to verify the connection.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This is a standard ping action used primarily during integration setup or troubleshooting
    to ensure the SOAR platform can successfully communicate with the Trend Micro
    Deep Security API.
