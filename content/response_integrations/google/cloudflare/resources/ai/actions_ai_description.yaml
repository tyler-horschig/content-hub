Add IP To Rule List:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified rule list in Cloudflare. This action allows
    security teams to dynamically update Cloudflare rule lists (specifically those
    of type 'ip') with new IP addresses, which can then be referenced by Cloudflare
    firewall rules for blocking, allowing, or challenging traffic.


    ### Flow Description

    1. Retrieves configuration parameters and action parameters (Rule Name, Description).

    2. Filters the target entities to include only IP Address entities.

    3. Initializes the Cloudflare API client.

    4. Fetches the specified rule list from Cloudflare and verifies that its kind
    is 'ip'.

    5. Iterates through the filtered IP entities and makes a POST request to the Cloudflare
    API (`/client/v4/accounts/{account_id}/rules/lists/{rule_id}/items`) to add each
    IP to the rule list.

    6. Collects the results and populates the JSON result with the API response for
    successfully added IPs.


    ### Additional Notes

    The rule list must already exist in Cloudflare and must be of type 'ip'.
  ai_short_description: >-
    Adds IP address entities to a specified rule list in Cloudflare.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to a specified rule list in Cloudflare.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Cloudflare API to add an IP address to
      a rule list, which mutates external data. It does not fetch data for enrichment,
      update internal entities, or create insights.
