Create Firewall Rule:
  ai_description: >-
    ### General Description

    Creates a new firewall rule in a specified Cloudflare zone. This action allows
    users to define custom firewall rules with specific expressions, actions, and
    priorities to control traffic to their Cloudflare-protected applications.


    ### Flow Description

    1. Validates the provided input parameters, ensuring that 'Products' are specified
    if the 'Bypass' action is selected, and checks the length of the 'Reference Tag'
    and the value of 'Priority'.

    2. Makes a GET request to the Cloudflare API to retrieve the Zone ID associated
    with the provided 'Zone Name'.

    3. Makes a POST request to the Cloudflare API to create the firewall rule within
    the identified zone using the provided expression, action, and other configurations.

    4. Returns the details of the newly created firewall rule as JSON data.


    ### Additional Notes

    If "Bypass" is selected for the "Action" parameter, the "Products" parameter becomes
    mandatory and must contain valid product names.
