Update Firewall Rule:
  ai_description: >-
    ### General Description

    Updates an existing firewall rule and its associated filter expression in Cloudflare.


    ### Flow Description

    1. Validates the provided parameters, ensuring constraints on `Products`, `Action`,
    `Reference Tag`, and `Priority` are met.

    2. Makes a GET request to the Cloudflare API to retrieve the specified zone using
    the `Zone Name`.

    3. Makes a GET request to search for the firewall rule by its `Rule Name` within
    the retrieved zone.

    4. Makes a PUT request to update the firewall rule's action, products, priority,
    and reference tag via the Cloudflare API.

    5. If an `Expression` is provided, makes an additional PUT request to update the
    firewall filter expression.

    6. Retrieves the updated firewall rule data and attaches it to the action results
    as JSON.


    ### Additional Notes

    The action requires the `Rule Name` and `Zone Name` to locate the rule. If "Bypass"
    is selected as the `Action`, the `Products` parameter must be provided.
  ai_short_description: >-
    Updates an existing firewall rule and its filter expression in a specified Cloudflare
    zone.
