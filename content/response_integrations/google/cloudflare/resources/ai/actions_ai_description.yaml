Add URL To Rule List:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified rule list in Cloudflare. The action treats the
    URL entities as "Source URLs" and configures them to redirect to a specified target
    URL.


    ### Flow Description

    1. Retrieves the specified rule list from Cloudflare to verify its existence and
    type (must be a "redirect" rule list).

    2. Iterates through the provided URL entities.

    3. For each URL entity, makes a POST request to the Cloudflare API to add it as
    a rule list item, configuring the redirect behavior based on the provided parameters
    (Target URL, Status Code, etc.).

    4. Returns a JSON result containing the details of the added rule list items.


    ### Additional Notes

    - The target rule list must be of kind "redirect".

    - If the "Preserve Path Suffix" parameter is enabled, the "Subpath Matching" parameter
    must also be enabled.
