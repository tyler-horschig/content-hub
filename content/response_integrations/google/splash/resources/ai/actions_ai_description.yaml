Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Splash server using the provided integration configuration
    parameters. This action ensures that the Google SecOps platform can successfully
    communicate with the Splash API.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root and Verify
    SSL).

    2. Initializes the Splash API manager with the provided credentials.

    3. Makes an HTTP GET request to the `/_ping` endpoint of the Splash API.

    4. Validates the HTTP response to confirm successful connectivity.

    5. Returns a success or failure message to the SOAR platform based on the response.


    ### Additional Notes

    This action is primarily used for diagnostic and setup purposes to verify that
    the integration is configured correctly and the external service is reachable.
  ai_short_description: >-
    Tests connectivity to the Splash server using the provided integration configuration
    parameters.
  capabilities:
