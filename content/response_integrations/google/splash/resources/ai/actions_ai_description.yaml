    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES` includes `EntityTypes.URL`
      and `EntityTypes.ADDRESS`. Therefore, it targets URL and ADDRESS entities, filtering
      strictly by entity_type.
