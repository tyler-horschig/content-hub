Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches URL and IP Address entities using Splash. This action retrieves rendering
    information, including final URLs, page titles, history, HAR data, and PNG screenshots.
    It updates the entity's additional properties, attaches the screenshot to the
    entity, and optionally generates a case insight with the retrieved information.


    ### Flow Description

    1. Filters target entities to include only URL and IP Address types.

    2. Iterates through the suitable entities and formats the identifier to include
    an HTTP/HTTPS schema if missing.

    3. Makes a GET request to the Splash API (`/render.json`) to fetch rendering data,
    history, HAR, and a PNG screenshot for each entity.

    4. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Attaches the PNG screenshot and a data table to the entity in the SecOps platform.

    6. Optionally creates a case insight containing the general information and screenshot.

    7. Saves the updated entities back to the platform.


    ### Additional Notes

    URLs need to have a schema. For IP addresses, the action will automatically add
    the "HTTPS" schema.
  ai_short_description: >-
    Enriches URL and IP Address entities by retrieving rendering data, history, HAR,
    and screenshots from Splash.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Splash API to fetch rendering data (fetches_data=true).
      It does not mutate external data. It updates internal entities with the retrieved
      data (can_update_entities=true) and creates case insights (can_create_insight=true).
