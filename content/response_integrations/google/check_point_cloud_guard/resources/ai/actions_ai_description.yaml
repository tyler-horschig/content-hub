Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Check Point Cloud Guard server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the API Key ID, API Key Secret, and Verify SSL settings from the integration
    configuration.

    2. Initializes the Check Point Cloud Guard (Dome9) manager.

    3. Makes a GET request to the `/Settings` endpoint to verify authentication and
    connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Check Point Cloud Guard API.
  ai_short_description: >-
    Tests connectivity to the Check Point Cloud Guard server to verify integration
    configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Check Point Cloud Guard API to verify
      connectivity. It does not fetch contextual data for alerts/entities, mutate
      external data, mutate internal data, update entities, create insights, modify
      alert data, or create case comments.
