    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type not in supported_entities`, where supported entities are
      URL, ADDRESS, USER, HOSTNAME, and FILEHASH. It also checks if a USER entity
      is a valid email address. Therefore, it filters by entity_type.
