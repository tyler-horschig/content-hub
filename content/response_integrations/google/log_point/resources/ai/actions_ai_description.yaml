Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the LogPoint server to ensure that the integration is configured
    correctly and can communicate with the external system.


    ### Flow Description

    1. Extracts the integration-level connection parameters (IP Address, Username,
    Secret, CA Certificate File, Verify SSL).

    2. Initializes the LogPointManager with the provided credentials and settings.

    3. Executes a connectivity test by sending a ping request to the LogPoint API.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the integration
    configuration. It does not perform any data retrieval or state changes.
