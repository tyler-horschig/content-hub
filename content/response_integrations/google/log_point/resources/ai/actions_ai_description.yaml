    | Time Frame | Dropdown | Yes | Specify the time frame for the query. If "Custom"
    is selected, you need also provide start time, end time by default will be current
    time. |

    | Start Time | String | No | Specify the start time for the query. Format: YYYY-MM-DDThh:mm:ssZ
    or timestamp. |

    | End Time | String | No | Specify the end time for the query. Format: YYYY-MM-DDThh:mm:ssZ
    or timestamp. If nothing is provided action will use current time as end time.
    |

    | Repos | String | No | Specify a comma-separated list of names of the repos.
    If nothing is provided, action will search in all repos. |

    | IP Entity Key | String | No | Specify what key should be used with IP entities.
    Please refer to the action documentation for details. |

