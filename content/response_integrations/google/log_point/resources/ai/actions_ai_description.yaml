    ### General Description

    Retrieves a list of available repositories from LogPoint.


    ### Flow Description

    1. Extracts the `Max Repos To Return` parameter to determine the limit of repositories
    to fetch.

    2. Makes a POST request to the LogPoint API (`/getalloweddata`) to retrieve the
    list of allowed repositories.

    3. Parses the API response and formats the repository data into JSON and CSV structures.

    4. Attaches the formatted data as a JSON result and a data table within the Google
    SecOps platform.


