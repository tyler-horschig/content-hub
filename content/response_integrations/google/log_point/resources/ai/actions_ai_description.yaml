    Hash entities. Please refer to the action documentation for details. |

    | User Entity Key | String | No | Specify what key should be used with User entities.
    Please refer to the action documentation for details. |

    | URL Entity Key | String | No | Specify what key should be used with URL entities.
    Please refer to the action documentation for details. |

    | Email Address Entity Key | String | No | Specify what key should be used with
    Email Address entities. Please refer to the action documentation for details.
    |

    | Stop if Not Enough Entities | Boolean | Yes | If enabled, action will not start
    execution, unless all of the entity types are available for the specified "..
    Entity Keys". Example: if "IP Entity Key" and "File Hash Entity Keys" are specified,
    but in the scope there are no file hashes then if this parameter is enabled, action
    will not execute the query. |

    | Cross Entity Operator | Dropdown | Yes | Specify what should be the logical
    operator used between different entity types. |

    | Max Results To Return | String | No | Specify how many results should be returned.
    |
