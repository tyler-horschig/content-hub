Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a dynamic search query in LogPoint based on target entities to retrieve
    matching log events. The action supports User, IP Address, Email Address, URL,
    File Hash, and Hostname entities, mapping them to specific LogPoint fields to
    construct a comprehensive search query.


    ### Flow Description

    1. Validates the provided parameters, including custom time frames and the availability
    of specified LogPoint repositories.

    2. Iterates through the target entities, filtering for supported types (URL, Address,
    User, Hostname, File Hash).

    3. Constructs a dynamic LogPoint search query by mapping the filtered entities
    to their respective LogPoint fields (provided via the Entity Key parameters) and
    joining them using the specified logical operator (AND/OR).

    4. Initiates an asynchronous query job in LogPoint via a POST request to the `/getsearchlogs`
    API endpoint.

    5. Periodically polls the LogPoint API to check the status of the query job until
    it finishes processing.

    6. Retrieves the search results and attaches them to the action's JSON results
    and a case data table.


    ### Additional Notes

    If the 'Stop if Not Enough Entities' parameter is enabled, the action will halt
    execution if any of the specified Entity Keys do not have corresponding entities
    available in the current scope.
  ai_short_description: >-
    Executes a dynamic search query in LogPoint based on target entities and retrieves
    the matching log events.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a query job in LogPoint and retrieving
      the results. It does not mutate external data (only searches), nor does it mutate
      internal data, update entities, create insights, modify alerts, or create case
      comments.
  entity_usage:
