Remove IP From Group:
  ai_description: >-
    ### General Description

    Removes a specific IP address entity from a designated address group on FortiManager
    and subsequently deletes the associated firewall address object. This action is
    typically used to unblock an IP or remove it from a specific policy group by modifying
    the external firewall configuration.


    ### Flow Description

    1. Iterates through the provided target entities, filtering specifically for IP
    Address entities.

    2. For each valid IP address, constructs the corresponding FortiManager address
    object name.

    3. Makes an API call (POST) to FortiManager to remove the address object from
    the specified address group.

    4. Makes a subsequent API call (POST) to FortiManager to delete the address object
    entirely.

    5. If workflow mode is enabled, makes additional API calls to lock the ADOM, start
    a workflow session, submit, approve, commit changes, and unlock the ADOM.

    6. Returns a summary message detailing the entities that were successfully removed
    from the group.


    ### Additional Notes

    The action supports asynchronous execution and workflow mode. If workflow mode
    is enabled in the integration configuration, the action will handle the necessary
    session locking, committing, and unlocking of the ADOM. Ensure the script timeout
    value in the IDE is adjusted appropriately for asynchronous execution.
