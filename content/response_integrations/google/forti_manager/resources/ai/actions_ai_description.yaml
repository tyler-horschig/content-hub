Add IP To Group:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified address group in FortiManager. This action
    creates a new firewall address object for the IP if it does not already exist,
    and then appends it to the target address group, effectively updating the firewall's
    security controls.


    ### Flow Description

    1. Retrieves the target ADOM and Address Group Name from the action parameters.

    2. Iterates through the provided IP address entities.

    3. Checks if a firewall address object already exists for the IP address in FortiManager.

    4. If it does not exist, creates a new firewall address object for the IP.

    5. Adds the address object to the specified address group.

    6. Returns a summary of the entities successfully added to the group.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed to accommodate the execution time.
  ai_short_description: >-
    Creates firewall address objects for IP address entities and adds them to a specified
    address group in FortiManager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates firewall address objects and adds them to a specified address group
      in FortiManager.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST requests to the FortiManager API to create address objects
      and update address groups, which mutates external data. It does not fetch contextual
      enrichment data, update internal entities, or create insights.
