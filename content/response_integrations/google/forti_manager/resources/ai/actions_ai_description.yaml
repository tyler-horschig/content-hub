Remove URL From Url Filter:
  ai_description: >-
    ### General Description

    Removes a specific URL block record from a designated URL filter in FortiManager.
    This action restores access to the URL by deleting its entry from the filter.


    ### Flow Description

    1. Retrieves the specified ADOM and URL Filter Name parameters.

    2. Iterates over the target URL entities.

    3. For each URL, fetches the URL filter ID from FortiManager using the provided
    filter name.

    4. Strips the 'http' or 'https' prefix from the URL entity identifier.

    5. Sends a DELETE request to the FortiManager API to remove the URL entry from
    the specified URL filter.

    6. Commits the changes and closes the session.


    ### Additional Notes

    The action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed.
