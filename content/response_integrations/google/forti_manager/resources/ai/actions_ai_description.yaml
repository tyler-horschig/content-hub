Add URL To Url Filter:
  ai_description: >-
    ### General Description

    Adds a new block record for URL entities to a specified URL filter in FortiManager.
    This action modifies the external firewall configuration to prevent access to
    the specified URLs.


    ### Flow Description

    1. Initializes a connection to the FortiManager API and establishes a session
    (or workflow session if configured).

    2. Filters the target entities to include only URL entities.

    3. Retrieves the internal ID of the specified URL filter using the provided ADOM
    name and URL filter name.

    4. Iterates over the valid URL entities and makes an API call to FortiManager
    to add a block record for each URL to the URL filter.

    5. Commits the changes to the ADOM and closes the session.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed to accommodate the workflow session locks and commits.
