    This action triggers a configuration or operational script on the target network
    devices and returns a task ID for tracking the execution status.


    ### Flow Description

    1. Retrieves the action parameters, including the ADOM Name, Policy Package Name,
    Script Name, Device Name, and optionally the VDOM.

    2. Makes a POST request to the FortiManager API to execute the specified script
