Create Regex Pattern Set:
  ai_description: >-
    ### General Description

    Creates a new Regex Pattern Set in AWS WAF based on provided URL and IP Address
    entities. This action translates the entity identifiers into regular expressions
    and groups them into a single Regex Pattern Set configuration object within AWS
    WAF, which can later be referenced by WAF rules.


    ### Flow Description

    1. Extracts action parameters including the desired name, scope, and pattern formatting
    preferences.

    2. Iterates through the target entities, filtering specifically for `URL` and
    `ADDRESS` (IP) entity types.

    3. Converts the valid entity identifiers into regular expressions. If `Domain
    Pattern` is enabled, it extracts the domain from URLs. If `IP Pattern` is enabled,
    it wraps the IP address in a regex format.

    4. Calls the AWS WAF API (`create_regex_pattern_set`) to create the Regex Pattern
    Set containing the compiled list of regular expressions in the specified scope(s).

    5. Returns the names of the successfully created Regex Pattern Sets in the JSON
    results and outputs a summary message.


