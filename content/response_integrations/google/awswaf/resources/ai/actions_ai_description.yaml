    | IP Set Names | String | Yes | Specify the comma-separated list of IP set names.
    Example: name_1,name_2 |

    | Scope | Dropdown | Yes | Specify what should be the scope of the set. If "Both"
    is selected, action will remove IP addresses from IPsets in Regional and CloudFront
    scopes. |
Remove Pattern From Regex Pattern Set:
  ai_description: >-
    ### General Description

    Removes specified regex patterns from a Regex Pattern Set in AWS WAF.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Lists the existing Regex Pattern Sets based on the provided `Scope` (CloudFront,
    Regional, or Both) via the `list_regex_pattern_sets` API call.

    3. Filters the retrieved sets to match the provided `Regex Pattern Set Names`.

    4. For each matching set, retrieves its current list of regex patterns via the
    `get_regex_pattern_set` API call.

    5. Identifies the patterns to be removed and updates the Regex Pattern Set in
    AWS WAF via the `update_regex_pattern_set` API call, effectively removing the
    specified patterns.

    6. Returns a summary of successfully removed patterns, patterns that were not
    found, and any sets that could not be located.


    ### Additional Notes

    At least one of the specified Regex Pattern Sets must exist in the specified scope
    for the action to execute successfully.
