Remove IP From IP Set:
  ai_description: >-
    ### General Description

    Removes specified IP address entities from one or more IP Sets in AWS WAF. This
    action modifies the external AWS WAF configuration by removing the target IPs
    from the designated IP Sets, which are typically used in Web ACL rules to block
    or allow traffic.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the specified IP Sets based on the provided names and scope (CloudFront,
    Regional, or Both).

    3. Filters the target entities to include only IP addresses.

    4. For each valid IP address entity, checks if its masked IP exists within the
    target IP Sets.

    5. Calls the AWS WAF API (`update_ip_set`) to remove the matched IP addresses
    from the IP Sets.

    6. Returns a summary of successfully removed IPs, missing IPs, and any failures.


    ### Additional Notes

    The action automatically handles IP masking (e.g., appending /32 for IPv4 or /128
    for IPv6) to match AWS WAF requirements before attempting to remove the IP from
    the set. It will skip entities that have invalid IP addresses or IP versions that
    do not match the target IP Set's version.
  ai_short_description: >-
    Removes specified IP address entities from one or more IP Sets in AWS WAF.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes specified IP addresses from an IP Set in AWS WAF.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by calling the AWS WAF API (`update_ip_set`)
      to remove IP addresses from an IP Set. It does not fetch contextual enrichment
      data, nor does it mutate internal SecOps data such as entities, insights, or
      case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
