      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The script iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type not in SUPPORTED_ENTITIES` where `SUPPORTED_ENTITIES = (EntityTypes.ADDRESS,)`.
      Therefore, it targets ADDRESS entities and filters by entity_type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action removes IP addresses from an AWS WAF IP Set. Since AWS WAF IP Sets
      are used in Web ACL rules to either block or allow traffic, removing an IP from
      a set effectively removes it from a blocklist (restoring connectivity) or an
      allowlist (re-enabling standard monitoring). Therefore, it matches both 'Remove
      IOC From Blocklist' and 'Remove IOC From Allowlist'.
