Add Rule To Web ACL:
  ai_description: >-
    ### General Description

    Adds a new rule based on an existing IP Set or Rule Group to specified Web ACLs
    in AWS WAF. This action modifies the configuration of the target Web ACLs to include
    the specified rule source, applying the defined priority and action (such as Allow,
    Block, or Count).


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the list of existing Web ACLs in the specified scope (CloudFront,
    Regional, or Both).

    3. Searches for the specified `Rule Source Name` (either an IP Set or a Rule Group)
    to obtain its Amazon Resource Name (ARN).

    4. Iterates through the provided `Web ACL Names` and fetches their current rules.

    5. Checks if the rule already exists in the Web ACL to prevent duplicate entries.

    6. Makes an API call (`update_web_acl`) to AWS WAF to append the new rule to the
    Web ACL with the specified priority and action.


    ### Additional Notes

    - At maximum, a Web ACL can contain 1500 rules.

    - Priorities in a Web ACL must be unique.

    - This action does not operate on SecOps entities; it relies entirely on the provided
    action parameters.
