Remove Rule From Rule Group:
  ai_description: >-
    ### General Description

    Removes a specified rule from one or more AWS WAF Rule Groups. This action modifies
    the external AWS WAF configuration by deleting the target rule from the specified
    rule groups across the selected scopes (CloudFront, Regional, or Both).


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the list of existing Rule Groups for the specified scope(s) via the
    `list_rule_groups` API call.

    3. Filters the retrieved Rule Groups to match the provided comma-separated list
    of Rule Group names.

    4. For each matching Rule Group, fetches its current configuration and rule list
    via the `get_rule_group` API call.

    5. Identifies and removes the specified rule from the rule list.

    6. Updates the Rule Group in AWS WAF with the modified rule list via the `update_rule_group`
    API call.


    ### Additional Notes

    If the specified rule is not found in a Rule Group, the action will skip updating
    that specific Rule Group and report it in the output message.
