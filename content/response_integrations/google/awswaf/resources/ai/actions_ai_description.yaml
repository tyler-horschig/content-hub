Add IP To IP Set:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to one or more IP Sets in AWS WAF. It connects
    to the AWS WAF service, retrieves the specified IP Sets based on the provided
    scope, validates and masks the IP addresses, and updates the IP Sets with the
    new addresses. This is typically used to update blocklists or allowlists on the
    web application firewall.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the existing IP Sets based on the specified scope (CloudFront, Regional,
    or Both).

    3. Filters the retrieved IP Sets to match the provided comma-separated list of
    IP Set names.

    4. Iterates through the target entities and filters for IP Address entities.

    5. Validates each IP address and ensures its version matches the target IP Set's
    version (IPv4 or IPv6).

    6. Masks the IP addresses appropriately (e.g., `/32` for IPv4, `/128` for IPv6)
    if they are not already masked.

    7. Calls the AWS WAF API (`update_ip_set`) to append the new IP addresses to the
    existing IP Sets.

    8. Returns a summary message detailing the successfully added IPs and any failures.


    ### Additional Notes

    The action automatically masks IP addresses if they are not already masked. It
    will skip entities that are not valid IP addresses or do not match the IP version
    of the target IP Set.
  ai_short_description: >-
    Adds specific IP address entities to one or more IP Sets in AWS WAF.
  capabilities:
    can_create_case_comments: false
