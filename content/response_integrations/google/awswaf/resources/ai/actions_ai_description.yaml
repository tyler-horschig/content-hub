Remove Entity From Regex Pattern Set:
  ai_description: >-
    ### General Description

    Removes string patterns based on URL and IP Address entities from specified Regex
    Pattern Sets in AWS WAF. This action modifies external AWS WAF configurations
    by removing the regex representations of the target entities from the designated
    sets.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the existing Regex Pattern Sets based on the provided `Regex Pattern
    Set Names` and `Scope` (Regional, CloudFront, or Both).

    3. Iterates over the target URL and IP Address entities.

    4. Converts the entity identifiers into regex patterns. If `Domain Pattern` or
    `IP Pattern` are enabled, it extracts domains from URLs and wraps the identifiers
    in standard HTTP/HTTPS regex formats.

    5. Fetches the current regex list for each matched Regex Pattern Set via the AWS
    WAF API.

    6. Identifies which entity regex patterns currently exist in the set and removes
    them from the local list.

    7. Updates the Regex Pattern Set in AWS WAF with the remaining patterns via the
    `update_regex_pattern_set` API call.


    ### Additional Notes

    The action strictly supports URL and IP Address entities. The behavior of how
    entities are matched against the Regex Pattern Set can be controlled using the
    `Domain Pattern` and `IP Pattern` boolean parameters, which determine whether
    raw values or formatted HTTP/HTTPS regex strings are used for the removal search.
