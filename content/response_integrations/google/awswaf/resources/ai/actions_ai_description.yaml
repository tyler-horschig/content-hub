Create IP Set:
  ai_description: >-
    ### General Description

    Creates a new IP Set in AWS WAF based on the provided IP address entities. This
    action groups the target IP addresses by their IP version (IPv4 or IPv6) and creates
    corresponding IP Sets in the specified AWS WAF scopes (Regional, CloudFront, or
    Both).


