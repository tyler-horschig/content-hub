Remove Rule From Web ACL:
  ai_description: >-
    ### General Description

    Removes a specific rule from one or more Web ACLs in AWS WAF. This action connects
    to the AWS WAF service, retrieves the specified Web ACLs within the given scope
    (CloudFront, Regional, or Both), and updates their configuration to remove the
    designated rule.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided AWS credentials.

    2. Retrieves a list of existing Web ACLs based on the specified `Scope`.

    3. Filters the retrieved Web ACLs to match the provided `Web ACL Names`.

    4. For each matching Web ACL, fetches its current rules via the AWS WAF API.

    5. Identifies and removes the specified `Rule Name` from the Web ACL's rule list.

    6. Calls the AWS WAF API to update the Web ACL with the modified rule list, effectively
    removing the rule.


    ### Additional Notes

    The action will fail if the specified Web ACLs are not found in the AWS WAF environment.
    If the specified rule is not found within a given Web ACL, the action will skip
    that Web ACL and note the omission in the final output message.
