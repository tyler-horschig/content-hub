    1. Initializes the connection to the AWS WAF service using the provided integration
    credentials.

    2. Iterates through the target entities, filtering specifically for IP addresses
    (`ADDRESS` entity type).

    3. Determines the IP version for each valid entity and applies the appropriate
    subnet mask (e.g., `/32` for IPv4 and `/128` for IPv6).

