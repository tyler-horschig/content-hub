Add Pattern To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds string patterns to specified Regex Pattern Sets in AWS WAF. This action modifies
    the external AWS WAF configuration by appending new regular expressions to existing
    sets, subject to the AWS WAF limit of 10 patterns per set.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided credentials.

    2. Retrieves the existing Regex Pattern Sets matching the provided names and scope.

    3. For each matching set, fetches the current list of regular expressions.

    4. Checks the new patterns against the existing ones to avoid duplicates and verifies
    that the set has available capacity (maximum 10 patterns).

    5. Updates the Regex Pattern Set in AWS WAF with the new patterns via the `update_regex_pattern_set`
    API call.


    ### Additional Notes

    The AWS WAF Regex Pattern Set has a hard limit of 10 patterns per set. If the
    limit is exceeded, the action will only add patterns up to the limit and report
    the failure for the remaining patterns.
