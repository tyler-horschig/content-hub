Add Entity To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds string patterns derived from URL and IP Address entities to specified Regex
    Pattern Sets in AWS WAF. This action allows security teams to dynamically update
    AWS WAF regex sets with indicators extracted from alerts, which can then be used
    by WebACLs to allow, block, or count web requests.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the existing Regex Pattern Sets based on the specified scope (CloudFront,
    Regional, or Both).

    3. Iterates through the target entities, filtering for supported types (URL and
    Address).

    4. Converts the entity identifiers into regular expressions. If configured, it
    extracts domains from URLs and wraps both domains and IPs in HTTP/HTTPS protocol
    regexes.

    5. Checks the target Regex Pattern Sets for available capacity and existing duplicates.

    6. Calls the AWS WAF API (`update_regex_pattern_set`) to append the new regular
    expressions to the sets.


    ### Additional Notes

    AWS WAF enforces a hard quota limit of 10 patterns per Regex Pattern Set. The
    action will skip adding new patterns and report an error if this limit is exceeded.
  ai_short_description: >-
    Adds regular expression patterns derived from URL and IP Address entities to specified
    Regex Pattern Sets in AWS WAF.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the specified Regex Pattern Sets in AWS WAF by adding new regular expressions
      based on the target entities.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by calling the AWS WAF API (`update_regex_pattern_set`)
      to add new regular expressions to an existing Regex Pattern Set. It does not
      fetch enrichment data, mutate internal SOAR data, update entities, or create
      insights.
