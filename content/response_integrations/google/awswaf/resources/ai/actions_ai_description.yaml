Add Rule To Rule Group:
  ai_description: >-
    ### General Description

    Adds a specified rule to one or more Rule Groups in AWS WAF. This action allows
    users to programmatically update their AWS WAF configurations by injecting a new
    rule, defined as a JSON object, into existing Rule Groups across Regional or CloudFront
    scopes.


    ### Flow Description

    1. Parses and validates the provided `Rule JSON Object` to ensure it is valid
    JSON and contains a rule name.

    2. Connects to the AWS WAF service using the provided integration credentials.

    3. Retrieves the list of existing Rule Groups from AWS WAF based on the specified
    `Scope` (CloudFront, Regional, or Both).

    4. Filters the retrieved Rule Groups to find those matching the provided `Rule
    Group Names`.

    5. For each matching Rule Group, makes an API call to fetch its current configuration,
    lock token, and existing rule list.

    6. Checks if a rule with the same name already exists in the Rule Group to prevent
    duplicates.

    7. If the rule does not exist, appends the new rule to the list and makes an API
    call (`update_rule_group`) to update the Rule Group in AWS WAF.


    ### Additional Notes

    The rule must be provided as a valid JSON object conforming to AWS WAF rule specifications.
    If the action is configured to run on 'Both' scopes, it will attempt to find and
    update the specified Rule Groups in both Regional and CloudFront environments.
