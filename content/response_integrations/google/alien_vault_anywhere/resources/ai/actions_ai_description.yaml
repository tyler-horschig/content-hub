List Events:
  ai_description: >-
    ### General Description

    Searches for AlienVault Anywhere events based on specified criteria such as account
    name, event name, source name, and time range. The action retrieves the matching
    events and returns them as a data table and a JSON array.


    ### Flow Description

    1. Extracts configuration and action parameters, including time filters and event
    limits.

    2. Validates that the integration version is V2, as V1 is not supported for this
    action.

    3. Parses the provided `Start Time` and `End Time` into Unix timestamps.

    4. Initializes the AlienVault Anywhere manager and authenticates with the API.

    5. Makes a GET request to the AlienVault Anywhere API (`/api/2.0/events`) to fetch
    events matching the provided filters.

    6. Constructs a CSV table and a JSON array from the retrieved events.

    7. Returns the results to the SecOps platform.


    ### Additional Notes

    - This action is only supported for the AlienVault Anywhere V2 integration.

    - The `Start Time` and `End Time` parameters must be provided in the `DD/MM/YYYY`
    format.
  ai_short_description: >-
    Searches for AlienVault Anywhere events based on specified criteria and returns
    the matching events as a data table and JSON result.
