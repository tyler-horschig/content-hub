    reasoning: >-
      The action makes an HTTP GET request to the AlienVault Anywhere API to fetch
      alarm details, meaning it fetches data. It does not perform any POST/PUT/DELETE
      requests to mutate external data, nor does it call any SDK methods to update
      internal entities, create insights, modify alerts, or add case comments.
