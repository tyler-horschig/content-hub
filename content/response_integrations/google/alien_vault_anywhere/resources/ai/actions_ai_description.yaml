Get Alarm Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific alarm from AlienVault Anywhere using
    the provided Alarm ID. This action queries the AlienVault API to fetch the alarm's
    metadata, rules, and associated events, returning the data for further analysis
    within the SecOps platform.


    ### Flow Description

    1. Extracts the `Alarm ID` parameter provided by the user or playbook.

    2. Validates that the integration is configured to use API V2 (the action will
    fail if V1 is used).

    3. Makes an HTTP GET request to the AlienVault Anywhere API (`/api/2.0/alarms/{alarm_id}`)
    to fetch the alarm details.

    4. Parses the returned alarm data and populates the action's JSON results and
    a formatted data table.


    ### Additional Notes

    This action is strictly supported for AlienVault Anywhere V2. Attempting to run
    this action with a V1 configuration will result in an immediate failure.
  ai_short_description: >-
    Retrieves detailed information for a specific alarm from AlienVault Anywhere using
    the provided Alarm ID.
  capabilities:
