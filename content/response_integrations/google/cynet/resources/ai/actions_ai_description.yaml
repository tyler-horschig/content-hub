Delete Hash In Hosts:
  ai_description: >-
    ### General Description

    Deletes a specific file hash across hosts using Cynet. This action acts as a remediation
    step by identifying where a malicious file exists and issuing a delete command
    to the Cynet platform to remove the file from the affected endpoints.


    ### Flow Description

    1. Iterates through the provided target entities and filters for File Hash entities.

    2. Verifies if the file hash is a valid SHA256 hash.

    3. Makes an API call to Cynet (`/full/file`) to retrieve the hash details and
    identify the hosts where the file has occurred.

    4. For each identified host, makes an API call to Cynet (`/file/remediation/delete`)
    to initiate a delete file remediation action.

    5. Makes an API call to Cynet (`/file/remediation/{id}`) to retrieve the status
    of the remediation action.

    6. Returns the remediation IDs and statuses as a JSON result.


    ### Additional Notes

    The action only processes SHA256 hashes. If a hash is of a different type (e.g.,
    MD5, SHA1), it will be skipped. The action automatically discovers the hosts where
    the file is present based on Cynet's telemetry before issuing the delete command.
  ai_short_description: >-
    Initiates a delete file remediation action on hosts where a specific SHA256 file
    hash is found using Cynet.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a delete file remediation action on the specified hosts via the Cynet
      API.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by calling `get_hash_details` and `get_remediation_status`
      (GET requests). It mutates external data by calling `delete_file_remediation`
      (POST request) to delete files on endpoints. It does not mutate internal data,
      update entities, create insights, modify alerts, or create case comments.
