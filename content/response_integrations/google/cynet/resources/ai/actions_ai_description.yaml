Kill Hash In Hosts:
  ai_description: >-
    ### General Description

    Kills active processes associated with specific file hashes on target hosts using
    Cynet. This action identifies where a malicious file hash is currently running
    and issues a remediation command to terminate the process on those specific endpoints.


    ### Flow Description

    1. Iterates over the provided target entities and filters for File Hash entities.

    2. Validates whether the file hash is a valid SHA256 hash.

    3. Makes a GET request to the Cynet API (`/full/file`) to fetch details about
    the hash and identify the hostnames where the file has occurred.

    4. For each identified host, makes a POST request to the Cynet API (`/file/remediation/kill`)
    to execute the kill process remediation action.

    5. Makes a GET request to retrieve the status of the remediation action.

    6. Aggregates the remediation IDs and statuses, attaching them to the action's
    JSON results.


    ### Additional Notes

    - The action only processes SHA256 file hashes. Other hash types will be ignored.

    - The action automatically discovers the hosts where the file hash is present;
    you do not need to provide the hostnames manually.
