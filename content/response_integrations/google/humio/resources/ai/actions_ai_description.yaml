Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query in Humio to retrieve events from a specified repository.
    This action allows analysts to fetch historical logs and telemetry data directly
    into the SecOps platform for further investigation.


    ### Flow Description

    1. Initializes the Humio API client using the provided integration configuration.

    2. Validates the `Max Results To Return` parameter to ensure it is greater than
    0.

    3. Constructs the search query string by appending the limit to the provided `Query`.

    4. Sends a POST request to the Humio API (`/api/v1/repositories/{repository_name}/query`)
    to execute the search.

    5. Parses the returned events and attaches them to the action's JSON result and
    a structured data table.


    ### Additional Notes

    The `head()` function should not be included in the `Query` string parameter,
    as the action automatically appends it based on the `Max Results To Return` parameter.
  ai_short_description: >-
    Executes a custom search query in Humio to retrieve events from a specified repository
    and returns the results as JSON and a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches event data from Humio by executing a custom search query
      (fetches_data=true). Although it uses a POST request, it is querying data and
      does not mutate any external data in Humio (can_mutate_external_data=false).
      It also does not update internal entities, modify alerts, or create insights/comments
      within Google SecOps.
  entity_usage:
