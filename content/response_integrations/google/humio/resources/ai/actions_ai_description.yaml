    used for sorting. This parameter is needed to ensure that the correct results
    are returned. |

    | Sort Order | Dropdown | No | Specify the order of sorting. |

    | Max Results To Return | String | No | Specify how many results to return. Default:
    50. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Humio server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the API Root, API Token, and Verify SSL configuration parameters.

    2. Initializes the Humio manager.

    3. Sends a POST request to the `/api/v1/repositories/humio-fleet/query` endpoint
    with a simple query (`|select([@id]) | head(1)`) to verify connectivity.

    4. Returns a successful execution state if the connection is established and the
    query succeeds, otherwise returns a failure.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and does not require any action-specific parameters.
