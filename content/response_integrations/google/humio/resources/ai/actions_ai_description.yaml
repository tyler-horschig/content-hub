    Note: "head()" function shouldn't be a part of this string. |

    | Max Results To Return | String | No | Specify how many results the action should
    return. Default: 50. |
Execute Simple Search:
  ai_description: >-
    ### General Description

    Executes a simple search query in Humio to retrieve events based on specified
    parameters such as repository name, query filter, and time frame. The action interacts
    with the Humio API to fetch historical logs and telemetry data, returning the
    results to the SecOps platform.


    ### Flow Description

    1. Extracts action parameters including the repository name, query filter, time
    frame, and sorting preferences.

    2. Calculates the start and end timestamps based on the provided time frame or
    custom time inputs.

    3. Constructs the search query string and makes a POST request to the Humio API
    (`/api/v1/repositories/{repository_name}/query`).

    4. Parses the returned events from the Humio response.

    5. Outputs the results as JSON and constructs a data table in the SecOps platform.


    ### Additional Notes

    The action allows sorting and limiting the number of returned results. If "Custom"
    is selected for the time frame, a start time must be provided in ISO 8601 format.
  ai_short_description: >-
    Executes a search query in Humio to retrieve historical events based on specified
    parameters and time frames, returning the results as JSON and a data table.
