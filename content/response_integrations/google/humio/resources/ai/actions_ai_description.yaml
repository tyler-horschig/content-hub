    get_alert_information: false
    reasoning: >-
      The action makes a POST request to the Humio API to execute a custom query and
      retrieve historical logs/events. This directly matches the 'Search Events' expected
      outcome. It does not perform any enrichment on specific IOCs or assets, nor
      does it mutate any external or internal state.
    remove_ioc_from_allowlist: false
