    | Query Filter | String | No | Specify the query that should be executed during
    the search. Note: functions "head()" and "select()" shouldn't be provided. |

    | Time Frame | Dropdown | No | Specify a time frame for the results. If "Custom"
    is selected, you also need to provide "Start Time". |

    | Start Time | String | No | Specify the start time for the results. This parameter
    is mandatory, if "Custom" is selected for the "Time Frame" parameter. Format:
    ISO 8601 |

    | End Time | String | No | Specify the end time for the results. Format: ISO 8601.
    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

    | Fields To Return | String | No | Specify what fields to return. If nothing is
    provided, action will return all fields. |

