Get IP Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence, including risk scores and reputation classifications,
    to evaluate the potential threat level of the IP addresses.


    ### Flow Description

    1. Iterates through the provided target entities, filtering for IP Address entities.

    2. Makes a POST request to the CheckPoint Threat Reputation API (`/ip-rep/service/v2.0/query`)
    to fetch reputation data for each IP address.

    3. Evaluates the returned risk score against the configured threshold and checks
    if the classification is not in the whitelist.

    4. Marks the entity as suspicious if the risk is above the threshold and the classification
    is not whitelisted.

    5. Optionally creates an insight with the reputation details if configured.

    6. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    7. Attaches a CSV table with the reputation data to the action results.


    ### Additional Notes

    This action only supports ADDRESS entities.
