Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CheckPoint Threat Reputation service. This action verifies
    that the provided integration configuration parameters are valid and that the
    Google SecOps platform can successfully communicate with the CheckPoint API.


    ### Flow Description

    1. Extracts the integration configuration parameters, including the API Root,
    API Key, and SSL verification settings.

    2. Initializes the CheckPoint Threat Reputation manager.

    3. Makes an HTTP GET request to the CheckPoint Threat Reputation `/rep-auth/service/v1.0/request`
    endpoint to test authentication and connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
    It relies entirely on the integration-level configuration.
