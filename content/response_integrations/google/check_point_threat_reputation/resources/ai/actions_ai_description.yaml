Get File Hash Reputation:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence and reputation data for file hashes, evaluates
    the risk against a specified threshold, and updates the entity's suspicious status
    accordingly. It can also optionally generate an insight with the analysis results.


    ### Flow Description

    1. Iterates through the target File Hash entities provided in the case.

    2. Makes an API call (POST request) to the CheckPoint Threat Reputation service
    to fetch reputation data for each file hash.

    3. Evaluates the returned risk score against the provided threshold and checks
    if the classification is not in the whitelist.

    4. Marks the entity as suspicious if the risk exceeds the threshold and the classification
    is not whitelisted.

    5. Optionally creates an insight for the entity based on the action parameters.

    6. Enriches the entity's additional properties with the retrieved reputation data.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    - The action supports file hashes in MD5, SHA1, and SHA256 formats.
  ai_short_description: >-
    Enriches File Hash entities by retrieving threat intelligence and reputation data
    from the CheckPoint Threat Reputation service, updating their suspicious status
    based on a risk threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API request to fetch reputation data from CheckPoint Threat
      Reputation (fetches_data=true). It does not mutate external data. It updates
      internal entities using `siemplify.update_entities` (can_update_entities=true)
      and creates insights using `siemplify.add_entity_insight` (can_create_insight=true).
      It does not modify alert data or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
