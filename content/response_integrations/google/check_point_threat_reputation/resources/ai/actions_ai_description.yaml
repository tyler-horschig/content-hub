Get Host Reputation:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence and reputation scores to evaluate the risk
    associated with specific hosts.


    ### Flow Description

    1. Initializes connection to the CheckPoint Threat Reputation service.

    2. Iterates through the provided target entities, filtering for Hostname entities.

    3. Makes an API call to fetch reputation data for each valid entity.

    4. Compares the returned risk score against the configured threshold to determine
    if the entity should be marked as suspicious.

    5. Optionally creates an insight containing the classification, confidence, severity,
    and risk score.

    6. Enriches the entity's additional properties with the retrieved data and generates
    a CSV table.

    7. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    Entities with a risk score above the threshold and a classification not in the
    whitelist ('Benign', 'Unclassified') will be marked as suspicious.
