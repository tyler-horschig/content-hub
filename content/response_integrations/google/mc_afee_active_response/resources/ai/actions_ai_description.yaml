Search:
  ai_description: >-
    ### General Description

    Executes a search query across specified collectors in McAfee Active Response.
    It allows users to retrieve endpoint telemetry and state data by defining target
    collectors and optional filtering criteria.


    ### Flow Description

    1. Connects to the McAfee Active Response DXL broker using the provided certificates
    and broker URLs.

    2. Constructs a search query based on the provided `Collectors` and optional filtering
    parameters (`Filter Collector`, `Filter By`, `Filter Operator`, `Filter Value`).

    3. Executes the search query via the McAfee Active Response API.

    4. Parses the returned items and formats them into a flat dictionary structure.

    5. Attaches the raw JSON results and a constructed CSV data table to the action's
    output.


    ### Additional Notes

    Ensure that the provided certificates and keys have the necessary permissions
    to execute searches on the DXL fabric.
  ai_short_description: >-
    Executes a search query across specified collectors in McAfee Active Response
    and returns the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a search query against McAfee Active Response
      via the DXL client. It does not mutate external data, update internal entities,
      create insights, or modify case/alert data.
