Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee Active Response broker. This action verifies
    that the integration is configured correctly and can successfully authenticate
    and communicate with the DXL fabric.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Broker URLs, CA Bundle,
    Certificate, and Private Key).

    2. Initializes the McAfee Active Response manager.

    3. Attempts to connect to the DXL fabric using the provided credentials and broker
    URLs.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action does not perform any operations on entities or alerts. It is solely
    used for diagnostic purposes to ensure the integration is functional.
  ai_short_description: >-
    Tests connectivity to the McAfee Active Response broker by establishing a connection
    to the DXL fabric.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only establishes a connection to the McAfee Active Response broker
      to verify connectivity. It does not fetch contextual data, mutate external or
      internal data, update entities, create insights, modify alerts, or create case
      comments.
