Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the TruSTAR service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, API Secret,
    Verify SSL).

    2. Initializes the TruSTAR manager with the provided credentials.

    3. Makes an API GET request to the TruSTAR version endpoint (`api/1.3/version`)
    to verify connectivity and authentication.

    4. Returns a successful execution state if the connection is established, or a
    failure state if an error occurs.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to validate
    that the provided credentials and network configurations are correct.
