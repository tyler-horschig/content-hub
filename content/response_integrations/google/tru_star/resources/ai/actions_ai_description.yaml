Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities using threat intelligence information from TruSTAR. This action
    retrieves metadata and summary information for the target entities, evaluates
    their severity against a specified threshold, and updates their suspicious status
    accordingly.


    ### Flow Description

    1. Retrieves the list of available enclaves from TruSTAR and filters them based
    on the provided 'Enclave Filter' parameter.

    2. Extracts identifiers from all target entities.

    3. Fetches indicator metadata and summary information from TruSTAR for the extracted
    identifiers.

    4. Iterates through each entity and maps the retrieved TruSTAR data.

    5. Updates the entity's additional properties with the enrichment data and marks
    it as enriched.

    6. Generates and attaches an insight to the entity containing severity information.

    7. Adds a link to the TruSTAR report for the entity.

    8. Evaluates the maximum severity of the indicator against the 'Security Level
    Threshold'; if it meets or exceeds the threshold, the entity is marked as suspicious.

    9. Attaches a CSV table and JSON results to the action's output.

    10. Updates the entities in the SecOps platform.


    ### Additional Notes

    The action supports all entity types. If specific enclaves are provided but not
    found in TruSTAR, the action will fail with a validation error.
  ai_short_description: >-
    Enriches entities using threat intelligence from TruSTAR by retrieving indicator
    metadata and summaries, updating entity properties, attaching insights, and marking
    entities as suspicious based on a defined severity threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes HTTP requests to the TruSTAR API to fetch indicator metadata
      and summaries (fetches_data=true). It does not perform any state-changing operations
      on external systems (can_mutate_external_data=false). Internally, it updates
      the entities with enrichment data and suspicious status (can_update_entities=true)
      and creates insights for them (can_create_insight=true).
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
