Get Related IOCs:
  ai_description: >-
    ### General Description

    Retrieves information about Indicators of Compromise (IOCs) that are related to
    the provided entities using TruSTAR. This action queries the TruSTAR API to find
    associated threat intelligence indicators and returns them grouped by their indicator
    type.


    ### Flow Description

    1. Extracts action parameters, including the maximum number of IOCs to return
    and any specific enclave filters.

    2. If an enclave filter is provided, fetches the available enclaves from TruSTAR
    to map the provided names to their corresponding IDs.

    3. Iterates over the target entities and extracts their identifiers.

    4. Makes a GET request to the TruSTAR API (`api/1.3/indicators/related`) to fetch
    related IOCs for the extracted identifiers, applying the enclave filters and limit.

    5. Groups the returned IOCs by their indicator type.

    6. Attaches the grouped IOCs as JSON results and creates a statistics data table
    in the action results.


    ### Additional Notes

    This action supports all entity types. It does not update the entities or create
    insights; it only returns the related IOCs as action results and data tables.
