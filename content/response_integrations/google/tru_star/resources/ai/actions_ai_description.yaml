  ai_description: >-
    ### General Description

    Lists available enclaves in TruSTAR. This action retrieves a list of enclaves
    from the TruSTAR platform and allows filtering the results based on specific criteria.


    ### Flow Description

    1. Initializes the TruSTAR manager with the provided API credentials.

    2. Makes an API call to TruSTAR to retrieve the list of available enclaves.

    3. Applies the specified filter logic (Equal or Contains) and filter value to
    the retrieved enclaves.

    4. Limits the number of returned enclaves based on the `Max Enclaves To Return`
    parameter.

    5. Returns the filtered enclaves as a JSON result and a data table.


    ### Additional Notes

    If no filter value is provided, all available enclaves up to the maximum limit
    will be returned.
