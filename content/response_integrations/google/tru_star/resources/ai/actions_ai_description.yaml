Get Related Reports:
  ai_description: >-
    ### General Description

    Retrieves information about reports related to the provided entities from TruSTAR.
    This action queries the TruSTAR platform for correlated reports matching the target
    entities, fetches detailed information and tags for each report, and optionally
    generates a case insight with the findings.


    ### Flow Description

    1. Extracts action parameters and initializes the TruSTAR manager.

    2. Iterates over the target entities to collect their identifiers, specifically
    parsing domains for URL entities.

    3. Fetches available enclaves from TruSTAR and filters them based on the provided
    'Enclave Filter'.

    4. Queries TruSTAR for correlated reports matching the collected entity identifiers
    and enclave IDs.

    5. For each correlated report found, fetches the report details and associated
    tags.

    6. Aggregates the results into JSON, creates a data table, and optionally generates
    a case insight containing the report details.


    ### Additional Notes

    This action supports all entity types. If the 'Include Report Body In Insight'
    parameter is enabled, the resulting insight may be very large depending on the
    report content.
