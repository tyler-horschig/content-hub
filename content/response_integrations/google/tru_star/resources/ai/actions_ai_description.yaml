      ip_set: true
      mac_address: true
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: true
      process: true
      service: true
      source_domain: true
      threat_actor: true
      threat_campaign: true
      threat_signature: true
      url: true
      usb: true
      user: true
