Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in BMC Remedy ITSM. This action allows users to specify
    various incident details such as status, impact, urgency, description, and assignee,
    and generates a corresponding record in the external ITSM system.


    ### Flow Description

    1. Extracts the provided action parameters, including standard incident fields
    and any custom fields provided as a JSON payload.

    2. If a `Template Name` is provided, makes a GET request to the BMC Remedy ITSM
    API to retrieve the corresponding Template ID.

    3. Parses the `Customer` parameter into first and last names.

    4. Makes a POST request to the BMC Remedy ITSM API (`/api/arsys/v1/entry/HPD:IncidentInterface_Create`)
    to create the incident with the mapped parameters.

    5. Returns the created incident data as a JSON result to the SecOps platform.


    ### Additional Notes

    - The `Customer` parameter must be provided in the exact format "{Last Name} {First
    Name}".

    - The `Custom Fields` parameter accepts a JSON object and will overwrite other
    provided parameters if there is an overlap.
  ai_short_description: >-
    Creates a new incident in BMC Remedy ITSM using the provided parameters and optional
    custom fields.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
