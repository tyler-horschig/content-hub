Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific incidents from BMC Remedy ITSM.
    This action allows users to fetch incident data, optionally filter the returned
    fields, and retrieve associated work notes.


    ### Flow Description

    1. Extracts the provided `Incident IDs` from the action parameters.

    2. Makes a GET request to the BMC Remedy ITSM API (`/api/arsys/v1/entry/HPD:IncidentInterface`)
    to fetch incident details for the specified IDs, applying any field filters if
    provided.

    3. If `Fetch Work Notes` is enabled, iterates through the retrieved incidents
    and makes additional GET requests (`/api/arsys/v1/entry/HPD:WorkLog`) to fetch
    associated work notes up to the specified limit.

    4. Returns the incident details and work notes as JSON results and populates data
    tables within the SecOps platform.


    ### Additional Notes

    If invalid fields are provided in the `Fields To Return` parameter, the action
    will fail. If no fields are specified, all available fields will be returned.
