Wait For Record Fields Update:
  ai_description: >-
    ### General Description

    Waits for specific fields of a record in BMC Remedy ITSM to be updated to expected
    values. This is an asynchronous action that will continuously check the record
    until the conditions are met or the action times out.


    ### Flow Description

    1. Parses the provided JSON payload containing the fields and their expected values.

    2. Fetches the current details of the specified record from BMC Remedy ITSM via
    a GET request.

    3. Compares the current field values of the record with the expected values provided
    in the input.

    4. If all specified fields match the expected values, the action completes successfully
    and returns the record details.

    5. If any fields do not match, the action pauses and retries in the next iteration
    until the timeout is reached.


    ### Additional Notes

    If the timeout is reached and the `Fail If Timeout` parameter is enabled, the
    action will fail. Otherwise, it will complete without failing but indicate which
