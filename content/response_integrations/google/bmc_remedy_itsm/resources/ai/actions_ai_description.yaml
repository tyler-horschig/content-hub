    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a work note to a specific incident in BMC Remedy ITSM.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making a POST request to add a work note
      to an incident in BMC Remedy ITSM. It does not fetch contextual data for SecOps,
      nor does it mutate internal SecOps data, update entities, or create insights.
