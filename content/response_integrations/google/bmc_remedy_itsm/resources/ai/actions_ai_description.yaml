Add Work Note To Incident:
  ai_description: >-
    ### General Description

    Adds a work note to a specific incident in BMC Remedy ITSM. This action allows
    analysts to append comments or updates to an existing incident record directly
    from the SecOps platform.


    ### Flow Description

    1. Extracts the `Incident ID` and `Work Note Text` from the action parameters.

    2. Makes a GET request to the BMC Remedy ITSM API to verify that the specified
    incident exists.

    3. If the incident is found, makes a POST request to the BMC Remedy ITSM API (`/api/arsys/v1/entry/HPD:WorkLog/`)
    to append the work note to the incident.

    4. Returns a success message upon completion, or an error if the incident is not
    found or the API request fails.


    ### Additional Notes

    Ensure that the provided Incident ID exactly matches the record in BMC Remedy
    ITSM.
  ai_short_description: >-
    Adds a work note to a specific incident in BMC Remedy ITSM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
