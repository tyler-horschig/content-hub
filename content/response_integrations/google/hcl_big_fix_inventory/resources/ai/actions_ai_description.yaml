Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the HCL BigFix Inventory server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Token, Verify
    SSL).

    2. Initializes the HCL BigFix Inventory manager.

    3. Makes an HTTP GET request to the `/api/sam/about` endpoint to verify API connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any action-specific parameters or entities to run.
    It is primarily used to validate the integration's setup.
  ai_short_description: >-
    Tests connectivity to the HCL BigFix Inventory server to ensure the integration
    is configured correctly.
