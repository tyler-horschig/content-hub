Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information from HCL BigFix Inventory.
    This action retrieves device details such as OS, DNS name, and health status to
    provide contextual metadata for the targeted entities.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Filters the target entities to include only Hostname and IP Address types.

    3. Initializes the HCL BigFix Inventory manager and tests connectivity.

    4. Iterates over the suitable entities and makes a GET request to the HCL BigFix
    Inventory API to fetch device information based on the entity's identifier (IP
    or Hostname).

    5. If device data is found, enriches the entity with the retrieved information
    and marks it as enriched.

    6. Optionally creates an insight containing the device details if the 'Create
    Insight' parameter is enabled.

    7. Updates the entities in the SecOps platform and provides a JSON result with
    the retrieved data.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving contextual device metadata
    from HCL BigFix Inventory.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the HCL BigFix Inventory API to fetch device
      data. It does not mutate external data but updates internal entities with the
      retrieved data and creates insights.
