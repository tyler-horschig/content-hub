Get Hash Associated IPs:
  ai_description: >-
    ### General Description

    Retrieves IP addresses associated with a given file hash from Cisco Threat Grid.
    This action analyzes network streams from sample submissions related to the hash
    to identify external destination IPs.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. For each valid file hash, makes an API call to Cisco Threat Grid to fetch successful
    submissions associated with the hash.

    4. Makes subsequent API calls to retrieve network streams for the identified sample
    IDs.

    5. Extracts destination IP addresses from the network streams, filtering out internal
    and specific local IPs.

    6. Attaches the discovered IPs to the action's results as an entity table and
    includes them in the JSON output.


    ### Additional Notes

    This action only retrieves data and does not update the entity's properties or
    create insights within the platform.
