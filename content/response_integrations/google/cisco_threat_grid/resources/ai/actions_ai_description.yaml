Get Submissions:
  ai_description: >-
    ### General Description

    Retrieves submission details and analysis reports for entities from Cisco Threat
    Grid. This action fetches threat scores, analysis artifacts, and submission summaries
    to enrich the entities within the platform.


    ### Flow Description

    1. Iterates through supported entities (Address, FileHash, Hostname, Process,
    URL, FileName).

    2. Queries the Cisco Threat Grid API (`/api/v2/search/submissions`) to check the
    submission state for each entity.

    3. If submissions are still processing, the action waits asynchronously.

    4. Once processed, fetches the submissions and creates a summary table attached
    to the entity.

    5. Downloads the most recent analysis report (HTML), network PCAP, and screenshot
    via API, attaching them to the entity.

    6. Retrieves the threat report via API and attaches it as a table.

    7. Calculates the maximum threat score across submissions and updates the entity's
    additional properties.

    8. Marks the entity as enriched and, if the max score exceeds the configured threshold,
    marks it as suspicious.


    ### Additional Notes

    This is an asynchronous action that will continue to poll Cisco Threat Grid until
    the submissions are fully processed.
  ai_short_description: >-
    Retrieves submission details, analysis reports, and threat scores for entities
    from Cisco Threat Grid, enriching the entities and attaching relevant artifacts.
