Upload Sample:
  ai_description: >-
    ### General Description

    Uploads a file sample to Cisco Threat Grid for malware analysis and sandbox execution.
    The file can be provided via a local path or retrieved from a remote Linux server
    using SSH/SFTP. The action runs asynchronously, waiting for the analysis to complete
    before returning the threat score, behavior details, and links to the analysis
    artifacts.


    ### Flow Description

    1. Retrieves the file content either from a local path or from a remote Linux
    server via SFTP if the Linux credentials are provided.

    2. Submits the file to Cisco Threat Grid via a POST request to the `/api/v2/samples`
    endpoint.

    3. The action suspends and runs asynchronously, periodically checking the analysis
    status via a GET request to `/api/v2/samples/{sample_id}/state`.

    4. Once the analysis is completed, it retrieves the threat score and analysis
    details via a GET request to `/api/v2/samples/{sample_id}/threat`.

    5. Attaches links to the HTML report, PCAP file, and screenshot, and outputs the
    threat table and JSON results to the case.


    ### Additional Notes

    This action runs asynchronously. Please adjust the script timeout value in the
    IDE for the action as needed to accommodate long-running sandbox analyses.
  ai_short_description: >-
    Uploads a file sample to Cisco Threat Grid for sandbox analysis and retrieves
    the resulting threat score, report links, and behavior details.
