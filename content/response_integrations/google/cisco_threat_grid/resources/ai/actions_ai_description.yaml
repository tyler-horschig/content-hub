Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Threat Grid API. This action is used to verify
    that the integration is configured correctly and can successfully communicate
    with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, Use
    SSL).

    2. Initializes the Cisco Threat Grid manager.

    3. Makes an HTTP GET request to the `/api/v2/samples` endpoint to verify authentication
    and network connectivity.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action does not process any entities or alerts. It is strictly used for diagnostic
    and configuration verification purposes.
