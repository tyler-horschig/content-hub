Get Hash Associated Domains:
  ai_description: >-
    ### General Description

    Retrieves domains associated with a given file hash entity using Cisco Threat
    Grid. This action queries the Cisco Threat Grid API to find network streams related
    to the file hash and extracts the associated domains to provide additional threat
    context.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. For each valid file hash, makes an API call to Cisco Threat Grid to fetch submissions
    and their associated network streams.

    4. Extracts the associated domains from the network streams.

    5. Attaches the found domains to the entity as an entity table and adds them to
    the action's JSON results.


    ### Additional Notes

    - This action only processes File Hash entities. Other entity types will be ignored.

    - The action does not update the entity's properties or create insights; it only
    provides the results as an entity table and JSON output.
