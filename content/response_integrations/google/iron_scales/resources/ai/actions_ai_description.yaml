Classify Incident:
  ai_description: >-
    ### General Description

    Changes the classification of specified incidents within IronScales. This action
    allows analysts to update how an incident is categorized (e.g., Attack, False
    Positive, Spam) directly from the SOAR platform.


    ### Flow Description

    1. Extracts the provided incident IDs, the desired new classification, and the
    classifying user's email address.

    2. Iterates through the list of provided incident IDs.

    3. Makes a GET request to the IronScales API to retrieve the current details of
    each incident, specifically to obtain its existing classification.

    4. Makes a POST request to the IronScales API to update the incident with the
    new classification, providing the old classification and the user's email as required
    by the endpoint.

    5. Compiles and returns a summary message detailing which incidents were successfully
    classified and which failed.


    ### Additional Notes

    - The email address provided in the `Classifying User Email` parameter must be
    an active and recognized user within the IronScales platform.

    - The action handles multiple incident IDs provided as a comma-separated string.
  ai_short_description: >-
    Changes the classification of specified incidents within IronScales.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the classification status of specified incidents within the external
      IronScales platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the IronScales API to change the classification
      of an incident, which mutates external data. While it does perform a GET request
      to fetch the old classification first, this is strictly a prerequisite for the
      mutation payload and does not fetch contextual data to enrich the SOAR platform.
      It does not mutate internal SecOps data, update entities, create insights, or
      add case comments.
  entity_usage:
