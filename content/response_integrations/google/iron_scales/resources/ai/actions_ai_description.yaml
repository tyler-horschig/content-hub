Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves full incident details from IronScales for a specified list of incident
    IDs. This action connects to the IronScales API to fetch comprehensive information
    about specific incidents and returns the data as JSON results for further use
    in the playbook.


    ### Flow Description

    1. Extracts the comma-separated list of incident IDs provided in the action parameters.

    2. Iterates through each incident ID in the list.

    3. Makes an HTTP GET request to the IronScales API (`appapi/incident/{company_id}/details/{incident_id}`)
    to retrieve the details for each incident.

    4. Aggregates the successfully retrieved incident details and attaches them to
    the action's JSON results.

    5. Reports any incident IDs that could not be found or fetched in the final output
    message.


    ### Additional Notes

    Ensure that the provided incident IDs are valid and exist within the configured
    IronScales company environment.
