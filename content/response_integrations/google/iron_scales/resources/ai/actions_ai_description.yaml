Get Mitigation Impersonation Details:
  ai_description: >-
    ### General Description

    Retrieves the latest company impersonation incidents from IronScales. This action
    fetches mitigation details for impersonation attempts within a specified time
    period and returns the data as a JSON result.


    ### Flow Description

    1. Extracts the `Period` parameter to determine the timeframe for the query.

    2. Makes an HTTP GET request to the IronScales API (`appapi/mitigation/{company_id}/impersonation/details/`)
    to fetch the impersonation mitigation details.

    3. Parses the returned data into impersonation objects.

    4. Outputs the retrieved details as a JSON array attached to the action's result.


    ### Additional Notes

    Results are limited to the latest 1000 incidents. If the number of incidents in
    the period exceeds this limit, a message will indicate this. The IDs returned
    by this action represent impersonation attempts, not standard incidents or reports,
    so searching these IDs in other endpoints will not return expected incidents.
