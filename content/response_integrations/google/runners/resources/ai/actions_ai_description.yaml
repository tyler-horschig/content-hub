Run Command As User:
  ai_description: >-
    ### General Description

    Executes a specified command as a designated user on the host system. This action
    allows for running arbitrary system commands or scripts using specific user credentials
    and captures the output.


    ### Flow Description

    1. Retrieves the command, username, password, domain, and daemon flag from the
    action parameters.

    2. Initializes the appropriate `RunnersManager` based on the operating system
    (Windows or Linux).

    3. Executes the command on the host system using the provided user credentials.

    4. Returns the standard output (STDOUT) if the execution is successful, or the
    standard error (STDERR) if the command fails.


    ### Additional Notes

    On Windows systems, this action requires the user running the Siemplify agent
    to have the 'Replace a process level token' permission in the Local Security Policy.
  ai_short_description: >-
    Executes an arbitrary command as a specific user on the host system and returns
    the output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes arbitrary commands on the host system, which can potentially modify
      the system's state or data.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes an arbitrary command on the host system. It does not fetch
      contextual data from an API, but it can mutate external data since the executed
      command can modify the host's state. It does not update internal entities, create
      insights, modify alerts, or create case comments.
  entity_usage:
