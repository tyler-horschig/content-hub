Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the integration. This action serves as a basic health check
    to ensure the integration environment is functioning correctly.


    ### Flow Description

    1. Initializes the Siemplify action.

    2. Immediately completes the execution and returns a 'Success' message with a
    'true' result.


    ### Additional Notes

    This action does not interact with any external APIs or perform any complex logic.
    It is primarily used for testing and validation purposes during integration setup.
  ai_short_description: >-
    Tests connectivity to the integration by returning a basic success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only calls `siemplify.end()` to return a success message. It does
      not fetch data, mutate external or internal data, update entities, create insights,
      modify alerts, or create case comments.
