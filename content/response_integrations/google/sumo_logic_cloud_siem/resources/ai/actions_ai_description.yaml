Add Comment To Insight:
  ai_description: >-
    ### General Description

    Adds a comment to a specific insight in Sumo Logic Cloud SIEM. This action allows
    analysts to append notes, findings, or automated log entries directly to the activity
    timeline of a Sumo Logic insight.


    ### Flow Description

    1. Extracts the `Insight ID` and `Comment` from the action parameters.

    2. Initializes the Sumo Logic Cloud SIEM API manager with the provided credentials.

    3. Makes an HTTP POST request to the Sumo Logic Cloud SIEM API (`/insights/{insight_id}/comments`)
    to append the provided comment to the specified insight.

    4. Returns the JSON response from the API and outputs a success message.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It directly targets a
    Sumo Logic Cloud SIEM insight using its unique identifier.
  ai_short_description: >-
    Adds a comment to a specific insight in Sumo Logic Cloud SIEM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific insight in Sumo Logic Cloud SIEM.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Sumo Logic Cloud SIEM API to add a
      comment to an insight, which mutates external data. It does not fetch data for
      enrichment, nor does it mutate internal SecOps data, update entities, or create
      internal insights/case comments.
