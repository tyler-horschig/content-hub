Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and User entities using information from Sumo Logic
    Cloud SIEM. This action retrieves contextual metadata such as activity score,
    criticality, tags, and suppression status to provide analysts with better visibility
    into the entities involved in an alert.


    ### Flow Description

    1. Extracts the action parameters and initializes the Sumo Logic Cloud SIEM manager.

    2. Iterates over the target entities, filtering for supported types (Hostname,
    IP Address, User).

    3. For each suitable entity, makes a GET request to the Sumo Logic Cloud SIEM
    `/entities` API endpoint to fetch entity information.

    4. If data is found, enriches the entity's additional properties, marks it as
    enriched, and attaches a data table to the case.

    5. If the `Create Insight` parameter is enabled, generates an insight with the
    retrieved information.

    6. Updates the entities in the SecOps platform and returns the results.


    ### Additional Notes

    Supported entities are Hostname, IP Address, and User. Ensure that the integration
    is properly configured with the necessary API credentials to access the Sumo Logic
    Cloud SIEM instance.
  ai_short_description: >-
    Enriches Hostname, IP Address, and User entities by retrieving contextual metadata
    and threat information from Sumo Logic Cloud SIEM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Sumo Logic Cloud SIEM API via a GET request
      (fetches_data=true). It does not mutate external data or internal system data
      outside of entities. It updates internal entities via `siemplify.update_entities`
      (can_update_entities=true) and creates insights via `siemplify.add_entity_insight`
      (can_create_insight=true). It does not modify alert data or create case comments.
