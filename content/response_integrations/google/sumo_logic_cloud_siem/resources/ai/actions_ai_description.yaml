    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action updates the status and assignee of an 'Insight' (which represents
      an alert/case in Sumo Logic Cloud SIEM). This aligns with the 'Update Alert'
      expected outcome, as it changes the status or assignee of the alert within the
      3rd party product.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: true
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Insight ID | String | Yes | Specify the ID of the insight needs to be updated.
    |

    | Status | Dropdown | Yes | Specify what status to set for the insight. |

    | Assignee Type | Dropdown | Yes | Specify the assignee type for the "Assignee"
    parameter. |

    | Assignee | String | No | Specify the assignee identifier. Note: Either status
    or assignee needs to be provided for the action to execute successfully. |
