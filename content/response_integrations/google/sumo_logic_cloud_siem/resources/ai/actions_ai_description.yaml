Search Entity Signals:
  ai_description: >-
    ### General Description

    Searches for signals related to specific entities in Sumo Logic Cloud SIEM. This
    action retrieves historical signal data associated with IP Addresses, Hostnames,
    or Usernames within a specified timeframe.


    ### Flow Description

    1. Extracts configuration and action parameters, including severity thresholds
    and timeframes.

    2. Calculates the start and end timestamps based on the provided time frame and
    alert times.

    3. Iterates over the target entities in the case.

    4. Filters entities to process only supported types (IP Address, Hostname, Username).

    5. Makes a GET request to the Sumo Logic Cloud SIEM API (`/signals`) to fetch
    signals for each valid entity identifier.

    6. Aggregates the retrieved signals and attaches them to the action's JSON result.


    ### Additional Notes

    Supported entities are IP Address, Hostname, and Username. If 'Custom' is selected
    for the Time Frame, the 'Start Time' parameter becomes mandatory.
