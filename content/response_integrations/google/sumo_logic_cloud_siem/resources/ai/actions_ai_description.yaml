    ### Flow Description

    1. Extracts the `Insight ID`, `Status`, `Assignee Type`, and `Assignee` parameters.

    2. Validates that at least one update parameter (either a new status or a new
    assignee) is provided.

    3. If an assignee is provided, makes a PUT request to the Sumo Logic Cloud SIEM
    API to update the insight's assignee.

    4. If a valid status is provided, makes a PUT request to the Sumo Logic Cloud
    SIEM API to update the insight's status.

    5. Makes a GET request to retrieve the updated insight details and attaches them
    to the action's JSON result.


