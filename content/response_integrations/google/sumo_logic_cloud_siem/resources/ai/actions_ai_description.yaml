Add Tags To Insight:
  ai_description: >-
    ### General Description

    Adds specified tags to an existing insight in Sumo Logic Cloud SIEM. This action
    allows analysts to categorize or label insights directly on the external Sumo
    Logic platform.


    ### Flow Description

    1. Extracts the `Insight ID` and the comma-separated list of `Tags` from the action
    parameters.

    2. Initializes the Sumo Logic Cloud SIEM API client using the provided integration
    configuration.

    3. Iterates through the provided list of tags.

    4. Makes a POST request to the Sumo Logic Cloud SIEM API (`/insights/{insight_id}/tags`)
    for each tag to attach it to the specified insight.

    5. Returns the JSON response from the API and completes the action.


