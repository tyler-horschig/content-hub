Add Tag To Device:
  ai_description: >-
    ### General Description

    Adds a specified tag to device endpoints in McAfee Mvision ePO V2 based on Hostname
    or IP Address entities.


    ### Flow Description

    1. Connects to the McAfee Mvision ePO V2 API.

    2. Validates the existence of the specified tag via a GET request.

    3. Iterates over Hostname and IP Address entities.

    4. Searches for the corresponding device in McAfee Mvision ePO V2 using the entity
    identifier.

    5. Makes a POST request to the API to assign the tag to the matched device.

    6. Returns a summary of successful and failed tag additions.


    ### Additional Notes

    Fails if the tag does not exist in McAfee Mvision ePO V2. Ensure the tag is created
    in the external system before running this action.
  ai_short_description: >-
    Adds a specified tag to device endpoints in McAfee Mvision ePO V2 based on Hostname
    or IP Address entities.
