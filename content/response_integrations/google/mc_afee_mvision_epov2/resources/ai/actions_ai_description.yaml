  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using McAfee Mvision ePO V2. It retrieves
    device system information such as OS details, agent version, and tags to provide
    context about the asset.


    ### Flow Description

    1. Connects to the McAfee Mvision ePO V2 API.

    2. Iterates through the target Hostname and IP Address entities.

    3. Makes a GET request to the `/epo/v2/devices` endpoint to search for the device
    matching the entity identifier.

    4. If a device is found, extracts the system information and updates the entity's
    additional properties.

    5. Creates an insight for the entity with the device details.

    6. Updates the entities in the platform and provides a JSON result and a data
    table with the findings.


    ### Additional Notes

