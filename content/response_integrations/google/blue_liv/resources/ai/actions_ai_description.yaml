Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the BlueLiv instance using the provided integration configuration
    parameters. This action ensures that the API credentials and network settings
    are correctly configured to communicate with the BlueLiv platform.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, User Name, Password,
    Organization ID, Verify SSL).

    2. Initializes the BlueLivManager with the extracted credentials.

    3. Makes an HTTP GET request to the BlueLiv API (`/api/v2/organization/{id}/module/0/resource`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if the request fails.


    ### Additional Notes

    This action is primarily used for testing and validating the integration setup.
    It does not require any action-specific parameters and does not interact with
    case entities.
