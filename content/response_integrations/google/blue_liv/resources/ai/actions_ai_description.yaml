List Entity Threats:
  ai_description: >-
    ### General Description

    Lists threats related to entities in Blueliv. This action retrieves threat intelligence
    data associated with the provided entities and attaches the results as entity
    tables.


    ### Flow Description

    1. Initializes the Blueliv manager with the provided API credentials.

    2. Iterates through all target entities in the case.

    3. For each entity, makes a GET request to the Blueliv API to fetch related threat
    data, applying optional label and module filters.

    4. Limits the number of returned threats based on the `Max Threats To Return`
    parameter.

    5. Attaches the threat details as an entity table and updates the entity in the
    SecOps platform.

    6. Returns a JSON object containing the threat details for all successfully processed
    entities.


    ### Additional Notes

    Supported entities: All.
