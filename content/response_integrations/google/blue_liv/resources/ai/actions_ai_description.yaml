Remove Labels From Threats:
  ai_description: >-
    ### General Description

    This action removes specified labels from specified threat IDs in BlueLiv.


    ### Flow Description

    1. Extracts the action parameters: Module Type, Module ID, Resource ID (Threat
    IDs), and Label Names.

    2. Initializes the BlueLivManager to interact with the BlueLiv API.

    3. Makes an API call to retrieve all available labels from BlueLiv.

    4. Maps the provided label names to their corresponding label IDs.

    5. For each provided threat ID, makes an API call to check if the threat exists
    and retrieves its current labels.

    6. For each existing threat, checks if the specified labels are currently attached.

    7. If a label is attached, makes an API call to remove the label from the threat.
    (Note: The underlying script logic currently invokes the add label API method,
    but the intended operation is removal).

    8. Returns a summary message indicating successful removals and labels that were
    already not part of the threats.


    ### Additional Notes

    None.
