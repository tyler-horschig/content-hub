Add Labels to Threats:
  ai_description: >-
    ### General Description

    Adds specified labels to specified threat IDs in BlueLiv. This action allows users
    to tag and categorize threats within the BlueLiv platform by applying one or more
    labels to a list of resource IDs.


    ### Flow Description

    1. Extracts the module type, module ID, resource IDs (threat IDs), and label names
    from the action parameters.

    2. Fetches the available labels from BlueLiv via a GET request to match the provided
    label names with their corresponding internal label IDs.

    3. Verifies the existence of the provided threat IDs in BlueLiv via a GET request.

    4. Retrieves the current labels for each valid threat via a GET request to avoid
    duplicate assignments.

    5. Adds the missing labels to the threats in BlueLiv using a PUT request.

    6. Returns a summary message detailing successful additions and labels that were
    already present.


    ### Additional Notes

    The action requires the exact spelling (case-sensitive) for label names. If a
    label or threat ID does not exist in BlueLiv, the action will report the failure
    in the output message.
  ai_short_description: >-
    Adds specified labels to specified threat IDs in BlueLiv.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specified labels to specified threat IDs in the BlueLiv platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing labels and threat details from BlueLiv (fetches_data=true).
      It then makes a PUT request to add labels to threats in BlueLiv, mutating external
      data (can_mutate_external_data=true). It does not update internal entities,
      create insights, or modify alert data within Google SecOps.
