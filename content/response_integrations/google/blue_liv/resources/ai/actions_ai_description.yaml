Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities using information from the Threat Context module of Blueliv.
    Supported entities include IP, Hash, URL, Threat Actor, Threat Campaign, Threat
    Signature, and CVE. Note: only MD5, SHA1, SHA256, and SHA512 hashes are supported.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the `BlueLivManager` to interact with the Blueliv API.

    3. Retrieves the Blueliv context information to verify the Threat Context module
    is supported.

    4. Iterates over the target entities that match the supported entity types.

    5. For each entity, makes a GET request to the respective Blueliv API endpoint
    (e.g., `/api/v1/ip/{ip}`, `/api/v1/malware/{hash}`) to fetch enrichment details.

    6. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    7. If the entity's risk score is greater than or equal to the `Lowest Score To
    Mark as Suspicious`, marks the entity as suspicious.

    8. Adds entity links and tables to the action results.

    9. If `Create Insight` is enabled, creates a case insight containing the enriched
    information.

    10. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    - The maximum value for the `Lowest Score To Mark as Suspicious` parameter is
    10.
  ai_short_description: >-
    Enriches supported entities (IP, Hash, URL, Threat Actor, Threat Campaign, Threat
    Signature, CVE) using threat intelligence from the Blueliv Threat Context module.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data, sets suspicious status, and creates case
      insights.
    reasoning: >-
      The action fetches data from the Blueliv API using GET requests to various enrichment
      endpoints. It does not mutate external data. It mutates internal data by updating
      entities with enrichment data, setting their suspicious status, and optionally
      creating case insights. It calls `siemplify.update_entities` and `siemplify.create_case_insight`.
