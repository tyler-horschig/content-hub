Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Carbon Black Defense server to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Extracts the API Root and API Key from the integration configuration.

    2. Makes a GET request to the Carbon Black Defense API (`/integrationServices/v3/device`)
    to validate the provided credentials.

    3. Returns a success message and a result value of `true` if the connection is
    established successfully.

    4. Returns an error message and a result value of `false` if the connection fails.


