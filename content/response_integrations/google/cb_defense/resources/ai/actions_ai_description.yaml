Change Policy:
  ai_description: >-
    ### General Description

    Changes the policy assigned to a device in Carbon Black Defense based on IP Address
    or Hostname entities. This action allows analysts to dynamically reassign endpoints
    to different security policies directly from the SOAR platform.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only IP Addresses and Hostnames.

    3. Queries Carbon Black Defense to fetch device data associated with the entity's
    identifier.

    4. Extracts the internal device ID from the retrieved device data.

    5. Updates the device's policy to the specified `Policy Name` in Carbon Black
    Defense.


    ### Additional Notes

    If no device is found for a given entity, the action will skip it and continue
    processing the remaining entities.
  ai_short_description: >-
    Changes the policy assigned to a device in Carbon Black Defense based on IP Address
    or Hostname entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the policy assigned to a specific device in Carbon Black Defense.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from Carbon Black Defense to retrieve the device
      ID (fetches_data=true). It then mutates external data by updating the device's
      policy via the cbapi (can_mutate_external_data=true). It does not mutate internal
      SOAR data, update entities, create insights, modify alerts, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
