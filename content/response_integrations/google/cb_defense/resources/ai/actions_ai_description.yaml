    ### General Description

    Retrieves events associated with specific IP address or hostname entities from
    Carbon Black Defense. This action queries the Carbon Black Defense API to find
    historical events and telemetry data related to the target entities within a specified
    timeframe.


    ### Flow Description

    1. Connects to the Carbon Black Defense API using the provided integration credentials.

    2. Iterates through the target entities, filtering for supported types (IP Addresses
    and Hostnames).

    3. Makes a GET request to the Carbon Black Defense API (`/integrationServices/v3/event`)
    to fetch events for each entity based on the specified `Timeframe`.

    4. If events are found, attaches the event data as a CSV table to the respective
    entity in the SecOps platform.

    5. Returns the raw event data as a JSON result and provides a summary message
    of the execution.


    ### Additional Notes

