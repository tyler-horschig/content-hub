Get Device Info:
  ai_description: >-
    ### General Description

    Retrieves device information from Carbon Black Defense for specified IP Address
    and Hostname entities. The action queries the Carbon Black Defense API to fetch
    contextual metadata about the device and enriches the corresponding entities within
    the SecOps platform.


    ### Flow Description

    1. Establishes a connection to the Carbon Black Defense API using the provided
    API Root and API Key.

    2. Iterates through the target entities, filtering for `ADDRESS` and `HOSTNAME`
    entity types.

    3. For each valid entity, makes a GET request to the Carbon Black Defense API
    (`/integrationServices/v3/device`) to fetch device data based on the IP address
    or hostname.

    4. If device data is found, it adds the raw data to the JSON results and creates
    an entity table with the device details.

    5. Enriches the entity's additional properties with the retrieved device data
    and marks the entity as enriched.

    6. Updates the successfully enriched entities in the SecOps platform.


    ### Additional Notes

    - Entities that are not of type `ADDRESS` or `HOSTNAME` are skipped.

    - If no device data is found for an entity, it is logged and skipped without causing
    the action to fail.
