    2. Connects to the Carbon Black Defense API.

    3. Fetches the list of available policies to resolve the provided policy name
    to its corresponding policy ID.

    4. Executes a DELETE request to the Carbon Black Defense API (`/integrationServices/v3/policy/{policy_id}`)
