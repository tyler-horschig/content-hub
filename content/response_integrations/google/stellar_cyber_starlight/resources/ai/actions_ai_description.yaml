Update Security Event:
  ai_description: >-
    ### General Description

    Updates a specific security event in Stellar Cyber Starlight. This action allows
    users to change the status of an event and append comments to it directly from
    the SOAR platform.


    ### Flow Description

    1. Extracts the provided Index, ID, Comment, and Status parameters.

    2. Validates that at least a new status (other than 'Select One') or a comment
    is provided.

    3. Makes a POST request to the Stellar Cyber Starlight API to update the specified
    security event with the new status and/or comment.

    4. Returns a success message upon successful update.


    ### Additional Notes

    None.
