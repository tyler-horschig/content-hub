Simple Search:
  ai_description: >-
    ### General Description

    Performs a simple search query within a specified index in Stellar Cyber Starlight.
    It retrieves matching records based on the provided query string and returns the
    results as JSON.


    ### Flow Description

    1. Initializes the connection to the Stellar Cyber Starlight API using the provided
    credentials.

    2. Constructs a search payload using the specified index, query string, limit,
    and sorting parameters.

    3. Executes a GET request to the Stellar Cyber Starlight search endpoint (`data/{index}/_search`).

    4. Parses the response and extracts the matching hits.

    5. Returns the search results as a JSON object in the action's output.


    ### Additional Notes

    The query uses the `query_string` format supported by Stellar Cyber Starlight.
