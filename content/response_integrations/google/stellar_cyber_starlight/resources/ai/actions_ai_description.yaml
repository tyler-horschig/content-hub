Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stellar Cyber Starlight server using the provided integration
    configuration parameters. This action ensures that the credentials and network
    settings are correctly configured to communicate with the Stellar Cyber Starlight
    API.


    ### Flow Description

    1. Extracts integration-level configuration parameters including API Root, Username,
    API Key or API Token, and SSL verification settings.

    2. Initializes the Stellar Cyber Starlight manager with the provided credentials.

    3. Makes a test GET request to the `data/*/_search` endpoint with a simple payload
    to verify API access and authentication.

    4. Returns a success message if the connection is established, or a failure message
    with error details if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
