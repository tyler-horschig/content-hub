Advanced Search:
  ai_description: >-
    ### General Description

    Performs an advanced search in Stellar Cyber Starlight using a provided DSL query
    to retrieve matching events or telemetry data.


    ### Flow Description

    1. Extracts the target index and DSL query from the action parameters.

    2. Initializes the Stellar Cyber Starlight API client.

    3. Executes a GET request to the `data/{index}/_search` endpoint with the DSL
    query payload.

    4. Parses the response and returns the search hits as a JSON result.


    ### Additional Notes

    The DSL query must be a valid JSON object.
  ai_short_description: >-
    Performs an advanced search in Stellar Cyber Starlight using a specified index
    and DSL query, returning the matching events as a JSON result.
