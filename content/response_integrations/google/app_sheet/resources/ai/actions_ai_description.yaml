List Tables:
  ai_description: >-
    ### General Description

    Lists available tables in an app in AppSheet.


    ### Flow Description

    1. Initializes the AppSheet manager with the provided API credentials.

    2. Makes a GET request to the AppSheet API (`/api/v2/apps/{app_id}/tables/`) to
    retrieve the list of available tables for the specified App ID.

    3. Filters the retrieved tables based on the provided `Filter Logic` (Equal or
    Contains) and `Filter Value`.

    4. Limits the results according to the `Max Tables To Return` parameter.

    5. Returns the results as a JSON object and populates a data table in the SecOps
    platform.


    ### Additional Notes

    If no filter value is provided, the filter will not be applied and all tables
    up to the specified limit will be returned.
