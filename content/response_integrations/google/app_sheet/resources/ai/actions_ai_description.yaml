Delete Record:
  ai_description: >-
    ### General Description

    Deletes a specific record from a table in AppSheet. This action initiates a state
    change on the external AppSheet application by removing the specified record.


    ### Flow Description

    1. Extracts the `Table Name` and `Record JSON Object` parameters.

    2. Initializes the AppSheet API client with the provided credentials.

    3. Makes a POST request to the AppSheet API (`/api/v2/apps/{app_id}/tables/{table_name}/Action`)
    with the action set to `Delete` and the provided record JSON.

    4. If successful, adds the deleted record details to the action's JSON results.


    ### Additional Notes

    The `Record JSON Object` parameter requires a valid JSON string representing the
    record to be deleted. Typically, only the unique identifier (e.g., "ID") of the
    record is required within this JSON object.
