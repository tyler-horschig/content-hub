Add Record:
  ai_description: >-
    ### General Description

    Adds a new record to a specified table in AppSheet. This action allows users to
    insert data into their AppSheet applications by providing the target table name
    and the record data in JSON format.


    ### Flow Description

    1. Extracts the target `Table Name` and the `Record JSON Object` from the action
    parameters.

    2. Initiates a POST request to the AppSheet API (`/api/v2/apps/{app_id}/tables/{table_name}/Action`)
    with the action type set to 'Add'.

    3. Parses the response from AppSheet and attaches the newly added record details
    to the action's JSON results.

    4. Completes the execution and outputs a success or failure message based on the
    API response.


    ### Additional Notes

    Ensure that the provided `Record JSON Object` is a valid JSON string and matches
    the schema expected by the target AppSheet table.
  ai_short_description: >-
    Adds a new record to a specified table in AppSheet using a provided JSON object.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new record to a specified table in AppSheet.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the AppSheet API to add a new record, which
      mutates external data. It does not fetch contextual data, mutate internal SOAR
      data, update entities, or create insights.
