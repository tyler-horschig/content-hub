Upload File To Bucket:
  ai_description: >-
    ### General Description

    Uploads a specified local file to an AWS S3 bucket. This action allows users to
    transfer files from the SOAR environment to an external AWS S3 storage bucket,
    which can be useful for archiving evidence, sharing files, or external storage.


    ### Flow Description

    1. Extracts the local `File Path` and the target `Bucket Upload Path` from the
    action parameters.

    2. Parses the target bucket path to identify the destination bucket name and filename.

    3. Authenticates and connects to the AWS S3 service using the provided integration
    credentials.

    4. Validates the existence and accessibility of the local file.

    5. Executes an API call (`s3_client.upload_file`) to AWS S3 to upload the file
    to the specified bucket.

    6. Returns the upload status and a JSON result containing the local and remote
    file paths.


    ### Additional Notes

    Ensure the provided AWS credentials have the necessary `s3:PutObject` permissions
    for the target bucket. The local file must exist on the SOAR environment and be
    accessible by the integration.
  ai_short_description: >-
    Uploads a specified local file to a target AWS S3 bucket.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
