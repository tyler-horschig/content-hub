Download File From Bucket:
  ai_description: >-
    ### General Description

    Downloads a specific file from an AWS S3 bucket to a local path on the host executing
    the action.


    ### Flow Description

    1. Extracts the target S3 bucket file path and the local download path from the
    action parameters.

    2. Establishes a connection to the AWS S3 service using the provided integration
    credentials.

    3. Validates the local download path to ensure it does not already exist and is
    accessible.

    4. Executes an API call (`s3_client.download_file`) to download the file from
    the S3 bucket to the specified local directory.

    5. Returns the bucket file path and download path as a JSON result.


    ### Additional Notes

    The local download path must be an absolute path and the target file must not
    already exist at that location, otherwise the action will fail.
  ai_short_description: >-
    Downloads a file from an AWS S3 bucket to a specified local path on the executing
    host.
