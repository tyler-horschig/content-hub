    Retrieves the bucket policy configuration for a specified AWS S3 bucket. This
    action connects to the AWS S3 service to fetch the access policy attached to a
    given bucket, returning the policy statements and rules as structured JSON data.


    ### Flow Description

    1. Initializes the AWS S3 client using the provided integration credentials (Access
    Key, Secret Key, and Region).

    2. Validates connectivity to the AWS S3 service.

    3. Executes the `get_bucket_policy` API call to AWS S3 to fetch the policy details
    for the bucket specified in the action parameters.

