Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the HaveIBeenPwned service to ensure the integration is
    configured correctly and can communicate with the API.


    ### Flow Description

    1. Retrieves the integration configuration, including the API Key and SSL verification
    settings.

    2. Initializes the HaveIBeenPwned manager with the provided credentials.

    3. Executes a test API call (fetching breaches for a hardcoded test email `test@gmail.com`)
    to verify connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This is a utility action used primarily during integration setup or troubleshooting
    to verify that the API key is valid and network connectivity is functioning.
