Check Account:
  ai_description: >-
    ### General Description

    Retrieves all breaches and public pastes an account (email address) has been involved
    in using the HaveIBeenPwned service. This action helps analysts identify if a
    user's credentials or personal information have been compromised in known data
    leaks.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `USER`.

    3. Validates whether the user's identifier is a properly formatted email address.

    4. Makes a GET request to the HaveIBeenPwned API to fetch all known breaches associated
    with the email address.

    5. Makes a GET request to the HaveIBeenPwned API to fetch all known public pastes
    associated with the email address.

    6. If breaches or pastes are found, creates an entity insight indicating the account
    has been pwned.

    7. Attaches the detailed breach and paste data as data tables and JSON results
    to the action output.


    ### Additional Notes

    - This action only processes `USER` entities whose identifiers are valid email
    addresses.

    - The action relies on the HaveIBeenPwned API, which has strict rate limits that
    are handled by the integration manager.
  ai_short_description: >-
    Retrieves all breaches and public pastes an account (email address) has been involved
    in using the HaveIBeenPwned service to identify compromised credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
