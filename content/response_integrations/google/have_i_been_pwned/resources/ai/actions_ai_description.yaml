    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the HaveIBeenPwned API to fetch breach and
      paste data (fetches_data=true). It does not mutate external data or internal
      case data, nor does it update entities. It does, however, create entity insights
      if breaches or pastes are found (can_create_insight=true).
