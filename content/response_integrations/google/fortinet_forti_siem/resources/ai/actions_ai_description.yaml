Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using information from the Fortinet
    FortiSIEM CMDB. This action retrieves device information and updates the entities
    with the fetched contextual data.


    ### Flow Description

    1. Iterates through the target entities, filtering for supported types (IP Address
    and Hostname).

    2. Makes a GET request to the Fortinet FortiSIEM API (`/phoenix/rest/cmdbDeviceInfo/device`)
    to fetch device information for each entity.

    3. Updates the entity's additional properties with the retrieved enrichment data.

    4. Marks the entity as enriched and updates it within the Google SecOps platform.

    5. Attaches the raw JSON results and a summary table to the action's output.


    ### Additional Notes

    Hostname entities should contain the "name" of the device to be successfully queried.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving device information from
    the Fortinet FortiSIEM CMDB.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the FortiSIEM API to fetch device information
      (fetches_data=true). It does not mutate external data or internal system data.
      It updates the entities with the fetched data using `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
