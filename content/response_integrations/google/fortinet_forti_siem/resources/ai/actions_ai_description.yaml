Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Fortinet FortiSIEM installation using the configured
    integration parameters. This action verifies that the provided credentials and
    API root are valid and that the SecOps platform can successfully communicate with
    the FortiSIEM instance.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, Username,
    Password, Verify SSL).

    2. Initializes the FortiSIEM manager with the provided credentials.

    3. Makes an HTTP GET request to the `/phoenix/rest/deviceInfo/monitoredDevices`
    endpoint to verify API access and connectivity.

    4. Returns a successful execution state if the connection is established and the
    response is valid, otherwise returns a failure state with the error details.


    ### Additional Notes

    This action is primarily used for diagnostic and setup purposes to ensure the
    integration is correctly configured before running other operational actions.
