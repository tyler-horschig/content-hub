    | Start Time | String | No | Specify the start time for the results. This parameter
    is mandatory, if "Custom" is selected for the "Time Frame" parameter. Format:
    ISO 8601. Example: 2021-04-23T12:38Z |

    | End Time | String | No | Specify the end time for the results. Format: ISO 8601.
    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

