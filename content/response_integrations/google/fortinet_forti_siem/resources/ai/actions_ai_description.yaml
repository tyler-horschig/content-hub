    is selected, you also need to provide "Start Time". |
Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes a simple event query in Fortinet FortiSIEM based on provided parameters
    such as event types, categories, severity, and time frame. The action retrieves
    historical logs and telemetry data matching the specified search criteria.


    ### Flow Description

    1. Validates the input parameters, including result limits, severity thresholds,
    and time frame configurations.

    2. Constructs an XML query payload using the provided search criteria (e.g., event
    types, categories, IDs, and time range).

    3. Initiates the event query on FortiSIEM via an API call (`/phoenix/rest/query/eventQuery`).

    4. Checks the progress of the query via an API call (`/phoenix/rest/query/progress/{query_id}`).

    5. If the query is completed, retrieves the query results via an API call (`/phoenix/rest/query/events/{query_id}/0/{limit}`)
    and attaches them to the action's JSON result and data table.

    6. If the query is still in progress, the action suspends and waits for the next
    execution cycle to check the status again.


    ### Additional Notes

    The action is asynchronous and will poll the FortiSIEM API until the query completes
    or times out.
