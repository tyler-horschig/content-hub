Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom event query in Fortinet FortiSIEM to retrieve specific historical
    logs or telemetry data based on user-defined conditions.


    ### Flow Description

    1. Builds an XML query payload using the provided query conditions, time frame,
    and sorting parameters.

    2. Submits the query to the FortiSIEM API (`/phoenix/rest/query/eventQuery`) to
    initiate the search.

    3. Periodically checks the query progress asynchronously (`/phoenix/rest/query/progress/{query_id}`).

    4. Once completed, retrieves the query results (`/phoenix/rest/query/events/{query_id}/0/{limit}`).

    5. Returns the results as JSON and constructs a data table in the SecOps platform.


    ### Additional Notes

    The action runs asynchronously. If "Custom" is selected for the Time Frame parameter,
    a Start Time must be provided.
  ai_short_description: >-
    Executes a custom event query in Fortinet FortiSIEM and returns the matching results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
