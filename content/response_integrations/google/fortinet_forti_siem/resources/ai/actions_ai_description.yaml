    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by submitting a search query and retrieving the results.
      It does not mutate external system state (creating a search job is not considered
      a state mutation of business data), update internal entities, create insights,
      modify alerts, or create case comments.
