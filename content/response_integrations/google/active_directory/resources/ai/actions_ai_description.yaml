Release Locked Account:
  ai_description: >-
    ### General Description

    Releases a locked user account in Active Directory. This action restores authentication
    capabilities for a user by resetting their lockout status on the domain controller.


    ### Flow Description

    1. Initializes the Active Directory manager using the provided integration configurations.

    2. Iterates over the target entities, filtering for those with the type `USER`.

    3. For each valid user entity, queries Active Directory to retrieve the user's
    distinguished name (DN).

