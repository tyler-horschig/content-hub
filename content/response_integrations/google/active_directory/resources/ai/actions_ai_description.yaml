    1. Iterates over the target entities provided to the action, filtering for entities
    of type `USER`.

    2. For each valid user entity, queries Active Directory to locate the user's distinguished
    name (DN).

    3. Performs an LDAP modify operation to update the `userAccountcontrol` attribute,
    effectively disabling the account.

    4. Collects the results and returns a summary message detailing which user accounts
    were successfully disabled and which failed.


