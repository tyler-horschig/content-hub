Add User To Group:
  ai_description: >-
    ### General Description

    Adds specified User entities to one or more Active Directory groups. This action
    modifies the group membership of the target users within the Active Directory
    environment.


    ### Flow Description

    1. Extracts the target group names from the action parameters.

    2. Iterates over the provided User entities.

    3. For each user, queries Active Directory to resolve the user and group distinguished
    names (DNs).

    4. Attempts to add the user to the specified Active Directory groups by performing
    an LDAP modify operation (`MODIFY_ADD`) on the group's `member` attribute.

    5. Collects the results, handling cases where the user is already in the group,
    insufficient permissions, or missing users/groups.

    6. Returns a summary message detailing successful additions, existing memberships,
    and failures.


    ### Additional Notes

    The action interacts with the Active Directory server via LDAP/LDAPS. It requires
    appropriate permissions to modify group memberships in the target Active Directory
    environment.
  ai_short_description: >-
    Adds specified User entities to one or more Active Directory groups.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the user's distinguished name to the 'member' attribute of the specified
      Active Directory groups.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an LDAP modify operation to add a user to a group in Active
      Directory, which mutates external data. It does not fetch data for enrichment
      purposes, nor does it update internal entities, create insights, or add case
