    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only performs a GET request to test connectivity. It does not fetch
      contextual data for entities, mutate external or internal data, update entities,
      create insights, modify alerts, or create case comments.
