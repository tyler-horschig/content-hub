Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using information from Check Point Harmony Mobile.
    It retrieves device status, risk level, and other contextual information to provide
    a comprehensive overview of the mobile device associated with the hostname.


    ### Flow Description

    1. Extracts configuration parameters and the action parameter (`Create Insight`).

    2. Filters the target entities to include only those of type `HOSTNAME`.

    3. Makes a GET request to the Harmony Mobile API (`/app/SBM/external_api/v1/device_status`)
    to fetch the list of devices.

    4. Matches the fetched devices against the identifiers of the target Hostname
    entities.

    5. For each matched entity, updates its additional properties with device data
    (e.g., OS type, risk, status, model, email).

    6. Marks the entity as enriched and updates it within the platform.

    7. Optionally creates an insight for the entity based on the `Create Insight`
    parameter.

    8. Returns the enriched data as a JSON result and attaches an entity table.


    ### Additional Notes

    The Hostname entity identifier must exactly match the "name" of the device in
    Harmony Mobile for the enrichment to succeed.
  ai_short_description: >-
    Enriches Hostname entities by retrieving device status, risk, and contextual information
    from Check Point Harmony Mobile.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Harmony Mobile API to fetch device data
      (fetches_data=true). It does not mutate external data. It updates internal entities
      using `siemplify.update_entities` and creates insights using `siemplify.add_entity_insight`.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The script iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES`
      is `[EntityTypes.HOSTNAME]`. It also matches the `entity.identifier` against
      the device name fetched from the API.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches contextual metadata (device type, OS version, risk, status)
      for a Hostname entity (an asset) from Harmony Mobile. This aligns with the 'Enrich
      Asset' category. It does not enrich IOCs with threat intel, nor does it mutate
      external state.
