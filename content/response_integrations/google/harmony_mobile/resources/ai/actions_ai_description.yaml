    | Create Insight | Boolean | No | If enabled, action will create an insight containing
    all of the retrieved information about the entity. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Harmony Mobile server to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Client ID, Client
    Secret, Verify SSL).

    2. Initializes the Harmony Mobile manager.

    3. Makes an HTTP GET request to the `/app/SBM/external_api/v1/device_status/`
    endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the Harmony Mobile server to ensure the integration is configured
    correctly.
  capabilities:
