WhoIs:
  ai_description: >-
    ### General Description

    Queries the Whois database via IPVoid to find information about a particular domain
    name or an IP address. The action retrieves the WhoIs online lookup report and
    attaches it to the relevant entities.


    ### Flow Description

    1. Iterates through the provided target entities.

    2. Filters the entities to process only those of type IP Address and Hostname.

    3. Makes an HTTP POST request to the IPVoid WhoIs endpoint to fetch the HTML report
    for each valid entity.

    4. Attaches the retrieved HTML report to the corresponding entity within the Google
    SecOps platform.


    ### Additional Notes

    This action relies on the IPVoid WhoIs service and does not require any action-specific
    parameters.
