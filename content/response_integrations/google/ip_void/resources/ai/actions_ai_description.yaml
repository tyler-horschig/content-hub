Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the IPVoid service. This action verifies that the integration
    is properly configured and can successfully communicate with the IPVoid API.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, and
    SSL settings).

    2. Initializes the IPVoidManager with the provided credentials.

    3. Makes an HTTP GET request to the IPVoid API (`/iprep/v1/pay-as-you-go/?stats`)
    to test authentication and connectivity.

    4. Returns a success message if the API responds without errors.


    ### Additional Notes

    This is a utility action primarily used during integration setup or troubleshooting
    to ensure network reachability and valid credentials. It does not process entities
    or modify any case data.
