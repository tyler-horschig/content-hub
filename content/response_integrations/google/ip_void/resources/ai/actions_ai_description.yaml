Get Ip Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using IPVoid by scanning them through multiple DNS-based
    blacklists (DNSBL) and IP reputation services. This action retrieves threat intelligence,
    evaluates risk based on a configured threshold, updates the entity's suspicious
    status, and generates an insight with the analysis results.


    ### Flow Description

    1. Iterates over the target entities and filters for IP addresses (`ADDRESS`).

    2. Makes an API call to the IPVoid API (`/iprep/v1/pay-as-you-go/`) to fetch reputation
    and blacklist data for each IP.

    3. Extracts enrichment data, including anonymity details, detection counts, and
    engine counts.

    4. Creates an entity table containing the detailed blacklist report.

    5. Generates an entity insight containing the country code of the IP address.

    6. Updates the entity's `additional_properties` with the fetched enrichment data.

    7. Evaluates the number of blacklist detections against the configured `Threshold`
    parameter; if the detections exceed this threshold, the entity is marked as suspicious.

    8. Marks the entity as enriched, updates the entities within the SecOps platform,
    and returns the raw JSON results.


    ### Additional Notes

    - The action exclusively processes entities of type `ADDRESS`.

    - Entities that fail to return reputation data or encounter errors during the
    API call are skipped and reported in the output message.
  ai_short_description: >-
    Enriches IP Address entities by scanning them through multiple DNS-based blacklists
    and IP reputation services using IPVoid, updating their suspicious status based
    on a detection threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches IP reputation data from the IPVoid API (fetches_data=true).
      It does not mutate external data (can_mutate_external_data=false). It updates
      internal entities with enrichment data and suspicious status via `siemplify.update_entities`
      (can_update_entities=true). It creates insights with the country code via `siemplify.add_entity_insight`
      (can_create_insight=true). It does not modify alert data or create case comments.
