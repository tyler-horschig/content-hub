Get Login History:
  ai_description: >-
    ### General Description

    Retrieves user login history from a Microsoft SCCM instance based on the provided
    User entities.


    ### Flow Description

    1. Establishes a connection to the MS SCCM instance using WMI.

    2. Iterates through the target entities, filtering specifically for User entities.

    3. Executes a WQL query via the SCCM API to fetch the login history (Username,
    LastLoggedIn, LoginCount) for each valid User entity.

    4. Limits the results based on the `Number of Records to Return` parameter.

    5. Formats the retrieved data into a CSV table and attaches it to the entity results.

    6. Returns the aggregated login history as a JSON result.


    ### Additional Notes

    This action only operates on User entities. It requires appropriate WMI access
    and permissions on the target SCCM server.
