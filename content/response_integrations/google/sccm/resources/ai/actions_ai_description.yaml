Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Siemplify Host, IP, or User entities based on information retrieved from
    Microsoft SCCM. This action queries the SCCM database to gather contextual metadata
    about the specified entities and attaches it to the entities within the SecOps
    platform.


    ### Flow Description

    1. Establishes a connection to the Microsoft SCCM instance using WMI.

    2. Iterates through the target entities, filtering for User, Hostname, and Address
    entity types.

    3. For each valid entity, executes a WQL query against SCCM to retrieve relevant
    asset or user information.

    4. Updates the entity's `additional_properties` with the retrieved SCCM data and
    marks it as enriched.

    5. Generates a JSON result and a CSV table containing the enrichment details for
    each successful entity.

    6. Updates the enriched entities in the Google SecOps platform.


    ### Additional Notes

    - The action relies on WMI to communicate with the SCCM server.

    - Only entities of type User, Hostname, and Address are processed; all others
    are ignored.
  ai_short_description: >-
    Enriches User, Hostname, and Address entities by querying Microsoft SCCM for contextual
    asset and user metadata, updating the entities with the retrieved information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from SCCM using WQL queries (fetches_data=true). It
      does not mutate external data or internal case data, but it does update the
      entities with the retrieved information (can_update_entities=true). It does
      not create insights or case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
