    query against a Microsoft System Center Configuration Manager (SCCM) instance.
    This action allows analysts to retrieve custom data sets from SCCM based on specific
    WQL syntax.


    ### Flow Description

    1. Connects to the Microsoft SCCM instance using the provided integration credentials.

    2. Executes the specified WQL query via the WMI client.

    3. Retrieves the query results and truncates them if they exceed the specified
    maximum number of records.

    4. Returns the results as JSON, constructs a CSV table, and attaches the raw JSON
    file to the action results.


    ### Additional Notes

    This action does not operate on Siemplify entities. Ensure the WQL query is properly
    formatted and tested to avoid excessive load on the SCCM server.
