Get Computer Properties:
  ai_description: >-
    ### General Description

    Retrieves computer properties from a Microsoft SCCM instance to enrich Hostname
    entities. Note: This action is deprecated; users should use the "Enrich Entities"
    action instead.


    ### Flow Description

    1. Iterates through the provided target entities and filters for Hostname entities.

    2. Cleans the hostname identifier by removing any domain suffixes (e.g., splitting
    by `@` or `.`).

    3. Executes a WMI query (`SELECT * FROM SMS_R_System`) against the SCCM instance
    to fetch computer information for the specific hostname.

    4. If data is found, enriches the entity's additional properties with the retrieved
    SCCM data.

    5. Attaches a CSV table containing the flattened report to the entity.

    6. Updates the entities in the platform, marks them as enriched, and returns the
    raw data as JSON results.


    ### Additional Notes

    Requires valid SCCM credentials and WMI access (ports 135, 445, 443, and RPC service)
    to the SCCM server.
