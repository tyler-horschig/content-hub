Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Microsoft SCCM instance using the integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters including Server Address, Domain,
    Username, and Password.

    2. Attempts to initialize the `SCCMManager` which establishes a connection to
    the WMI instance of the SCCM server.

    3. Returns a success message if the connection is established successfully, otherwise
    catches the exception and returns a failure message.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the SCCM server. It does not perform any operations on
    entities or alerts.
