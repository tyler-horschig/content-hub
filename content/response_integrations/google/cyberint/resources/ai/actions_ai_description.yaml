Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cyberint platform using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the API Root, API Key, and Verify SSL settings from the integration
    configuration.

    2. Initializes the Cyberint manager to handle API communication.

    3. Executes a test API call (POST request to `/alert/api/v1/alerts`) to verify
    authentication and network connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the Cyberint platform to verify that the integration is
    configured correctly and can communicate with the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a basic connectivity test by making a POST request to the
      Cyberint API to fetch a small number of alerts. It does not fetch contextual
      data for entities, mutate external data, update internal entities, or create
      insights.
