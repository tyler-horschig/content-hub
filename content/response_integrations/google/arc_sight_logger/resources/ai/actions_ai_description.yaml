Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ArcSight Logger instance using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (Server Address, Username, Password,
    Verify SSL).

    2. Initializes the ArcSight Logger manager.

    3. Authenticates to the ArcSight Logger API via a POST request to `/core-service/rest/LoginService/login`.

    4. Tests connectivity by sending a dummy search POST request to `/server/search`.

    5. Logs out of the ArcSight Logger API via a POST request to `/core-service/rest/LoginService/logout`.

    6. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the ArcSight Logger server.
  ai_short_description: >-
    Tests connectivity to the ArcSight Logger instance using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a login, a dummy search, and a logout to test connectivity.
      It does not fetch contextual data for alerts, mutate external data (beyond session
      management), mutate internal data, update entities, or create insights.
