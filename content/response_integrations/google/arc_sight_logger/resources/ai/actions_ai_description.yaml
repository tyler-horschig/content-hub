Send Query:
  ai_description: >-
    ### General Description

    Sends a search query to ArcSight Logger to retrieve related events. This action
    operates asynchronously, initiating the query on the ArcSight Logger server and
    polling for the results until completion, returning the matched events as JSON
    and a data table.


    ### Flow Description

    1. Connects to the ArcSight Logger instance using the configured credentials.

    2. Initiates an asynchronous search query via the ArcSight Logger API (`/server/search`),
    applying the specified time frame, local search preference, and field discovery
    settings.

    3. Polls the ArcSight Logger API (`/server/search/status`) in subsequent runs
    to check the execution status of the query.

    4. Once the query status is marked as completed, retrieves the events (`/server/search/events`)
    up to the specified limit, optionally filtering by specific fields and including
    raw event data.

    5. Parses the retrieved events and outputs them as a JSON result and a CSV-formatted
    data table in the SecOps platform.


    ### Additional Notes

    This action is asynchronous. The maximum number of events that can be returned
    is limited to 10,000 due to ArcSight Logger limitations. Time frame values cannot
    be combined (e.g., use '1d' or '1h', not '1d2h').
  ai_short_description: >-
    Sends an asynchronous search query to ArcSight Logger to retrieve related events
    and outputs the results as JSON and a data table.
  capabilities:
