    the Subscription ID, Alert ID, Location, and the desired Status.

    2. Maps the provided status (e.g., Resolve, Dismiss, Reactivate) to the corresponding
    Azure Security Center API status value.

    3. Initializes the Azure Security Center manager with the provided authentication
    credentials.

    4. Makes a POST request to the Azure Security Center API to update the specified
    alert's status.

    5. Returns a success or failure message to the SecOps platform based on the API
    response.


