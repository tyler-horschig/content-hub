List Regulatory Standard Controls:
  ai_description: >-
    ### General Description

    Retrieves a list of available regulatory standard controls from Microsoft Azure
    Security Center based on specified standard names and state filters.


    ### Flow Description

    1. Extracts action parameters including Subscription ID, Standard Names, State
    Filter, and Max Standards To Return.

    2. Validates the provided state filters against allowed values (Passed, Failed,
    Unsupported, Skipped).

    3. Initializes the Azure Security Center API client.

    4. Iterates through the provided standard names.

    5. Makes a GET request to the Azure Security Center API to fetch the regulatory
    compliance controls for each standard.

    6. Filters the retrieved controls based on the specified state filter and limits
    the results to the maximum specified.

    7. Aggregates the results and outputs them as a JSON object and a data table within
    the SecOps platform.


    ### Additional Notes

    The action requires valid Azure credentials and appropriate permissions to read
    regulatory compliance data. If the Subscription ID is provided at both the integration
    and action levels, the action-level configuration takes precedence.
