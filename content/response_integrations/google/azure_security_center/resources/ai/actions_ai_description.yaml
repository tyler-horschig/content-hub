Get OAuth Refresh Token:
  ai_description: >-
    ### General Description

    Generates an OAuth refresh token required for the Azure Security Center integration
    configuration. This action utilizes an authorization code previously generated
    to authenticate and retrieve the token.


    ### Flow Description

    1. Retrieves the necessary integration configurations (Tenant ID, Client ID, Client
    Secret) and action parameters (Redirect URL, Authorization Code).

    2. Makes a POST request to the Microsoft OAuth2 token endpoint (`https://login.microsoftonline.com/{tenant_id}/oauth2/token`)
    using the provided authorization code.

    3. Retrieves the OAuth refresh token from the response.

    4. Returns the token data as a JSON result for use in the integration configuration.


    ### Additional Notes

    The authorization code required for this action can be generated using the "Get
    OAuth Authorization Code" action.
