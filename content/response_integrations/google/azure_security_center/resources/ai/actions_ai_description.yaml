Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Azure Security Center server using the parameters provided
    in the integration configuration page.


    ### Flow Description

    1. Extracts the integration configuration parameters (Client ID, Client Secret,
    Username, Password, Tenant ID, Refresh Token, and Verify SSL).

    2. Initializes the Azure Security Center manager with the extracted parameters.

    3. Makes a GET request to the Azure Security Center operations endpoint (`https://management.azure.com/providers/Microsoft.Security/operations`)
    to test connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters and relies entirely
    on the integration-level configuration.
