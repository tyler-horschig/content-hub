Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth authorization code URL for Azure Security Center. This action
    constructs a specific Microsoft login URL using the provided Tenant ID, Client
    ID, and Redirect URL to facilitate the OAuth 2.0 authorization code flow.


    ### Flow Description

    1. Extracts the Tenant ID and Client ID from the integration configuration.

    2. Extracts the Redirect URL from the action parameters.

    3. Constructs the Microsoft OAuth 2.0 authorization URL.

    4. Attaches the generated URL as a link to the action's results.


    ### Additional Notes

    The user must manually navigate to the generated URL in a web browser, authenticate,
    and copy the resulting authorization code from the URL to use in the "Get OAuth
    Refresh Token" action. No external API calls are made directly by this action.
  ai_short_description: >-
    Generates an OAuth authorization code URL for Azure Security Center to be used
    manually in a web browser.
