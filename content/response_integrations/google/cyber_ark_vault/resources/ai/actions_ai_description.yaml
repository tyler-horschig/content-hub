Disable User:
  ai_description: >-
    ### General Description

    Disables a specific user account in CyberArk Vault. This action interacts with
    the CyberArk Vault API to retrieve the user's current profile and updates their
    active status to prevent further authentication.


    ### Flow Description

    1. Retrieves the target user name from the action parameters.

    2. Makes a GET request to the CyberArk Vault API to fetch the current user details.

    3. Makes a PUT request to the CyberArk Vault API to update the user's active status
    to false (disabled).

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    Ensure the provided user name exactly matches the record in CyberArk Vault.
  ai_short_description: >-
    Disables a specific user account in CyberArk Vault by updating their active status
    to false.
