    external_data_mutation_explanation: >-
      Updates the user's active status to false in CyberArk Vault via a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the CyberArk Vault API to disable a user,
      which mutates external data. It does not fetch contextual data for enrichment,
      nor does it update internal SecOps data like entities, insights, or case comments.
