Get Group Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific group from CyberArk Vault. This
    action queries the CyberArk Vault API for a given group name and returns its configuration
    and metadata as a data table.


    ### Flow Description

    1. Extracts the `Group Name` parameter provided in the action configuration.

    2. Initiates an HTTP GET request to the CyberArk Vault API to fetch the details
    of the specified group.

    3. If the group is found, parses the JSON response and flattens the dictionary.

    4. Attaches the flattened group details to the action results as a data table.

    5. If the group is not found, returns a failure message.


    ### Additional Notes

    This action does not operate on alerts or entities; it relies solely on the provided
    group name parameter.
