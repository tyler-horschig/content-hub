Enable User:
  ai_description: >-
    ### General Description

    Enables a specific user account in CyberArk Vault. This action retrieves the user's
    current details and updates their active status to true via the CyberArk SCIM
    API, restoring their access to the system.


    ### Flow Description

    1. Retrieves the target user name from the action parameters.

    2. Makes a GET request to the CyberArk API to fetch the current user details.

    3. Makes a PUT request to the CyberArk API to update the user's active status
    to true (enabled).

    4. Returns a success or failure message to the SecOps platform based on the API
    response.


    ### Additional Notes

    This action directly modifies the user's state in the external CyberArk Vault
    system. It does not operate on SecOps entities but relies on the explicitly provided
    user name parameter.
