Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CyberArk Vault and Password Vault APIs. This action
    verifies that the integration is configured correctly and can successfully authenticate
    and communicate with the external services.


    ### Flow Description

    1. Retrieves integration configuration parameters (e.g., API Root, Username, Password).

    2. Initializes the `CyberarkManager` and `PasswordVaultManager` with the provided
    credentials.

    3. Executes a connectivity test by making a GET request to retrieve the users
    list via the `CyberarkManager`.

    4. Executes a connectivity test by making a GET request to the Accounts endpoint
    via the `PasswordVaultManager`.

    5. Returns a success message if both API calls complete without exceptions.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    CyberArk Vault integration to ensure network reachability and credential validity.
  ai_short_description: >-
