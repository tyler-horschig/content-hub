Unisolate Machine:
  ai_description: >-
    ### General Description

    Unisolates a machine in Cisco AMP based on Hostname or IP Address entities. This
    action restores network communication capabilities for an endpoint that was previously
    isolated.


    ### Flow Description

    1. Iterates over the target entities provided in the action.

    2. Checks if the entity type is an IP Address or Hostname.

    3. Makes a GET request to the Cisco AMP API to fetch the computer information
    and retrieve the `connector_guid` associated with the entity's identifier.

    4. Makes a DELETE request to the Cisco AMP API to remove the isolation status
    of the machine using the retrieved `connector_guid`.

    5. Updates the successfully processed entities in the Google SecOps platform and
    attaches the JSON results.


    ### Additional Notes

    When querying for an IP Address, the action utilizes the entity's `is_internal`
    property to determine whether to search for an internal or external IP in Cisco
    AMP.
