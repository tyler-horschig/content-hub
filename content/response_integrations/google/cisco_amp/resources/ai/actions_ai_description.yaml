Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco AMP service. This action verifies that the provided
    integration credentials and network configurations are valid by attempting to
    reach the Cisco AMP API.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Client ID, API
    Key, Use SSL).

