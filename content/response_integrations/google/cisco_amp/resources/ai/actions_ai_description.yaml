Get Computer Info:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a computer from Cisco AMP based on IP address
    or hostname entities.


    ### Flow Description

    1. Initializes the Cisco AMP client using the provided integration configurations.

    2. Iterates through the target entities in the case.

    3. Checks if the entity type is an IP Address or Hostname.

    4. Makes a GET request to the Cisco AMP API (`/v1/computers`) to fetch computer
    information using the entity's identifier. For IP addresses, it utilizes the entity's
    `is_internal` property to determine whether to search by internal or external
    IP.

    5. If computer information is found, enriches the entity's additional properties
    with the retrieved data.

    6. Attaches a CSV table containing the computer details to the entity.

    7. Updates the enriched entities within the Google SecOps platform.

    8. Returns the raw JSON results of the fetched computer information.


    ### Additional Notes

    Supported entity types are Address and Hostname.
