Get Computers By File Hash:
  ai_description: >-
    ### General Description

    Fetches a list of computers from Cisco AMP that have observed a specific file
    hash (SHA-256). This action helps analysts understand the prevalence and impact
    of a specific file across the environment by identifying all endpoints that have
    interacted with it.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to include only File Hash entities that have exactly 64
    characters (indicating a SHA-256 hash).

    3. For each valid file hash, makes a GET request to the Cisco AMP API (`/v1/computers/activity`)
    to search for computer activity associated with the hash.

    4. For each computer found in the activity search, makes an additional GET request
    to retrieve detailed computer information.

    5. Constructs a CSV table containing the detailed computer information (e.g.,
    Hostname, IPs, OS, Policy) and attaches it to the action results.

    6. Updates the successfully processed entities in the Google SecOps platform.


    ### Additional Notes

    - This action strictly requires SHA-256 file hashes. MD5 or SHA-1 hashes will
    be ignored due to the 64-character length filter.

    - The action may make multiple API calls per entity if multiple computers are
    found, as it fetches detailed info for each computer individually.
  ai_short_description: >-
    Fetches a list of computers from Cisco AMP that have observed a specific SHA-256
    file hash, providing prevalence and endpoint exposure data.
