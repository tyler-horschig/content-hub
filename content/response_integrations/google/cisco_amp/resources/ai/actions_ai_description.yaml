Add File To File List:
  ai_description: >-
    ### General Description

    Adds specific SHA-256 file hash entities to a designated file list in Cisco AMP.
    This action is typically used to add file hashes to a blacklist or custom detection
    list to prevent execution or flag future occurrences.


    ### Flow Description

    1. Initializes the Cisco AMP manager with the provided API credentials.

    2. Retrieves the specified file list by name from Cisco AMP to obtain its unique
    GUID.

    3. Iterates through the target entities, filtering for `FILEHASH` entities.

    4. Validates that the file hash is exactly 64 characters long (SHA-256).

    5. Makes a POST request to the Cisco AMP API to add each valid hash to the specified
    file list with the provided description.

    6. Updates the successfully processed entities within the Google SecOps platform.

    7. Returns a summary message detailing the hashes added and any errors encountered.


    ### Additional Notes

    Only SHA-256 file hashes (64 characters in length) are supported by this action.
    Other hash types (e.g., MD5, SHA-1) will be skipped.
  ai_short_description: >-
    Adds SHA-256 file hash entities to a specified file list (such as a blacklist)
    in Cisco AMP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds a SHA-256 file hash to a specified file list in Cisco AMP via a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch contextual data for enrichment purposes. It mutates
      external data by making a POST request to Cisco AMP to add a file hash to a
      file list. It does not mutate internal SecOps data, but it does update the entities
      in the platform by calling `siemplify.update_entities`. It does not create insights,
      modify alert data, or create case comments.
