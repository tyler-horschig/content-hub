Get Client Details:
  ai_description: >-
    ### General Description

    Retrieves full details for specified clients from Google GRR using their Client
    IDs. This action fetches contextual metadata such as OS information, hardware
    details, and network interfaces for the requested clients.


    ### Flow Description

    1. Extracts the provided Client IDs from the action parameters.

    2. Iterates through each Client ID and makes a GET request to the Google GRR API
    (`/api/clients/{client_id}`) to fetch the client's details.

    3. Parses the retrieved data, including OS information, hardware details, and
    network interfaces.

    4. Returns the aggregated data as a JSON result and constructs a data table with
    the client details.


    ### Additional Notes

    Multiple Client IDs can be provided as a comma-separated list.
