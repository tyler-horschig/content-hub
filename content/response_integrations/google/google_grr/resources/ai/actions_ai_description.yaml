Stop a Hunt:
  ai_description: >-
    ### General Description

    Stops one or more hunts in Google GRR. Stopping a hunt prevents new clients from
    being scheduled and interrupts in-progress flows the next time they change state.
    This is a hard stop, so in-progress results will be lost, but results already
    reported are unaffected. Once a hunt is stopped, there is no way to start it again.


    ### Flow Description

    1. Extracts the provided Hunt IDs from the action parameters.

    2. Iterates through the list of Hunt IDs.

    3. Makes a PATCH request to the Google GRR API (`api/hunts/{hunt_id}`) to change
    the state of each hunt to 'STOPPED'.

    4. Collects the results and returns a JSON array containing the successfully stopped
    Hunt IDs and their new states.


    ### Additional Notes

    The action accepts a comma-separated list of Hunt IDs, allowing multiple hunts
    to be stopped in a single execution.
  ai_short_description: >-
    Stops one or more hunts in Google GRR by changing their state to 'STOPPED', preventing
    new clients from being scheduled and interrupting in-progress flows.
