Start a Hunt:
  ai_description: >-
    ### General Description

    Starts a newly created or paused hunt in Google GRR. This action initiates a state
    change on the external system to run the specified hunts.


    ### Flow Description

    1. Extracts the provided comma-separated Hunt IDs from the action parameters.

    2. Iterates through each Hunt ID.

    3. Sends a PATCH request to the Google GRR API to change the state of the hunt
    to 'STARTED'.

    4. Collects the results and returns the updated state and hunt ID as JSON results.


    ### Additional Notes

    New hunts are created in the PAUSED state and must be started using this action.
    Hunts that reach their client limit will also be set to PAUSED; use this action
    to restart them after the client limit has been removed.
  ai_short_description: >-
    Starts a specific hunt or list of hunts in Google GRR by changing their state
    to 'STARTED'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the state of a specified hunt in Google GRR to 'STARTED'.
    fetches_data: false
    internal_data_mutation_explanation: null
