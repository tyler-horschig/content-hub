    1. Initializes the Google GRR manager with the provided API credentials.

    2. Sends a request to the Google GRR API to fetch a list of clients, applying
    the specified offset and maximum results parameters.

    3. Parses the response and extracts client details such as Client ID, Agent Info,
    OS Info, and Last Seen time.

    4. Constructs a JSON result and a CSV table containing the retrieved client information.

    5. Returns the data to the Google SecOps platform.


