Get Hunt Details:
  ai_description: >-
    ### General Description

    This action retrieves detailed information about specific hunts from Google GRR.
    It accepts a comma-separated list of Hunt IDs and fetches the corresponding details
    for each hunt from the Google GRR platform.


    ### Flow Description

    1. Extracts the provided comma-separated Hunt IDs.

    2. Iterates through the list of Hunt IDs.

    3. Makes an API GET request to the Google GRR endpoint (`api/hunts/{hunt_id}`)
    to fetch the details for each hunt.

    4. Appends the retrieved hunt details to the action's JSON results and provides
    a direct link to the hunt in the Google GRR console.


    ### Additional Notes

    If a hunt ID is invalid or not found, the action will log the error and continue
    processing the remaining IDs.
