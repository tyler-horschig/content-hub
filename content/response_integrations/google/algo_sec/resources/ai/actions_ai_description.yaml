List Templates:
  ai_description: >-
    ### General Description

    Retrieves a list of available templates from AlgoSec. This action allows users
    to discover and filter templates configured in the AlgoSec environment, which
    can be useful for subsequent actions that require a template identifier.


    ### Flow Description

    1. Initializes the connection to the AlgoSec API using the provided integration
    credentials.

    2. Executes an HTTP GET request to the `/FireFlow/api/templates` endpoint to fetch
    all available templates.

    3. Evaluates the `Filter Value` parameter; if provided, filters the retrieved
    templates by their name using the specified `Filter Logic` (either exact match
    via 'Equal' or substring match via 'Contains').

    4. Truncates the resulting list of templates to the number specified in the `Max
    Templates To Return` parameter.

    5. Outputs the final list of templates as a JSON array and constructs a data table
    for the case wall.


    ### Additional Notes

    If no `Filter Value` is provided, the action will return all available templates
    up to the specified maximum limit. Ensure the limit is greater than 0.
  ai_short_description: >-
    Retrieves a list of available templates from AlgoSec, optionally filtering the
    results by name and limiting the output count.
