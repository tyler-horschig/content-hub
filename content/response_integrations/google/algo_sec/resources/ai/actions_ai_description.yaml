Allow IP:
  ai_description: >-
    ### General Description

    This action creates a traffic change request in AlgoSec FireFlow to allow traffic
    to specified IP address entities. The IP address entities are treated as destinations
    in the change request.


    ### Flow Description

    1. The action filters the target entities to include only IP addresses (ADDRESS).

    2. It extracts the identifiers (IP addresses) from the filtered entities.

    3. It makes a POST request to the AlgoSec API (`/FireFlow/api/change-requests/traffic`)
    to create a new traffic change request with the action set to "Allow".

    4. It waits for a brief period and then fetches the details of the newly created
    request.

    5. It attaches the JSON result of the request details and a link to the change
    request in the SecOps platform.


    ### Additional Notes

    - IP address entities are treated as destinations in the change request.

    - The `Source` and `Service` parameters can accept a comma-separated list or the
    special keyword "all".
  ai_short_description: >-
    Creates a traffic change request in AlgoSec FireFlow to allow traffic to specified
    IP address entities, treating them as destinations.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new traffic change request in AlgoSec FireFlow.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to AlgoSec to create a change request, which
      mutates external data. It does not fetch contextual data for enrichment, does
      not update internal entities, and does not create insights.
