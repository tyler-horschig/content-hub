Block IP:
  ai_description: >-
    ### General Description

    Blocks specific IP address entities by creating a traffic change request in AlgoSec.
    The action treats the IP address entities as destinations and configures the request
    to drop traffic from the specified sources and services.


    ### Flow Description

    1. Filters the target entities to include only IP addresses.

    2. Extracts the identifiers (IP addresses) of the filtered entities.

    3. Makes a POST request to the AlgoSec API (`/FireFlow/api/change-requests/traffic`)
    to create a change request with the action set to "Drop" for the specified sources,
    services, and destination IPs.

    4. Waits for a brief period (10 seconds) to allow the request to process.

    5. Makes a GET request to the AlgoSec API to retrieve the details of the newly
    created change request.

    6. Attaches the request details as a JSON result and provides a link to the change
    request in the SecOps platform.


    ### Additional Notes

    IP address entities are treated as destinations in the change request. The action
    requires specific parameters such as Template, Source, and Service to successfully
    construct the change request.
