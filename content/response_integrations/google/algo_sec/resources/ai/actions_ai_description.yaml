    ### General Description

    Tests connectivity to the AlgoSec server to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the AlgoSecManager with the provided credentials.

    3. Sends a GET request to the AlgoSec API (`/FireFlow/api/templates`) to test
    connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


