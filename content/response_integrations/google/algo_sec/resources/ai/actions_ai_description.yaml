Wait for Change Request Status Update:
  ai_description: >-
    ### General Description

    Waits asynchronously for a specific traffic change request in AlgoSec to reach
    one of the specified target statuses. This action continuously polls the external
    system until the condition is met or the action times out, returning the final
    request details once successful.


    ### Flow Description

    1. Extracts the `Request ID` and target `Status` list from the action parameters.

    2. Validates the provided statuses against the allowed list of AlgoSec statuses.

    3. Makes a GET request to the AlgoSec API (`/FireFlow/api/change-requests/traffic/{request_id}`)
    to retrieve the current details and status of the specified change request.

    4. Evaluates if the current status matches any of the target statuses.

    5. If a match is found, the action completes successfully and attaches the request
    details as a JSON result. If not, the action remains in an 'In Progress' state
    and will re-execute asynchronously until the status matches or a timeout occurs.


    ### Additional Notes

    This is an asynchronous action. Ensure the script timeout value in the IDE is
    adjusted as needed to accommodate long-running change requests. Note that only
    traffic change requests are supported by this action.
  ai_short_description: >-
    Asynchronously monitors a specific traffic change request in AlgoSec until it
    reaches a designated status.
