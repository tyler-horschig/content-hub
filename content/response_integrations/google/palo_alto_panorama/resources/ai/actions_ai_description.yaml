Add Ips to group:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified address group in Palo Alto Panorama. This
    action modifies the configuration of the firewall management system to include
    the targeted IPs in a designated group, which is typically used for enforcing
    security policies such as blocklists or allowlists.


    ### Flow Description

    1. Extracts the `Device Name`, `Device Group Name`, and `Address Group Name` from
    the action parameters.

    2. Iterates through the target entities, filtering specifically for those with
    the `ADDRESS` entity type.

    3. Initializes the Panorama API client and checks the current members of the specified
    address group.

    4. For each valid IP address, the action verifies if it already exists in the
    group. If not, it creates a new address object (if it doesn't already exist) and
    adds the IP to the group via the Panorama API.

    5. Retrieves the updated list of addresses in the group and attaches it to the
    action's JSON result.

    6. Returns a summary message detailing which IPs were successfully added and which
    failed.


    ### Additional Notes

    The action interacts with the Panorama API using configuration requests to update
    the address group members. Ensure that the provided Device Name and Device Group
    Name exactly match the configuration in Panorama.
  ai_short_description: >-
    Adds IP address entities to a specified address group in Palo Alto Panorama.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to a specified address group in Palo Alto Panorama.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making configuration changes (adding IPs
      to an address group) in Palo Alto Panorama. It does not fetch contextual enrichment
      data, mutate internal SecOps data, update entities, or create insights.
