Unblock ips in policy:
  ai_description: >-
    ### General Description

    Unblocks specific IP address entities from a given policy in Palo Alto Panorama.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Iterates over the target entities and filters for IP addresses.

    3. Connects to the Palo Alto Panorama API.

    4. For each IP address, sends a request to remove it from the specified policy's
    blocklist (either source or destination).

    5. Retrieves the updated list of blocked IPs for the policy.

    6. Returns a summary message and attaches the updated blocklist as a JSON result.


    ### Additional Notes

    The 'Target' parameter must be specified as either 'source' or 'destination'.
