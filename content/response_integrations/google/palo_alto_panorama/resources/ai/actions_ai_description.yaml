Commit Changes:
  ai_description: >-
    ### General Description

    Commits pending configuration changes in Palo Alto Panorama. This action finalizes
    and applies modifications made to the system, with an option to commit either
    all pending changes or strictly those made by the current user.


    ### Flow Description

    1. Extracts the `Only My Changes` parameter to determine the scope of the commit.

    2. Initiates a commit job on the Palo Alto Panorama system via an API request.

    3. Retrieves the `job_id` from the initial request and enters an asynchronous
    waiting state.

    4. Periodically queries the Panorama API using the `job_id` to check the status
    of the commit operation.

    5. Completes the action once the commit job finishes, returning success or failure
    based on the final job result.


    ### Additional Notes

    This action runs asynchronously. In order to use the "Only My Changes" option,
    the user configured in the integration must have admin privileges.
