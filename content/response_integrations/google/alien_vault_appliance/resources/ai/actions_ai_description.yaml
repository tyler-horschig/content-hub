Enrich Assets:
  ai_description: >-
    ### General Description

    Retrieves information about assets from AlienVault USM Appliance to enrich Address
    and Hostname entities.


    ### Flow Description

    1. Iterates over the target entities provided in the action.

    2. Checks if the entity type is an Address or Hostname.

    3. Makes an API call to AlienVault USM Appliance to retrieve the asset ID associated
    with the IP address or hostname.

    4. If an asset ID is found, makes a subsequent API call to fetch detailed asset
    information.

    5. Flattens the retrieved asset information and appends it to the entity's additional
    properties with an "AlientVault" prefix.

    6. Adds the raw asset information to the action's JSON result.

    7. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    This action relies on the AlienVault USM Appliance integration configuration for
    authentication.
