Enrich Vulnerabilities:
  ai_description: >-
    ### General Description

    Retrieves vulnerability information for Hostname and IP Address entities from
    AlienVault USM Appliance. The action queries the appliance to find the corresponding
    asset for each entity and fetches its known vulnerabilities, enriching the entity's
    properties with the results.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Checks if the entity is an IP Address or Hostname.

    3. Queries the AlienVault USM Appliance API (`/ossim/av_asset/asset/providers/load_assets_result.php`)
    to find the corresponding asset ID for the entity's identifier.

    4. If an asset is found, fetches the associated vulnerabilities via the AlienVault
    API (`/ossim/av_asset/common/providers/dt_vulnerabilities.php`).

    5. Flattens the vulnerability data and enriches the entity's `additional_properties`
    with the findings.

    6. Attaches the vulnerability data as a JSON result and an entity-specific CSV
    table.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    - This action only supports IP Address and Hostname entities.

    - If no vulnerabilities are found for an asset, the entity will not be enriched.
