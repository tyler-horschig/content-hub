Fetch Last PCAP Files:
  ai_description: >-
    ### General Description

    Fetches the most recent PCAP (Packet Capture) files from AlienVault and attaches
    them to the case.


    ### Flow Description

    1. Initializes the connection to the AlienVault appliance using the provided credentials.

    2. Retrieves the records of the last captured PCAP files via an API call (`GET
    ossim/pcap/index.php`).

    3. Limits the results based on the `Number Of Files To Fetch` parameter.

    4. Iterates through the selected records and downloads the content of each PCAP
    file via an API call (`GET ossim/pcap/download.php`).

    5. Attaches the downloaded files to the case as base64 encoded attachments.

    6. Creates a data table containing the PCAP records.

    7. Returns the records as JSON results.


    ### Additional Notes

    The action attaches the downloaded files directly to the case for further analysis.
