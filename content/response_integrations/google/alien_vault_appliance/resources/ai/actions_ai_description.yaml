Get PCAP Files For Events:
  ai_description: >-
    ### General Description

    Retrieves PCAP (Packet Capture) files associated with security events within an
    alert or case from AlienVault USM/OSSIM. It downloads the PCAP content and attaches
    it to the respective events in Google SecOps for further forensic analysis.


    ### Flow Description

    1. Connects to the AlienVault instance using the provided integration credentials.

    2. Determines the execution scope (Alert or Case) to fetch the relevant security
    events.

    3. Iterates through the security events and extracts the event ID from the event's
    additional properties.

    4. Makes an HTTP GET request to AlienVault to fetch the event details and locate
    the associated PCAP file link.

    5. Downloads the PCAP file content from AlienVault.

    6. Base64 encodes the content and attaches it to the event in the SecOps platform.

    7. Returns the base64 encoded PCAP data as a JSON result.


    ### Additional Notes

    This action requires the events to have an 'Id' field in their additional properties
    to successfully query AlienVault for the corresponding PCAP file.
