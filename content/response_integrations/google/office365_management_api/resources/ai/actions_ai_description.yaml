Start Subscription:
  ai_description: >-
    ### General Description

    Starts a subscription to a chosen Office 365 Management API content type. This
    action initiates a state change on the external service to begin receiving activity
    feed data for the specified content type.


    ### Flow Description

    1. Extracts the target content type from the action parameters.

    2. Authenticates to the Office 365 Management API using the provided credentials.

    3. Executes a POST request to the `/activity/feed/subscriptions/start` endpoint
    with the specified content type.

    4. Returns a success message upon successful subscription creation.


    ### Additional Notes

    This action is typically used to enable data collection for specific Office 365
    workloads (e.g., DLP.All, Audit.General) before configuring a connector to fetch
    the alerts.
