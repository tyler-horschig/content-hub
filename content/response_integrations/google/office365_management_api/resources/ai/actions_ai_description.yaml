Stop Subscription:
  ai_description: >-
    ### General Description

    Stops a subscription to a chosen Office 365 Management API content type.


    ### Flow Description

    1. Extracts the content type parameter.

    2. Initializes the Office365ManagementAPIManager.

    3. Sends a POST request to the Office 365 Management API to stop the subscription
    for the specified content type.

    4. Returns a success message if the operation completes successfully.


    ### Additional Notes

    When a subscription is stopped, you will no longer receive notifications and you
    will not be able to retrieve available content. If the subscription is later restarted,
    you will have access to new content from that point forward. You will not be able
    to retrieve content that was available between the time the subscription was stopped
    and restarted.
