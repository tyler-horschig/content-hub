Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Office 365 Management API service. This action verifies
    that the integration is configured correctly and can successfully authenticate
    with the external service.


    ### Flow Description

    1. Extracts integration configuration parameters such as the API Root, Azure Active
    Directory ID, Client ID, and authentication credentials.

    2. Initializes the `Office365ManagementAPIManager`.

    3. Attempts to authenticate and retrieve an access token from the OAUTH2 Login
    Endpoint via an HTTP POST request.

    4. Returns a success message if the connection and authentication are successful,
    or an error message if the process fails.


    ### Additional Notes

    This action does not interact with alerts or entities and is solely used for diagnostic
    and setup verification purposes.
  ai_short_description: >-
    Tests connectivity to the Office 365 Management API service by attempting to authenticate
    and retrieve an access token.
