Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye ETP server using the provided integration configuration
    parameters. This action ensures that the API Root, API Key, and SSL verification
    settings are correctly configured and that the SecOps platform can successfully
    communicate with the FireEye ETP API.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, API Key,
    Verify SSL).

    2. Initializes the FireEye ETP Manager with the extracted credentials.

    3. Executes an API call (POST request to `/api/v1/alerts` with a size limit of
    1) to verify connectivity and authentication.

    4. Returns a success message if the connection is established, or an error message
    if the connection fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration. It does not perform any state-changing
    operations or data enrichment.
  ai_short_description: >-
    Tests connectivity to the FireEye ETP server using the provided integration configuration
    parameters to ensure successful communication and authentication.
  capabilities:
