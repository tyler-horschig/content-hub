name: FireEye ETP - Email Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: alertType
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: 'A regex pattern to run on the value found in the "Environment Field
        Name" field.

        Default is .* to catch all and return the value unchanged.

        Used to allow the user to manipulate the environment field via regex logic.

        If the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.

        '
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: API Root
    default_value: https://us.etp.trellix.com
    type: string
    description: API root of the FireEye ETP instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the FireEye ETP account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client ID for Trellix IAM OAuth authentication.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Client Secret for Trellix IAM OAuth authentication.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'False'
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        FireEye ETP server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: Timezone
    default_value: ''
    type: string
    description: 'Timezone of the instance. Default: UTC. Example: +1 will be UTC+1
        and -1 will be UTC-1.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull alerts from FireEye ETP. Alerts from FireEye ETP are grouped based
    on the email ID into one Siemplify Alert.
integration: FireEyeETP
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fireeye-etp#fireeye-etp-email-alerts-connector
rules: []
is_connector_rules_supported: false
creator: admin
