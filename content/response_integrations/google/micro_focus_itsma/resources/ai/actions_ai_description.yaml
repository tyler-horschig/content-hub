Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in Micro Focus ITSMA. This action initiates a state change
    on the external ITSM system by generating a new incident record based on the provided
    parameters.


    ### Flow Description

    1. Retrieves configuration and action parameters including Display Label, Description,
    Impact Scope, Urgency, and Service ID.

    2. Calls the Micro Focus ITSMA API via a POST request to create a new incident
    with the specified details.

    3. Returns the newly created incident ID to the SecOps platform.


    ### Additional Notes

    None.
  ai_short_description: >-
    Creates a new incident in Micro Focus ITSMA using the provided details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
