Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Micro Focus ITSMA instance. This action verifies that
    the integration is configured correctly and can successfully communicate with
    the Micro Focus ITSMA API.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, Username, Password,
    Tenant ID, etc.).

    2. Initializes the Micro Focus ITSMA manager.

    3. Makes an API call to attempt to retrieve an authentication token (`/auth/authentication-endpoint/authenticate/login`).

    4. Returns a success message if the connection is established and the token is
    retrieved, or a failure message otherwise.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying integration settings.
    It does not perform any operations on alerts or entities.
  ai_short_description: >-
    Tests connectivity to the Micro Focus ITSMA instance by attempting to retrieve
    an authentication token.
