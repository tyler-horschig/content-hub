Update Incident:
  ai_description: >-
    ### General Description

    Updates an existing incident in Micro Focus ITSMA. This action allows users to
    modify various properties of a ticket, such as its display label, description,
    impact scope, urgency, and service ID.


    ### Flow Description

    1. Retrieves the action parameters, including the mandatory Incident ID and any
    optional fields to update.

    2. Initializes the Micro Focus ITSMA manager with the integration configuration.

    3. Sends a POST request to the Micro Focus ITSMA API (`/rest/{tenant_id}/ces`)
    with an `Update` operation payload containing the new property values.

    4. Returns a success message listing the parameters that were successfully updated.


    ### Additional Notes

    Only the fields provided in the action parameters will be updated; empty fields
    will be ignored.
