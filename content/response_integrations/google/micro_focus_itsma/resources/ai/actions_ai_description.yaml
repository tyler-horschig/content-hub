    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only makes a POST request to authenticate and retrieve a token to
      verify connectivity. It does not fetch contextual data for entities, mutate
      external data, mutate internal data, update entities, create insights, modify
      alert data, or create case comments.
