      Creates a new incident in Micro Focus ITSMA.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to an external system to create an incident
      (can_mutate_external_data=true). It does not fetch data, update entities, or
      create insights.
