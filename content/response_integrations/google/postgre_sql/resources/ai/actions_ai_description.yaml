Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a PostgreSQL database to ensure the integration is configured
    correctly and the database is reachable.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Server Address, Username,
    Password, Port, and Database Name).

    2. Attempts to establish a connection to the PostgreSQL database using the provided
    credentials via the `psycopg2` library.

    3. Closes the connection immediately upon successful authentication.

    4. Returns a success message if no exceptions are raised during the connection
    attempt.


    ### Additional Notes

    This is a standard utility action used primarily during integration setup to verify
    network connectivity and credential validity. It does not execute any queries
    or modify any data.
  ai_short_description: >-
    Tests connectivity to a PostgreSQL database by attempting to establish and immediately
    close a connection using the configured credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only establishes a connection to the PostgreSQL database and immediately
      closes it. It does not fetch contextual data, mutate external data, mutate internal
      data, update entities, create insights, modify alerts, or create case comments.
