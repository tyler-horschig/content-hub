Run SQL Query:
  ai_description: >-
    ### General Description

    Executes a specified SQL query on a PostgreSQL database. This action connects
    to the database using the provided credentials and executes the query, returning
    the results in JSON and CSV formats.


    ### Flow Description

    1. Connects to the PostgreSQL database using the integration configuration and
    the provided 'Database Name'.

    2. Executes the SQL query provided in the 'Query' parameter.

    3. If the query returns results (e.g., a SELECT statement), formats the output
    as a JSON object and a CSV data table.

    4. Returns the results to the SecOps platform.


    ### Additional Notes

    The action can execute any valid SQL query, including SELECT, INSERT, UPDATE,
    or DELETE, depending on the permissions of the provided credentials.
  ai_short_description: >-
    Executes a specified SQL query on a PostgreSQL database and returns the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action can execute any SQL query, including INSERT, UPDATE, or DELETE statements,
      which can modify data within the PostgreSQL database.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a SQL query which can fetch data (SELECT) or mutate external
      data (INSERT/UPDATE/DELETE) in the PostgreSQL database. It does not mutate internal
      SecOps data, update entities, create insights, modify alerts, or create case
      comments.
