Get Recent Indicators:
  ai_description: >-
    ### General Description

    Retrieves a list of recent malicious indicators from Area1 based on a specified
    time window. This action is useful for fetching global threat intelligence feeds
    or recent IOCs discovered by Area1 without needing specific input entities.


    ### Flow Description

    1. Initializes the Area1 manager using the provided integration configurations.

    2. Calculates the search start time by subtracting the `Seconds Back` parameter
    value from the current UTC time.

    3. Makes an HTTP GET request to the Area1 API (`/indicators` endpoint) to fetch
    indicators observed within the calculated timeframe.

    4. If indicators are found, formats the data into a CSV and attaches it as a data
    table to the action's results.

    5. Returns the raw indicator data as a JSON result for further playbook processing.


    ### Additional Notes

    This action does not operate on specific case entities. It performs a global query
    against the Area1 platform to retrieve recent threat data.
  ai_short_description: >-
    Retrieves a list of recent malicious indicators from Area1 within a specified
    timeframe.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
