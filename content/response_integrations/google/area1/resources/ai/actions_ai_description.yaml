Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Area1 service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Area1 API client.

    3. Makes a GET request to the Area1 `indicators` API endpoint, requesting indicators
    from the last second to verify connectivity.

    4. Returns a success message if the connection is established and the API responds
    successfully.


    ### Additional Notes

    This action is intended solely for testing integration connectivity and does not
    process entities or return data for case management.
