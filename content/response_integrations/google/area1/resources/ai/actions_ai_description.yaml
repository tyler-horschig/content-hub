    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the Area1 API to retrieve
      recent indicators. It does not perform any POST/PUT/DELETE requests to mutate
      external data, nor does it update internal entities, create insights, or modify
      alert data.
