Search Indicator:
  ai_description: >-
    ### General Description

    Searches for indicators (such as hash, URL, domain, IP, email) in Area 1 to retrieve
    threat intelligence and enrich entities. This action retrieves relevant indicator
    data and appends it to the entities within the Google SecOps platform.


    ### Flow Description

    1. Initializes the Area 1 manager using the provided integration configurations.

    2. Iterates through all target entities associated with the case.

    3. Makes a GET request to the Area 1 API (`search` endpoint) to search for each
    entity's identifier.

    4. If indicator data is found, it adds the data to the entity's additional properties,
    marks the entity as enriched, and creates an entity table with the flattened results.

    5. Updates the enriched entities in the Google SecOps platform.

    6. Returns a JSON result containing the retrieved indicator data for all processed
    entities.


    ### Additional Notes

    The action processes all target entities without filtering by specific entity
    types.
  ai_short_description: >-
    Searches for indicators in Area 1 to retrieve threat intelligence and enrich entities
    within the Google SecOps platform.
