Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, MAC Address, Hostname, URL, and File Hash entities using
    Trend Micro Apex Central. This action retrieves User-Defined Suspicious Object
    (UDSO) details and endpoint (Security Agent) information to provide additional
    context and threat intelligence.


    ### Flow Description

    1. Iterates over the target entities and filters for supported types (IP Address,
    MAC Address, Hostname, URL, File Hash).

    2. For applicable entities, makes an API call to Trend Micro Apex Central to fetch
    UDSO details.

    3. For applicable entities, makes an API call to Trend Micro Apex Central to fetch
    endpoint details and checks if the endpoint sensor is enabled.

    4. Enriches the entities with the retrieved UDSO and endpoint data.

    5. If configured, marks entities found in the UDSO list as suspicious.

    6. If configured, creates case insights summarizing the UDSO and endpoint findings.

    7. Updates the entities in the SecOps platform and attaches JSON results and data
    tables to the case wall.


    ### Additional Notes

    - Only SHA-1 hashes are supported for File Hash entities.

    - The action can optionally extract the domain from URL entities for UDSO enrichment.
