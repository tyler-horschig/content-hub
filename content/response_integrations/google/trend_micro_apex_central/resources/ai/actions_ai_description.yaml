Create File UDSO:
  ai_description: >-
    ### General Description

    Creates a User-Defined Suspicious Object (UDSO) based on a file in Trend Micro
    Apex Central.


    ### Flow Description

    1. Extracts the provided file paths, scan action, and optional note from the action
    parameters.

    2. Retrieves the list of existing file UDSOs from Trend Micro Apex Central to
    prevent duplicates.

    3. Iterates over each provided file path, calculates its SHA-1 hash, and checks
    if it already exists in the UDSO list.

    4. If the file does not exist, reads the file content, converts it to a base64
    string, and makes a PUT request to the Trend Micro Apex Central API to add the
    file as a UDSO with the specified action (e.g., Block, Log, Quarantine).

    5. Retrieves the JSON results for the successfully added files and returns them
    to the platform.


    ### Additional Notes

    The action requires the specified file paths to be accessible to the script execution
    environment.
