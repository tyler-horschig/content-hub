Create Entity UDSO:
  ai_description: >-
    ### General Description

    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central based
    on the provided entities (IP, URL, or SHA-1 Hash). This action allows analysts
    to block or log activity associated with specific indicators of compromise.


    ### Flow Description

    1. Retrieves the list of existing UDSO entries from Trend Micro Apex Central.

    2. Iterates through the target entities and filters for supported types (IP, URL,
    File Hash).

    3. Validates the entities (e.g., checks if the hash is SHA-1, if the IP is IPv4,
    and if the URL is valid).

    4. Checks if the entity already exists in the UDSO list.

    5. If it does not exist, makes a PUT request to the Trend Micro Apex Central API
    to add the entity as a UDSO with the specified scan action (Block or Log), note,
    and expiration.

    6. Retrieves the updated UDSO list to fetch the JSON results of the successfully
    added entities and attaches them to the action result.


    ### Additional Notes

    Only SHA-1 hashes and IPv4 addresses are supported by this action.
  ai_short_description: >-
    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central for
    IP, URL, and SHA-1 Hash entities to block or log their activity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the entity as a User-Defined Suspicious Object (UDSO) in Trend Micro Apex
      Central.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Trend Micro Apex Central API to add a
      new UDSO entry, mutating external data. It does not fetch contextual data for
      enrichment, update internal entities, create insights, or modify alert data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
