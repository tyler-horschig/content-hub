Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Trend Micro Apex Central server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, Application
    ID, API Key, Verify SSL).

    2. Initializes the `TrendMicroApexCentralManager` with the extracted parameters.

    3. Executes the `test_connectivity` method, which makes a GET request to the `/WebApp/API/ServerResource/ProductServers`
    API endpoint.

    4. Evaluates the response and returns a success message if the connection is established,
    or an error message if it fails.


    ### Additional Notes

    This action does not interact with any entities or case data. It is solely used
    to verify that the integration is configured correctly and can successfully authenticate
    and communicate with the Trend Micro Apex Central API.
