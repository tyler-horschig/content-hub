  ai_description: >-
    ### General Description

    Isolates endpoints in Trend Micro Apex Central. This action initiates a state
    change on the external device to prevent network traffic to or from the specified
    entity. Supported entities: IP Address, Hostname, MAC Address.


    ### Flow Description

    1. Iterates over the supported target entities (IP Address, Hostname, MAC Address).

    2. Initiates an isolation request for each endpoint via the Trend Micro Apex Central
    API.

    3. Periodically queries the isolation status of the pending endpoints asynchronously.

    4. Completes when all endpoints are successfully isolated or marked as failed/unsupported.


    ### Additional Notes

    This action is asynchronous and can take several minutes to finish. Consider increasing
    the timeout in the IDE if necessary.
