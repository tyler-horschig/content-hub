  ai_description: >-
    ### General Description

    Unisolates endpoints in Trend Micro Apex Central. This action restores network
    connectivity to previously isolated endpoints. Supported entities are IP Address,
    Hostname, and MAC Address.


    ### Flow Description

    1. Iterates over the target entities and filters them to include only supported
    types (IP Address, Hostname, MAC Address).

    2. For each supported entity, initiates an unisolation request via the Trend Micro
    Apex Central API (`POST /WebApp/API/AgentResource/ProductAgents`).

    3. Since unisolation can take time, the action runs asynchronously and periodically
    queries the API (`GET /WebApp/API/AgentResource/ProductAgents`) to check the isolation
    status of the pending endpoints.

    4. The action completes when all requested endpoints have successfully unisolated
    or failed.


    ### Additional Notes

    This action can take several minutes to finish, so consider increasing the timeout
    in the IDE if necessary.
