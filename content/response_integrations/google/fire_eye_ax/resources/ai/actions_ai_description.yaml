Get Appliance Details:
  ai_description: >-
    ### General Description

    Retrieves configuration and status details about the connected FireEye AX appliance.
    This action is useful for verifying the system state or extracting global configuration
    data from the FireEye AX platform.


    ### Flow Description

    1. Initializes the connection to the FireEye AX appliance using the integration-level
    credentials.

    2. Sends an HTTP GET request to the FireEye AX configuration API endpoint (`wsapis/v2.0.0/config`).

    3. Retrieves the appliance details and attaches the raw response to the action's
    JSON result.

    4. Returns a success message upon completion.


    ### Additional Notes

    This action does not operate on any specific entities or alerts. It is a system-level
    operation that fetches global appliance data.
  ai_short_description: >-
    Retrieves configuration and status details about the connected FireEye AX appliance
    and attaches the data to the action's JSON result.
