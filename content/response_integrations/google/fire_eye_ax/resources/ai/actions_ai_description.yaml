Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye AX server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEye AX manager and obtains an authentication token via
    a POST request to the `/wsapis/v2.0.0/auth/login` endpoint.

    3. Makes a GET request to the `/wsapis/v2.0.0/config` endpoint to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can successfully communicate with the FireEye AX API.
