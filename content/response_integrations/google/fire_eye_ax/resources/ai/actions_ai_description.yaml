  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Paths | String | Yes | Specify a comma-separate list of absolute file paths
    for submission. |

    | VM Profile | String | Yes | Specify the virtual machine profile that should
    be used during analysis. Available VM profiles are available in the action "Get
    Appliance Details". |

    | Application ID | String | No | Specify the ID of the application that needs
    to be used during the analysis of the file. By default, FireEye AX will select
    the needed application automatically. |

    | Priority | Dropdown | No | Specify the priority for the submission. "Normal"
    puts submission at the bottom of the queue, while "Urgent" puts submission at
    the top of the queue. |

    | Force Rescan | Boolean | No | If enabled, action will force FireEye AX to rescan
    the submitted file. |

    | Analysis Type | Dropdown | No | Specify the type of the analysis. If "Live"
    is selected, FireEye AX will analyze suspected files live within the Malware Analysis
    Multi-Vector Virtual Execution (MVX) analysis engine. If "Sandbox" is selected
    FireEye AX will analyze suspected files in a closed, protected environment. |

    | Create Insight | Boolean | Yes | If enabled, action will create an insight containing
    information about the submitted file. |
Submit URL:
  ai_description: >-
    ### General Description

    Submits URL entities to FireEye AX for malware analysis and enriches the entities
    with the analysis results. This action operates asynchronously, initiating the
    analysis job and subsequently polling the external system until the analysis is
    complete.


    ### Flow Description

    1. Iterates over the target entities and filters for URL entities.

    2. Submits each URL to FireEye AX for analysis via a POST request to the `wsapis/v2.0.0/submissions/url`
    endpoint.

    3. Polls the status of the submission asynchronously using a GET request to the
    `wsapis/v2.0.0/submissions/status/{submission_id}` endpoint.

    4. Once the submission is complete, retrieves the detailed analysis results via
    a GET request to the `wsapis/v2.0.0/submissions/results/{result_id}` endpoint.

    5. Enriches the URL entities with the retrieved threat intelligence (e.g., malicious
    status, severity, OS changes).

    6. Optionally creates an insight for each successfully analyzed URL containing
    the analysis details.


    ### Additional Notes

    - This action runs asynchronously. Ensure the script timeout value in the IDE
    is adjusted as needed to accommodate the analysis duration.

    - The action requires a valid VM Profile to be specified for the analysis.
  ai_short_description: >-
    Submits URL entities to FireEye AX for malware analysis and enriches the entities
    with the analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
