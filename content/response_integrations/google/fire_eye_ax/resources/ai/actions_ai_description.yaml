    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action uploads a file to the FireEye AX sandbox for analysis and retrieves
      the behavior report. This directly matches the 'Submit File' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
