Submit File:
  ai_description: >-
    ### General Description

    Submits specified files to FireEye AX for malware analysis. This action uploads
    files to the FireEye AX sandbox environment, monitors the analysis progress asynchronously,
    and retrieves the final behavior report and threat intelligence.


    ### Flow Description

    1. Parses the provided comma-separated list of file paths.

    2. Initiates an asynchronous submission to FireEye AX by making a POST request
    (`wsapis/v2.0.0/submissions`) for each file.

    3. Periodically checks the submission status and retrieves the analysis results
    via a GET request (`wsapis/v2.0.0/submissions/results/{result_id}`).

    4. If the `Create Insight` parameter is enabled, generates a case insight containing
    the analysis details (e.g., malicious status, severity, executed processes).

    5. Attaches the detailed analysis results as JSON to the action's output.


    ### Additional Notes

    This action runs asynchronously. Ensure that the script timeout value in the IDE
    is adjusted appropriately to allow sufficient time for the sandbox analysis to
    complete.
  ai_short_description: >-
    Submits specified files to the FireEye AX sandbox for malware analysis and retrieves
    the resulting behavior report.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the FireEye AX sandbox, creating a new analysis job/submission
      on the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving submission results from FireEye AX. It
      mutates external data by submitting a file to the sandbox, which creates a new
      analysis job on the external system. It does not mutate internal data or update
      entities, but it can create case insights based on the 'Create Insight' parameter.
  entity_usage:
