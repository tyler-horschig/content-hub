Search Log Events:
  ai_description: >-
    ### General Description

    Searches for log events in AWS CloudWatch based on specified criteria such as
    log group, log streams, time frame, and custom filters. The action retrieves historical
    logs matching the search parameters and returns them for further analysis.


    ### Flow Description

    1. Extracts the action parameters including the target log group, log streams,
    time frame, and custom filters.

    2. Calculates the start and end times for the search based on the provided time
    frame or custom start/end times.

    3. Makes an API call (`filter_log_events`) to AWS CloudWatch to search for log
    events matching the specified criteria.

    4. Parses the retrieved log events and adds them to the action's JSON results
    and as a CSV data table.


