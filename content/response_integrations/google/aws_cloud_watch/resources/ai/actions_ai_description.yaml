  ai_description: >-
    ### General Description

    Tests connectivity to the AWS CloudWatch service using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the AWS Access Key ID, AWS Secret Key, and AWS Default Region from
    the integration configuration.

    2. Initializes the AWS CloudWatch manager.

    3. Executes an API call (`describe_log_groups` with a limit of 1) to verify connectivity
    to the AWS CloudWatch service.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
