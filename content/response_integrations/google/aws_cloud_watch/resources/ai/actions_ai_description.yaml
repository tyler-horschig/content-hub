    2. Extracts the `Max Groups To Return` parameter to determine the limit of log
    groups to fetch.

    3. Validates that the requested number of groups is greater than the minimum allowed.

    4. Makes an API call to AWS CloudWatch (`describe_log_groups`) to retrieve the
    list of log groups.

    5. Parses the response and constructs JSON and CSV representations of the log
    groups.

