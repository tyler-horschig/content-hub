    1. Extracts the `Log Group Name` and `Log Stream Name` from the action parameters.

    2. Initializes the AWS CloudWatch manager using the integration's configured credentials.

    3. Makes an API call (`delete_log_stream`) to AWS CloudWatch to delete the specified
    log stream from the given log group.

    4. Returns a success message if the deletion is successful, or an error message
    if the log group or stream is not found.


