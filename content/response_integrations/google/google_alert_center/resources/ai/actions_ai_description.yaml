Delete Alert:
  ai_description: >-
    ### General Description

    Deletes a specific alert in Google Alert Center. Note that it takes 30 days for
    the alert to fully disappear in Google Alert Center, and before that time, it
    can still be recovered.


    ### Flow Description

    1. Extracts the `Alert ID` parameter provided in the action configuration.

    2. Initializes the Google Alert Center manager using the integration's service
    account credentials.

    3. Makes a `DELETE` HTTP request to the Google Alert Center API (`alerts/{alert_id}`)
    to delete the specified alert.

    4. Returns a success message if the alert is successfully deleted or if the alert
    does not exist.


    ### Additional Notes

    - If the alert is not found, the action still completes successfully and returns
    a message indicating the alert doesn't exist.
  ai_short_description: >-
    Deletes a specific alert in Google Alert Center based on the provided Alert ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a specific alert in Google Alert Center.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a DELETE request to the Google Alert Center API to delete an
      alert, which mutates external data. It does not fetch contextual data, mutate
      internal SecOps data, update entities, or create insights.
