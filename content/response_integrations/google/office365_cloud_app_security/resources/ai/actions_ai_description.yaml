Close Alert:
  ai_description: >-
    ### General Description

    Closes a specific alert in Microsoft Cloud App Security. This action updates the
    state of an external alert to True Positive, Benign, or False Positive, and allows
    the user to provide a resolution reason and comment.


    ### Flow Description

    1. Extracts the `Alert ID`, `State`, `Reason`, and `Comment` from the action parameters.

    2. Validates and maps the provided `State` and `Reason` to the corresponding Microsoft
    Cloud App Security API values.

    3. Makes a POST request to the Microsoft Cloud App Security API (`/api/v1/alerts/{state}/`)
    to close the specified alert.

    4. Returns a success message if the alert is closed successfully, or an error
    message if the operation fails.


    ### Additional Notes

    - The "Reason" parameter does not have an impact if the state is set to "True
    Positive".

    - If an invalid reason is provided for a specific state, the action will fail
    and list the valid reasons.
