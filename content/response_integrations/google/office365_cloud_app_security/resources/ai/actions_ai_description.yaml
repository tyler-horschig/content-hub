Bulk Resolve Alert:
  ai_description: >-
    ### General Description

    Resolves one or more alerts in Microsoft Cloud App Security (Office 365 Cloud
    App Security). Note: This action is deprecated; users should refer to the "Close
    Alert" action instead.


    ### Flow Description

    1. Extracts the provided `Alert ID` (which can be a comma-separated list) and
    an optional `Comment`.

    2. Splits the comma-separated Alert IDs into a list.

    3. Makes a POST request to the Microsoft Cloud App Security API (`/api/v1/alerts/resolve/`)
    to bulk resolve the specified alerts with the provided comment.

    4. Returns a success message indicating the alerts were resolved successfully.


