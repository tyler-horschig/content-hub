Add IP To IP Address Range:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to an existing IP address range in Microsoft
    Cloud App Security.


    ### Flow Description

    1. Retrieves the list of IP address ranges from Microsoft Cloud App Security to
    find the one matching the provided `Name` parameter.

    2. Iterates through the provided target entities, filtering for IP addresses.

    3. For each IP address, checks if it is already included in the subnets of the
    target IP address range.

    4. If the IP address is not present, makes an API call to update the IP address
    range in Microsoft Cloud App Security, appending the new IP address to its subnets.

    5. Returns the updated IP address range details as a JSON result.


    ### Additional Notes

    Due to API behavior, the action temporarily renames the IP address range during
    the update process and then immediately reverts it to its original name to ensure
    the update is processed correctly.
  ai_short_description: >-
    Adds specific IP address entities to a designated IP address range in Microsoft
    Cloud App Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an IP address range in Microsoft Cloud App Security by adding the specified
      IP addresses to its subnets.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Microsoft Cloud App Security API to update
      an IP address range, adding the target IP addresses to its subnets. This mutates
      external data. It does not fetch contextual data for enrichment, nor does it
      update internal entities, create insights, or modify alert data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
