Create IP Address Range:
  ai_description: >-
    ### General Description

    Creates a new IP address range in Microsoft Cloud App Security. This action allows
    users to define a new subnet or group of subnets with a specific category, organization,
    and tags directly within the Microsoft Cloud App Security platform.


    ### Flow Description

    1. Extracts the provided parameters including Name, Category, Organization, Subnets,
    and Tags.

    2. Converts the comma-separated strings for Subnets and Tags into lists.

    3. Maps the selected Category to its corresponding internal integer value.

    4. Makes a POST request to the Microsoft Cloud App Security API (`/api/v1/subnet/create_rule/`)
    to create the new IP address range.

    5. Retrieves the newly created IP address range object using its ID and attaches
    it to the action's JSON result.


    ### Additional Notes

    This action does not operate on SecOps entities. It is a configuration management
    action used to update the external platform's network definitions.
