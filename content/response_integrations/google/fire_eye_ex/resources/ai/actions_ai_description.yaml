Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye EX server to ensure that the integration is
    configured correctly and can communicate with the external service.


    ### Flow Description

    1. Initializes the connection using the integration's configured API Root, Username,
    Password, and SSL verification settings.

    2. Attempts to authenticate by making a POST request to the `/auth/login` endpoint
    to retrieve an API token.

    3. Immediately makes a POST request to the `/auth/logout` endpoint to invalidate
    the session and confirm full communication capabilities.

    4. Returns a success status if both operations complete without errors, or a failure
    status if an exception occurs.


    ### Additional Notes

    This action relies entirely on the integration-level configuration and does not
    require any action-specific parameters or entities to run.
