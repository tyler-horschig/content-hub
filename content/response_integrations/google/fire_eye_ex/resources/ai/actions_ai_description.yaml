List Quarantined Emails:
  ai_description: >-
    ### General Description

    Lists quarantined emails from FireEye EX based on specified filters such as time
    range, sender, and subject.


    ### Flow Description

    1. Initializes connection to FireEye EX using provided credentials.

    2. Extracts action parameters including Start Time, End Time, Sender Filter, Subject
    Filter, and Max Email to Return.

    3. Makes a GET request to the `/emailmgmt/quarantine` API endpoint with the specified
    filters.

    4. Retrieves the list of quarantined emails.

    5. Outputs the results as a JSON array and constructs a CSV table for the case
    wall.


    ### Additional Notes

    If Start Time and End Time are not specified, the action returns quarantined emails
    from the last 24 hours. The maximum number of emails to return is limited to 10000
    by FireEye EX.
