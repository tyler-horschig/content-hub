Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads alert artifacts from FireEye EX based on a provided Alert UUID. The
    action retrieves the artifacts as a ZIP file, attaches it to the case, and optionally
    saves it to a specified local path.


    ### Flow Description

    1. Initializes the FireEye EX manager with the provided API credentials.

    2. Makes a GET request to the FireEye EX API (`/artifacts/{alert_uuid}`) to download
    the artifacts associated with the specified Alert UUID.

    3. Attaches the downloaded ZIP file to the case in Google SecOps.

    4. If a download path is specified, saves the ZIP file to the local disk and returns
    the absolute file path in the JSON result.


    ### Additional Notes

    If the file size is too large, the action will fail to attach it to the case.
