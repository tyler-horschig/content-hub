Delete Quarantined Email:
  ai_description: >-
    ### General Description

    Deletes a specific quarantined email from FireEye EX. This action initiates a
    state change on the external system to permanently remove the email associated
    with the provided queue ID.


    ### Flow Description

    1. Initializes the FireEye EX API client using the provided integration configuration.

    2. Extracts the `Queue ID` parameter provided by the user or playbook.

    3. Makes a POST request to the FireEye EX API (`/emailmgmt/quarantine/delete`)
    to delete the specified quarantined email.

    4. Returns a success message if the deletion is successful, or an error message
    if the operation fails.


    ### Additional Notes

    This action requires the exact Queue ID of the quarantined email to perform the
    deletion.
