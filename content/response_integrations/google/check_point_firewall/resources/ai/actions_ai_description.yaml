Download Log Attachment:
  ai_description: >-
    ### General Description

    Downloads log attachments from CheckPoint FireWall based on provided log IDs.
    The action retrieves the specified log attachments, saves them to a designated
    local folder, and can optionally attach them to the case wall if they meet the
    size criteria.


    ### Flow Description

    1. Initializes the CheckPoint FireWall manager with the provided integration credentials.

    2. Iterates over the provided comma-separated list of `Log IDs`.

    3. Calls the CheckPoint API (`get-attachment`) to initiate a task for retrieving
    the attachment associated with each log ID.

    4. Monitors the progress of the tasks using the `show-task` API until they are
    completed.

    5. Retrieves the task details and extracts the base64-encoded file content for
    each successfully processed log.

    6. Decodes and saves the attachments to the specified `Download Folder Path` on
    the local system.

    7. If `Create Case Wall Attachment` is enabled, evaluates the size of each downloaded
    file. If the file is under 3 MB, it is attached to the action's results (case
    wall).

    8. Returns the parsed task and attachment details as a JSON result.


    ### Additional Notes

    Ensure that the provided `Download Folder Path` exists and is writable by the
    execution environment. The CheckPoint FireWall API processes these requests asynchronously,
    so the action will wait for the tasks to complete before downloading the files.
  ai_short_description: >-
    Downloads log attachments from CheckPoint FireWall based on provided log IDs,
    saves them to a local directory, and optionally attaches them to the case wall.
  capabilities:
    can_create_case_comments: false
