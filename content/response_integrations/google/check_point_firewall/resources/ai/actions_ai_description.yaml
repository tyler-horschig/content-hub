Add Ip To Group:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to a designated Checkpoint Firewall group. This
    action initiates a state change on the external firewall device to block or categorize
    network traffic associated with the specified IP addresses.


    ### Flow Description

    1. Initializes the Checkpoint Firewall manager with the provided integration credentials.

    2. Iterates through all target entities, filtering specifically for IP Address
    entities.

    3. For each IP address, checks if the specified group exists and is editable via
    the Checkpoint API.

    4. Verifies if the IP address object already exists on the firewall. If it does
    not exist, it creates a new address range object.

    5. Adds the IP address object to the specified firewall group.

    6. Publishes the changes and installs the policy on the firewall to apply the
    updates.


    ### Additional Notes

    Changes made to the firewall group will only become effective after the policy
    is successfully installed during the final step of the action.
  ai_short_description: >-
    Adds specific IP address entities to a designated Checkpoint Firewall group.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
