Add a SAM Rule:
  ai_description: >-
    ### General Description

    Adds a Suspicious Activity Monitoring (SAM) rule to a Checkpoint Firewall. This
    action allows analysts to block, reject, or notify on specific network traffic
    based on source/destination IPs, netmasks, ports, and protocols.


    ### Flow Description

    1. Extracts the provided parameters including the target Security Gateway, IPs,
    ports, protocols, and rule actions.

    2. Connects to the Checkpoint Firewall API.

    3. Constructs the SAM rule criteria and command based on the provided parameters.

    4. Executes the `run-script` command via the API on the specified Security Gateway
    to add the SAM rule.

    5. Waits for the task to complete and publishes the changes to the firewall.

    6. Returns the task execution details and status.


    ### Additional Notes

    The action supports various combinations of IP, netmask, port, and protocol. Refer
    to Checkpoint documentation for valid criteria combinations.
