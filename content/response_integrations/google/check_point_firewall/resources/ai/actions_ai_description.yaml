    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP address objects to a specified group on the Checkpoint Firewall, publishes
      the changes, and installs the policy.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs POST requests to the Checkpoint Firewall API to create address
      objects, add them to a group, publish changes, and install a policy. This mutates
      external data. It does not fetch contextual enrichment data, nor does it update
      internal entities, create insights, or modify alert data.
