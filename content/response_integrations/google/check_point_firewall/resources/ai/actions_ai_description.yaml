Add Url To Group:
  ai_description: >-
    ### General Description

    Adds specific URL entities to a designated Checkpoint Firewall group. This action
    is typically used to update security controls by adding URLs to a blocklist or
    specific policy group.


    ### Flow Description

    1. Initializes the Checkpoint Firewall manager using the provided integration
    configuration.

    2. Iterates through the target entities, filtering specifically for URL entities.

    3. For each URL, the action checks if the specified application site group exists
    and is editable via the Checkpoint API.

    4. If the URL does not already exist as an application site, it creates a new
    application site for it.

    5. Adds the application site (URL) to the specified Checkpoint Firewall group.

    6. Publishes the changes to the firewall.

    7. Installs the specified policy to apply the changes effectively.


    ### Additional Notes

    Changes made by this action will only be effective after the policy is successfully
    installed on the Checkpoint Firewall.
