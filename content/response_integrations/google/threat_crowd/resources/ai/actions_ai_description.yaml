EnrichEntities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using ThreatCrowd. This action retrieves
    threat intelligence reports to quickly identify related infrastructure and malware.
    It updates the entity's properties, marks it as suspicious if malicious votes
    are found, and attaches the analysis results as entity tables and links.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Filters entities by type, specifically targeting IP Addresses and Hostnames.

    3. Makes an HTTP GET request to the ThreatCrowd API to fetch a threat intelligence
    report for each valid entity.

    4. Updates the entity's `additional_properties` with the flattened report data.

    5. Marks the entity as suspicious if the report indicates a malicious vote.

    6. Attaches the report data as an entity table and adds a web link to the full
    details.

    7. Updates the entities within the Google SecOps platform and returns the raw
    JSON results.


    ### Additional Notes

    This action relies on the ThreatCrowd integration configuration for SSL verification
    settings.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving threat intelligence reports
    from ThreatCrowd to identify related infrastructure and malware.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the ThreatCrowd API to fetch threat
      intelligence reports (fetches_data=true). It does not mutate external data.
      It updates internal entities by modifying their properties and calling `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
