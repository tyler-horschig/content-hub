    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches threat intelligence data (related infrastructure, malware,
      malicious votes) for IP addresses and hostnames from ThreatCrowd. This directly
      matches the 'Enrich IOC' expected outcome. It does not modify external systems,
