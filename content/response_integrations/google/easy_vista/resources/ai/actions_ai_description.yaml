Wait for the Ticket Update:
  ai_description: >-
    ### General Description

    Pauses playbook execution to periodically monitor a specific EasyVista ticket
    for updates. The action checks a specified field (Status, Comment, or Actions)
    and completes only when a change is detected, returning the updated ticket information.


    ### Flow Description

    1. Connects to the EasyVista API to fetch the initial state of the specified ticket
    field (Status, Comment, or Actions) using a GET request.

    2. Saves the initial state and pauses the playbook execution (asynchronous operation).

    3. Periodically reconnects to EasyVista to re-fetch the ticket data.

    4. Compares the newly fetched data with the initial state.

    5. If an update is detected, the action completes successfully and outputs the
    updated ticket information as a JSON result.


    ### Additional Notes

    This is an asynchronous action that will continue to run in the background until
    the monitored ticket field is updated or the action reaches its configured timeout
    limit.
  ai_short_description: >-
