Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the EasyVista instance using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Account ID, Username,
    Password, Verify SSL).

    2. Initializes the EasyVista manager with the extracted credentials.

    3. Makes a GET request to the EasyVista API (`/requests?max_rows=1`) to verify
    connectivity.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can successfully communicate with the EasyVista server. It does not require
