Get EasyVista Ticket:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific ticket from EasyVista. This action
    connects to the EasyVista API to gather comprehensive details regarding a ticket,
    including its general status, description, comments, actions, and attachments.


    ### Flow Description

    1. Extracts the provided `Ticket Identifier` from the action parameters.

    2. Initializes the EasyVista API client using the integration configuration.

    3. Makes multiple GET requests to the EasyVista API to fetch the ticket's general
    information, description, comments, actions, and attachments.

    4. Aggregates the retrieved data into a single structured object.

    5. Outputs the aggregated ticket information as a JSON result and attaches a formatted
    data table to the action results.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It requires a specific
    ticket identifier (e.g., rfc_number) to be explicitly provided in the parameters.
