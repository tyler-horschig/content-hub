Close EasyVista Ticket:
  ai_description: >-
    ### General Description

    Closes a specific ticket in EasyVista based on the provided ticket identifier.
    This action updates the external ITSM system to mark the ticket as closed, optionally
    adding a comment, setting a close date, and deleting ongoing actions.


    ### Flow Description

    1. Extracts the action parameters including the ticket identifier, comment, close
    date, and the flag to delete ongoing actions.

    2. Validates the provided `Actions Close Date` format (MM/DD/YYYY HH:MM:SS). If
    incorrect, it defaults to the current time.

    3. Initiates a PUT request to the EasyVista API (`/requests/{ticket_id}`) to close
    the specified ticket with the provided details.

    4. Returns a success message if the ticket is closed successfully, or an error
    message if the operation fails.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It relies solely on the
    provided ticket identifier.
