Add Comment to Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to a specified EasyVista ticket. This action interacts with the
    EasyVista API to append user-provided text to an existing ticket's comment thread.


    ### Flow Description

    1. Extracts the EasyVista ticket identifier and the comment text from the action
    parameters.

    2. Initializes the EasyVista API client using the provided integration credentials.

    3. Makes a PUT request to the EasyVista API to update the ticket with the new
    comment.

    4. Returns a success message if the comment is added, or an error message if the
    operation fails.


    ### Additional Notes

    This action does not operate on Siemplify entities; it relies entirely on the
    provided action parameters.
  ai_short_description: >-
    Adds a comment to a specified EasyVista ticket.
