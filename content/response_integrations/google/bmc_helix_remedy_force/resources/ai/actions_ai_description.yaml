Get OAuth Refresh Token:
  ai_description: >-
    ### General Description

    Generates an OAuth refresh token for BMC Helix Remedyforce using an authorization
    code. This action is typically used during the initial setup of the integration
    to obtain the necessary credentials for authentication.


    ### Flow Description

    1. Extracts the Client ID, Client Secret, and Login API Root from the integration
    configuration.

    2. Extracts the Redirect URL and Authorization Code from the action parameters.

    3. Makes an HTTP POST request to the BMC Helix Remedyforce OAuth endpoint (`/services/oauth2/token`)
    to exchange the authorization code for a refresh token.

    4. Returns the generated token information as a JSON result.


    ### Additional Notes

    Authorization code can be generated using the "Get OAuth Authorization Code" action.
