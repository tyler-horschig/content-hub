Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom SOQL query in BMC Helix Remedyforce and returns the results.
    This action allows users to retrieve specific records or data points from the
    Remedyforce platform using standard SOQL syntax.


    ### Flow Description

    1. Extracts the custom SOQL query from the action parameters.

    2. Authenticates with the BMC Helix Remedyforce API.

    3. Executes the provided SOQL query via an HTTP GET request to the Remedyforce
    query endpoint.

    4. If records are found, attaches the raw JSON response to the action results
    and constructs a data table for easy viewing.

    5. Returns a success message if the query executes successfully, or an error message
    if it fails.


    ### Additional Notes

    Ensure that the provided SOQL query is valid and that the authenticated user has
    the necessary permissions to access the queried objects and fields.
