Delete Record:
  ai_description: >-
    ### General Description

    Deletes a specific record in BMC Helix Remedyforce based on the provided Record
    Type and Record ID.


    ### Flow Description

    1. Extracts the `Record Type` and `Record ID` parameters.

    2. Initializes the BMC Helix Remedyforce manager with the provided credentials.

    3. Makes a DELETE API call to the BMC Helix Remedyforce endpoint to delete the
    specified record.

    4. Returns a success message if the record is deleted, or an error message if
    the record or record type is not found.


