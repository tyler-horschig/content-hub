    ### General Description

    Waits for specific fields of a record in BMC Helix Remedyforce to be updated to
    expected values. This is an asynchronous action that periodically checks the external
    system until the conditions are met or a timeout occurs.


    ### Flow Description

    1. Parses and validates the provided JSON payload containing the fields and their
    expected values.

    2. On the initial run, makes a GET request to the BMC Helix Remedyforce API to
    fetch the record details and verifies that the specified fields exist in the record's
    structure.

    3. In subsequent asynchronous runs, periodically fetches the record details again.

    4. Compares the current values of the specified fields against the expected values.

    5. If all fields match the expected values, the action completes successfully
    and returns the record details as a JSON result. Otherwise, it continues waiting.


    ### Additional Notes

