    Generates an OAuth authorization code URL for BMC Helix Remedyforce. This action
    constructs a specific URL that a user can visit to authorize the application and
    retrieve an authorization code.


    ### Flow Description

    1. Extracts the API Root and Client ID from the integration configuration.

    2. Extracts the Redirect URL from the action parameters.

    3. Constructs the authorization URL using the provided parameters.

    4. Adds the generated URL as a link to the action results for the user to access.


    ### Additional Notes

    This action does not make any external API calls. The user must manually copy
    and paste the generated URL into a web browser to authenticate and obtain the
    authorization code. This code is subsequently required for the "Get OAuth Refresh
