Create Record:
  ai_description: >-
    ### General Description

    Creates a new record in BMC Helix Remedyforce. This action allows users to generate
    various types of records (such as incidents or tasks) within the ITSM platform
    by providing a specific record type and a JSON payload containing the required
    fields.


    ### Flow Description

    1. Extracts the `Record Type` and `Record Payload` parameters.

    2. Validates that the provided `Record Payload` is a properly formatted JSON object.

    3. Initiates a POST request to the BMC Helix Remedyforce API (`/services/data/v51.0/sobjects/{record_type}`)
    to create the new record.

    4. Retrieves the response from the API and attaches the created record details
    to the action's JSON result.


    ### Additional Notes

    - Ensure that the `Record Type` provided exists in your BMC Helix Remedyforce
    instance. You can use the "List Record Types" action to find available types.

    - The `Record Payload` must strictly adhere to valid JSON syntax and match the
    schema expected by the specified record type.
  ai_short_description: >-
    Creates a new record of a specified type in BMC Helix Remedyforce using a provided
    JSON payload.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new record of the specified type in BMC Helix Remedyforce.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the BMC Helix Remedyforce API to create a
      new record, which mutates external data. It does not fetch contextual data for
      enrichment, update internal entities, create insights, or modify alert data.
