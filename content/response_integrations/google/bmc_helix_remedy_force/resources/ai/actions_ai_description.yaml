    ### General Description

    Executes a SOQL query in BMC Helix Remedyforce based on the provided parameters
    to retrieve specific records. This action allows users to query various record
    types, apply filters, and specify the exact fields to return.


    ### Flow Description

    1. Extracts configuration and action parameters, including the record type, filters,
    time frame, and sorting options.

    2. Validates the provided limits and custom time frame parameters to ensure they
    are correctly formatted and within allowed bounds.

    3. Constructs a SOQL query using the provided parameters.

    4. Makes a GET request to the BMC Helix Remedyforce API (`/services/data/v51.0/query/`)
    to execute the constructed query.

    5. Parses the returned records and adds them to the action's JSON result and a
    formatted data table.


    ### Additional Notes

    - If "Custom" is selected for the "Time Frame" parameter, the "Start Time" parameter
    becomes mandatory.

    - The "Fields To Return" parameter accepts a comma-separated list of fields. If
    left empty, all fields will be returned.
