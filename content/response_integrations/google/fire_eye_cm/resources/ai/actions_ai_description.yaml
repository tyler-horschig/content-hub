Add Rule To Custom Rules File:
  ai_description: >-
    ### General Description

    Adds a new rule to an existing custom Snort rules file on a specified sensor in
    FireEye CM.


    ### Flow Description

    1. Initializes a connection to the FireEye CM API.

    2. Identifies the target sensor. If no sensor name is provided, it automatically
    discovers a suitable FireEye NX appliance.

    3. Downloads the existing custom Snort rules file from the target sensor.

    4. Appends the provided rule to the downloaded file locally.

    5. Uploads the updated custom rules file back to the FireEye CM sensor.

    6. Cleans up temporary files.


    ### Additional Notes

    The custom rules file must already exist on the sensor for this action to work
    successfully.
