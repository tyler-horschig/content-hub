Add IOC Feed:
  ai_description: >-
    ### General Description

    Adds a new custom IOC feed in FireEye CM based on the provided entities. This
    action supports Address, URL, and FileHash entities, allowing analysts to quickly
    update security controls to alert on or block specific indicators.


    ### Flow Description

    1. Filters the target entities to include only Address, URL, and FileHash types.

    2. Iterates over the suitable entities.

    3. If the entity is a URL and the `Extract Domain` parameter is enabled, extracts
    the domain portion from the URL.

    4. Creates a temporary file containing the entity identifier.

    5. Makes a POST request to the FireEye CM API to add the IOC feed, applying the
    specified action (Alert or Block) and any provided comments.

    6. Returns the names of the successfully created feeds as JSON results.


    ### Additional Notes

    Only MD5 and SHA256 hashes are supported for FileHash entities.
  ai_short_description: >-
    Adds a new custom IOC feed in FireEye CM based on Address, URL, and FileHash entities
    to alert on or block specific indicators.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new custom IOC feed to FireEye CM based on the provided entities.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the FireEye CM API to add a new custom IOC
      feed based on the provided entities. It mutates external data by creating these
      feeds but does not fetch data, update internal entities, or create insights.
