  ai_description: >-
    ### General Description

    Downloads alert artifacts from FireEye CM as a zip file and saves them to a specified
    local folder path.


    ### Flow Description

    1. Initializes the FireEye CM manager with the provided credentials.

    2. Validates the provided download folder path to ensure it exists and is a directory.

    3. Makes an API call to FireEye CM (`GET wsapis/v2.0.0/artifacts/{alert_uuid}`)
    to download the artifacts for the specified Alert UUID.

    4. Saves the downloaded zip file to the local file system at the specified path.

    5. Returns the absolute file path in the JSON results.


    ### Additional Notes

    If the `Overwrite` parameter is set to false and the file already exists at the
    destination path, the action will fail.
