Submit File:
  ai_description: >-
    ### General Description

    Uploads a specified file to Symantec Content Analysis for scanning and retrieves
    its reputation score. The action evaluates the returned score to determine the
    threat level and generates case insights if the file is found to be suspicious
    or malicious.


    ### Flow Description

    1. Retrieves the `File Path` from the action parameters.

    2. Reads the file from the local file system and submits it to the Symantec Content
    Analysis API via a POST request (`rapi/cas/scan`).

    3. Parses the API response to extract the file reputation score.

    4. Evaluates the score: if it is between 2 and 6, a "Suspicious" case insight
    is created; if it is between 7 and 10, a "Malicious" case insight is created.

    5. Returns the reputation score and a success message to the SOAR platform.


    ### Additional Notes

    The action requires the file to be accessible on the host executing the script
    at the specified file path.
  ai_short_description: >-
    Uploads a file to Symantec Content Analysis for scanning, retrieves its reputation
    score, and generates case insights based on the threat level.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
