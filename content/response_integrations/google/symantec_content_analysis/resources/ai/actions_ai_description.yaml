Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Content Analysis integration.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, API Key, Verify SSL).

    2. Initializes the `SymantecContentAnalysisManager`.

    3. Makes a GET request to the `rapi/pattern_groups` endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or a failure message
    otherwise.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Symantec Content Analysis API.
