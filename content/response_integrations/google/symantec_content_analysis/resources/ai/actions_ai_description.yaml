    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the Symantec Content Analysis engine for scanning.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving the scan results/reputation score from
      Symantec Content Analysis. It mutates external data by uploading a file payload
