Get Hash Report:
  ai_description: >-
    ### General Description

    Retrieves sample reports for file hash entities (MD5 and SHA256) using Symantec
    Content Analysis. The action fetches threat intelligence and sample data associated
    with the hashes and enriches the entities within the platform.


    ### Flow Description

    1. Filters the target entities to include only those of type `FILEHASH`.

    2. Iterates through the filtered entities and determines the hash type based on
    its length (32 characters for MD5, 64 characters for SHA256).

    3. Makes a GET request to the Symantec Content Analysis API (`rapi/samples/basic`)
    to fetch sample reports for each valid hash.

    4. If a report is successfully retrieved, it constructs a CSV table and attaches
    it to the entity using `siemplify.result.add_entity_table`.

    5. Enriches the entity's `additional_properties` with the flat JSON representation
    of the report.

    6. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    - The action strictly requires the file hashes to be either exactly 32 characters
    (MD5) or 64 characters (SHA256) in length. Any other length will result in an
    error and the entity will be skipped.
  ai_short_description: >-
    Retrieves sample reports for MD5 and SHA256 file hash entities from Symantec Content
    Analysis and enriches the entities with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Symantec Content Analysis API to fetch
      sample reports for file hashes (fetches_data=true). It does not perform any
      state-changing operations on external systems (can_mutate_external_data=false).
      It updates the entities' additional properties and calls `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
