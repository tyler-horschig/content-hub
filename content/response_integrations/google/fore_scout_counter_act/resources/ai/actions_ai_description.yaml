Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ForeScout CounterACT server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    CA Certificate File, Verify SSL).

    2. Initializes the ForeScout CounterACT manager.

    3. Makes a POST request to the `/api/login` endpoint to retrieve a JWT token and
    verify authentication.

    4. Returns a successful execution state if the connection and authentication succeed,
    or a failed state if an error occurs.


    ### Additional Notes

    This action is primarily used to verify that the integration is correctly configured
    and can communicate with the ForeScout CounterACT API.
  ai_short_description: >-
    Tests connectivity to the ForeScout CounterACT server to ensure the integration
    is properly configured.
