Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities by retrieving endpoint information
    from ForeScout CounterACT. This action fetches contextual metadata such as online
    status, device fingerprint, classification, vendor, and agent version to provide
    better visibility into the assets associated with the entities.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type IP Address (`ADDRESS`) and
    MAC Address (`MACADDRESS`).

    3. For each valid entity, makes a GET request to the ForeScout CounterACT API
    (`/api/hosts/mac/{mac_address}` or `/api/hosts/ip/{ip_address}`) to retrieve endpoint
    details.

    4. If the `Create Insight` parameter is enabled, generates a case insight containing
    the retrieved endpoint information.

    5. Enriches the entity's additional properties with the fetched data and marks
    the entity as enriched.

    6. Attaches a data table and JSON results to the action output and updates the
    entities in the platform.


    ### Additional Notes

    - Supported entity types are IP Address and MAC Address.

    - MAC Addresses are automatically sanitized (colons removed) before querying the
    ForeScout API.
  ai_short_description: >-
    Enriches IP Address and MAC Address entities by retrieving contextual endpoint
    information (such as device fingerprint and online status) from ForeScout CounterACT.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the ForeScout CounterACT API to fetch endpoint
      data (fetches_data=true). It does not perform any state-changing operations
      on external systems (can_mutate_external_data=false). It updates the entities
      with the fetched data using `siemplify.update_entities` (can_update_entities=true)
      and creates insights using `siemplify.create_case_insight` (can_create_insight=true).
  entity_usage:
