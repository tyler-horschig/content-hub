Update Finding:
  ai_description: >-
    ### General Description

    Updates the properties of a specific finding in AWS Security Hub. This action
    allows users to modify various attributes of a finding, such as its severity,
    workflow status, verification state, and custom fields, directly from the SOAR
    platform.


    ### Flow Description

    1. Extracts the target finding's ID and Product ARN, along with the properties
    to be updated (e.g., Severity, Workflow Status, Note, Confidence).

    2. Validates the provided parameters, ensuring that Confidence and Criticality
    fall within the accepted range (0-100), and that both 'Note' and 'Note Author'
    are provided together if either is specified.

    3. Maps the provided values (like Severity and Workflow Status) to the formats
    accepted by AWS Security Hub.

    4. Makes an API call (`batch_update_findings`) to the AWS Security Hub service
    to apply the updates to the specified finding.

    5. Evaluates the response to determine if the finding was successfully processed
    or if it resulted in an unprocessed error, returning the appropriate status and
    output message.


    ### Additional Notes

    Due to AWS Security Hub limitations, if the 'Note' parameter is populated, the
    'Note Author' parameter must also be provided, and vice versa.
  ai_short_description: >-
    Updates the properties of a specific finding in AWS Security Hub.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
