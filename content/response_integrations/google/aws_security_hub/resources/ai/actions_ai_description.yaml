Create Insight:
  ai_description: >-
    ### General Description

    Creates a new insight in AWS Security Hub. This action allows users to define
    custom insights by specifying a name, a grouping attribute, and a JSON filter
    object to aggregate findings within the AWS environment.


    ### Flow Description

    1. Extracts the action parameters including Insight Name, Group By Attribute,
    and Filter JSON Object.

    2. Validates and parses the Filter JSON Object to ensure it is properly formatted.

    3. Maps the provided Group By Attribute to the corresponding AWS Security Hub
    attribute.

    4. Connects to the AWS Security Hub service using the provided integration credentials.

    5. Makes an API call to AWS Security Hub to create the insight with the specified
    parameters.

    6. Returns the newly created Insight ARN as a JSON result.


    ### Additional Notes

    The Filter JSON Object must be a valid JSON string representing the attributes
    and values used to filter the findings included in the insight.
  ai_short_description: >-
    Creates a new insight in AWS Security Hub based on a specified grouping attribute
    and JSON filter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new insight configuration in AWS Security Hub.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to AWS Security Hub to create a new insight, which
      mutates external data. It does not fetch data, update internal entities, create
      internal SecOps insights, or modify alert data.
