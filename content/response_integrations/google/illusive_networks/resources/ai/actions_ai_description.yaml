List Deceptive Items:
  ai_description: >-
    ### General Description

    Retrieves a list of available deceptive items (users and/or servers) from Illusive
    Networks based on specified criteria. This action allows analysts to view configured
    deceptive entities directly within the SecOps platform.


    ### Flow Description

    1. Initializes the Illusive Networks manager with the provided API credentials.

    2. Evaluates the requested `Deceptive Type` (Users, Servers, or All) and `Deceptive
    State` (Approved, Suggested, or All).

    3. Makes HTTP GET requests to the Illusive Networks API (`/api/v1/deceptive-entities/users`
    and/or `/api/v1/deceptive-entities/servers`) to fetch the deceptive items matching
    the criteria.

    4. Formats the retrieved data into CSV tables and JSON results.

    5. Returns the structured data to the SecOps platform.


    ### Additional Notes

    This action operates globally and does not require or process specific target
    entities from the alert or case.
