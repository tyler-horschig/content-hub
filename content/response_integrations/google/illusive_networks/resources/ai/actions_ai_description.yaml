Add Deceptive Server:
  ai_description: >-
    ### General Description

    Adds a new deceptive server in Illusive Networks.


    ### Flow Description

    1. Extracts the provided server name, service types, and policy names from the
    action parameters.

    2. Checks if a deceptive server with the given name already exists via a GET request
    to the Illusive Networks API.

    3. If the server already exists, the action fails and raises an exception.

    4. If it does not exist, makes a POST request to the Illusive Networks API to
    create the new deceptive server with the specified service types and policies.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds a new deceptive server in Illusive Networks with specified service types
    and policies.
