Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using information from Illusive Networks. This action
    retrieves detailed host information, such as machine name, health status, operating
    system, and logged-in user, to provide additional context for the asset.


    ### Flow Description

    1. Iterates through the target entities, filtering specifically for Hostname entities.

    2. For each valid entity, makes an API GET request to the Illusive Networks `/api/v2/monitoring/hosts`
    endpoint to fetch host details.

    3. If data is found, updates the entity's `additional_properties` with the retrieved
    information and marks it as enriched.

    4. Adds the enrichment data as a JSON result and attaches an entity-specific table
    to the case.


    ### Additional Notes

    Fails gracefully for entities that do not return data or encounter errors, continuing
    to process the remaining entities in the scope.
