Add Deceptive User:
  ai_description: >-
    ### General Description

    Adds a new deceptive user in Illusive Networks.


    ### Flow Description

    1. Checks if the specified deceptive user already exists in Illusive Networks
    by making a GET request to the API.

    2. If the user does not exist, creates the new deceptive user with the provided
    details (username, password, DNS domain, and policies) by making a POST request
    to the Illusive Networks API.

    3. Returns a success message if the user is created successfully, or an error
