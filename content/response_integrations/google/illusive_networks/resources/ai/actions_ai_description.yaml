    external_data_mutation_explanation: >-
      Creates a new deceptive server in the Illusive Networks platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to Illusive Networks to create a new deceptive
      server, which mutates external data. It does not fetch data for enrichment,
      mutate internal data, update entities, or create insights.
