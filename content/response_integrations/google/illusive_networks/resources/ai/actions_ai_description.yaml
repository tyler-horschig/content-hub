Remove Deceptive User:
  ai_description: >-
    ### General Description

    Removes a specific deceptive user from the Illusive Networks platform. This action
    initiates a state change on the external system to delete the specified decoy
    user account.


    ### Flow Description

    1. Retrieves the target username from the action parameters.

    2. Makes a GET request to the Illusive Networks API (`/api/v1/deceptive-entities/user`)
    to verify the user exists and retrieve its details.

    3. Makes a DELETE request to the Illusive Networks API (`/api/v1/deceptive-entities/users`)
    to remove the deceptive user.

    4. Returns a success message if the user is successfully removed, or an error
    if the user is not found.


    ### Additional Notes

    This action relies on the exact username provided in the parameters and does not
    operate on SecOps entities.
