Run Forensic Scan:
  ai_description: >-
    ### General Description

    Initiates a forensic scan on endpoint entities (Hostname and IP Address) within
    Illusive Networks and retrieves the scan results. The action fetches various forensic
    details such as system information, prefetch files, running processes, and PowerShell
    history, enriching the entities with the retrieved data.


    ### Flow Description

    1. Filters the target entities to include only Hostname and IP Address types.

    2. Initiates a forensic scan request for each valid entity by making a POST request
    to the Illusive Networks API (`/api/v1/event/create-external-event`).

    3. Periodically checks the status of the scan (via GET `/api/v1/incidents/id`)
    until it is completed, as this is an asynchronous action.

    4. Once completed, retrieves the requested forensic data (via GET `/api/v1/forensics`)
    based on the enabled action parameters.

    5. Enriches the entities with the retrieved host information and attaches the
    remaining forensic data as data tables to the entities.

    6. Updates the entities in the SecOps platform with the new enrichment data.


    ### Additional Notes

    - The action is asynchronous and will continue to poll the Illusive Networks API
    until the forensic scan is ready.

    - At least one of the "Include..." parameters must be enabled for the action to
    execute successfully.
