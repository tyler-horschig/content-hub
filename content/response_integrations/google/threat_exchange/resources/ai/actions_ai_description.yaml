Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ThreatExchange API to ensure the integration is configured
    correctly and can communicate with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, App ID, App Secret,
    API Version, Use SSL).

    2. Initializes the `ThreatExchangeManager` with the retrieved credentials.

    3. Executes the `test_connectivity` method, which makes an API call to fetch the
    reputation of a predefined test hash (`d2b4a84e2b69856ba8e234f55b1fbc4b`).

    4. If the API call is successful and no exceptions are raised, the action completes
    and returns a success message.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
    It relies solely on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the ThreatExchange API by making a test API call to ensure
    the integration is configured correctly.
