Get Reputations:
  ai_description: >-
    ### General Description

    Retrieves reputation information for File Hash, Hostname, IP Address, and URL
    entities from ThreatExchange. It evaluates the returned threat intelligence to
    determine if the entities are suspicious and attaches the detailed reputation
    data as an entity table.


    ### Flow Description

    1. Initializes the ThreatExchange API client using the integration configuration.

    2. Iterates through the target entities provided in the case.

    3. Checks the entity type. If it is a File Hash, Hostname, IP Address, or URL,
    it makes a GET request to the corresponding ThreatExchange API endpoint (`/malware_analyses`
    or `/threat_descriptors`) to fetch reputation data.

    4. If reputation data is found, it flattens the JSON response, constructs a CSV,
    and attaches it to the entity as a table named `<Entity Identifier> - Reputations`.

    5. Evaluates the reputation's `status` and `severity` fields. If the status is
    'SUSPICIOUS' or 'MALICIOUS', or the severity is 'SUSPICIOUS', 'SEVERE', or 'APOCALYPSE',
    the entity's `is_suspicious` flag is set to True.

    6. Updates the modified entities in the Google SecOps platform.


    ### Additional Notes

    - Supported entity types are File Hash, Hostname, IP Address, and URL.

    - Entities that encounter errors during the API request are skipped, and the action
    continues processing the remaining entities.
  ai_short_description: >-
    Retrieves reputation information for File Hash, Hostname, IP Address, and URL
    entities from ThreatExchange, attaching the results as entity tables and updating
    the entity's suspicious status if malicious indicators are found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making GET requests to the ThreatExchange API. It
      does not mutate any external data. It updates internal entities by setting their
      'is_suspicious' flag and attaching entity tables, calling 'siemplify.update_entities'.
      It does not create insights, modify alert data, or create case comments.
