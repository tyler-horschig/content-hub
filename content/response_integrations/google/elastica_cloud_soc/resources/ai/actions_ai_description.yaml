Get User Activities:
  ai_description: >-
    ### General Description

    Fetches user activities and investigation logs from Elastica Cloud SOC for specified
    user entities. This action retrieves historical log data within a defined timeframe
    to assist in user-centric investigations.


    ### Flow Description

    1. Retrieves the `Minutes Back` parameter to calculate the starting timestamp
    for the log search.

    2. Filters the provided target entities to include only those of type `USER`.

    3. Iterates over the filtered user entities and extracts the `OriginalIdentifier`
    from their additional properties.

    4. Makes a GET request to the Elastica Cloud SOC API (`api/admin/v1/logs/get/`)
    for each user to fetch investigation logs generated since the calculated timestamp.

    5. If logs are found, formats the results into a CSV table and attaches it to
    the corresponding entity in the case.

    6. Aggregates all retrieved logs and returns them as a JSON result.


    ### Additional Notes

    The action relies on the `OriginalIdentifier` property of the user entity (which
    is case-sensitive in Elastica Cloud SOC) to perform the API query.
  ai_short_description: >-
    Fetches user investigation logs and activities from Elastica Cloud SOC for specified
    user entities within a given timeframe.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Elastica Cloud SOC API to fetch user investigation
      logs. It does not mutate any external data, nor does it update internal entities,
      create insights, modify alerts, or add case comments. It only attaches tables
      and JSON results to the action output.
