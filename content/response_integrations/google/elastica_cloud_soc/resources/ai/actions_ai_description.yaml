Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Elastica CloudSOC platform. This action verifies that
    the integration is configured correctly with valid credentials and network access.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Key ID, Key Secret,
    Verify SSL).

    2. Initializes the Elastica CloudSOC manager.

    3. Makes a GET request to the `audit/v2/datasources/` endpoint to verify API access.

    4. Returns a success message if the connection is established, or fails if the
    HTTP request returns an error.


    ### Additional Notes

    This is a utility action primarily used during integration setup or troubleshooting
    to ensure the SOAR platform can successfully communicate with the Elastica CloudSOC
    API.
  ai_short_description: >-
    Tests connectivity to the Elastica CloudSOC platform by making a test API call
    to verify credentials and network access.
