Check Hash:
  ai_description: >-
    ### General Description

    Checks if a specified file hash is blacklisted using McAfee Advanced Threat Defense
    (ATD). This action retrieves threat intelligence regarding the reputation of the
    file hash.


    ### Flow Description

    1. Initializes the connection to the McAfee ATD service.

    2. Filters the target entities to include only File Hash entities.

    3. Iterates through each File Hash entity and makes a POST request to the McAfee
    ATD API (`atdHashLookup.php`) to check its blacklist status.

    4. Collects the results, updates the entity's additional properties with the blacklist
    status in memory, and generates a JSON result and a data table.


    ### Additional Notes

    Although the action modifies the entity's additional properties in memory, a bug
    in the script (`entities_to_update` is never populated) prevents these changes
    from being saved back to the platform.
  ai_short_description: >-
    Checks if File Hash entities are blacklisted in McAfee ATD.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making an API call to McAfee ATD to check the blacklist
      status of a hash. It does not mutate external data. While it attempts to update
      entities by modifying their additional properties, the list 'entities_to_update'
      is never populated, so 'siemplify.update_entities' is never effectively called.
      It does not create insights, modify alert data, or create case comments.
