Get Analyzer Profiles:
  ai_description: >-
    ### General Description

    Retrieves all available analyzer profiles from McAfee ATD. This action fetches
    the virtual machine profiles configured in the McAfee ATD environment, which can
    be used for subsequent file or URL submission actions.


    ### Flow Description

    1. Initializes a connection with the McAfee ATD server using the integration's
    configuration parameters.

    2. Makes an HTTP GET request to the `vmprofiles.php` API endpoint to retrieve
    the list of analyzer profiles.

    3. Iterates through the retrieved profiles and maps the `vmProfileid` to a new
    `Profile ID` key for better readability.

    4. Attaches the retrieved profiles to the action's output as a JSON result and
    constructs a CSV-based data table.

    5. Logs out of the McAfee ATD session.


    ### Additional Notes

    This action does not operate on any specific entities. It is typically used as
    a utility or prerequisite step to gather available profile IDs before submitting
    a file or URL for analysis.
