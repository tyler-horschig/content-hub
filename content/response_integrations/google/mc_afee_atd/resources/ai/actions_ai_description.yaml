Submit URL:
  ai_description: >-
    ### General Description

    Submits URL entities to McAfee Advanced Threat Defense (ATD) for sandbox analysis.
    This asynchronous action initiates the analysis using a specified analyzer profile,
    waits for the task to complete, and retrieves the resulting threat intelligence
    reports (JSON, PDF, and TXT). It enriches the URL entities with the analysis summary,
    updates their suspicious status based on a severity threshold, attaches the PDF
    report to the action results, and optionally creates an insight with the detailed
    text report.


    ### Flow Description

    1. Filters the target entities to include only URL entities.

    2. Submits each URL to McAfee ATD for analysis using the provided Analyzer Profile
    ID, generating a task ID.

    3. Asynchronously polls McAfee ATD to check the status of the submitted tasks.

    4. Once analysis is complete, fetches the JSON, PDF, and TXT reports for each
    task.

    5. Enriches the URL entities with the summary data from the JSON report and updates
    their suspicious status if the severity exceeds the configured threshold.

    6. Attaches the PDF report to the action's results.

    7. Optionally creates an insight for each entity using the TXT report data.

    8. Updates the entities within the SecOps platform.


    ### Additional Notes

    - The action runs asynchronously to accommodate the time required for sandbox
    analysis.

    - The severity threshold for marking an entity as suspicious can be configured
    via the integration parameters (default is 3).
