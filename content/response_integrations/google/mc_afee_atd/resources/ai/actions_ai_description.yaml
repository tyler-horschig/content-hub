Get Report:
  ai_description: >-
    ### General Description

    Retrieves analysis reports from McAfee ATD for specified task IDs. This action
    checks the status of the provided tasks and, once completed, fetches the corresponding
    JSON, PDF, and optionally TXT reports, attaching them to the case and optionally
    creating an insight.


    ### Flow Description

    1. Extracts the provided `Task IDs` and the `Create Insight` parameter.

    2. Queries McAfee ATD via the `samplestatus.php` endpoint to check if the analysis
    for each task ID is completed.

    3. If the tasks are still queued or analyzing, the action suspends execution and
    retries later (asynchronous execution).

    4. Once the tasks are ready, fetches the JSON report (`showreport.php?iType=json`)
    and PDF report (`showreport.php?iType=pdf`) for each task ID.

    5. If `Create Insight` is enabled, fetches the TXT report (`showreport.php?iType=txt`)
    and creates a case insight with the summary content.

    6. Attaches the PDF report to the action results and returns the JSON report data.


    ### Additional Notes

    This action runs asynchronously, meaning it will periodically check the status
    of the tasks until they are completed or a timeout is reached.
