Get Domain Report:
  ai_description: >-
    ### General Description

    Retrieves a domain report from VirusTotal for Hostname, User, and URL entities.
    This action fetches threat intelligence and categorization data for the extracted
    domains and enriches the entities within the platform.


    ### Flow Description

    1. Filters the target entities to include only Hostname, User, and URL types.

    2. Iterates over the supported entities and extracts the domain from each entity's
    identifier.

    3. Makes a GET request to the VirusTotal API to fetch the domain report.

    4. Enriches the entity with the retrieved domain information (e.g., categories,
    BitDefender info, Alexa info).

    5. Attaches an entity table with the scan report and a web link to the full online
    report.

    6. Updates the entities in the platform and returns the JSON results.


    ### Additional Notes

    The action handles API rate limits and invalid API keys gracefully, skipping entities
    or terminating the action as appropriate.
  ai_short_description: >-
    Retrieves a domain report from VirusTotal for Hostname, User, and URL entities,
    enriching them with threat intelligence and categorization data.
