Scan IP:
  ai_description: >-
    ### General Description

    Scans IP addresses using VirusTotal to retrieve threat intelligence, including
    reverse domains and full JSON results. It enriches the entities, evaluates risk
    based on a threshold, and generates insights.


    ### Flow Description

    1. Extracts the `Threshold` parameter.

    2. Filters target entities to find external IP addresses.

    3. Iterates over the filtered IP addresses.

    4. Calls the VirusTotal API (`GET /vtapi/v2/ip-address/report`) to fetch the IP
    report.

    5. Enriches the entity with the report data (adds prefix "VT" to additional properties).

    6. Adds a web link to the entity for the online report.

    7. Marks the entity as suspicious if the highest positives value exceeds the specified
    threshold.

    8. Adds a table of resolutions (reverse domains) to the entity.

    9. Adds an insight to the entity with details like Country, Malicious Referrer
    Samples, etc.

    10. Updates the entities and adds the JSON results to the action result.


    ### Additional Notes

    Handles API limits and invalid API keys gracefully.
