Scan Hash:
  ai_description: >-
    ### General Description

    Scans File Hash entities using VirusTotal to retrieve threat intelligence and
    reputation scores. It evaluates the risk of the hashes based on a configurable
    threshold and enriches the entities with the analysis results.


    ### Flow Description

    1. Iterates over all target entities and filters for File Hash entities.

    2. For each File Hash, checks if a recent report exists in VirusTotal or if a
    rescan is required based on the `Rescan after days` parameter.

    3. If a rescan is needed or the hash is missing, makes a POST request to the VirusTotal
    API (`/vtapi/v2/file/rescan`) to queue the hash for analysis.

    4. The action runs asynchronously, periodically checking the status of the queued
    tasks.

    5. Once the analysis is complete, makes a POST request to the VirusTotal API (`/vtapi/v2/file/report`)
    to retrieve the full scan report.

    6. Enriches the entity with the report data, adds data tables, and updates the
    entity's suspicious status if the number of positive detections meets or exceeds
    the specified threshold.

    7. Generates an insight for the entity if it is deemed risky and updates the entity
    in the platform.


    ### Additional Notes

    This is an asynchronous action that will continue to run until all queued hash
    scans are completed or a timeout is reached.
