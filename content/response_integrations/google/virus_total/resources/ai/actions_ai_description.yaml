Upload And Scan Files:
  ai_description: >-
    ### General Description

    Uploads and scans files via VirusTotal. Files can be uploaded from a local path
    or a remote Linux server. The action evaluates the scan results against a specified
    threshold and generates insights if the file is deemed risky.


    ### Flow Description

    1. Extracts the provided file paths and optional Linux server credentials.

    2. If a Linux server address is provided, retrieves the file content from the
    remote server via SFTP/SSH.

    3. Uploads the file to VirusTotal using a POST request to the `/file/scan` endpoint.

    4. Waits asynchronously for the scan to complete.

    5. Queries the scan status using a GET request to the `/file/report` endpoint.

    6. Once completed, retrieves the scan report and comments.

    7. Constructs data tables with the engine results and comments, and adds them
    to the action results.

    8. Evaluates the number of positive detections against the provided threshold.

    9. Creates a case insight if the positives exceed the threshold.


    ### Additional Notes

    This is an asynchronous action. It will periodically check the status of the scan
    until it completes or fails.
