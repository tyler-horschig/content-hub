Scan URL:
  ai_description: >-
    ### General Description

    Scans URL entities using VirusTotal to retrieve threat intelligence and reputation
    scores. The action evaluates the risk based on a defined threshold, enriches the
    entities with the scan results, and marks them as suspicious if the number of
    positive detections meets or exceeds the threshold. It also provides insights
    and detailed data tables with engine results and comments.


    ### Flow Description

    1. Extracts the integration configuration and action parameters (Threshold, Rescan
    after days).

    2. Iterates over the target entities, filtering for those of type `URL`.

    3. For each URL, it checks if a recent scan report exists. If the report is older
    than the `Rescan after days` parameter or does not exist, it submits the URL to
    VirusTotal for a new scan.

    4. The action runs asynchronously, periodically checking the status of the queued
    scan tasks.

    5. Once the scans are complete, it fetches the detailed reports and any associated
    comments from VirusTotal.

    6. Enriches the URL entities with the report data (e.g., positives, total, permalink).

    7. Evaluates the number of positive detections against the `Threshold`. If the
    threshold is met or exceeded, it marks the entity as suspicious and generates
    an insight.

    8. Attaches data tables to the case containing the engine detection results and
    comments.

    9. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    - This is an asynchronous action that will continue to run until all submitted
    URL scan tasks are completed or fail.

    - If the API limit is reached, the action will log the limitation and skip the
    affected entities.
