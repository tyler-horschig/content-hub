Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Sumo Logic platform to ensure that the integration is
    configured correctly and can communicate with the API.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Access ID, Access
    Key, Verify SSL).

    2. Initializes the Sumo Logic API manager.

    3. Executes a test search query (`| count _sourceCategory`) by making a POST request
    to the Sumo Logic API to create a search job.

    4. Makes a DELETE request to remove the test search job.

    5. Returns a success message if the connection is established and the test job
    is successfully created and deleted.


    ### Additional Notes

    This is a standard Ping action used to verify integration credentials and network
    connectivity. It does not require any action-specific parameters.
  ai_short_description: >-
    Tests connectivity to the Sumo Logic platform by creating and deleting a test
    search job.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates and immediately deletes a test search job in Sumo Logic to verify API
      connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action tests connectivity by creating and deleting a test search job in
      Sumo Logic. It does not fetch data for enrichment, nor does it mutate internal
      SOAR data, update entities, or create insights.
