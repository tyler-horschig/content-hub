Search:
  ai_description: >-
    ### General Description

    Runs a query and retrieves search results from Sumologic.


    ### Flow Description

    1. Initiates a search job in Sumologic using the provided query and time range
    via a POST request to the Sumologic API.

    2. Periodically checks the status of the search job.

    3. Once completed, fetches the search results up to the specified limit via a
    GET request.

    4. Optionally deletes the search job from Sumologic via a DELETE request.

    5. Returns the results as a JSON and a data table.


    ### Additional Notes

    This is an asynchronous action.
  ai_short_description: >-
    Runs a query and retrieves search results from Sumologic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a search job in Sumologic and optionally deletes it after completion.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches search results from Sumologic (fetches_data=true). It creates
      a search job via a POST request and optionally deletes it via a DELETE request,
      thus mutating external data (can_mutate_external_data=true). It does not mutate
      internal data, update entities, create insights, modify alert data, or create
      case comments.
