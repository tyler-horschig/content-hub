  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Sumologic query to run. e.g: _collector=* |

    | Delete Search Job | Boolean | No | If checked, delete the jobs after a search
    is completed. |

    | Since | String | No | Start date of the search, ISO-8601 or unixtime (milliseconds).
    e.g. 1970-01-01T00:00:00. Default: Last 30 days. |

    | To | String | No | End date of the search, ISO-8601 or unixtime (milliseconds).
    e.g. 1970-01-01T00:00:00. Default: now (current utc unixtime). |

    | Limit | String | No | Number of results to return. e.g. 10. Default: 25. |
