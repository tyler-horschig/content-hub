Download File:
  ai_description: >-
    ### General Description

    Downloads a file from a host running VMware Carbon Black Cloud Agent based on
    Hostname or IP Address entities. The file name to be downloaded can be provided
    as an input parameter or extracted from File Name entities attached to the case.


    ### Flow Description

    1. Iterates over the target entities and filters for Hostname and IP Address entities,
    as well as File Name entities if the `File Name` parameter is not provided.

    2. Retrieves the corresponding Carbon Black Cloud device ID for each valid Hostname
    or IP Address entity.

    3. Initiates a Live Response session on the target device.

    4. Polls the session status until it becomes active, based on the configured number
    of retries.

    5. If a remote directory path is provided without specific filenames, initiates
    a command to list the directory contents to identify files.

    6. Initiates a command to get the specified file(s) from the remote host.

    7. Polls the command status and, upon completion, retrieves the file content from
    the Carbon Black Cloud API.

    8. Saves the downloaded file to the specified local directory path.

    9. Returns the execution results and file details as JSON.


    ### Additional Notes

    - The file name is case insensitive.

    - If the action is executed against multiple Host or IP entities, the downloaded
    file name is prepended with the Hostname or IP address (e.g., `hostname_filename`)
    to prevent overwriting files.

    - The `File Name` parameter can be specified as a full path, in which case the
    `Remote Directory Path` parameter is ignored.
  ai_short_description: >-
    Downloads a specified file from a remote host running VMware Carbon Black Cloud
    Agent to a local directory using a Live Response session.
