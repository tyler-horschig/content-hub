Delete File:
  ai_description: >-
    ### General Description

    Deletes a specified file from a remote host running VMware Carbon Black Cloud
    Agent. The action targets Hostname and IP Address entities to identify the host,
    and uses File Name entities or input parameters to specify the file to delete.


    ### Flow Description

    1. Extracts the target file names from the action parameters or File Name entities.

    2. Iterates over the target Hostname and IP Address entities.

    3. Retrieves the corresponding device ID from VMware Carbon Black Cloud.

    4. Initiates a Live Response session on the target device.

    5. Checks the session status until it becomes active.

    6. Executes a 'delete file' command via the Live Response session for the specified
    file path.

    7. Monitors the command status until completion and returns the result.


    ### Additional Notes

    This is an asynchronous action. The file name can be provided as a full path or
    combined with the 'Remote Directory Path' parameter. If the file name is passed
    both as an entity and an input parameter, the action will execute using the input
    parameter.
