Create Memdump:
  ai_description: >-
    ### General Description

    Creates a memory dump on a host running VMware Carbon Black Cloud Agent based
    on the provided Hostname or IP Address entities.


    ### Flow Description

    1. Extracts action parameters and filters target entities for supported types
    (Hostname, IP Address, and optionally File Name).

    2. Validates the provided file names and remote directory paths.

    3. Queries VMware Carbon Black Cloud to find the corresponding device ID for each
    target entity.

    4. Initiates a Live Response session on the target device.

    5. Polls the session status until it becomes active.

    6. Executes a command to create a memory dump on the remote host at the specified
    path.

    7. Polls the command status until completion and retrieves the execution results.


    ### Additional Notes

    The file name for the memdump can be provided either as a File entity or as an
    action input parameter. If provided as both, the input parameter takes precedence.
    The file name can be specified as a full path, or combined with the Remote Directory
    Path parameter.
  ai_short_description: >-
    Creates a memory dump on a remote host running VMware Carbon Black Cloud Agent
    based on Hostname or IP Address entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a command to create a memory dump on the remote endpoint via VMware
      Carbon Black Cloud.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by executing a command to create a memory dump
      on a remote endpoint via VMware Carbon Black Cloud. It does not fetch contextual
      data for enrichment, nor does it mutate internal SOAR data such as entities,
      insights, or case comments.
  entity_usage:
