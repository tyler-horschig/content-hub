    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action uploads a file to a remote host. There is no specific outcome category
      for uploading a file to an endpoint (only downloading or submitting to a sandbox).
      Therefore, it does not match any of the predefined outcome categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Name | String | No | Specify the file name to upload. File name is case
    insensitive. File Name can be specified as a "full path" having both path and
    a file name, in that case Source Directory Path parameter will not be used. |

    | Check for active session x times | String | Yes | How many attempts action should
    make to get active session for the entity. Check is made every 2 seconds. |

    | Source Directory Path | String | No | Specify the source directory path action
    should take to get the file to upload. Example: /tmp/ |

    | Destination Directory Path | String | Yes | Specify the target directory path
    action should upload the file to. Example: C:\TMP\ |
