Kill Process:
  ai_description: >-
    General Description:

    Kills a specific process on a host based on the Siemplify Hostname or IP Address
    entity using VMware Carbon Black Cloud Live Response.


    Flow Description:

    1. Retrieves the target process name from the action parameters or from a Process
    entity.

    2. Queries Carbon Black Cloud to find the device ID corresponding to the Hostname
    or IP Address entity.

    3. Initiates a Live Response session on the target device.

