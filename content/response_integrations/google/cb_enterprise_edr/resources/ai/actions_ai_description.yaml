"Get Events Associated With Process by Process Guid":
  ai_description: >-
    ### General Description

    Retrieves events associated with specific processes from VMware Carbon Black Enterprise
    EDR using process GUIDs. This action provides detailed results on specific process
    activities based on defined search criteria and queries, returning the data as
    a comprehensive JSON result and data tables.


    ### Flow Description

    1. Extracts the provided Process GUIDs, search criteria, query, timeframe, and
    record limit parameters.

    2. Iterates through each provided Process GUID.

    3. Makes an API call (`POST` to `/api/investigate/v2/orgs/{org_key}/events/{process_guid}/_search`)
    to VMware Carbon Black Enterprise EDR to search for associated events.

    4. Parses the returned events and constructs a data table and JSON result for
    each process GUID.

    5. Returns the aggregated results to the Siemplify action result.


    ### Additional Notes

    The action requires the Process GUID to be passed as a parameter. Multiple Process
    GUIDs and search criteria (event types) can be provided as comma-separated strings.
  ai_short_description: >-
    Retrieves detailed events associated with specific processes from VMware Carbon
    Black Enterprise EDR using process GUIDs and search queries.
