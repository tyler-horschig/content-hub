Process Search:
  ai_description: >-
    ### General Description

    Searches for process activity on a specific host using VMware Carbon Black Enterprise
    EDR. It retrieves process telemetry based on provided search parameters such as
    query, timeframe, and record limits.


    ### Flow Description

    1. Iterates through the provided target entities, filtering for Hostname entities.

    2. For each valid entity, initiates a process search via the Carbon Black Enterprise
    EDR API (`/api/investigate/v2/orgs/{org_key}/observations/search_jobs`).

    3. Retrieves the search results, paginating if necessary, up to the specified
    record limit.

    4. Formats the retrieved process data into a CSV table and attaches it to the
    action results.

    5. Updates the successful entities in the platform.


    ### Additional Notes

    The action requires valid API credentials and organization key. The search query
    can be customized to filter by process name, hash, or other supported fields.
