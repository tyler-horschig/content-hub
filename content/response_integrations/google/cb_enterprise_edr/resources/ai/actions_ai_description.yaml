Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the VMware Carbon Black Enterprise EDR server using the
    configured integration parameters. This action is used to verify that the API
    credentials and network routing are correctly set up.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, Organization
    Key, API ID, API Secret Key, Verify SSL).

    2. Initializes the Carbon Black Enterprise EDR Manager.

    3. Makes an HTTP GET request to the `/threathunter/watchlistmgr/v3/orgs/{org_key}/watchlists`
    endpoint to verify authentication and connectivity.

    4. Returns a successful execution state if the request succeeds, or a failed execution
    state if an error or unauthorized response occurs.


    ### Additional Notes

    This action does not interact with case entities or modify any data. It is strictly
    a health check for the integration.
