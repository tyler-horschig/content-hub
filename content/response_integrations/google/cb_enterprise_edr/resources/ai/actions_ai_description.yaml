Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using VMware Carbon Black Enterprise EDR. It retrieves
    metadata and summary information for SHA256 hashes and updates the entities with
    the fetched data.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to include only File Hash entities with a 64-character identifier
    (SHA256).

    3. Makes an API call to VMware Carbon Black Enterprise EDR to fetch file hash
    metadata.

    4. Makes an API call to VMware Carbon Black Enterprise EDR to fetch file hash
    summary.

    5. Updates the entity's additional properties with the retrieved enrichment data.

    6. Marks the entity as enriched and updates it within the platform.

    7. Attaches the raw JSON results to the action.


    ### Additional Notes

    Only SHA256 hashes are supported by this action.
  ai_short_description: >-
    Enriches File Hash entities (SHA256) by retrieving metadata and summary information
    from VMware Carbon Black Enterprise EDR.
