      The action fetches data from an external API (VMware Carbon Black Enterprise
      EDR) using GET requests. It does not mutate external data. It updates internal
      entities with the fetched enrichment data using `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
