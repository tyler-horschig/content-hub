Set Key:
  ai_description: >-
    ### General Description

    Sets a string value in a Redis key. If the key already holds a value, it overwrites
    the existing value, regardless of its type. This action is useful for storing
    state, caching data, or passing information between different stages of a playbook
    using an external Redis database.


    ### Flow Description

    1. Initializes the Redis client connection using the integration's server address
    and port configuration.

    2. Retrieves the target `Key Name` and `Value` from the action parameters.

    3. Executes a `SET` command via the Redis API to store the value under the specified
    key in the database.

    4. Returns a success message to the SecOps platform indicating the operation completed.


    ### Additional Notes

    While the value parameter is passed as a string, it can represent various data
    structures (e.g., stringified JSON dicts or lists) depending on how it is formatted
    before being passed to the action.
