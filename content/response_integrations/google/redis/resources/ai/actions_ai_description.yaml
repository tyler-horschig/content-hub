Get List:
  ai_description: >-
    ### General Description

    Retrieves all elements from a specified Redis list. This action connects to a
    Redis server and fetches the contents of a given list, returning the values for
    further use within the playbook.


    ### Flow Description

    1. Initializes the Redis client using the server address and port from the integration
    configuration.

    2. Retrieves the target list name from the action parameters.

    3. Queries the Redis server to fetch all elements of the specified list by iterating
    over its length and retrieving each index.

    4. Formats the retrieved list values and adds them to the action's JSON results.

    5. Returns an output message indicating the number of elements found or a message
    stating no values were found.


    ### Additional Notes

    The action returns the list elements as a JSON array in the action's JSON result.
