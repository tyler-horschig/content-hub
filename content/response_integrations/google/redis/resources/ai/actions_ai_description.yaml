Add To List:
  ai_description: >-
    ### General Description

    Adds a specified value to the head of a Redis list. If the target list does not
    exist, a new list is created automatically.


    ### Flow Description

    1. Connects to the Redis server using the provided integration configuration.

    2. Retrieves the target list name and the value to be added from the action parameters.

    3. Executes an `LPUSH` command via the Redis API to add the value to the head
    of the list.

    4. Retrieves the updated contents of the list.

    5. Returns the updated list as a JSON result.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds a specified value to the head of a Redis list, creating the list if it does
    not already exist, and returns the updated list contents.
  capabilities:
