Ping:
  ai_description: >-
    ### General Description

    Pings the configured Redis server to verify connectivity. This action is used
    to ensure that the Google SecOps platform can successfully communicate with the
    Redis instance using the provided integration configuration.


    ### Flow Description

    1. Retrieves the Redis server address and port from the integration configuration.

    2. Initializes the Redis client using the provided credentials.

    3. Executes a `ping` command against the Redis server via the Redis API to test
    connectivity.

    4. Returns a success message to the platform if the connection is established
    without errors.


    ### Additional Notes

    This action is primarily used for testing and validating the integration configuration
    and does not interact with case entities or modify any data.
