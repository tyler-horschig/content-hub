Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Alexa service to ensure that the provided credentials
    are valid and the service is reachable.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Access key id and Secret
    access key).

    2. Initializes the AlexaManager with the provided credentials.

    3. Executes a connectivity test by making a GET request to the Alexa API for a
    sample URL (`google.co.il`).

    4. Returns a success message and the connectivity status to the SecOps platform.


    ### Additional Notes

    This action does not require any action-specific parameters and does not interact
    with case entities. It is primarily used for integration setup and troubleshooting.
  ai_short_description: >-
