Get URL Rank:
  ai_description: >-
    ### General Description

    Queries Alexa to retrieve rank information for URL entities. This action fetches
    popularity data for the specified URLs and evaluates their risk based on a user-defined
    threshold.


    ### Flow Description

    1. Iterates through the target entities and filters for URL entities.

    2. Makes an API call to the Alexa Web Information Service (`UrlInfo` action) to
    fetch the rank for each URL.

    3. Extracts the rank from the response and updates the entity's `Alexa_Rank` additional
    property.

    4. Compares the retrieved rank against the provided `Threshold` parameter.

    5. If the rank is greater than the threshold, marks the entity as suspicious and
    creates an insight.

    6. Updates the enriched entities in the platform and attaches the raw data as
    a JSON result.


    ### Additional Notes

    None.
  ai_short_description: >-
    Queries Alexa to retrieve rank information for URL entities, enriching them with
    popularity data and optionally marking them as suspicious based on a defined threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Alexa API to fetch URL rank information.
      It does not mutate external data. It updates internal entities with the retrieved
      rank and creates insights if the rank exceeds the specified threshold.
