Free Query:
  ai_description: >-
    ### General Description

    Executes a custom JSON query on a specified MongoDB database and collection to
    retrieve matching documents. This action allows users to fetch specific records
    from their MongoDB instance based on key-value criteria.


    ### Flow Description

    1. Extracts the database name, collection name, and query parameters provided
    by the user.

    2. Parses the provided query string into a valid JSON object.

    3. Initializes a connection to the MongoDB server using the integration's configuration
    settings.

    4. Executes the query against the specified database and collection using the
    MongoDB `find` method.

    5. Formats the retrieved documents and attaches them to the action's results as
    JSON.


    ### Additional Notes

    The action can return results as individual JSON documents or as a single combined
    JSON array, depending on the configuration of the 'Return a single JSON result'
    parameter.
  ai_short_description: >-
    Executes a custom JSON query on a specified MongoDB database and collection to
    retrieve matching documents.
  capabilities:
