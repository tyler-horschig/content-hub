Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the MongoDB server using the provided integration configuration
    credentials.


    ### Flow Description

    1. Retrieves the MongoDB integration configuration (Server Address, Username,
    Password, Port, Use Authentication).

    2. Initializes the MongoDBManager with the retrieved credentials.

    3. Executes a connectivity test by requesting server information from the MongoDB
    instance.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action is primarily used to verify that the SOAR platform can successfully
    authenticate and communicate with the MongoDB instance.
  ai_short_description: >-
    Tests connectivity to the MongoDB server to ensure the integration is configured
    correctly and the server is reachable.
