Get Scan Results:
  ai_description: >-
    ### General Description

    Retrieves the results of a specific scan from Tenable Security Center. This action
    waits for a scan to finish executing and then pulls the vulnerability findings
    and severity summary associated with the provided scan ID.


    ### Flow Description

    1. Retrieves the `Scan Result ID` from the action parameters.

    2. Polls the Tenable Security Center API (`/rest/scanResult/{id}`) to check if
    the scan has completed.

    3. Once the scan is complete, makes a POST request to the `/rest/analysis` endpoint
    to fetch the scan results (vulnerability summary).

    4. Makes another POST request to the `/rest/analysis` endpoint to fetch the severity
    summary for the scan.

    5. Formats the retrieved results and severity summary into CSV data tables and
    attaches them to the action.

    6. Returns the raw JSON results and completes the action.


    ### Additional Notes

    This action will block and wait (using a sleep loop) until the specified scan
    is marked as complete in Tenable Security Center. Ensure the scan ID provided
    is valid and expected to finish within the action's timeout window.
