Create IP List Asset:
  ai_description: >-
    ### General Description

    Creates a new static IP list asset in Tenable Security Center (Tenable.sc) using
    the provided IP address entities. This action aggregates the IP addresses from
    the target entities and registers them as a unified asset list within Tenable.sc,
    which can then be used for targeted vulnerability scanning or reporting.


    ### Flow Description

    1. Extracts the action parameters (Name, Description, Tag) and integration configuration
    settings.

    2. Filters the target entities to isolate those of type IP Address.

    3. If IP entities are found, concatenates their identifiers into a comma-separated
    list.

    4. Makes a POST request to the Tenable.sc API (`/rest/asset`) to create a new
    static IP list asset with the specified name, description, tags, and the concatenated
    IP addresses.

    5. Returns the created asset details as a JSON result and completes the action.


    ### Additional Notes

    Requires at least one IP Address entity to be present in the target entities for
    successful execution.
