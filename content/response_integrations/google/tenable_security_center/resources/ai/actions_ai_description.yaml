    Enriches IP Address entities using Tenable Security Center. This action retrieves
    device information for the specified IP addresses from a given repository and
    updates the entities with the fetched data.


    ### Flow Description

    1. Initializes the Tenable Security Center manager with the provided integration
    configuration.

    2. Iterates through the target entities and filters for IP Address entities.

    3. For each valid IP address, makes a GET request to the Tenable API (`/rest/repository/{repo_id}/deviceInfo`)
