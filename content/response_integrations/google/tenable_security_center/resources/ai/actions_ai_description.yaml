    1. Iterates through the provided target entities.

    2. Filters the entities to process only those of type `ADDRESS` (IP addresses).

    3. For each valid IP address, makes an API call (GET request) to Tenable Security
    Center to fetch related asset intersections within the specified repository.

    4. Constructs a CSV data table and a JSON object containing the retrieved asset
    details.

