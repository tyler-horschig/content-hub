Add IP To IP List Asset:
  ai_description: >-
    ### General Description

    Adds specific IP addresses to an existing IP list asset in Tenable.sc. This action
    modifies the target asset group by appending the provided IP entities to its defined
    IPs list.


    ### Flow Description

    1. Extracts the target entities from the case that are of type IP Address.

    2. Retrieves the asset ID for the specified 'Asset Name' from Tenable.sc via a
    GET request.

    3. Fetches the existing IPs defined in the target asset via a GET request.

    4. Appends the target IP addresses to the existing list.

    5. Updates the IP list asset in Tenable.sc via a PATCH request.

    6. Retrieves the modified asset details and attaches them to the action's JSON
    results.


    ### Additional Notes

    This action only operates on IP Address entities. If the specified asset name
    is not found in Tenable.sc, the action will fail.
  ai_short_description: >-
    Adds IP address entities to a specified IP list asset in Tenable.sc.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an IP list asset in Tenable.sc by appending new IP addresses to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to Tenable.sc to update an IP list asset, which
      mutates external data. It does not fetch contextual data for enrichment, nor
      does it mutate internal SecOps data, update entities, or create insights.
