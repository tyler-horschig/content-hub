Get Vulnerabilities for IP:
  ai_description: >-
    ### General Description

    Retrieves vulnerabilities and a severity summary for IP address entities from
    Tenable Security Center. It evaluates the severity of the vulnerabilities, updates
    the entity's suspicious status if high-severity vulnerabilities are found, enriches
    the entity with severity counts, and attaches a CSV data table with the results.


    ### Flow Description

    1. Iterates through the target entities and filters for IP addresses (`ADDRESS`).

    2. For each IP address, makes an API call (POST `/rest/analysis`) to Tenable Security
    Center to fetch associated vulnerabilities.

    3. Analyzes the returned vulnerabilities to count severities (Info, Low, Medium,
    High, Critical).

    4. If a "High" severity vulnerability is found, marks the entity as suspicious.

    5. Marks the entity as enriched and updates its additional properties with the
    severity counts.

    6. Generates a CSV data table of the vulnerabilities and attaches it to the action
    results.

    7. Updates the enriched entities in the Google SecOps platform.


