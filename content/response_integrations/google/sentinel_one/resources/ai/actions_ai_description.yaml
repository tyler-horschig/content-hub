    Retrieves reputation data for file hash entities (SHA1) using SentinelOne. It
    queries the SentinelOne API for each hash, flattens the returned reputation data,
    attaches it as an entity table, and enriches the entity's additional data with
    the results.


    ### Flow Description

    1. Filters target entities to include only File Hash entities.

    2. Iterates through the filtered entities and queries the SentinelOne API (`GET
    web/api/v1.6/hashes/{hash}/reputation`) for reputation data.

    3. If reputation data is found, flattens the JSON response and converts it to
    a CSV format.

    4. Attaches the CSV data as an entity table in the SecOps platform.

    5. Enriches the entity's additional data with the flattened reputation dictionary
    (prefixed with `SENO_`).

    6. Updates the enriched entities in the platform.


    ### Additional Notes

