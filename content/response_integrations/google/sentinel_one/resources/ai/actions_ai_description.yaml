Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by retrieving their system information
    from SentinelOne. This action fetches contextual metadata about the endpoint and
    updates the entity's properties within the platform.


    ### Flow Description

    1. Filters the target entities to include only Hostname and IP Address entity
    types.

    2. Iterates over the filtered entities.

    3. Makes a GET request to the SentinelOne API (`web/api/v1.6/agents`) to find
    the endpoint agent ID associated with the entity's identifier (IP or Hostname).

    4. Makes a GET request to the SentinelOne API (`web/api/v1.6/agents/{agent_id}`)
    to retrieve the endpoint's system information using the discovered agent ID.

    5. Enriches the entity's `additional_properties` with the retrieved system information.

    6. Attaches a data table containing the system information to the entity.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    If the action fails to find an agent or retrieve information for specific entities,
    it will generate an "Unsuccessful Attempts" data table detailing the errors.
