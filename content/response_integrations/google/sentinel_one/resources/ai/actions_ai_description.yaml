Disconnect Agent From Network:
  ai_description: >-
    ### General Description

    Disconnects a specific endpoint agent from the network using SentinelOne. This
    action isolates the host by changing its network connectivity state on the SentinelOne
    platform, effectively containing the endpoint.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses and Hostnames.

    2. For each valid entity, queries the SentinelOne API (`web/api/v1.6/agents`)
    to find the corresponding endpoint agent ID.

    3. Initiates a POST request to the SentinelOne API (`web/api/v1.6/agents/{agent_id}/disconnect`)
    to disconnect the agent from the network.

    4. Collects the results, marking successful disconnections and recording errors
    for failed attempts.

    5. Generates an output message and attaches a data table to the action result
    detailing any unsuccessful attempts.


    ### Additional Notes

    This action is used for endpoint containment during an incident response process.
    The disconnected agent will typically only be able to communicate with the SentinelOne
    management console until it is explicitly reconnected.
  ai_short_description: >-
    Disconnects a specific endpoint agent from the network using SentinelOne to isolate
    the host.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Disconnects the endpoint agent from the network via the SentinelOne API, changing
      its network connectivity state.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to SentinelOne to disconnect an agent from the
      network, which mutates external data. It does not fetch enrichment data for
      the case, nor does it update internal entities, create insights, or modify alert
      data.
