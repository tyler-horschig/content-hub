Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stealthwatch instance to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the StealthwatchManager.

    3. Makes a GET request to the `/smc/rest/product/info` API endpoint to verify
    connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used to verify integration settings and does not interact
    with entities or alerts.
  ai_short_description: >-
    Tests connectivity to the Stealthwatch instance.
