Search Flows:
  ai_description: >-
    ### General Description

    Searches for network flows associated with IP address entities within Cisco Stealthwatch.
    This action retrieves telemetry data for both source and destination traffic involving
    the specified IP addresses over a given timeframe.


    ### Flow Description

    1. Connects to the Stealthwatch API using the provided integration credentials.

    2. Iterates over the target entities, filtering specifically for IP addresses
    (`EntityTypes.ADDRESS`).

    3. For each valid IP address, retrieves the associated domain ID from Stealthwatch.

    4. Executes a flow search API call for traffic where the IP address is the source,
    and another search where it is the destination, within the specified timeframe.

    5. Aggregates the results and attaches the raw flow data as JSON, along with a
    filtered summary as a CSV table, to the action results.


    ### Additional Notes

    The action requires the Stealthwatch integration to be configured with valid credentials
    and network access to the Stealthwatch server.
