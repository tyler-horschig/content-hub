Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events for specific IP address entities within a given timeframe
    from Stealthwatch. The action queries the Stealthwatch API for alerts and associated
    security events, attaching the results as JSON and formatted CSV tables to the
    action's results.


    ### Flow Description

    1. Calculates the start and end times based on the provided `Timeframe` parameter.

    2. Iterates over the target entities, filtering specifically for IP addresses
    (`ADDRESS`).

    3. For each IP address, queries the Stealthwatch API to retrieve the associated
    domain ID.

    4. If a domain ID is found, queries the Stealthwatch API to search for alerts
    associated with the IP address and domain within the calculated timeframe.

    5. For each alert found, queries the Stealthwatch API to retrieve detailed security
    events.

    6. Attaches the raw event data as JSON and a filtered CSV table to the action
    results for each entity.


    ### Additional Notes

    - This action only operates on entities of type `ADDRESS`.

    - The action initiates search jobs on the Stealthwatch server and waits for them
    to complete before fetching the results.
  ai_short_description: >-
    Retrieves security events for specific IP address entities within a given timeframe
    from Stealthwatch, attaching the results as JSON and tables to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by querying the Stealthwatch API for domain IDs, alerts,
