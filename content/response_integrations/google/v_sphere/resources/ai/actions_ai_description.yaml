Get Vm By Ip:
  ai_description: >-
    ### General Description

    Retrieves Virtual Machine (VM) information from VMware vSphere based on IP address
    entities. This action queries the vCenter server to find the VM associated with
    a specific IP address and returns contextual metadata such as the VM name, power
    state, guest OS, and UUIDs.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `ADDRESS` (IP addresses).

    3. For each matching IP address, queries the vSphere vCenter server to find the
    corresponding Virtual Machine.

    4. Retrieves detailed information about the found VM, including its name, template
    status, path, guest OS, UUIDs, power state, and VMware Tools status.

    5. Aggregates the retrieved VM information and attaches it to the action's JSON
    result.


    ### Additional Notes

    - The action requires a valid connection to the vCenter server configured in the
    integration settings.

    - If multiple VMs share the same IP address, the action returns information for
    the first VM found by the vSphere search index.
