Get System Info:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific Virtual Machine (VM) from VMware
    vSphere.


    ### Flow Description

    1. Initializes a connection to the vSphere server using the integration configuration.

    2. Queries the vSphere API to find the VM object that matches the provided `Vm
    Name` parameter.

    3. Extracts contextual information about the VM, such as its power state, IP address,
    guest OS, and UUIDs.

    4. Formats the retrieved data into a CSV table and a JSON object.

    5. Attaches the data table and JSON result to the action's output.


    ### Additional Notes

    This action does not operate on SecOps entities; it requires the exact VM name
    to be provided as an input parameter.
