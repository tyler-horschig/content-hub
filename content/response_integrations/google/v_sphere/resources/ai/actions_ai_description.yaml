Reset:
  ai_description: >-
    ### General Description

    Performs a hard reset on a specified Virtual Machine within VMware vSphere. This
    action initiates a state change on the hypervisor level to forcefully restart
    the target VM.


    ### Flow Description

    1. Establishes a connection to the vSphere server using the provided integration
    credentials.

    2. Queries the vSphere environment to retrieve the Virtual Machine object matching
    the provided `Vm Name` parameter.

    3. Executes a hard reset operation (`ResetVM_Task`) on the retrieved Virtual Machine
    via the vSphere API.

    4. Waits for the reset task to complete and returns a success message.


    ### Additional Notes

    This action directly affects the state of the VM in vSphere. A hard reset is equivalent
    to pulling the power plug and plugging it back in, which may cause data loss or
    corruption if the guest OS is not properly prepared.
  ai_short_description: >-
    Performs a hard reset on a specified Virtual Machine within VMware vSphere.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
