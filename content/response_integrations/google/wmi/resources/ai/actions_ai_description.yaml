GetSystemInfo:
  ai_description: >-
    ### General Description

    Retrieves detailed system and operating system information from a remote Windows
    machine using Windows Management Instrumentation (WMI). This action connects to
    the specified server and extracts contextual metadata, returning it as structured
    JSON and a CSV data table.


    ### Flow Description

    1. Extracts the target server address and authentication credentials from the
    action parameters.

    2. Establishes a WMI connection to the target server, automatically handling the
    connection method based on the SOAR environment (Linux or Windows).

    3. Executes WQL queries to fetch data from the `Win32_ComputerSystem` and `Win32_OperatingSystem`
    classes.

    4. Formats the retrieved information into a flat dictionary and generates a CSV
    table.

    5. Attaches the CSV table to the action results and returns the raw JSON data.


    ### Additional Notes

    - The provided credentials must have WMI access granted on the target server for
    the action to succeed.

    - Although designed to fetch enrichment data, this action operates on a specific
    server address parameter rather than iterating over case entities.
  ai_short_description: >-
    Retrieves detailed system and operating system information from a remote Windows
    machine using Windows Management Instrumentation (WMI).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
