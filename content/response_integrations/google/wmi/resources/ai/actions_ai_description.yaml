ListUsers:
  ai_description: >-
    ### General Description

    Lists all users configured on a specified remote system using Windows Management
    Instrumentation (WMI).


    ### Flow Description

    1. Initializes the WMI manager and connects to the target server using the provided
    `Server Address`, `Username`, and `Password`.

    2. Executes a WMI query (`Win32_UserAccount`) to retrieve all configured user
    accounts on the system.

    3. Formats the retrieved user data into a JSON structure and a CSV data table.

    4. Returns the results to the Google SecOps platform, attaching the JSON and data
    table to the action results.


