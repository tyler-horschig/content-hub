ListServices:
  ai_description: >-
    ### General Description

    Retrieves a list of installed services from a remote system using Windows Management
    Instrumentation (WMI). This action connects to the specified server and extracts
    details about all configured services, returning the data for further analysis
    or investigation.


    ### Flow Description

    1. Initializes the connection to the target server using the provided `Server
    Address`, `Username`, and `Password` parameters.

    2. Executes a WMI query (`Win32_Service`) to fetch all configured services on
    the system.

    3. Formats the retrieved service information into JSON and constructs a CSV representation.

    4. Outputs the JSON result and attaches a data table named "WMI Services" to the
    action's results in the SOAR platform.

    5. Completes the action with a summary message indicating the number of services
    found.


    ### Additional Notes

    - Requires appropriate WMI access and permissions on the target server.

    - The action supports execution on both Windows and Linux SOAR environments (utilizing
    `wmi_client_wrapper` for POSIX systems).
