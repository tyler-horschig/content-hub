Search IOCs:
  ai_description: >-
    ### General Description

    Searches for Indicators of Compromise (IOCs) in Intsights based on the provided
    entities and enriches them with threat intelligence data.


    ### Flow Description

    1. Iterates over all target entities provided in the case.

    2. For each entity, makes a GET request to the Intsights API (`public/v3/iocs/ioc-by-value`)
    to search for the entity's identifier.

    3. If IOC data is found, the action extracts the enrichment data (such as related
    campaigns, threat actors, malware, and tags) and updates the entity's additional
    properties.

    4. If the retrieved IOC severity is 'Medium' or 'High', the action marks the entity
    as suspicious and generates an insight detailing the findings.

    5. Updates the enriched entities within the Google SecOps platform and returns
    the raw JSON results.


    ### Additional Notes

    This action does not filter by specific entity types and will attempt to search
    for all provided entities.
