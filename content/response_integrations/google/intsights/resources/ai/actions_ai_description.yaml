Assign Alert:
  ai_description: >-
    ### General Description

    Assigns a specific alert to an analyst in IntSights.


    ### Flow Description

    1. Extracts the Alert ID, Assignee ID, and Assignee Email Address from the action
    parameters.

    2. If an Assignee Email Address is provided without an Assignee ID, it queries
    the IntSights API (`GET public/v1/account/users-details`) to resolve the email
    address to an Assignee ID.

    3. Makes a PATCH request to the IntSights API (`public/v1/data/alerts/assign-alert/{alert_id}`)
    to assign the alert to the resolved or provided Assignee ID.

    4. Returns a success message if the assignment is successful, or an error message
    if the user or alert is not found.


    ### Additional Notes

    Either Assignee ID or Assignee Email Address must be provided. If both are provided,
    Assignee ID takes precedence.
