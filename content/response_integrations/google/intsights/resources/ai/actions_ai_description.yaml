Ping:
  ai_description: >-
    ### General Description

    Checks connectivity to the Intsights platform. This action verifies that the integration
    is configured correctly with valid credentials and network access.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Account ID, API Key,
    Verify SSL).

    2. Initializes the IntsightsManager, forcing a connectivity check.

    3. Makes an HTTP GET request to the Intsights API version endpoint (`public/v1/api/version`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
