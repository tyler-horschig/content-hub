Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific alert in IntSights.


    ### Flow Description

    1. Extracts the Alert ID and Note from the action parameters.

    2. Initializes the IntSights API client.

    3. Makes a POST request to the IntSights API (`public/v1/data/alerts/add-note/{alert_id}`)
    to append the note to the specified alert.

    4. Returns a success message if the note is added successfully, or an error message
    if the alert is not found or another error occurs.


    ### Additional Notes

