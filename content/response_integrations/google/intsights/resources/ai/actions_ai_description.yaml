Get Alert Image:
  ai_description: >-
    ### General Description

    Retrieves alert images from IntSights based on provided alert image IDs. The action
    fetches the raw image data, encodes it in base64 format, and attaches the images
    as a case insight within Google SecOps for analyst review.


    ### Flow Description

    1. Extracts the comma-separated list of Alert Image IDs provided in the action
    parameters.

    2. Iterates through each ID and makes a GET request to the IntSights API (`public/v1/data/alerts/alert-image/{alert_image_id}`)
    to fetch the raw image content.

    3. Encodes the retrieved image data into base64 format.

    4. Creates a case insight in Google SecOps containing the embedded images as HTML.

    5. Returns the base64 encoded image content and image names as a JSON result.


    ### Additional Notes

    If multiple IDs are provided, the action processes them sequentially. Any failed
    retrievals are logged and reported in the final output message, while successful
    ones are added to the insight and JSON results.
  ai_short_description: >-
    Retrieves alert images from IntSights using specified alert image IDs, base64
    encodes them, and attaches them as case insights within Google SecOps.
  capabilities:
