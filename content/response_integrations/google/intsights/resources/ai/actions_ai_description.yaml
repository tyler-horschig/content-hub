Close Alert:
  ai_description: >-
    ### General Description

    Closes a specific alert in the Intsights platform. This action updates the status
    of an alert to closed, providing a reason, optional additional information, and
    an optional rating.


    ### Flow Description

    1. Extracts the `Alert ID`, `Reason`, `Additional Info`, and `Rate` from the action
    parameters.

    2. Validates the `Rate` parameter to ensure it falls within the allowed range
    (1 to 5).

    3. Maps the provided closure reason to the corresponding Intsights API value.

    4. Executes a PATCH request to the Intsights API (`/public/v1/data/alerts/close-alert/{alert_id}`)
    with the closure details to update the alert status.

    5. Returns a success message if the alert is successfully closed, or an error
    message if the alert is not found or the operation fails.


    ### Additional Notes

    The action requires a valid Alert ID from Intsights. If an invalid rate is provided,
    the action will fail before making the API call.
  ai_short_description: >-
    Closes a specific alert in the Intsights platform by sending a PATCH request with
    the closure reason and optional rating.
  capabilities:
