Download Alert CSV:
  ai_description: >-
    ### General Description

    Downloads a CSV file containing information related to a specific alert in IntSights.


    ### Flow Description

    1. Extracts the Alert ID, Download Folder Path, and Overwrite parameters.

    2. Validates if the specified download folder path exists on the local system.

    3. Makes a GET request to the IntSights API (`public/v1/data/alerts/csv-file/{alert_id}`)
    to retrieve the CSV file content for the specified alert.

    4. Saves the downloaded CSV content to the specified local folder path.

    5. Returns the absolute path of the downloaded file in the JSON result.


    ### Additional Notes

    If a file with the same name already exists in the destination folder and the
    `Overwrite` parameter is set to false, the action will fail and raise an error.
