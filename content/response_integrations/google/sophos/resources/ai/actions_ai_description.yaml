    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Sophos API to fetch endpoint details, isolation
      status, and blocked items (fetches_data=true). It does not mutate external data.
