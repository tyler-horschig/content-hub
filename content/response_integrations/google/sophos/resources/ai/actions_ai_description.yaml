Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and File Hash entities using Sophos. This action
    retrieves endpoint details, isolation status, and blocked item information to
    provide additional context and threat intelligence for the specified entities.


    ### Flow Description

    1. Initializes the Sophos API client using the provided integration configuration.

    2. Iterates through the supported target entities (Hostname, IP Address, File
    Hash).

    3. For Hostname and IP Address entities, queries the Sophos API (`/endpoint/v1/endpoints`)
    to find matching endpoints.

    4. If an endpoint is found, checks its isolation status via the Sophos API (`/endpoint/v1/endpoints/{endpoint_id}/isolation`).

    5. For File Hash entities, queries the Sophos API (`/endpoint/v1/settings/blocked-items`)
    to check if the hash is present in the blocked items list.

    6. Updates the entity's additional properties with the retrieved data and marks
    it as enriched. If a File Hash is found in the blocked items, it is also marked
    as suspicious.

    7. Optionally creates an insight for the entity with the retrieved information.

    8. Updates the entities in the Google SecOps platform and returns the results.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches Hostname, IP Address, and File Hash entities by retrieving endpoint details,
    isolation status, and blocked item information from Sophos.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
