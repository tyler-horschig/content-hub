Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    This action adds specified FileHash entities (specifically SHA-256 hashes) to
    the blocklist in Sophos.


    ### Flow Description

    1. The action initializes the connection to the Sophos API using the provided
    credentials.

    2. It iterates over the target entities, filtering for FileHash entities.

    3. For each FileHash entity, it verifies if the hash length matches a SHA-256
    hash (64 characters).

    4. If valid, it makes a POST request to the Sophos API to add the hash to the
    blocklist, including the provided comment.

    5. It collects successful, failed, and already blocked entities to construct the
    final output message.


    ### Additional Notes

    - Only SHA-256 hashes are supported by this action.
