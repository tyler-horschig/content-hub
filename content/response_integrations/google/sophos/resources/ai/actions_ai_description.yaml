Get Events Log:
  ai_description: >-
    ### General Description

    Retrieves historical events and logs related to specific endpoint entities (IP
    Address, Hostname) from Sophos.


    ### Flow Description

    1. Initializes the Sophos manager with the provided integration credentials.

    2. Iterates through the target entities, filtering for supported types (IP Address,
    Hostname).

    3. For each valid entity, queries the Sophos API (`/endpoint/v1/endpoints`) to
    find the corresponding endpoint ID.

    4. If an endpoint is found, queries the Sophos SIEM API (`/siem/v1/events`) to
    retrieve events for that endpoint within the specified timeframe.

    5. Formats the retrieved events into a CSV table and attaches it to the entity
    in the SecOps platform.

    6. Aggregates all event data into a JSON result.


    ### Additional Notes

    Events are accessible from the Sophos API only for the last 24 hours. If a timeframe
    greater than 24 hours is provided, the action will automatically cap it at 24
    hours.
