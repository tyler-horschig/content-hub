Add Entities To Allowlist:
  ai_description: >-
    ### General Description

    Adds specified file hash entities (SHA-256 only) to the allowlist in Sophos.


    ### Flow Description

    1. Extracts the action parameters, specifically the comment to be added.

    2. Iterates over the target entities, filtering for Filehash entities.

    3. Validates that the hash is a SHA-256 hash by checking its length (64 characters).

    4. Calls the Sophos API (`POST /endpoint/v1/settings/allowed-items`) to add the
    hash to the allowlist.

    5. Returns a summary of successful, failed, and already allowed entities.


    ### Additional Notes

    Only SHA-256 hashes are supported by this action.
