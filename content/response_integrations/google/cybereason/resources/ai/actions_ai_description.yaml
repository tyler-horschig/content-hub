List files:
  ai_description: >-
    ### General Description

    Retrieves detailed information about files from Cybereason based on provided file
    hashes or a general search limit. This action allows analysts to query the Cybereason
    platform for file metadata, such as paths, signatures, and malicious classifications.


    ### Flow Description

    1. Extracts the provided file hashes, results limit, and fields to return from
    the action parameters.

    2. Validates the requested fields against the supported Cybereason file fields
    and ensures the limit is a positive integer.

    3. If specific file hashes (SHA-1 or MD5) are provided, the action iterates through
    them and makes a POST request to the Cybereason API (`/rest/visualsearch/query/simple`)
    to fetch file details for each hash.

    4. If no file hashes are provided, the action makes a POST request to the Cybereason
    API to fetch a general list of files up to the specified limit.

    5. Aggregates the retrieved file information, limits the final list to the specified
    results limit, and formats the data into CSV and JSON structures.

    6. Attaches the formatted data to the action's results.


    ### Additional Notes

    - The action only supports SHA-1 and MD5 hashes.

    - If the 'File Hash' parameter is populated, the action will attempt to find information
    about all provided hashes. The 'Results Limit' parameter will still be applied
    to the final aggregated list of results.
