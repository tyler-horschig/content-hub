Allow File:
  ai_description: >-
    ### General Description

    Removes a file hash from the blacklist in Cybereason. This action restores execution
    rights for the specified file hash by unpreventing it in the Cybereason platform.


    ### Flow Description

    1. Iterates over the target entities, filtering for File Hash entities.

    2. Extracts the original identifier for each entity and verifies that it is an
    MD5 hash.

    3. Initiates a POST request to the Cybereason API to unprevent the file hash,
    removing it from the blacklist.

    4. Returns a summary message indicating which hashes were successfully removed
    and which failed.


    ### Additional Notes

    Only MD5 hashes are supported by this action. Any other hash types provided will
    be skipped.
