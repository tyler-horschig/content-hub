Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, URL, and File Hash entities using Cybereason. It
    retrieves detailed information about machines, files, and network indicators to
    provide context and threat intelligence.


    ### Flow Description

    1. Iterates through the supported target entities (Hostname, IP Address, URL,
    File Hash).

    2. For Hostname entities, queries the Cybereason API to find the machine GUID
    and retrieves detailed machine information.

    3. For IP Address, URL, and File Hash entities, queries the Cybereason API for
    entity classification and details.

    4. For File Hash entities, additionally retrieves associated files and their owner
    machines.

    5. Evaluates the retrieved data to determine if the entity is malicious and updates
    the entity's suspicious status accordingly.

    6. Enriches the entity with the retrieved data and creates insights based on the
    action's configuration.

    7. Attaches the results as JSON and data tables to the action.


    ### Additional Notes

    Only MD5 and SHA-1 hashes are supported. IP Address refers to external IP addresses.
    The domain part is stripped from URL entities before querying.
