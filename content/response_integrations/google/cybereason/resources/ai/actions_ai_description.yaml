Clear Reputation:
  ai_description: >-
    ### General Description

    Clears the custom reputation of specified entities (File Hash, IP Address, URL)
    in Cybereason. This action removes the entity from any custom whitelist or blacklist
    it may have been added to.


    ### Flow Description

    1. Iterates over the target entities and filters for supported types: File Hash,
    IP Address, and URL.

    2. Extracts the appropriate identifier for each entity (stripping the domain part
    for URLs and validating MD5/SHA1 formats for hashes).

    3. Searches for the entity in Cybereason to verify its existence in the custom
    reputation list.

    4. If found, makes a POST request to the Cybereason API to remove the custom reputation
    for the entity.


    ### Additional Notes

    - Only MD5 and SHA1 hashes are supported for File Hash entities.
