Execute Custom Investigation Search:
  ai_description: >-
    ### General Description

    Executes a custom investigation search in Cybereason based on provided JSON query
    filters. This action supports nested queries for different item types and allows
    specifying the exact fields to return, retrieving telemetry and event data directly
    from the Cybereason platform.


    ### Flow Description

    1. Parses the provided JSON query filters and the comma-separated list of fields
    to return.

    2. Makes a POST request to the Cybereason API (`/rest/visualsearch/query/simple`)
    to execute the custom visual search query.

    3. Retrieves the search results up to the specified maximum limit.

    4. Formats the results and adds them to the action's JSON output and a data table
    named "Search Results".


    ### Additional Notes

    The query should follow a strict pattern of "{API field } {Operator} {Value}".
    For multiple values, an "OR" key must be provided. Each new filter needs to be
    a separate item in the list. Each key represents the request type (e.g., machine
    or user).
  ai_short_description: >-
    Executes a custom investigation search in Cybereason based on provided JSON query
    filters and returns the specified fields.
