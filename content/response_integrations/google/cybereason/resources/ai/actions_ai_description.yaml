Remediate Malop:
  ai_description: >-
    ### General Description

    Performs remediation actions on a specific malop in Cybereason based on provided
    remediation unique IDs. This action initiates state-changing operations on the
    Cybereason platform to remediate threats associated with a malop and tracks their
    progress asynchronously.


    ### Flow Description

    1. Retrieves the suspicious details and possible remediations for the provided
    Malop ID from Cybereason.

    2. Searches for the provided Remediation Unique IDs within the retrieved malop
    details.

    3. Initiates the remediation action for each found unique ID by making a POST
    request to the Cybereason API.

    4. For non-blocking actions, asynchronously monitors the status of the remediation
    tasks until completion or failure.

    5. Returns the results of the remediation actions as JSON data.


    ### Additional Notes

    The action runs asynchronously. The timeout value in the Chronicle SOAR IDE may
    need to be adjusted depending on the expected duration of the remediation tasks.
    The "List Malop Remediations" action can be used to retrieve valid remediation
    unique IDs.
