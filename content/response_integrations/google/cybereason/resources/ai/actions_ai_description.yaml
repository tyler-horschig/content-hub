Isolate Machine:
  ai_description: >-
    ### General Description

    Isolates a specific machine (endpoint) in Cybereason based on the Hostname entity.
    This action initiates a state change on the external device to prevent network
    traffic to or from the specified entity.


    ### Flow Description

    1. Iterates over target entities of type Hostname.

    2. Fetches the sensor details for each hostname from Cybereason using the `get_sensor_details`
    API to retrieve the machine's internal ID.

    3. Checks if the machine is already isolated.

    4. If not isolated, initiates an isolation request using the `isolate_machine`
    API.

    5. Periodically checks the isolation status asynchronously until the machine is
    successfully isolated or a timeout is reached.


    ### Additional Notes

    This is an asynchronous action. It will continue to run and query the status of
    the isolation request until it completes or times out.
