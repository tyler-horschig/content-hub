Set Reputation:
  ai_description: >-
    ### General Description

    Sets a custom reputation (Whitelist or Blacklist) for specific entities in Cybereason.
    The action supports IP Address, URL, and File Hash entities. For URLs, the action
    automatically extracts the domain part. For File Hashes, only MD5 and SHA1 types
    are supported.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only supported types: IP Address, URL, and
    File Hash.

    3. Extracts the original identifier for the entity. If the entity is a URL, it
    extracts the domain. If it is a File Hash, it validates that the hash is either
    MD5 or SHA1.

    4. Makes a POST request to the Cybereason API (`/rest/classification/update`)
    to set the entity's reputation to either Whitelist or Blacklist based on the provided
    parameter.

    5. Returns a summary message detailing which entities were successfully updated
    and which failed.


    ### Additional Notes

    - Ensure that File Hash entities are strictly MD5 or SHA1, as other hash types
    will be skipped and marked as failed.
