Get Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and URL entities using threat intelligence from
    the Talos ThreatSource. The action retrieves reputation scores, category information,
    and blocklist status to provide context on potential threats.


    ### Flow Description

    1. The action filters the target entities to include only IP Addresses, Hostnames,
    and URLs.

    2. For each suitable entity, it makes a GET request to the Talos ThreatSource
    API to retrieve reputation data. For URL entities, it extracts the domain and
    queries reputation for both the domain and the URL.

    3. It makes additional API calls to retrieve category information and blocklist
    status for the entity.

    4. The retrieved data is aggregated and formatted into JSON results and entity
    tables.

    5. The action enriches the entities with the retrieved threat intelligence and
    updates them within the Google SecOps platform.


    ### Additional Notes

    - The action runs asynchronously.

    - For URL entities, the action extracts and utilizes the domain part for some
    of the API queries.
  ai_short_description: >-
    Enriches IP Address, Hostname, and URL entities by retrieving reputation, category,
    and blocklist information from Talos ThreatSource.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Talos ThreatSource API via GET requests (fetches_data=true).
      It does not mutate external data or internal case data. It updates the entities
      with the retrieved enrichment data using `siemplify.update_entities` (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
