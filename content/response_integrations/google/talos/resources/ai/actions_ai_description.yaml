Whois:
  ai_description: >-
    ### General Description

    Retrieves Whois information for IP Address, Hostname, and URL entities using Talos
    ThreatSource.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses, Hostnames, and URLs.

    2. Iterates over the filtered entities. For URL entities, it extracts the domain
    part to use for the query.

    3. Makes a GET request to the Talos ThreatSource API (`/cloud_intel/whois`) to
    fetch the Whois report for each entity.

    4. Collects the Whois reports and adds them to the action's JSON results.

    5. If the action is running asynchronously, it saves the current state and continues
    processing in subsequent runs to avoid rate limits.


    ### Additional Notes

    The action runs asynchronously. It automatically extracts the domain part from
    URL entities before querying the Talos API.
