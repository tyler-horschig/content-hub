Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Talos ThreatSource integration to ensure that the API
    is reachable and properly configured.


    ### Flow Description

    1. Initializes the TalosManager with the provided integration configuration.

    2. Makes a GET request to the Talos API (`/cloud_intel/whois`) using a test domain
    to verify connectivity.

    3. Returns a success message if the connection is established, otherwise returns
    an error message and fails the action.


    ### Additional Notes

    This action is typically used for diagnostic purposes to verify that the integration
    is correctly set up and can communicate with the Talos ThreatSource service.
