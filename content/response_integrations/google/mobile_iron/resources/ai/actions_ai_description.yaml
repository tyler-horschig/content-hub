Unlock Device:
  ai_description: >-
    ### General Description

    Unlocks a mobile device managed by MobileIron using its associated IP address.
    This action initiates a state change on the external Mobile Device Management
    (MDM) platform to remove the lock screen or passcode restriction from the target
    device.


    ### Flow Description

    1. Iterates through target entities, filtering specifically for IP Address entities.

    2. Queries the MobileIron API (GET request) to fetch the device UUID associated
    with the given IP address.

    3. Sends an action command to the MobileIron API (POST request) to unlock the
    device using the retrieved UUID.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action requires the device to be currently managed and reachable by the MobileIron
    instance. If multiple devices share the same IP address, the action will target
    the first device returned by the MobileIron API.
