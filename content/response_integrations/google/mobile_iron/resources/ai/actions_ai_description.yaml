    Fetches system information for a device from MobileIron using its IP address.
    This action retrieves contextual metadata about the device and attaches it as
    an entity table to the action results.


    ### Flow Description

    1. Iterates over target entities of type ADDRESS.

    2. Makes a GET request to the MobileIron API to fetch device information by the
    IP address.

    3. If successful, formats the retrieved system information and adds it as an entity
