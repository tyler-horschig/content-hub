Get Ip Info:
  ai_description: >-
    ### General Description

    Enriches external IP Address entities using DShield. This action retrieves threat
    intelligence information about the IP address, such as the number of packets blocked
    and unique destination IP addresses targeted.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters for entities of type IP Address that are not marked as internal (`entity.is_internal
    == False`).

    3. Makes an HTTP GET request to the DShield API (`/ip/{ip}`) to fetch information
    about each IP address.

    4. If data is found, updates the entity's additional properties with the retrieved
    information.

    5. Marks the entity as enriched and attaches a CSV table with the results to the
    entity.

    6. Updates the entities within the Google SecOps platform and returns the raw
    JSON results.


    ### Additional Notes

    Only external IP addresses are processed. Internal IP addresses are skipped.
  ai_short_description: >-
    Enriches external IP Address entities by querying the DShield API for threat intelligence
    and attack statistics, updating the entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the DShield API to fetch IP data. It does
      not mutate external data but updates internal entities with the retrieved information.
