Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DShield API to ensure the integration is configured
    correctly and can reach the service.


    ### Flow Description

    1. Retrieves the API Root URL from the integration configuration.

    2. Initializes the DShieldManager with the provided API Root.

    3. Executes a connectivity test by making an HTTP request to the API Root URL.

    4. Returns a success message if the connection is established, or a failure message
    if the connection fails.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify network access and
    configuration validity for the DShield integration.
  ai_short_description: >-
    Tests connectivity to the DShield API to ensure the integration is configured
    correctly.
