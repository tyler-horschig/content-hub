    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action performs a POST request to the WebSense API to add URLs to a specific
      category, effectively blocking or restricting access to them. This directly
      aligns with the 'Add IOC To Blocklist' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
