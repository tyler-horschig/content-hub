Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Websense API server to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Initializes the Websense API manager using the provided integration configurations.

    2. Sends an HTTP POST request to the Websense API to obtain a transaction ID.

    3. Sends a subsequent HTTP POST request to commit the transaction, verifying full
    read/write connectivity.

    4. Returns a success message and a "true" result if the connection is established,
    or an error message and "False" otherwise.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify network connectivity
    and authentication credentials for the Websense integration.
