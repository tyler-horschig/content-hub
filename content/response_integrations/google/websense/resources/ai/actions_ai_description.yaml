    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code checks if the 'Urls' parameter is provided. If not, it iterates over
      `siemplify.target_entities` and filters them using `entity.entity_type == EntityTypes.URL`.
      Therefore, it targets URL entities and filters strictly by entity type.
