Get Category Urls API:
  ai_description: >-
    ### General Description

    Retrieves a list of all URLs associated with a specific API-managed category from
    Websense. This action is useful for auditing or reviewing the contents of a web
    filtering category directly from the SOAR platform.


    ### Flow Description

    1. Extracts the target `CategoryName` from the action parameters.

    2. Makes an HTTP GET request to the Websense API (`categories/urls?catname={category_name}`)
    to fetch the list of URLs for the specified category.

    3. Formats the retrieved URLs and attaches them to the action's results as a data
    table.


    ### Additional Notes

    This action only retrieves data and does not modify any categories or policies
    within Websense. It only works for API-managed categories.
