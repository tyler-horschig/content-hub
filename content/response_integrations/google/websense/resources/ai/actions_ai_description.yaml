Block Url API:
  ai_description: >-
    ### General Description

    Blocks specific URLs by adding them to a designated WebSense API category. This
    action initiates a state change on the external WebSense content gateway to prevent
    network traffic to the specified URLs.


    ### Flow Description

    1. Retrieves the target category name and an optional list of URLs from the action
    parameters.

    2. If no URLs are provided in the parameters, it extracts URL entities from the
    target entities in the case.

    3. Iterates through the identified URLs and makes a POST request to the WebSense
    API to add each URL to the specified category.

    4. Commits the transaction on the WebSense gateway.

    5. Returns a summary message detailing which URLs were successfully blocked.


    ### Additional Notes

    Only API-created categories can be manipulated using this action.
  ai_short_description: >-
    Blocks specific URLs by adding them to a designated WebSense API category.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified URLs to a managed category on the WebSense content gateway.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the WebSense API to add URLs to a category,
      which mutates external data. It does not fetch enrichment data, update internal
      entities, create insights, or modify alert data.
  entity_usage:
    entity_types:
