    This action acts as a generic utility to interact with external REST APIs or web
    services that require data submission via POST.


    ### Flow Description

    1. Extracts the target URL, payload data, and optional parameters including headers,
    authentication credentials, and content type.

    2. Constructs the HTTP POST request, parsing the payload as JSON if the content
    type is set to `application/json`.

    3. Executes the HTTP POST request to the target URL.

    4. Retrieves the response, parsing it as JSON if possible, and captures any redirect
    history.

    5. Returns the response data and adds it to the action's JSON results.


    ### Additional Notes

    This is a generic utility action. The actual effect on the external system depends
    entirely on the API endpoint being called.
