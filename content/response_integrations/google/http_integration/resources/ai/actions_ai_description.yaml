Get URL Data:
  ai_description: >-
    ### General Description

    Sends an HTTP GET request to URL entities to retrieve their content and redirect
    history. This action is useful for fetching the raw HTML or data hosted at a specific
    URL directly from the SecOps platform.


    ### Flow Description

    1. Iterates through the provided target entities.

    2. Filters the entities to process only those of type URL.

    3. Prepares the URL for the request, automatically prepending `http://` if no
    schema is present in the entity identifier.

    4. Sends an HTTP GET request to the target URL. This request can optionally include
    basic authentication credentials and enforce SSL certificate verification based
    on the provided parameters.

    5. Collects the response text (body) and any redirect URLs encountered during
    the request.

    6. Aggregates the results and returns them as a JSON object.


    ### Additional Notes

    If the initial request fails due to an invalid schema, the action will attempt
    to prepend `http://` and retry the request.
