Get Data:
  ai_description: >-
    ### General Description

    Sends an HTTP GET request to a specified URL to retrieve data. It supports basic
    authentication, custom headers, and SSL verification configuration, making it
    a flexible utility for interacting with REST APIs or web servers.


    ### Flow Description

    1. Extracts the target URL, authentication credentials, headers, and SSL verification
    settings from the action parameters.

    2. Constructs the HTTP GET request with the provided attributes (including basic
    auth and custom JSON headers if supplied).

    3. Executes the GET request against the target URL.

    4. Evaluates the response, optionally ignoring HTTP error codes (4xx/5xx) if configured
    to do so.

    5. Returns the response payload (parsed as JSON if possible, otherwise as raw
    text), HTTP status code, and redirect history as a JSON result.


    ### Additional Notes

    This action does not operate on specific SecOps entities. It is a generic utility
    for fetching data via HTTP GET and returning the raw or JSON-parsed response to
    the playbook.
  ai_short_description: >-
    Sends an HTTP GET request to a specified URL and returns the response data, status
    code, and redirect history.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making an HTTP GET request to a specified URL. It
      does not mutate external data (GET is idempotent/read-only). It does not mutate
      internal data, update entities, create insights, modify alerts, or create case
      comments.
  entity_usage:
