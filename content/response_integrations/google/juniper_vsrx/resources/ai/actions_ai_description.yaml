Remove IP From Address Set:
  ai_description: >-
    ### General Description

    Removes specific IP address entities from a designated address set on a Juniper
    VSRX firewall. This action modifies the firewall's configuration to delete the
    IP address record and remove it from the specified group.


    ### Flow Description

    1. Establishes a connection to the Juniper VSRX firewall using the provided credentials.

    2. Filters the target entities to include only those of type `ADDRESS`.

    3. For each IP address, queries the firewall to retrieve its corresponding address
    record name.

    4. Executes configuration commands to delete the address record and remove it
    from the specified `Address Set Name` (and `Zone Name`, if provided).

    5. Commits the configuration changes to the firewall to apply the updates.

    6. Returns a success message listing the IP addresses that were successfully removed.


    ### Additional Notes

    This action is typically used to unblock IP addresses or remove them from specific
    routing or filtering groups on the firewall.
