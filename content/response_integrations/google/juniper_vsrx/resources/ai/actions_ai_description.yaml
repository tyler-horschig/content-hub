    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to an address set in the Juniper VSRX firewall configuration
      and commits the changes.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes configuration commands on a Juniper VSRX device to add IP
      addresses to an address set and commits the changes. This mutates external data.
      It does not fetch contextual data, update internal entities, or create insights.
