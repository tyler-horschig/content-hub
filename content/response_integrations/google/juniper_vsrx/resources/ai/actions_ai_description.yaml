Add IP To Address Set:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to a designated address set on a Juniper VSRX
    device. This action modifies the firewall's configuration to group IP addresses
    for security policies.


    ### Flow Description

    1. Retrieves the target address set name and optional zone name from the action
    parameters.

    2. Filters the target entities to include only IP addresses (ADDRESS).

    3. Iterates through the filtered entities and executes configuration commands
    via the Juniper PyEZ library to create an address record and add it to the specified
    address set (and zone, if provided).

    4. Commits the configuration changes to the Juniper VSRX device.

    5. Closes the connection session and returns a summary of successfully added IP
    addresses.


    ### Additional Notes

    This action mutates the external firewall configuration. Ensure the provided address
    set exists or will be created by the command structure.
  ai_short_description: >-
    Adds specific IP address entities to a designated address set on a Juniper VSRX
    device to update firewall configurations.
  capabilities:
