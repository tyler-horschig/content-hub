Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the UnshortenMe service to ensure the integration is configured
    correctly and can communicate with the API.


    ### Flow Description

    1. Initializes the UnshortenMe manager using the provided integration configuration
    (e.g., SSL settings).

    2. Sends a test GET request to the UnshortenMe API (`https://unshorten.me/json/goo.gl/IGL1lE`).

    3. Validates the HTTP response to confirm successful connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used as a health check or ping action during integration
    setup and does not process alerts or entities.
  ai_short_description: >-
    Tests connectivity to the UnshortenMe service to ensure the integration is configured
    correctly and can communicate with the API.
