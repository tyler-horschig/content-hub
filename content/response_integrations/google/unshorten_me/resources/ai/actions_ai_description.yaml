Unshorten URL:
  ai_description: >-
    ### General Description

    This action resolves short URLs to their original long URLs using the UnshortenMe
    service. It enriches URL entities within the platform by appending the resolved
    long URL to the entity's properties.


    ### Flow Description

    1. The action iterates through all target entities provided in the case.

    2. It filters the entities, processing only those with the entity type `URL`.

    3. For each URL entity, it makes an HTTP GET request to the UnshortenMe API (`https://unshorten.me/json/{short_url}`)
    to retrieve the resolved long URL.

    4. If a long URL is successfully retrieved, it is added to the entity's `additional_properties`
    under the key `long_url`.

    5. The entity is marked as enriched (`is_enriched = True`).

    6. The action updates the modified entities within the Google SecOps platform.

    7. Finally, it outputs a JSON result containing the mapping of short URLs to their
    corresponding long URLs.


    ### Additional Notes

    - The action handles API rate limits and will raise an exception if the maximum
    allowed requests per hour are exceeded.
  ai_short_description: >-
    Resolves short URLs to their original long URLs using the UnshortenMe service
    and enriches the corresponding URL entities with the resolved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the UnshortenMe API via a GET request. It does
      not mutate any external data. It updates the internal entities with the resolved
      long URL by calling `siemplify.update_entities`.
