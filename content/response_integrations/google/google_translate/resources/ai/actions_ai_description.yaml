    |

    | Max Records To Return | String | No | Specify how many records to return. If
    nothing is provided, action will return 50 records. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Translate service using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the API Root, API Key, and Verify SSL settings from the integration
    configuration.

    2. Initializes the Google Translate manager.

    3. Makes a GET request to the Google Translate API endpoint (`/language/translate/v2/languages`)
    to verify the connection.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to ensure the integration
    is correctly configured and can communicate with the Google Translate API.
  ai_short_description: >-
    Tests connectivity to the Google Translate service to ensure integration parameters
    are configured correctly.
