Translate Text:
  ai_description: >-
    ### General Description

    Translates a given text from a source language to a target language using the
    Google Translate API. This action is useful for automatically translating foreign
    language artifacts, emails, or alert details into a preferred language for analysts.


    ### Flow Description

    1. Extracts the source language, target language, and the text to be translated
    from the action parameters.

    2. Initiates a POST request to the Google Translate API (`/language/translate/v2`)
    with the provided text and language parameters.

    3. Retrieves the translated text from the API response.

    4. Attaches the translation results as a JSON object to the action's output for
    further use in the playbook.


    ### Additional Notes

    If the `Source Language` parameter is left empty, the Google Translate API will
    attempt to detect the language of the provided text automatically.
  ai_short_description: >-
    Translates a specified text into a desired target language using the Google Translate
    API and returns the result as a JSON object.
