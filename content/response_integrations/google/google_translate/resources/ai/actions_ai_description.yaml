List Languages:
  ai_description: >-
    ### General Description

    Retrieves a list of available languages from Google Translate.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the provided filter logic and limit.

    3. Makes a GET request to the Google Translate API to fetch available languages.

    4. Filters the retrieved languages based on the specified criteria (Filter Key,
    Logic, and Value).

    5. Returns the results as a JSON object and a data table.


    ### Additional Notes

    The action allows filtering the languages by name using "Equal" or "Contains"
    logic.
  ai_short_description: >-
    Retrieves a list of available languages from Google Translate, with optional filtering
    by name.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
