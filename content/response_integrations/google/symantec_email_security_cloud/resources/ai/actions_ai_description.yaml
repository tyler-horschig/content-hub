Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Email Security.Cloud instance to ensure valid
    credentials and network access.


    ### Flow Description

    1. Extracts integration-level configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Symantec Email Security.Cloud manager.

    3. Makes a GET request to the `/domains/global/iocs/download` endpoint to verify
    authentication and connectivity.

    4. Returns a success message if the HTTP response is successful, or a failure
    message if an error occurs.


    ### Additional Notes

    This action is primarily used for integration health checks and does not process
    any entities or action-specific parameters.
