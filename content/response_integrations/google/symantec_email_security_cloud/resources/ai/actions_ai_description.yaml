Block Entities:
  ai_description: >-
    ### General Description

    Blocks specific entities (Hostname, IP address, URL, Filehash, Email Subject,
    Email Address) in Symantec Email Security.Cloud. The action treats all entities
    as sender IOCs and applies the specified remediation action (e.g., Block and Delete,
    Quarantine) to prevent malicious emails or traffic.


    ### Flow Description

    1. Iterates through the target entities provided in the action.

    2. Filters entities to ensure they are supported types (Address, Hostname, User,
    URL, Filehash, EmailMessage) and validates specific formats (e.g., MD5/SHA256
    for hashes, valid email format for users).

    3. Maps the validated entities to their corresponding Symantec Email Security.Cloud
    IOC types.

    4. Makes a POST request to the Symantec Email Security.Cloud API (`/domains/global/iocs/upload?api-list-action=MERGE`)
    to upload and block the IOCs with the specified remediation action and description.

    5. Processes the API response to determine successful and failed blocks, returning
    the results as a JSON object.


    ### Additional Notes

    Only MD5 and SHA256 hashes are supported. User entities must match a valid email
    regex to be processed. All entities are treated as "sender IOCs" during blocking.
  ai_short_description: >-
    Blocks specified entities (such as IP addresses, URLs, and file hashes) in Symantec
    Email Security.Cloud by uploading them as sender IOCs with a defined remediation
    action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads and blocks specified IOCs in Symantec Email Security.Cloud with a defined
      remediation action.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Symantec Email Security.Cloud API
      to upload and block IOCs, which mutates external data. It does not fetch enrichment
      data, update internal entities, or create insights/comments.
