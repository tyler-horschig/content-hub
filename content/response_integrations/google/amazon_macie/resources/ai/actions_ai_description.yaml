Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Amazon Macie service using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the AWS Access Key ID, AWS Secret Key, and AWS Default Region from
