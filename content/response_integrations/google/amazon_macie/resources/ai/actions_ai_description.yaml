Create Custom Data Identifier:
  ai_description: >-
    ### General Description

    Creates a new custom data identifier in Amazon Macie. This action allows users
    to define custom criteria for discovering sensitive data in Amazon S3 buckets.


    ### Flow Description

    1. Extracts the provided parameters including the identifier name, regular expression,
    keywords, and ignore words.

    2. Connects to the Amazon Macie service using the provided AWS credentials.

    3. Calls the Amazon Macie API to create the custom data identifier with the specified
    configuration.

    4. Returns the ID of the newly created custom data identifier as a JSON result.


    ### Additional Notes

    This action does not operate on Siemplify entities.
  ai_short_description: >-
    Creates a new custom data identifier in Amazon Macie based on the provided regular
    expression and keywords.
