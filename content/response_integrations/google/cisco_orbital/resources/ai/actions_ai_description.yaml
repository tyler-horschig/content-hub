  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Specify the query that needs to be executed. |

    | Name | String | No | Specify the name for the query job. If nothing is specified,
    action will use a name in the following format: Siemplify-{guid} |

    | Custom Context Fields | String | No | Specify additional custom context fields
    that should be added to the job. Format: key_1:value_1,key_2:value_1. |

    | Max Results To Return | String | No | Specify how many results should be returned.
    |

    | Hide Case Wall Table | Boolean | No | If enabled, action will not prepare a
    case wall table. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Orbital server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters such as API Root, Client ID,
    and Client Secret.

    2. Authenticates with the Cisco Orbital API to generate an authorization token.

    3. Sends an HTTP GET request to the `v0/ok` endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured to communicate with the Cisco Orbital API.
  ai_short_description: >-
    Tests connectivity to the Cisco Orbital server to ensure the integration is configured
    correctly and can communicate with the API.
