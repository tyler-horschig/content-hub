Execute Query:
  ai_description: >-
    ### General Description

    Executes an osQuery on endpoints associated with IP Address and Hostname entities
    using Cisco Orbital. This action runs asynchronously, submitting the query job
    to the target endpoints and polling for the results over time.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses and Hostnames.

    2. Submits a query job to Cisco Orbital via a POST request to the `v0/query` endpoint,
    targeting the specific endpoints.

    3. Asynchronously polls the `v0/jobs/{job_id}/results` endpoint via GET requests
    to retrieve the query execution results.

    4. Attaches the retrieved results as JSON data to the action results and optionally
    creates a case wall table for each successfully queried entity.


    ### Additional Notes

    This action runs asynchronously. Ensure that the script timeout value in the IDE
    is adjusted accordingly (up to a maximum of 24 hours) to allow sufficient time
    for the endpoints to return their results.
  ai_short_description: >-
    Executes an osQuery on endpoints associated with IP Address and Hostname entities
    using Cisco Orbital and retrieves the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new query job in Cisco Orbital to be executed on the target endpoints.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by polling for query results. It mutates external data
      by creating a new query job in Cisco Orbital via a POST request. It does not
      mutate internal SecOps data, update entities, create insights, modify alerts,
      or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
