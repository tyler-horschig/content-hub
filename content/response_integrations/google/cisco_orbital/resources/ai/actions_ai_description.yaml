    execute_command_on_the_host: true
    get_alert_information: false
    reasoning: >-
      The action submits an osQuery to be executed on remote endpoints (hosts/IPs)
      and retrieves the results. This aligns with the 'Execute Command on the Host'
      category, as it runs a query/command on the endpoint and returns the output.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
