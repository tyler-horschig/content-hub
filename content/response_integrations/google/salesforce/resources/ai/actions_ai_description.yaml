Search Records:
  ai_description: >-
    ### General Description

    Searches for records within Salesforce that match a specified query pattern. This
    action queries multiple Salesforce objects (Cases, Contacts, Leads, Tasks, and
    Users) and returns the matching records.


    ### Flow Description

    1. Initializes the Salesforce manager using the provided integration configurations
    (API Root, Username, Password, Token).

    2. Retrieves the `Query` parameter provided by the user.

    3. Executes a search query against the Salesforce API using the `FIND` command
    to identify matching record IDs.

    4. Fetches the full details for the identified records across Cases, Contacts,
    Leads, Tasks, and Users using SOQL queries.

    5. Formats the retrieved records into CSV data tables, categorized by record type.

    6. Attaches the CSV data tables and the raw JSON results to the action's output.


    ### Additional Notes

    The action relies on the Salesforce Object Search Language (SOSL) to perform the
    initial search, followed by specific SOQL queries to retrieve the detailed properties
    of the matched records.
  ai_short_description: >-
    Searches for records within Salesforce that match a specified query pattern and
    returns the results as JSON and CSV data tables.
  capabilities:
