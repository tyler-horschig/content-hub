Update Case:
  ai_description: >-
    ### General Description

    Updates an existing case in Salesforce with new information such as subject, status,
    description, origin, priority, and type.


    ### Flow Description

    1. Retrieves the provided case number and other optional parameters (Subject,
    Status, Description, Origin, Priority, Type).

    2. Queries Salesforce to retrieve the internal Case ID associated with the provided
    Case Number.

    3. Makes an API call to Salesforce to update the case with the provided details.

    4. Returns a success message upon completion.


    ### Additional Notes

    Ensure that the provided Case Number exists in Salesforce before running this
    action.
