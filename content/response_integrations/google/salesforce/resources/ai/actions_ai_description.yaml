List Cases:
  ai_description: >-
    ### General Description

    Retrieves a list of all existing cases from Salesforce. This action connects to
    the Salesforce instance and fetches case records, returning them as both a structured
    data table and a JSON object for further use in the playbook.


    ### Flow Description

    1. Initializes the connection to the Salesforce API using the provided integration
    credentials.

    2. Executes a SOQL query (`SELECT ID, CaseNumber, Subject, Description, CreatedDate,
    ClosedDate, OwnerID, Priority, Origin, Status, Reason FROM Case`) to fetch all
    available cases.

    3. Formats the retrieved case records into a CSV structure and attaches it to
    the action's results as a data table named "Cases".

    4. Appends the raw case data to the action's JSON result.


    ### Additional Notes

    This action does not require any specific input parameters and will attempt to
    fetch all cases available to the authenticated Salesforce user. Depending on the
    size of the Salesforce environment, this could return a large dataset.
