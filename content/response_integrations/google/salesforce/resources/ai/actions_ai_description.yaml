Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific case in Salesforce. This action allows analysts to
    append notes or updates directly to a Salesforce case from within the SOAR platform.


    ### Flow Description

    1. Retrieves the target Salesforce case ID by querying the provided `Case Number`.

    2. Formats the comment using the provided `Title` and `Body` parameters.

    3. Makes an API call to Salesforce to create a new `CaseComment` record associated
    with the retrieved case ID.


    ### Additional Notes

    This action modifies data in an external system (Salesforce) by appending a comment
    to an existing case. It does not modify internal case data or entities within
    Google SecOps.
