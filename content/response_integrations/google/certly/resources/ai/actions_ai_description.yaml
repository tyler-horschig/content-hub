Ping:
  ai_description: >-
    ### General Description

    Validates the asset configuration for connectivity to the Certly service.


    ### Flow Description

    1. Retrieves the API Token and API Root from the integration configuration.

    2. Initializes the Certly manager.

    3. Performs a test connectivity check by making a GET request to the Certly API
    for a hardcoded test URL (`http://gumblar.cn`).

    4. Returns a success message if the connection is established and the API responds
    without errors.


    ### Additional Notes

    This action is primarily used as a diagnostic tool to ensure the integration is
    properly configured and can communicate with the Certly API.
  ai_short_description: >-
    Validates the asset configuration for connectivity to the Certly service by performing
    a test API request.
