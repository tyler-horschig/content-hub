Get Url Status:
  ai_description: >-
    ### General Description

    Queries the Certly service to retrieve the reputation status of URL entities.
    It evaluates the risk of the URLs, enriches the entities with the retrieved status,
    and flags malicious URLs as suspicious.


    ### Flow Description

    1. Iterates through the target entities and filters for URL entities.

    2. Makes a GET request to the Certly API (`/v1/lookup`) for each URL to fetch
    its reputation status.

    3. Updates the entity's additional properties with the Certly status and marks
    it as enriched.

    4. If the status is "malicious", marks the entity as suspicious and creates an
    insight.

    5. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    Returns "true" if any URL is found to be malicious, otherwise "false".
  ai_short_description: >-
    Queries the Certly service to retrieve the reputation status of URL entities,
    enriching them with the results and flagging malicious URLs as suspicious.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Certly API to fetch URL reputation data
      (fetches_data=true). It does not mutate external data (can_mutate_external_data=false).
      It updates internal entities using `siemplify.update_entities` (can_update_entities=true)
      and creates insights using `siemplify.add_entity_insight` (can_create_insight=true).
