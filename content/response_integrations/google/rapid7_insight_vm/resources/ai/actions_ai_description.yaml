Launch Scan:
  ai_description: >-
    ### General Description

    Initiates a vulnerability scan on Rapid7 InsightVM for specific IP Address and
    Hostname entities. The action can optionally run asynchronously to wait for the
    scan to complete and retrieve its results.


    ### Flow Description

    1. Retrieves action parameters including Site Name, Scan Engine, Scan Template,
    and the optional Scan Name and Fetch Results flag.

    2. Iterates over the target entities, filtering for IP Addresses and Hostnames
    to build a list of target hosts.

    3. Makes a POST request to the Rapid7 InsightVM API to launch a new scan with
    the specified configuration and target hosts.

    4. If the 'Fetch Results' parameter is enabled, the action runs asynchronously,
    periodically checking the scan status via GET requests.

    5. Once the scan completes, it retrieves the scan information and attaches it
    to the action results as a JSON object and a data table.


    ### Additional Notes

    The action requires valid Site, Engine, and Template names that exist within the
    Rapid7 InsightVM environment. If no Scan Name is provided, a default name containing
    a timestamp will be generated automatically.
  ai_short_description: >-
    Initiates a vulnerability scan on Rapid7 InsightVM for specific IP Address and
    Hostname entities, optionally waiting to retrieve the scan results.
