Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Rapid7 InsightVM API to ensure that the integration
    is configured correctly and the service is reachable.


    ### Flow Description

    1. Retrieves the integration configuration (API Root, Username, Password, Verify
    SSL).

    2. Initializes the `Rapid7Manager` with the provided credentials.

    3. Sends a GET request to the API root endpoint to verify authentication and network
    connectivity.

    4. Returns a success message if the connection is successfully established.


    ### Additional Notes

    This action is typically used for troubleshooting and verifying that the integration
    has valid credentials and network access to the Rapid7 InsightVM instance. It
    does not perform any operations on alerts or entities.
