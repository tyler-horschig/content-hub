List Scans:
  ai_description: >-
    ### General Description

    Retrieves a list of vulnerability scans from Rapid7 InsightVM. This action allows
    users to fetch historical scan data, optionally filtering the results to only
    include scans that started within a specified number of days in the past.


    ### Flow Description

    1. Retrieves the `Days Backwards` parameter to determine the timeframe for fetching
    scans.

    2. Calculates the exact start time threshold if the days backwards parameter is
    provided.

    3. Makes a GET request to the Rapid7 InsightVM API (`/scans`) to fetch the list
    of available scans.

    4. Filters the retrieved scans locally to include only those that started after
    the calculated start time.

    5. Formats the scan results, removing unnecessary link metadata, and prepares
    them in JSON and CSV formats.

    6. Attaches the CSV data as a 'Scans' data table and the JSON data to the action's
    results.


    ### Additional Notes

    This action does not operate on specific entities and is used purely to gather
    operational data regarding vulnerability scans from the Rapid7 InsightVM platform.
  ai_short_description: >-
    Retrieves a list of vulnerability scans from Rapid7 InsightVM, optionally filtered
