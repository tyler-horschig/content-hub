Get Scan Results:
  ai_description: "### General Description\nRetrieves the results of a specific scan\
    \ from Rapid7 InsightVM using the provided Scan ID. The action waits for the scan\
    \ to complete before fetching and returning the final scan information.\n\n###\
    \ Flow Description\n1. Retrieves the `Scan ID` from the action parameters.\n2.\
    \ Continuously polls the Rapid7 InsightVM API (`GET /api/3/scans/{scan_id}`) every\
    \ 2 seconds to check the scan status.\n3. Once the scan status is marked as completed,\
    \ it fetches the full scan details.\n4. Formats the retrieved scan information\
    \ into a flat dictionary and attaches it as a data table to the action results.\n\
    5. Returns the raw scan data as a JSON result.\n\n### Additional Notes\n- The\
    \ action will block execution and wait indefinitely if the scan is still running.\
    \ \n- If the scan fails (e.g., aborted, stopped, error, paused), the action will\
    \ raise an exception and halt."
  ai_short_description: >-
    Retrieves the results of a specific scan from Rapid7 InsightVM by its Scan ID,
