Enrich Asset:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using Rapid7 InsightVM. This action
    retrieves contextual metadata for the asset, such as OS version, MAC address,
    risk score, and vulnerability counts, and updates the entity's properties within
    the SecOps platform.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Checks if the entity type is an IP Address or Hostname.

    3. Queries the Rapid7 InsightVM API to search for the asset by its IP or hostname.

    4. If found, extracts relevant asset details including IP, hostname, MAC address,
    OS, type, risk score, and vulnerability statistics.

    5. Updates the entity's `additional_properties` with the retrieved data.

    6. Marks the entity as enriched (`is_enriched = True`).

    7. Attaches an entity table containing the asset details.

    8. Aggregates all results into a JSON object and attaches it to the action result.

    9. Updates the entities in the SecOps platform.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving contextual metadata and
    vulnerability statistics from Rapid7 InsightVM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
