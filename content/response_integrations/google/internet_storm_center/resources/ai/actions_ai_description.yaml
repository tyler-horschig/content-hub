Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using information from the Internet Storm Center.
    This action retrieves threat intelligence data such as attack counts, threat feeds,
    and risk levels associated with the IP address to provide better context for analysts.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses.

    2. Iterates through the suitable entities and makes a GET request to the Internet
    Storm Center API (`/api/ip/{address}`) for each IP.

    3. Retrieves threat intelligence data including attack counts, first/last seen
    dates, ASN details, and threat feeds.

    4. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    5. Optionally creates an insight for the entity containing the retrieved information,
    based on the action's configuration.

    6. Adds the results to the JSON and table outputs.


    ### Additional Notes

    The action runs asynchronously to handle API rate limiting and potential timeouts.
    Ensure the script timeout value in the IDE is adjusted accordingly.
  ai_short_description: >-
    Enriches IP Address entities by retrieving threat intelligence data, such as attack
    counts and threat feeds, from the Internet Storm Center.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Internet Storm Center API to fetch IP
      data (fetches_data=true). It does not mutate external data. It updates the internal
      entities with the retrieved data (can_update_entities=true) and optionally creates
      insights (can_create_insight=true).
