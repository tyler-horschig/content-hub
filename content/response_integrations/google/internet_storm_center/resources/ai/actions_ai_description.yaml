Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Internet Storm Center API to ensure the integration
    is configured correctly and can communicate with the service.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (Email Address and
    Verify SSL).

    2. Initializes the Internet Storm Center manager.

    3. Makes an HTTP GET request to the Internet Storm Center API (`/api/handler`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to validate
    network access and configuration settings.
  ai_short_description: >-
    Tests connectivity to the Internet Storm Center API to verify integration configuration
    and network access.
