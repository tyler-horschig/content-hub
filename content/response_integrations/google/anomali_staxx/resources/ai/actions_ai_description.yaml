Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Anomali Staxx server to ensure that the integration
    is configured correctly and can successfully communicate with the external service.


    ### Flow Description

    1. Extracts integration configuration parameters including the Server Address,
    Username, Password, and Verify SSL settings.

    2. Initializes the Anomali Staxx manager and authenticates by making a POST request
    to the `/api/v1/login` endpoint to retrieve an API token.

    3. Tests connectivity by making a POST request to the `/api/v1/intelligence` endpoint
    with a basic query to verify API access.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration's configuration settings.
  ai_short_description: >-
    Tests connectivity to the Anomali Staxx server using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only makes a POST request to authenticate and test connectivity to
      the Anomali Staxx API. It does not fetch contextual data for alerts, mutate
      external data, mutate internal data, update entities, or create insights.
