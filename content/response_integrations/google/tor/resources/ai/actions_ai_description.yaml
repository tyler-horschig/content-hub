Is Exit Node:
  ai_description: >-
    ### General Description

    Checks whether an IP address entity is currently used as a Tor exit node. The
    action retrieves the latest list of Tor exit nodes from the Tor Project and compares
    the target IP addresses against this list to determine if they are exit nodes.


    ### Flow Description

    1. Retrieves the integration configuration to determine if SSL verification should
    be used.

    2. Iterates over the target entities provided in the case.

    3. Filters the entities to process only those of type `ADDRESS`.

    4. For each IP address, makes an HTTP GET request to `https://check.torproject.org/exit-addresses`
    to fetch the current list of Tor exit nodes.

    5. Checks if the entity's IP address is present in the fetched list of exit nodes.

    6. Collects all IP addresses that are identified as Tor exit nodes.

    7. Returns the list of identified exit node IPs as a JSON result and includes
    them in the output message.


    ### Additional Notes

    This action only processes entities of type `ADDRESS`. If an error occurs while
    checking a specific entity, the action logs the error and continues processing
    the remaining entities.
  ai_short_description: >-
    Checks whether an IP address entity is currently used as a Tor exit node by comparing
    it against the official Tor Project exit node list.
  capabilities:
