Block Port:
  ai_description: >-
    ### General Description

    Blocks a specific port by assigning it to a designated port group attached to
    a policy in Cisco Firepower Management Center. This action modifies the firewall
    configuration to prevent traffic on the specified port and protocol.


    ### Flow Description

    1. Retrieves the specified port group object from Cisco Firepower Management Center
    using the provided `Port Group Name`.

    2. Checks if the target port is already present within the retrieved port group.

    3. If the port is not already blocked, makes an API call to create a new port
    object with the specified `Port` and `Port Protocol`.

    4. Makes a PUT request to update the port group object, appending the newly created
    port object to its list of blocked ports.

    5. Returns a success message indicating that the port was successfully blocked.


    ### Additional Notes

    The specified port group must already exist in Cisco Firepower Management Center
    and should be attached to an active access policy for the block to take effect.
