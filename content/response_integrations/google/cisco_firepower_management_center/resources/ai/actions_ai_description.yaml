Unblock Address:
  ai_description: >-
    ### General Description

    Unblocks specific IP address entities from a designated network group in Cisco
    Firepower Management Center. This action modifies the external firewall configuration
    to restore network connectivity for the targeted IP addresses.


    ### Flow Description

    1. Retrieves the `Network Group Name` from the action parameters.

    2. Filters the target entities to include only IP addresses (`ADDRESS`).

    3. Fetches the network group object from Cisco Firepower using the provided name
    via a GET request.

    4. Iterates through the filtered IP address entities and removes each IP from
    the network group's literals via a PUT request to the Cisco Firepower API.

    5. Returns a summary message detailing the successfully unblocked entities and
    any errors encountered.


