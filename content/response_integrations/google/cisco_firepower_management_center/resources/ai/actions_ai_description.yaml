Block Address:
  ai_description: >-
    ### General Description

    Blocks specific IP address entities on Cisco Firepower Management Center by assigning
    them to a specified network group attached to a policy. This action initiates
    a state change on the external firewall device to prevent network traffic to or
    from the specified IP addresses.


    ### Flow Description

    1. Retrieves the target network group object from Cisco Firepower Management Center
    using the provided `Network Group Name` via a GET request.

    2. Iterates through the target entities, filtering specifically for IP Address
    entities.

    3. For each valid IP address, makes a PUT request to the Cisco Firepower API to
    append the IP address to the network group's literals, effectively blocking it.

    4. Returns a summary message detailing which entities were successfully blocked
    and any errors encountered.


    ### Additional Notes

    The network group must already exist and be attached to a blocking policy in Cisco
    Firepower Management Center for the block to be effective.
  ai_short_description: >-
    Blocks specific IP address entities on Cisco Firepower Management Center by adding
    them to a designated network group.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a network group object in Cisco Firepower Management Center to include
      the target IP addresses, effectively blocking them.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Cisco Firepower API to update a network
      group object, which mutates external data. It does not fetch contextual enrichment
      data, nor does it mutate internal SecOps data, update entities, or create insights.
