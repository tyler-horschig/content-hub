Send Message:
  ai_description: >-
    ### General Description

    Sends a text message to a specified Google Chat space. This action allows automated
    notifications or alerts to be dispatched directly to a Google Chat channel.


    ### Flow Description

    1. Extracts the target `Space Name` and `Message Text` from the action parameters.

    2. Initializes the Google Chat API client using the provided service account credentials.

    3. Makes an HTTP POST request to the Google Chat API (`/v1/spaces/{space_name}/messages`)
    to deliver the message.

    4. Retrieves the response from the API and attaches the resulting message JSON
    to the action's results.


    ### Additional Notes

    This action does not operate on or require any SecOps entities.
