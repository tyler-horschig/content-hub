Send Advanced Message:
  ai_description: >-
    ### General Description

    Sends an advanced message to a specified Google Chat space using a provided JSON
    payload. This allows for sending formatted messages, cards, and interactive widgets
    to Google Chat.


    ### Flow Description

    1. Extracts the `Space Name` and `Message JSON Payload` parameters.

    2. Parses the provided JSON payload to ensure it is valid.

    3. Makes a POST request to the Google Chat API to send the advanced message to
    the specified space.

    4. Returns the created message details as a JSON result.


    ### Additional Notes

    This action does not operate on Siemplify entities.
