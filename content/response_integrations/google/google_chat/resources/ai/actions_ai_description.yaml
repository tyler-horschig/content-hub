      The action queries Google Chat for a list of spaces and optionally their memberships.
      It does not enrich IOCs or assets, update alerts, create tickets, modify blocklists/allowlists,
      manage identities, or send messages. Since it does not match any of the specific
      expected outcomes defined in the categories, all flags are set to false.
