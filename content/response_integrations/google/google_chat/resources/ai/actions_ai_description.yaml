List Spaces:
  ai_description: >-
    ### General Description

    Retrieves a list of Google Chat spaces that the configured bot has been added
    to. It allows filtering the spaces by specific keys and optionally fetching the
    user memberships for each space.


    ### Flow Description

    1. Validates the provided input parameters, ensuring the limit is a positive integer
    and filter logic is correctly paired with a filter key.

    2. Makes an API call (GET request to `/v1/spaces`) to Google Chat to fetch the
    list of spaces.

    3. Filters the retrieved spaces based on the specified key, logic, and value.

    4. If the `Include User Memberships` parameter is enabled, makes additional API
    calls (GET request to `/v1/{space}/members`) to fetch user memberships for each
    space.

    5. Formats the results and outputs them as a JSON object and a Case Wall data
    table.


    ### Additional Notes

    This action does not operate on Siemplify entities.
  ai_short_description: >-
    Retrieves a list of Google Chat spaces that the configured bot has been added
    to, optionally filtering the results and fetching user memberships.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Google Chat (spaces and memberships) via GET requests,
      so `fetches_data` is true. It does not perform any state-changing operations
      (POST/PUT/DELETE) on external systems, so `can_mutate_external_data` is false.
      It does not modify internal SecOps data, update entities, create insights, modify
      alerts, or create case comments.
  entity_usage:
