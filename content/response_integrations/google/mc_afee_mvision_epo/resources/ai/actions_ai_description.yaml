Add Tag:
  ai_description: >-
    ### General Description

    Adds a specified tag to endpoint devices (Hostname or IP Address) in McAfee Mvision
    ePO. This action modifies the external device record by attaching the requested
    tag, which can be used for categorization or policy enforcement within the McAfee
    ecosystem.


    ### Flow Description

    1. Extracts the target tag name from the action parameters.

    2. Filters the case target entities to include only `ADDRESS` (IP) and `HOSTNAME`
    entity types.

    3. Queries the McAfee Mvision ePO API to verify the tag exists and retrieves its
    internal Tag ID.

    4. Iterates through the suitable entities and searches for the corresponding device
    in McAfee Mvision ePO using the entity's identifier.

    5. Makes a POST API call to the McAfee Mvision ePO `/epo/v1/devices/add_tag` endpoint
    to attach the tag to the identified device.

    6. Logs the results and returns a summary message indicating successful and failed
    tagging operations.


    ### Additional Notes

    If the specified tag or endpoint is not found in McAfee Mvision ePO, the action
    will log an error, skip the entity, and continue processing the remaining entities.
  ai_short_description: >-
    Adds a specified tag to Hostname and IP Address endpoint devices in McAfee Mvision
    ePO.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specified tag to an endpoint device in McAfee Mvision ePO.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee Mvision ePO API to add a tag to
      a device, which mutates external data. It does not fetch contextual data for
      enrichment purposes, nor does it mutate internal SOAR data, update entities,
      or create insights.
