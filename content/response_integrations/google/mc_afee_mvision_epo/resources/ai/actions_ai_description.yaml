Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specific tag from endpoint devices (Hostname or IP Address) in McAfee
    Mvision ePO. This action modifies the external state of the device by detaching
    the specified tag, which can be useful for updating asset categorization or triggering
    policy changes.


    ### Flow Description

    1. Retrieves the target tag name from the action parameters.

    2. Queries the McAfee Mvision ePO API to verify the tag exists and retrieves its
    internal Tag ID.

    3. Iterates over the provided Hostname and IP Address entities.

    4. For each entity, searches McAfee Mvision ePO to find the corresponding device
    record.

    5. Makes a POST API call to the `/epo/v1/devices/remove_tag` endpoint to detach
    the tag from the matched device.

    6. Logs the success or failure for each entity and returns a summary of the operations.


    ### Additional Notes

    If the specified tag does not exist in McAfee Mvision ePO, the action will fail.
    If a specific endpoint is not found in the system, the action will log an error
    for that entity and continue processing the remaining entities.
  ai_short_description: >-
    Removes a specified tag from Hostname and IP Address endpoint devices within McAfee
    Mvision ePO.
