Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by fetching endpoint system information
    from McAfee Mvision ePO. This action retrieves contextual metadata about the endpoint,
    such as operating system details, managed state, and installed products, to provide
    analysts with better visibility into the affected assets.


    ### Flow Description

    1. Filters the target entities to include only those of type `ADDRESS` or `HOSTNAME`.

    2. Iterates over the suitable entities and queries the McAfee Mvision ePO API
    (`GET /epo/v1/devices`) to find a matching device based on the entity's identifier.

    3. If a matching device is found, extracts its details and installed products.

    4. Enriches the entity's additional properties with the retrieved device data
    and sets its `is_enriched` flag to true.

    5. Attaches a data table to the action results detailing the products installed
    on the endpoint.

    6. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    - If a 'Group Name' is specified in the integration configuration, the action
    will restrict its search to devices within that specific group.
