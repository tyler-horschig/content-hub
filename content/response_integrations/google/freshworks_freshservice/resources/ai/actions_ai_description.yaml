    external_data_mutation_explanation: >-
      Adds a new time entry to a specific ticket in Freshservice.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Freshservice API to create a new time
      entry on a ticket, which mutates external data. It does not update internal
      entities, create insights, or modify internal alert data.
