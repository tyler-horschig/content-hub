Create Agent:
  ai_description: >-
    ### General Description

    Creates a new agent in Freshworks Freshservice. This action allows for the configuration
    of various agent details including their name, email, roles, department associations,
    and custom fields.


    ### Flow Description

    1. Extracts the provided action parameters such as Email, First Name, Roles, and
    optional fields like Departments and Group Memberships.

    2. If `Group Memberships`, `Departments`, or `Location` are provided as names,
    the action makes GET requests to the Freshservice API to resolve these names into
    their corresponding unique IDs.

    3. Makes a POST request to the Freshservice API (`/api/v2/agents`) to create the
    new agent with the compiled attributes.

    4. Returns the created agent's data as a JSON result and completes the execution.


    ### Additional Notes

    This action does not operate on Siemplify entities. The `Roles` parameter expects
    a valid JSON string representing a list of role objects, despite the parameter
    description mentioning a comma-separated string.
