Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Freshservice based on the provided parameters. This
    action allows modifying various ticket fields such as status, priority, subject,
    description, and assignments, as well as adding file attachments.


    ### Flow Description

    1. Extracts the provided parameters including Ticket ID, Status, Subject, Description,
    and others.

    2. Validates the Ticket ID and checks the existence and size of any provided file
    attachments.

    3. If an Agent or Group is specified, queries the Freshservice API to resolve
    their respective IDs.

    4. Makes a PUT request to the Freshservice API to update the ticket with the new
    values and attachments.

    5. Returns the updated ticket details as a JSON result.


    ### Additional Notes

    Due to Freshservice API limitations, providing new tags will replace existing
    tags rather than appending them. The total size of file attachments must not exceed
    15MB.
