Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Freshservice. The action allows specifying various ticket
    details such as subject, description, requester email, priority, urgency, impact,
    and assignments. It also supports adding tags, custom fields, and file attachments
    up to 15MB.


    ### Flow Description

    1. Extracts action parameters including subject, description, requester email,
    and optional fields like attachments and assignments.

    2. Validates the existence and size of any provided file attachments (total size
    must not exceed 15MB).

    3. If an agent, group, or department is specified, queries Freshservice to resolve
    their respective IDs.

    4. Sends a POST request to the Freshservice API to create the ticket with the
    provided details.

    5. Returns the created ticket data as a JSON result.


    ### Additional Notes

    As of now, the Freshservice API supports only the creation of tickets with the
    type "Incident". The ticket's priority is dynamically calculated according to
    the "Urgency" and "Impact" values, similar to the Freshservice UI.
  ai_short_description: >-
    Creates a new Incident ticket in Freshservice with specified details, assignments,
    and optional file attachments.
