Add Ticket Time Entry:
  ai_description: >-
    ### General Description

    Adds a time entry to a specific ticket in Freshservice. This action allows analysts
    to log the time spent working on a ticket directly from the SOAR platform, optionally
    marking it as billable and adding custom fields.


    ### Flow Description

    1. Extracts the provided ticket ID, agent email, time spent, and other optional
    parameters.

    2. Retrieves the list of agents from Freshservice via a GET request to map the
    provided agent email to an internal agent ID.

    3. Makes a POST request to the Freshservice API (`/api/v2/tickets/{ticket_id}/time_entries`)
    to create the time entry.

    4. Returns the created time entry details as a JSON result.


    ### Additional Notes

    This action does not operate on Siemplify entities. The `Time Spent` parameter
    must be strictly in the `hh:mm` format. The `Ticket ID` must be a positive number.
  ai_short_description: >-
    Adds a time entry to a specific ticket in Freshservice, logging the time spent
    by an agent.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
