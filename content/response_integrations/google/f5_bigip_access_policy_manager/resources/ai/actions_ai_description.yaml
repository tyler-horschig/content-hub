Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the F5 BIG-IP Access Policy Manager using the parameters
    provided in the integration configuration.


    ### Flow Description

    1. Extracts the integration configuration parameters including the API root, username,
    password, token timeout, and SSL verification settings.

    2. Initializes the F5 BIG-IP Access Policy Manager client.

    3. Attempts to authenticate and retrieve or generate an access token via a POST
    request to the login endpoint.

    4. Tests the connection by making a GET request to the tokens endpoint.

    5. Returns a successful execution state if the connection is established, otherwise
    returns a failure state with the error details.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can successfully communicate with the F5 BIG-IP Access Policy Manager API.
