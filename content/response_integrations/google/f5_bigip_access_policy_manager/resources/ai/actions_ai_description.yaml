    | Use Case Entities | Boolean | No | Specify whether the action should disconnect
    sessions using Address and User entities found in the case, or work on the provided
    parameters only. NOTE - once checked, action will ignore all other parameters
    in the action. |

    | Session IDs | String | No | Specify specific session IDs you would like to disconnect,
    in a comma separated list. |

    | Logon User Names | String | No | Specify Logon User Names you would like to
    disconnect sessions for, in a comma separated list, so only sessions for these
    Logon User Names will be disconnected. |

    | Client IPs | String | No | Specify Client IPs you would like to disconnect the
    sessions for, in a comma separated list, so only sessions for these Client IPs
    will be disconnected. |
List Active Sessions:
  ai_description: >-
    ### General Description

    Retrieves a list of currently active sessions from the F5 BIG-IP Access Policy
    Manager. This action connects to the F5 BIG-IP platform and fetches session details,
    returning them as structured JSON data for further use in the playbook.


    ### Flow Description

    1. Extracts the `Limit` parameter to determine the maximum number of active sessions
    to retrieve.

    2. Authenticates with the F5 BIG-IP Access Policy Manager using the provided integration
    credentials and token mechanism.

    3. Makes an HTTP GET request to the `/mgmt/tm/apm/access-info` API endpoint to
    fetch the active sessions.

    4. Parses the returned session data and appends the results to the action's JSON
    output.


    ### Additional Notes

    This action does not operate on specific entities. It is a global fetch operation
    that retrieves active session data directly from the F5 BIG-IP appliance.
  ai_short_description: >-
    Retrieves a list of currently active sessions from the F5 BIG-IP Access Policy
    Manager and returns the details as a JSON result.
