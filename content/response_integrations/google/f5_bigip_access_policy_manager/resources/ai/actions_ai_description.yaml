Disconnect Sessions:
  ai_description: >-
    ### General Description

    Disconnects specified active sessions from an F5 BIG-IP instance. The action can
    target sessions based on Address and User entities from the case, or manually
    provided Session IDs, Logon User Names, and Client IPs.


    ### Flow Description

    1. Initializes the F5 BIG-IP Access Policy Manager client.

    2. Determines the target sessions by either extracting Address and User entities
    from the case or parsing the provided action parameters.

    3. Fetches a list of all active sessions from the F5 BIG-IP instance via an API
    call.

    4. Matches the target IPs, Usernames, and Session IDs against the active sessions.

    5. Sends a DELETE API request to disconnect each matched session.

    6. Verifies the disconnections by fetching the active sessions again.

    7. Returns a summary of successfully disconnected sessions and any failures or
    unmatched inputs.


    ### Additional Notes

    Filters are applied using OR logic; any session matching at least one parameter
    or entity will be disconnected.
  ai_short_description: >-
    Disconnects specified active sessions from an F5 BIG-IP instance based on case
    entities or provided parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Disconnects active sessions on the F5 BIG-IP instance.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches active sessions from the F5 BIG-IP instance to find matches
      (fetches_data=true). It then sends a DELETE request to disconnect the matched
      sessions (can_mutate_external_data=true). It does not mutate internal data,
      update entities, create insights, modify alert data, or create case comments.
  entity_usage:
