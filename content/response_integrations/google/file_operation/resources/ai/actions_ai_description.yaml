Transfer File Linux To Linux:
  ai_description: >-
    ### General Description

    Transfers a file from one remote Linux host to another remote Linux host using
    SFTP. This action allows for automated file movement between servers and can optionally
    clean up the source file after a successful transfer.


    ### Flow Description

    1. Establishes an SFTP connection to the source remote Linux host using the provided
    IP and credentials.

    2. Downloads the specified file from the source host to a temporary local location
    on the SOAR platform.

    3. Establishes an SFTP connection to the destination remote Linux host using the
    provided IP and credentials.

    4. Uploads the temporary file to the specified destination path on the destination
    host.

    5. If the `keep_file` parameter is set to false, deletes the original file from
    the source host.

    6. Deletes the temporary local file and returns the final destination path.


    ### Additional Notes

    Ensure that the SOAR platform has network access to both the source and destination
    Linux hosts over port 22 (SSH/SFTP), and that the provided credentials have sufficient
    read/write permissions for the respective file paths.
  ai_short_description: >-
    Transfers a file from a source remote Linux host to a destination remote Linux
    host via SFTP, with an option to delete the original file.
