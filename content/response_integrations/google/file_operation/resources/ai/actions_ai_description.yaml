Tarzip Files Linux:
  ai_description: >-
    ### General Description

    Creates a `.tar.gz` archive on a remote Linux host. This action connects to the
    specified server via SSH, searches for files matching a specific filter in a source
    directory, and compresses them into a tarball in the designated output directory.


    ### Flow Description

    1. Establishes an SSH connection to the remote Linux server using the provided
    IP address, username, and password.

    2. Constructs a `tar` command to find and compress files matching the specified
    `file_filter` within the `source_folder`.

    3. Executes the command on the remote server to generate the `.tar.gz` file in
    the specified `output_folder`.

    4. Returns the file path of the newly created archive to the SOAR platform.


    ### Additional Notes

    Ensure the provided credentials have the necessary permissions to read the source
    directory and write to the output directory on the remote Linux server.
