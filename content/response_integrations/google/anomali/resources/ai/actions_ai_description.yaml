      domain: false
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `get_entity_type(entity) in SUPPORTED_ENTITY_TYPES`. The supported types are
      FILEHASH, ADDRESS, URL, and EMAIL_TYPE. EMAIL_TYPE is determined by checking
      if the entity is a USER and its original identifier is a valid email. The original
      identifier is fetched using `entity.additional_properties.get("OriginalIdentifier",
      entity.identifier)`. Therefore, it filters by entity type, identifier, and additional
      properties.
