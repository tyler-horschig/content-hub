Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves related associations from Anomali ThreatStream for the provided entities.
    The action can fetch various types of associations, such as Campaigns, Threat
    Bulletins, Actors, Attack Patterns, and more. Additionally, it can be configured
    to create new entities in the case based on specific retrieved associations (Campaign,
    Actor, Signature, Vulnerability).


    ### Flow Description

    1. Extracts the action parameters to determine which association types to retrieve
    and whether to create new entities.

    2. Iterates over the target entities (FileHash, Address, URL, and User with email
    format) and retrieves their corresponding indicators from Anomali ThreatStream
    via the API.

    3. For each indicator, fetches the requested related associations up to the specified
    maximum limit.

    4. Retrieves detailed information for each found association.

    5. Adds the retrieved association details as JSON results and a CSV data table
    to the action result.

    6. If configured, creates new entities in the case for specific association types
    (Campaign, Actor, Signature, Vulnerability).


    ### Additional Notes

    - The action is asynchronous.

    - Supported entity types: FileHash, Address, URL, and User (if the identifier
    is a valid email address).
  ai_short_description: >-
    Retrieves related associations from Anomali ThreatStream for the provided entities
    and optionally creates new entities in the case based on the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates new entities in the case based on the retrieved associations (Campaign,
      Actor, Signature, Vulnerability).
    reasoning: >-
      The action fetches data from Anomali ThreatStream using GET requests. It does
      not mutate external data. It mutates internal data by creating new entities
      in the case using `siemplify.add_entity_to_case` based on the retrieved associations.
      It does not update existing entities, create insights, modify alert data, or
      create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
