    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to Anomali ThreatStream to fetch threat data
      (fetches_data=true). It does not mutate external data. It updates the entities
      in the platform with the retrieved information (can_update_entities=true). It
      does not create insights or case comments.
