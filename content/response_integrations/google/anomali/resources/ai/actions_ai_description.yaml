    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `get_entity_type(entity)
      in SUPPORTED_ENTITY_TYPES`. The supported types map to ADDRESS, URL, FILEHASH,
      and USER (if the original identifier matches an email regex). Therefore, it
