    | Return Intrusion Sets | Boolean | No | If enabled, action will fetch related
    intrusion sets and details about them. |

    | Return Malware | Boolean | No | If enabled, action will fetch related malware
    and details about them. |

    | Return Signatures | Boolean | No | If enabled, action will fetch related signatures
    and details about them. |

    | Return Tools | Boolean | No | If enabled, action will fetch related tools and
    details about them. |

    | Return TTPs | Boolean | No | If enabled, action will fetch related TTPs and
    details about them. |

    | Return Vulnerabilities | Boolean | No | If enabled, action will fetch related
    vulnerabilities and details about them. |

    | Create Campaign Entity | Boolean | No | If enabled, action will create an entity
    out of available "Campaign" associations. |

    | Create Actors Entity | Boolean | No | If enabled, action will create an entity
    out of available "Actor" associations. |

    | Create Signature Entity | Boolean | No | If enabled, action will create an entity
    out of available "Signature" associations. |

    | Create Vulnerability Entity | Boolean | No | If enabled, action will create
    an entity out of available "Vulnerability" associations. |

    | Max Associations To Return | String | No | Specify how many associations to
    return per type. Default: 5 |
GetThreatInfo:
  ai_description: >-
    ### General Description

    Enriches entities (IP, URL, Hash, Email Addresses) using information from Anomali
    ThreatStream. The action retrieves threat intelligence records and evaluates them
    against configured severity and confidence thresholds to determine if the entities
    should be marked as suspicious.


    ### Flow Description

    1. Extracts the action parameters including Limit, Severity Threshold, Confidence
    Threshold, and Ignore False Positive Status.

    2. Iterates over the target entities and filters them to include only supported
    types: IP Address, URL, File Hash, and User (matching an email regex).

    3. Calls the Anomali ThreatStream API via a GET request to fetch threat information
    for each valid entity identifier.

    4. Evaluates the retrieved threat records. If multiple records exist, it prioritizes
    active threats and calculates the highest severity and average confidence.

    5. Compares the threat's severity and confidence against the configured thresholds.
    If the criteria are met (and depending on the false positive status setting),
    the entity is marked as suspicious.

    6. Enriches the entity's additional properties with the aggregated threat data
    and marks it as enriched.

    7. Updates the modified entities within the Google SecOps platform.

    8. Attaches the raw JSON results and constructs CSV tables for the action results.


    ### Additional Notes

    - Supported entity types are Address, URL, FileHash, and User (must be a valid
    email address).

    - The action uses the entity's original identifier for API queries and email validation.
  ai_short_description: >-
    Enriches IP, URL, Hash, and Email Address entities with threat intelligence from
    Anomali ThreatStream, updating their suspicious status and adding contextual data
    based on severity and confidence thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
