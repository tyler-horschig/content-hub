    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only makes an authentication request to verify connectivity. It does
      not fetch contextual data, mutate external or internal data, update entities,
      create insights, modify alerts, or create case comments.
