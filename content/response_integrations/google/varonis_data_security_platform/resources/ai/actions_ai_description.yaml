Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Varonis Data Security Platform using the integration
    configuration parameters.


    ### Flow Description

    1. Extracts connection parameters (API Root, Username, Password, Verify SSL) from
    the integration configuration.

    2. Initializes the VaronisDataSecurityPlatformManager.

    3. Makes a POST request to the Varonis authentication API (`datadvantage/api/authentication/win`)
    to retrieve an access token.

    4. Returns a success message if the connection and authentication are successful,
    or an error message if they fail.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the Varonis Data Security Platform.
  ai_short_description: >-
    Tests connectivity to the Varonis Data Security Platform using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
