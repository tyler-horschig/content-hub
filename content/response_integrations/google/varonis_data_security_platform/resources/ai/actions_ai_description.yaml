Update Alert:
  ai_description: >-
    ### General Description

    Updates the status of one or more alerts in the Varonis Data Security Platform.
    It takes alert GUIDs, the desired status, and an optional closing reason (required
    if the status is "Closed"), and sends a request to the Varonis API to apply the
    changes.


    ### Flow Description

    1. Connects to the Varonis Data Security Platform API using the provided credentials.

    2. Retrieves the target alert GUIDs, desired alert status, and closing reason
    from the action parameters.

    3. Validates the inputs, ensuring a closing reason is provided if the status is
    set to "Closed".

    4. Makes a POST request to the Varonis API (`/datadvantage/api/alert/alert/SetStatusToAlerts`)
    to update the alert statuses.

    5. Returns a success message if the update is successful, or an error message
    if it fails.


    ### Additional Notes

    Multiple alert GUIDs can be provided as a comma-separated string.
  ai_short_description: >-
    Updates the status of one or more alerts in the Varonis Data Security Platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and optionally the closing reason of specific alerts in the
      Varonis Data Security Platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Varonis API to update the status of
      specified alerts. This mutates external data. It does not fetch enrichment data,
      nor does it mutate internal SecOps data, update entities, or create insights.
