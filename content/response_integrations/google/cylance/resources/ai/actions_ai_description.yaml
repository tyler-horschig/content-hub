    ### General Description

    Enriches File Hash entities using Cylance. This action retrieves threat intelligence
    data for the specified hashes, evaluates the threat score against a provided threshold,
    and updates the entity's suspicious status and additional properties accordingly.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. For each File Hash, makes a GET API call to Cylance to retrieve threat information.

