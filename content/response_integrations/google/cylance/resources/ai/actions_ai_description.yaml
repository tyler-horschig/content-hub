Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using Cylance. This action retrieves
    device information from Cylance and updates the entities with the fetched contextual
    data.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type Hostname or IP Address.

    3. Makes a GET request to the Cylance API to retrieve device details based on
    the entity's identifier.

    4. If device information is found, it flattens the data, prefixes it with 'Cylance',
    and adds it to the entity's additional properties.

    5. Marks the entity as enriched and updates it within the Google SecOps platform.

    6. Adds the raw device data to the action's JSON results.


    ### Additional Notes

    If an IP address is provided, the action searches for a device that has that IP
    address assigned in Cylance.
