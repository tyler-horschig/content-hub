Add To Global List:
  ai_description: >-
    ### General Description

    Adds a specified file hash entity to a global list (such as GlobalSafe or GlobalQuarantine)
    within Cylance. This action allows analysts to explicitly allow or block the execution
    of specific files across the environment by modifying the global lists in the
    Cylance console.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. For each valid file hash, makes a POST request to the Cylance API (`/globallists/v2`)
    to add the hash to the specified global list (e.g., GlobalSafe or GlobalQuarantine)
    along with the provided category and reason.

    4. Collects the results and outputs a summary message indicating which hashes
    were successfully added, which already existed in the list, and which failed.


    ### Additional Notes

    The action relies on the Cylance API and requires appropriate permissions to modify
    global lists. The behavior of the action (allowlisting vs. blocklisting) depends
    entirely on the `List Type` parameter provided during execution.
  ai_short_description: >-
    Adds a file hash entity to a specified global list (e.g., GlobalSafe or GlobalQuarantine)
    in Cylance to explicitly allow or block its execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a file hash to a specified global list (e.g., GlobalSafe or GlobalQuarantine)
      in Cylance.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Cylance API (`/globallists/v2`) to add
      a file hash to a global list, which mutates external data. It does not fetch
      data, update internal entities, create insights, or modify alert data.
