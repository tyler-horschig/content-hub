Change Policy:
  ai_description: >-
    ### General Description

    Changes the assigned policy of an endpoint (Hostname or IP Address) in Cylance
    to a specified existing policy. This action allows analysts to dynamically reconfigure
    endpoint security settings directly from the SOAR platform.


    ### Flow Description

    1. Iterates through the provided target entities, filtering specifically for Hostname
    and IP Address entity types.

    2. For each valid entity, queries the Cylance API to retrieve the corresponding
    device ID based on the entity's identifier.

    3. Retrieves the internal policy ID from Cylance that matches the provided `Policy
    Name` parameter.

    4. Makes a PUT request to the Cylance API (`/devices/v2/{device_id}`) to update
    the device's assigned policy.

    5. Collects the successfully updated entities and returns a summary message listing
    the affected endpoints.


    ### Additional Notes

    The policy name provided in the parameters must exactly match an existing policy
    configured within the Cylance console. If an entity cannot be found in Cylance
    or the policy does not exist, the action will skip that entity and log an error.
  ai_short_description: >-
    Changes the assigned policy of a Hostname or IP Address endpoint in Cylance to
    a specified existing policy.
