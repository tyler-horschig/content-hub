Change Zone:
  ai_description: >-
    ### General Description

    Changes the zone assignment for endpoint devices in Cylance based on Hostname
    and IP Address entities. This action allows analysts to dynamically move devices
    between different zones for management or policy enforcement purposes.


    ### Flow Description

    1. Retrieves the `Zones to Add` and `Zones to Remove` parameters.

    2. Iterates through the target entities, specifically filtering for Hostname and
    IP Address entity types.

    3. For each matching entity, queries the Cylance API to retrieve the corresponding
    device ID.

    4. Sends a PUT request to the Cylance API (`/devices/v2/{device_id}`) to update
    the device's zone assignments by adding or removing the specified zones.

    5. Returns a summary message listing the affected entities and the zones that
    were added or removed.


    ### Additional Notes

    - At least one of the parameters (`Zones to Add` or `Zones to Remove`) must be
    provided for the action to perform any updates.

    - If an entity is not found in Cylance or an error occurs during the update, the
    script logs the error and continues processing the remaining entities.
