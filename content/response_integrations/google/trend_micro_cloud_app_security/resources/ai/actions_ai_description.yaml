Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches URL, FileHash, and User (email) entities using Trend Micro Cloud App
    Security. The action checks if the entities are present in the Trend Micro Cloud
    App Security blocklist and updates their properties accordingly.


    ### Flow Description

    1. Initializes the Trend Micro Cloud App Security manager with the provided API
    credentials.

    2. Fetches the list of currently blocked entities (URLs, senders, and file hashes)
    from Trend Micro Cloud App Security.

    3. Iterates through the target entities provided in the case.

    4. For URL entities, extracts the hostname and checks if it exists in the blocked
    URLs list.

    5. For User entities, validates the identifier against an email regex and checks
    if it exists in the blocked senders list.

    6. For FileHash entities, validates that the hash is a SHA-1 hash and checks if
    it exists in the blocked hashes list.

    7. If an entity is found in the blocklist, it is marked as suspicious, enriched
    with `TMCAS_blocked: True`, and added to the JSON result.

    8. If an entity is not found in the blocklist, it is enriched with `TMCAS_blocked:
    False`.

    9. Updates the entities in the platform and attaches the JSON result to the action.


    ### Additional Notes

    - The action only supports SHA-1 hashes for FileHash entities.

    - For URL entities, only the domain (hostname) part is used during the enrichment
    check.

    - User entities must match an email address pattern to be processed.
  ai_short_description: >-
    Enriches URL, FileHash, and User (email) entities by checking if they are present
    in the Trend Micro Cloud App Security blocklist.
