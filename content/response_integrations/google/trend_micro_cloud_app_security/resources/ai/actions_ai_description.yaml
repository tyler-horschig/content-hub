Entity Email Search:
  ai_description: >-
    ### General Description

    Searches for emails in Trend Micro Cloud App Security based on provided entities.
    The action supports searching by URL, File Hash (SHA-1 and SHA-256), User (matching
    an email address pattern), Email Message (Subject), File Name, and Address (IP).
    It retrieves the matching emails and returns their details as a JSON result.


    ### Flow Description

    1. Extracts the action parameters: `Max Days Backwards` and `Max Emails To Return`.

    2. Initializes the Trend Micro Cloud App Security API manager.

    3. Iterates over the target entities provided in the case.

    4. For each entity, checks its type and identifier:
       - If `URL`, searches emails by URL.
       - If `USER` and the identifier matches an email regex, searches emails by mailbox.
       - If `FILEHASH` and the identifier length is 40 (SHA-1) or 64 (SHA-256), searches
    emails by hash.
       - If `EMAILMESSAGE`, searches emails by subject.
       - If `FILENAME`, searches emails by file name.
       - If `ADDRESS`, searches emails by source IP.
    5. Makes a GET request to the Trend Micro Cloud App Security API (`/v1/sweeping/mails`)
    for each valid entity to fetch matching emails.

    6. Filters the retrieved emails to ensure uniqueness based on `mail_unique_id`
    and respects the `Max Emails To Return` limit.

    7. Appends the collected email details to the action's JSON result.


    ### Additional Notes

    - Only SHA-1 and SHA256 hashes are supported for File Hash entities.

    - User entities are only processed if their identifier matches a valid email address
    format.
  ai_short_description: >-
    Searches for emails in Trend Micro Cloud App Security based on provided entities
    such as URL, Hash, Email, Email Subject, File Name, and IP Address.
