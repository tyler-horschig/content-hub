Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    Adds specified entities (URLs, SHA-1 Hashes, and Users/Emails) to the blocklist
    in Trend Micro Cloud App Security. This action prevents future interactions with
    the specified indicators by updating the external security controls.


    ### Flow Description

    1. Retrieves the current list of blocked entities from Trend Micro Cloud App Security
    via an HTTP GET request.

    2. Iterates through the target entities provided in the action.

    3. Validates each entity based on its type: checks URL format for URL entities,
    validates email regex for User entities, and ensures a 40-character length for
    SHA-1 FileHash entities.

    4. Checks if the validated entity is already present in the retrieved blocklist.

    5. If the entity is not already blocked, makes an HTTP POST request to the Trend
    Micro Cloud App Security API to add the entity to the blocklist.

    6. Returns a summary of successfully blocked entities, failed entities, and entities
    that were already present in the blocklist.


    ### Additional Notes

    Only SHA-1 hashes are supported for FileHash entities. User entities must match
    a valid email address pattern to be processed.
  ai_short_description: >-
    Adds specified URL, SHA-1 Hash, and User (email) entities to the blocklist in
    Trend Micro Cloud App Security to prevent future interactions.
