    ### General Description

    Performs mitigation actions on user accounts via Trend Micro Cloud App Security.
    Supported actions include disabling the account, enabling MFA, resetting the password,
    and revoking sign-in sessions. Note that only Exchange accounts are supported.


    ### Flow Description

    1. Validates the provided email addresses using a regular expression.

    2. Initiates an asynchronous mitigation request to the Trend Micro Cloud App Security
    API (`POST /v1/mitigation/accounts`) for the valid email addresses with the specified
    mitigation action.

    3. Periodically polls the API (`GET /v1/mitigation/accounts?batch_id={}`) to check
    the status of the mitigation process.

    4. Completes the action once all mitigation tasks succeed, fail, or are skipped,
    returning the final status and output message.


    ### Additional Notes

    This is an asynchronous action. Any email addresses provided that do not match
    a valid email format will be automatically skipped.
