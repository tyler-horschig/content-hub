    1. Extracts integration configuration parameters (API Root, API Key, Verify SSL).

    2. Initializes the Trend Micro Cloud App Security manager.

    3. Makes an HTTP GET request to the `/v1/sweeping/mails?limit=1` API endpoint
    to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error message and fails the action.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
