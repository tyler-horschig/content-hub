GetPcap:
  ai_description: >-
    ### General Description

    Downloads and saves the PCAP (Packet Capture) file associated with a specific
    file hash sample from Palo Alto Networks WildFire. The retrieved file is then
    attached directly to the corresponding entity within the Google SecOps platform
    for further forensic analysis.


    ### Flow Description

    1. Initializes the connection to the WildFire API using the provided integration
    credentials.

    2. Iterates through the target entities in the case.

    3. Filters entities to process only File Hash entities with a valid MD5 (32 characters)
    or SHA256 (64 characters) length.

    4. Makes an API call (`wfapi.pcap`) to WildFire to retrieve the PCAP file for
    each valid hash.

    5. Attaches the downloaded PCAP file directly to the corresponding entity in the
    Google SecOps platform using `add_entity_attachment`.


    ### Additional Notes

    The action will skip entities that are not File Hashes or do not match the required
    MD5/SHA256 length. If a PCAP is not available for a given hash in WildFire, an
    error is caught and appended to the final output message.
  ai_short_description: >-
    Downloads and saves the PCAP file of a previously submitted malware sample from
    Palo Alto Networks WildFire, attaching it directly to the corresponding File Hash
    entity in the platform.
