GetReport:
  ai_description: >-
    ### General Description

    Retrieves a detonation report from Palo Alto WildFire for FileHash entities. This
    action queries the WildFire service using MD5 or SHA256 hashes to obtain threat
    intelligence and file analysis details. It enriches the entities with the retrieved
    data, marks them as suspicious if malware is detected, and attaches both a CSV
    summary and a PDF report to the case.


    ### Flow Description

    1. Iterates over the target entities and filters for `FILEHASH` entities.

    2. Validates that the entity identifier length is either 32 (MD5) or 64 (SHA256)
    characters.

    3. Makes an API call to WildFire (`wfapi.report`) to fetch the XML detonation
    report for the hash.

    4. Enriches the entity's `additional_properties` with the retrieved file information.

    5. Evaluates the malware status; if the file is deemed malicious, sets the entity's
    `is_suspicious` flag to True and creates an insight.

    6. Converts the task information into a CSV format and attaches it as an entity
    table.

    7. Makes a second API call to WildFire to fetch the PDF version of the report
    and attaches it to the entity.

    8. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    - The action strictly requires the FileHash identifier to be either an MD5 or
    SHA256 hash.

    - If the hash is not found in WildFire, the action will catch the exception and
    continue processing other entities.
  ai_short_description: >-
    Retrieves a detonation report and PDF summary from Palo Alto WildFire for FileHash
    entities, enriching the entities and marking them as suspicious if malware is
    detected.
