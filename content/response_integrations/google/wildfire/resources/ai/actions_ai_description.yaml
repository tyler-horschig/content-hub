    internal_data_mutation_explanation: >-
      Attaches the downloaded file sample to the corresponding entity within the case.
    reasoning: >-
      The action makes an API call to WildFire to fetch a file sample (fetches_data=true).
      It does not mutate external data. It mutates internal data by adding the downloaded
      file as an attachment to the entity in Google SecOps (can_mutate_internal_data=true).
      It does not update entities, create insights, modify alert data, or create case
