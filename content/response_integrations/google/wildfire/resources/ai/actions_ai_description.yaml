DetonateFile:
  ai_description: >-
    ### General Description

    Uploads specified files to Palo Alto WildFire for sandbox detonation and retrieves
    the resulting analysis reports.


    ### Flow Description

    1. Retrieves the file paths from the action parameters.

    2. Submits each file to the WildFire API (`submit_file`) for analysis.

    3. Polls the WildFire API (`get_report`) until the analysis reports are ready
    for all submitted files.

    4. Retrieves the XML and PDF reports (`get_pdf_report`) for each file.

    5. If a file is identified as malicious, creates a case insight in Google SecOps.

    6. Attaches the parsed report data as a CSV table and the PDF report as an attachment
    to the action results.


    ### Additional Notes

    The action requires the file to be accessible via the provided file path on the
    environment where the script is executed.
  ai_short_description: >-
    Uploads files to Palo Alto WildFire for sandbox detonation and retrieves the analysis
    reports, creating case insights for malicious files.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the WildFire sandbox for detonation.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates a case insight if the detonated file is found to be malicious.
    reasoning: >-
      The action fetches analysis reports from WildFire (fetches_data=true). It mutates
      external data by uploading a file to the WildFire sandbox for detonation (can_mutate_external_data=true).
      It mutates internal data by creating a case insight if the file is malicious
      (can_mutate_internal_data=true, can_create_insight=true). It does not update
      entities, modify alert data, or create case comments.
