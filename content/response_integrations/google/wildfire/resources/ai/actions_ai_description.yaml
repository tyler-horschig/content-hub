GetFile:
  ai_description: >-
    ### General Description

    Downloads and saves a file sample from Palo Alto Networks WildFire based on a
    file hash entity. The action retrieves the sample content and attaches it directly
    to the corresponding entity within the Google SecOps platform.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Filters entities to process only those of type `FILEHASH`.

    3. Validates the entity identifier length to ensure it is either an MD5 (32 characters)
    or SHA256 (64 characters) hash.

    4. Makes an API call to WildFire to retrieve the file sample associated with the
    hash.

    5. Base64 encodes the retrieved sample content and attaches it to the entity in
    the SecOps platform.

    6. Returns a summary message listing the entities for which files were successfully
    downloaded.


    ### Additional Notes

    - Only MD5 and SHA256 hashes are supported by this action.

    - The downloaded file is attached directly to the entity in the SecOps platform.
  ai_short_description: >-
    Downloads and saves a file sample from Palo Alto Networks WildFire based on a
    file hash entity, attaching the retrieved file directly to the entity in Google
    SecOps.
