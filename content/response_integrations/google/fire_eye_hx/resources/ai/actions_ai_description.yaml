Acknowledge Alert Groups:
  ai_description: >-
    ### General Description

    Updates the acknowledgment status of specified alert groups in FireEye HX. This
    action allows analysts to acknowledge or un-acknowledge alert groups and optionally
    append a comment to them.


    ### Flow Description

    1. Extracts the provided Alert Group IDs, Acknowledgment status, and optional
    comment from the action parameters.

    2. Initiates a `PATCH` request to the FireEye HX API (`/alert_groups`) to update
    the acknowledgment status of the specified alert groups.

    3. Returns the updated acknowledgment details as a JSON result and outputs a summary
    message indicating success or failure for the provided IDs.


    ### Additional Notes

    This action operates on alert groups, not individual alerts, as per FireEye HX
    API limitations.
  ai_short_description: >-
    Updates the acknowledgment status of specified alert groups in FireEye HX.
