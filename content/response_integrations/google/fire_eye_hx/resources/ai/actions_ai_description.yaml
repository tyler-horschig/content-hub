Contain Host:
  ai_description: >-
    ### General Description

    Creates a contain host task on the FireEye HX server based on the provided IP
    Address or Hostname entities. This action isolates the endpoint from the network
    to prevent further communication during a security incident.


    ### Flow Description

    1. Iterates through the target entities, specifically looking for IP Address and
    Hostname entity types.

    2. For each valid entity, queries FireEye HX to find matching hosts using the
    entity's identifier via a GET request.

    3. If multiple hosts match the identifier, selects the host with the most recent
    last poll timestamp.

    4. Initiates a containment task on the FireEye HX server for the identified host
    via a POST request to the FireEye HX API.

    5. Reports the success or failure of the containment task creation for each processed
    entity.


    ### Additional Notes

    - This action is not supported for Linux hosts by FireEye HX.

    - If the "Approve Containment" parameter is set to false, the containment request
    will need to be manually approved in the FireEye HX web console.
