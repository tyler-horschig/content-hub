    1. Iterates through the provided target entities.

    2. Filters entities to process only Hostname and IP Address types.

    3. Queries the FireEye HX API (`/hosts`) to retrieve host information matching
    the entity identifier.

    4. If multiple hosts match an entity, selects the host with the most recent `last_poll_timestamp`.

