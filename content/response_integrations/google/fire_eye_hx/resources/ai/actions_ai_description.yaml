Cancel Host Contain:
  ai_description: >-
    ### General Description

    Cancels the containment of a host on the FireEye HX server based on IP Address
    or Hostname entities. This action initiates a state change on the external device
    to remove network isolation and restore the endpoint's communication capabilities.


    ### Flow Description

    1. Iterates through the target entities provided in the case (specifically IP
    Address and Hostname entities).

    2. Queries the FireEye HX API (`GET /hosts`) to find matching hosts for each entity's
    identifier.

    3. If multiple hosts are found for a single entity, it selects the host with the
    most recent last poll timestamp.

    4. Sends a `DELETE` request to the FireEye HX API (`/hosts/{agent_id}/containment`)
    to cancel the containment task for the identified host.

    5. Returns a summary message indicating which entities were successfully uncontained
    and which failed or were not found.


    ### Additional Notes

    - Action is not supported for Linux hosts by FireEye HX.
  ai_short_description: >-
    Cancels the containment of a host on the FireEye HX server based on IP Address
    or Hostname entities, restoring its network communication capabilities.
