Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye HX server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the `FireEyeHXManager`, which attempts to authenticate and obtain
    a token via a GET request to the `/token` endpoint.

    3. Logs out by deleting the token via a DELETE request to the `/token` endpoint.

    4. Returns a success or failure message based on the connection result.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the FireEye HX API.
