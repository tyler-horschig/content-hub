Quarantine IP:
  ai_description: >-
    ### General Description

    Quarantines specific IP address entities across configured sensors in McAfee NSM.
    This action initiates a state change on the external device to prevent network
    traffic to or from the specified IP addresses until they are explicitly released.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `ADDRESS`.

    3. For each valid IP address, iterates over the list of sensor names provided
    in the integration configuration.

    4. Retrieves the sensor ID for each sensor name.

    5. Makes a POST request to the McAfee NSM API (`sensor/{sensor_id}/action/quarantinehost`)
    to quarantine the IP address on that sensor with the duration set to 'UNTIL_EXPLICITLY_RELEASED'.

    6. Collects the successfully quarantined IP addresses and returns a summary message.


    ### Additional Notes

    - The action relies on the 'Sensors Names List Comma Separated' integration configuration
    parameter to determine which sensors to apply the quarantine to.

    - The quarantine duration is hardcoded to 'until_released' (UNTIL_EXPLICITLY_RELEASED).
  ai_short_description: >-
    Quarantines specific IP address entities across configured sensors in McAfee NSM.
