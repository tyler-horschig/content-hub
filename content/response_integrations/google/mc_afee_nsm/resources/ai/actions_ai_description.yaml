Unblock IP:
  ai_description: >-
    ### General Description

    Unblocks specific IP addresses in McAfee NSM. This action initiates a state change
    on the external device to restore network traffic to or from the specified entity
    by removing it from the blocklist policy.


    ### Flow Description

    1. Filters the target entities to include only IP addresses (ADDRESS).

    2. Iterates over the filtered entities.

    3. For each IP address, queries McAfee NSM to find the associated rule object
    in the blocklist policy.

    4. If the rule object contains multiple IPs, it removes the specific IP from the
    rule object via a PUT request.

    5. If the rule object contains only the specific IP, it removes the rule object
    from the policy via a PUT request and deletes the rule object via a DELETE request.

    6. Deploys the configuration changes to the configured sensors via a PUT request.

    7. Logs out of the NSM session.


    ### Additional Notes

    This action relies on the integration-level configuration for McAfee NSM, including
    the API Root, credentials, Domain ID, Policy Name, and Sensor Names.
  ai_short_description: >-
    Unblocks specific IP address entities by removing them from blocklist rule objects
    in McAfee NSM and deploying the changes.
  capabilities:
