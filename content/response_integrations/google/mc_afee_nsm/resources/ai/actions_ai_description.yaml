Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee NSM instance. This action verifies that the provided
    integration configuration credentials and network settings are correct by establishing
    and immediately terminating a session with the McAfee NSM API.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    etc.).

    2. Initializes the `NsmManager`, which authenticates to the McAfee NSM API via
    a GET request to the `session` endpoint to obtain an authentication token.

    3. Terminates the session via a DELETE request to the `session` endpoint.

    4. Returns a success message indicating the connection was successfully established.


    ### Additional Notes

    This action does not require any entities or action-specific parameters. It is
    primarily used for troubleshooting and verifying integration setup.
