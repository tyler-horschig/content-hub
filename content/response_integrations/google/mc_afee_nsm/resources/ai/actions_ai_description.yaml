Block IP:
  ai_description: >-
    ### General Description

    Blocks specific IP addresses in McAfee Network Security Manager (NSM). This action
    initiates a state change on the external device to prevent network traffic to
    or from the specified IP address entities by adding them to a blocklist rule object
    within the firewall policy.


    ### Flow Description

    1. Extracts the target entities from the case that are of type IP Address.

    2. Iterates over the extracted entities and attempts to block each IP address
    using the McAfee NSM API.

    3. If the IP is not already blocked, it either adds the IP to an available rule
    object or creates a new rule object and adds it to the firewall policy.

    4. Deploys the configuration changes to the configured sensors.

    5. Logs out from the McAfee NSM session.

    6. Returns a summary message indicating which entities were successfully blocked.


    ### Additional Notes

    - The action requires a dedicated firewall policy and a list of sensor names configured
    at the integration level.

    - The action automatically manages rule objects, creating new ones if existing
    ones reach their maximum capacity.
  ai_short_description: >-
    Blocks specific IP addresses in McAfee Network Security Manager (NSM) by adding
    them to a firewall policy blocklist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the IP address to a blocklist rule object in the McAfee NSM firewall policy
      and deploys the changes to the sensors.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST/PUT requests to McAfee NSM to create or update rule objects
