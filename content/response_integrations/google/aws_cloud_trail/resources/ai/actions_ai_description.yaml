    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to AWS Cloud Trail to test connectivity but does
      not fetch contextual data for use in the platform. It does not mutate external
      data, mutate internal data, update entities, create insights, modify alert data,
      or create case comments.
