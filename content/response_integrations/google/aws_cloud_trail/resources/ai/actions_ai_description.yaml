Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AWS Cloud Trail service using the provided integration
    configuration parameters. This action ensures that the credentials and region
    settings are valid and that the platform can successfully communicate with the
    AWS Cloud Trail API.


    ### Flow Description

    1. Extracts the AWS Access Key ID, AWS Secret Key, and AWS Default Region from
    the integration configuration.

    2. Initializes the AWS Cloud Trail client.

    3. Executes a `lookup_events` API call to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This is a utility action primarily used to verify that the integration is configured
    correctly. It does not process entities or return data to the case.
  ai_short_description: >-
    Tests connectivity to the AWS Cloud Trail service to ensure the integration is
    configured correctly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
