GetReport:
  ai_description: >-
    ### General Description

    Retrieves the status report for a specific command executed in Symantec Endpoint
    Protection 12. This action allows analysts to check the progress or result of
    previously initiated tasks, such as scans or quarantine operations.


    ### Flow Description

    1. Retrieves the `Command ID` from the action parameters.

    2. Authenticates and connects to the Symantec Endpoint Protection 12 API.

    3. Executes a SOAP request (`getCommandStatusDetails`) to fetch the command status
    details for the provided Command ID.

    4. Returns the report as a JSON object and attaches it to the action results.


    ### Additional Notes

    This action is typically used in playbooks to poll for the completion status of
    asynchronous actions triggered earlier in the flow.
  ai_short_description: >-
    Retrieves the status report for a specific command executed in Symantec Endpoint
    Protection 12.
