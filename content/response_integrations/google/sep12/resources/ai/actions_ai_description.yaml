ScanEndpoint:
  ai_description: >-
    ### General Description

    Initiates a full malware scan on an endpoint using Symantec Endpoint Protection
    12 (SEP12). The action resolves the internal computer ID based on the provided
    IP address or hostname and triggers a "ScanNow_Full" command on the target machine.


    ### Flow Description

    1. Connects to the Symantec Endpoint Protection 12 API using the provided integration
    configuration.

    2. Iterates through the target entities, specifically looking for IP Addresses
    and Hostnames.

    3. Retrieves the internal computer ID for each entity using the SEP12 API (`getComputersByIP`
    or `getComputersByHostName`).

    4. Triggers a full scan (`runClientCommandScan`) on the resolved computer ID via
    a SOAP POST request.

    5. Updates the entity's additional properties with the resulting scan command
    ID.


    ### Additional Notes

    - The scan type is currently hardcoded to "ScanNow_Full" within the script.

    - If a hostname is not found initially, the action attempts to split the identifier
    by `.` and search again using the short name.
  ai_short_description: >-
    Initiates a full malware scan on an endpoint using Symantec Endpoint Protection
    12.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Triggers a full system malware scan on the target endpoint via Symantec Endpoint
      Protection 12.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the SEP12 API to trigger a scan on an endpoint,
      which mutates external state by initiating a process on the remote host. It
      updates the internal entities with the resulting command ID by calling `siemplify.update_entities`.
      It does not fetch contextual enrichment data for display or create insights.
