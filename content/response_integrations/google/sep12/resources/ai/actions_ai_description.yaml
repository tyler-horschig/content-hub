UpdateEndpoint:
  ai_description: >-
    ### General Description

    Triggers a content update on specific endpoints using Symantec Endpoint Protection
    12. This action initiates a command on the external SEP manager to force the target
    endpoints to update their definitions or content.


    ### Flow Description

    1. Establishes a connection to the Symantec Endpoint Protection 12 API using the
    provided integration configuration.

    2. Iterates through the target entities, specifically looking for IP Addresses
    and Hostnames.

    3. For each valid entity, queries the SEP manager to retrieve the corresponding
    Computer ID (`getComputersByIP` or `getComputersByHostName`).

    4. If a Computer ID is found, executes the `runClientCommandUpdateContent` SOAP
    command to trigger an update on the endpoint.

    5. Updates the entity's additional properties within the SecOps platform with
    the resulting command ID.


    ### Additional Notes

    This action only processes Address and Hostname entities. If a hostname is not
    found initially, the action attempts to strip the domain and search again.
