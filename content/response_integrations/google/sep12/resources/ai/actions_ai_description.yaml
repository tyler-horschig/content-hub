UpdateAndScanEndpoint:
  ai_description: >-
    ### General Description

    Triggers an update and full scan operation on specific endpoints using Symantec
    Endpoint Protection (SEP) 12. This action identifies the corresponding computer
    in SEP based on the provided IP address or hostname and initiates the scan command.


    ### Flow Description

    1. Establishes a connection to the Symantec Endpoint Protection API.

    2. Iterates through the target entities, specifically looking for IP Addresses
    and Hostnames.

    3. Queries the SEP API (`getComputersByIP` or `getComputersByHostName`) to retrieve
    the unique computer ID for each valid entity.

    4. Executes an `Update_ScanNow_Full` command on the identified endpoints via the
    SEP API (`runClientCommandUpdateContentAndScan`).

    5. Updates the entities in Google SecOps by appending the returned command ID
    to their additional properties.


    ### Additional Notes

    If a hostname entity is not found initially, the action attempts to strip the
    domain from the identifier and search again.
