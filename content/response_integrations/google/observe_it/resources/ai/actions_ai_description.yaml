Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ObserveIT server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the API Root, Client ID, Client Secret, and Verify SSL settings from
    the integration configuration.

    2. Initializes the ObserveIT API client and authenticates using the provided credentials.

    3. Makes a GET request to the ObserveIT health endpoint (`/v2/apis/report;realm=observeit/_health`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to ensure the integration
    is correctly configured and can communicate with the ObserveIT API.
  ai_short_description: >-
    Tests connectivity to the ObserveIT server to ensure the integration is correctly
    configured and can communicate with the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
