Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the F5 Big IQ instance by attempting to authenticate with
    the provided credentials.


    ### Flow Description

    1. Retrieves integration configuration parameters (Server Address, Username, Password,
    Verify SSL).

    2. Initializes the F5BigIQManager.

    3. The manager attempts to authenticate with the F5 Big IQ API by making a POST
    request to the `/mgmt/shared/authn/login` endpoint.

    4. If successful, it extends the token lifetime via a PATCH request to the `/mgmt/shared/authz/tokens/`
    endpoint.

    5. Returns a success message if the connection is established, or fails otherwise.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can successfully communicate with the F5 Big IQ API.
