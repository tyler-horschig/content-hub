Change Policy Enforcement Mode:
  ai_description: >-
    ### General Description

    Changes the enforcement mode of a specified policy in F5 Big-IQ. This action allows
    users to dynamically update how a policy is enforced (e.g., setting it to 'blocking')
    directly from the SOAR platform.


    ### Flow Description

    1. Retrieves the `Policy ID` and `Enforcement Mode` from the action parameters.

    2. Authenticates with the F5 Big-IQ API using the provided integration credentials.

    3. Sends an HTTP PATCH request to the F5 Big-IQ API (`/mgmt/cm/asm/working-config/policies/{policy_id}`)
    to update the enforcement mode of the specified policy.

    4. Returns a success message indicating the policy mode was successfully changed.


    ### Additional Notes

    This action directly modifies the configuration of a policy on the F5 Big-IQ appliance.
    Ensure that the provided Policy ID is correct and that the specified enforcement
    mode is valid for the target policy.
  ai_short_description: >-
    Changes the enforcement mode of a specified policy in F5 Big-IQ.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the enforcement mode of a specific policy in F5 Big-IQ.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a PATCH request to the F5 Big-IQ API to change the enforcement
      mode of a policy, which means it mutates external data (can_mutate_external_data=true).
      It does not fetch contextual data for enrichment, nor does it mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
