Get Event Logs By Blocking ID:
  ai_description: >-
    ### General Description

    Retrieves event logs from F5 BIG-IQ based on a specific blocking ID. This action
    queries the F5 BIG-IQ system to fetch detailed log records associated with a given
    support or blocking ID, returning the results as a JSON object for further analysis.


    ### Flow Description

    1. Initializes the connection to the F5 BIG-IQ server using the provided credentials.

    2. Retrieves the 'Blocking ID' parameter provided by the user.

    3. Makes a POST request to the F5 BIG-IQ API (`mgmt/cm/shared/es/logiq/asmindex/_search`)
    to search for event logs matching the blocking ID.

    4. If logs are found, attaches the results as a JSON object to the action's output.

    5. Returns a success or failure message based on whether logs were successfully
    retrieved.


    ### Additional Notes

    The action relies on the F5 BIG-IQ search API and requires valid credentials with
    appropriate permissions to query event logs.
