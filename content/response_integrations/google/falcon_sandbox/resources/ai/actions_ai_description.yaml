Submit File:
  ai_description: >-
    ### General Description

    Submits files for analysis to Falcon Sandbox. This action uploads specified files
    to the sandbox environment to initiate a behavioral analysis and threat scoring
    process.


    ### Flow Description

    1. Initializes the Falcon Sandbox client using the provided API root and API key.

    2. Extracts the target file paths and the specified analysis environment from
    the action parameters.

    3. Iterates through the provided file paths.

    4. For each file, makes a POST request to the Falcon Sandbox API (`/submit/file`)
    to upload the file and start the analysis job.

    5. Collects the resulting job ID and SHA256 hash for each successfully submitted
    file.

    6. Returns a JSON object containing the job IDs and hashes, and outputs a summary
    message.


    ### Additional Notes

    Multiple file paths can be submitted by providing them as a comma-separated list
    in the 'File Path' parameter.
