Analyze File:
  ai_description: >-
    ### General Description

    Submits a file to Falcon Sandbox for analysis and retrieves the resulting threat
    report and score. This action allows analysts to detonate suspicious files in
    a specified sandbox environment and review the behavioral analysis results directly
    within the SecOps platform.


    ### Flow Description

    1. Submits the file specified by the `File Path` parameter to Falcon Sandbox via
    a POST request to the `/submit/file` endpoint.

    2. The action runs asynchronously, periodically checking the analysis job status
    via a GET request to `/report/{job_id}/state`.

    3. Once the job is completed, it retrieves the scan information and threat score
    via GET/POST requests to the `/report/summary` endpoints.

    4. Attaches the scan results as a JSON report to the action results.

    5. If the `Include Report` parameter is enabled, it fetches the MISP report via
    a GET request to `/report/{job_id}/file/misp` and attaches it to the action results.


    ### Additional Notes

    This action runs asynchronously to accommodate the time required for sandbox detonation.
    The `Include Report` feature requires a premium API key for Falcon Sandbox.
  ai_short_description: >-
    Submits a file to Falcon Sandbox for analysis and retrieves the resulting threat
    report and score.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Falcon Sandbox for analysis.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action submits a file to an external system (mutates external data) and
      fetches the resulting analysis reports (fetches data). It does not update entities,
      create insights, or modify internal case data.
