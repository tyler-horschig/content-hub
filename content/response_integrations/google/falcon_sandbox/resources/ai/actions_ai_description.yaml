Analyze File Url:
  ai_description: >-
    ### General Description

    Submits a file by URL to Falcon Sandbox for analysis and retrieves the resulting
    threat report and score. This action allows analysts to detonate and analyze suspicious
    files hosted at specific URLs within a designated sandbox environment.


    ### Flow Description

    1. Connects to the Falcon Sandbox API using the provided integration credentials.

    2. Submits the provided `File Url` and `Environment` ID for analysis via an API
    POST request.

    3. Checks the status of the analysis job. If the job is still in progress, the
    action suspends execution and waits asynchronously.

    4. Once the job is completed, retrieves the scan information and threat score
    via API GET/POST requests.

    5. Attaches the detailed JSON and MISP reports to the action results and returns
    the maximum threat score.


    ### Additional Notes

    This is an asynchronous action that will periodically poll the Falcon Sandbox
    API until the analysis job is complete.
