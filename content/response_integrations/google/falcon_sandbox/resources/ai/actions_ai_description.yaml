Get Hash Scan Report:
  ai_description: >-
    ### General Description

    Enriches File Hash entities by fetching scan reports and threat intelligence from
    CrowdStrike Falcon Sandbox (Hybrid Analysis). The action retrieves detailed analysis
    data, updates the entity's properties, evaluates its risk based on a configured
    threshold, and attaches the corresponding MISP report to the entity.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. For each File Hash, queries the Falcon Sandbox API across multiple supported
    environments to retrieve existing scan reports.

    3. Extracts threat scores and other relevant metadata (e.g., vx_family, total_processes)
    from the retrieved reports.

    4. Enriches the entity's additional properties with the extracted data.

    5. Evaluates the maximum threat score against the integration's configured threshold;
    if it exceeds the threshold, the entity is marked as suspicious.

    6. Downloads the MISP report via the Falcon Sandbox API and attaches it to the
    entity.

    7. Updates the entities in the SecOps platform and provides the raw JSON results.


    ### Additional Notes

    The action requires the Falcon Sandbox integration to be configured with a valid
    API Root, API Key, and Threshold. It does not submit new files for analysis; it
    only retrieves reports for previously scanned hashes.
