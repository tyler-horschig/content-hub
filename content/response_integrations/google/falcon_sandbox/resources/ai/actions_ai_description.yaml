Scan URL:
  ai_description: >-
    ### General Description

    Submits URL and Hostname entities to Falcon Sandbox for analysis. It initiates
    an asynchronous scan, waits for the analysis to complete, and retrieves the resulting
    threat intelligence reports to evaluate the risk of the entities.


    ### Flow Description

    1. Iterates through the target entities and filters for URL and Hostname types.

    2. Submits each valid entity to Falcon Sandbox via a POST request to `/submit/url`
    to initiate an analysis job.

    3. Periodically checks the status of the submitted jobs using a GET request to
    `/report/{job_id}/state`.

    4. Once a job is completed, fetches the scan summary report via a POST request
    to `/report/summary`.

    5. Evaluates the AV detection rate against the provided threshold; if it meets
    or exceeds the threshold, marks the entity as suspicious and enriched, and creates
    an insight.

    6. Fetches the MISP report for the job via a GET request to `/report/{job_id}/report/misp`
    and attaches it to the entity.

    7. Updates the entities in the SecOps platform with the new status and attachments.


    ### Additional Notes

    This action runs asynchronously, meaning it will pause and re-awaken to check
    the status of the analysis jobs until they are completed or failed.
