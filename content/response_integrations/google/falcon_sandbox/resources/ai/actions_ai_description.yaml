Wait For Job and Fetch Report:
  ai_description: >-
    ### General Description

    Waits for a Falcon Sandbox scan job to complete and fetches the corresponding
    scan report. This action is designed to be used asynchronously after a file or
    URL has been submitted for analysis, allowing the playbook to pause until the
    analysis is finished.


    ### Flow Description

    1. Retrieves the provided `Job ID` parameter, splitting it into a list if multiple
    IDs are provided.

    2. Iterates through the job IDs and queries the Falcon Sandbox API (`GET /report/{job_id}/state`)
    to check the execution status of each job and any related child jobs.

    3. If any job is still in progress or queued, the action returns an in-progress
    state, causing the SOAR platform to wait and re-execute the action later.

    4. Once all jobs have completed, the action fetches the scan summary reports for
    the successful jobs using the Falcon Sandbox API (`POST /report/summary`).

    5. For each completed job, it also retrieves the MISP format report (`GET /report/{job_id}/report/misp`)
    and attaches it to the action's results.

    6. Returns the overall scan information as JSON results.


    ### Additional Notes

    This action is asynchronous. It will repeatedly check the job status until completion
    or failure. Ensure that the provided Job IDs are valid and accessible by the configured
    API key.
  ai_short_description: >-
    Waits for a Falcon Sandbox scan job to complete, fetches the scan report, and
    attaches the MISP report to the action results.
