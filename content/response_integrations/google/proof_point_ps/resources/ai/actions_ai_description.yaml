Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and User entities using ProofPoint Email Protection. The action
    queries the ProofPoint Protection Server for quarantine messages associated with
    the entities and appends the retrieved message details to the entities' additional
    properties.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Checks if the entity is a Hostname or a User with a valid email address format.

    3. For Hostnames, extracts the domain and searches ProofPoint via the `/rest/v1/quarantine`
    endpoint for quarantine messages where the domain is the sender or recipient.

    4. For Users, searches ProofPoint for quarantine messages where the email address
    is the sender or recipient.

    5. Filters out specific fields (`dlpviolation`, `messagestatus`) from the retrieved
    records.

    6. Flattens the remaining record data and updates the entity's additional properties.

    7. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches Hostname and User entities by querying ProofPoint Email Protection for
    associated quarantine messages and appending the results to the entities' additional
    properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the ProofPoint API (`/rest/v1/quarantine`).
      It does not mutate external data. It updates internal entities by calling `siemplify.update_entities`
      to save the new additional properties. It does not create insights, modify alert
      data, or create case comments.
