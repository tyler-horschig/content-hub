Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ProofPoint Protection Server to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the ProofPointPSManager.

    3. Executes a test search query (`sender="*"`) via a GET request to the `/rest/v1/quarantine`
    endpoint to verify API access.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This is a utility action used to verify that the integration is configured correctly
    and can communicate with the ProofPoint Protection Server API.
  ai_short_description: >-
    Tests connectivity to the ProofPoint Protection Server by executing a test search
