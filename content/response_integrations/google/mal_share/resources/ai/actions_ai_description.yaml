Upload File:
  ai_description: >-
    ### General Description

    Uploads a specified file to MalShare for scanning and analysis. This action submits
    a local file to the MalShare service and retrieves the resulting threat intelligence
    and hash details.


    ### Flow Description

    1. Retrieves the `File Path` parameter provided by the user.

    2. Makes a POST request to the MalShare API (`/api.php?action=upload`) to upload
    the file.

    3. Parses the response to extract the file hash.

    4. Makes a GET request to the MalShare API (`/api.php?action=details`) to retrieve
    the scan results for the uploaded file hash.

    5. Attaches the scan results as a JSON object and a CSV table to the action results.


    ### Additional Notes

    The action requires a valid MalShare API key configured in the integration settings.
  ai_short_description: >-
    Uploads a specified file to the MalShare service for scanning and retrieves the
    resulting threat intelligence and hash details.
