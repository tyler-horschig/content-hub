Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches file hash entities by searching for them in MalShare. It retrieves detailed
    threat intelligence and file analysis information to provide context on potentially
    malicious files.


    ### Flow Description

    1. Iterates through the target entities and filters for those of type `FILEHASH`.

    2. Makes a GET request to the MalShare API (`/api.php?action=details&hash=...`)
    for each valid file hash.

    3. If data is found, enriches the entity by adding a CSV table with the results
    to the entity's view.

    4. Updates the entity's additional properties with the retrieved data, marks it
    as enriched, and flags it as suspicious.

    5. Returns the raw JSON results and updates the entities within the Google SecOps
    platform.


    ### Additional Notes

    Entities that are not found in MalShare or encounter errors during the API request
    are skipped and logged. The action will fail if no entities are successfully enriched.
  ai_short_description: >-
    Enriches file hash entities by querying the MalShare API to retrieve detailed
    threat intelligence and file analysis information, updating the entities with
    the findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the MalShare API to fetch hash data. It does
      not mutate external data but updates internal entities by adding tables, modifying
      properties, and setting the 'is_enriched' and 'is_suspicious' flags. It does
      not create insights or case comments.
