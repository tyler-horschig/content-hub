Ping:
  ai_description: >-
    ### General Description

    The Ping action is used to test the connectivity between Google SecOps and the
    MalShare service.


    ### Flow Description

    1. The action retrieves the integration configuration parameters, including the
    API Key and SSL verification settings.

    2. It initializes the MalShareManager to handle API interactions.

    3. A GET request is made to the MalShare API using the `getlist` action to verify
    that the provided credentials are valid and the service is reachable.

    4. If the request is successful, the action completes and returns a success message.


    ### Additional Notes

    This action does not require any specific parameters or entities to run. It is
    primarily used during the initial setup or troubleshooting of the MalShare integration.
