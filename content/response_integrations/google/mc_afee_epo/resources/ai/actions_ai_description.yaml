Get Agent Information:
  ai_description: >-
    ### General Description

    Retrieves agent information about endpoints from McAfee ePO based on Hostname
    or IP Address entities. The action fetches system information for each supported
    entity, extracts the agent details, and enriches the entities within the platform.


    ### Flow Description

    1. Initializes the McAfee ePO manager with the provided credentials and connection
    settings.

    2. Iterates over the target entities, filtering for supported types (Hostname
    and IP Address).

    3. For each suitable entity, fetches system information from McAfee ePO using
    the entity's original identifier.

    4. Extracts agent-specific information from the retrieved system data.

    5. Enriches the entity's additional properties with the agent data and marks the
    entity as enriched.

    6. Adds the agent information to the action's JSON result and creates an entity
    table for display.

    7. Updates the enriched entities in the platform.


    ### Additional Notes

    - Supported entity types are Hostname and IP Address.

    - The action relies on the `system.find` API endpoint in McAfee ePO to retrieve
    the system information.
  ai_short_description: >-
    Retrieves agent information about endpoints from McAfee ePO based on Hostname
    or IP Address entities, and enriches the entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional properties of the target entities with the retrieved
