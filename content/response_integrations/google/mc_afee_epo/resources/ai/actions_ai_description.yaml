Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the McAfee ePO database to retrieve specific records
    from a designated table. This action allows analysts to flexibly query any accessible
    table within McAfee ePO to gather information, events, or telemetry data.


    ### Flow Description

    1. Extracts the table name, fields to return, where clause, sort parameters, and
    result limit from the action inputs.

    2. Constructs a database query using the provided parameters.

    3. Makes an API call to McAfee ePO (`core.executeQuery`) to execute the custom
    query.

    4. Parses the returned results and formats them into JSON and CSV structures.

    5. Attaches the results to the action's JSON result and creates a data table in
    the case wall.


    ### Additional Notes

    The action allows for flexible querying of any accessible table within McAfee
    ePO. Ensure the provided table name, fields, and where clause syntax match the
    McAfee ePO database schema and query language requirements.
