Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a custom entity-based query in McAfee ePO. This action dynamically constructs
    a "Where" clause using the provided target entities (IP, Hostname, User, File
    Hash, URL) and retrieves matching records from a specified table.


    ### Flow Description

    1. Extracts action parameters including the target table name, fields to return,
    sorting preferences, and time frame.

    2. Iterates over the target entities, filtering for supported types (IP, Hostname,
    User, File Hash, URL) and grouping their identifiers.

    3. Validates if enough entities are present based on the `Stop If Not Enough Entities`
    parameter.

    4. Constructs a database query using the provided entity keys and logical operators.

    5. Executes the query against the McAfee ePO database via the `core.executeQuery`
    API endpoint.

    6. Returns the query results as JSON and a data table.


    ### Additional Notes

    The action supports custom time frames and allows specifying which entity keys
    map to which database columns.
