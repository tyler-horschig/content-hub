Compare Server and Agent DAT:
  ai_description: >-
    ### General Description

    Retrieves and compares the server and agent DAT (antivirus signature) versions
    for specific endpoint entities (Hostname, IP Address) from McAfee ePO. This action
    helps determine if the endpoint's antivirus signatures are up-to-date with the
    server.


    ### Flow Description

    1. Filters the target entities to include only internal Hostname and IP Address
    entities.

    2. Initializes the connection to the McAfee ePO API.

    3. Retrieves system data for the configured group from McAfee ePO.

    4. Iterates over each suitable entity and fetches its specific agent DAT version
    as well as the global server DAT version.

    5. Compares the agent DAT version with the server DAT version to check for equality.

    6. Attaches the comparison results as an entity-specific table and a comprehensive
    JSON result to the action.


    ### Additional Notes

    The action returns a boolean value indicating whether the agent DAT version matches
    the server DAT version for the processed entities.
