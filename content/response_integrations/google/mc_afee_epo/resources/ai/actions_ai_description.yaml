Add Tag:
  ai_description: >-
    ### General Description

    Adds a specified tag to an endpoint (Hostname or IP Address) in McAfee ePO. This
    action allows analysts to categorize or trigger policy assignments on endpoints
    by applying existing tags within the McAfee ePO environment.


    ### Flow Description

    1. Extracts the target tag name from the action parameters.

    2. Filters the target entities to include only Hostname and IP Address entities.

    3. Iterates through the suitable entities and retrieves their system information
    from McAfee ePO to resolve the host ID or hostname.

    4. Applies the specified tag to the endpoint using the McAfee ePO API (`system.applyTag`).

    5. Returns a summary message indicating which endpoints were successfully tagged,
    ignored (already tagged), or failed.


    ### Additional Notes

    The tag must already exist in the McAfee ePO system before it can be applied.
    If the tag does not exist, the action will fail for that endpoint.
  ai_short_description: >-
    Adds a specified tag to Hostname or IP Address entities in McAfee ePO.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specified tag to an endpoint in McAfee ePO.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to McAfee ePO to apply a tag to an endpoint. This
      mutates external data. It does not fetch data to enrich the case, nor does it
      mutate internal SOAR data, update entities, or create insights.
