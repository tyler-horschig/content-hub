Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by fetching endpoint system information
    from Vectra. This action retrieves contextual metadata and threat scores for the
    specified endpoints and updates the entities within the Google SecOps platform.


    ### Flow Description

    1. Initializes the Vectra API client using the provided integration configuration.

    2. Filters the target entities to include only those of type `HOSTNAME` or `ADDRESS`.

    3. Iterates through the filtered entities and makes a GET request to the Vectra
    API (`api/v2.1/hosts`) to retrieve endpoint details based on the entity's identifier.

    4. Filters the retrieved endpoints to find an exact match with the entity's identifier
    (matching either the endpoint name or IP).

    5. If a match is found, extracts the enrichment data and updates the entity's
    `additional_properties`, marking it as enriched.

    6. Adds the endpoint details to the action's JSON results and creates an entity
    table.

    7. Updates the successfully enriched entities in the Google SecOps platform.


    ### Additional Notes

    - If multiple matches are found in Vectra for a single entity, the action will
    use the first match for enrichment.

    - Entities that do not return any matching endpoints from Vectra will be skipped
    and reported as failed in the output message.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by fetching endpoint system information
    and threat scores from Vectra.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Vectra API via a GET request to retrieve endpoint
      details. It does not mutate external data. It updates the internal entities
      with the fetched enrichment data by calling `siemplify.update_entities`. It
      does not create insights, modify alert data, or create case comments.
