  ai_description: >-
    ### General Description

    Removes specified tags from an endpoint or detection in Vectra.


    ### Flow Description

    1. Retrieves the current information and existing tags for the specified endpoint
    or detection from Vectra using a GET request to `api/v2.1/hosts/{item_id}` or
    `api/v2.1/detections/{item_id}`.

    2. Calculates the new list of tags by removing the user-specified tags from the
    existing ones.

    3. Updates the tags on the endpoint or detection in Vectra using a PATCH request
    to `/api/v2.1/tagging/host/{item_id}` or `/api/v2.1/tagging/detection/{item_id}`.


    ### Additional Notes

    The action will fail if the specified item is not found or if the tags to be removed
    do not exist on the item.
