Add Tags:
  ai_description: >-
    ### General Description

    Adds tags to a specific endpoint or detection in Vectra. This action modifies
    the external item by appending the provided tags to its existing tag list.


    ### Flow Description

    1. Extracts the target item type (Endpoint or Detection), item ID, and the tags
    to be added from the action parameters.

    2. Makes a GET request to the Vectra API to retrieve the current information and
    existing tags of the specified item.

    3. Appends the new tags to the retrieved existing tags.

    4. Makes a PATCH request to the Vectra API to update the item with the combined
    list of tags.

    5. Returns a success message if the tags are updated successfully, or an error
    message if the item is not found or the update fails.


    ### Additional Notes

    Tags should be provided as a comma-separated string.
  ai_short_description: >-
    Adds tags to a specific endpoint or detection in Vectra.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the tags of a specific endpoint or detection in Vectra.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the Vectra API to update the tags of a specific
      endpoint or detection. It does not fetch contextual data for entities, nor does
      it mutate internal SecOps data, update entities, or create insights.
