    Updates a note for a specific endpoint or detection in Vectra.


    ### Flow Description

    1. Retrieves the provided Item Type (Endpoint or Detection), Item ID, and Note
    from the action parameters.

    2. Makes a GET request to the Vectra API to verify the existence of the specified
    item.

    3. If the item exists, makes a PATCH request to the Vectra API to update the note
    on the specified endpoint or detection.

    4. Returns a success message if the note is updated successfully, or an error
    message if the item is not found or the update fails.


    ### Additional Notes

    None.
