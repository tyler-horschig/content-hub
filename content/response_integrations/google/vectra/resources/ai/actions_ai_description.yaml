Get Triage Rule Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific triage rules from Vectra. This action
    fetches the configuration and metadata of the requested triage rules and can optionally
    generate case insights for each rule.


    ### Flow Description

    1. Extracts the provided comma-separated list of Triage Rule IDs.

    2. Iterates over each ID and makes a GET request to the Vectra API (`/api/v2.1/rules/{triage_id}`)
    to fetch the triage rule details.

    3. If the `Create Insights` parameter is enabled, generates a case insight containing
    the detection category, triage category, detection, and description for each successfully
    retrieved triage rule.

    4. Compiles the retrieved data into a JSON result and a data table for further
    use in the playbook.


    ### Additional Notes

    If a specified triage rule ID is not found in Vectra, the action will skip it
    and report the failure in the output message.
