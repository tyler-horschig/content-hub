Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, MAC Address, and User entities using Axonius. This
    action retrieves detailed asset and user information from Axonius to provide additional
    context for the entities within the case.


    ### Flow Description

    1. Iterates over the target entities and filters them by supported types (IP Address,
    Hostname, MAC Address, User).

    2. Groups the entities and queries the Axonius API (`POST /api/V4.0/users` and
    `POST /api/V4.0/devices`) to find matching records and their internal Axonius
    IDs.

    3. For each matched entity, fetches detailed information from Axonius (`GET /api/V4.0/users/{id}`
    and `GET /api/V4.0/devices/{id}`).

    4. Updates the entities with the retrieved enrichment data.

    5. Generates JSON results, entity tables, and case insights based on the action
    parameters.


    ### Additional Notes

    - User entities that match an email regex will be processed as email addresses.
  ai_short_description: >-
    Enriches IP Address, Hostname, MAC Address, and User entities by retrieving detailed
    information from Axonius.
