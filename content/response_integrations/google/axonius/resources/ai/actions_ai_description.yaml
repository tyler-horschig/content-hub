    IP Address, MAC Address, User).

    2. Categorizes the filtered entities into users (usernames, emails) and devices
    (IPs, hostnames, MACs).

    3. Queries the Axonius API (`POST /api/V4.0/users` and `POST /api/V4.0/devices`)
    to retrieve the internal Axonius IDs for the matched entities.

    4. Sends a DELETE request to the Axonius API (`/api/V4.0/users/labels` and `/api/V4.0/devices/labels`)
    to remove the specified tags from the resolved users and devices.

    5. Returns a summary of successful and failed tag removal operations.


    ### Additional Notes

    Entities that cannot be found in Axonius will be skipped and marked as failed
    in the action results.
