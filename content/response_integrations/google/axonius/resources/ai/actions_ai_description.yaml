Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Axonius platform using the provided integration configuration
    parameters. This action ensures that the API credentials and network access are
    correctly configured.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, API Key,
    API Secret, and Verify SSL).

    2. Initializes the Axonius API client.

    3. Makes an HTTP GET request to the Axonius `/api/V4.0/settings/meta/about` endpoint
    to verify connectivity.

    4. Returns a successful execution state if the connection is established, or a
    failed state if an error occurs.


    ### Additional Notes

    This action is primarily used for validating integration credentials and network
    access. It does not interact with cases, alerts, or entities.
