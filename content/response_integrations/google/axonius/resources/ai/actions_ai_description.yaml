Add Note:
  ai_description: >-
    ### General Description

    Adds a specified note to user and device entities within Axonius. This action
    initiates a state change on the external Axonius platform by appending the provided
    text note to the matching records.


    ### Flow Description

    1. Iterates through the target entities and filters for supported types (Hostname,
    IP Address, MAC Address, and User).

    2. Queries the Axonius API to retrieve the internal Axonius IDs for the matching
    entities.

    3. Makes POST requests to the Axonius API to append the provided note to each
    successfully identified user or device.

    4. Returns the JSON results of the added notes and attaches them to the action
    results.


    ### Additional Notes

    Supported entities include Hostname, IP, Mac Address, User, and Email Addresses
    (User entities that match an email regex).
  ai_short_description: >-
    Adds a specified note to user and device entities within Axonius.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a note to user and device records in the Axonius platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches internal Axonius IDs for users and devices (fetches_data=true)
      and then makes POST requests to the Axonius API to add notes to those entities
      (can_mutate_external_data=true). It does not mutate internal SecOps data, update
      entities, or create insights.
