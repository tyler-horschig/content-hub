Remove Public Access From Bucket:
  ai_description: >-
    ### General Description

    Removes public access from a specified Google Cloud Storage bucket by modifying
    its Access Control List (IAM policy). It can also optionally enforce public access
    prevention on the bucket.


    ### Flow Description

    1. Retrieves the specified bucket from Google Cloud Storage using the provided
    Resource Name.

    2. Removes public access principals (`allUsers` and `allAuthenticatedUsers`) from
    the bucket's IAM policy bindings.

    3. If the `Prevent Public Access From Bucket` parameter is enabled, updates the
    bucket's IAM configuration to enforce public access prevention.


    ### Additional Notes

    This action directly modifies the external state of the Google Cloud Storage bucket
    to restrict public access.
