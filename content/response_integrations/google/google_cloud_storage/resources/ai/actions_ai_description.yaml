Download an Object From a Bucket:
  ai_description: >-
    ### General Description

    Downloads a specific object from a Google Cloud Storage bucket to a designated
    local path on the host executing the action.


    ### Flow Description

    1. Initializes the Google Cloud Storage client using the provided credentials.

    2. Fetches the specified bucket using the Google Cloud Storage API.

    3. Retrieves the specified object (blob) from the bucket.

    4. Validates the local download directory.

    5. Downloads the object to the local path.

    6. Returns the downloaded object's name and local path as a JSON result.


    ### Additional Notes

    The action requires appropriate read permissions on the target bucket and object.
    The download path must be an existing directory on the executing host.
  ai_short_description: >-
    Downloads a specific object from a Google Cloud Storage bucket to a local directory.
