List Bucket Objects:
  ai_description: >-
    ### General Description

    Retrieves a list of objects stored within a specified Google Cloud Storage bucket.
    This action fetches metadata for the objects, such as content type, creation time,
    size, and optionally their Access Control Lists (ACLs).


    ### Flow Description

    1. Initializes the Google Cloud Storage client using the provided integration
    credentials.

    2. Validates the requested maximum number of objects to return, defaulting to
    50 if the provided value is too low.

    3. Makes an API call (`list_blobs`) to Google Cloud Storage to fetch the objects
    within the specified bucket.

    4. Optionally retrieves the Access Control List (ACL) for each object if the corresponding
    parameter is enabled.

    5. Formats the retrieved object data and returns it as a JSON result attached
    to the action execution.


    ### Additional Notes

    This action does not operate on SecOps entities. Ensure the provided service account
    or workload identity has sufficient permissions (e.g., `roles/storage.objectViewer`)
    to list objects in the target bucket. Note that attempting to retrieve ACLs on
    a bucket with uniform bucket-level access enabled will result in an error.
