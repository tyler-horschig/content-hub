"Get a Bucket\u2019s Access Control List":
  ai_description: >-
    ### General Description

    Retrieves the access control list (ACL) for one or more specified Google Cloud
    Storage buckets. This action allows analysts to review the permissions and access
    policies applied to cloud storage resources directly from the SOAR platform.


    ### Flow Description

    1. Extracts the comma-separated list of bucket names from the action parameters.

    2. Initializes the Google Cloud Storage client using the provided integration
    credentials.

    3. Iterates through the list of bucket names and makes an API call (`client.get_bucket`)
    to Google Cloud Storage to fetch the ACL for each bucket.

    4. Aggregates the retrieved ACL data and returns it as a JSON result.


    ### Additional Notes

    If a bucket has uniform bucket-level access enabled, legacy ACLs cannot be retrieved,
    and the action will report this limitation in the output message. Ensure the provided
    service account has the necessary permissions to read bucket IAM policies.
