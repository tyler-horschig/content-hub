Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Blue Coat ProxySG server using the provided
    integration configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (SSH Root, Username, Password).

    2. Initializes the Symantec Blue Coat ProxySG manager.

    3. Establishes an SSH connection to the server.

    4. Executes the `help` command to verify connectivity.

    5. Returns a success message if the connection is established and the command
    executes successfully, otherwise returns an error.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the Symantec Blue Coat ProxySG server.
