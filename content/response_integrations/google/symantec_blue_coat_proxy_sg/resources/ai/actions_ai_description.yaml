Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and URL entities using information from Symantec
    Blue Coat ProxySG. This action connects to the ProxySG appliance via SSH, executes
    diagnostic commands (such as DNS tests, geolocation, threat risk, and content
    filtering), and retrieves contextual information. It updates the entities with
    the retrieved data and optionally creates insights.


    ### Flow Description

    1. Iterates through the target entities, filtering for Hostname, IP Address, and
    URL types.

    2. Connects to the Symantec Blue Coat ProxySG appliance via SSH.

    3. Executes specific diagnostic commands based on the entity type (`test dns`
    for Hostnames, `test geolocation` for IP Addresses, and `test threat-risk` / `test
    content-filter` for URLs).

    4. Parses the command output to extract relevant enrichment data.

    5. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    6. Optionally creates an insight for the entity if the 'Create Insight' parameter
    is enabled.

    7. Returns the enrichment data as a JSON result and updates the entities within
    the platform.


    ### Additional Notes

    The action relies on SSH access to the ProxySG appliance to execute interactive
    shell commands.
  ai_short_description: >-
    Enriches Hostname, IP Address, and URL entities by retrieving diagnostic and contextual
    information from Symantec Blue Coat ProxySG via SSH.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
