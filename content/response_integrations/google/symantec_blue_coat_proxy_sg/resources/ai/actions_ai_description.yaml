Block Entities:
  ai_description: >-
    ### General Description

    Blocks specific IP address entities on Symantec Blue Coat ProxySG. This action
    initiates a state change on the external device to prevent network traffic to
    or from the specified entity.


    ### Flow Description

    1. Iterates over the target entities and filters for IP addresses.

    2. For each suitable entity, establishes an SSH connection to the Symantec Blue
    Coat ProxySG appliance.

    3. Executes a sequence of interactive shell commands (`conf t`, `attack-detection`,
    `client`, `block <ip>`) to block the IP address.

    4. Collects the execution results and attaches them as JSON to the action result.


    ### Additional Notes

    Requires SSH access to the ProxySG appliance.
  ai_short_description: >-
    Blocks specific IP address entities on Symantec Blue Coat ProxySG to prevent network
    traffic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the IP address to the blocklist on the Symantec Blue Coat ProxySG via SSH
      commands.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a block command on an external system (ProxySG) via SSH,
      mutating external data. It does not fetch data, update internal entities, create
      insights, modify alerts, or create case comments.
