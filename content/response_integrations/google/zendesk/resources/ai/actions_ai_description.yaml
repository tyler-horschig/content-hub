Add Comment To Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to an existing ticket in Zendesk.


    ### Flow Description

    1. Extracts the action parameters: Ticket ID, Comment Body, Author Name, and Internal
    Note.

    2. Initializes the ZendeskManager with the integration configuration.

    3. Retrieves the current ticket details from the Zendesk API via a GET request.

    4. Modifies the ticket payload to include the new comment and its visibility (public
    or internal).

    5. Sends a PUT request to the Zendesk API to update the ticket with the new comment.

    6. Returns a success message if the comment was added successfully, or an error
    message otherwise.


    ### Additional Notes

    The comment can be set as public or internal based on the 'Internal Note' parameter.
    If an Author Name is provided, it must exist in Zendesk.
  ai_short_description: >-
    Adds a comment to an existing ticket in Zendesk.
