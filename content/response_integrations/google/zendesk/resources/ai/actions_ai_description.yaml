      Adds a comment to an existing ticket in Zendesk.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Zendesk API to update a ticket with a
      new comment, which mutates external data. It does not fetch contextual data
      for entities, mutate internal data, update entities, or create insights.
