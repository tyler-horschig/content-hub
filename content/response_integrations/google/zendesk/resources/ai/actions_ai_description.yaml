Apply Macros On Ticket:
  ai_description: >-
    ### General Description

    Applies a specified macro to an existing ticket in Zendesk, updating its properties
    based on the macro's predefined actions.


    ### Flow Description

    1. Retrieves the Zendesk configuration and initializes the ZendeskManager.

    2. Fetches the macro ID by querying the Zendesk API (`/macros.json`) using the
    provided Macro Title.

    3. Retrieves the updated ticket state by simulating the macro application via
    a GET request to `/tickets/{ticket_id}/macros/{macro_id}/apply.json`.

    4. Updates the ticket with the new state via a PUT request to `/tickets/{ticket_id}.json`.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    The action requires a valid Ticket ID and an exact, case-sensitive match for the
    Macro Title.
