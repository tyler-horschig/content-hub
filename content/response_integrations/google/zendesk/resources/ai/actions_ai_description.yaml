Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Zendesk with new details such as subject, assigned
    user, assignment group, priority, ticket type, tag, status, and an optional additional
    comment.


    ### Flow Description

    1. Extracts the provided configuration and action parameters, including the Ticket
    ID and the fields to be updated.

    2. Initializes the Zendesk API client.

    3. Calls the Zendesk API to update the specified ticket with the new details (e.g.,
    subject, priority, status).

    4. If an additional comment is provided, makes a subsequent API call to append
    the comment to the ticket, respecting the internal note setting.

    5. Returns a success message if the ticket is updated successfully, or an error
    message if the operation fails.


    ### Additional Notes

    Ensure the provided Ticket ID is valid and exists in Zendesk.
