Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Zendesk with specific properties such as subject, description,
    assignee, priority, and tags.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the format of the provided email CCs using a regular expression.

    3. If the `Validate Email CCs` parameter is enabled, makes a GET request to fetch
    existing users from Zendesk to ensure the provided CC emails exist in the system.

    4. Makes a POST request to the Zendesk API to create the ticket with the specified
    properties.

    5. Returns the ID of the newly created ticket.


    ### Additional Notes

    The action will fail if invalid email formats are provided or if the emails do
    not exist in Zendesk when validation is enabled.
