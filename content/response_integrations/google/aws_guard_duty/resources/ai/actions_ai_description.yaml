    a new threat intelligence feed for a specific GuardDuty detector using a provided
    file location and format.


    ### Flow Description

    1. Extracts the action parameters including Detector ID, Name, File Format, File
    Location, Active status, and Tags.

    2. Establishes a connection to the AWS GuardDuty service.

    3. Makes an API call to AWS GuardDuty (`create_threat_intel_set`) to create the
    Threat Intelligence Set with the specified configuration.

    4. Returns the ID of the newly created Threat Intelligence Set in the JSON results.


    ### Additional Notes

