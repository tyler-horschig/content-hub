    Creates a single Amazon GuardDuty detector. A detector is a resource that represents
    the GuardDuty service. You can have only one detector per account per Region.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Connects to the AWS GuardDuty service.

    3. Calls the `create_detector` API endpoint with the specified `Enable` parameter.

    4. Returns the created detector ID in the JSON results.


    ### Additional Notes

