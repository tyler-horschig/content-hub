Archive Findings:
  ai_description: >-
    ### General Description

    Archives specific AWS GuardDuty findings based on their finding IDs. This action
    initiates a state change in the external AWS environment to mark the specified
    findings as archived.


    ### Flow Description

    1. Initializes a connection to the AWS GuardDuty service using the provided credentials
    and region.

    2. Parses the comma-separated list of finding IDs provided in the parameters.

    3. Makes an API call (`get_findings`) to AWS GuardDuty to verify the existence
    of the specified findings under the given Detector ID.

    4. Iterates through the verified finding IDs and makes an API call (`archive_findings`)
    to AWS GuardDuty for each finding to archive it.

    5. Compiles a list of successfully archived findings and any findings that could
    not be found or archived.

    6. Returns a summary message indicating the success or failure of the archive
    operations.


    ### Additional Notes

    The action will only attempt to archive findings that are successfully retrieved
    and verified in step 3. Any finding IDs that do not exist or cannot be fetched
    will be reported as not archived.
  ai_short_description: >-
    Archives specified AWS GuardDuty findings using their finding IDs and the associated
    detector ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Archives specified findings in AWS GuardDuty.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to AWS GuardDuty to archive specific findings,
      which mutates external data. It does not fetch data to enrich entities, nor
      does it mutate internal SecOps data.
