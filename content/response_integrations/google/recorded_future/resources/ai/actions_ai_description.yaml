    Enriches File Hash entities using Recorded Future. This action retrieves threat
    intelligence including risk scores, triggered rules, criticality, and hash algorithms.
    It evaluates the risk based on a configured threshold, updates the entity's suspicious
    status, and generates an insight with the analysis results.


