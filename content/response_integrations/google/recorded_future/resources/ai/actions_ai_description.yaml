Update Alert:
  ai_description: >-
    ### General Description

    Updates a specific alert in Recorded Future. This action allows users to modify
    the status, assignee, and add a note to an existing alert within the Recorded
    Future platform.


    ### Flow Description

    1. Extracts the provided parameters including Alert ID, Assign To, Note, and Status.

    2. Maps the provided status to the corresponding Recorded Future status value.

    3. Validates that at least one of the update parameters (Status, Assign To, Note)
    has a valid value provided.

    4. Initiates a POST request to the Recorded Future API (`/v2/alert/update`) to
    update the alert with the specified details.

    5. Returns the updated alert information as a JSON result.


    ### Additional Notes

    - The action requires a valid Alert ID.

    - Although the Status parameter is marked as mandatory, selecting 'Select One'
    will pass a null value. In this case, either 'Assign To' or 'Note' must be provided
    to successfully execute the update.
