Add Analyst Note:
  ai_description: >-
    ### General Description

    Adds an analyst note to previously enriched entities in Recorded Future. If an
    entity does not contain a Recorded Future ID, the action will first perform an
    enrichment to retrieve the ID and optionally update the entity with the enrichment
    data.


    ### Flow Description

    1. Filters target entities to include only Hostname, CVE, FileHash, Address, and
    URL types.

    2. Checks if the entities already have a Recorded Future ID in their additional
    properties.

    3. For entities without an ID, fetches IOC-related entity objects from Recorded
    Future.

    4. Optionally updates these entities with the retrieved enrichment data (risk
    score, rules, etc.) if the `Enrich Entity?` parameter is enabled.

    5. Publishes the analyst note to Recorded Future for all successfully identified
    entities.

    6. Updates the entities in the SecOps platform with the new document ID.


    ### Additional Notes

    The Recorded Future API token must have the necessary permissions to publish analyst
    notes to the specified source.
  ai_short_description: >-
    Adds an analyst note to entities in Recorded Future, optionally enriching them
    first if they lack a Recorded Future ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Publishes an analyst note to Recorded Future for the specified entities.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Recorded Future to get IOC related entity objects
      (`fetches_data` = true). It mutates external data by publishing an analyst note
      to Recorded Future (`can_mutate_external_data` = true). It updates internal
      entities with the enrichment data and document ID (`can_update_entities` = true).
      It does not create insights or case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: true
      cve_id: false
      database: false
