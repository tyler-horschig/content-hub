      Updates entity properties, suspicious status, and creates case insights.
    reasoning: >-
      The action fetches data from the Recorded Future API using a GET request (`fetches_data`
      = true). It does not mutate external data (`can_mutate_external_data` = false).
      It mutates internal data by updating entities and creating insights (`can_mutate_internal_data`
      = true, `can_update_entities` = true, `can_create_insight` = true). It does
      not modify alert data or create case comments.
