Enrich CVE:
  ai_description: >-
    ### General Description

    Queries Recorded Future to retrieve threat intelligence and reputation information
    for CVE entities. The action evaluates the risk score against a defined threshold
    to determine if the CVE is malicious, and enriches the entity with the retrieved
    data.


    ### Flow Description

    1. Initializes the Recorded Future API client.

    2. Iterates over the target entities, filtering for CVE entities.

    3. Makes a GET request to the Recorded Future API (`/v2/vulnerability/{entity}`)
    to fetch reputation data.

    4. Optionally retrieves related entities if the `Include Related Entities` parameter
    is enabled.

    5. Evaluates the retrieved risk score against the `Risk Score Threshold`. If the
    score exceeds the threshold, the entity is marked as suspicious.

    6. Creates a case insight containing the enrichment data, triggered rules, and
    a link to the Recorded Future web report.

    7. Updates the entity's additional properties with the enrichment data and saves
    the changes.


    ### Additional Notes

    None.
  ai_short_description: >-
    Queries Recorded Future to retrieve threat intelligence and reputation information
    for CVE entities, evaluating risk scores and enriching the entities with the results.
  capabilities:
    can_create_case_comments: false
