Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Joe Sandbox API to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Initializes the Joe Sandbox manager using the integration's configured API
    root and API key.

    2. Sends a POST request to the `api/v2/server/online` endpoint to check the server
    status.

    3. Evaluates the response to determine if the Joe Sandbox server is online or
    in maintenance mode.

    4. Returns a success message if connected, or a failure message if the service
    is unavailable.


    ### Additional Notes

    This action is used for diagnostic purposes and does not interact with case entities,
    alerts, or modify any data.
