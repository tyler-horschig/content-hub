    \ are found, retrieves the detailed analysis information and downloads the corresponding\
    \ PDF report via API calls.\n5. Attaches the downloaded PDF report and a web link\
    \ to the entity in the SecOps platform.\n6. Enriches the entity with the flattened\
    \ analysis data.\n7. Evaluates the analysis results to determine if the detection\
    \ is suspicious or malicious. If so, marks the entity as suspicious and creates\
    \ an insight.\n8. Updates the enriched entities in the platform and outputs the\
    \ analysis data as a JSON result.\n\n### Additional Notes\nIf the daily API submission\
    \ limit is reached, the action will log an error and raise an exception. For other\
