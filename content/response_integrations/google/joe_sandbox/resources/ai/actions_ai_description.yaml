Detonate File:
  ai_description: >-
    ### General Description

    Submits files to JoeSandbox for detonation and analysis to fetch their reputation
    and threat intelligence.


    ### Flow Description

    1. Parses the provided file paths from the action parameters.

    2. Submits each file to JoeSandbox via the `api/v2/analysis/submit` API endpoint.

    3. Asynchronously checks the analysis status using the `api/v2/analysis/info`
    API endpoint.

    4. Once completed, downloads the analysis report using the `api/v2/analysis/download`
    API endpoint.

    5. Attaches the report to the case, adds a web link to the report, and creates
    a case insight if the file is detected as suspicious or malicious.

    6. Returns the analysis results in JSON format.


    ### Additional Notes

    This action requires a Pro level account. It runs asynchronously.
  ai_short_description: >-
    Submits files to JoeSandbox for detonation and analysis, retrieving the resulting
    threat intelligence report and creating insights for suspicious findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to JoeSandbox, creating a new analysis task on the external platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds the downloaded analysis report as an attachment and adds a web link to
      the case.
    reasoning: >-
      The action fetches data by retrieving the analysis report from JoeSandbox. It
      mutates external data by submitting a file to the sandbox, which creates a new
      analysis task. It mutates internal data by adding attachments and links to the
      case. It creates insights for suspicious files, but does not update entities
      or create case comments.
