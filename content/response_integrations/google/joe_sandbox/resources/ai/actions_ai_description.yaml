Search Url:
  ai_description: >-
    ### General Description

    Searches for URL entities in JoeSandbox records to retrieve existing analysis
    reports. It enriches the entities with the analysis findings, attaches the PDF
    report, and flags the entity if the detection is deemed suspicious.


    ### Flow Description

    1. Iterates over the target entities and filters for those with the type `URL`.

    2. Makes an API call to JoeSandbox (`api/v2/analysis/search`) to search for the
    URL identifier.

    3. If a match is found, makes an API call (`api/v2/analysis/info`) to retrieve
    the analysis information.

    4. Makes an API call (`api/v2/analysis/download`) to download the full analysis
    report in PDF format.

    5. Attaches the PDF report and a web link to the entity in Google SecOps.

    6. Enriches the entity's additional properties with the flattened analysis information.

    7. Evaluates the detection status; if suspicious, marks the entity as suspicious
    and creates an insight.

    8. Updates the entities and returns the analysis data as JSON results.


    ### Additional Notes

    - The action will skip entities if an error occurs during processing.

    - If the daily API submission limit is reached, the action will log an error and
    raise an exception.
  ai_short_description: >-
    Searches for URL entities in JoeSandbox to retrieve existing analysis reports,
    enriches the entities with the findings, attaches the PDF report, and flags suspicious
    URLs.
