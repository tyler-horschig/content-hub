DNS Resolve:
  ai_description: >-
    ### General Description

    Resolves Hostname entities to their corresponding IP addresses using the Shodan
    API.


    ### Flow Description

    1. Iterates through the target entities and filters for Hostname entities.

    2. Extracts the identifiers (hostnames) and joins them into a comma-separated
    string.

    3. Makes a GET request to the Shodan API (`/dns/resolve`) to look up the IP addresses
    for the provided hostnames.

    4. Parses the response and attaches the resolved IP addresses as a data table
    and JSON result to the action.


    ### Additional Notes

    Requires a valid Shodan API key configured in the integration.
