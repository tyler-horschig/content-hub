    ### General Description

    Retrieves comprehensive information about IP address entities from Shodan. This
    action queries the Shodan API to fetch details such as domains, country, and last
    update time, enriches the entities with this data, and provides the results as
    JSON and CSV tables.


    ### Flow Description

    1. Extracts the action parameters and initializes the Shodan API client.

    2. Iterates through the target entities, specifically filtering for IP Address
    entities.

    3. For each IP address, makes a GET request to the Shodan API (`/shodan/host/{ip}`)
    to retrieve available host information.

    4. If data is found, attaches a CSV table to the entity and updates the entity's
    additional properties (Country, Last Updated, Domains).

    5. Marks the entity as enriched and updates it within the SecOps platform.

    6. Returns the aggregated JSON results and a summary message.


