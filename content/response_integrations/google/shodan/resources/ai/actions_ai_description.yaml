SearchForExploits:
  ai_description: >-
    ### General Description

    Searches across a variety of data sources for known exploits using the Shodan
    Exploits API. It allows users to query the database and use facets to get summary
    information about the exploits found.


    ### Flow Description

    1. Retrieves the 'Search Query', 'Facets', and 'Page' parameters provided by the
    user.

    2. Makes a GET request to the Shodan Exploits API (`https://exploits.shodan.io/api/search`)
    with the provided query and parameters.

    3. If results are found, parses the JSON response.

    4. Adds the results as a data table and a JSON result to the action output.


    ### Additional Notes

    This action does not operate on specific entities but rather performs a general
    search based on the provided query string.
