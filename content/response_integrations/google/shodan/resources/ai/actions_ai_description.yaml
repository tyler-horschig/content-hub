DNS Reverse:
  ai_description: >-
    ### General Description

    Performs a reverse DNS lookup on IP Address entities using the Shodan API to retrieve
    associated hostnames. This action helps analysts identify the domains or hostnames
    resolving to specific IP addresses.


    ### Flow Description

    1. Iterates through the provided target entities and filters for those of type
    `ADDRESS`.

    2. For each valid IP address, makes a GET request to the Shodan API (`/dns/reverse`)
    to fetch the associated hostnames.

    3. Aggregates the successful lookups and creates a data table named "Shodan DNS
    Reverse Report" containing the results.

    4. Returns the aggregated hostname data as a JSON object for further use in the
    playbook.


    ### Additional Notes

    This action requires a valid Shodan API key configured at the integration level.
    It does not update the entities or create insights directly, but provides the
    data as action results.
