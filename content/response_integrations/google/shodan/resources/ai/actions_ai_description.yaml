Search:
  ai_description: >-
    ### General Description

    Searches the SHODAN database using a provided search query. It retrieves matching
    host information, banners, and summary data based on specified facets, returning
    the results directly to the SecOps platform.


    ### Flow Description

    1. Retrieves the search query, facets, and minify settings from the action parameters.

    2. Makes an HTTP GET request to the Shodan API (`/shodan/host/search`) to execute
    the search.

    3. Parses the returned JSON data containing the search matches and total counts.

    4. Outputs the results as a JSON object and attaches a CSV data table to the action
    results for easy viewing.


    ### Additional Notes

    The search query syntax is identical to the Shodan website (e.g., `apache country:'DE',
    city:'Berlin'`). Ensure your Shodan API plan supports the use of facets and filters
    if you intend to use those parameters.
  ai_short_description: >-
    Searches the SHODAN database using a provided query and returns matching host
    information and summary data.
