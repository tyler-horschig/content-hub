    ### General Description

    Initiates a network scan on Shodan for the provided IP address entities. This
    action triggers a scan job on the Shodan platform and returns the resulting scan
    ID.


    ### Flow Description

    1. Iterates through the target entities and filters for IP addresses (ADDRESS
    entity type).

    2. Aggregates the IP addresses into a comma-separated list.

    3. Makes a POST request to the Shodan API (`/shodan/scan`) to initiate a scan
    for the collected IPs.

    4. Retrieves the scan ID from the response and returns it as the result value.


    ### Additional Notes

    This action consumes Shodan API scan credits (1 IP consumes 1 scan credit) and
