A Record Lookup:
  ai_description: >-
    ### General Description

    Performs an A record lookup using MXToolBox to retrieve the IP addresses associated
    with specific domain names, URLs, or users. This action enriches the target entities
    with the resolved IP addresses.


    ### Flow Description

    1. Filters the target entities to include only Hostname, URL, and User entity
    types.

    2. Extracts the domain name from each valid entity.

    3. Makes a GET request to the MXToolBox API (`api/v1/lookup/a/{domain}`) to perform
    an A record lookup for the extracted domain.

    4. Enriches the entity's `additional_properties` with the resolved IP addresses
    and marks the entity as enriched.

    5. Updates the entities in the SecOps platform and attaches a data table and JSON
    results containing the resolved IPs.


    ### Additional Notes

    If an entity fails to resolve, the action logs the error and continues processing
    the remaining entities.
  ai_short_description: >-
    Performs an A record lookup using MXToolBox to retrieve and enrich entities with
    their resolved IP addresses.
