Reverse DNS Lookup:
  ai_description: >-
    ### General Description

    Performs a reverse DNS lookup on IP address entities using MXToolBox to retrieve
    associated domain names. The action queries the MXToolBox API, extracts the domain
    names from the PTR records, and enriches the entities with this information.


    ### Flow Description

    1. Filters the target entities to include only IP addresses (ADDRESS).

    2. Iterates over the filtered entities and makes a GET request to the MXToolBox
    API (`api/v1/lookup/ptr/{ip_address}`) for each IP address.

    3. Extracts the domain names from the returned PTR records.

    4. Enriches the entity's additional properties with the retrieved domain names
    and marks the entity as enriched.

    5. Attaches a CSV table and JSON results to the action's output.

    6. Updates the entities within the Google SecOps platform.


    ### Additional Notes

    This action relies on the MXToolBox API and requires valid integration credentials.
    Entities that fail the lookup will be skipped, and the errors will be logged.
