Blacklist Check:
  ai_description: >-
    ### General Description

    Checks if Hostname or IP Address entities are listed on any blacklists using MXToolBox.
    The action retrieves blacklist status and evaluates the results against a specified
    threshold to determine if the entities should be marked as suspicious.


    ### Flow Description

    1. Filters the target entities to include only Hostnames and IP Addresses.

    2. Iterates through the filtered entities and queries the MXToolBox API (`GET
    api/v1/lookup/blacklist/{domain}`) to retrieve their blacklist status.

    3. If an entity is found on one or more blacklists, the action records the failed
    engines and the reasons for blacklisting.

    4. Compares the total number of blacklists the entity appears on against the provided
    `Blacklist Threshold` parameter.

    5. If the number of detections meets or exceeds the threshold, the entity is marked
    as suspicious.

    6. Attaches a CSV table of the failed blacklist engines to the entity, creates
    an insight with the detection count, and updates the entity in the platform.

    7. Returns the aggregated results as a JSON object.


    ### Additional Notes

    - The action relies on the `Blacklist Threshold` parameter to dynamically assess
    risk. If the threshold is not met, the entity will not be marked as suspicious,
    even if it appears on some blacklists.
  ai_short_description: >-
    Checks if Hostname or IP Address entities are present on any blacklists using
    MXToolBox, marking them as suspicious if a specified detection threshold is met.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the MXToolBox API to fetch blacklist data
      (fetches_data=true). It does not mutate any data on external systems (can_mutate_external_data=false).
      It updates internal entities by setting 'is_suspicious' and calling 'update_entities'
      (can_update_entities=true), and it creates insights using 'add_entity_insight'
