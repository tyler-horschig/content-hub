SPF Lookup:
  ai_description: >-
    ### General Description

    Performs a Sender Policy Framework (SPF) lookup on domain-related entities (Hostname,
    User, and URL) using MXToolBox to determine if a specified IP address is authorized
    to send emails on behalf of the domain. The action enriches the entities with
    the authorization status and marks them as suspicious if the IP is not an authorized
    sender.


    ### Flow Description

    1. Retrieves the target `IP Address` from the action parameters.

    2. Filters the target entities to include only Hostname, User, and URL entity
    types.

    3. Extracts the domain name from each valid entity.

    4. Makes a GET request to the MXToolBox API (`api/v1/lookup/spf/{domain}`) to
    fetch the SPF records and authorized IP ranges for the domain.

    5. Evaluates whether the provided IP address falls within any of the authorized
    network ranges.

    6. Updates the entity's additional properties with the SPF check results (authorized
    or not authorized).

    7. Marks the entity as suspicious if the IP address is not authorized.

    8. Updates the entities in the SecOps platform and attaches the results as JSON
    and data tables.


    ### Additional Notes

    - The action requires a valid MXToolBox API key configured in the integration
    settings.

    - If the SPF record includes other domains (using the `include` mechanism), the
    action recursively resolves those domains to gather all authorized IP ranges.
