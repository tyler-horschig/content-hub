TCP Port Status:
  ai_description: >-
    ### General Description

    Checks if a specific TCP port is open on target entities using the MXToolBox API.
    This action helps analysts determine the network accessibility of specific services
    on given hosts, IPs, or URLs.


    ### Flow Description

    1. Retrieves the `Port Number` parameter provided by the user.

    2. Filters the target entities to include only Hostname, Address, User, and URL
    entity types.

    3. Iterates over the filtered entities and makes a GET request to the MXToolBox
    API (`api/v1/lookup/tcp`) to check the status of the specified port.

    4. Updates each entity's `additional_properties` dictionary with the port status
    (True if open, False if closed) under the key `MX_port_{port_number}`.

    5. Compiles the port status results into a CSV data table.

    6. Saves the updated entities back to the Google SecOps platform.


