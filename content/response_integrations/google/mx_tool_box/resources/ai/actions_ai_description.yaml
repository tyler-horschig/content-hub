      The action fetches data from the MXToolBox API via a GET request (fetches_data=true).
      It does not mutate external data or internal system data outside of entities.
      It updates entities with the resolved IP addresses (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
