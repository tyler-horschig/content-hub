HTTPS Information Lookup:
  ai_description: >-
    ### General Description

    The HTTPS Information Lookup action queries a website URL using MXToolBox to determine
    if it responds securely with SSL encryption. It retrieves the list of certificate
    authorities associated with the domain and returns the information to the SecOps
    platform as a data table and JSON result.


    ### Flow Description

    1. Filters the target entities to include only those of type `URL`.

    2. Iterates through the filtered URL entities and extracts the domain name from
    each.

    3. Makes an API call (`GET api/v1/lookup/https/{domain}`) to MXToolBox to perform
    an HTTPS lookup.

    4. Parses the response to extract SSL certificate information, specifically the
    names of the certificate authorities.

    5. Aggregates the results into a data table and a JSON object.

    6. Returns the aggregated results and a summary message to the SecOps platform.


    ### Additional Notes

    - This action only operates on entities of type `URL`.

    - If an error occurs during the lookup for a specific entity, the action logs
    the error and continues processing the remaining entities.
