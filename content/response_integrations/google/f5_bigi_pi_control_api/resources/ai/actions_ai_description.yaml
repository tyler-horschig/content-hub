Remove Port From Port List:
  ai_description: >-
    ### General Description

    Removes specified ports from an existing port list in F5 BIG-IP. This action modifies
    the configuration of the external device by updating the contents of a designated
    port list.


    ### Flow Description

    1. Extracts the target port list name and the comma-separated list of ports to
    remove.

    2. Makes a GET request to the F5 BIG-IP API to retrieve the current configuration
    of the specified port list.

    3. Filters the retrieved list to exclude the ports designated for removal.

    4. Makes a PATCH request to the F5 BIG-IP API to update the port list with the
    remaining ports.

    5. Returns the updated port list data as a JSON result and provides a summary
    message of successfully removed and non-existing ports.


