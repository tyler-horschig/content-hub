Add Port To Port List:
  ai_description: >-
    ### General Description

    Adds one or more specified ports to an existing port list in F5 BIG-IP. This action
    modifies the configuration of the F5 BIG-IP device by appending new ports to a
    designated port list.


    ### Flow Description

    1. Extracts the target `Port List Name` and the comma-separated list of `Ports`
    from the action parameters.

    2. Iterates through the provided ports.

    3. For each port, makes a GET request to the F5 BIG-IP API to retrieve the current
    configuration of the specified port list.

    4. Appends the new port to the retrieved list of ports.

    5. Makes a PATCH request to the F5 BIG-IP API to update the port list with the
    newly appended port.

    6. Outputs a JSON result containing the updated port list and a summary message
    of successful and failed additions.


    ### Additional Notes

    If multiple ports are provided, the action processes them sequentially. If an
    error occurs while adding a specific port, the action logs the error and continues
    processing the remaining ports.
