Add IP To Data Group:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to an internal data group within F5 BIG-IP.
    This action modifies the specified data group by appending the targeted IP addresses
    to its records, which can be used by F5 BIG-IP iRules for routing, blocking, or
    allowing traffic.


    ### Flow Description

    1. Extracts the target `Data Group Name` from the action parameters.

    2. Filters the provided target entities to include only IP addresses (`ADDRESS`).

    3. Makes a GET request to the F5 BIG-IP API to retrieve the specified data group
    and verifies that it is of the 'ip' group type.

    4. Appends the targeted IP addresses to the retrieved data group's records.

    5. Makes a PATCH request to the F5 BIG-IP API to update the data group with the
    newly added IP records.

    6. Returns the updated data group details as a JSON result and provides a summary
    message of successful and failed entities.


    ### Additional Notes

    This action only supports internal data groups in F5 BIG-IP. The actual security
    outcome (e.g., blocking or allowing) depends on how the target data group is utilized
    within the F5 BIG-IP configuration (e.g., via iRules).
  ai_short_description: >-
    Adds specific IP address entities to an internal data group within F5 BIG-IP.
