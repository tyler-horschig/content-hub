Add IP To Address List:
  ai_description: >-
    ### General Description

    Adds specified IP Address entities to an existing address list on an F5 BIG-IP
    firewall. This action modifies the configuration of the external network device,
    which can be used to dynamically update blocklists or allowlists based on the
    rules associated with the target address list.


    ### Flow Description

    1. Extracts the target address list name from the action parameters.

    2. Filters the target entities to include only IP Addresses.

    3. For each suitable entity, retrieves the current addresses in the specified
    address list via a GET request to the F5 BIG-IP API.

    4. Appends the entity's IP address to the retrieved list.

    5. Updates the address list on the F5 BIG-IP device via a PATCH request.

    6. Returns the updated address list as a JSON result and provides a summary message
    of successful and failed additions.


    ### Additional Notes

    Only supports IP Address entities. The actual security outcome (e.g., blocking
    or allowing traffic) depends entirely on how the specified address list is utilized
    within the F5 BIG-IP firewall rules.
  ai_short_description: >-
    Adds specified IP Address entities to a designated address list on an F5 BIG-IP
    firewall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an address list on the F5 BIG-IP device by appending the specified IP
      addresses to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the F5 BIG-IP API to update an address list,
      which mutates external data. It does not fetch contextual enrichment data, mutate
      internal SecOps data, update entities, or create insights.
