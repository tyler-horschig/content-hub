Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query in Snowflake and retrieves the results.


    ### Flow Description

    1. Initializes the Snowflake manager with the provided credentials.

    2. Submits the custom query to the specified Snowflake database and schema via
    the Snowflake API.

    3. Checks the execution status of the query asynchronously.

    4. Once completed, retrieves the query results and attaches them to the action's
    output as a JSON object and a CSV data table.


    ### Additional Notes

    This action runs asynchronously. The query should not contain the LIMIT keyword,
    as it is added automatically based on the 'Max Results To Return' parameter. Only
    single quotes are supported in the query.
  ai_short_description: >-
    Executes a custom query in Snowflake and returns the results as a JSON object
    and a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes API requests to Snowflake to submit a query and fetch the results.
      It fetches data but does not mutate external data, nor does it update internal
      entities, create insights, or modify alert data.
