Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes a simple SELECT query in Snowflake based on provided parameters such
    as database, table, schema, and filters, and returns the results.


    ### Flow Description

    1. Initializes the Snowflake manager with API credentials.

    2. Builds a SQL SELECT query string using the provided parameters (Fields To Return,
    Table, Where Filter, Sort Field, Sort Order).

    3. Submits the query asynchronously to Snowflake via a POST request to the `/api/v2/statements`
    endpoint.

    4. Polls the query status via a GET request to the `/api/v2/statements/{query_id}`
    endpoint.

    5. Once completed, retrieves the results and attaches them to the action's output
    as a JSON result and a data table.


    ### Additional Notes

    The action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed.
  ai_short_description: >-
    Executes a simple SELECT query in Snowflake based on provided parameters and returns
    the results.
