Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Snowflake instance using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Account, Username,
    Private Key, Verify SSL).

    2. Initializes the Snowflake manager with the extracted parameters.

    3. Makes an API call (POST to `/api/v2/statements?async=false`) executing a simple
    query (`SHOW TABLES LIMIT 1`) to verify connectivity.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can successfully authenticate and communicate with the Snowflake API.
