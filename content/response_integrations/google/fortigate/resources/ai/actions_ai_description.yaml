Remove Entities From Policy:
  ai_description: >-
    ### General Description

    Removes specified IP Address and URL entities from a given policy in Fortigate.
    The action extracts the domain part of URL entities and updates the policy's source
    or destination location to exclude the entities.


    ### Flow Description

    1. Initializes the Fortigate API client.

    2. Retrieves the specified policy by name using a GET request.

    3. Iterates through the provided IP Address and URL entities.

    4. Checks if each entity exists in Fortigate via a GET request.

    5. If the entity exists and is part of the policy, removes it from the policy's
    source or destination list.

    6. Updates the policy in Fortigate using a PUT request.

    7. Returns a summary of successfully removed, non-existent, and failed entities.


    ### Additional Notes

    The action extracts the domain part of URL entities before processing.
