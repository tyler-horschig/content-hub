Add Entities To Policy:
  ai_description: >-
    ### General Description

    Adds IP Address and URL entities to a specified policy in Fortigate. This action
    modifies the firewall's configuration by appending the target entities to either
    the source or destination of a given policy.


    ### Flow Description

    1. Extracts the target policy name and location (Source or Destination) from the
    action parameters.

    2. Makes a GET request to the Fortigate API to retrieve the specified policy.

    3. Iterates through the provided IP Address and URL entities.

    4. For each entity, makes a GET request to check if it already exists in Fortigate.
    If it does not exist, makes a POST request to create a new address entity.

    5. Makes a PUT request to update the policy, adding the entity to the specified
    location (source or destination).

    6. Returns a summary of successfully added, already existing, and failed entities.


    ### Additional Notes

    The action automatically extracts the domain part of URL entities before processing.
    Depending on the selected policy's action (e.g., Deny or Accept), this action
    can be used to block or allow traffic for the specified entities.
  ai_short_description: >-
    Adds IP Address and URL entities to a specified policy in Fortigate, creating
    the address entities if they do not already exist.
