Add Entities To Address Group:
  ai_description: >-
    ### General Description

    Adds specified IP Address and URL entities to a designated address group in Fortigate.
    This action ensures the entities exist in the firewall's address database and
    then appends them to the specified group.


    ### Flow Description

    1. Extracts the target address group name from the action parameters.

    2. Retrieves the specified address group from Fortigate via an API call (`GET
    /api/v2/cmdb/firewall/addrgrp`).

    3. Iterates through the target entities (IP Addresses and URLs).

    4. Checks if each entity already exists in Fortigate via an API call (`GET /api/v2/cmdb/firewall/address/`).

    5. If the entity does not exist, it creates a new address entity in Fortigate
    via an API call (`POST /api/v2/cmdb/firewall/address/`).

    6. Adds the entity to the specified address group via an API call (`PUT /api/v2/cmdb/firewall/addrgrp/{address_group_name}`)
    if it is not already a member.


    ### Additional Notes

    The action extracts the domain part of URL entities before processing them.
  ai_short_description: >-
    Adds IP Address and URL entities to a specified address group in Fortigate, creating
    the address objects first if they do not already exist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates address entities if they do not exist and adds them to the specified
      address group in Fortigate.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action interacts with the Fortigate API to create address entities and update
      address groups (can_mutate_external_data=true). It does not fetch data for enrichment,
      nor does it mutate internal SecOps data, update entities, or create insights.
