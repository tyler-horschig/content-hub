    group is utilized.


    ### Flow Description

    1. Extracts the target address group name from the action parameters.

    2. Retrieves the specified address group from Fortigate via a GET request to verify
    its existence.

    3. Iterates through the provided IP Address and URL entities.

    4. For each entity, makes a GET request to check if the entity exists in Fortigate
    and verifies if it is a member of the address group.

    5. If the entity is part of the group, makes a PUT request to the Fortigate API
    to remove the entity from the address group.

    6. Returns a summary message detailing the successful and failed removals.


    ### Additional Notes

    The action automatically extracts the domain part of URL entities before processing
    them in Fortigate.
