Send Query To ESM:
  ai_description: >-
    ### General Description

    Executes a custom query in McAfee Enterprise Security Manager (ESM) to retrieve
    specific event, flow, or asset data based on provided filtering criteria and time
    ranges.


    ### Flow Description

    1. Extracts action parameters including time range, filter fields, operators,
    values, and query type.

    2. Constructs a query payload using the provided parameters.

    3. Initiates the query execution asynchronously via the McAfee ESM API (`/rs/esm/v2/qryExecuteDetail`).

    4. Polls the API to check the query status (`/rs/esm/v2/qryGetStatus`) until the
    operation is complete.

    5. Retrieves the query results (`/rs/esm/v2/qryGetResults`) and attaches them
    to the case as a data table and JSON result.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted appropriately to allow sufficient time for the query to complete
    and return results.
  ai_short_description: >-
    Executes a custom query in McAfee ESM to retrieve event, flow, or asset data based
    on specified filtering criteria and time ranges.
