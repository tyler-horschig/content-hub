Add Values To Watchlist:
  ai_description: >-
    ### General Description

    Adds specified values to a designated watchlist in McAfee ESM.


    ### Flow Description

    1. Extracts the target watchlist name and the comma-separated values to be added
    from the action parameters.

    2. Retrieves the watchlist details from McAfee ESM via the API to obtain its internal
    ID.

    3. Makes a POST request to the McAfee ESM API to append the provided values to
    the watchlist.


    ### Additional Notes

    McAfee ESM allows values of invalid types to be passed (e.g., adding a hash to
    an IP watchlist), so input validation should be handled prior to execution.
  ai_short_description: >-
    Adds specified values to a designated watchlist in McAfee ESM.
