    ### General Description

    Sends an advanced JSON query to McAfee ESM and retrieves the results. This action
    allows analysts to execute custom searches against the ESM database and pull the
    resulting telemetry data directly into the SecOps platform.


    ### Flow Description

    1. Parses the provided JSON query payload from the action parameters.

    2. Initiates the query execution on McAfee ESM via a POST request to the `v1/runningQuery`
    endpoint.

    3. Monitors the query status asynchronously to wait for completion.

    4. Once completed, retrieves the query results (up to a maximum of 200 results)
    via a GET request.

    5. Outputs the results as a JSON object and populates a data table within the
    case.


