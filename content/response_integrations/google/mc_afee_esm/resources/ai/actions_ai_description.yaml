Get Similar Events:
  ai_description: >-
    ### General Description

    Searches for events related to specific entities (Hostname, IP Address, User)
    in McAfee ESM. This action retrieves historical event data associated with the
    targeted entities and attaches the findings to the action results.


    ### Flow Description

    1. Filters the target entities to include only Hostname, IP Address, and User
    types.

    2. For each suitable entity, constructs an event query based on the entity type
    and the provided parameters (Hours Back, IPS ID, Result Limit).

    3. Initiates an asynchronous query execution on McAfee ESM via the API (`manager.run_events_query`).

    4. Periodically checks the status of the query execution (`manager.check_events_query_status`).

    5. Once the query is complete, retrieves the event results (`manager.get_events_query_results`).

    6. Attaches the retrieved events as JSON results and entity-specific tables in
    the SOAR platform.


    ### Additional Notes

    This action runs asynchronously. Depending on the query size and timeframe, you
    may need to adjust the script timeout value in the Chronicle SOAR IDE.
  ai_short_description: >-
    Searches for events related to specific Hostname, IP Address, and User entities
    in McAfee ESM and returns the results as JSON and entity tables.
