    a state change on the external system by deleting the provided values from the
    target watchlist.


    ### Flow Description

    1. Retrieves the internal watchlist ID by querying McAfee ESM for the provided
    `Watchlist Name`.

    2. Converts the provided comma-separated `Values to Remove` into a list.

    3. Sends a POST request to the McAfee ESM API (`/rs/esm/v2/sysRemoveWatchlistValues`)
    to remove the specified values from the watchlist.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    The action requires the exact name of the watchlist as it appears in McAfee ESM.
    If the watchlist is not found, the action will fail.
