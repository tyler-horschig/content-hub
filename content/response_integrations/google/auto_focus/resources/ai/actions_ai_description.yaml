Hunt Domain:
  ai_description: >-
    ### General Description

    Hunts a domain (Hostname entities) in Palo Alto AutoFocus to retrieve a list of
    associated tags and threat intelligence. The action enriches the entities with
    the retrieved data, marks them as suspicious, and attaches detailed reports.


    ### Flow Description

    1. Iterates over the target entities and filters for Hostname entities.

    2. Initiates an asynchronous hunt for each domain using the AutoFocus API (`samples_search`).

    3. Periodically checks the status of the hunt using the AutoFocus API (`samples_results`).

    4. Once the hunt is completed, retrieves the hits and results.

    5. Enriches the entity's additional properties with the flattened results and
    marks the entity as enriched and suspicious.

    6. Attaches a CSV table of the hits and a JSON report to the entity.

    7. Creates an insight for the entity detailing the number of hits found.

    8. Updates the entities in the platform with the new data.


    ### Additional Notes

    This is an asynchronous action. It will continue to run in the background until
    the AutoFocus hunt is completed.
  ai_short_description: >-
    Hunts a domain (Hostname entities) in Palo Alto AutoFocus to retrieve a list of
    associated tags and threat intelligence, enriching the entities with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
