    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making requests to the AutoFocus API to search for
      domain samples and retrieve results. It does not mutate external data. It updates
      internal entities with the retrieved data (`siemplify.update_entities`), adds
      entity tables and attachments, and creates insights (`siemplify.add_entity_insight`).
