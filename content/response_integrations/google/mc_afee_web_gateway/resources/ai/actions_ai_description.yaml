Block IP:
  ai_description: >-
    ### General Description

    Blocks specific IP addresses by adding them to an "IP range"-type group in McAfee
    Web Gateway. This action initiates a state change on the external gateway to prevent
    network traffic to or from the specified IP entities.


    ### Flow Description

    1. Establishes a connection to the McAfee Web Gateway API.

    2. Iterates through the provided target entities, filtering specifically for IP
    Address entities.

    3. For each valid IP address, makes a POST request to the McAfee Web Gateway API
    to insert the IP (formatted as a /32 CIDR) into the specified group list.

    4. Makes a subsequent POST request to commit the changes to the gateway.

    5. Returns a summary message detailing which IPs were successfully blocked and
    which failed.


    ### Additional Notes

    The target group specified in the parameters must be configured within a rule
    used to block IP addresses in McAfee Web Gateway for the block to be effective.
  ai_short_description: >-
    Blocks specific IP addresses by adding them to a designated "IP range"-type group
    in McAfee Web Gateway.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the IP address to a specified group list on the McAfee Web Gateway.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST requests to the McAfee Web Gateway API to insert an entry
      into a list and commit the changes, which mutates external data. It does not
      fetch contextual enrichment data, nor does it update internal entities, create
      insights, or modify alert data.
