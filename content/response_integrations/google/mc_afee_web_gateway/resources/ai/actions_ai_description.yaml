    Tests connectivity to the McAfee Web Gateway instance.


    ### Flow Description

    1. Retrieves integration configuration parameters (Server Address, Username, Password).

    2. Initializes the McAfee Web Gateway manager, which makes an HTTP POST request
    to the `/login` endpoint to authenticate.

    3. Makes an HTTP POST request to the `/logout` endpoint to terminate the session.

