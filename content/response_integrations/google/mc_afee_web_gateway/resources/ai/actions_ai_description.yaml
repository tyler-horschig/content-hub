Insert Item To Group:
  ai_description: >-
    ### General Description

    Inserts a specified network object (such as an IP address or URL) into a designated
    group or list within McAfee Web Gateway. This action allows for dynamic updates
    to gateway policies by adding new items to existing categorized lists.


    ### Flow Description

    1. Retrieves the target group name, the item to insert, and an optional description
    from the action parameters.

    2. Authenticates with the McAfee Web Gateway API.

    3. Queries the API to resolve the provided group name to its internal list ID.

    4. Sends a POST request to the McAfee Web Gateway API to insert the new item into
    the resolved list.

    5. Sends a subsequent POST request to commit the changes to the gateway configuration.

    6. Returns a success or failure message based on the API response.


    ### Additional Notes

    Each group in McAfee Web Gateway is strictly typed. The item being inserted must
    match the expected format and type of the target group, otherwise the insertion
    will fail.
