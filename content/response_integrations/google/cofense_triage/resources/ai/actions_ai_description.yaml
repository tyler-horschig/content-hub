Download Report Preview:
  ai_description: >-
    ### General Description

    Downloads an image preview (PNG or JPG) of an email related to a specific report
    from Cofense Triage. The downloaded image can be saved to a local folder and optionally
    attached to the case as an insight.


    ### Flow Description

    1. Extracts the `Report ID`, `Download Folder`, `Image Format`, `Overwrite`, and
    `Create Insight` parameters.

    2. Constructs the target file name and absolute file path based on the report
    ID and selected image format.

    3. Checks if a file with the same name already exists in the download folder and
    whether overwriting is permitted.

    4. Makes an HTTP GET request to the Cofense Triage API to download the report
    preview image.

    5. Saves the downloaded image content to the specified local folder.

    6. If the `Create Insight` parameter is enabled, reads the saved image, encodes
    it in base64, and creates a case insight containing the image.

    7. Returns the absolute file path of the downloaded image in the JSON results.


    ### Additional Notes

    Ensure that the specified download folder exists and that the integration has
    the necessary write permissions to save the file.
