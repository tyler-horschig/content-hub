Download Report Email:
  ai_description: >-
    ### General Description

    Downloads the raw email associated with a specific report from Cofense Triage
    and saves it to a designated local folder.


    ### Flow Description

    1. Extracts the `Report ID` and `Download Folder` parameters.

    2. Checks if the file already exists in the target folder and evaluates the `Overwrite`
    parameter.

    3. Makes an API call to Cofense Triage to download the raw email content for the
    specified report.

    4. Saves the downloaded email content as an `.eml` file in the specified folder.

    5. If the `Create Insight` parameter is enabled, creates a case insight containing
    the raw email content.

    6. Returns the absolute file path of the downloaded file in the JSON results.


    ### Additional Notes

    The file name is constructed using the format `{report id}.eml`.
