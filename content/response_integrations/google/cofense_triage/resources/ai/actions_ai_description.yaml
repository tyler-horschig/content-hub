Add Tags To Report:
  ai_description: >-
    ### General Description

    Adds specified tags to a report in Cofense Triage.


    ### Flow Description

    1. Retrieves the current tags of the specified report using the Cofense Triage
    API.

    2. Merges the new tags provided in the parameters with the existing tags, ensuring
    no duplicates.

    3. Sends a PUT request to the Cofense Triage API to update the report with the
    combined list of tags.

    4. Retrieves the updated report details and returns them as a JSON result.


    ### Additional Notes

    The action requires the Report ID and a comma-separated list of tags to be applied.
  ai_short_description: >-
    Adds specified tags to a report in Cofense Triage.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the tags of a specific report in Cofense Triage.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the current tags and the updated report from Cofense Triage
      (fetches_data=true). It mutates external data by sending a PUT request to update
      the report's tags in Cofense Triage (can_mutate_external_data=true). It does
      not mutate internal SecOps data, update entities, create insights, modify alert
      data, or create case comments.
