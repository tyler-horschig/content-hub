Categorize Report:
  ai_description: >-
    ### General Description

    Categorizes a specific report in Cofense Triage by applying a specified category
    name.


    ### Flow Description

    1. Retrieves the category ID for the provided `Category Name` from Cofense Triage
    via an API GET request.

    2. If the category is found, sends a POST request to update the report with the
    specified `Report ID` to use this category.

    3. Fetches the updated report details via a GET request and attaches them to the
    action's JSON result.


    ### Additional Notes

    If the specified category name is not found in Cofense Triage, the action will
    fail to update the report.
