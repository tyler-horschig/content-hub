    It enriches the entities with threat intelligence data such as threat level and
    threat source, and updates their suspicious status if malicious indicators are
    found.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Adjusts the entity identifier format specifically for User (email) and Email
    Message entities to match the Cofense Triage expected format.

    3. Makes a GET request to the Cofense Triage API (`/api/public/v2/threat_indicators`)
    to fetch threat indicator details for each entity identifier.

    4. Evaluates the returned threat level; if it is 'Malicious' or 'Suspicious',
    the entity is marked as suspicious.

    5. Enriches the entity's additional properties with the retrieved threat data
    and marks the entity as enriched.

    6. Updates the entities in the Google SecOps platform and attaches a JSON result
    and a summary table with the threat details.


