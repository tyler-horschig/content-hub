EnrichURL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Cofense Triage to retrieve threat intelligence and
    risk scores. This action evaluates the risk of URLs and updates the entity's status
    and properties within the SecOps platform based on the findings.


    ### Flow Description

    1. Iterates over all target entities and filters for those of type `URL`.

    2. For each URL entity, makes an HTTP GET request to the Cofense Triage API (`/api/public/v2/urls`)
    to fetch threat intelligence and risk score details.

    3. Evaluates the returned risk score against the provided `Risk Score Threshold`
    parameter.

    4. If the risk score exceeds the threshold, marks the entity as suspicious (`is_suspicious
    = True`).

    5. Marks the entity as enriched and updates its `additional_properties` with the
    retrieved data.

    6. Saves the updated entities back to the platform.

    7. Attaches a data table and JSON results containing the URL details to the action's
    output.


    ### Additional Notes

    If the provided threshold is outside the allowed range (0-100), the action will
    default to a threshold of 50.
  ai_short_description: >-
    Enriches URL entities by retrieving threat intelligence and risk scores from Cofense
    Triage, updating the entity's suspicious status based on a configurable threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
