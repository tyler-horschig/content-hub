Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cofense Triage instance using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Client ID, Client
    Secret, Verify SSL).

    2. Initializes the Cofense Triage Manager with the extracted credentials.

    3. Calls the `test_connectivity` method, which makes a GET request to the `/api/public/v2/system/status`
    endpoint to verify API access.

    4. Returns a success message if the connection is successful, otherwise returns
    an error message and fails the action.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Cofense Triage API. It does not require any action-specific
    parameters or entities to run.
