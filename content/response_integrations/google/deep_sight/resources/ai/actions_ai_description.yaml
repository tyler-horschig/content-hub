Scan Domain:
  ai_description: >-
    ### General Description

    Enriches User, Hostname, and URL entities by extracting their associated domains
    and scanning them using Symantec DeepSight. This action retrieves threat intelligence
    and reputation data for the domains to provide additional context for investigations.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to process only User, Hostname, and URL types.

    3. Extracts the domain from the entity identifier using utility functions.

    4. Makes a GET request to the Symantec DeepSight API (`/v1/domains/{domain}`)
    to retrieve scan results for the extracted domain.

    5. Parses the response, flattens the dictionary, and updates the entity's `additional_properties`
    with the scan data.

    6. Marks the entity as enriched (`is_enriched = True`) and attaches a CSV table
    of the results to the entity.

    7. Updates the entities in the Google SecOps platform and returns the raw JSON
    results.


    ### Additional Notes

    If an entity does not contain a valid domain, or if the API request fails, the
    entity will be skipped and the script will continue processing the remaining entities.
