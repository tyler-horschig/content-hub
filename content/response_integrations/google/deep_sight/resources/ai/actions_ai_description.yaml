Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DeepSight API to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the integration configuration, including the API Key and SSL settings.

    2. Initializes the DeepSightManager with the provided credentials.

    3. Executes a test API call (GET request to the `ips/` endpoint) using a hardcoded
    test IP address (`8.8.8.8`) to verify connectivity.

    4. Returns a success message if the connection is established and the API responds
    successfully.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    credentials and network access. It does not process any case entities or modify
    any data.
