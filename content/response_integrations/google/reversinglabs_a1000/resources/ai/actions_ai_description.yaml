Upload File:
  ai_description: >-
    ### General Description

    Uploads a specified file to the ReversingLabs A1000 appliance for malware analysis
    and retrieves the resulting analysis report.


    ### Flow Description

    1. Retrieves the target file path from the action parameters.

    2. Uploads the file to the ReversingLabs A1000 appliance via a POST request to
    the `/api/uploads/` endpoint.

    3. Polls the appliance using the `/api/samples/status/` endpoint until the file's
    processing status is marked as `processed`.

    4. Retrieves the analysis report for the uploaded file via a POST request to the
    `/api/samples/list/` endpoint.

    5. Attaches the report as a JSON result and a CSV-formatted data table in the
    SecOps platform.


    ### Additional Notes

    This action will block execution while polling the A1000 appliance until the file
    processing is complete.
