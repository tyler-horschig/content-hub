Delete Sample:
  ai_description: >-
    ### General Description

    Deletes a set of file samples that exist on the ReversingLabs A1000 appliance.
    All related data, including extracted samples and metadata, will be permanently
    deleted from the external system.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Filters the entities to process only those of type File Hash.

    3. For each valid File Hash entity, makes a DELETE request to the ReversingLabs
    A1000 API (`/api/samples/{sample_hash}/`) to remove the sample and its associated
    metadata.

    4. Collects the successfully deleted hashes and returns a summary message indicating
    which entities were removed.


    ### Additional Notes

    This action permanently removes the sample from the ReversingLabs A1000 appliance.
    Ensure that the deletion is intended, as the extracted samples and metadata cannot
    be recovered once deleted.
  ai_short_description: >-
    Deletes specified file samples and their associated metadata from the ReversingLabs
    A1000 appliance based on File Hash entities.
  capabilities:
    can_create_case_comments: false
