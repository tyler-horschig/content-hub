Get Report:
  ai_description: >-
    ### General Description

    Retrieves a summary classification report and detailed analysis for file hash
    entities from ReversingLabs A1000. This action fetches threat intelligence and
    classification data to help analysts understand the nature of the file hashes.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. Extracts the hash values from the filtered entities.

    3. Makes an API call to ReversingLabs A1000 to fetch the classification report
    for the collected hashes.

    4. Parses the response and attaches the report details as a CSV data table for
    each hash.

    5. Attaches the complete report as a JSON result to the action.


    ### Additional Notes

    This action is useful for enriching file hashes with threat intelligence and classification
    data from ReversingLabs A1000. It does not update the entities directly but provides
    the information as attached data tables and JSON results.
