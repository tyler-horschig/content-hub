Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ReversingLabs A1000 Malware Analysis appliance. This
    action verifies that the provided integration credentials and server address are
    valid and that the appliance is reachable.


    ### Flow Description

    1. Retrieves the integration configuration credentials (API Root, Username, Password).

    2. Authenticates with the ReversingLabs A1000 appliance to generate an authorization
    token.

    3. Makes a POST request to the `/api/samples/status/` endpoint using a hardcoded
    test hash to verify API access and responsiveness.

    4. Returns a success message if the connection is established and the API responds
    correctly.


    ### Additional Notes

    This action is used solely for verifying the integration setup and does not process
    any case entities, alerts, or action-specific parameters.
