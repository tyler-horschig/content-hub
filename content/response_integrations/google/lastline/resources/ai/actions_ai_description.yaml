Get Analysis Results:
  ai_description: >-
    ### General Description

    Enriches URL and FileHash entities with previously completed analysis task results
    from Lastline.


    ### Flow Description

    1. Iterates over target URL and FileHash entities.

    2. Validates the entity identifier (URL format or MD5/SHA1 hash format).

    3. Makes a GET request to the Lastline API (`/papi/analysis/get_history`) to search
    for previous analysis tasks for the entity.

    4. If a successful analysis is found, extracts the task UUID.

    5. Makes a GET request to the Lastline API (`/papi/analysis/get_result`) to fetch
    the detailed report for the task UUID.

    6. Optionally creates an insight for the entity based on the report data.

    7. Evaluates the analysis score against the provided threshold and marks the entity
    as suspicious if the threshold is exceeded.

    8. Enriches the entity's additional properties with the analysis data and updates
    the entity in the platform.


    ### Additional Notes

    Supports file hashes in MD5 and SHA-1 formats. The action always fetches the latest
    analysis available for the provided entity in Lastline.
  ai_short_description: >-
    Enriches URL and FileHash entities by retrieving previously completed analysis
    task results from Lastline, updating entity properties, and optionally marking
    them as suspicious based on a score threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and suspicious status, and creates insights.
    reasoning: >-
      The action fetches data by making GET requests to Lastline's API to search analysis
      history and retrieve results. It does not mutate external data. It mutates internal
      data by updating entities with enrichment data, marking them as suspicious,
      and creating insights.
