Submit File:
  ai_description: >-
    ### General Description

    This action submits a file to Lastline for malware analysis. It allows users to
    upload a file from a specified local path and optionally wait for the analysis
    report to be generated.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Establishes a connection to the Lastline API.

    3. Submits the file located at the provided `File Path` to Lastline using a POST
    request to the `/papi/analysis/submit_file` endpoint.

    4. If the `Wait for the report?` parameter is set to true, the action enters an
    asynchronous loop, periodically checking the status of the analysis task via a
    GET request to `/papi/analysis/get_progress`.

    5. Once the analysis is complete, it retrieves the final report using a GET request
    to `/papi/analysis/get_result`.

    6. Attaches the analysis results to the action's output as JSON and a CSV data
    table.


    ### Additional Notes

    This action does not operate on Siemplify entities. The full path to the file
    to be analyzed must be provided as an input parameter.
  ai_short_description: >-
    Submits a file to Lastline for analysis and optionally waits for the report.
