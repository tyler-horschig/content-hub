Search Analysis History:
  ai_description: >-
    ### General Description

    Searches Lastline for completed analysis tasks history based on specific parameters
    such as submission name (URL or FileHash) and timeframes. It retrieves historical
    analysis data without needing to submit a new file or URL.


    ### Flow Description

    1. Extracts action parameters including the submission name, submission type,
    and search timeframes.

    2. Determines the specific submission type (URL or FILE) and calculates the appropriate
    file hashes (MD5/SHA1) if a file hash is provided.

    3. Makes a GET request to the Lastline API (`/papi/analysis/get_history`) to fetch
    the analysis history matching the criteria.

    4. Parses the returned data and attaches the results as a JSON object and a CSV
    data table to the action output.


    ### Additional Notes

    This action does not operate on Google SecOps entities; it relies entirely on
    the provided input parameters to perform the search.
