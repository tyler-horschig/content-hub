Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the PassiveTotal service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Username and API Key).

    2. Initializes the PassiveTotal manager.

    3. Executes a WHOIS request for the hardcoded domain `google.com` to verify API
    access and credentials.

    4. Evaluates the response and returns a success message if the connection is established,
    or a failure message if an error occurs.


    ### Additional Notes

    This action does not process any case entities and is solely used for diagnostic
    purposes.
