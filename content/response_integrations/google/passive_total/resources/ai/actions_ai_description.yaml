WhoIs Address Reputation:
  ai_description: >-
    ### General Description

    Enriches external IP Address entities by retrieving passive DNS reputation data
    from RiskIQ (PassiveTotal). The action fetches DNS reports, parses the results,
    and updates the entities' additional properties with the gathered intelligence.


    ### Flow Description

    1. Filters the target entities to include only external IP addresses.

    2. Iterates through the filtered entities and makes an API call (`get_passive_dns`)
    to RiskIQ (PassiveTotal) to fetch the DNS report for each IP address.

    3. Parses the retrieved DNS report into dictionary and CSV formats.

    4. Enriches the entity's `additional_properties` with the parsed dictionary data.

    5. Attaches the CSV data as an entity table in the action results.

    6. Updates the entities within the Google SecOps platform.

    7. Returns the raw JSON results and a summary message indicating which entities
    were enriched.


    ### Additional Notes

    This action requires valid RiskIQ (PassiveTotal) API credentials configured at
    the integration level. It will skip any entities marked as internal.
