Add To WhiteList:
  ai_description: >-
    ### General Description

    Creates a new whitelist policy in Symantec ATP for specified entities. This action
    marks indicators such as IP Addresses, Hostnames, URLs, and SHA256 File Hashes
    as known good to prevent false positives.


    ### Flow Description

    1. Iterates over the target entities provided in the action.

    2. Filters entities by supported types: `ADDRESS`, `HOSTNAME`, `URL`, and `FILEHASH`.

    3. For `FILEHASH` entities, it specifically checks if the hash is a valid SHA256
    hash.

    4. Makes a POST request to the Symantec ATP API (`atpapi/v2/policies/whitelist`)
    to create a new whitelist policy for each valid entity.

    5. If the API call is successful, it attaches an insight to the entity in Google
    SecOps indicating it was whitelisted.


    ### Additional Notes

    MD5 hashes cannot be added to the whitelist due to a limitation in Symantec ATP.
    Only SHA256 hashes are supported for file hash whitelisting.
