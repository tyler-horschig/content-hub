Update Incident Resolution:
  ai_description: >-
    ### General Description

    Updates the resolution status of a specific incident in Symantec ATP. This action
    initiates a state change on the external system to close the incident with a specified
    resolution.


    ### Flow Description

    1. Extracts the `Incident UUID` and `Resolution Status` parameters.

    2. Maps the provided resolution status string to its corresponding integer value
    required by the API.

    3. Makes a PATCH request to the Symantec ATP API (`atpapi/v2/incidents`) to update
    the incident's state to closed (4) and set the new resolution status.

    4. Returns a success message if the update is successful, or an error message
    if the incident is not found or permissions are insufficient.


