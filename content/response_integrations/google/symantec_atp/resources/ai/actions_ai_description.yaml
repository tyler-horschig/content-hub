Add To Blacklist:
  ai_description: >-
    ### General Description

    Creates a blacklist policy for specific entities (File Hash, Hostname, IP Address,
    URL) in Symantec ATP. This action initiates a state change on the external device
    to prevent network traffic or execution associated with the specified entity.


    ### Flow Description

    1. Iterates through the target entities provided in the action.

    2. Checks if the entity type is supported (File Hash, Hostname, IP Address, URL).

    3. Makes a POST request to the Symantec ATP API (`atpapi/v2/policies/blacklist`)
    to create a blacklist policy for the entity identifier.

    4. If successful, attaches an insight to the entity in Google SecOps.

    5. Returns a summary message indicating which entities were successfully blacklisted.


    ### Additional Notes

    Supports SHA256 and MD5 hashes.
