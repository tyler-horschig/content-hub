Add Comment To Incident:
  ai_description: >-
    ### General Description

    Adds a comment to a specific incident in Symantec ATP. This action allows analysts
    to append notes or automated log entries directly to the incident's timeline within
    the Symantec ATP platform.


    ### Flow Description

    1. Retrieves the `Incident UUID` and `Comment` text from the action parameters.

    2. Initiates a PATCH request to the Symantec ATP API (`/atpapi/v2/incidents`)
    to append the provided comment to the specified incident.

    3. Evaluates the API response and returns a success message if the comment is
    successfully attached, or an error message if the incident is not found or the
    operation fails.


    ### Additional Notes

    - The comment text is strictly limited to 512 characters due to Symantec ATP API
    limitations.

    - Ensure that the provided Incident UUID exists in Symantec ATP before executing
    this action.
  ai_short_description: >-
    Adds a comment to a specific incident in Symantec ATP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific incident in the external Symantec ATP platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a PATCH request to the Symantec ATP API to add a comment
      to an incident, mutating external data. It does not fetch contextual data, update
      internal entities, or create internal insights.
