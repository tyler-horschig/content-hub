Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SSL Labs API to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Extracts integration-level configuration parameters (such as SSL verification
    settings).

    2. Initializes the SSL Labs manager.

    3. Makes an HTTP GET request to the SSL Labs `/info` API endpoint to verify reachability.

    4. Returns a success message to the SecOps platform if the connection is established
    without errors.


    ### Additional Notes

    This is a standard ping action used primarily for health checks and troubleshooting.
    It does not process entities, retrieve security context, or modify any data.
  ai_short_description: >-
    Tests connectivity to the SSL Labs API to verify integration configuration and
    network reachability.
