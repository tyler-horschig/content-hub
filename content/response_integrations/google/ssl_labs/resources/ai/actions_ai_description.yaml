Analyse Entity:
  ai_description: >-
    ### General Description

    Analyzes Hostname and URL entities using SSL Labs to retrieve SSL/TLS configuration
    grades and endpoint details. The action evaluates the lowest grade against a configured
    warning threshold, updates the entity's suspicious status if the threshold is
    exceeded, and enriches the entity's additional properties with the analysis results.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Filters entities to process only Hostname and URL types.

    3. Initiates an analysis request to the SSL Labs API (`GET /api/v3/analyze`) for
    each valid entity identifier.

    4. Polls the API until the analysis is complete.

    5. Retrieves the full analysis report and extracts the endpoint grades.

    6. Enriches the entity's additional properties with the retrieved grades.

    7. Evaluates the lowest grade against the configured warning threshold and marks
    the entity as suspicious if the threshold is exceeded.

    8. Updates the entities in the Google SecOps platform and attaches the raw JSON
    results.


    ### Additional Notes

    The action relies on integration-level parameters (Warning Threshold, Verify SSL)
    and does not require any action-specific parameters.
  ai_short_description: >-
    Analyzes Hostname and URL entities using SSL Labs to retrieve SSL/TLS configuration
    grades, enriching the entities and updating their suspicious status based on a
    configured threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the SSL Labs API to fetch analysis data (fetches_data=true).
      It does not mutate external data or internal data outside of entities. It updates
      entities with the fetched grades and suspicious status (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
