Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Secure Network Analytics (Stealthwatch) instance.


    ### Flow Description

    1. Retrieves integration configuration parameters.

    2. Initializes the StealthwatchManager.

    3. Calls the `test_connectivity` method, which makes a GET request to the `/sw-reporting/v1/tenants`
    endpoint to verify authentication and connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Stealthwatch API.
