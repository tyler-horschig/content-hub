Search Flows:
  ai_description: >-
    ### General Description

    Searches for network flows associated with specific IP address entities within
    a given timeframe using Cisco Secure Network Analytics (Stealthwatch). It retrieves
    flow data where the IP acts as either the source or destination and attaches the
    results to the action.


    ### Flow Description

    1. Iterates through the target entities and filters for IP addresses (ADDRESS).

    2. For each IP address, retrieves the associated domain ID from Stealthwatch.

    3. Initiates a flow search API call (`POST /sw-reporting/v1/tenants/{domain_id}/flow-reports/top-hosts/queries`)
    where the IP is the source.

    4. Polls for completion and retrieves the search results (`GET /sw-reporting/v1/tenants/{domain_id}/flow-reports/top-hosts/results/{search_id}`).

    5. Initiates a second flow search API call where the IP is the destination.

    6. Polls for completion and retrieves the search results.

    7. Combines the results and attaches them to the entity as a JSON result and a
    CSV table in the case wall.


    ### Additional Notes

    The action requires a timeframe (in hours) and a limit for the maximum number
    of flows to retrieve.
