Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events associated with specific IP addresses from Cisco Secure
    Network Analytics (Stealthwatch) within a specified timeframe.


    ### Flow Description

    1. Iterates through the target entities and filters for IP addresses (ADDRESS).

    2. For each IP address, queries Stealthwatch via API (`/smc/rest/domains/...`)
    to determine its associated domain ID.

    3. Initiates an API search query (`/sw-reporting/v1/tenants/{domain_id}/security-events/queries`)
    in Stealthwatch for security events where the IP acts as the source.

    4. Retrieves the results for the source IP search via API.

    5. Initiates a second API search query for security events where the IP acts as
    the destination.

    6. Retrieves the results for the destination IP search and combines them with
    the source results.

    7. If events are found, attaches the raw JSON data and a structured CSV table
    to the action results in the SecOps platform.


    ### Additional Notes

    The action requires the timeframe parameter to define the search window in hours.
  ai_short_description: >-
    Retrieves security events associated with specific IP addresses from Cisco Secure
    Network Analytics (Stealthwatch) within a specified timeframe.
