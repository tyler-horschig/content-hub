Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using information from Outpost24. This
    action retrieves device information and associated vulnerability findings based
    on specified risk levels and types, providing valuable context for the assets.


    ### Flow Description

    1. Initializes the Outpost24 manager and tests connectivity.

    2. Filters target entities to process only IP Addresses and Hostnames.

    3. Iterates through the filtered entities and makes GET requests to the Outpost24
    API (`/opi/rest/outscan/targets` and `/opi/rest/outscan/findings`) to fetch device
    and finding information.

    4. Enriches the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Optionally creates an insight and adds data tables to the case wall.

    6. Updates the entities in the SecOps platform.


    ### Additional Notes

    Supports filtering findings by risk level (e.g., Low, Medium, High, Critical)
    and finding type (e.g., Vulnerability, Information).
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving device information and
    associated vulnerability findings from Outpost24.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Outpost24 API to fetch device and finding
      data. It does not mutate external data. It updates internal entities with the
      fetched data and creates insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
