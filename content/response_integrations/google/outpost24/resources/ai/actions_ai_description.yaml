    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Finding Risk Level Filter | String | No | Specify a comma-separated list of
    risk level findings that will be used during filtering. Possible values: Initial,
    Recommendation, Low, Medium, High, Critical. If nothing is provided, action will
    fetch findings with all risk levels. |

    | Max Findings To Return | String | No | Specify how many findings to process
    per entity. If nothing is provided, action will return 100 findings. |

    | Return Finding Information | Boolean | No | If enabled, action will also retrieve
    information about findings that were found on the endpoint. |

    | Finding Type | Choice | No | Specify what kind of findings should be returned.
    |

    | Create Insight | Boolean | No | If enabled, action will create an insight containing
    all of the retrieved information about the entity. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Outpost24 server to ensure the integration is configured
    correctly and the provided credentials are valid.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Outpost24Manager with the provided credentials.

    3. Makes an HTTP GET request to the Outpost24 API (`/opi/rest/outscan/findings?limit=1`)
    to verify authentication and network connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used for troubleshooting and verifying credentials during
    the initial setup of the integration. It does not perform any operations on entities
    or alerts.
  ai_short_description: >-
    Tests connectivity to the Outpost24 server using the provided integration configuration
    parameters.
