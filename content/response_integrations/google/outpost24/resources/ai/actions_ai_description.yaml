    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches device information and vulnerability findings for IP addresses
      and hostnames from Outpost24. This aligns with the 'Enrich Asset' expected outcome
      (returning contextual metadata for a resource) and 'Enrich IOC' (returning intelligence
      for an IP).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
