Get Related URLs:
  ai_description: >-
    ### General Description

    Retrieves related URLs for supported entities (Hash, URL, IP Address, User, Threat
    Actor, CVE) based on associations in Siemplify ThreatFuse.


    ### Flow Description

    1. Iterates over target entities and filters them by supported types (Hash, URL,
    IP Address, User, Threat Actor, CVE) and valid identifiers (no spaces).

    2. Separates entities into indicators (Hash, URL, IP, User) and actors/vulnerabilities
    (Threat Actor, CVE).

    3. For indicators, queries the ThreatFuse API (`/api/v2/intelligence/`) to get
    indicator IDs.

    4. Retrieves related associations for the indicators based on the selected association
    types (e.g., Threat Bulletins, Actors, Malware) via the ThreatFuse API.

    5. For actors and vulnerabilities, queries the ThreatFuse API (`/api/v1/threat_model_search/`)
    to get their associations.

    6. For all retrieved associations, queries the ThreatFuse API to get the associated
    URL indicators.

    7. Aggregates the retrieved URLs and returns them as a JSON result.


    ### Additional Notes

    The action does not update the entities or create insights. It only returns the
    related URLs in the action's JSON result.
