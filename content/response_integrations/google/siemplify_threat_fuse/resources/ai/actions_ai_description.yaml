    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves threat intelligence indicators for IPs, URLs, hashes, and
      users (emails) from ThreatFuse, which aligns with the 'Enrich IOC' category.
      It does not mutate external data or perform other outcome category actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Severity Threshold | Dropdown | Yes | Specify what should be the severity threshold
    for the entity, in order to mark it as suspicious. If multiple records are found
    for the same entity, action will take the highest severity out of all available
    records. |

    | Confidence Threshold | String | Yes | Specify what should be the confidence
    threshold for the entity, in order to mark it as suspicious. Note: Maximum is
    100. If multiple records are found for the entity, action will take the average.
    Active records have priority. |

    | Ignore False Positive Status | Boolean | No | If enabled, action will ignore
    the false positive status and mark the entity as suspicious based on the "Severity
    Threshold" and "Confidence Threshold". If disabled, action will never label false
    positive entities as suspicious, regardless, if they pass the "Severity Threshold"
    and "Confidence Threshold" conditions or not. |

    | Add Threat Type To Case | Boolean | No | If enabled, action will add threat
    types of the entity from all records as tags to the case. Example: apt |

    | Create Insight | Boolean | No | If enabled, action will add an insight per processed
    entity. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, action will create
    insight only for entities that exceeded the "Severity Threshold" and "Confidence
    Threshold". |
Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves entity related associations from Siemplify ThreatFuse. It fetches details
    about campaigns, threat bulletins, actors, attack patterns, courses of action,
    identities, incidents, infrastructure, intrusion sets, malware, signatures, tools,
    TTPs, and vulnerabilities. It can also create entities out of retrieved associations,
    create case tags, and create insights.


    ### Flow Description

    1. Iterates over supported entities (File Hash, IP Address, URL, User).

    2. Fetches indicators for the entities from ThreatFuse via the `/api/v2/intelligence/`
    endpoint.

    3. Retrieves related associations for the indicators based on the selected association
    types via the `/api/v1/{association_type}/associated_with_intelligence/` endpoint.

    4. Fetches detailed information and statistics for each related association.

    5. Optionally creates new entities (Campaign, Actor, Signature, Vulnerability)
    based on the retrieved associations.

    6. Optionally creates case tags and insights based on the results.


    ### Additional Notes

    The action supports asynchronous execution to handle potentially long-running
    data retrieval.
