Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP, URL, File Hash, and User (Email) entities using Siemplify ThreatFuse.
    It retrieves threat intelligence indicators, evaluates risk based on severity
    and confidence thresholds, and updates the entities with the findings.


    ### Flow Description

    1. Filters target entities to include only supported types (Address, URL, File
    Hash, User) and excludes entities containing space characters.

    2. Retrieves indicators for the supported entities from the ThreatFuse API.

    3. Matches the retrieved indicators to the corresponding entities.

    4. Enriches the entities with indicator data, adds an entity table, and marks
    them as enriched.

    5. Evaluates the severity and confidence of the indicators against the configured
    thresholds to determine if the entity should be marked as suspicious.

    6. Fetches related analysis links from ThreatFuse and adds them as a data table.

    7. Optionally adds the threat types of the indicators as tags to the case.

    8. Optionally creates case insights for the processed entities, fetching additional
    intel details if necessary.

    9. Updates the enriched entities in the platform.


    ### Additional Notes

    If multiple records are found for the same entity, the action will enrich using
    the latest record. If 'Ignore False Positive Status' is disabled, the action will
    never label false positive entities as suspicious, regardless of the threshold
    conditions.
  ai_short_description: >-
    Enriches IP, URL, File Hash, and User entities using Siemplify ThreatFuse by retrieving
    threat intelligence indicators, evaluating risk thresholds, and updating the entities
    with the findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data, adds threat types as case tags, and creates
      case insights.
    reasoning: >-
      The action fetches indicator data from ThreatFuse using GET requests (fetches_data=true).
      It does not mutate external data. It mutates internal data by adding tags to
      the case, creating insights, and updating entities (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true).
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type not in SUPPORTED_ENTITIES`, where `SUPPORTED_ENTITIES` includes
      FILEHASH, ADDRESS, URL, and USER. Therefore, it filters by entity type and targets
      these specific types.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
