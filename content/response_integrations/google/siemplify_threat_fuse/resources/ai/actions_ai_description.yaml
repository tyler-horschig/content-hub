Get Related Hashes:
  ai_description: >-
    ### General Description

    Retrieves related hashes for specified entities (File Hash, URL, IP Address, User,
    Threat Actor, CVE) based on associations in Siemplify ThreatFuse. The action queries
    the ThreatFuse API to find related threat intelligence associations (such as Malware,
    Campaigns, or Threat Bulletins) and extracts the associated MD5 hashes.


    ### Flow Description

    1. Iterates over the target entities and filters them by supported types (File
    Hash, Address, URL, User, CVE, Threat Actor).

    2. Skips any entities whose identifier contains a space character.

    3. Separates the entities into two groups: actors/vulnerabilities and other general
    indicators.

    4. For general indicators, makes a GET request to the ThreatFuse API to retrieve
    their corresponding indicator objects.

    5. Queries the ThreatFuse API to get related associations for those indicators
    based on the selected association types (e.g., Actors, Malware, Campaigns).

    6. Fetches the MD5 indicator hashes for each retrieved association.

    7. For actors and vulnerabilities, queries the ThreatFuse API directly for related
    associations by name, then fetches their MD5 indicator hashes.

    8. Aggregates all retrieved hashes and returns them as a JSON result attached
    to the action.


    ### Additional Notes

    The action does not update the entities or create insights. It only returns the
    related hashes in the action's JSON result.
  ai_short_description: >-
    Retrieves related hashes for supported entities based on associations in Siemplify
    ThreatFuse.
  capabilities:
