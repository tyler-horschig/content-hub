Submit Observables:
  ai_description: >-
    ### General Description

    Submits an observable to Siemplify ThreatFuse based on IP, URL, Hash, or User
    entities. This action allows analysts to contribute threat intelligence back to
    the ThreatFuse platform by creating new observables with specified classifications,
    threat types, and confidence scores.


    ### Flow Description

    1. Validates the provided parameters, such as expiration date and confidence score.

    2. Iterates through the target entities, filtering for supported types (File Hash,
    IP Address, URL, User).

    3. For each valid entity, makes a POST request to the ThreatFuse API (`/api/v1/intelligence/import/`)
    to submit the observable with the specified classification, threat type, and other
    metadata.

    4. Polls the ThreatFuse API (`/api/v1/importsession/{job_id}/`) to check the status
    of the submission job until it is approved.

    5. Returns a JSON result containing the details of approved jobs and jobs with
    excluded entities.


    ### Additional Notes

    Requires 'Org admin', 'Create Anomali Community Intel', and 'Approve Intel' permissions
    in ThreatFuse.
