Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (Hostname, IP Address) by fetching system information
    from McAfee Mvision EDR. This action retrieves contextual metadata such as the
    operating system, last boot time, certainty, and associated IP addresses, and
    appends this data to the entity's additional properties.


    ### Flow Description

    1. Initializes the McAfee Mvision EDR manager with the provided API credentials.

    2. Filters the target entities to include only `ADDRESS` and `HOSTNAME` types.

    3. Fetches all available hosts from McAfee Mvision EDR via the `get_hosts` API
    endpoint.

    4. Iterates over the filtered entities and attempts to match each entity's identifier
    against the fetched hosts' hostnames or IP addresses.

    5. If a match is found, extracts enrichment data and updates the entity's additional
    properties.

    6. Marks the entity as enriched, adds a JSON result, and creates an entity table
    with the host details.

    7. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    - The action matches entities by comparing the entity identifier with the host's
    hostname (case-insensitive) or its list of network interface IP addresses.

    - If an entity cannot be matched with any host from McAfee Mvision EDR, it will
    be reported as failed in the output message.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by fetching system information from
    McAfee Mvision EDR.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
