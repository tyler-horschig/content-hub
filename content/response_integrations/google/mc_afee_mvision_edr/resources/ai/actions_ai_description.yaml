    `remediation/api/v1/actions/hosts-actions` API endpoint.

    6. Returns a summary of successful, failed, and duplicate entity operations.


    ### Additional Notes

    The action requires the endpoint to be previously quarantined. It matches entities
    by either hostname or IP address.
