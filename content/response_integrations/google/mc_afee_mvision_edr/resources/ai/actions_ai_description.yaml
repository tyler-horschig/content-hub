Stop And Remove Content:
  ai_description: >-
    ### General Description

    Stops an interpreter process by its PID (e.g., Python, Bash) and removes the associated
    script by its full path on a McAfee Mvision EDR endpoint. This action initiates
    a state change on the external device to remediate a potential threat.


    ### Flow Description

    1. Filters target entities to include only IP Addresses and Hostnames.

    2. Retrieves a list of hosts from McAfee Mvision EDR via a GET request to the
    API.

    3. Matches the filtered entities to the retrieved hosts based on IP address or
    hostname.

    4. For each matched host, initiates an asynchronous task to stop the specified
    process and remove the file via a POST request to the McAfee Mvision EDR API.

    5. Periodically queries the status of the task until it completes, fails, or encounters
    an error.


    ### Additional Notes

    This is an asynchronous action. Ensure that the provided PID and file path are
    accurate to avoid unintended system impact.
