Kill Process:
  ai_description: >-
    ### General Description

    Stops a running process and removes its associated file on a managed endpoint
    using McAfee Mvision EDR. If the specified process is not currently running, the
    action will simply remove its file from the endpoint.


    ### Flow Description

    1. Iterates over the target entities, filtering specifically for Address and Hostname
    entity types.

    2. Retrieves the list of managed hosts from McAfee Mvision EDR to match the entities
    to their corresponding endpoint IDs (ma_guid).

    3. Initiates an asynchronous task via the McAfee Mvision EDR API to kill the process
    (identified by PID, SHA256, Name, or Full Path) on the matched endpoints.

    4. Periodically queries the status of the task until it completes successfully
    or fails, returning the final execution state.


    ### Additional Notes

    - This is an asynchronous action that will continue to run in the background until
    the task status in McAfee Mvision EDR reaches a completed or error state.

    - The action requires valid authentication credentials (either Client ID/Secret
    or Username/Password) configured in the integration.
  ai_short_description: >-
    Stops a running process and removes its file on a managed endpoint using McAfee
    Mvision EDR.
