    entities. It matches the entity identifier against the hosts in McAfee Mvision
    EDR and creates an unquarantine task to restore network connectivity for the endpoint.


    ### Flow Description

    1. Initializes the McAfee Mvision EDR manager.

    2. Retrieves a list of all hosts from McAfee Mvision EDR via the `ft/api/v2/ft/hosts`
    API endpoint.

    3. Iterates through the target IP Address and Hostname entities.

