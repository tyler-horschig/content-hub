List Alert Connections:
  ai_description: >-
    ### General Description

    Retrieves connections related to a specific alert in Armis based on the provided
    alert ID and severity criteria.


    ### Flow Description

    1. Retrieves the `Alert ID`, `Lowest Severity To Fetch`, and `Max Connections
    To Return` parameters.

    2. Validates that the maximum connections to return is greater than or equal to
    the minimum allowed.

    3. Constructs an AQL (Armis Query Language) query to search for connections associated
    with the specified alert ID and filtered by the requested severity levels.

    4. Makes a GET request to the Armis API search endpoint (`/api/v1/search/`) to
    fetch the alert connections.

    5. Parses the response and extracts the connection details.

    6. Returns the connections as JSON results and populates a data table with the
    connection information.


    ### Additional Notes

    The action relies on the Armis Query Language (AQL) to filter connections by `riskLevel`
    and `activity:(alert:(alertId:({alert_id})))`.
  ai_short_description: >-
    Retrieves connections related to a specific alert in Armis based on the provided
    alert ID and severity criteria.
