Update Alert Status:
  ai_description: >-
    ### General Description

    Updates the status of a specific alert in the Armis platform.


    ### Flow Description

    1. Extracts the `Alert ID` and `Status` parameters from the action configuration.

    2. Initializes the Armis API client with the provided integration credentials.

    3. Sends a PATCH request to the Armis API (`/api/v1/alerts/{alert_id}/`) to update
    the alert's status.

    4. Returns a success message if the alert is updated, or an error if the alert
    is not found or already in the requested state.


    ### Additional Notes

