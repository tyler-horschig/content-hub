Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP and MAC Address entities using information from Armis. This action
    retrieves detailed device context, such as risk level, operating system, category,
    and site information, to provide better visibility into the assets associated
    with the entities.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type IP Address and MAC Address.

    3. For each valid entity, makes a GET request to the Armis API (`/api/v1/devices/`)
    to fetch device information based on the IP or MAC address.

    4. If device information is found, updates the entity's additional properties
    with the retrieved data and marks the entity as enriched.

    5. Attaches the device information as JSON results and entity tables to the case.

    6. If the `Create Endpoint Insight` parameter is enabled, generates a case insight
    containing the endpoint details.

    7. Updates the modified entities within the Google SecOps platform.


    ### Additional Notes

    - Supported entity types are IP Address and MAC Address.

    - Entities that do not return device information from Armis will be skipped and
    reported as failed.
  ai_short_description: >-
    Enriches IP and MAC Address entities by retrieving device details and risk levels
    from Armis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Armis API to fetch device information.
      It does not mutate external data. It updates internal entities with the fetched
      data and optionally creates case insights.
