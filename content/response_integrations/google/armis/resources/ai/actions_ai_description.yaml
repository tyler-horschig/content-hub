Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Armis service using the integration configuration parameters.


    ### Flow Description

    1. Extracts the API Root, API Secret, and Verify SSL parameters from the integration
    configuration.

    2. Initializes the ArmisManager.

    3. Calls the `test_connectivity` method which sends a GET request to the `/api/v1/search/`
    endpoint with a simple query (`aql=in:devices`).

    4. Returns a success message if the connection is successful, otherwise returns
    an error message.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration configuration.
