Get domain reputation:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities by retrieving domain reputation from URLVoid.
    This action checks if a domain is blacklisted by popular and trusted domain blacklist
    services, providing threat intelligence and risk assessment.


    ### Flow Description

    1. Iterates over the target entities and filters for Hostname and URL entity types.

    2. Extracts the domain from the entity identifier.

    3. Makes a GET request to the URLVoid API to fetch the domain reputation.

    4. Parses the response to create a blacklist report and attaches it as an entity
    table.

    5. Generates an insight containing the country code associated with the domain.

    6. Updates the entity's additional properties with the enrichment data.

    7. Marks the entity as suspicious if the number of detections exceeds the configured
    threshold.

    8. Updates the entities in the platform and returns the JSON results.


    ### Additional Notes

    The action requires a valid URLVoid API key configured in the integration settings.
  ai_short_description: >-
    Enriches Hostname and URL entities by retrieving domain reputation and blacklist
    status from URLVoid.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the URLVoid API to fetch domain reputation
      data. It does not mutate external data but updates internal entities with enrichment
      data, marks them as suspicious if a threshold is met, and creates insights with
      country information.
