Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the URLVoid service to ensure the integration is configured
    correctly and the API key is valid.


    ### Flow Description

    1. Retrieves the integration configuration parameters, including the API URL and
    API Key.

    2. Makes an HTTP GET request to the URLVoid API (`/domainbl/v1/pay-as-you-go/?stats`)
    to verify authentication and network connectivity.

    3. Validates the response and returns a success message if the connection is established.


    ### Additional Notes

    This action does not interact with any specific entities or alerts. It is primarily
    used for administrative purposes to validate the integration setup.
