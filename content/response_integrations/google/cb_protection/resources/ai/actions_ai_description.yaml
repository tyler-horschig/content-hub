    ### General Description

    Retrieves a list of computers from Carbon Black Protection that are running a
    specific file hash. This action helps analysts understand the prevalence and impact
    of a file across the environment by identifying all endpoints where the file exists.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. Further filters the hashes to ensure they are exactly 32 characters long, indicating
    an MD5 hash.

    4. Makes an API call to Carbon Black Protection to retrieve the list of computers
    running the specified hash.

    5. Extracts relevant computer details such as Hostname, IP Address, MAC Address,
    Operating System, and Agent Version.

    6. Attaches the extracted computer information as a CSV table to the corresponding
    entity and adds the raw data to the action's JSON result.


