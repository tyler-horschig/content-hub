Find File:
  ai_description: >-
    ### General Description

    Finds instances of a specific file hash across multiple computers using Carbon
    Black Protection. This action queries the Carbon Black Protection API to determine
    where a given MD5 file hash has been observed within the environment, providing
    prevalence and contextual data.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. Validates that the file hash is an MD5 hash by checking if its identifier length
    is exactly 32 characters.

    4. Makes an API call to Carbon Black Protection (`get_file_instances`) to retrieve
    all file instances associated with the MD5 hash.

    5. Flattens the retrieved file instance data and constructs a CSV table.

    6. Attaches the CSV table to the entity's results and aggregates the raw data
    into the action's JSON results.


    ### Additional Notes

    This action strictly supports MD5 hashes. Hashes of other types (e.g., SHA-1,
    SHA-256) will be ignored as they do not meet the 32-character length requirement.
  ai_short_description: >-
    Queries Carbon Black Protection to find instances of a specific MD5 file hash
    across multiple computers, returning prevalence data and attaching it as an entity
    table.
