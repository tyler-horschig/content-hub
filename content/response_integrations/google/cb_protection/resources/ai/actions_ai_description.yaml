Analyze File:
  ai_description: >-
    ### General Description

    Triggers a file analysis job for MD5 file hashes using a specified connector in
    Carbon Black Protection and retrieves the analysis results.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash entities that are
    valid MD5 hashes (32 characters).

    2. For each valid hash, initiates a file analysis job on Carbon Black Protection
    using the specified connector and priority.

    3. Waits for the analysis to complete within the specified timeout.

    4. Retrieves the analysis results and checks if the file is deemed malicious or
    suspicious.

    5. If malicious or suspicious, marks the entity as suspicious.

    6. Updates the entities in Google SecOps and attaches the analysis results as
    JSON.


    ### Additional Notes

    - The action requires the file to already exist in the Carbon Black Protection
    file catalog and on at least one computer.
  ai_short_description: >-
    Triggers a file analysis job for MD5 file hashes using a specified connector in
    Carbon Black Protection and retrieves the analysis results, updating the entity's
    suspicious status if applicable.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a new file analysis job on the Carbon Black Protection server.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving the analysis results from Carbon Black
      Protection. It mutates external data by creating a new file analysis job via
      a POST request. It updates internal entities by marking them as suspicious if
      the analysis determines they are malicious or suspicious. It does not create
      insights or modify alert data.
