Change Computer Policy:
  ai_description: >-
    ### General Description

    Moves a specified computer to a new policy within Carbon Black Protection. This
    action allows analysts to dynamically reassign endpoints to different security
    policies based on IP address or hostname entities.


    ### Flow Description

    1. Iterates through the provided target entities in the case.

    2. Filters entities to process only those of type IP Address or Hostname.

    3. Makes a GET request to the Carbon Black Protection API to retrieve the computer
    record associated with the entity's identifier.

    4. Makes a PUT request to the Carbon Black Protection API to update the computer's
    assigned policy to the specified `Policy Name`.

    5. Updates the successfully processed entities within the Google SecOps platform.


    ### Additional Notes

    The action requires the exact name of the target policy as configured in Carbon
    Black Protection. If the computer or policy is not found, the action will skip
    the entity and report the error in the output message.
