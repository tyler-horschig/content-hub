Unblock Hash:
  ai_description: >-
    ### General Description

    Unblocks specific file hashes on Carbon Black Protection by removing them from
    banned file rules across specified policies or globally.


    ### Flow Description

    1. Retrieves the list of policy names from the action parameters and fetches their
    corresponding IDs from Carbon Black Protection.

    2. Iterates through the target entities, filtering for those of type File Hash.

    3. For each valid file hash, calls the Carbon Black Protection API to update or
    delete the existing file rule, effectively unbanning the hash for the specified
    policies.

    4. Updates the successfully processed entities in Google SecOps.


    ### Additional Notes

    If no policies are specified or if all policies are removed from a rule, the rule
    may be deleted entirely.
