Block Hash:
  ai_description: >-
    ### General Description

    Blocks specific file hashes in Carbon Black Protection either globally or across
    specified policies. This action initiates a state change on the external Carbon
    Black Protection platform to prevent the execution of the specified file hashes.


    ### Flow Description

    1. Retrieves the `Policy Names` parameter to determine which policies the block
    should apply to.

    2. Fetches the corresponding policy IDs from Carbon Black Protection.

    3. Iterates through the target entities and filters for `FILEHASH` entities.

    4. For each valid file hash, makes a POST request to the Carbon Black Protection
    API to create or update a file rule, setting its state to banned.

    5. Updates the successfully blocked entities in Google SecOps.


    ### Additional Notes

    Ensure that the provided policy names exactly match those configured in Carbon
    Black Protection.
