Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a Microsoft SQL Server database. This action verifies that
    the integration is configured correctly and can successfully authenticate and
    communicate with the target SQL Server instance.


    ### Flow Description

    1. Extracts connection and authentication parameters from the integration configuration.

    2. Initializes the MSSQLManager with the provided credentials, server address,
    and port.

    3. Attempts to establish a connection to the specified SQL Server instance using
    the `pyodbc` library.

    4. Returns a success message if the connection is established without errors,
    or a failure message if an exception occurs.


    ### Additional Notes

    This action is primarily used as a diagnostic tool to ensure network reachability
    and valid credentials for the MSSQL integration.
  ai_short_description: >-
    Tests connectivity to a Microsoft SQL Server database to verify integration configuration
    and network access.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action attempts to connect to an MSSQL database using the provided credentials
      and server address. It does not fetch data, mutate external data, or interact
      with internal SecOps entities or cases.
