RunSQLQuery:
  ai_description: >-
    ### General Description

    Executes a specified SQL query on a Microsoft SQL Server database. This action
    can be used to retrieve data from the database or to commit changes (such as INSERT,
    UPDATE, or DELETE statements) depending on the provided parameters.


    ### Flow Description

    1. Extracts the action parameters, including the target database name, the SQL
    query, and the commit flag.

    2. Establishes a connection to the MSSQL database using the configured credentials
    and connection settings (supporting Windows Authentication and Kerberos if configured).

    3. Executes the provided SQL query against the database.

    4. If the 'Commit' parameter is set to true, commits the transaction to the database.

    5. Retrieves the query results (if applicable) and formats them as a CSV data
    table and a JSON object.

    6. Returns the results and execution status to the SecOps platform.


    ### Additional Notes

    Ensure the query syntax is valid for Microsoft SQL Server. When executing queries
    that modify data, the 'Commit' parameter must be set to true for the changes to
    be saved in the database.
  ai_short_description: >-
    Executes a specified SQL query on a Microsoft SQL Server database, with the ability
    to retrieve results or commit changes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes and commits SQL queries that can modify data (e.g., INSERT, UPDATE,
      DELETE) within the external Microsoft SQL Server database.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a SQL query and retrieving the results.
      It can mutate external data because it allows executing and committing queries
      (like INSERT, UPDATE, DELETE) to the external MSSQL database. It does not mutate
      internal SecOps data, update entities, create insights, modify alerts, or create
      case comments.
