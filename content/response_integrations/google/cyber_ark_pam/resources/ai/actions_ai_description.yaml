Get Account Password Value:
  ai_description: >-
    ### General Description

    Retrieves an account password or SSH key value from CyberArk PAM for a specified
    account ID. This action allows analysts to securely fetch credentials needed for
    further investigation or remediation steps.


    ### Flow Description

    1. Extracts the provided account ID, reason, and optional ticketing details from
    the action parameters.

    2. Authenticates with CyberArk PAM using the integration's configured credentials.

    3. Makes a POST API call to the `/PasswordVault/API/Accounts/{account_id}/Password/Retrieve/`
    endpoint to fetch the secret.

    4. Returns the retrieved password or SSH key as a JSON result for use in subsequent
    playbook steps.


    ### Additional Notes

    - This action does not run on Chronicle SOAR entities.

    - The account ID required for this action can be obtained using the "List Accounts"
    action.
  ai_short_description: >-
    Retrieves an account password or SSH key value from CyberArk PAM for a specified
    account ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
