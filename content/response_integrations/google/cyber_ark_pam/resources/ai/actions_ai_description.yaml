    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API request to CyberArk PAM to retrieve a password or SSH
      key for a specific account. Although it uses a POST request, it is a retrieval
      operation and does not mutate external data. It does not update internal entities,
      alerts, or cases.
