Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CyberArk PAM installation using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters such as API Root, Username, and
    Password.

    2. Makes an API call to the CyberArk PAM authentication endpoint (`/PasswordVault/API/Auth/CyberArk/Logon`)
    to retrieve an access token.

    3. Returns a success message if the connection and authentication are successful,
    or an error message if they fail.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration configuration.
