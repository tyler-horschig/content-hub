List Accounts:
  ai_description: >-
    ### General Description

    Lists accounts available in CyberArk PAM based on provided search and filter criteria.
    This action queries the CyberArk PAM API to retrieve account details and returns
    them as a JSON result and a data table.


    ### Flow Description

    1. Extracts configuration and action parameters, including search queries, filters,
    and pagination settings.

    2. Validates the provided parameters (e.g., ensuring max records and offset are
    valid numbers).

    3. Initializes the CyberArk PAM Manager and authenticates to the API.

    4. Makes a GET request to the CyberArk PAM API (`PasswordVault/API/Accounts`)
    to retrieve a list of accounts matching the search query, operator, and filters.

    5. Parses the response and constructs a JSON result and a data table containing
    the available accounts.


    ### Additional Notes

    This action does not run on Chronicle SOAR entities.
