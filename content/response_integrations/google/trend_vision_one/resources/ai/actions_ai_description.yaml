Submit File:
  ai_description: >-
    ### General Description

    Submits files to Trend Vision One for sandbox analysis and retrieves the analysis
    results. This action allows analysts to upload files directly from the local filesystem
    to Trend Vision One to determine their behavior and threat level.


    ### Flow Description

    1. Extracts the provided file paths, archive password, document password, and
    arguments from the action parameters.

    2. Verifies that the specified files exist and are accessible in the local filesystem.

    3. Iterates through the valid file paths and submits each file to the Trend Vision
    One sandbox via a POST request to the `/v3.0/sandbox/files/analyze` endpoint.

    4. Asynchronously queries the status of each submission task using a GET request
    to the `/v3.0/sandbox/tasks/{task_id}` endpoint.

    5. Once a task completes successfully, retrieves the detailed analysis results
    via a GET request to the `/v3.0/sandbox/analysisResults/{task_id}` endpoint.

    6. Appends the retrieved analysis results to the action's JSON output.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted appropriately to allow sufficient time for the sandbox analysis
    to complete.
