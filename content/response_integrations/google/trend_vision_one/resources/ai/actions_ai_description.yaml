Unisolate Endpoint:
  ai_description: >-
    ### General Description

    Unisolates endpoints in Trend Vision One. This action restores network connectivity
    for endpoints that were previously isolated, using IP Address and Hostname entities,
    or explicitly provided Agent UUIDs.


    ### Flow Description

    1. Extracts the `Description` and `Agent UUID` parameters.

    2. Iterates over supported entities (IP Address, Hostname).

    3. For each entity, searches for the corresponding endpoint in Trend Vision One
    using the `search_endpoint` API.

    4. If an endpoint is found, initiates an unisolation task using the `unisolate_endpoint`
    API.

    5. Processes any explicitly provided `Agent UUID`s and initiates unisolation tasks
    for them.

    6. Monitors the status of the unisolation tasks asynchronously using the `get_task`
    API.

    7. Returns the status of the unisolation operations.


    ### Additional Notes

    The action runs asynchronously. Adjust the script timeout value in the Chronicle
    SOAR IDE as needed.
