Submit URL:
  ai_description: >-
    ### General Description

    Submits URL entities to the Trend Vision One sandbox for analysis. This asynchronous
    action initiates a sandbox task for each URL and retrieves the analysis results
    once the tasks are completed.


    ### Flow Description

    1. Filters the target entities to include only URL entities.

    2. In the initial run, groups the URLs into chunks and makes a POST request to
    the Trend Vision One API (`/v3.0/sandbox/urls/analyze`) to submit them for sandbox
    analysis.

    3. Asynchronously checks the status of the analysis tasks using a GET request
    to the API (`/v3.0/sandbox/tasks/{task_id}`).

    4. Once a task completes successfully, retrieves the analysis report via a GET
    request (`/v3.0/sandbox/analysisResults/{task_id}`).

    5. Attaches the retrieved analysis results to the action's JSON results.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed. If the daily submission quota is reached during
    execution, the action will report the limit exceeded status for the pending URLs.
