Execute Custom Script:
  ai_description: >-
    ### General Description

    Executes a custom script on endpoints in Trend Vision One based on Hostname or
    IP Address entities, or explicitly provided Agent UUIDs.


    ### Flow Description

    1. Extracts the script name, script parameters, and agent UUIDs from the action
    parameters.

    2. Iterates over the target entities, filtering for Hostname and IP Address types.

    3. For each valid entity, makes a GET request to the Trend Vision One API to search
    for the corresponding endpoint.

    4. If an endpoint is found, makes a POST request to initiate the script execution
    on that endpoint.

    5. Processes any provided Agent UUIDs in the same manner.

    6. Asynchronously monitors the execution status of the tasks via GET requests.

    7. Returns the execution results and task details as JSON.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed.
