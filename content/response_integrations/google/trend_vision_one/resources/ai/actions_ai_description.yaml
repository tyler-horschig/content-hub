Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using information from Trend Vision
    One. It retrieves endpoint details such as OS description, login accounts, endpoint
    names, and installed product codes to provide contextual metadata for the assets.


    ### Flow Description

    1. Extracts the action parameters, including an optional list of Agent UUIDs.

    2. Filters the target entities to include only IP Addresses and Hostnames.

    3. Iterates through the filtered entities and queries the Trend Vision One API
    (`/v3.0/eiqs/endpoints`) to find matching endpoints based on IP or Hostname.

    4. If an endpoint is found, updates the entity's `additional_properties` with
    the endpoint data, marks it as enriched, and creates an entity table.

    5. Processes any provided Agent UUIDs by querying the API for those specific agents.

    6. Updates the successfully enriched entities in the Google SecOps platform.

    7. Returns the enrichment data as JSON results.


    ### Additional Notes

    The action supports enriching entities by their original identifier or by explicitly
    providing Agent UUIDs as an action parameter.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving endpoint contextual metadata
    from Trend Vision One.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities' additional properties with endpoint enrichment data and
      sets their is_enriched flag to True.
    reasoning: >-
      The action fetches endpoint data from Trend Vision One via a GET request. It
      does not mutate external data. It mutates internal data by updating the entities'
      additional properties with the fetched endpoint data and calling `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
