Isolate Endpoint:
  ai_description: >-
    ### General Description

    Isolates endpoints in Trend Vision One. This action targets IP Address and Hostname
    entities, as well as explicitly provided Agent UUIDs, to restrict their network
    communication.


    ### Flow Description

    1. Initializes the Trend Vision One manager with the provided API credentials.

    2. Iterates over the supported target entities (IP Address and Hostname).

    3. Searches for the corresponding endpoint in Trend Vision One using the entity's
    identifier.

    4. If an endpoint is found, initiates an isolation task using its GUID.

    5. Processes any provided Agent UUIDs, searching for the agents and initiating
    isolation tasks for them.

    6. Monitors the status of the isolation tasks asynchronously until completion
    or timeout.

    7. Outputs the results and attaches a JSON result containing task details.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed.
