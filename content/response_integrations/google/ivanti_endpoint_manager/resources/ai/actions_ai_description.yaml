Execute Task:
  ai_description: >-
    ### General Description

    Executes a specified task or package on target endpoints using Ivanti Endpoint
    Manager. The action supports Hostname, IP Address, and MAC Address entities, allowing
    analysts to deploy software, run scripts, or perform management tasks on remote
    machines.


    ### Flow Description

    1. Filters target entities to include only supported types (Hostname, IP Address,
    MAC Address).

    2. Queries Ivanti Endpoint Manager to retrieve machine details matching the provided
    entities.

    3. Creates a new scheduled task in Ivanti with the specified delivery method and
    package.

    4. Adds the identified devices to the newly created task.

    5. Initiates the task execution.

    6. If "Only Initiate" is disabled, the action runs asynchronously and periodically
    queries the task status until completion or timeout.

    7. Returns the execution status and task details as JSON results.


    ### Additional Notes

    This action can run asynchronously. If the "Only Initiate" parameter is enabled,
    the action will start the task and finish immediately without waiting for the
    final execution status.
  ai_short_description: >-
    Executes a specified task or package on target endpoints via Ivanti Endpoint Manager.
  capabilities:
