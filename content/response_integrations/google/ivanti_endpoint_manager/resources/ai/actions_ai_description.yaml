Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and MAC Address entities using information from
    Ivanti Endpoint Manager. This action retrieves contextual metadata about endpoints,
    such as OS version, last login, and network details, to provide better visibility
    into the assets involved in an alert.


    ### Flow Description

    1. Filters the target entities to include only supported types: IP Address, Hostname,
    and MAC Address.

    2. If a `Custom Column Set` is provided, validates it against the Ivanti Endpoint
    Manager.

    3. Queries Ivanti Endpoint Manager to retrieve machine information matching the
    identifiers of the filtered entities.

    4. If a `Custom Column Set` is provided, fetches additional machine details for
    the retrieved machines.

    5. Matches the retrieved machine data with the corresponding entities based on
    IP address, hostname, or MAC address.

    6. Enriches the matching entities with the retrieved data, updates their `is_enriched`
    status, and attaches the data to their additional properties.

    7. If `Create Insight` is enabled, generates a case insight containing the retrieved
    endpoint information.

    8. Returns the enriched data as JSON results and entity tables.


    ### Additional Notes

    - The action requires valid credentials and API access to Ivanti Endpoint Manager.

    - Custom column sets must be pre-configured in Ivanti Endpoint Manager to be used
    successfully.
  ai_short_description: >-
    Enriches IP Address, Hostname, and MAC Address entities by retrieving contextual
    endpoint metadata (such as OS, last login, and network details) from Ivanti Endpoint
    Manager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to Ivanti Endpoint Manager to fetch machine data
      (`get_machines`, `get_machine_details`). It does not mutate external data. It
      updates internal entities with the fetched data (`siemplify.update_entities`)
      and creates case insights (`siemplify.create_case_insight`).
