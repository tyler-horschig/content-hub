Wait For Status Change:
  ai_description: >-
    ### General Description

    Waits asynchronously until a specific ticket in CA Service Desk reaches an expected
    status.


    ### Flow Description

    1. Connects to the CA Service Desk API using the configured integration credentials.

    2. Retrieves the current status of the specified ticket using the `Ticket ID`
    parameter.

    3. Compares the current status with the `Expected Ticket Status Name` parameter.

    4. If the status matches, it fetches the ticket details and completes the action,
    returning the ticket data as a JSON result.

    5. If the status does not match, the action remains in progress and will be re-evaluated
    in the next asynchronous cycle.


    ### Additional Notes

    This is an asynchronous action that will periodically check the ticket status
    until the expected status is met or the action times out.
