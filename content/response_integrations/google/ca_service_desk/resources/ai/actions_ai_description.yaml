Sync Ticket History:
  ai_description: >-
    ### General Description

    Fetches the entire ticket history (comments) from CA Service Desk for the ticket
    associated with the current alert and attaches them as comments to the case in
    Google SecOps.


    ### Flow Description

    1. Retrieves the external ticket ID from the current alert (`siemplify.current_alert.external_id`).

    2. Makes a SOAP API call to CA Service Desk to fetch all incident comments associated
    with the ticket ID since the beginning of time.

    3. Iterates through the retrieved comments, extracting the content, type, analyst
    name, and timestamp based on the provided parameter mappings.

    4. Formats each comment and attaches it to the Google SecOps case using the `siemplify.add_comment`
    method.

    5. Returns the raw comment data as a JSON result.


    ### Additional Notes

    The action relies on the alert's `external_id` to identify the corresponding CA
    Service Desk ticket. Ensure that the alert has a valid external ID mapped to a
    CA Service Desk ticket before running this action.
