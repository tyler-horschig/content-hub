Search Tickets:
  ai_description: >-
    ### General Description

    Searches for tickets in CA Service Desk Manager based on specified criteria such
    as Incident ID, Summary, Description, Status, and a timeframe. It retrieves the
    matching ticket details and returns them as a JSON result and a data table.


    ### Flow Description

    1. Retrieves action parameters including Incident ID, Summary, Description, Status,
    and Days Backwards.

    2. Calculates the Unix timestamp to fetch tickets from based on the `Days Backwards`
    parameter.

    3. If an `Incident ID` is provided, it directly targets that specific ticket.

    4. If no `Incident ID` is provided, it calls the CA Service Desk SOAP API (`get_incident_ids_by_filter`)
    to find incident IDs matching the provided summary, description, status, and time
    filters.

    5. For each matching incident ID, it makes an API call (`get_incident_by_id`)
    to fetch the detailed ticket information.

    6. Aggregates the retrieved ticket data into a CSV table and a JSON result.


    ### Additional Notes

    If no tickets are found matching the criteria, the action will output a message
    indicating that no incidents were found.
  ai_short_description: >-
    Searches for tickets in CA Service Desk Manager based on specified criteria such
    as Incident ID, Summary, Description, Status, and a timeframe, returning the matching
    ticket details.
