Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CA Service Desk API to ensure the integration is configured
    correctly and can communicate with the server.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password).

    2. Initializes the CA Service Desk SOAP manager.

    3. Calls the `test_connectivity` method, which makes a SOAP API request to log
    in to the CA Service Desk service.

    4. Returns a success message if the connection is established, or a failure message
    if it cannot connect.


    ### Additional Notes

    This action does not process any entities or modify any data. It is solely used
    for verifying the integration's connection settings.
  ai_short_description: >-
    Tests connectivity to the CA Service Desk API by attempting to establish a session.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
