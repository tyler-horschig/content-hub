Run General Query:
  ai_description: >-
    ### General Description

    Executes a custom query in RSA NetWitness Platform to retrieve matching events
    and their associated PCAP files. This action allows analysts to perform free-form
    searches to gather network telemetry and packet captures for further investigation.


    ### Flow Description

    1. Initializes the connection to the RSA NetWitness Platform using the provided
    API credentials.

    2. Executes the custom query via the `get_session_ids_for_query` method to retrieve
    session IDs within the specified timeframe (`Max Hours Backwards`).

    3. If matching session IDs are found, calls the `get_pcap_of_session_id` method
    to download the combined PCAP file for those sessions and attaches it to the action
    results.

    4. Iterates over the retrieved session IDs and calls the `get_metadata_from_session_id`
    method to fetch the event metadata for each session, up to the `Max Events To
    Return` limit.

