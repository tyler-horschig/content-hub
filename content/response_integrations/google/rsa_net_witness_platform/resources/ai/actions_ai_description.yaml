Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities by fetching endpoint system information
    from RSA NetWitness Platform.


    ### Flow Description

    1. Filters target entities to include only IP Addresses and Hostnames.

    2. Initializes the RSA NetWitness API client.

    3. Retrieves the required service ID for the endpoint server via the RSA NetWitness
    API.

    4. Iterates through the filtered entities and queries the RSA NetWitness API (`GET
    /hosts`) to search for the IP or Hostname.

    5. If an endpoint is found, extracts its metadata (e.g., agent ID, hostname, risk
    score, network interfaces) and enriches the entity's additional properties.

    6. Marks the entity as enriched.

    7. If a risk score threshold is provided and the endpoint's risk score exceeds
    it, marks the entity as suspicious.

    8. Updates the entities in the Google SecOps platform and attaches the raw JSON
    results.


    ### Additional Notes

    Requires RSA NetWitness Respond license and endpoint server service running in
    the background.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by fetching endpoint system information
    and risk scores from RSA NetWitness Platform.
