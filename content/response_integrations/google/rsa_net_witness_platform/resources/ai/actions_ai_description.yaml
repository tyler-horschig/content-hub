Enrich File:
  ai_description: >-
    ### General Description

    Fetches information about a file using hashes (MD5, SHA256) or file names from
    RSA NetWitness Platform. The action retrieves file details such as reputation
    status, global risk score, machine OS type, size, and checksums, and enriches
    the corresponding entities in Google SecOps.


    ### Flow Description

    1. Initializes the RSA Manager with the provided API credentials.

    2. Retrieves the required service ID for the endpoint server from RSA NetWitness.

    3. Iterates over the target entities, filtering for `FILENAME` and `FILEHASH`
    entity types.

    4. For each suitable entity, makes an API call to search for the file name or
    file hash in RSA NetWitness.

    5. If the file is found, extracts the enrichment data and updates the entity's
    additional properties.

    6. Evaluates the file's global risk score against the configured `Risk Score Threshold`.
    If the score exceeds the threshold, the entity is marked as suspicious.

    7. Updates the enriched entities in the platform and attaches the raw JSON results.


    ### Additional Notes

    - Only MD5 and SHA256 hashes are supported.

    - Requires an RSA Netwitness Respond license, the endpoint server service running
    in the background, and configured Web Username and Web Password in the integration
    configuration.
  ai_short_description: >-
    Enriches file name and file hash entities by fetching file details and risk scores
    from RSA NetWitness Platform.
