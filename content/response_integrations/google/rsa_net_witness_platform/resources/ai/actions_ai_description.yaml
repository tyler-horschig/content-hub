    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to RSA NetWitness API to fetch host data. It
      does not mutate external data but updates internal entities with the fetched
      data.
