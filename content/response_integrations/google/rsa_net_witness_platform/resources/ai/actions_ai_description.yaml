Isolate Endpoint:
  ai_description: >-
    ### General Description

    Requests endpoint isolation in RSA Netwitness for specific IP address or hostname
    entities. This action initiates a state change on the external device to prevent
    network traffic to or from the specified entity.


    ### Flow Description

    1. Extracts the `Comment` parameter.

    2. Filters target entities for IP addresses and hostnames.

    3. Retrieves the required service ID from RSA Netwitness.

    4. For each entity, searches for the corresponding agent ID in RSA Netwitness
    using the entity identifier.

    5. If found, sends a POST request to isolate the endpoint using the agent ID and
    the provided comment.


    ### Additional Notes

    Requires RSA Netwitness Respond license and endpoint server service running in
    the background.
