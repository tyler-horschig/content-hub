    ### General Description

    Tests connectivity to the RSA NetWitness Platform to ensure the integration is
    configured correctly and can communicate with the external service.


    ### Flow Description

    1. Extracts the integration configuration parameters (Broker API, Concentrator
    API, and Web API credentials and roots).

    2. Initializes the RSA Manager with the provided configuration.

    3. Executes a test connectivity request. Depending on the configuration, this
    involves making a GET request to the broker API (`/sdk`) or a POST request to
    the Web API (`/auth/userpass`) to obtain a token.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
