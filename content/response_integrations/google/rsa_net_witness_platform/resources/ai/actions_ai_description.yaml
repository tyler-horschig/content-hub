Add Note to Incident:
  ai_description: >-
    ### General Description

    Adds a note to a specific incident in RSA Netwitness.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Initializes the RSA Netwitness manager.

    3. Makes a POST request to the RSA Netwitness API to add the specified note and
    author to the incident.

    4. Returns a success message if the note is added successfully, or an error message
    if it fails.


    ### Additional Notes

    Requires RSA Netwitness Respond license, configured Web Username and Web Password
    in the integration configuration.
