    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a test query to the BulkWhoIs API to verify connectivity.
      It does not fetch contextual data for entities, mutate external or internal
      data, update entities, create insights, modify alerts, or create case comments.
