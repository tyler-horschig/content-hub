Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the BulkWhoIs service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the API Key, Secret Key, and Verify SSL settings from the integration
    configuration.

    2. Initializes the BulkWhoIs manager with the provided credentials.

    3. Executes a test query against the BulkWhoIs API using a hardcoded IP address
    (`8.8.8.8`).

    4. Evaluates the response and returns a success message if the connection is established,
    or a failure message if an error occurs.


    ### Additional Notes

    This is a utility action primarily used during the initial setup or troubleshooting
    of the BulkWhoIs integration.
  ai_short_description: >-
    Tests connectivity to the BulkWhoIs service to ensure the integration is configured
    correctly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
