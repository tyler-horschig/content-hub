WhoIs Details:
  ai_description: >-
    ### General Description

    Retrieves WhoIs information for domain, hostname, and IP address entities using
    the BulkWhoIs API. It fetches registration details, country, and city information,
    enriches the entities with this data, and provides the results in JSON and table
    formats.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Filters for URL, external Hostname, and IP Address entities.

    3. Extracts the relevant domain or IP to scan.

    4. Makes a POST request to the BulkWhoIs API (`http://api.bulk-whois-api.com/api/query`)
    to retrieve WhoIs records.

    5. Parses the response and enriches the matching entities with the retrieved WhoIs
    data (e.g., country, city, registrant info).

    6. Updates the entities in the Google SecOps platform and attaches the results
    as JSON and entity tables.


    ### Additional Notes

    Only external hostnames are processed. URLs are parsed to extract the domain before
    querying.
  ai_short_description: >-
    Retrieves WhoIs information for domain, hostname, and IP address entities using
    the BulkWhoIs API and enriches the entities with the retrieved data.
  capabilities:
