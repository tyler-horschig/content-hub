Serialize A File:
  ai_description: >-
    ### General Description

    Serializes a specified local file into a base64-encoded string. This action is
    typically used to read a file from the local file system (up to 5MB in size) and
    convert its contents into a base64 format for further processing, transmission,
    or storage.


    ### Flow Description

    1. Retrieves the provided `File Path` parameter.

    2. Validates that the file exists and is accessible on the local file system.

    3. Checks that the file size does not exceed the maximum allowed limit of 5MB.

    4. Reads the file content in binary mode and encodes it into a base64 string.

    5. Returns the base64 string and the file name as a JSON result.


    ### Additional Notes

    The action operates locally on the environment where the agent or script is running
    and does not interact with external APIs. If the file exceeds 5MB or is inaccessible,
    the action will fail and return an error message.
