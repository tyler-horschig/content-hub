Deserialize A File:
  ai_description: >-
    ### General Description

    Deserializes a base64 encoded string into a file and saves it to the local disk
    of the executing agent.


    ### Flow Description

    1. Extracts the base64 file content and the desired file name from the action
    parameters.

    2. Verifies if the target directory (`/opt/SiemplifyAgent/Files/`) exists on the
    agent, creating it if necessary.

    3. Decodes the base64 string and writes the binary data to the specified file
    path.

    4. Returns the new file path as the action's result value.


    ### Additional Notes

    This action is typically used in conjunction with a previous action that retrieves
    a file and outputs its content as a base64 string. It executes locally on the
    agent where the integration is running and does not interact with external APIs.
  ai_short_description: >-
    Deserializes a base64 encoded string into a file and saves it to the local disk
    of the executing agent.
