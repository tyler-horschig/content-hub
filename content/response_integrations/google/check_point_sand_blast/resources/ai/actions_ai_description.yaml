Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Check Point SandBlast server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the SandBlastManager with the extracted parameters.

    3. Executes a test connectivity query to the Check Point SandBlast API using a
    hardcoded hash.

    4. Returns a success message if the connection is established and the query succeeds,
    otherwise returns an error message.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the Check Point SandBlast server.
  ai_short_description: >-
    Tests connectivity to the Check Point SandBlast server using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
