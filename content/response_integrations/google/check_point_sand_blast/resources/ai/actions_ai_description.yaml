Upload File:
  ai_description: >-
    ### General Description

    Uploads one or more files to Check Point SandBlast for security analysis. The
    action allows users to specify which analysis features to enable, such as Threat
    Emulation, AntiVirus, and Threat Extraction.


    ### Flow Description

    1. Extracts the provided file paths and the boolean flags for the desired analysis
    features (Threat Emulation, AntiVirus, Threat Extraction).

    2. Validates each file path to ensure the file exists and does not exceed the
    maximum allowed size (100MB).

    3. Makes a POST request to the Check Point SandBlast API (`/upload` endpoint)
    for each valid file, submitting the file content along with the selected features.

    4. Retrieves the upload status and raw JSON response from the API for each file.

    5. Aggregates the results and returns the JSON output to the Google SecOps platform.


    ### Additional Notes

    - Multiple files can be uploaded simultaneously by providing a comma-separated
    list of file paths.

    - A maximum of 5 files can be uploaded in a single execution.

    - If no specific features are selected, Threat Emulation is enabled by default.
  ai_short_description: >-
    Uploads specified files to Check Point SandBlast for threat emulation, antivirus
    scanning, and threat extraction analysis.
  capabilities:
    can_create_case_comments: false
