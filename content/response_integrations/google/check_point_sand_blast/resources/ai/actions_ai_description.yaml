Query:
  ai_description: >-
    ### General Description

    Queries Check Point SandBlast to retrieve threat reputation, emulation, and anti-virus
    information for File Hash entities. It evaluates the risk of the hashes and enriches
    the entities with the analysis results.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. Validates the hash type (MD5, SHA1, or SHA256) for each entity.

    3. Makes a POST request to the Check Point SandBlast API (`/query` endpoint) to
    fetch Threat Emulation and Anti-Virus data for the hashes.

    4. Checks the status of the scan. If a scan is still running, the action pauses
    and waits for completion (asynchronous execution).

    5. Once the scan is completed, enriches the entities with the retrieved Threat
    Emulation and Anti-Virus data.

    6. Marks the entity as suspicious if the combined verdict is malicious or if the
    Anti-Virus severity meets or exceeds the configured `Threshold`.

    7. Updates the entities in the platform and attaches the raw JSON results to the
    action.


    ### Additional Notes

    This action runs asynchronously to accommodate long-running scans on the Check
    Point SandBlast server.
  ai_short_description: >-
    Queries Check Point SandBlast to retrieve threat reputation, emulation, and anti-virus
    information for File Hash entities, enriching them and updating their suspicious
    status based on severity thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with threat emulation and anti-virus enrichment data, and marks
      them as suspicious based on verdicts and severity thresholds.
    reasoning: >-
      The action fetches threat intelligence data from Check Point SandBlast via a
      POST request to the `/query` endpoint. It does not mutate external data. It
      mutates internal data by updating entities with enrichment data and marking
      them as suspicious. It also adds JSON results to the action.
