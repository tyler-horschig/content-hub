Archive Finding:
  ai_description: >-
    ### General Description

    Archives a specific finding in AWS IAM Access Analyzer. This action initiates
    a state change on the external AWS service to update the specified finding's status
    to 'ARCHIVED'.


    ### Flow Description

    1. Initializes the AWS IAM Access Analyzer client using the provided AWS credentials
    and region.

    2. Retrieves the analyzer details using the configured Analyzer Name to obtain
    its ARN via the `get_analyzer` API call.

    3. Executes an API call (`update_findings`) to AWS IAM Access Analyzer to change
    the status of the specified Finding ID to 'ARCHIVED'.

    4. Returns a success message if the finding is successfully archived, or an error
    message if the analyzer or finding is not found.


    ### Additional Notes

    Requires valid AWS credentials with permissions to access and update IAM Access
    Analyzer findings.
  ai_short_description: >-
    Archives a specific finding in AWS IAM Access Analyzer by updating its status
    to 'ARCHIVED'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a specific finding to 'ARCHIVED' in AWS IAM Access Analyzer.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST/PUT request (`update_findings`) to AWS IAM Access Analyzer
      to change the status of a finding to 'ARCHIVED', which mutates external data.
      It does not fetch contextual data for enrichment, nor does it mutate internal
      SecOps data, update entities, or create insights.
