Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AWS IAM Access Analyzer service using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters including AWS credentials, region,
    and analyzer name.

    2. Initializes the AWS IAM Access Analyzer manager.

    3. Calls the AWS `get_analyzer` API endpoint to verify connectivity and authentication.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    This is a standard Ping action used solely to verify integration configuration.
