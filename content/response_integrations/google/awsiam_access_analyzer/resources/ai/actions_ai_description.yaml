Scan Resources:
  ai_description: >-
    ### General Description

    Initiates a scan of policies applied to specified AWS resources using AWS IAM
    Access Analyzer. This asynchronous action submits the provided Resource ARNs for
    scanning and periodically checks their status until the scan completes or a timeout
    is reached, returning the analyzed resource details.


    ### Flow Description

    1. Extracts the provided list of Resource ARNs from the action parameters.

    2. Initiates a scan for each resource by calling the AWS IAM Access Analyzer `start_resource_scan`
    API.

    3. Asynchronously polls the AWS API using the `get_analyzed_resource` endpoint
    to check the scan status of each submitted resource.

    4. Compares the resource's `analyzedAt` timestamp against the action's starting
    time to determine if the scan has finished.

    5. Once completed, retrieves and returns the analyzed resource details as a JSON
    result.


    ### Additional Notes

    This is an asynchronous action that will periodically re-execute to check the
    scan status. It will continue to poll until all resources are successfully scanned
    or the maximum number of retries is reached.
  ai_short_description: >-
    Initiates a scan of policies applied to specified AWS resources using AWS IAM
    Access Analyzer and asynchronously retrieves the scan results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new scan of the policies applied to the specified AWS resources
      using AWS IAM Access Analyzer.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by initiating a new scan job on AWS IAM Access
      Analyzer (`start_resource_scan`). It also fetches data by retrieving the analyzed
      resource details (`get_analyzed_resource`). It does not mutate internal SecOps
      data, update entities, create insights, modify alerts, or create case comments.
