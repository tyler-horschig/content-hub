Get ASM Entity Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific Mandiant ASM entities using their
    unique Entity IDs. This action queries the Mandiant ASM API to fetch the raw details
    of the specified entities and returns the aggregated data as JSON results.


    ### Flow Description

    1. Extracts the provided Mandiant ASM Entity IDs from the action parameters.

    2. Initializes the Mandiant ASM API client using the provided integration configuration.

    3. Iterates through the provided Entity IDs and makes a GET request to the Mandiant
    ASM API (`api/v1/entities/{entity_id}/raw` or `api/v3/asm/entities/{entity_id}/raw`)
    to fetch full details for each entity.

    4. Aggregates the successfully retrieved entity details and returns them as JSON
    results to the action output.


    ### Additional Notes

    This action does not operate on Google SecOps entities directly; it requires specific
    Mandiant ASM Entity IDs to be provided as input.
  ai_short_description: >-
    Retrieves detailed information about specific Mandiant ASM entities using their
    unique Entity IDs and returns the data as JSON results.
