Search ASM Entities:
  ai_description: >-
    ### General Description

    Searches for entities in Mandiant ASM based on specified criteria such as entity
    names, tags, and vulnerability or issue counts. This action retrieves matching
    entities from the external system and returns their details as a JSON result for
    further use in the playbook.


    ### Flow Description

    1. Extracts action parameters including entity names, tags, critical/high issue
    flags, and vulnerability/issue count thresholds.

    2. Validates the provided limits and counts to ensure they are positive integers,
    capping the maximum entities to return at 200.

    3. Constructs a search query string based on the provided criteria.

    4. Makes a GET request to the Mandiant ASM API (`/api/v1/search/entities` or `/api/v3/asm/search/entities`)
    to search for matching entities.

    5. Iterates through paginated results until the requested limit is reached or
    no more pages are available.

    6. Returns the retrieved entities as a structured JSON object in the action results.


    ### Additional Notes

    If no specific criteria are provided, the action will default to searching for
    entities seen after the last refresh. The maximum number of entities that can
    be returned is 200, even if a higher limit is specified.
  ai_short_description: >-
    Searches for entities in Mandiant ASM based on specified criteria such as entity
    names, tags, and vulnerability counts, returning the results as JSON.
