Update Issue:
  ai_description: >-
    ### General Description

    Updates the status of a specific issue in Mandiant ASM. This action takes an Issue
    ID and a new status, sends a request to the Mandiant ASM API to update the issue,
    and returns the updated issue details as a JSON result.


    ### Flow Description

    1. Extracts the `Issue ID` and the new `Status` from the action parameters.

    2. Validates that a valid status is selected (not the default 'Select One').

    3. Makes a POST request to the Mandiant ASM API to update the specified issue's
    status.

    4. Makes a GET request to the Mandiant ASM API to retrieve the updated issue details.

    5. Returns the updated issue details as a JSON result attached to the action.


    ### Additional Notes

    Ensure that the provided Issue ID exists in the configured Mandiant ASM project.
