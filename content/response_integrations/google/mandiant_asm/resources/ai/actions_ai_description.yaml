Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Mandiant ASM platform using the parameters provided
    in the integration configuration.


    ### Flow Description

    1. Extracts the integration configuration parameters (e.g., API Root, API Keys,
    Project Name).

    2. Initializes the Mandiant ASM Manager.

    3. Makes an API call (GET request) to the Mandiant ASM projects endpoint to verify
    the credentials and validate the project name.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not process any entities or modify any data. It is strictly used
    to validate the integration's connection settings.
