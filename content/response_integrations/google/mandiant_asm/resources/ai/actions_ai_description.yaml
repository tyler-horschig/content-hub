Search Issues:
  ai_description: >-
    ### General Description

    Searches for issues within Mandiant Attack Surface Management (ASM) that match
    specified criteria such as entity names, issue IDs, tags, severity, and status.
    The action retrieves the matching issues and returns them as a JSON array for
    further use in the playbook.


    ### Flow Description

    1. Extracts action parameters including search criteria (Entity Name, Issue IDs,
    Entity IDs, Tags, Severity, Status) and timeframes.

    2. Calculates the start and end times based on the provided `Time Frame` and `Time
    Parameter`.

    3. Initializes the Mandiant ASM API client.

    4. Executes a paginated search query (GET request) against the Mandiant ASM API
    to retrieve matching issues up to the specified maximum limit.

    5. Returns the retrieved issues as a JSON array in the action results.


    ### Additional Notes

    - The action allows pagination up to a maximum limit of 200 issues. If a higher
    limit is provided, it will automatically be capped at 200.

    - If the `Time Frame` parameter is set to 'Custom', the `Start Time` parameter
    becomes mandatory.
