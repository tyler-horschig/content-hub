Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AlienVault OTX API to ensure that the integration is
    configured correctly and the provided credentials are valid.


    ### Flow Description

    1. Retrieves the API key from the AlienVaultTI integration configuration.

    2. Initializes the AlienVaultTIManager and executes a test connectivity function.

    3. Makes a dummy GET request to the `user/me` endpoint of the AlienVault OTX API.

    4. Returns a success message ("Connection Established.") if the request succeeds,
    or a failure message ("Connection Failed.") if it fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connectivity issues. It does not process any alerts or entities.
  ai_short_description: >-
    Tests connectivity to the AlienVault OTX API to verify integration configuration
    and credentials.
