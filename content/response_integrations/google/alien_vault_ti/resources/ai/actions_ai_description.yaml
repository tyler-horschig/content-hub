Enriches Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, File Hash, URL, and Hostname entities using AlienVault Threat
    Intelligence (OTX). This action retrieves threat intelligence data and updates
    the entities with the findings.


    ### Flow Description

    1. Initializes the AlienVault TI client using the provided integration API key.

    2. Iterates through the target entities in the case.

    3. For external IP addresses, file hashes, URLs, and external hostnames, it makes
    a GET request to the respective AlienVault OTX API endpoint (e.g., `/api/v1/indicators/IPv4/{ip}`).

    4. If threat intelligence data is found, it flattens the JSON response and adds
    it as a table to the entity.

    5. Updates the entity's `additional_properties` with the retrieved data and marks
    the entity as enriched (`is_enriched = True`).

    6. Saves the updated entities back to the platform and returns the raw JSON results.


    ### Additional Notes

    Internal IP addresses and internal hostnames are skipped and will not be enriched
    by this action.
  ai_short_description: >-
    Enriches external IP addresses, file hashes, URLs, and hostnames with threat intelligence
    data from AlienVault OTX, updating the entities with the retrieved information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the AlienVault OTX API via GET requests. It does
      not mutate external data. It updates the entities within Google SecOps with
      the fetched data by calling `siemplify.update_entities`. It does not create
      insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
