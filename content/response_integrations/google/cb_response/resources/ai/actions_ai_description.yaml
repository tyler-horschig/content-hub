Binary Free Query:
  ai_description: >-
    ### General Description

    This action executes a free text query in Carbon Black Response to search for
    and retrieve a list of binaries. It allows analysts to find specific binaries
    based on various attributes like MD5 hashes or filenames without relying on specific
    entity inputs.


    ### Flow Description

    1. Retrieves the search query provided in the action parameters.

    2. Establishes a connection to the Carbon Black Response API.

    3. Executes a GET request to the `/api/v1/binary` endpoint with the specified
    query to fetch matching binaries.

    4. Formats the retrieved binary information into a CSV table and JSON format.

    5. Attaches the formatted results to the action's output.


    ### Additional Notes

    The query parameter must be formatted according to Carbon Black Response search
    syntax (e.g., `md5:* AND original_filename:<file-name>`).
  ai_short_description: >-
    Executes a free text query in Carbon Black Response to search for and list binaries
    matching the specified criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
