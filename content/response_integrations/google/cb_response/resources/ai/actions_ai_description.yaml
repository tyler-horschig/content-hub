Block Hash:
  ai_description: >-
    ### General Description

    Blocks specific file hashes in Carbon Black Response. This action initiates a
    state change on the external system to prevent the execution of the specified
    file hashes across the environment.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to include only `FILEHASH` types where the identifier
    length is exactly 32 characters (MD5).

    3. For each valid entity, makes a POST request to the Carbon Black Response API
    (`/api/v1/banning/blacklist`) to ban the hash.

    4. Collects the results and outputs a summary message indicating which hashes
    were successfully blocked and which failed.


    ### Additional Notes

    - Only MD5 hashes (32 characters in length) are supported by this action.
  ai_short_description: >-
    Blocks specific MD5 file hashes by adding them to the banned blacklist in Carbon
    Black Response, preventing their execution across the environment.
