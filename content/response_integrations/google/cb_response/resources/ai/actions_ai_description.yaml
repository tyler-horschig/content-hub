Enrich Process:
  ai_description: >-
    ### General Description

    Enriches Process entities using VMware Carbon Black Response. The action queries
    the Carbon Black Response API to retrieve detailed execution information about
    processes matching the entity identifier. It also correlates the fetched processes
    with Hostname entities to provide contextual tables.


    ### Flow Description

    1. Filters the target entities to identify `PROCESS` and `HOSTNAME` entities.

    2. Iterates over each `PROCESS` entity and makes a GET request to the Carbon Black
    Response API (`/api/v1/process`) to fetch process details by the process name
    (entity identifier).

    3. If processes are found, updates the entity's `additional_properties` with the
    process data in CSV format and marks the entity as enriched.

    4. Collects the raw JSON results for the fetched processes.

    5. Iterates over `HOSTNAME` entities and correlates the fetched processes to check
    if they executed on the specific host.

    6. If matches are found for a host, adds an entity table to the results containing
    the correlated process details.

    7. Updates the successful entities in the platform and attaches the JSON results
    to the action.


    ### Additional Notes

    This action requires the entity identifier to be a valid process name to successfully
    query Carbon Black Response.
