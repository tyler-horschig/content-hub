Download Binary:
  ai_description: >-
    ### General Description

    Downloads a binary file associated with a specific MD5 file hash from Carbon Black
    Response. The action retrieves the binary content and attaches it directly to
    the corresponding entity within the SecOps platform for further analysis.


    ### Flow Description

    1. Filters the target entities to include only File Hash entities with a length
    of 32 characters (MD5 hashes).

    2. Iterates over the filtered entities.

    3. Makes a GET request to the Carbon Black Response API (`/api/v1/binary/{md5}`)
    to download the binary associated with the MD5 hash.

    4. Extracts the binary content from the downloaded zip file and base64 encodes
    it.

    5. Attaches the base64 encoded binary to the entity in the SecOps platform as
    a `.zip` file.

    6. Updates the entity and returns the base64 encoded content in the JSON results.


    ### Additional Notes

    Ensure that the Carbon Black Response integration is configured with the necessary
    API credentials and permissions to download binaries.
