Kill Process:
  ai_description: >-
    ### General Description

    Kills a specific process on a target host using Carbon Black Response. This action
    utilizes Carbon Black's Live Response feature to remotely terminate processes
    based on the provided Process and Hostname entities.


    ### Flow Description

    1. Filters the target entities to identify `PROCESS` and `HOSTNAME` entity types.

    2. Generates all possible combinations of the identified Hostname and Process
    entities.

    3. For each combination, queries the Carbon Black Response API to retrieve the
    sensor information associated with the Hostname.

    4. If a sensor is found, initiates a Live Response session on that specific sensor.

    5. Executes a `process list` command within the Live Response session to find
    the Process IDs (PIDs) that match the target Process name.

    6. Executes a `kill` command for each identified PID to terminate the process.

