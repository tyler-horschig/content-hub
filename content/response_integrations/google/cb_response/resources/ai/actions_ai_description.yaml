    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Carbon Black Response API to fetch binary
      data based on a query. It does not mutate external data, update internal entities,
      create insights, or modify alert data.
