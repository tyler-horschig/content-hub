    Creates a new watchlist for processes (events) or binaries (modules) in Carbon
    Black Response.


    ### Flow Description

    1. Extracts the watchlist name, query, and type from the action parameters.

    2. Makes a POST request to the Carbon Black Response API to create the watchlist
    with the specified query and type.

