Launch Scan Report:
  ai_description: >-
    ### General Description

    Launches a new scan report in Qualys VM based on the provided template, target
    IPs, and asset groups. This action initiates a report generation job on the Qualys
    platform and returns the resulting Report ID.


    ### Flow Description

    1. Extracts the action parameters including the report title, template name (Report
    Type), output format, target IPs, and asset groups.

    2. Queries the Qualys VM API to resolve the provided asset group names into their
    corresponding Asset Group IDs.

    3. Queries the Qualys VM API to resolve the provided report template name into
    its corresponding Template ID.

    4. Makes a POST request to the Qualys VM API (`/api/3.0/fo/report/` with `action=launch`)
