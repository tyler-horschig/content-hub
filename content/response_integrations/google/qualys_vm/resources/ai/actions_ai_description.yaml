Enrich Host:
  ai_description: >-
    ### General Description

    Enriches host entities (IP Address and Hostname) with detailed information from
    Qualys VM. This action retrieves contextual metadata such as OS, NetBIOS name,
    DNS domain, and tags, updating the entity properties and optionally generating
    an insight.


    ### Flow Description

    1. Initializes the Qualys VM manager and tests connectivity.

    2. Iterates over the target entities, filtering for IP Address and Hostname types.

    3. For each suitable entity, makes an API call to Qualys VM (`/api/2.0/fo/asset/host/`)
    to fetch host details.

    4. If details are found, updates the entity's `additional_properties` with the
    retrieved data and marks it as enriched.

    5. Creates a data table containing the host details.

    6. If the `Create Insight` parameter is enabled, generates an insight with the
    host information.

    7. Updates the entities within the SecOps platform.


    ### Additional Notes

    - The AssetView module is required in Qualys VM for this action to function properly.

    - Supported entities: IP Address, Hostname.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving contextual host details
    from Qualys VM.
