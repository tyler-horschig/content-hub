Launch Compliance Report:
  ai_description: >-
    ### General Description

    Launches a compliance report in Qualys VM based on a specified template, output
    format, and target assets (IPs or Asset Groups). This action initiates a new report
    generation task on the Qualys platform and returns the resulting Report ID for
    further tracking or downloading.


    ### Flow Description

    1. Extracts the provided parameters including Report Title, Report Type (Template
    Name), Output Format, IPs/Ranges, Asset Groups, and Scan Reference.

    2. If Asset Groups are provided, makes a GET request to the Qualys API to resolve
    their corresponding Asset Group IDs.

    3. Makes a GET request to the Qualys API to resolve the Template ID based on the
    provided Report Type (Template Name).

    4. Makes a POST request to the Qualys API to launch the compliance report using
    the resolved IDs and specified parameters.

    5. Returns the generated Report ID to the SecOps platform.


    ### Additional Notes

    Ensure that the provided Report Type matches an existing template name in Qualys
    exactly. For PCI compliance reports, the report title is provided by Qualys and
    cannot be changed.
