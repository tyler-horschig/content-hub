Download Vm Scan Results:
  ai_description: >-
    ### General Description

    Fetches vulnerability scan results from Qualys VM based on a provided Scan ID.
    The action retrieves the raw scan data, generates a PDF report of the scan on
    the Qualys platform, and attaches the results to the case.


    ### Flow Description

    1. Retrieves the `Scan ID` from the action parameters.

    2. Calls the Qualys VM API to fetch the raw VM scan results for the specified
    ID.

    3. Initiates a request to the Qualys API to launch a new scan report (PDF format)
    for the given scan.

    4. Polls the Qualys API to check the status of the report generation, waiting
    until it reaches a finished state or the action's execution deadline is met.

    5. Once completed, downloads the generated PDF report and attaches it to the action's
    results.

    6. Parses the raw scan results and adds them as data tables (Report Summary and
    Scan Results) and JSON output.


    ### Additional Notes

    - The action will time out and fail if the report generation on the Qualys platform
    exceeds the SOAR execution deadline.

    - The Scan ID must be provided in the format: `scan/{integer}.{integer}`.
  ai_short_description: >-
    Fetches vulnerability scan results and generates a PDF report from Qualys VM using
    a specific Scan ID.
