Download Report:
  ai_description: >-
    ### General Description

    Fetches a specific report from Qualys VM using its Report ID. The action checks
    the status of the report and, once finished, downloads the report content and
    attaches it to the case. It also returns the report metadata as JSON results.


    ### Flow Description

    1. Extracts the `Report ID` parameter.

    2. Polls the Qualys VM API (`GET /api/3.0/fo/report/`) to check the status of
    the report.

    3. Once the report is in a finished state, fetches the report content (`GET /api/3.0/fo/report/`
    with `action=fetch`).

    4. Attaches the downloaded report to the case.

    5. Returns the report metadata as JSON results.


    ### Additional Notes

    The action will wait and retry if the report is not yet initiated or created in
    the DB.
  ai_short_description: >-
    Fetches a specific report from Qualys VM by its ID and attaches it to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches report data from the Qualys VM API using a GET request. It
      does not mutate external data, update internal entities, create insights, or
      modify alert data. It only attaches the fetched report to the action results.
