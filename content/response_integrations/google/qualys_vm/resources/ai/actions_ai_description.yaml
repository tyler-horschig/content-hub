Launch VM Scan And Fetch Results:
  ai_description: >-
    ### General Description

    Launches a vulnerability scan on target IP Address entities using Qualys VM and
    fetches the scan results. This action initiates an active scan on the specified
    hosts, waits asynchronously for the scan to complete, and then retrieves the detailed
    vulnerability report and results.


    ### Flow Description

    1. Extracts action parameters including scan title, priority, scan profile, scanner
    appliance, and network.

    2. Filters the target entities to include only IP Addresses.

    3. Adds the target IP addresses to the Qualys platform as assets.

    4. Initiates a vulnerability scan on the specified IP addresses via the Qualys
    API.

    5. Updates the entities with the scan reference ID and marks them as enriched.

    6. Waits asynchronously for the scan to finish.

    7. Once completed, fetches the scan results and generates a scan report.

    8. Attaches the report file, data tables, and JSON results to the case.


    ### Additional Notes

    - This action will automatically add new hosts to Qualys as assets. Please note
    that your license limit for the number of hosts depends on your subscription.

    - The action runs asynchronously and will periodically check the scan status until
    it completes or times out.
