    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and creates insights.
    reasoning: >-
      The action makes a GET request to Qualys VM to fetch host details. It does not
      mutate external data. It updates internal entities with the fetched data and
      optionally creates insights.
