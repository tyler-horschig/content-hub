Close Service Request:
  ai_description: >-
    ### General Description

    Closes a specific service request in SysAid using the provided Service Request
    ID and Solution. This action updates the state of the ticket in the external ITSM
    system to indicate it has been resolved.


    ### Flow Description

    1. Initializes the SysAid manager using the provided integration configurations
    (API Root, Username, Password).

    2. Retrieves the `Service Request ID` and `Solution` from the action parameters.

    3. Makes a PUT request to the SysAid API (`/sr/{sr_id}/close`) to close the specified
    service request and append the provided solution.

    4. Returns a success message upon successful closure of the service request.


    ### Additional Notes

    Ensure that the provided Service Request ID exists in SysAid and that the user
    account configured in the integration has the necessary permissions to close service
    requests.
  ai_short_description: >-
    Closes a specific service request in SysAid with a provided solution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Closes a service request in the external SysAid ITSM system by sending a PUT
      request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the SysAid API to close a service request,
      which mutates data in an external system. It does not fetch contextual data,
      mutate internal SecOps data, update entities, or create insights.
