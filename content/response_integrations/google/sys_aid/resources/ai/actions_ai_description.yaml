    configuration.

    2. Retrieves filtering parameters provided by the user (e.g., Service Request
    Type, Status, Priority).

    3. Makes a GET request to the SysAid API (`/sr` endpoint) to fetch service requests
    that match the specified criteria.

    4. Formats the retrieved service requests into a flat structure.

    5. Creates a CSV data table named "SysAid - Service Requests" containing the results.

    6. Returns the service requests as a JSON result and completes the action.


    ### Additional Notes

