    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only initializes a connection to the Zabbix API using the provided
      configuration credentials. It does not fetch contextual data, mutate external
      or internal data, update entities, create insights, modify alert data, or create
