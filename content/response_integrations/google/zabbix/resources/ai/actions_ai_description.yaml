Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity to the Zabbix instance to ensure that the integration
    is configured correctly and can communicate with the Zabbix server.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the `ZabbixManager` to establish a session with the Zabbix API.

    3. If the connection is successful, the action completes and returns a success
    message.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Zabbix integration to verify network connectivity and credential validity.
  ai_short_description: >-
    Tests connectivity to the Zabbix instance to ensure the integration is configured
    correctly.
