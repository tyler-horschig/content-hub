Execute Script:
  ai_description: >-
    ### General Description

    Executes a specified script on remote hosts managed by Zabbix using their IP addresses.


    ### Flow Description

    1. Retrieves the script details from Zabbix using the provided script name.

    2. Iterates through the target entities, filtering for IP Address entities.

    3. Queries Zabbix to find hosts associated with each IP address via the Zabbix
    API.

    4. Executes the script on the identified hosts via the Zabbix API.

    5. Collects the execution results and outputs them as JSON.


    ### Additional Notes

    The action will fail for entities where no corresponding host is found in Zabbix.
  ai_short_description: >-
    Executes a specified script on remote hosts managed by Zabbix based on IP address
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a specified script on remote hosts associated with the IP address entities
      via Zabbix.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to Zabbix to execute a script on a remote host,
      which mutates external data. It does not fetch enrichment data to attach to
      entities, nor does it update internal entities, create insights, or modify alert
      data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters using `entity.entity_type
      == EntityTypes.ADDRESS`. This means it targets ADDRESS entities, filtering strictly
      by entity_type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
