Add URL to Policy Block List:
  ai_description: >-
    ### General Description

    Adds URL or Hostname entities to a specified policy block list in iBoss. This
    action initiates a state change on the external iBoss system to prevent network
    traffic to the specified URLs or domains.


    ### Flow Description

    1. Validates if the provided `Category ID` corresponds to a valid block list in
    iBoss via an API GET request.

    2. Iterates through the target entities, filtering for `URL` and `HOSTNAME` entity
    types.

    3. Optionally strips the scheme (e.g., `http://`, `https://`) from the URL if
    the `Strip Scheme` parameter is enabled.

    4. Makes an API PUT request to the iBoss `/json/controls/policyLayers/urls` endpoint
    to add the URL or Hostname to the specified policy block list.

    5. Updates the entity's additional properties with a `policy_blocked` flag and
    marks the entity as enriched.

    6. Saves the updated entities back to the case.


    ### Additional Notes

    - The action will fail if the provided `Category ID` is not associated with a
    Block list.

    - If only `Start Port` or `End Port` is specified, the provided value will be
    applied to both port parameters in the iBoss configuration.
  ai_short_description: >-
    Adds URL or Hostname entities to a specified policy block list in iBoss.
