Remove IP from Policy Block List:
  ai_description: >-
    ### General Description

    Removes specific IP Address entities from a designated policy block list in iBoss.
    This action modifies the external security controls to restore network connectivity
    or execution rights for the targeted IPs by deleting them from the specified category.


    ### Flow Description

    1. Validates if the provided `Category ID` corresponds to a valid block list in
    iBoss via an API GET request.

    2. Iterates through all target entities of type `ADDRESS`.

    3. Sends an API DELETE request to the iBoss platform to remove each IP address
    from the specified policy block list, optionally using the provided start and
    end ports.

    4. Updates the internal entity's additional properties to reflect that it is no
    longer blocked (`policy_blocked: False`) and marks the entity as enriched.

    5. Saves the updated entities back to the Google SecOps platform.


    ### Additional Notes

    The action requires the Category ID of the block list. Start and End ports can
    optionally be specified if the IP was originally blocked with specific port constraints
    (this is an iBoss limitation).
