Add IP to Policy Block List:
  ai_description: >-
    ### General Description

    Adds an IP address to a specified policy block list category in iBoss. This action
    initiates a state change on the external device to prevent network traffic to
    or from the specified entity.


    ### Flow Description

    1. Validates if the provided Category ID corresponds to a block list in iBoss
    via an API call.

    2. Iterates over target entities of type IP Address.

    3. Makes a PUT request to the iBoss API to add the IP address to the block list
    with the specified priority, direction, and ports.

    4. Updates the entity's additional properties to indicate it was blocked and marks
    it as enriched.

    5. Saves the updated entities back to the platform.


    ### Additional Notes

    If the category ID is not associated with a block list, the action will fail.
  ai_short_description: >-
    Adds an IP address to a specified policy block list category in iBoss to prevent
    network traffic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds the IP address to the specified policy block list category in iBoss.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to iBoss to add an IP address to a block list,
      mutating external data. It updates the internal entities with a block flag but
      does not fetch contextual enrichment data or create insights.
