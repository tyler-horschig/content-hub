Get URL Reputation:
  ai_description: >-
    ### General Description

    Enriches URL entities by retrieving their safety reputation and risk score from
    APIVoid. This action helps analysts quickly identify malicious or risky URLs by
    leveraging APIVoid's threat intelligence.


    ### Flow Description

    1. Iterates through the target URL entities provided in the case.

    2. Validates the URL format and prepends `http://` if the schema is missing.

    3. Makes a POST request to the APIVoid API (`/urlrep/v1/pay-as-you-go/`) to fetch
    the reputation and risk score for each URL.

    4. Enriches the entity's additional properties with the retrieved reputation data.

    5. If a blacklist report is found, attaches it as a data table to the case wall.

    6. Evaluates the URL's risk score against the provided `Threshold` parameter;
    if the score is higher, the entity is marked as suspicious.

    7. Updates the enriched entities within the Google SecOps platform.


