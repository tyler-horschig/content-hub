Get domain reputation:
  ai_description: >-
    ### General Description

    Retrieves domain reputation data from APIVoid to check if a domain is blacklisted
    by popular and trusted domain blacklist services. It enriches the target entities
    with the retrieved threat intelligence and evaluates their risk based on a specified
    threshold.


    ### Flow Description

    1. Iterates over the target entities, filtering specifically for Hostname and
    URL entity types.

    2. Extracts the domain from the entity identifier.

    3. Makes a GET request to the APIVoid `/domainbl/v1/pay-as-you-go/` endpoint to
    fetch the domain's reputation and blacklist report.

    4. If the number of blacklist detections exceeds the provided `Threshold`, the
    entity is marked as suspicious.

    5. Enriches the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    6. If the `Create Insights` parameter is enabled and a country code is found,
    generates an insight for the entity.

    7. Attaches the blacklist report as an entity table and saves the raw JSON result.

    8. Updates the entities within the Google SecOps platform.


    ### Additional Notes

    - This action only processes Hostname and URL entities; all other entity types
    are ignored.

    - The threshold parameter must be a numeric value.
