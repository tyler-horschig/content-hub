Get Screenshot:
  ai_description: >-
    ### General Description

    Captures a high-quality screenshot of a specified URL entity using the APIVoid
    service. The captured screenshot is then attached to the case for analyst review,
    providing visual context of the target webpage.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type URL.

    3. Validates the URL format, prepending `http://` if the schema is missing.

    4. Makes a POST request to the APIVoid screenshot API endpoint to capture the
    webpage image.

    5. Verifies that the resulting screenshot file size is under the 3MB limit.

    6. Attaches the base64-encoded screenshot to the entity within the SecOps platform.

    7. Updates the entity and appends the file's MD5 hash to the JSON results.


    ### Additional Notes

    - Screenshots larger than 3MB are skipped and will not be attached to the case.

    - The action extracts a `Threshold` parameter, but it is not utilized in the underlying
    logic.
