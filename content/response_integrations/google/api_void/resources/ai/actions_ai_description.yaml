Get Ip Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using APIVoid to detect potentially malicious IPs
    commonly used for spam, attacking websites, or fraudulent activities. This action
    retrieves threat intelligence and reputation scores, evaluates risk based on a
    threshold, and updates the entity accordingly.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only external IP addresses (`ADDRESS` entity
    type).

    3. Makes a POST request to the APIVoid `/iprep/v1/pay-as-you-go/` endpoint to
    fetch reputation data for each IP.

    4. If the `Create Insights` parameter is enabled and a country code is found,
    generates an insight for the entity.

    5. Updates the entity's additional properties with the retrieved enrichment data.

    6. If a blacklist report is available, attaches it as an entity table.

    7. Compares the number of detections against the provided `Threshold`; if it exceeds
    the threshold, marks the entity as suspicious.

    8. Updates the entities in the Google SecOps platform and returns the raw data
    as a JSON result.


    ### Additional Notes

    Internal IP addresses are automatically skipped and will not be processed by this
    action.
  ai_short_description: >-
    Enriches external IP Address entities by retrieving reputation data from APIVoid,
    updating entity properties, and optionally creating insights and marking them
    as suspicious based on a detection threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to APIVoid to fetch IP reputation data (fetches_data=true).
      It does not mutate external data. It updates internal entities (can_update_entities=true)
      and creates insights (can_create_insight=true).
