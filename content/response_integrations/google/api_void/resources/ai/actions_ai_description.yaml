    suspicious domain, should block, score, MX records, SPF records).

    5. Evaluates the email's risk score against the provided `Threshold` parameter;
    if the score is higher, the entity is marked as suspicious.

    6. Updates the entities within Google SecOps and attaches a data table and JSON
    results containing the raw API response.


    ### Additional Notes

    - Only processes `USER` entities that are formatted as valid email addresses.
    Other entity types or improperly formatted identifiers are skipped.
