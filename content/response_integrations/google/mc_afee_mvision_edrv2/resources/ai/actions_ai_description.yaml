Create Investigation:
  ai_description: >-
    ### General Description

    Creates a new investigation in McAfee MVISION EDR for specific IP address and
    hostname entities. This action initiates a state change on the external EDR platform
    by generating a new investigation record or linking evidence to an existing one
    based on the provided parameters.


    ### Flow Description

    1. Iterates through the target entities associated with the case.

    2. Filters the entities to process only those of type IP Address (`ADDRESS`) and
    Hostname (`HOSTNAME`).

    3. For each valid entity, makes a POST request to the McAfee MVISION EDR API (`/edr/v2/investigations`)
    to create a new investigation, applying the specified case type, priority, name,
    and hint.

    4. Collects the resulting investigation details (such as ID, status, and creation
    time).

    5. Returns the investigation details as JSON results and attaches a summary data
    table to the action results.


    ### Additional Notes

    - If the `Hint` parameter is provided, the action automatically pauses for 10
    seconds between entity processing to avoid HTTP 429 rate-limit errors when adding
    evidence to an already existing investigation.
  ai_short_description: >-
    Creates a new investigation in McAfee MVISION EDR for IP address and hostname
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new investigation record in the McAfee MVISION EDR platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee MVISION EDR API to create a new
      investigation, which mutates external data. It does not fetch contextual data
      for enrichment, nor does it mutate internal SecOps data, update entities, create
      insights, or add case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly checks `if
      entity.entity_type == EntityTypes.ADDRESS` and `elif entity.entity_type == EntityTypes.HOSTNAME`.
      Therefore, it targets Address and Hostname entities and filters them by their
      entity type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action creates an investigation in an EDR platform. While it generates a
      new record, it does not strictly fit the 'Create Ticket' category which is defined
      for ITSM systems (like Jira or ServiceNow). It does not enrich data, block IOCs,
      contain hosts, or perform any of the other specific outcome categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Case Type | Dropdown | Yes | Defines the type of alert. Recognized values are
    Malware, Network, and IOC. |

    | Priority | Dropdown | Yes | Assigns a priority to the investigation (e.g., High,
    Medium, Low). |

    | Hint | String | No | Automatically links related investigations and avoids creating
    many cases from multiple alerts related to the same incident. If the same hint
    is used, the evidences will be added to the already existing investigation. |

    | Name | String | No | Gives the investigation a meaningful name. If the name
    is missing, a default case name is assigned. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee Mvision EDR V2 API to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Extracts the integration configuration parameters (e.g., API Root, Client ID,
    Client Secret).

    2. Initializes the connection manager.

    3. Attempts to authenticate by making a GET request to the IAM endpoint (`/iam/v1.0/token`)
    to retrieve an access token.

    4. Returns a success message if the connection and authentication are successful,
    or an error message if they fail.


    ### Additional Notes

    This action is typically used to verify credentials and network access during
    the initial setup of the integration.
  ai_short_description: >-
    Tests connectivity to the McAfee Mvision EDR V2 API by attempting to authenticate
    and retrieve an access token.
