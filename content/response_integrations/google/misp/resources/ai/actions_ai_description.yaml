    \ If both \u201CAttribute Name\u201C and \u201CAttribute UUID\u201C are specified,\
    \ action will work with \u201CAttribute UUID\u201C values. |\n| Event ID | String\
    \ | No | Specify the ID or UUID of the event, where to seach for attributes. This\
