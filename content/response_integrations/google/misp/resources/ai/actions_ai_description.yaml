Add Tag to an Event:
  ai_description: >-
    ### General Description

    Adds specified tags to an existing event in MISP. This action allows analysts
    to categorize or label MISP events directly from the SOAR platform.


    ### Flow Description

    1. Retrieves the `Event ID` and `Tag Name` from the action parameters.

    2. Makes a GET request to the MISP API to verify the specified event exists.

    3. Makes a GET request to fetch all available tags in MISP to validate the provided
    tag names.

    4. Iterates through the validated tags and makes a POST request to the MISP API
    (`/events/addTag/`) to attach each tag to the specified event.

    5. Returns a JSON result containing the API responses and outputs a summary message
    detailing which tags were successfully added and which were not found.


    ### Additional Notes

    Tags that do not already exist in the MISP instance will be skipped and reported
    as not found in the output message. The action supports both standard IDs and
    UUIDs for the event identifier.
