    URL entity. |
Add Sighting to an Attribute:
  ai_description: >-
    ### General Description

    Adds a sighting to specific attributes in MISP. This action allows users to record
    a sighting (e.g., Sighting, False Positive, Expiration) for attributes based on
    various search criteria such as Event ID, Object UUID, Attribute UUID, or Attribute
    Name.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the provided parameters (e.g., ensuring `Event ID` is provided if
    `Attribute Search` is set to 'Provided Event').

    3. Fetches the relevant attributes from MISP based on the provided criteria (Event
    ID, Object UUID, Attribute UUIDs, Attribute Names, Categories, Types).

    4. Iterates over the retrieved attributes and makes a POST request to the MISP
    API to add a sighting to each attribute.

    5. Returns the JSON results of the added sightings and outputs a summary message.


    ### Additional Notes

    - If both "Attribute Name" and "Attribute UUID" are specified, the action will
    prioritize "Attribute UUID" values.

    - The "Event ID" parameter is required if "Attribute Search" is set to "Provided
    Event" or if "Object UUID" is provided.
