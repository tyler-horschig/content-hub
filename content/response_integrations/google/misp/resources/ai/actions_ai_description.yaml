Add Attribute:
  ai_description: >-
    ### General Description

    Adds attributes based on target entities to a specified event in MISP. This action
    maps supported SecOps entities to their corresponding MISP attribute types and
    appends them to the target MISP event.


    ### Flow Description

    1. Extracts action parameters including the target Event ID, Category, Distribution,
    and Fallback types.

    2. Filters the target entities to include only supported types (Hostname, URL,
    FileHash, Address, User, FileName, EmailMessage, ThreatCampaign, ThreatActor,
    PhoneNumber).

    3. Determines the appropriate MISP attribute type for each entity, utilizing alert
    relations for IP and Email fallbacks if necessary.

    4. Makes a POST request to the MISP API (`/attributes/add/{event_id}`) to add
    each entity as an attribute to the specified event.

    5. Returns the added attributes as JSON results and provides a summary message
    of successful and failed entities.


    ### Additional Notes

    Supported hashes include MD5, SHA1, SHA224, SHA256, SHA384, SHA512, and SSDeep.
  ai_short_description: >-
    Adds attributes based on target entities to a specified event in MISP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds new attributes to an existing event in the MISP platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the MISP API to add attributes to an event,
      which mutates external data. It does not fetch data for enrichment, nor does
      it mutate internal SecOps data, update entities, or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: true
      event: false
      file_hash: true
      file_name: true
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: true
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: true
      threat_campaign: true
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The script iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUITABLE_ENTITY_TYPES`. The suitable types are HOSTNAME,
      URL, FILEHASH, ADDRESS, USER, FILENAME, EMAILMESSAGE, THREATCAMPAIGN, THREATACTOR,
      and PHONENUMBER. It does not filter by identifier, timestamps, or other properties.
