Get Event Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific events from MISP using their IDs
    or UUIDs. This action allows analysts to pull full event context, including raw
    data and associated attributes, directly into the case wall for review.


    ### Flow Description

    1. Parses the provided comma-separated list of Event IDs.

    2. Iterates through each Event ID and makes an API call (`get_event_by_id`) to
    MISP to fetch the event details.

    3. Extracts the raw data and attributes for each successfully retrieved event.

    4. Creates case wall data tables for the event details and, if configured, the
    event attributes.

    5. Returns the aggregated event data as a JSON result.


    ### Additional Notes

    If multiple Event IDs are provided and one fails to be retrieved, the action will
    log the error and continue processing the remaining IDs. The final output message
    will indicate which events succeeded and which failed.
