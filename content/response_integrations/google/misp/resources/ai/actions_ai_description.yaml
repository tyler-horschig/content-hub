Upload File:
  ai_description: >-
    ### General Description

    Uploads one or more local files as samples to a specified MISP event. This action
    allows analysts to attach artifacts or malware samples directly to an existing
    threat intelligence event in MISP.


    ### Flow Description

    1. Extracts the target Event ID, file paths, category, distribution level, IDS
    flag, and comment from the action parameters.

    2. Validates the provided distribution level and verifies that the specified file
    paths exist locally on the execution environment.

    3. Queries the MISP API to ensure the target event exists.

    4. Iterates through the provided file paths, reads the file content, base64 encodes
    it, and uploads each file to the MISP event via a POST request.

    5. Retrieves the updated event details from MISP and attaches them to the action's
    JSON result.


    ### Additional Notes

    The files specified in the 'File Path' parameter must be accessible locally on
    the environment where the integration script is executed.
  ai_short_description: >-
    Uploads one or more local files as samples to a specified MISP event.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file sample to a specific MISP event.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the MISP API to upload file samples to a
      specific event, mutating external data. It also fetches the updated event details
      to return as a JSON result. It does not mutate internal SOAR data, update entities,
      or create insights.
