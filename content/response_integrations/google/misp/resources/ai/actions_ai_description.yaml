Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (URL, Hostname, FileHash, Address, Domain, User) by retrieving
    associated attributes and event data from MISP.


    ### Flow Description

    1. Initializes the MISP API client.

    2. Iterates through the supported target entities.

    3. Queries MISP for attributes matching the entity's identifier and specified
    categories via the `search_attributes` API endpoint.

    4. Sorts the retrieved attributes by timestamp and selects the primary attribute
    based on the "Filtering condition" parameter (First or Last).

    5. Retrieves the full event details associated with the primary attribute from
    MISP.

    6. Enriches the entity's additional properties with the event and attribute data.

    7. Generates an insight for the entity if the attribute contains a comment and
    the "Create Insights" parameter is enabled.

    8. Adds a case wall table containing the attribute details.

    9. Evaluates the event's threat level against the "Threat Level Threshold" parameter;
    if the threshold is met or exceeded, marks the entity as suspicious.

    10. Updates the entities in the SecOps platform and attaches the raw JSON results.


    ### Additional Notes

    The action supports filtering attributes by category (configured at the integration
    level) and limits the number of attributes returned in the JSON result.
