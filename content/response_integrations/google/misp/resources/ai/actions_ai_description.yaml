  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Event ID | String | Yes | Specify the ID or UUID of the event to which you want
    to upload this file. |

    | File Path | String | Yes | Specify a comma-separated list of absolute filepaths
    of the files that you want to upload to MISP. |

    | Category | String | No | Specify the category for the uploaded file. Possible
    values: External Analysis, Payload Delivery, Artifacts Dropped, Payload Installation.
    |

    | Distribution | String | No | Specify the distribution for the uploaded file.
    Possible values: 0 - Organisation, 1 - Community, 2 - Connected, 3 - All. You
    can either provide a number or a string. |

    | For Intrusion Detection System | Boolean | Yes | If enabled, uploaded file will
    be used for intrusion detection systems. |

    | Comment | String | No | Specify additional comments related to the uploaded
    file. |
