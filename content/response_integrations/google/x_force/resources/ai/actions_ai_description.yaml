Get Hash Info:
  ai_description: >-
    ### General Description

    Queries IBM X-Force to retrieve threat intelligence and malware reports for file
    hash entities. This action enriches the entities with risk scores and malware
    family information, and can mark them as suspicious based on a configurable risk
    threshold.


    ### Flow Description

    1. Iterates through all target entities, filtering for those of type `FILEHASH`.

    2. For each file hash, makes a GET request to the IBM X-Force API (`/malware/{file_hash}`)
    to fetch the malware report.

    3. Extracts the risk score, malware families, and creation date from the report.

    4. Enriches the entity's additional properties with the extracted risk score and
    families.

    5. Compares the retrieved risk score against the provided `Threshold` parameter.

    6. If the risk score is strictly greater than the threshold, marks the entity
    as suspicious and creates an insight.

    7. Updates the enriched entities in the SecOps platform.

    8. Attaches the raw JSON results and a summary CSV table to the action's output.


    ### Additional Notes

    - The `Threshold` parameter accepts values of "low", "medium", or "high". It maps
    to integer values (low=1, medium=2, high=3) for comparison against the X-Force
    risk score.
  ai_short_description: >-
    Queries IBM X-Force to retrieve threat intelligence and malware reports for file
    hash entities, enriching them with risk scores and malware family data, and optionally
    marking them as suspicious based on a risk threshold.
