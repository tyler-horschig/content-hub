Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information from Attivo. This
    action retrieves detailed endpoint information, including threat paths, vulnerabilities,
    and credential data. It updates the entity's properties, marks it as enriched,
    and optionally generates an insight with the retrieved analysis results.


    ### Flow Description

    1. Iterates over the target entities, filtering for Hostname and IP Address types.

    2. Makes an API call to Attivo (`get_entity_info`) to fetch endpoint details for
    each entity.

    3. If configured, makes additional API calls to retrieve threat paths (`get_threatpaths`),
    vulnerabilities (`get_vulnerabilities`), and credentials (`get_credentials`).

    4. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Optionally creates an insight containing the retrieved information.

    6. Attaches the results as entity tables and JSON results to the action.


    ### Additional Notes

    The action requires valid Attivo credentials and API root configuration.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with endpoint details, threat paths,
    vulnerabilities, and credential information from Attivo.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Attivo API (get_entity_info, get_threatpaths,
      get_vulnerabilities, get_credentials). It does not mutate external data. It
      updates internal entities via `siemplify.update_entities` and creates insights
      via `siemplify.add_entity_insight`.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
