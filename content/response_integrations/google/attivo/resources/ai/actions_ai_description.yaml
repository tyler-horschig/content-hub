List Critical ThreatPath:
  ai_description: >-
    ### General Description

    Retrieves a list of available critical ThreatPaths from Attivo. This action queries
    the Attivo platform for critical threat paths and allows users to filter the results
    based on specific criteria such as rule name, service, severity, description,
    or category.


    ### Flow Description

    1. Initializes the Attivo manager using the provided integration credentials.

    2. Makes an API call to Attivo (`/api/threatpath/getallcriticalpaths`) to fetch
    all critical ThreatPaths.

    3. Evaluates the provided filtering parameters (`Filter Key`, `Filter Logic`,
    and `Filter Value`).

    4. If filtering is specified, iterates through the retrieved ThreatPaths and applies
    the logic (exact match or substring match) to the selected key.

    5. Truncates the results to the maximum number of records specified in `Max Records
    To Return`.

    6. Attaches the final list of ThreatPaths to the action result as a JSON object
    and a formatted data table.


    ### Additional Notes

    This action does not operate on specific SOAR entities. It performs a global query
    against the Attivo instance to retrieve threat path information.
  ai_short_description: >-
    Retrieves a list of available critical ThreatPaths from Attivo based on specified
    filtering criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from an external system (Attivo) by calling `manager.get_critical_threatpaths()`.
      It does not perform any state-changing operations on the external system (no
      external mutation). It also does not mutate internal case data, update entities,
      create insights, modify alert data, or create case comments. It only returns
      the fetched data as a JSON result and a data table.
  entity_usage:
