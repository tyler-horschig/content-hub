    ### General Description

    Tests connectivity to the Attivo server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Initializes the AttivoManager with the provided API Root, Username, Password,
    and Verify SSL parameters.

    2. Calls the `test_connectivity` method which sends a POST request to the `/api/eventsquery/alerts`
    endpoint to verify access.

    3. Validates the response to ensure successful authentication and connectivity.


