Get Report:
  ai_description: >-
    ### General Description

    Retrieves and downloads a specific report from ArcSight based on its URI and optional
    dynamic parameters. The action fetches the report content and attaches it to the
    case, additionally parsing CSV reports into data tables and JSON results.


    ### Flow Description

    1. Connects to the ArcSight API using the provided credentials.

    2. Retrieves the report information using the provided `Report Full Path (URI)`.

    3. Generates a download token for the report, applying any provided dynamic parameters
    (Field 2 to Field 10).

    4. Downloads the report content from ArcSight.

    5. If the report is in CSV format, parses it into a JSON result and adds it as
    a data table to the action output.

    6. Attaches the downloaded report file to the action results.


    ### Additional Notes

    The dynamic parameters (Field 2 to Field 10) should be provided in a `key=value`
    format to be correctly parsed and applied to the report generation query.
  ai_short_description: >-
    Retrieves and downloads a specific report from ArcSight based on its URI, attaching
    the file to the action results.
