Is Value In Activelist Column:
  ai_description: >-
    ### General Description

    Checks if the target entities exist within a specified column of an ArcSight Active
    List.


    ### Flow Description

    1. Connects to the ArcSight API using the provided credentials.

    2. Retrieves the Active List UUID if only the Active List name is provided.

    3. Fetches the entries of the specified Active List.

    4. Validates that the provided column name exists in the Active List.

    5. Iterates through all target entities and checks if their original identifier
    matches any value in the specified column.

    6. If a match is found, enriches the entity by setting the `IsInActivelist` property
    to true in its additional properties.

    7. Updates the successful entities in the SecOps platform and returns the matching
    Active List rows as JSON results.


    ### Additional Notes

    Either 'Active list UUID' or 'Active list name' must be provided. The UUID takes
    precedence if both are supplied.
