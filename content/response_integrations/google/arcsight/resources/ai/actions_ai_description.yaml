Add Entities To Active List:
  ai_description: >-
    ### General Description

    Adds entities to a specified active list in ArcSight.


    ### Flow Description

    1. Extracts the action parameters including the active list name, entity column,
    and additional fields.

    2. Iterates over the target entities to prepare the entries payload.

    3. Authenticates with the ArcSight API.

    4. Retrieves the UUID of the specified active list.

    5. Adds the prepared entries to the active list via the ArcSight API.

    6. Logs out of the ArcSight API.


    ### Additional Notes

    The action processes all target entities without filtering by entity type. It
    uses the entity's original identifier as the value to be added to the specified
    column.
  ai_short_description: >-
    Adds entities to a specified active list in ArcSight.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entries to a specified active list in ArcSight.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the ArcSight API to add entries to an active
      list, which mutates external data. It does not fetch data for enrichment, nor
      does it update internal entities, alerts, or insights.
