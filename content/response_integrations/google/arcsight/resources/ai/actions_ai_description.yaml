List Resources:
  ai_description: >-
    ### General Description

    Retrieves a list of available resources from ArcSight, including queries, active
    lists, cases, and reports. This action allows users to discover what resources
    are configured and available within the ArcSight environment.


    ### Flow Description

    1. Establishes a connection to the ArcSight API using the provided integration
    credentials.

    2. Evaluates the action parameters to determine which specific resource types
    to retrieve.

    3. If `Return Queries` is enabled, fetches available queries using the `qvs.findAllIds`
    and `qvs.getResourcesByIds` API endpoints.

    4. If `Return Active Lists` is enabled, fetches available active lists using the
    `act.findAllIds` and `act.getResourcesByIds` API endpoints.

    5. If `Return Cases` is enabled, fetches available cases using the `cas.findAllIds`
    and `cas.getResourcesByIds` API endpoints.

    6. If `Return Reports` is enabled, fetches available reports using the `rep.findAllIds`
    and `rep.getResourcesByIds` API endpoints.

    7. Aggregates the retrieved resources, returns them as a JSON object, and attaches
    them as data tables to the action result.


    ### Additional Notes

    At least one of the 'Return ...' parameters must be enabled for the action to
    execute successfully. The number of resources returned per type can be limited
    using the `Max Resources To Return` parameter.
