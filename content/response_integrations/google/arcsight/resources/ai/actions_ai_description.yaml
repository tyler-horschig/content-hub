    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches report data from ArcSight via HTTP requests. It does not
      mutate external data (only reads/downloads). It does not mutate internal data,
      update entities, create insights, modify alert data, or create case comments.
