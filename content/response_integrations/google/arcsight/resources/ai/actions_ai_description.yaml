Add Entries To Activelist:
  ai_description: >-
    ### General Description

    Adds new entries to a specified active list in ArcSight. This action allows users
    to append data to an active list by providing either a delimited string of columns
    and entries or a structured JSON array.


    ### Flow Description

    1. Extracts action parameters including the active list identifier (UUID or name)
    and the entries to add.

    2. Validates that the required combinations of parameters are provided (either
    UUID or name, and either JSON or Columns+Entries).

    3. Parses the provided entries into a structured format suitable for the ArcSight
    API.

    4. Authenticates to the ArcSight API.

    5. If an active list name is provided instead of a UUID, makes an API call to
    fetch the corresponding UUID.

    6. Makes a POST request to the ArcSight API (`www/manager-service/rest/ActiveListService/addEntries`)
    to add the parsed entries to the active list.

    7. Logs out of the ArcSight API and returns the execution status.


    ### Additional Notes

    The action supports adding entries via a delimited string (using 'Columns' and
    'Entries' parameters) or a JSON array (using the 'Entries JSON' parameter). The
    combination of 'Columns' and 'Entries' takes precedence over 'Entries JSON'.
  ai_short_description: >-
    Adds new entries to a specified active list in ArcSight.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds new entries to a specified active list in ArcSight.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the ArcSight API to add entries to an active
      list, which mutates external data. It does not fetch contextual data for enrichment,
      nor does it mutate internal SecOps data, update entities, or create insights.
