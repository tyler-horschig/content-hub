Search:
  ai_description: >-
    ### General Description

    Searches for available resources within ArcSight based on a provided search query.
    This action interacts with the ArcSight Manager Search Service to find matching
    resources and returns the results as both a JSON object and a formatted CSV table.


    ### Flow Description

    1. Extracts the `Search Query` and `Max Items To Return` parameters from the action
    configuration.

    2. Initializes the `ArcsightManager` and authenticates with the ArcSight server.

    3. Executes the search by making a POST request to the `ManagerSearchService/search1`
    API endpoint with the provided query and limit.

    4. Parses the returned search hits into a structured format.

    5. Attaches the results to the case as a CSV table and a JSON object.

    6. Logs out of the ArcSight server to close the session.


    ### Additional Notes

    This action is designed to search for ArcSight Manager resources (such as active
    lists, reports, or cases) rather than raw security events or telemetry data.
