Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Arcsight server to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    etc.).

    2. Initializes the ArcsightManager.

    3. Makes an API call to log in to the Arcsight server (`www/core-service/rest/LoginService/login`).

    4. If the login is successful, makes an API call to log out (`www/core-service/rest/LoginService/logout`).

    5. Returns a success or failure message based on the execution result.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies solely
    on the integration configuration.
