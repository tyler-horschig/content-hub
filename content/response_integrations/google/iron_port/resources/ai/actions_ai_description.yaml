Get All Recipients By Sender:
  ai_description: >-
    ### General Description

    Retrieves a list of recipients who received emails from a specified sender using
    Cisco IronPort. This action searches the message tracking logs within a given
    timeframe and extracts the recipient addresses associated with the specified sender.


    ### Flow Description

    1. Initializes the IronPort API client using the provided integration configuration.

    2. Calculates the search time frame based on the `Search Emails for Last X` and
    `Set Search Email Period in` parameters.

    3. Makes a GET request to the IronPort API (`message-tracking/messages`) to fetch
    messages matching the specified sender.

    4. Iterates through the retrieved messages and extracts the recipient email addresses.

    5. Handles pagination and limits the number of returned recipients based on the
    `Max Recipients to Return` and `Page Size` parameters. If the action approaches
    a timeout, it pauses and resumes in the next asynchronous iteration.

    6. Returns the unique list of recipients as a JSON result.


    ### Additional Notes

    - For this action to work, message tracking must be enabled in IronPort, along
    with the AsyncOS API.

    - The action runs asynchronously to handle large volumes of emails without timing
    out.
  ai_short_description: >-
    Retrieves a list of recipients who received emails from a specified sender by
    searching message tracking logs in Cisco IronPort.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
