Get Report:
  ai_description: >-
    ### General Description

    Fetches specific IronPort report information (such as mail users detail, incoming/outgoing
    IP, and hostname details) and enriches associated entities. The action dynamically
    targets User, Address, or Hostname entities depending on the selected report type,
    or returns general report data if no entities are applicable.


    ### Flow Description

    1. Extracts the action parameters including the Report Type, timeframe (days backwards),
    and the maximum number of records to return.

    2. Initializes the IronPort API client using the provided integration configuration.

    3. Determines the applicable entity types (User, Address, Hostname) based on the
    selected report type.

    4. Makes a GET request to the IronPort API (`reporting/{report_type}`) to retrieve
    the specified report data.

    5. If target entities are present and match the required types, the action filters
    the retrieved report data by matching the entity's identifier against the report's
    relevant field (e.g., IP, hostname, or user).

    6. Enriches the matching entities by updating their `additional_properties`, setting
    their status to enriched, and attaching the report data as an entity-specific
    data table.

    7. If no entities are applicable or provided, the action attaches the overall
    report data as a general case data table.


    ### Additional Notes

    - The `mail_sender_ip_hostname_detail` and `mail_incoming_ip_hostname_detail`
    reports specifically target Address (IP) and Hostname entities.

    - The `mail_users_detail` report specifically targets User entities (using their
    email address as the identifier).

    - Other report types will execute without requiring or filtering specific entities.
  ai_short_description: >-
    Fetches specific IronPort report information and enriches associated User, Address,
    or Hostname entities with the retrieved email statistics and details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the IronPort API (`reporting/{report_type}`).
      It does not mutate external data. It updates internal entities by modifying
      `entity.additional_properties` and setting `entity.is_enriched = True`. It does
      not create insights, modify alert data, or create case comments.
