    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches message data from the IronPort API using a GET request to
      extract recipients. It does not mutate any external data, nor does it update
      internal entities, create insights, or add case comments.
