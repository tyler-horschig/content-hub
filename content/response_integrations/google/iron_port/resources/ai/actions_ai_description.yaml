Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the IronPort server using the provided integration configuration
    parameters. This action ensures that the Google SecOps platform can successfully
    communicate and authenticate with the IronPort AsyncOS REST API.


    ### Flow Description

    1. Extracts integration configuration parameters including the Server Address,
    Port, Credentials, and SSL settings.

    2. Initializes the `IronportManagerAPI` client.

    3. Makes a POST request to the IronPort login endpoint to authenticate and retrieve
    a JWT token.

    4. Returns a successful execution state if the connection and authentication succeed,
    or a failed state if an error occurs.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to verify that the integration
    is configured correctly. It does not interact with alerts, entities, or perform
    any operational security tasks.
