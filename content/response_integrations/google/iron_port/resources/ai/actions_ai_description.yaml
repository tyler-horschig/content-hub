Get All Recipients By Subject:
  ai_description: >-
    ### General Description

    Retrieves a list of all recipients who received an email with a specific subject
    from Cisco IronPort. This action searches the mail server's message tracking logs
    to identify and extract the email addresses of all users who were sent an email
    matching the provided subject line.


    ### Flow Description

    1. Calculates the search time frame based on the `Search Emails for Last X` and
    `Set Search Email Period in` parameters.

    2. Connects to the Cisco IronPort AsyncOS API.

    3. Makes a GET request to the IronPort `message-tracking/messages` endpoint to
    fetch messages matching the specified subject within the calculated time frame.

    4. Iterates through the retrieved messages and extracts the recipient email addresses.

    5. Handles pagination and asynchronous execution to fetch all relevant recipients
    up to the limit specified in `Max Recipients to Return`.

    6. Returns the aggregated list of recipients as a JSON result.


    ### Additional Notes

    For this action to work, message tracking must be enabled in IronPort, along with
    the AsyncOS API. If the time frame is too large and the volume of emails processed
    by IronPort is high, the action may time out, though it utilizes asynchronous
    execution to mitigate this.
  ai_short_description: >-
    Searches Cisco IronPort to retrieve a list of all recipients who received an email
    matching a specific subject.
