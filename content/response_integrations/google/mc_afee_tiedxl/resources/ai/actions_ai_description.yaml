Get File Reputation:
  ai_description: >-
    ### General Description

    Retrieves the reputation of file hash entities using McAfee Threat Intelligence
    Exchange (TIE) and Data Exchange Layer (DXL). This action fetches threat intelligence
    data for the specified hashes and enriches the entities with the results.


    ### Flow Description

    1. Iterates over the target entities and filters for those of type `FILEHASH`.

    2. For each suitable entity, calls the McAfee TIE/DXL API to fetch reputation
    data for the hash.

    3. If reputations are found, attaches them as a CSV table to the entity.

    4. Adds the raw JSON results to the action's JSON output.

    5. Depending on the `Enrich with all services` parameter, it either enriches the
    entity with all returned services' reputations or just the worst trust level reputation.

    6. Updates the entity's `additional_properties` with the reputation data and marks
    it as enriched.

    7. Updates the entities in the platform.


    ### Additional Notes

    - Supports MD5, SHA1, and SHA256 hashes.
  ai_short_description: >-
    Retrieves the reputation of file hash entities using McAfee Threat Intelligence
    Exchange (TIE) and Data Exchange Layer (DXL), enriching the entities with the
    results.
