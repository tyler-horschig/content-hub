Get File References:
  ai_description: >-
    ### General Description

    Retrieves file references from McAfee Threat Intelligence Exchange (TIE) via Data
    Exchange Layer (DXL) for File Hash entities. This action identifies the agents
    (endpoints) where the specified file hash was observed, providing valuable prevalence
    context.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash entities.

    2. For each valid entity, makes an API call to McAfee TIE to fetch file references,
    which include agent GUIDs and observation dates.

    3. If references are found, constructs a CSV table containing the reference data
    and attaches it to the entity.

    4. Updates the enriched entities within the SecOps platform.


    ### Additional Notes

    - Supported hash types include MD5, SHA1, and SHA256.

    - If an error occurs while processing a specific entity, the action logs the error
    and continues processing the remaining entities.
  ai_short_description: >-
    Retrieves file references (agent GUIDs and observation dates) from McAfee TIE
    for File Hash entities and attaches the results as an entity table to provide
    prevalence context.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a request to McAfee TIE to fetch file references (fetches_data=true).
      It does not mutate external data. It updates internal entities with the fetched
      data (can_update_entities=true) and attaches entity tables, but does not create
      insights, modify alert data, or create case comments.
