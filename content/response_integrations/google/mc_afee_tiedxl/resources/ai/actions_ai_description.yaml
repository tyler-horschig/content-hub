Set File Reputation:
  ai_description: >-
    ### General Description

    Sets the enterprise reputation (trust level) for File Hash entities in McAfee
    Threat Intelligence Exchange (TIE) via Data Exchange Layer (DXL). This action
    allows analysts to manually classify a file's trustworthiness within the McAfee
    ecosystem.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to include only those of type File Hash.

    3. For each valid File Hash, makes an API call to McAfee TIE to set its reputation
    using the provided `Trust Level`, `File Name`, and `Comment` parameters.

    4. Calls the SecOps platform to update the processed entities.

    5. Returns a summary message listing the entities that successfully had their
    reputations set.


    ### Additional Notes

    - The action supports MD5, SHA1, and SHA256 hash types.

    - Valid trust levels include NOT_SET, KNOWN_MALICIOUS, MOST_LIKELY_MALICIOUS,
    MIGHT_BE_MALICIOUS, UNKNOWN, MIGHT_BE_TRUSTED, MOST_LIKELY_TRUSTED, KNOWN_TRUSTED,
    and KNOWN_TRUSTED_INSTALLER.
  ai_short_description: >-
    Sets the enterprise reputation (trust level) for File Hash entities in McAfee
    Threat Intelligence Exchange (TIE).
  capabilities:
    can_create_case_comments: false
