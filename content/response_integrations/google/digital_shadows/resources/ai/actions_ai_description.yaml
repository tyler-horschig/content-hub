EnrichCVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Digital Shadows. This action retrieves threat intelligence
    information regarding exploits and vulnerabilities associated with the CVE.


    ### Flow Description

    1. Initializes the Digital Shadows manager with API credentials.

    2. Iterates over the target entities, filtering for those of type CVE.

    3. For each CVE entity, makes an API call to Digital Shadows to search for exploit
    and vulnerability data.

    4. Parses the retrieved data and updates the entity's additional properties.

    5. Adds a data table and relevant links to the entity's results.

    6. Marks the entity as enriched and updates it within the platform.

    7. Returns a JSON result containing the enriched data.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches CVE entities by retrieving exploit and vulnerability threat intelligence
    from Digital Shadows.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Digital Shadows via a POST request to the search
      endpoint (fetches_data=true). It does not mutate external or internal data.
      It updates the entities with the fetched enrichment data (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
