Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Digital Shadows platform to ensure the integration is
    configured correctly.


    ### Flow Description

    1. Extracts the API Key and API Secret from the integration configuration.

    2. Initializes the Digital Shadows API client.

    3. Executes a test search query for a hardcoded domain (`www.google.com`) to validate
    the provided credentials.

    4. Returns a success message if the API responds correctly, or an error message
    if the connection fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    that the API credentials are valid and network connectivity is established.
