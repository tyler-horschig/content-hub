BlockHash:
  ai_description: >-
    ### General Description

    Blocks specific file hashes on endpoints using Symantec Endpoint Protection (SEP).
    The action retrieves an existing fingerprint blacklist and appends new MD5 hashes
    from the target entities to it, effectively blocking them across the environment.


    ### Flow Description

    1. Connects to the Symantec Endpoint Protection Manager API.

    2. Retrieves the current list of blacklisted hashes for the specified 'Black List
    Name' via the `getBlackList` API endpoint.

    3. Iterates through the target entities, filtering for `FILEHASH` entities that
    are MD5 hashes (32 characters long) and not already present in the retrieved blacklist.

    4. Appends the new hashes to the blacklist and updates it on SEP using the `setBlackList`
    API endpoint.

    5. Updates the successfully blocked entities in Google SecOps with the `SEP_IsBlocked`
    property set to True.


    ### Additional Notes

    Only MD5 hashes (32 characters in length) are supported by this action. Hashes
    that are already present in the specified blacklist will be skipped.
  ai_short_description: >-
    Blocks specific MD5 file hashes on endpoints by adding them to a fingerprint blacklist
    in Symantec Endpoint Protection.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Updates the specified fingerprint blacklist on Symantec Endpoint Protection
      with new MD5 hashes.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the current blacklist using `getBlackList` (fetches_data=true).
      It then mutates external data by calling `setBlackList` to update the fingerprint
      list on SEP (can_mutate_external_data=true). Finally, it updates the entities
      in Google SecOps with a new additional property (can_update_entities=true).
