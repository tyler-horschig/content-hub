    ### General Description

    Quarantines an endpoint using Symantec Endpoint Protection (SEP). This action
    identifies the target endpoint by its IP address or hostname, retrieves its internal
    computer ID from the SEP Manager, and issues a quarantine command to isolate the
    host from the network.


