DisableDownloadInsight:
  ai_description: >-
    ### General Description

    Disables the Download Insight feature on specific endpoints using Symantec Endpoint
    Protection (SEP). This action initiates a state change on the external SEP manager
    to temporarily turn off Download Insight for the targeted IP addresses or hostnames.


    ### Flow Description

    1. Iterates through the provided target entities.

    2. Checks if the entity is an IP Address or Hostname.

    3. Retrieves the corresponding Computer ID from SEP using the entity's identifier
    via the `getComputerIdByIP` or `getComputerInfo` API calls.

    4. Executes the `runClientCommandDisableDownloadInsight` SOAP API command to disable
    Download Insight on the identified computer for the specified time period.

    5. Updates the entity's additional properties with the resulting command ID.


    ### Additional Notes

    The time period specifies how long the feature remains disabled before reverting
    to the policy default. The minimum time limit that can be set is 1 minute, and
    the maximum is 720 minutes (12 hours).
