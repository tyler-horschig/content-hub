    ### Flow Description

    1. The action iterates over all target entities provided in the case.

    2. It filters the entities, processing only those of type `ADDRESS` (IP) and `HOSTNAME`.

    3. For each valid entity, it queries the SEP Manager API to resolve the entity's
    identifier into a SEP-specific Computer ID.

    4. Once the Computer ID is obtained, it sends a SOAP command to the SEP Manager
    to disable Network Threat Protection (NTP) on that endpoint for the duration specified
    in the `Time Period` parameter.

    5. The action updates the entity's `additional_properties` with the resulting
    command ID from SEP.


    ### Additional Notes

