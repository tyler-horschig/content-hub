    2. Iterates through the target entities provided in the case.

    3. Checks if the entity is an IP Address or a Hostname.

    4. Makes an API call to SEP (`getComputersByIP` or `getComputersByHostName`) to
    retrieve the internal computer ID associated with the entity.

    5. Makes a SOAP API call (`runClientCommandQuarantine`) to SEP to quarantine the
    identified endpoint.

    6. Updates the entity's additional properties within the SecOps platform with
    the returned command ID.


    ### Additional Notes

    The action updates the processed entities with the quarantine command ID in their
    additional properties, which can be used for tracking the status of the quarantine
    operation.
