Get Report And Enrich:
  ai_description: >-
    ### General Description

    Retrieves the status report of previously executed commands in Symantec Endpoint
    Protection (SEP) and enriches the associated entities with the report details.
    This action is typically used to check the progress or result of asynchronous
    operations like scans or quarantines.


    ### Flow Description

    1. Establishes a connection to the Symantec Endpoint Protection manager using
    the provided credentials.

    2. Parses the provided comma-separated list of Command IDs.

    3. Iterates over the target entities and checks their `additional_properties`
    for a key containing `_command_id` that matches one of the provided Command IDs.

    4. For each matching entity, makes a SOAP API call (`getCommandStatusDetails`)
    to SEP to fetch the command status report.

    5. Flattens the retrieved report data and appends it to the entity's additional
    properties with a specific prefix.

    6. Updates the enriched entities within the SecOps platform and returns the raw
    reports as JSON results.


    ### Additional Notes

    This action relies on entities having a specific `_command_id` key in their additional
    properties. This key is typically set by other SEP actions that initiate commands
    (such as running a scan or quarantining an endpoint).
  ai_short_description: >-
    Retrieves command status reports from Symantec Endpoint Protection and enriches
    the corresponding entities with the report data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities by adding the command status report to their additional properties.
    reasoning: >-
      The action fetches command status data from SEP via a SOAP API call (`fetches_data`
      = true). It does not mutate external data. It updates internal entities by adding
      the report data to their additional properties (`can_update_entities` = true,
      `can_mutate_internal_data` = true).
  entity_usage:
    entity_types:
      address: true
      alert: true
