    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to the Site24x7 authentication endpoint
      to exchange an authorization code for a refresh token. It does not fetch contextual
      data for alerts/entities, nor does it mutate external business data, mutate
      internal SecOps data, update entities, create insights, modify alerts, or create
      case comments.
