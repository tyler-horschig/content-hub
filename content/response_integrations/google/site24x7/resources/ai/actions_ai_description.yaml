Generate Refresh Token:
  ai_description: >-
    ### General Description

    Generates a refresh token for the Site24x7 integration using a provided authorization
    code. This token is required for configuring the integration to authenticate API
    requests.


    ### Flow Description

    1. Retrieves the authorization code provided in the action parameters.

    2. Initiates an HTTP POST request to the Site24x7 OAuth2 token endpoint, exchanging
    the authorization code for a refresh token.

    3. Outputs the newly generated refresh token as a JSON result, which can then
    be copied into the integration's configuration settings.


    ### Additional Notes

    This action does not interact with alerts or entities. It is a utility action
    designed specifically to assist administrators during the initial setup and authentication
    phase of the Site24x7 integration.
  ai_short_description: >-
    Generates a refresh token for the Site24x7 integration using an authorization
    code, outputting the token for use in the integration's configuration.
  capabilities:
