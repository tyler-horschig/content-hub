Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Site24x7 server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Client ID, Client
    Secret, Refresh Token, Verify SSL).

    2. Initializes the Site24x7 API client.

    3. Makes a GET request to the Site24x7 API to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to ensure the integration
    is configured correctly and can communicate with the Site24x7 API.
