Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cuckoo server to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Initializes the Cuckoo manager using the provided integration configuration.

    2. Makes an HTTP GET request to the `/cuckoo/status` API endpoint.

    3. Evaluates the response to confirm successful communication.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action does not process any entities or alerts and is solely used for diagnostic
    and verification purposes.
