Detonate Url:
  ai_description: >-
    ### General Description

    Submits URL entities to Cuckoo Sandbox for asynchronous dynamic analysis and retrieves
    the resulting threat report. It evaluates the analysis score against a configured
    threshold to determine if the URL is suspicious, enriching the entity with the
    results and attaching the report data to the case.


    ### Flow Description

    1. Iterates through the target entities and filters for those of type URL.

    2. Submits each URL to Cuckoo Sandbox via a POST request (`/tasks/create/url`)
    to initiate the analysis.

    3. Saves the resulting task ID to the entity's additional properties and suspends
    the action (asynchronous flow).

    4. Periodically resumes to check the status of the analysis tasks via GET requests
    (`/tasks/view/{task_id}`).

    5. Once a task is completed, retrieves the JSON report via a GET request (`/tasks/report/{task_id}/json`).

    6. Updates the entity's enrichment status, marks it as suspicious if the score
    exceeds the configured threshold, and attaches the report data as a JSON result,
    data table, and entity link.


    ### Additional Notes

    This is an asynchronous action. It will continue to run in the background until
    all submitted URL analysis tasks are completed or the action times out.
  ai_short_description: >-
    Submits URL entities to Cuckoo Sandbox for asynchronous dynamic analysis and retrieves
    the resulting threat report.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a new analysis task in the Cuckoo Sandbox by submitting a URL sample.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving the analysis report from Cuckoo via a
      GET request. It mutates external data by submitting a new URL analysis task
      to the Cuckoo server via a POST request. It updates internal entities by calling
      `siemplify.update_entities` to save the task ID, enrichment status, and suspicious
      status. It does not create insights or case comments.
