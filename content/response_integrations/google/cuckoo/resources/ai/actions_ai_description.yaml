Get Report:
  ai_description: >-
    ### General Description

    Retrieves the analysis report for a specific task ID from Cuckoo Sandbox.


    ### Flow Description

    1. Initializes the connection to the Cuckoo Sandbox API.

    2. Checks the status of the specified task ID to determine if the analysis report
    is ready.

    3. If the task is reported, makes an API call to fetch the JSON report.

    4. Extracts the analysis score and constructs a flat dictionary of the report
    details.

    5. Attaches a link to the web interface report, a data table with the flat dictionary,
    and the full JSON report to the action results.

    6. If the task is not yet reported, the action returns an in-progress state to
    be checked again later.


    ### Additional Notes

    This action is designed to run asynchronously.
  ai_short_description: >-
    Retrieves the analysis report for a specific task ID from Cuckoo Sandbox.
