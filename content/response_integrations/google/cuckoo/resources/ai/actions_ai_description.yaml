Detonate File:
  ai_description: >-
    ### General Description

    Submits one or more files to Cuckoo Sandbox for analysis and retrieves the analysis
    report asynchronously.


    ### Flow Description

    1. Extracts the provided file paths from the action parameters.

    2. Connects to the Cuckoo Sandbox API.

    3. Submits each file to Cuckoo for detonation via a POST request to `/tasks/create/file`.

    4. Enters an asynchronous loop to monitor the status of the submitted tasks.

    5. Once all tasks are completed, fetches the analysis report for each task via
    a GET request to `/tasks/report/{task_id}/json`.

    6. Attaches the report links and data tables to the action results.


    ### Additional Notes

    This action runs asynchronously to allow the sandbox sufficient time to analyze
    the files without blocking the playbook execution.
  ai_short_description: >-
    Submits files to Cuckoo Sandbox for analysis and retrieves the resulting threat
    reports asynchronously.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Cuckoo Sandbox for analysis, creating a new analysis task
      on the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving the analysis report from Cuckoo. It mutates
      external data by submitting a file to the sandbox, which creates a new analysis
      task on the Cuckoo server. It does not mutate internal data, update entities,
      create insights, modify alert data, or create case comments.
  entity_usage:
