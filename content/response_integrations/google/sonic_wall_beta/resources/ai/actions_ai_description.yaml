    1. Extracts the action parameters including the profile name, allowed/forbidden
    URIs, search order, and various filtering options.

    2. Initializes the `SonicWallManager` to interact with the SonicWall API.

    3. Calls the SonicWall API via a POST request to `/api/sonicos/content-filter/profiles`
    to create the CFS profile with the specified configuration.

    4. Calls the SonicWall API via a POST request to `/api/sonicos/config/pending`
    to confirm and commit the changes.

    5. Returns a success message if the profile is created, or an error message if
    the operation fails.


