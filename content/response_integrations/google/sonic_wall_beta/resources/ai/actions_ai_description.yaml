    then committing the changes.


    ### Flow Description

    1. Extracts the `URI List Name` and `URI Group Name` from the action parameters.

    2. Makes a PUT request to the SonicWall API (`/api/sonicos/content-filter/uri-list-groups`)
    to add the specified URI List to the URI Group.

    3. Makes a POST request to the SonicWall API (`/api/sonicos/config/pending`) to
    confirm and commit the pending changes.

    4. Returns a success message if the operation completes successfully, or an error
    message if it fails (e.g., if the URI Group is not found).


