Add IP to Address Group:
  ai_description: >-
    ### General Description

    Adds an IP address to a specific SonicWall Address Group. This action creates
    an address object for the IP and then associates it with the specified address
    group on the SonicWall firewall.


    ### Flow Description

    1. Extracts the target entities of type ADDRESS.

    2. Validates whether each IP address is IPv4 or IPv6.

    3. Checks if the specified Address Group exists in SonicWall for the corresponding
    IP type via a GET request.

    4. Creates an address object for the IP address in the specified zone via a POST
    request.

    5. Adds the newly created address object to the specified Address Group via a
    PUT request.

    6. Confirms the pending changes in SonicWall via a POST request.

    7. Returns a success message with the list of IPs added, or a failure message
    if the operation was unsuccessful.


    ### Additional Notes

    Caution: Successful action execution commits all uncommitted changes. This is
    a SonicWall limitation.
  ai_short_description: >-
    Adds an IP address to a specific SonicWall Address Group.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates an address object for the IP and adds it to the specified address group
      in the SonicWall firewall.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST and PUT requests to the SonicWall API to create an address
      object and add it to an address group, which mutates external data. It does
      not fetch data for enrichment, nor does it mutate internal SecOps data, update
      entities, or create insights.
