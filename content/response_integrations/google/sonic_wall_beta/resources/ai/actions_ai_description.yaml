Remove IP from Address Group:
  ai_description: >-
    ### General Description

    Removes specified IP Address entities from a designated SonicWall Address Group.
    This action initiates a state change on the external SonicWall device to remove
    the IP objects from the group and commits the configuration changes.


    ### Flow Description

    1. Iterates through the target entities and filters for IP addresses (ADDRESS
    entity type).

    2. Validates whether each IP address is IPv4 or IPv6.

    3. Makes a GET request to SonicWall to verify if the specified Address Group exists.

    4. Makes a GET request to retrieve all address objects of the corresponding IP
    type from SonicWall.

    5. Matches the entity IP addresses to the address objects within the specified
    group.

    6. Sends a DELETE request to SonicWall to remove the matched IP objects from the
    Address Group.

    7. Sends a POST request to confirm and commit the pending changes in SonicWall.


    ### Additional Notes

    Caution: Successful action execution commits all uncommitted changes on the device.
    This is a SonicWall limitation.
