    Adds URL entities to a specific SonicWall URI List. This action modifies the configuration
    of the SonicWall device by appending the provided URLs to the specified URI list,
    which can be used in Content Filter Service (CFS) profiles.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (URI List Name).

    2. Initializes the `SonicWallManager` to establish a session with the SonicWall
    API.

    3. Iterates over the target entities, filtering for those of type `URL`.

    4. For each URL entity, calls the SonicWall API (`PUT /api/sonicos/content-filter/uri-list-objects/name/{uri_list}`)
    to add the URL to the specified URI list.

    5. Calls the SonicWall API (`POST /api/sonicos/config/pending`) to confirm and
    commit the changes.

    6. Collects the successful and failed entities and outputs a summary message.


    ### Additional Notes

    - Caution: Successful action execution commits all uncommitted changes. This is
    a SonicWall limitation.

