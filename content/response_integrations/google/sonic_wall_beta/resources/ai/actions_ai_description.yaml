List URI Groups:
  ai_description: >-
    ### General Description

    Retrieves a list of available URI Groups from SonicWall. This action connects
    to the SonicWall appliance to fetch configured URI groups, including their associated
    URI list counts and URI group counts, and returns the information as a data table
    and JSON result for further use in the playbook.


    ### Flow Description

    1. Initializes the connection to the SonicWall API using the provided integration
    credentials.

    2. Makes an HTTP GET request to the `/api/sonicos/content-filter/uri-list-groups`
    endpoint to retrieve the URI groups.

    3. Limits the number of returned groups based on the `Max URI Groups To Return`
    parameter (defaults to 100 if not specified or invalid).

    4. Parses the response to extract the group name, URI list count, and URI group
    count for each group.

    5. Outputs the parsed data as a "Available URI Groups" data table and attaches
    the raw JSON results to the action.


    ### Additional Notes

    Requires SonicOS 6.5.3 or higher.
