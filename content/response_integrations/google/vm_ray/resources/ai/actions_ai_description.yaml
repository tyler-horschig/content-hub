Scan Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using VMRay. This action retrieves detailed sample
    analysis, associated Indicators of Compromise (IOCs), and threat indicators for
    a specific hash. It evaluates the risk based on the sample verdict, updates the
    entity's suspicious status, enriches the entity with the retrieved data, and optionally
    generates an insight with the analysis results.


    ### Flow Description

    1. Extracts and validates action parameters, including thresholds and filters.

    2. Iterates over target File Hash entities.

    3. Makes a GET request to the VMRay API (`/rest/sample/md5/`, `/rest/sample/sha1/`,
    or `/rest/sample/sha256/`) to fetch sample analysis by hash.

    4. If a sample is found, makes a GET request to the VMRay API (`/rest/sample/{id}/iocs`)
    to fetch associated IOCs.

    5. Makes a GET request to the VMRay API (`/rest/sample/{id}/threat_indicators`)
    to fetch threat indicators.

    6. Adds the retrieved IOCs and threat indicators as tables to the entity.

    7. Updates the entity's enrichment data and suspicious status based on the sample
    verdict.

    8. Optionally creates an insight for the entity.

    9. Returns the results in JSON format.


    ### Additional Notes

    The action supports MD5, SHA1, and SHA256 hashes. It automatically identifies
    the hash type before querying the VMRay API.
