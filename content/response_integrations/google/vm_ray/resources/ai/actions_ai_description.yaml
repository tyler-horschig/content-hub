Scan URL:
  ai_description: >-
    ### General Description

    Submits URL entities to VMRay for browser analysis and retrieves related threat
    intelligence, including IOCs and threat indicators. The action enriches the entities
    with the analysis results and optionally creates insights based on the findings.


    ### Flow Description

    1. Iterates over the target entities and filters for URL entities.

    2. Submits each URL to VMRay for browser analysis via a POST request to the `/rest/sample/submit`
    endpoint.

    3. Asynchronously monitors the analysis job status by making GET requests to the
    `/rest/job/{job_id}` endpoint.

    4. Once the job is completed, retrieves the sample analysis details via a GET
    request to `/rest/sample/{sample_id}`.

    5. Fetches the sample's IOCs via a GET request to `/rest/sample/{sample_id}/iocs`
    and filters them based on the provided parameters.

    6. Fetches the sample's threat indicators via a GET request to `/rest/sample/{sample_id}/threat_indicators`
    and filters them by the score threshold.

    7. Enriches the URL entities with the retrieved data, adds tables and web links
    to the entities, and updates their suspicious status if applicable.

    8. Optionally creates an insight for the entity containing the analysis summary.


    ### Additional Notes

    This is an asynchronous action. It supports filtering the returned IOCs by type
    and verdict, and the threat indicators by a minimum score threshold. The action
    will update the entity's `is_suspicious` flag to true if the sample verdict is
    'malicious' or 'suspicious'.
