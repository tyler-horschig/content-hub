Add Tag to Submission:
  ai_description: >-
    ### General Description

    Adds a tag to a specific submission in VMRay using the Submission ID. This action
    initiates a state change on the external system by appending the specified tag
    to the submission.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Initializes the VMRay client.

    3. Makes a POST request to the VMRay API to add the specified tag to the submission.

    4. Returns a success message if the tag is added successfully, or an error message
    if the operation fails.


    ### Additional Notes

