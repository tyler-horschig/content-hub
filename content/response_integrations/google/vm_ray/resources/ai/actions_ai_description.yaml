Upload File And Get Report:
  ai_description: >-
    ### General Description

    Submits one or more files to VMRay for sandbox analysis and retrieves the resulting
    analysis reports, including threat indicators and IOCs.


    ### Flow Description

    1. Extracts the provided file paths, tags, and comments from the action parameters.

    2. Validates that the specified files exist and are accessible on the local file
    system.

    3. Submits each file to VMRay via a POST request to the `/rest/sample/submit`
    endpoint.

    4. Periodically checks the submission status (asynchronous execution) via the
    `/rest/submission/` endpoint.

    5. Once the analysis is complete, retrieves the sample details, IOCs, and threat
    indicators via GET requests.

    6. Downloads the JSON and ZIP analysis archives and attaches them to the case.

    7. Populates data tables with the extracted IOCs (Files, IPs, URLs, Registries,
    Domains, Mutexes) and threat indicators.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed to allow sufficient time for the sandbox analysis to complete.
