Execute Program:
  ai_description: >-
    ### General Description

    Executes a specified program or script on a remote machine via SSH. This action
    connects to the target server using the provided credentials and runs the executable
    located at the given path, returning its standard output or error.


    ### Flow Description

    1. Retrieves connection parameters (Remote Server, Username, Password, Port) and
    the path to the program to execute.

    2. Establishes an SSH connection to the remote server using the `paramiko` library.

    3. Executes the program at the specified path on the remote host.

    4. Captures the exit status code, standard output, and standard error.

    5. Returns the standard output if the execution is successful (status code 0),
    or the standard error if it fails.


    ### Additional Notes

    Ensure that the provided credentials have the necessary permissions to execute
    the program on the remote host. The remote server must be accessible over the
    network on the specified SSH port.
