Block IP Address in iptables:
  ai_description: >-
    ### General Description

    This action connects to a remote server via SSH and adds a rule to its iptables
    configuration to block a specified IP address. It ensures that network traffic
    originating from the target IP address is dropped by the remote host.


    ### Flow Description

    1. Establishes an SSH connection to the specified remote server using the provided
    credentials.

    2. Executes a command (`iptables -C`) to check if a DROP rule for the specified
    IP address already exists in the iptables INPUT chain.

    3. If the rule does not exist, executes the command `iptables -I INPUT -s <IP>
    -j DROP` to block the IP address.

    4. Returns the execution status and a success or failure message to the SOAR platform.


    ### Additional Notes

    The action requires appropriate privileges (usually root) on the remote server
    to successfully modify iptables rules.
  ai_short_description: >-
    Blocks a specific IP address on a remote server by adding a DROP rule to its iptables
    configuration via SSH.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a DROP rule to the iptables configuration on the remote server to block
      the specified IP address.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action establishes an SSH connection and executes commands to modify the
      iptables configuration on a remote server, which mutates external data. It does
      not fetch enrichment data, update internal SOAR entities, or create insights.
