Delete Firewall Rule:
  ai_description: >-
    ### General Description

    Deletes a specified iptables firewall rule on a remote server via SSH. This action
    connects to the target machine and executes the appropriate command to remove
    the rule from the active iptables configuration.


    ### Flow Description

    1. Establishes an SSH connection to the specified remote server using the provided
    credentials (username, password, and port).

    2. Executes the `iptables -D` command appended with the provided rule string on
    the remote host.

    3. Evaluates the exit status of the command to determine success or failure.

    4. Returns the execution status and the command's output message to the SOAR platform.


    ### Additional Notes

    The rule parameter must be provided exactly as it appears in the iptables configuration
    (e.g., `INPUT -s 10.0.0.10 -j DROP`). Ensure the provided SSH user has the necessary
    privileges (e.g., root or sudo access) to modify iptables rules on the remote
    server.
