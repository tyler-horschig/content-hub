Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the RSA Archer instance to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Instance Name).

    2. Initializes the RSA Archer Manager, which attempts to authenticate by making
    a POST request to the `/api/core/security/login` endpoint to retrieve a session
    token.

    3. Returns a successful result if the connection and authentication succeed.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
    It is primarily used for validating credentials and network access.
