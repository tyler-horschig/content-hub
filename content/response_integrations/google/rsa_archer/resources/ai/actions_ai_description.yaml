Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in RSA Archer. This action allows users to generate a new
    incident record in the RSA Archer platform by specifying details such as summary,
    description, owner, status, priority, category, and custom fields.


    ### Flow Description

    1. Extracts the provided action parameters, including incident summary, details,
    owner, status, priority, category, and custom fields.

    2. Parses the custom fields JSON object and resolves any custom mapping files
    if provided.

    3. Makes a POST request to the RSA Archer API to create the new incident record
    with the specified parameters.

    4. Makes a GET request to the RSA Archer API to retrieve the full details of the
    newly created incident.

    5. Attaches the retrieved incident details to the action's JSON results and returns
    the new incident's Content ID.


    ### Additional Notes

    - Custom fields must be provided as a valid JSON object (e.g., `{"Category":"Malware"}`).

    - If a custom mapping file is required, it can be provided as an absolute path
    or a remote URL (by enabling the 'Remote File' parameter).
  ai_short_description: >-
    Creates a new incident in RSA Archer and returns the newly created incident ID
    and details.
