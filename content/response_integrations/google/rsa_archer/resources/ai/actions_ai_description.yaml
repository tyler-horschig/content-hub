    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to RSA Archer to add a journal entry to a Security
      Incident, which mutates external data. It does not fetch contextual enrichment
      data, nor does it mutate internal SecOps data, update entities, or create insights.
