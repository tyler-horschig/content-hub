Add Incident Journal Entry:
  ai_description: >-
    ### General Description

    Adds a journal entry to a specific Security Incident in RSA Archer.


    ### Flow Description

    1. Retrieves the application ID for the incident journal from RSA Archer.

    2. Retrieves the security incident ID and level details required for the request.

    3. Verifies the existence of the specified Security Incident by its Content ID.

    4. Makes an API call to RSA Archer to add the provided text as a journal entry
    to the incident.

    5. Returns the result of the operation.


    ### Additional Notes

    Ensure that the provided Destination Content ID corresponds to a valid and existing
    Security Incident in RSA Archer.
  ai_short_description: >-
    Adds a journal entry to a specific Security Incident in RSA Archer.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
