Update Incident:
  ai_description: >-
    ### General Description

    Updates an existing incident in RSA Archer with new details such as summary, status,
    priority, owner, and custom fields. It then retrieves and returns the updated
    incident data.


    ### Flow Description

    1. Initializes the RSA Archer client using the provided integration credentials.

    2. Parses the provided custom fields JSON, if any.

    3. Sends a PUT request to the RSA Archer API to update the incident matching the
    provided `Content ID` with the new parameters.

    4. Retrieves the updated incident details from RSA Archer via a GET request.

    5. Returns the updated incident details as a JSON result.


    ### Additional Notes

    The action requires the `Content ID` of the incident to be updated. Custom fields
    can be mapped using a local or remote mapping file. If `Remote File` is enabled,
    the action will attempt to fetch the mapping file from the URL provided in `Custom
    Mapping File`.
