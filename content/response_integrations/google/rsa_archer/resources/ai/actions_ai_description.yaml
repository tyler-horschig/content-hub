Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific incident from RSA Archer.


    ### Flow Description

    1. Initializes the RSA Archer manager with the provided integration credentials.

    2. Retrieves the application details by its name to get the application alias.

    3. Makes a GET request to the RSA Archer API (`/contentapi/{alias}({incident_id})`)
    to fetch the incident details using the provided Content ID.

    4. Returns the incident details as a JSON object and attaches it to the action
    results.


    ### Additional Notes

    This action does not operate on entities and relies solely on the provided Content
    ID parameter.
