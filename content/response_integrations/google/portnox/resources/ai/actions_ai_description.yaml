Enrich Device:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities using Portnox. This action retrieves
    device details from Portnox and appends them to the entity's additional properties.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type IP Address or MAC Address.

    3. Makes an API call to Portnox (`POST /devices`) to search for the device by
    its IP or MAC address.

    4. If a matching device is found, flattens the device information dictionary and
    adds it to the entity's additional properties with a "Portnox" prefix.

    5. Marks the entity as enriched and updates the entities in the Google SecOps
    platform.


    ### Additional Notes

    If multiple devices match the search query in Portnox, only the first device returned
    is used for enrichment.
  ai_short_description: >-
    Enriches IP Address and MAC Address entities by retrieving device details from
    Portnox and appending them to the entities' additional properties.
