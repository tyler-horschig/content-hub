Get Installed Applications:
  ai_description: >-
    ### General Description

    Retrieves a list of installed applications for a specific device from Portnox
    based on its IP or MAC address. The action queries Portnox to locate the device
    and then fetches its installed applications, attaching the results as a table
    to the entity in Google SecOps.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to process only IP Addresses (`ADDRESS`) and MAC Addresses
    (`MACADDRESS`).

    3. Makes a POST request to the Portnox API (`/devices`) to search for the device
    ID associated with the entity's identifier.

    4. If a device is found, makes a GET request to the Portnox API (`/devices/{device_id}/details/applications`)
    to retrieve the list of installed applications.

    5. Formats the retrieved applications into a CSV table and attaches it to the
    entity using `siemplify.result.add_entity_table`.

    6. Updates the enriched entities within the SecOps platform.


