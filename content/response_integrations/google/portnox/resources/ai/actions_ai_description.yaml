    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Portnox using a search API call. It does not mutate
      external data. It updates internal entities with the fetched data by calling
      `siemplify.update_entities`, but does not create insights, modify alert data,
      or create case comments.
