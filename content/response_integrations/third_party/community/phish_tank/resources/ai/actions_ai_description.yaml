Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the PhishTank service to ensure the integration is configured
    correctly and can communicate with the API.


    ### Flow Description

    1. Retrieves the `Service Url` from the integration configuration.

    2. Executes an HTTP POST request to the PhishTank API using a hardcoded test payload
    (`url: google.com`).

    3. Evaluates the HTTP response status to confirm successful communication.

    4. Outputs a success message indicating that PhishTank is connected.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    PhishTank integration to verify network access and configuration validity.
  ai_short_description: >-
    Tests connectivity to the PhishTank service by sending a test API request to verify
    configuration and network access.
