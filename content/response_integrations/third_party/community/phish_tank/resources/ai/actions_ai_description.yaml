Check Url:
  ai_description: >-
    ### General Description

    Checks if specific URL entities are marked as suspicious by the PhishTank Community.
    The action queries the PhishTank database to retrieve threat intelligence and
    verification status for each URL. It then adds an insight with the results and
    updates the entity's suspicious status if the URL is verified as a phishing link.


    ### Flow Description

    1. Iterates through all target entities and filters for URL entities.

    2. Extracts the original identifier from the entity's additional properties.

    3. Makes a POST request to the PhishTank API to check if the URL exists in their
    database.

    4. Evaluates the response to determine if the URL is in the database and if it
    is verified as a phishing link.

    5. Adds an insight to the entity with the PhishTank details.

    6. Marks the entity as suspicious and updates it in the platform if the URL is
    verified.

    7. Returns a JSON result containing the PhishTank data for the processed URLs.


    ### Additional Notes

    The action relies on the 'Service Url' configured at the integration level.
  ai_short_description: >-
    Checks if URL entities are marked as suspicious by the PhishTank Community, adding
    insights and updating the entity's suspicious status if verified as a phishing
    link.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the PhishTank API to fetch URL data (fetches_data=true).
      It does not mutate external data. It updates internal entities by setting them
      as suspicious (can_update_entities=true) and creates insights with the PhishTank
      results (can_create_insight=true).
