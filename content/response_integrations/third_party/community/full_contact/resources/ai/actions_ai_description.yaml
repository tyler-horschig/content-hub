Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with the Full Contact API to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the API key from the integration configuration.

    2. Makes a POST request to the Full Contact company enrichment endpoint (`https://api.fullcontact.com/v3/company.enrich`)
    using a hardcoded test domain (`google.com`).

    3. Evaluates the response to verify successful authentication (checking for a
    401 status code).

    4. Returns a success message if the connection and authentication are valid.


    ### Additional Notes

    This action does not process any entities or alerts; it is strictly used for verifying
    the integration's connection to the Full Contact service.
