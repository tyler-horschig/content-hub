Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities by retrieving company and personal information from the
    Full Contact API. This action extracts the email address and domain from the user
    entity's identifier to fetch contextual metadata, such as company details and
    personal professional information, and appends it to the entity's additional properties.


    ### Flow Description

    1. Iterates through the target entities provided in the case and filters for `USER`
    entities.

    2. Extracts the email address and domain from the User entity's identifier (assuming
    an email format).

    3. Makes a POST request to the Full Contact API (`https://api.fullcontact.com/v3/company.enrich`)
    to fetch company details based on the extracted domain.

    4. Makes a POST request to the Full Contact API (`https://api.fullcontact.com/v3/person.enrich`)
    to fetch personal details based on the extracted email address.

    5. Updates the entity's `additional_properties` with the retrieved enrichment
    data (e.g., company name, location, person's title, LinkedIn profile).

    6. Saves the updated entities back to the platform and outputs the enrichment
    data as a JSON result.


    ### Additional Notes

    The action expects User entities to be formatted as valid email addresses to successfully
    extract the domain and email for enrichment. Although the API requests use the
    POST method, they function purely as data retrieval (enrichment) queries and do
    not mutate external state.
  ai_short_description: >-
    Enriches User entities by retrieving company and personal information from the
    Full Contact API based on the user's email address and domain.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Full Contact API using POST requests to `.enrich`
      endpoints (which act as data retrieval queries, not state mutations). It updates
      the internal entities with the retrieved data using `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
