Add Outcome:
  ai_description: >-
    ### General Description

    Adds a new assignment outcome with a specified title and category to the Vectra
    QUX platform. This action creates a new outcome configuration that can later be
    used when resolving assignments.


    ### Flow Description

    1. Extracts the `Title` and `Category` parameters provided by the user.

    2. Initializes the Vectra QUX API manager with the integration configuration.

    3. Makes a POST request to the Vectra QUX API (`/api/v2.5/assignment_outcomes`)
    to create the new outcome.

    4. Retrieves the newly created outcome details and attaches them to the action
    result as a JSON object and a data table.


    ### Additional Notes

    This action does not operate on entities or alerts directly; it modifies the configuration/settings
    of the Vectra QUX platform by adding a new outcome type.
