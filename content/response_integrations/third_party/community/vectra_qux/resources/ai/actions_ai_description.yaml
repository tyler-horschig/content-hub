Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Host, Account, or Detection) in VectraQUX. This
    action initiates a state change on the external system by appending the provided
    text note to the specified entity's record.


    ### Flow Description

    1. Extracts the `Note`, `Entity ID`, and `Entity Type` parameters from the action
    configuration.

    2. Validates that the provided `Entity ID` is a valid integer.

    3. Makes a POST request to the VectraQUX API (`/api/v2.5/{entity_type}s/{entity_id}/notes`)
    to append the note to the specified entity.

    4. Parses the response to build a note object and adds the result to the action's
    JSON and data table outputs.


    ### Additional Notes

    Ensure that the provided `Entity ID` corresponds to an existing entity of the
    selected `Entity Type` in VectraQUX.
  ai_short_description: >-
    Adds a note to a specific entity (Host, Account, or Detection) in VectraQUX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a note to a specific entity (Host, Account, or Detection) in VectraQUX.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the VectraQUX API to add a note to a specific
      entity, which mutates external data. It does not fetch contextual data for enrichment,
      nor does it mutate internal SOAR data, update entities, or create insights.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
