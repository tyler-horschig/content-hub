Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to given entity IDs (Account, Host, or Detection) in VectraQUX.
    This action allows users to append new tags to existing entities in the external
    system for better categorization and tracking.


    ### Flow Description

    1. Extracts the provided tags, entity IDs, and entity type from the action parameters.

    2. Iterates through each provided entity ID.

    3. Fetches the existing tags for the entity using the VectraQUX API (`GET /api/v2.5/tagging/{entity_type}/{entity_id}`).

    4. Appends the new tags to the existing tags, ensuring no duplicates are added.

    5. Updates the entity with the combined list of tags using the VectraQUX API (`PATCH
    /api/v2.5/tagging/{entity_type}/{entity_id}`).

    6. Returns a summary table and JSON result detailing the tag update status for
    each entity ID.


    ### Additional Notes

    This action operates on specific entity IDs provided as input parameters and does
    not process or iterate over Google SecOps case entities.
  ai_short_description: >-
    Adds specified tags to given entity IDs (Account, Host, or Detection) in VectraQUX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
