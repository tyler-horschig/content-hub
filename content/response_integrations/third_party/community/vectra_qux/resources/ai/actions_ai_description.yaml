    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the tags associated with specific entities (Account, Host, or Detection)
      in VectraQUX.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing tags from VectraQUX (fetches_data=true) and then
      makes a PATCH request to update the tags on the external system (can_mutate_external_data=true).
