  ai_description: >-
    ### General Description

    Removes specified members from a given group in VectraQUX. This action modifies
    the group's membership by detaching the provided members (which can be hosts,
    IPs, accounts, or domains depending on the group type).


    ### Flow Description

    1. Extracts the `Group ID` and the comma-separated list of `Members` to remove.

    2. Makes a GET request to the VectraQUX API to fetch the current members of the
    specified group.

    3. Makes a PATCH request to the VectraQUX API to remove the specified members
    from the group.

    4. Compares the updated group members with the requested members to verify which
    ones were successfully removed.

