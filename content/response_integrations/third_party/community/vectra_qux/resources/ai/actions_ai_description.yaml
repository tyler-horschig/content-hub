Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for an existing assignment associated with a specific
    entity (Host or Account) in VectraQUX.


    ### Flow Description

    1. Validates the provided `Entity ID` and `User ID` parameters to ensure they
    are valid integers.

    2. Makes a GET request to the VectraQUX API to retrieve the entity details and
    extract its current assignment ID.

    3. If an assignment exists, makes a PUT request to the VectraQUX API to update
    the assignment with the new `User ID`.

    4. Returns the updated assignment details as JSON and constructs a data table
    with the results.


    ### Additional Notes

    - The action will fail if the specified entity does not have an existing assignment
    in VectraQUX.

    - The `Entity Type` parameter must be either 'Account' or 'Host'.
