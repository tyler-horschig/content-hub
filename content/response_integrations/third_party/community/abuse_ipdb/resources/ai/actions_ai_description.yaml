Check IP Reputation:
  ai_description: >-
    ### General Description

    Checks the reputation of IP address entities using AbuseIPDB. This action retrieves
    threat intelligence including abuse confidence score, country code, domain, and
    ISP. It evaluates risk based on a configurable threshold, updates the entity's
    suspicious status, enriches its properties, and optionally generates an insight
    with the analysis results.


    ### Flow Description

    1. Extracts configuration and action parameters, including the suspicious threshold
    and max report age.

    2. Filters the target entities to include only ADDRESS entities. If configured,
    it excludes internal addresses to save API quota.

    3. Iterates over the filtered entities.

    4. Makes a GET request to the AbuseIPDB API (`/api/v2/check`) to retrieve the
    IP report for each entity.

    5. Enriches the entity's `additional_properties` with the retrieved report data.

    6. If the abuse confidence score is greater than or equal to the `Suspicious Threshold`,
    marks the entity as suspicious.

    7. If `Create Insight` is enabled, creates an insight containing the report details.

    8. Marks the entity as enriched and updates it in the platform.

    9. Adds the JSON result to the action output.


    ### Additional Notes

    - Excludes internal entities by default to save API allowance on wasted IP checks
    against your own infrastructure.
  ai_short_description: >-
    Checks the reputation of IP address entities using AbuseIPDB, enriching them with
    threat intelligence and optionally marking them as suspicious based on a confidence
    score threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the AbuseIPDB API to fetch IP reputation data
      (fetches_data=true). It does not mutate external data or internal data outside
      of entities. It updates entities with enrichment data and suspicious status
      (can_update_entities=true) and creates insights if configured (can_create_insight=true).
      It does not modify alert data or create case comments.
