    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Exclude Internal Addresses | Boolean | No | If true, excludes any address entities
    that you've marked as internal, saving your API allowance on wasted IP checks
    against your own infrastructure. |

    | Suspicious Threshold | String | Yes | An abuse confidence score equal to, or
    above this threshold will mark the entity as suspicious. Set to 0 to disable.
    |

    | Create Insight | Boolean | No | Create an insight for each IP. |

    | Max Age in Days | String | Yes | Max report age to check. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AbuseIPDB service to ensure the integration is configured
    correctly and the API key is valid.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Key and Verify
    SSL).

    2. Initializes the AbuseIPDB manager.

    3. Executes a test connectivity request by making a GET API call to the AbuseIPDB
    `check` endpoint using a dummy IP address (`1.1.1.1`).

    4. Validates the response and returns a success message if the connection is established,
    or an error message if the API key is invalid or the request fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    network connectivity and authentication credentials. It does not process any case
    entities or modify any data.
