Create Task:
  ai_description: >-
    ### General Description

    Creates a new task in a specific Asana project.


    ### Flow Description

    1. Extracts the provided action parameters: Task Subject, Assignee, Due Date,
    Description, and Project Name.

    2. Makes a GET request to the Asana API to retrieve the project ID associated
    with the provided Project Name.

    3. If an Assignee is specified, makes a GET request to the Asana API to retrieve
    the corresponding user ID.

    4. Makes a POST request to the Asana API to create the new task with the specified
    details.

    5. Attaches a link to the newly created task and the raw JSON response to the
    action results.


    ### Additional Notes

    The `Project Name` and `Assignee` parameters are case-sensitive and must exactly
    match the values in Asana.
