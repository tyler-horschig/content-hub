    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a user to a specific workspace in Asana via a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Asana API to add a user to a workspace,
      which mutates external data. It does not fetch contextual data for enrichment,
      nor does it mutate internal SecOps data, update entities, create insights, or
      add case comments.
