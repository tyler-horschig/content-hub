    ### General Description

    Retrieves the details of a specific task from Asana using its Task ID.


    ### Flow Description

    1. Extracts the `Task ID` parameter provided by the user.

    2. Initializes the AsanaManager with the integration's authentication token and
    base URL.

    3. Makes a GET request to the Asana API to fetch the details of the specified
    task.

    4. If the task is found, adds a link to the task in the SecOps platform and attaches
    the task details as a JSON result.

    5. Returns a success or failure message based on whether the task was found.


    ### Additional Notes

    Although the success output message in the script states that the task was "updated
    successfully", the action functionally only retrieves the task details and does
    not perform any updates.
