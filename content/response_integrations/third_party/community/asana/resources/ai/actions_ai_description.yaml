List My Tasks:
  ai_description: >-
    ### General Description

    Retrieves a list of tasks associated with a specific user in Asana. This action
    queries the Asana API to find tasks assigned to a user within a specified workspace
    and can optionally filter the results to show only completed tasks.


    ### Flow Description

    1. Extracts the provided user email, workspace name, and completion status filter
    from the action parameters.

    2. Makes a GET request to the Asana API to resolve the user's email into an Asana
    user ID.

    3. Makes a GET request to the Asana API to resolve the workspace name into a workspace
    ID.

    4. Makes a GET request to fetch the user's specific task list ID using the resolved
    user and workspace IDs.

    5. Makes a GET request to retrieve all tasks from the identified user task list.

    6. Iterates through the retrieved tasks, making a GET request for each task to
    fetch its full details.

    7. Filters the detailed tasks based on the requested `Completed Status`.

    8. Returns the filtered tasks as a JSON result and attaches direct URLs to the
    tasks as links in the SecOps platform.


    ### Additional Notes

    This action does not operate on SecOps entities. It relies entirely on the provided
    action parameters to query Asana. The workspace name parameter is case-sensitive.
