Add User To Workspace:
  ai_description: >-
    ### General Description

    Adds a user to a specific workspace in Asana. This action retrieves the workspace
    ID based on the provided workspace name and then initiates a request to add the
    specified user's email to that workspace, effectively granting them access.


    ### Flow Description

    1. Extracts the `Workspace Name` and `User's Email` from the action parameters.

    2. Makes a GET request to the Asana API to retrieve the workspace ID associated
    with the provided workspace name.

    3. Makes a POST request to the Asana API to add the user to the specified workspace.

    4. Returns the added user details as a JSON result and outputs a success or failure
    message to the case wall.


    ### Additional Notes

    - The `Workspace Name` parameter is case-sensitive.

    - Ensure the provided email address corresponds to a valid user or a user you
    intend to invite to the workspace.
  ai_short_description: >-
    Adds a specified user to a designated workspace in Asana.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
