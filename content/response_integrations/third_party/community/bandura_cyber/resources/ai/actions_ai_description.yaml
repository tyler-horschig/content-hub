Add IP to Allowed Lists:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to an IPv4 Allowed List in Bandura Cyber. This
    action modifies the external system's configuration to ensure the specified IP
    addresses are permitted according to the selected list.


    ### Flow Description

    1. Initializes the Bandura Cyber API client using the provided integration credentials.

    2. Filters the target entities to include only IP addresses (`ADDRESS` entity
    type).

    3. For each valid IP address, retrieves the UUID of the specified Allowed List
    via a GET request to the Bandura Cyber API.

    4. Makes a POST request to the Bandura Cyber API to add the IP address to the
    Allowed List, applying the specified maskbit, description, and expiration date.

    5. Collects the API responses and returns a JSON object containing the details
    of the successfully added entities.


    ### Additional Notes

    - The `List Name` parameter is case-sensitive and must exactly match an existing
    list in Bandura Cyber.

    - The `Maskbit` parameter defaults to 32, meaning it will add a single IP address
    unless a different CIDR mask is provided.
