Add Domain to Allowed Lists:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified domain allowed list in Bandura Cyber.


    ### Flow Description

    1. Extracts the target list name, description, and expiration date from the action
    parameters.

    2. Filters the target entities to include only URL entities.

    3. Iterates over the filtered entities and parses the domain from the URL using
    `urlparse`.

    4. Makes a POST request to the Bandura Cyber API to add each parsed domain to
    the specified allowed list.

    5. Returns a JSON result containing the details of the added domains and a summary
    message.


    ### Additional Notes

    The action requires the exact, case-sensitive name of the allowed list.
