    from the action configuration.

    2. Validates the IP addresses, removing duplicates and invalid formats, and checks
    the date/size parameters.

    3. Makes a GET request to the Team Cymru Scout API (`/ip/{ip}/details`) for each
    valid IP address to fetch communications data (specifically the `comms` section).

    4. Aggregates the responses and generates data tables (e.g., Peers, Account Usage)
    to display the results.

    5. Returns the aggregated JSON response and outputs the execution status.


    ### Additional Notes

