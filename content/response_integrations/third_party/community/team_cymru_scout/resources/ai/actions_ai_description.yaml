Enrich IPs:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the Team Cymru Scout platform. This action
    retrieves threat intelligence, including ratings and tags, to evaluate the risk
    of the IP addresses. It updates the entity's suspicious status based on the rating
    and appends the enrichment data to the entity's additional properties.


    ### Flow Description

    1. Collects all IP Address entities from the target entities.

    2. Calls the Team Cymru Scout API (`/ip/foundation`) to fetch summary data for
    the collected IP addresses in batches.

    3. Iterates over the target entities and checks if each entity was already enriched
    in the last 24 hours by evaluating the `TCS_last_enriched` key in its additional
    properties.

    4. If not recently enriched, extracts the enrichment data (rating and tags) from
    the API response.

    5. Updates the entity's `is_suspicious` flag to True if the rating is "malicious"
    or "suspicious".

    6. Appends the enrichment data to the entity's additional properties with a "TCS"
    prefix and sets `is_enriched` to True.

    7. Updates the modified entities in the SecOps platform.

    8. Returns the summary data as a JSON result.


    ### Additional Notes

    Entities that have been enriched within the last 24 hours are skipped to optimize
    API usage.
  ai_short_description: >-
    Enriches IP Address entities using the Team Cymru Scout platform by retrieving
    threat intelligence, updating the entity's suspicious status, and appending the
    enrichment data to the entity's additional properties.
