Account Usage:
  ai_description: >-
    ### General Description

    Retrieves the current account usage metrics and limits from the Team Cymru Scout
    API. This action is useful for monitoring API quota consumption and remaining
    query limits.


    ### Flow Description

    1. Retrieves integration configuration parameters for authentication.

    2. Initializes the API manager to communicate with the Team Cymru Scout API.

    3. Makes a GET request to the `/usage` endpoint to fetch account usage details.

    4. Parses the response to extract used queries, remaining queries, and query limits.

    5. Returns the data as a JSON result and renders it in a data table within the
    SecOps platform.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
  ai_short_description: >-
    Retrieves the current account usage metrics and limits from the Team Cymru Scout
    API.
