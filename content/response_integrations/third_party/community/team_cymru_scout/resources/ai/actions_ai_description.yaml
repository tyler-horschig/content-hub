Extract Tags:
  ai_description: >-
    ### General Description

    This action extracts tags from a specified IP address and its peers using the
    Team Cymru Scout API. It then checks if any of the user-provided tags are associated
    with the IP address or its peers, returning the matching IPs and their tags.


    ### Flow Description

    1. Extracts the 'IP Address' and 'Tags to Search' parameters.

    2. Validates the provided IP address format.

    3. Makes a GET request to the Team Cymru Scout API (`/ip/{ip}/details`) to retrieve
    details for the specified IP address.

    4. Parses the API response to extract tags associated with the primary IP address
    and its communicating peers.

    5. Compares the extracted tags against the provided 'Tags to Search'.

    6. Returns a JSON result containing the IPs (primary and peers) that have matching
    tags, along with an output message detailing the matches.

    7. Renders an 'Account Usage' data table with API consumption details.


    ### Additional Notes

    None.
