Lookup:
  ai_description: >-
    ### General Description

    Checks if a specific URL is safe for browsing using Google Safe Browsing. It retrieves
    threat intelligence to determine if the provided URL is malicious.


    ### Flow Description

    1. Extracts the target URL from the action parameters.

    2. Initializes the Google Safe Browsing client using the integration API key.

    3. Makes an API call (`lookup_urls`) to Google Safe Browsing to check the URL's
    safety status.

    4. Parses the response to determine if the URL is flagged as malicious.

    5. Attaches the raw response as a JSON result to the action.

    6. Returns a boolean value indicating whether the URL is malicious, along with
    a descriptive message.


    ### Additional Notes

    This action does not operate on SOAR entities directly; it relies on a manually
    or dynamically provided URL parameter.
  ai_short_description: >-
    Checks if a specific URL is safe for browsing by querying Google Safe Browsing
    to determine if it is malicious.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Google Safe Browsing via the `lookup_urls` API
      call. It does not mutate external data, mutate internal data, update entities,
      create insights, modify alert data, or create case comments.
