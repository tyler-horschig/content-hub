Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with Google Safe Browsing to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Initializes the SafeBrowsing manager.

    3. Performs a lookup on a hardcoded test URL (`http://malware.testing.google.test/testing/malware/`)
    to verify API connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used as a "Ping" or test action during integration setup
    and does not process case entities or alerts.
