Delete Attachment:
  ai_description: >-
    ### General Description

    Deletes a specific attachment from a user's mailbox message in Microsoft Graph
    Security. This action initiates a state change on the external Microsoft Graph
    API to remove the specified attachment from the target email message.


    ### Flow Description

    1. Extracts the target User ID, Message ID, and Attachment ID from the action
    parameters.

    2. Authenticates and connects to the Microsoft Graph Security API.

    3. Executes a DELETE request to the Microsoft Graph API endpoint (`/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`)
    to remove the attachment.

    4. Returns the status of the deletion request and adds the response to the action's
    JSON results.


    ### Additional Notes

    Requires appropriate Microsoft Graph API permissions to delete mail attachments.
  ai_short_description: >-
    Deletes a specific attachment from a user's mailbox message in Microsoft Graph
    Security.
