Get User MFA:
  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) statistics and registration details
    for a specified user and any email-like entities from Microsoft Graph Security.
    This action helps analysts understand the authentication posture of users involved
    in a case by returning details such as MFA registration status, enabled status,
    and available authentication methods.


    ### Flow Description

    1. Initializes the Microsoft Graph Security client using the provided integration
    credentials.

    2. Makes a GET request to the Microsoft Graph API (`/beta/reports/credentialUserRegistrationDetails`)
    to fetch MFA statistics for the explicitly provided `User Email` parameter.

    3. Iterates over all target entities attached to the case.

    4. Filters entities by checking if their identifier contains an `@` symbol.

    5. For each matching entity, makes an additional GET request to the Microsoft
    Graph API to fetch its specific MFA statistics.

    6. If the `Create Insight` parameter is set to true, generates a case insight
    for each successfully queried user containing their MFA registration status and
    authentication methods.

    7. Aggregates all retrieved MFA records and returns them as a JSON result.


    ### Additional Notes

    The JSON result will always return the explicitly provided User Email input at
    index zero, followed by any results gathered from the target entities.
  ai_short_description: >-
    Retrieves Multi-Factor Authentication (MFA) statistics and registration details
    for a specified user and any email-like entities from Microsoft Graph Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
