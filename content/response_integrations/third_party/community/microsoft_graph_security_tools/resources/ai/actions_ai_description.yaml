Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Microsoft Graph Security API.


    ### Flow Description

    1. Extracts the integration configuration parameters including Client ID, Secret
    ID, and Tenant ID.

    2. Initializes the Microsoft Graph Security Manager, which makes an API call to
    request an access token from Microsoft Graph (`https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token`).

    3. Returns a successful result if the token is generated and the connection is
    established, otherwise returns a failure message.


    ### Additional Notes

    This action does not require any action-specific parameters and does not operate
    on entities. It is primarily used for integration health checks.
