Delete Message:
  ai_description: >-
    ### General Description

    Deletes a specific email message from one or more user mailboxes using Microsoft
    Graph Security. This action initiates a state change on the external mail server
    to remove the specified message.


    ### Flow Description

    1. Extracts the target `User ID` (or comma-separated list of IDs) and `Message
    ID` from the action parameters.

    2. Establishes an authenticated connection to the Microsoft Graph API.

    3. Iterates through the provided User IDs if multiple are provided.

    4. Sends an HTTP DELETE request to the Microsoft Graph API (`https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}`)
    for each user to delete the specified message.

    5. Returns the status of the deletion request and outputs the result to the case.


    ### Additional Notes

    The `User ID` parameter supports a comma-separated list of email addresses, allowing
    the action to delete the same message ID from multiple mailboxes simultaneously.
