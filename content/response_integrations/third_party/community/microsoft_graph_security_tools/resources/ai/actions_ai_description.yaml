    1. Extracts the target user's email address, select filters, and query parameters
    from the action inputs.

    2. Authenticates and establishes a connection to the Microsoft Graph Security
    API.

    3. Executes a GET request to the `/users/{id}/messages` endpoint, applying any
    provided OData query parameters and select filters to narrow down the results.

    4. Returns the retrieved messages as a JSON object attached to the action's results.


