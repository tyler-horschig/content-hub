Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Cybersixgill Actionable Alerts service by attempting
    to authenticate and retrieve an access token.


    ### Flow Description

    1. Extracts the Cybersixgill client ID and client secret from the integration
    configuration.

    2. Initializes the Cybersixgill client.

    3. Makes an API call to retrieve an access token to verify the provided credentials.

    4. Returns a success message if the connection is established, or an error message
    if the authentication fails.


    ### Additional Notes

    This action is typically used to verify integration settings and does not perform
    any data enrichment or mutation.
  ai_short_description: >-
    Tests the connectivity to the Cybersixgill Actionable Alerts service by attempting
    to authenticate and retrieve an access token.
