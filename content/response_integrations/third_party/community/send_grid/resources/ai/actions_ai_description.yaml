Send Email:
  ai_description: >-
    ### General Description

    Sends an email message using the SendGrid API.


    ### Flow Description

    1. Initializes the SendGrid API client using the configured API token.

    2. Constructs the email message using the provided 'Email From', 'Email To', 'Subject',
    and 'Content' parameters.

    3. Sends the email via the SendGrid API.

    4. If 'Return Message Status' is enabled, saves the response status code and recipient
    details as a JSON result.


    ### Additional Notes

    This action does not operate on entities.
  ai_short_description: >-
    Sends an email message to specified recipients using the SendGrid API.
