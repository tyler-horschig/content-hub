Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SendGrid API and verifies that the provided API token
    has the necessary permissions to send emails.


    ### Flow Description

    1. Retrieves the API token from the SendGrid integration configuration.

    2. Makes an HTTP GET request to the SendGrid API (`/v3/scopes`) to retrieve the
    scopes associated with the provided token.

    3. Parses the response to check if the `mail.send` permission is present in the
    retrieved scopes.

    4. Returns a success message and a true result if the permission is found, otherwise
    returns an error message and a false result.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify the integration configuration
    and ensure the API token is valid and has the correct permissions before executing
    other actions.
  ai_short_description: >-
    Tests connectivity to the SendGrid API and verifies that the configured API token
    has the required permissions to send emails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the SendGrid API to fetch token scopes, but
      this is for connectivity testing, not fetching contextual data on alerts/entities.
      It does not mutate external data, internal data, update entities, create insights,
      modify alert data, or create case comments.
