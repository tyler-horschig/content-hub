Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Cybersixgill DVE Feed integration.


    ### Flow Description

    1. Extracts the Client ID and Client Secret from the integration configuration.

    2. Initializes the Cybersixgill manager.

    3. Makes an API call to retrieve an access token to verify connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This is a standard ping action used to verify credentials and network connectivity.
  ai_short_description: >-
    Tests the connectivity to the Cybersixgill DVE Feed integration by attempting
    to retrieve an access token.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
