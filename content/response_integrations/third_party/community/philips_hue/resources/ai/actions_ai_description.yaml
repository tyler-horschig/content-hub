Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Philips HUE Bridge. This action verifies that the integration
    is correctly configured and can successfully communicate with the Philips HUE
    API.


    ### Flow Description

    1. Extracts the Bridge IP and Authorized Username from the integration configuration.

    2. Initializes the Philips HUE manager with the provided credentials.

    3. Makes an HTTP GET request to the Philips HUE Bridge API base URL to verify
    connectivity.

    4. Returns a success message if the connection is established, or an error message
    if the connection fails.


    ### Additional Notes

    This action is primarily used for diagnostic purposes and does not interact with
    alerts, entities, or case data.
  ai_short_description: >-
    Tests connectivity to the Philips HUE Bridge to ensure the integration is correctly
    configured and can communicate with the API.
