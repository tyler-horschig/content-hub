Turn Off Light:
  ai_description: >-
    ### General Description

    Turns off a specific Philips HUE light by its ID. This action interacts with the
    Philips HUE bridge to change the state of a designated light bulb to "off".


    ### Flow Description

    1. Extracts the `Light ID` parameter provided by the user.

    2. Checks if the specified light ID exists on the Philips HUE bridge via a GET
    request to the `/lights/` endpoint.

    3. If the light exists, checks its reachability via a GET request to the `/lights/{light_id}`
    endpoint.

    4. If reachable, sends a PUT request to the `/lights/{light_id}/state` endpoint
    with the `on` state set to `False` to turn off the light.

    5. Returns the execution status and a JSON result containing the light's state
    details.


    ### Additional Notes

    Requires network connectivity to the Philips HUE bridge and an authorized username
    configured in the integration settings.
  ai_short_description: >-
    Turns off a specific Philips HUE light by its ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a PUT request to the Philips HUE bridge to change the state of a specific
      light bulb to off.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Philips HUE bridge to change the state
      of a light bulb (can_mutate_external_data=true). It does not fetch contextual
