Turn On Light and Color:
  ai_description: >-
    ### General Description

    Turns on a specific Philips HUE light by its ID, applying a chosen color and alert
    effect. This action interacts directly with the Philips HUE bridge to change the
    physical state of the targeted light bulb.


    ### Flow Description

    1. Extracts the `Light ID`, `Color`, and `Alert effect` parameters provided by
    the user.

    2. Verifies if the specified light ID exists on the Philips HUE bridge via a GET
    request to the `/lights/` API endpoint.

    3. Checks the reachability of the light via a GET request to the `/lights/{light_id}`
    API endpoint.

    4. If the light is reachable, sends a PUT request to the `/lights/{light_id}/state`
    API endpoint to turn on the light and apply the specified color and alert effect.

    5. Returns the execution status and light state details as a JSON result to the
    SecOps platform.


    ### Additional Notes

    Requires network connectivity to the Philips HUE bridge and an authorized username
    configured in the integration settings. The available colors and effects are predefined
    and mapped to specific hue codes and API payload values.
