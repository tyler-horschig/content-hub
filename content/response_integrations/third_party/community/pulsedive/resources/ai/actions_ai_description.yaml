Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using Pulsedive. This action retrieves threat intelligence
    including risk levels, risk factors, and user comments. It evaluates the risk
    based on a specified threshold, updates the entity's suspicious status, and generates
    an insight with the analysis results.


    ### Flow Description

    1. Iterates over target entities of type ADDRESS.

    2. Makes a GET request to the Pulsedive API to fetch indicator data and comments
    for each IP address.

    3. Evaluates the retrieved risk score against the provided threshold. If the score
    meets or exceeds the threshold, the entity is marked as suspicious.

    4. Enriches the entity's additional properties with the retrieved threat data.

    5. Creates a case wall data table containing any retrieved comments.

    6. Generates an entity insight detailing the risk factors and threat information
    (conditionally based on the `Only Suspicious Entity Insight` parameter).

    7. Updates the enriched entities within the Google SecOps platform.

    8. Returns a JSON result containing the comprehensive enrichment data.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches IP Address entities using Pulsedive by retrieving threat intelligence,
    risk levels, and comments, and updates the entity's suspicious status based on
    a specified threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Pulsedive API to fetch indicator data.
      It does not mutate external data. It updates internal entities with enrichment
      data and creates insights.
