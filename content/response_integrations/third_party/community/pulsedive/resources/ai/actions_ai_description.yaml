    Retrieves detailed threat information from Pulsedive based on a specified Threat
    Name or Threat ID. This action fetches threat intelligence, including risk summaries,
    comments, and related news, to provide context on specific threats.


    ### Flow Description

    1. Extracts the `Threat Name` or `Threat ID` from the action parameters.

    2. Makes a GET request to the Pulsedive API to fetch threat details, including
    risk summary, comments, and related news.

    3. If data is found, constructs a data table for any retrieved comments and attaches
    it to the case wall.

    4. Optionally creates a case insight with the threat details if the `Create Insight`
    parameter is enabled.

    5. Returns the threat data as a JSON result.


    ### Additional Notes

    Either `Threat Name` or `Threat ID` must be provided for the action to execute
    successfully.
