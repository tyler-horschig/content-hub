Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Pulsedive. This action retrieves threat intelligence
    data, risk scores, and user comments associated with the URL. It evaluates the
    risk based on a specified threshold, updates the entity's suspicious status, enriches
    its properties, and generates an insight with the analysis results.


    ### Flow Description

    1. Iterates over the target entities and filters for URL entities.

    2. Makes a GET request to the Pulsedive API (`/api/info.php`) to fetch indicator
    data and associated comments for each URL.

    3. Evaluates the retrieved risk score against the provided `Threshold` parameter.
    If the risk meets or exceeds the threshold, the entity is marked as suspicious.

    4. Enriches the entity's additional properties with the retrieved threat intelligence
    data.

    5. Creates a data table on the case wall containing the retrieved comments (if
    any).

    6. Generates an insight for the entity based on the configuration (can be restricted
    to only suspicious entities).

    7. Updates the entities in the Google SecOps platform with the new enrichment
    data and status.


    ### Additional Notes

    The action can be configured to limit the number of comments retrieved and to
    only create insights for entities that are deemed suspicious based on the threshold.
