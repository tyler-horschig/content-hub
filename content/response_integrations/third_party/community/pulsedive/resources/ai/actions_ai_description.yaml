Scan Indicator:
  ai_description: >-
    ### General Description

    Submits indicators to Pulsedive for active or passive scanning and retrieves the
    analysis results to enrich the entities. This asynchronous action evaluates the
    returned risk score against a specified threshold to determine if the entity should
    be marked as suspicious, and provides detailed threat intelligence and comments.


    ### Flow Description

    1. Iterates through all target entities provided to the action.

    2. Submits each entity's identifier to Pulsedive for scanning via a POST request
    to the `/api/analyze.php` endpoint.

    3. Periodically checks the status of the scan until it is completed.

    4. Retrieves the scan report and evaluates the risk score against the provided
    threshold.

    5. Updates the entity's suspicious status if the threshold is met or exceeded.

    6. Enriches the entity with the scan data and optionally adds retrieved comments
    to the action's data tables.

    7. Creates an insight for the entity based on the scan results.


    ### Additional Notes

    The action runs asynchronously. Active scans reach out directly to the indicator
    and are more noisy, while passive scans fetch existing data without direct interaction.
