Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for a specific assignment associated with an entity
    (Host or Account) in Vectra RUX.


    ### Flow Description

    1. Validates the provided `Entity ID` and `User ID` to ensure they are valid integers.

    2. Makes a GET request to the Vectra RUX API to fetch the entity information based
    on the `Entity ID` and `Entity Type` to retrieve the associated Assignment ID.

    3. Makes a PUT request to the Vectra RUX API to update the assignment with the
    new `User ID`.

    4. Returns the updated assignment details as a JSON result and populates a data
    table with the results.


    ### Additional Notes

    If the specified entity does not have an active assignment, the action will fail
    and return an error.
  ai_short_description: >-
    Updates the assigned user for a specific assignment associated with a Host or
    Account entity in Vectra RUX.
