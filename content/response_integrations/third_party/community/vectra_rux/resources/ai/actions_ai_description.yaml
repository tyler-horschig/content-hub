    ### General Description

    Retrieves detailed information about a specific entity (Account or Host) from
    Vectra RUX using its unique identifier.


    ### Flow Description

    1. Extracts the `Entity ID` and `Entity Type` parameters from the action configuration.

    2. Validates the `Entity ID` to ensure it is a valid integer.

    3. Makes a GET request to the Vectra RUX API (`api/v3.4/entities/{entity_id}/?type={entity_type}`)
