Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to given entity IDs (Account, Host, or Detection) in VectraRUX.
    This action allows analysts to categorize and label external entities directly
    from the SOAR platform.


    ### Flow Description

    1. Extracts the provided tags, entity IDs, and entity type from the action parameters.

    2. Iterates through the provided list of entity IDs.

    3. For each entity ID, makes a GET request to the VectraRUX API to fetch the currently
    assigned tags.

    4. Merges the existing tags with the new tags to ensure no existing tags are overwritten
    and duplicates are removed.

    5. Makes a PATCH request to the VectraRUX API to update the entity with the combined
    list of tags.

    6. Returns a summary table and JSON result containing the status of the tag updates
    for each processed entity ID.


    ### Additional Notes

    If an entity ID is not found in VectraRUX, the action logs an error for that specific
    ID and continues processing the remaining IDs.
  ai_short_description: >-
    Adds specified tags to given entity IDs (Account, Host, or Detection) in VectraRUX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the tags associated with specific entities (Account, Host, or Detection)
      in the external VectraRUX system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing tags from VectraRUX (fetches_data=true) and then
      makes a PATCH request to update the tags on the external system (can_mutate_external_data=true).
