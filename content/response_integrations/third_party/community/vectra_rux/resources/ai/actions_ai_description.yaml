Assign Group:
  ai_description: >-
    ### General Description

    Adds members to a specific group in Vectra RUX. This action updates the group's
    membership by appending the provided members to it.


    ### Flow Description

    1. Extracts the `Group ID` and `Members` from the action parameters.

    2. Validates the `Group ID` to ensure it is a valid integer.

    3. Makes a PATCH request to the Vectra RUX API (`/api/v3.4/groups/{group_id}`)
    to append the specified members to the group.

    4. Retrieves the updated group details and compares the assigned members against
    the requested members.

    5. Outputs the updated group details as a JSON result and renders an HTML table
    with the assigned members.


    ### Additional Notes

    Ensure that the provided members match the type of the group (e.g., host, IP,
    account, domain) to be successfully assigned.
