Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specified entity (Account, Host, or Detection) in Vectra RUX.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the Note,
    Entity ID, and Entity Type.

    2. Validates that the provided Entity ID is a valid integer.

    3. Calls the Vectra RUX API to add the specified note to the given entity.

    4. Retrieves the response, formats it into a CSV table and JSON, and attaches
    it to the action results.

    5. Returns a success message if the note was added successfully, or an error message
    if the operation failed.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds a note to a specified entity (Account, Host, or Detection) in Vectra RUX.
