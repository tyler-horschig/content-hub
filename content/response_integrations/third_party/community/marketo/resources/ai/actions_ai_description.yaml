Create lead:
  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using the provided user details such as email, first
    name, last name, and country.


    ### Flow Description

    1. Extracts the provided action parameters (Email, First Name, Last Name, Country).

    2. Constructs the lead data payload.

    3. Initializes the Marketo API client.

    4. Makes an API call to Marketo (`create_update_leads` method with action `createOnly`)
    to create the new lead.

    5. Evaluates the response and returns the lead ID if successful, or an error message
    if it fails.

    6. Outputs the JSON result to the playbook.


    ### Additional Notes

    This action does not operate on entities and relies entirely on the provided action
    parameters.
