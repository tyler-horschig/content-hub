Request Campaign:
  ai_description: >-
    ### General Description

    Triggers a specific Marketo campaign for a designated lead using the Marketo API.
    This action allows users to programmatically request a smart campaign execution
    and optionally pass custom tokens to the campaign for personalization or specific
    logic execution.


    ### Flow Description

    1. Extracts the `Campaign Id`, `Lead Id`, and `Tokens Json` from the action parameters.

    2. Parses the `Tokens Json` parameter into a dictionary, automatically lowercasing
    values unless the key contains the word "password".

    3. Initializes the Marketo client using the integration configuration parameters.

    4. Makes an API call (`request_campaign`) to Marketo to trigger the specified
    campaign for the provided lead, passing along the parsed tokens.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action does not operate on SOAR entities and relies entirely on the provided
    action parameters to identify the target campaign and lead.
