Get Lead By Entity Email:
  ai_description: >-
    ### General Description

    Retrieves lead data from Marketo for User entities containing valid email addresses.
    This action queries Marketo for lead details, extracts relevant information (first
    name, last name, email, and lead ID), and enriches the corresponding entities
    within Google SecOps.


    ### Flow Description

    1. Iterates through the target entities provided in the action scope.

    2. Validates if the entity identifier is a properly formatted email address and
    checks if the entity type is `USER`.

    3. Makes an API call to Marketo (`get_multiple_leads_by_filter_type`) to fetch
    lead details using the email address as a filter.

    4. If a lead is found, extracts the first name, last name, email, and lead ID.

    5. Enriches the entity by updating its `additional_properties` with the extracted
    data and marking it as enriched.

    6. Updates the entities in the SecOps platform and returns a JSON result containing
    the enriched data and total lead count.


    ### Additional Notes

    Only User entities with valid email identifiers will be processed. Entities that
    do not match the email regex or are not of type `USER` will be skipped.
