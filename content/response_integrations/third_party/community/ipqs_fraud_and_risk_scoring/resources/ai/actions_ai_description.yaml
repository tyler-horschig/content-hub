Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity to the IPQualityScore (IPQS) server to ensure
    the integration is configured correctly and the service is reachable.


    ### Flow Description

    1. Retrieves the API Key from the integration configuration.

