Enrich Domain:
  ai_description: >-
    ### General Description

    Enriches Domain (Hostname) entities using IPQualityScore (IPQS) Fraud and Risk
    Scoring. It scans domains in real-time to detect suspicious URLs, phishing links,
    malware, and parked domains, providing a risk score and updating the entity's
    suspicious status.


    ### Flow Description

    1. Extracts the `Strictness` and `Fast` parameters.

    2. Iterates over the target entities, filtering for `HOSTNAME` entities.

    3. For each valid entity, makes a POST request to the IPQS API (`https://ipqualityscore.com/api/json/url`)
    to fetch domain risk data.

    4. Parses the response to extract risk scores, malware/phishing indicators, and
    other metadata.

    5. Creates a case insight with the IPQS verdict.

    6. Enriches the entity with the retrieved data, marks it as enriched, and updates
    its suspicious status if applicable.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    The action relies on the IPQS API key configured in the integration.
  ai_short_description: >-
    Enriches Domain (Hostname) entities by querying the IPQualityScore API to retrieve
    real-time risk scores, malware indicators, and phishing detection data, subsequently
    updating the entity's enrichment and suspicious status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the IPQS API via a POST request (which acts as
      a query here). It updates internal entities using `siemplify.update_entities`
      and creates insights using `siemplify.create_case_insight`. It does not mutate
      external data.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
