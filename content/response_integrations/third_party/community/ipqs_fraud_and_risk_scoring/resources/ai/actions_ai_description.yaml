Enrich Phone:
  ai_description: >-
    ### General Description

    Enriches Phone Number entities using the IPQS Fraud and Risk Scoring API to retrieve
    reputation, carrier details, and risk analysis data. This action helps identify
    virtual, disposable, or abusive phone numbers by evaluating them against IPQS
    threat intelligence.


    ### Flow Description

    1. Extracts the `Strictness` and `Country` parameters from the action configuration.

    2. Iterates over the target entities and filters for Phone Number entities.

    3. Makes a POST request to the IPQS API (`https://ipqualityscore.com/api/json/phone`)
    for each valid phone number to retrieve risk and reputation data.

    4. Parses the API response to calculate a fraud score and determine a risk verdict
    (e.g., CLEAN, SUSPICIOUS, HIGH RISK).

    5. Updates the entity's additional properties with the retrieved data, marks it
    as enriched, and sets it as suspicious if the risk score exceeds the threshold.

    6. Creates a case insight and attaches the detailed results as a JSON object and
    a table to the entity.

    7. Saves the updated entities back to the platform.


    ### Additional Notes

    - Stricter checks (configured via the `Strictness` parameter) may provide a higher
    false-positive rate.

    - The action supports providing a default country or a comma-separated list of
    countries to assist in the validation process.
