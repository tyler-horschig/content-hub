    ### General Description

    Enriches IP Address entities using IPQS Fraud and Risk Scoring. It performs real-time
    lookups to determine the risk of an IP address, returning data points such as
    geolocation, ISP, connection type, proxy/VPN status, and an overall fraud score.


    ### Flow Description

    1. Extracts action parameters including strictness, user agent, language, and
    various boolean flags.

    2. Iterates over target entities, filtering for IP Address entities.

    3. For each valid entity, makes a POST request to the IPQS API to fetch IP reputation
    and risk data.

    4. Calculates a risk verdict based on the returned fraud score.

    5. Creates a case insight with the verdict.

    6. Enriches the entity with the retrieved data, updates its suspicious status
    if the risk is high, and saves the updated entity.


