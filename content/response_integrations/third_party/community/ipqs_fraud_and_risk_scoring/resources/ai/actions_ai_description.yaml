Enrich Email:
  ai_description: >-
    ### General Description

    Enriches User entities (specifically those representing email addresses) using
    the IPQualityScore (IPQS) API to retrieve real-time reputation scoring and validation.
    It provides insights into whether the email is disposable, has a poor reputation,
    or is associated with fraudulent behavior.


    ### Flow Description

    1. Extracts action parameters including Abuse Strictness, Fast, Timeout, and Suggest
    Domain.

    2. Iterates over target entities, filtering for User entities where the identifier
    matches an email address format.

    3. Makes a POST request to the IPQualityScore API (`https://ipqualityscore.com/api/json/email`)
    to fetch reputation and validation data for each email.

    4. Parses the response to determine fraud score, validity, and disposable status.

    5. Updates the entity's additional properties with the retrieved data and sets
    its suspicious status if the risk score is high.

    6. Creates a case insight and attaches a data table to the entity.


    ### Additional Notes

    The action uses a POST request to query the API but functions purely as an enrichment
    step and does not mutate external data.
