Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Docker Hub API to verify integration configuration and
    network access. Note: While the original metadata description mentions inviting
    a user, the actual script logic performs a standard connectivity test (Ping).


    ### Flow Description

    1. Retrieves the integration configuration credentials (Username and Password).

    2. Initializes the Docker Hub client and authenticates.

    3. Makes a GET request to the `_catalog` endpoint via the `test_connectivity`
    method to verify API access.

    4. Returns a successful execution state if the connection is established.


    ### Additional Notes

    This action is typically used to verify integration settings and does not perform
    any operational tasks or entity enrichment.
