Invite User:
  ai_description: >-
    ### General Description

    Invites a user to a specific team within a given organization in Docker Hub. This
    action triggers an invitation email to the specified user, allowing them to join
    the designated team and organization.


    ### Flow Description

    1. Initializes the Docker Hub client using the provided integration credentials
    (Username and Password).

    2. Retrieves the target `Organization`, `Team`, and `Email` from the action parameters.

    3. Makes a POST request to the Docker Hub API (`/orgs/{org}/groups/{team}/members`)
    to send the invitation to the specified email address.

    4. Returns a success message and completes the action if the API call is successful.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It relies entirely on
    the provided action parameters to determine the target user and destination team.
  ai_short_description: >-
    Invites a specified email address to join a specific team within a Docker Hub
    organization.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an invitation to a user to join a specific team within a Docker Hub organization,
      creating a pending membership state in the external system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Docker Hub API to send a team invitation,
      which mutates external data by creating a pending membership record. It does
      not fetch contextual data, update internal entities, create insights, or modify
      alert data.
