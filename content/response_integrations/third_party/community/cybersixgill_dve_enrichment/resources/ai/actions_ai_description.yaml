Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Cybersixgill's Dynamic Vulnerability Exploit (DVE)
    Score. This action retrieves threat intelligence, dynamic attributes, and POC
    exploit details from the deep and dark web to provide deeper visibility into the
    real impact of CVEs.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `CVE`.

    3. Makes an API call to Cybersixgill to fetch the DVE score and related vulnerability
    information for each CVE identifier.

    4. Parses the response to extract relevant data, including DVE scores, CVSS scores,
    and NVD links.

    5. Updates the entity's additional properties with the extracted data and marks
    the entity as enriched.

    6. Creates a case insight containing the enrichment details.

    7. Attaches an entity table and JSON results to the action's output.


    ### Additional Notes

    This action specifically targets CVE entities.
  ai_short_description: >-
    Enriches CVE entities by retrieving Cybersixgill's Dynamic Vulnerability Exploit
    (DVE) Score and related threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to Cybersixgill to fetch DVE scores (fetches_data=true).
      It does not mutate external data. It updates the entities with the fetched data
      using `siemplify.update_entities` (can_update_entities=true) and creates case
      insights using `siemplify.create_case_insight` (can_create_insight=true).
