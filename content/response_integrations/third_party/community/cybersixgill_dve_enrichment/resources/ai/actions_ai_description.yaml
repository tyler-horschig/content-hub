Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the Client ID and Client Secret from the integration configuration.

    2. Initializes the Cybersixgill manager.

    3. Makes an API call to the Cybersixgill authentication endpoint to retrieve an
    access token.

    4. Returns a success message if the token is retrieved successfully, or an error
    message if the connection fails.


    ### Additional Notes

    This action is typically used to verify credentials and network access before
    running other actions in the integration.
