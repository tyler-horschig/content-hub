Ping:
  ai_description: >-
    ### General Description

    Checks connectivity to the beSECURE platform by making a test API call to retrieve
    network scans. This action is primarily used to verify that the integration is
    configured correctly and can successfully authenticate and communicate with the
    beSECURE API.


    ### Flow Description

    1. Extracts integration-level configuration parameters including the API Key,
    URL, and SSL verification settings.

    2. Makes an HTTP GET request to the beSECURE `/json.cgi` endpoint with parameters
    to return networks scanned in the last minute (`action="returnnetworks"`).

    3. Evaluates the JSON response to check if an "error" key is present.

    4. Returns a successful execution status if connectivity is established and no
    errors are returned; otherwise, it outputs the error details and fails the action.


    ### Additional Notes

    This action does not require any specific entities or action-level parameters
    to run. It relies entirely on the integration's configuration settings.
  ai_short_description: >-
    Checks connectivity to the beSECURE platform by making a test API call to retrieve
    network scans.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the beSECURE API to fetch network data
      as a connectivity test, so it fetches data. It does not perform any state-changing
      operations (POST/PUT/DELETE) on external systems, so it does not mutate external
      data. It also does not update internal SecOps data like entities, insights,
      alerts, or case comments.
