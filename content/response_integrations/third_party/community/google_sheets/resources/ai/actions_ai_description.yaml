    3. Executes an API call (`del_spreadsheet`) to delete the specified spreadsheet.

    4. Returns a success message if the deletion is successful, or an error message
    if it fails.


    ### Additional Notes

    The Sheet ID can be extracted directly from the Google Sheet's URL (e.g., `https://docs.google.com/spreadsheets/d/{YourSpreadSheetId}/edit#gid=0`).
