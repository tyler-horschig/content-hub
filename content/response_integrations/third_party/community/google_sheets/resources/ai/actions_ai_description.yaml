Create Sheet:
  ai_description: >-
    ### General Description

    Creates a new Google Sheet using the Google Sheets integration. It can also optionally
    share the newly created sheet with specified email addresses, granting them writer
    permissions.


    ### Flow Description

    1. Extracts the provided action parameters, including the desired sheet name and
    any email addresses to share it with.

    2. Authenticates with the Google Sheets API using the configured service account
    credentials.

    3. Makes an API call to Google Drive/Sheets to create a new spreadsheet with the
    specified name.

    4. If email addresses are provided, makes additional API calls to share the sheet
    with each email address, assigning them 'writer' roles.

    5. Returns the ID of the newly created sheet as the action result.


    ### Additional Notes

    The action relies on the `gspread` library and requires valid Google service account
    credentials with appropriate scopes (`https://www.googleapis.com/auth/spreadsheets`,
    `https://www.googleapis.com/auth/drive`).
