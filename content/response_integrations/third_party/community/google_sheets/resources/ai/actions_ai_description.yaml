Add or Update Rows:
  ai_description: >-
    ### General Description

    Adds or updates rows in a specified Google Sheet based on a provided JSON payload.
    The action searches for a specific value in a designated column; if the value
    is found, it updates the existing row, and if not, it appends a new row to the
    sheet.


    ### Flow Description

    1. Extracts action parameters including the Sheet ID, Worksheet Name, JSON payload,
    and column details.

    2. Authenticates with the Google Sheets API using the provided credentials.

    3. Iterates through the provided JSON rows.

    4. For each row, searches for the specified field value in the given column.

    5. If the value is found, updates the existing row within the specified start
    and end columns.

    6. If the value is not found, appends a new row to the sheet with the provided
    values.

    7. Returns the number of updated or added rows and attaches the JSON to the action
    result.


    ### Additional Notes

    The JSON input should contain unique values for the specified field name to ensure
    accurate updates. The Worksheet Name is case-sensitive and defaults to 'Sheet1'
    if not provided.
