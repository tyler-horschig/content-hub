Search Row:
  ai_description: >-
    ### General Description

    Searches for a specific value within a Google Sheets document and retrieves the
    corresponding row data. It connects to the Google Sheets API using provided credentials,
    locates the specified value, and returns the entire row's contents as a JSON result.


    ### Flow Description

    1. Extracts the action parameters including Sheet ID, Worksheet Name, Column Number,
    and Search Value.

    2. Authenticates and establishes a connection to the Google Sheets API using the
    integration's Service Account credentials.

    3. Opens the specified spreadsheet and worksheet (defaults to 'Sheet1' if no worksheet
    name is provided).

    4. Executes a search for the provided value within the worksheet.

    5. If the value is found, retrieves all values from the matching row and appends
    them to the action's JSON result.

    6. Returns the row number as the execution result, or fails the action if the
    value is not found.


    ### Additional Notes

    The action requires a valid Service Account JSON with appropriate scopes to access
    the Google Drive and Google Sheets APIs. Although a 'Column Number' parameter
    is provided, the underlying search operation scans for the value and returns the
    first matching cell's row.
  ai_short_description: >-
