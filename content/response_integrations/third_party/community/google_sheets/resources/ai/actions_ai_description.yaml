Add Row:
  ai_description: >-
    ### General Description

    Adds a new row of data to a specified Google Sheet. This action interacts with
    the Google Sheets API to insert comma-separated values into a designated worksheet,
    allowing for automated data logging and tracking.


    ### Flow Description

    1. Extracts the Google Sheets credentials from the integration configuration.

    2. Retrieves action parameters including the Sheet ID, Worksheet Name, Row Index,
    and the Values to be inserted.

    3. Parses the comma-separated string of values into a list format.

    4. Authenticates and connects to the Google Sheets API using the provided service
    account credentials.

    5. Selects the target worksheet (defaults to the first sheet if no name is provided).

    6. Makes an API call to insert the parsed values as a new row at the specified
    index (or defaults to the first row if no index is provided).

    7. Returns a success or failure status based on the API response.


    ### Additional Notes

    Ensure that the provided Google Service Account has edit access to the target
    spreadsheet. The values must be strictly comma-separated. If the row index is
    not provided, the row is inserted at index 1 by default.
