Add  Permission:
  ai_description: >-
    ### General Description

    Adds permission to a Google Sheet for one or more users. This action interacts
    with the Google Sheets API to grant specific access roles (Owner, Reader, or Writer)
    to specified email addresses for a given spreadsheet.


    ### Flow Description

    1. Extracts the Google Sheets credentials from the integration configuration.

    2. Retrieves the target Sheet ID, desired Role, and target Emails from the action
    parameters.

    3. Authenticates with the Google Sheets API using the provided credentials.

    4. Makes an API call to insert the specified permissions for the users on the
    target spreadsheet.

    5. Returns a success message if the permissions are granted, or an error message
    if the operation fails.


    ### Additional Notes

    Multiple emails can be provided in the 'Emails' parameter by separating them with
    a semicolon (`;`).
  ai_short_description: >-
    Adds permission to a Google Sheet for one or more users by granting specific access
    roles (Owner, Reader, or Writer) to specified email addresses.
