Delete Token:
  ai_description: >-
    ### General Description

    Deletes a specific Webhook token using its token ID. This action removes the token
    from the external Webhook service, effectively making the associated webhook URL
    inaccessible.


    ### Flow Description

    1. Extracts the `Token ID` parameter provided by the user or playbook.

    2. Initializes the WebhookManager using the integration's base URL.

    3. Makes an HTTP DELETE API call to the Webhook service (`/token/{token_id}`)
    to remove the specified token.

    4. Returns a success message if the deletion is completed, or an error message
    if the operation fails.


    ### Additional Notes

    Ensure that the provided Token ID is correct, as this action is irreversible and
    will immediately invalidate any integrations relying on the associated webhook
    URL.
