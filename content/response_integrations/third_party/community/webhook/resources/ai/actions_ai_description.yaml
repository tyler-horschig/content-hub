Ping:
  ai_description: >-
    ### General Description

    This action tests connectivity to the Webhook service to ensure the integration
    is configured correctly and the service is reachable.


    ### Flow Description

    1. Retrieves the base URL from the integration configuration.

    2. Executes an HTTP GET request to the configured base URL via the Webhook API.

    3. Evaluates the HTTP response status code to determine connectivity.

    4. Returns a success message if the connection is established, or an error message
    if the request fails.


    ### Additional Notes

    This action does not require any action-specific parameters and relies solely
    on the integration-level configuration.
