Create Token:
  ai_description: >-
    ### General Description

    Creates a new webhook token on the configured webhook service. This action generates
    a unique webhook URL that can be used to receive incoming HTTP requests or payloads.


    ### Flow Description

    1. Extracts the action parameters including `Default Content`, `Default Content
    Type`, and `Timeout`.

    2. Initializes the WebhookManager with the base URL provided in the integration
    configuration.

    3. Makes an HTTP POST request to the external webhook service's `/token` endpoint
    to generate a new token with the specified attributes.

    4. Constructs the full webhook URL using the returned token UUID.

    5. Outputs the generated webhook URL and attaches the full response as a JSON
    result to the action.


    ### Additional Notes

    This action is useful for dynamically provisioning endpoints to capture external
    callbacks, test connectivity, or receive automated alerts from third-party systems.
  ai_short_description: >-
    Creates a new webhook token on the external webhook service and returns the generated
    webhook URL.
