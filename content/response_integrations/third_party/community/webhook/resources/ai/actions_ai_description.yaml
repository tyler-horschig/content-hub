    reasoning: >-
      The action makes an HTTP POST request to an external webhook service to create
      a new token, which mutates external data. It does not fetch contextual data
      for alerts/entities, nor does it mutate internal SecOps data, update entities,
      create insights, modify alerts, or create case comments.
