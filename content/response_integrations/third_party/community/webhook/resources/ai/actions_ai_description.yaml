Get Webhook Response:
  ai_description: >-
    ### General Description

    Fetches data of requests made to a specific webhook URL token. This action allows
    the user to retrieve either all requests or just the latest request made to the
    webhook, and can operate asynchronously by waiting for a specific timeframe or
    until a request is received.


    ### Flow Description

    1. Extracts the action parameters including the Token ID, Responses To Retrieve,
    TimeFrame, and Pending Condition.

    2. Evaluates the `Pending Condition` to determine the execution flow. If set to
    `TimeFrame`, the action calculates the wait duration and suspends execution until
    the timeframe elapses. If set to `AwaitClick`, it continuously checks for incoming
    requests.

    3. Makes a GET request to the webhook service (`{base_url}/token/{token_id}/requests`)
    to retrieve the request data.

    4. Filters out automated Slackbot requests from the retrieved data.

    5. Depending on the `Responses To Retrieve` parameter, it either retains all valid
    requests or filters the list to include only the latest request.

    6. Returns the fetched request data as a JSON result and completes the action.


    ### Additional Notes

    This is an asynchronous action. It will return an `INPROGRESS` state and run repeatedly
    until the specified condition (either the timeframe elapsing or a request being
    detected) is successfully met.
  ai_short_description: >-
    Fetches request data for a specific webhook URL token, optionally waiting for
    a specified timeframe or an initial request before returning the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the webhook service to retrieve
      incoming requests. It does not mutate external data (no POST/PUT/DELETE requests
      are made in this specific action), nor does it mutate internal data, update
      entities, create insights, modify alerts, or create case comments.
