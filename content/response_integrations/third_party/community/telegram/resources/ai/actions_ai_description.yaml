Get Messages:
  ai_description: >-
    ### General Description

    Retrieves messages from a specific Telegram chat using the Telegram Bot API. The
    bot must be a member of the chat to successfully pull messages.


    ### Flow Description

    1. Extracts the action parameters, including the last message ID and the types
    of messages to retrieve.

    2. Initializes the Telegram API client using the configured bot API token.

    3. Makes an HTTP GET request to the Telegram `getUpdates` API endpoint to fetch
    the requested messages based on the provided offset and allowed updates.

    4. Returns the retrieved messages as a JSON object and attaches them to the action's
    results.


    ### Additional Notes

    - The messages of a chat will be returned only if the bot is a member of this
    chat.

    - The `Message Types` parameter expects a list format as defined in the Telegram
    API documentation.
