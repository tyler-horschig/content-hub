Wait for poll results:
  ai_description: >-
    ### General Description

    This action waits for and retrieves the answers to a specific Telegram poll. It
    continuously checks the poll's status asynchronously until a specified vote threshold
    is met or a designated timeframe expires.


    ### Flow Description

    1. Extracts the poll ID, vote threshold, waiting timeframe, and scan back limit
    parameters.

    2. Calculates the elapsed time since the action started.

    3. Makes a GET request to the Telegram API (`getUpdates`) to fetch recent poll
    updates.

    4. Filters the retrieved updates to find the specific poll ID.

    5. Checks if any of the poll options have reached the required vote threshold.

    6. If the threshold is met, the action completes successfully and returns the
    poll results.

    7. If the threshold is not met and the timeframe has not expired, the action pauses
    and reschedules itself to check again later.

    8. If the timeframe expires without the threshold being met, the action completes
    and returns the current results.


    ### Additional Notes

    This is an asynchronous action that will run repeatedly until the conditions are
    met or the timeout is reached.
