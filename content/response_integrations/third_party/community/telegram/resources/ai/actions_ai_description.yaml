    votes. (After which, action will stop even if threshold wasn't met) |

    | Answer Votes Threshold | String | Yes | The number of votes to some answer that
    suffices (After an option gets this many votes, action will stop waiting) |

    | Poll ID | String | Yes | The ID of the poll to fetch answers to. |
