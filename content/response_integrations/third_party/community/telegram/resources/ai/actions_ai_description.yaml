Get Chat Details:
  ai_description: >-
    ### General Description

    Retrieves the details of a specific chat in Telegram using the provided Chat ID.
    It fetches information such as the chat's invite link and other metadata, returning
    the raw JSON response and attaching the invite link to the action results.


    ### Flow Description

    1. Extracts the `Chat ID` parameter provided by the user.

    2. Initializes the Telegram API client using the configured API token.

    3. Makes an HTTP GET request to the Telegram API (`/getChat` endpoint) to fetch
    the chat details.

    4. Extracts the invite link from the API response.

    5. Attaches the invite link and the raw JSON response to the action results.


    ### Additional Notes

    This action requires the bot to have appropriate permissions to view the chat
    details and generate/retrieve the invite link.
