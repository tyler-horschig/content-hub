Create:
  ai_description: >-
    ### General Description

    Creates new records in a specific Airtable table. This action takes a base ID,
    a table name, and a JSON array of fields and values, and inserts them into the
    specified Airtable database.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Retrieves the `Base id`, `Table name`, and `Json fields` from the action parameters.

    3. Parses the `Json fields` string into a list of dictionary objects representing
    the rows to be inserted.

    4. Iterates through the parsed rows and makes an API call (`airtable.insert`)
    to create each record in the specified Airtable base and table.

    5. Collects the IDs and fields of the newly created records.

    6. Returns the results as a JSON object and outputs a success message indicating
    the number of records added.


    ### Additional Notes

    - This action supports the creation of multiple rows simultaneously by providing
    a JSON array of objects in the `Json fields` parameter.
