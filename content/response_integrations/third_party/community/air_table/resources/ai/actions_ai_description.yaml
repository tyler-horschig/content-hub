AddOrUpdate:
  ai_description: >-
    ### General Description

    Adds new records or updates existing records in an Airtable base. The action searches
    for existing records based on a specified field name and its corresponding value
    from the provided JSON payload. If a matching record is found, it updates the
    existing record; otherwise, it inserts a new record.


    ### Flow Description

    1. Extracts the Airtable API key, Base ID, Table Name, Field Name, and JSON fields
    from the action parameters.

    2. Parses the provided `Json fields` string into a list of dictionaries.

    3. Initializes the Airtable client.

    4. Iterates through each item in the parsed JSON list.

    5. For each item, makes an API call to search Airtable for an existing record
    where the specified `Field name` matches the item's value.

    6. If a matching record is found, makes an API call to update the existing record
    with the new data.

    7. If no matching record is found, makes an API call to insert a new record into
    the table.

    8. Returns a summary message detailing the total number of inserted and updated
    records.


    ### Additional Notes

    The `Json fields` parameter must be a valid JSON string representing a list of
    dictionaries. Each dictionary must contain the key specified in the `Field name`
    parameter to ensure the search and update/insert logic functions correctly.
  ai_short_description: >-
    Adds new records or updates existing records in an Airtable base based on a specified
    field name and JSON payload.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Inserts new records or updates existing records in an external Airtable base.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes API calls to Airtable to search, insert, and update records,
      which mutates external data. It does not fetch security context data for enrichment,
      update internal entities, create insights, or modify case/alert data.
