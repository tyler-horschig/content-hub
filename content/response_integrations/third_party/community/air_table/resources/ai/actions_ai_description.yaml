Update:
  ai_description: >-
    ### General Description

    Updates specific fields in an Airtable table based on a search query. The action
    searches for records matching a specified field name and value, then updates the
    matching records with the provided JSON fields.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves action parameters including the Base ID, Table Name, search criteria
    (Field Name and Field Value), and the JSON payload containing the fields to update.

    3. Makes an API call to search the specified Airtable table for records matching
    the search criteria up to the maximum records limit.

    4. Iterates through the search results and makes an API call to update each matching
    record with the new field values.

    5. Returns a summary message with the number of successfully updated records.


    ### Additional Notes

    The `Json fields` parameter must be a valid JSON string representing a dictionary
    of field names and their new values. If the `Max records` parameter is not a valid
    integer, the script will catch the ValueError and default to 5 records.
