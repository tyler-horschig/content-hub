Get All Records:
  ai_description: >-
    ### General Description

    Retrieves all records from a specified table within an Airtable base. This action
    connects to the Airtable API to fetch rows of data, allowing users to limit the
    number of records returned and sort them by a specific column.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves action parameters including Base ID, Table Name, Max Records, Sort
    By, and Sort Direction.

    3. Initializes the Airtable client with the provided credentials and target base/table.

    4. Makes an API call (`get_all`) to Airtable to fetch the records, applying the
    specified sorting logic and record limits.

    5. Returns the fetched records as a JSON result and outputs a success message
    with the total count of records retrieved.


    ### Additional Notes

    This is a read-only action that does not mutate any data within Airtable or Google
    SecOps.
