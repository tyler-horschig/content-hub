Delete All Records:
  ai_description: >-
    ### General Description

    Deletes all records within a specified table in an Airtable base. This action
    retrieves all existing records from the target table and performs a batch deletion
    to clear its contents.


    ### Flow Description

    1. Initializes the Airtable client using the provided API key, Base ID, and Table
    Name.

    2. Retrieves all existing records from the specified table using the `get_all`
    API call.

    3. Extracts the record IDs from the retrieved data.

    4. Executes a `batch_delete` API call to remove all identified records from the
    table.

    5. Returns a success message containing the total number of deleted records.


    ### Additional Notes

    This action permanently deletes data in the external Airtable system. Ensure that
    the correct Base ID and Table Name are provided to avoid unintended data loss.
