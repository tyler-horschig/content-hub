Enrich Entities From Table:
  ai_description: >-
    ### General Description

    Enriches entities by searching for specific fields within an AirTable database
    table. The action queries AirTable using the entity's identifier or a specified
    enrichment field, retrieves matching records, and appends the flattened record
    data to the entity's additional properties.


    ### Flow Description

    1. Extracts configuration and action parameters including the AirTable Base ID,
    Table Name, and Field Name.

    2. Iterates through the target entities provided in the case.

    3. Determines the search value based on the entity's identifier or a specified
    entity field from its additional properties.

    4. Makes an API call to AirTable (`airtable.search`) to find records matching
    the search value in the specified field.

    5. If a match is found, flattens the returned JSON record and adds it to the entity's
    additional properties using the provided enrichment prefix.

    6. Updates the enriched entities within the Google SecOps platform.

    7. Returns a JSON result containing the matched records and any encountered errors.


    ### Additional Notes

    - If multiple records match the search criteria in AirTable, only the first record
    is used for enrichment.

    - If the specified `Entity Field` is not found in an entity's additional properties,
    the action will log an error for that specific entity and continue processing
    the rest.
  ai_short_description: >-
    Enriches entities by querying an AirTable database table for matching records
    and appending the retrieved data to the entities' additional properties.
