    ### General Description

    Searches for specific records within an Airtable database (base) and table based
    on a provided field name and value.


    ### Flow Description

    1. Extracts the necessary action parameters including Base ID, Table Name, Field
    Name, Field Value, and Max Records.

    2. Initializes the Airtable client using the integration's API key and the provided
    base details.

    3. Executes a search query via the Airtable API (`airtable.search`) to find records
    where the specified field matches the given value.

    4. Collects the matched records up to the specified maximum limit.

    5. Returns the matched records as a JSON result and outputs a summary message
    with the total count of matched records.


