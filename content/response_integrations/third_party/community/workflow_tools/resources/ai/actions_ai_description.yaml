Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Siemplify API and the configured Slack webhook.
    This action is used to verify that the integration is configured correctly and
    can communicate with the necessary services.


    ### Flow Description

    1. Extracts integration configuration parameters including the Siemplify API details
    and Slack webhook URL.

    2. Initializes the WorkflowToolsManager.

    3. Queries the Siemplify API to verify the configured approval manager user roles.

    4. Sends a test message to the configured Slack webhook URL via an HTTP POST request.

    5. Returns a success or failure message based on the execution results.


    ### Additional Notes

    This is a standard ping action used to verify integration configuration and does
    not operate on specific alerts or entities.
