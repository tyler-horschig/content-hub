Approval Request:
  ai_description: >-
    ### General Description

    This action requires approval from a reviewer before continuing a workflow. It
    assigns the current case or alert to a specified approval manager. If configured,
    it can move an alert to a new case if it is grouped with other alerts. It also
    sends a notification to a Slack webhook URL indicating that the case is awaiting
    approval.


    ### Flow Description

    1. Retrieves configuration and action parameters, including the approval manager
    and Slack webhook URL.

    2. Checks if the alert should be moved to a new case if grouped with others.

    3. If the alert is grouped and the move parameter is true, it makes an API call
    to the Siemplify API (`/api/external/v1/cases/MoveAlertToNewCase`) to move the
    alert to a new case.

    4. Assigns the case (or the newly created case) to the approval manager using
    the Siemplify SDK.

    5. Sends a notification message to the configured Slack webhook URL via an HTTP
    POST request.

    6. Returns a JSON result containing the original case ID, new case ID, and approval
    managers.


    ### Additional Notes

    Requires a valid Siemplify API key and root URL, as well as a Slack Webhook URL
    configured in the integration settings.
  ai_short_description: >-
    Assigns a case or alert to a reviewer for approval, optionally moving grouped
    alerts to a new case, and sends a Slack notification.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to a Slack webhook.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Assigns the case to an approval manager and optionally moves an alert to a new
      case using the Siemplify API.
    reasoning: >-
      The action does not fetch external enrichment data. It mutates external data
      by sending a POST request to a Slack webhook. It mutates internal data by assigning
      the case to a user and optionally moving an alert to a new case via the Siemplify
      API. It does not update entities, create insights, or add case comments. It
      modifies alert data by changing its case grouping and assignee.
  entity_usage:
