Approval Response:
  ai_description: >-
    ### General Description

    Allows a designated user to respond to an approval request within a workflow,
    either approving or denying it. The action verifies the user's authorization,
    logs the decision to a Slack channel via a webhook, and optionally adds response
    comments to the case.


    ### Flow Description

    1. Extracts configuration parameters including the Siemplify API details, Slack
    webhook URL, and designated approval managers.

    2. Retrieves the action parameters to determine if the action is approved and
    if there are any response comments.

    3. Verifies if the user requesting the action matches the designated primary or
    secondary approval manager (either by username or role).

    4. If unauthorized, the action is cancelled and an error is logged to Slack.

    5. If authorized, constructs an approval or denial message based on the user's
    response.

    6. If response comments are provided, appends them to the message and adds them
    as a comment to the case.

    7. Sends the final notification message to Slack via the configured webhook.

    8. Returns a JSON result containing the approval status, reviewer name, and comments.


    ### Additional Notes

    The action requires a Slack Webhook URL to be configured in the integration settings
    to send notifications.
  ai_short_description: >-
    Allows an authorized user to approve or deny a workflow request, optionally adding
    comments to the case and sending a notification of the decision to Slack.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an approval or denial notification message to a Slack channel via a webhook.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds response comments to the case if provided.
    reasoning: >-
      The action does not fetch external contextual data. It mutates external data
      by sending a message to Slack. It mutates internal data by adding a comment
      to the case. It does not update entities, create insights, or modify alert data.
      It creates case comments.
