Scan QR Code:
  ai_description: >-
    ### General Description

    Extracts and reads data from a QR code image provided in Base64 format using the
    GOQR API. This action allows analysts to decode QR codes embedded in alerts or
    files to reveal their underlying text or URL content.


    ### Flow Description

    1. Extracts the Base64-encoded string representing the QR code image from the
    action parameters.

    2. Decodes the Base64 string into raw image bytes.

    3. Makes an API call to the GOQR service (`v1/read-qr-code/`) to read and decode
    the QR code data from the image.

    4. Parses the API response and returns the decoded QR code data as JSON results.


    ### Additional Notes

    The action will fail and return an error if the provided Base64 string is invalid,
    or if the uploaded image does not contain a valid or recognizable QR code.
  ai_short_description: >-
    Extracts and reads data from a Base64-encoded QR code image using the GOQR API.
