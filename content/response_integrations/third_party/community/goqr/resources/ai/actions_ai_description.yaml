Generate QR Code:
  ai_description: >-
    ### General Description

    Generates a QR code image from a provided string of data using the GOQR API. This
    utility action encodes text, URLs, or other data into a downloadable QR code format
    and attaches it to the case wall.


    ### Flow Description

    1. Extracts the content, size, image format, error correction level, margin, and
    color parameters from the action configuration.

    2. Makes an API call to the GOQR service to generate the QR code based on the
    provided specifications.

    3. Saves the returned QR code bytes as a temporary file locally.

    4. Attaches the generated image file to the Google SecOps case wall.

    5. Returns the base64 encoded image and configuration details in the JSON results.


    ### Additional Notes

    This action does not run on Google SecOps entities.
  ai_short_description: >-
    Generates a QR code image from a provided string of data using the GOQR API and
    attaches the resulting image to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to generate a QR code image and attaches it to
      the case wall. It does not fetch contextual data for entities, mutate external
      system state, update entities, create insights, modify alert data, or create
      case comments.
