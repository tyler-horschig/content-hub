    | Size | String | No | The dimensions of the generated image in pixels in the
    format {width}x{height}. The maximum value is 1000x1000. |

    | Image Format | Dropdown | No | The file format for the output image. |

    | Error Correction | Dropdown | No | The level of data redundancy applied to the
    QR code. Higher levels increase damage resistance, but result in a more complex
    image. |

    | Margin | String | No | The width of the blank border (quiet zone) around the
    QR code, measured in pixels. |

    | Foreground Color | String | No | The color of the QR code modules in R-G-B format.
    Default: 0-0-0 (black). |

    | Background Color | String | No | The color of the image background in R-G-B
    format. Default: 255-255-255 (white). |
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the QR Server API to ensure the integration is configured
    correctly and can communicate with the external service.


    ### Flow Description

    1. Retrieves the API Root and Verify SSL settings from the integration configuration.

    2. Makes a test request to the QR Server API using a dummy payload.

    3. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    integration to verify network connectivity and configuration parameters.
