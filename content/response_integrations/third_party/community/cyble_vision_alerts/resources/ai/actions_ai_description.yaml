GetAlerts:
  ai_description: >-
    ### General Description

    Fetches Cyble Vision alerts for specified services within a given time window.
    This action retrieves alerts from the Cyble Vision platform based on service names,
    time range, and status filters, and returns them in a structured JSON format.


    ### Flow Description

    1. Extracts the action parameters including the target services, time window (hours
    back), maximum results, and statuses.

    2. Validates the provided service names against known Cyble services.

    3. Calculates the time window for the alert fetch operation.

    4. Makes paginated requests to the Cyble Vision API (`/secops/alerts`) to retrieve
    alerts matching the specified criteria.

    5. Maps the raw Cyble alerts into a SecOps-compatible format.

    6. Returns the fetched and mapped alerts as a JSON result.


    ### Additional Notes

    This action is useful for analyst-triggered ad-hoc pulls (e.g., fetching the latest
    phishing alerts for a domain) or as an enrichment step within a playbook.
  ai_short_description: >-
    Fetches Cyble Vision alerts for specified services within a given time window
    and returns them as a JSON object.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Cyble Vision API (alerts). It does not mutate
      external data, update internal entities, create insights, or modify alert data
      within Google SecOps.
