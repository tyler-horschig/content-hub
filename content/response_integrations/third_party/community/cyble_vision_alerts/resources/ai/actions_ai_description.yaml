GetServicesList:
  ai_description: >-
    ### General Description

    Retrieves a list of all active threat intelligence services from Cyble Vision.
    This action is useful for validating connector configurations, troubleshooting
    authorization, or dynamically populating service filter inputs in playbooks.


    ### Flow Description

    1. Extracts the necessary integration configuration parameters (API Key, Base
    URL, etc.).

    2. Initializes the Cyble API client.

    3. Makes a GET request to the Cyble Vision API (`/secops/alerts/services`) to
    fetch the list of available services.

    4. Filters the retrieved services to include only those that actively support
    alerts.

    5. Formats the results, including the total count and service details (name, display
    name, and alert allowance), and attaches them to the action's JSON result.


    ### Additional Notes

    This action does not require any specific entities to run and operates globally
    based on the integration's configuration.
