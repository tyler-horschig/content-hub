    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of an alert in the external Cyble Vision platform.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the custom fields (Status, LastSyncAt) on the local SecOps alert and
      adds an audit comment to the case wall.
    reasoning: >-
      The action mutates external data by making a PUT request to the Cyble API to
