UpdateAlertStatus:
  ai_description: >-
    ### General Description

    Updates the status of a Cyble Vision alert in the Cyble platform and synchronizes
    the updated status back to the corresponding Google SecOps alert.


    ### Flow Description

    1. Extracts the action parameters: Cyble Alert ID, Cyble Service, and New Status.
    If the ID or Service are not provided, it attempts to auto-populate them from
    the current alert's custom fields.

    2. Validates the inputs to ensure all required fields are present and the new
    status is a valid Cyble status.

    3. Constructs the update payload mapping the SecOps status to the Cyble status.

    4. Makes a PUT request to the Cyble API to update the alert's status.

    5. On success, updates the `Status` and `LastSyncAt` custom fields on the local
    SecOps alert.

    6. Appends an audit comment to the SecOps case wall indicating the successful
    update.


    ### Additional Notes

    This action can be triggered automatically from playbooks when an analyst closes
    or triages a case, or manually from the action panel. If the Cyble API update
    fails, the action will raise an exception to allow playbook error routing.
  ai_short_description: >-
    Updates the status of a Cyble Vision alert in the external Cyble platform and
    synchronizes the changes to the local SecOps alert custom fields.
  capabilities:
    can_create_case_comments: true
