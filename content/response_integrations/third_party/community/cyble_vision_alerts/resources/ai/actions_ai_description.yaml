UpdateAlertSeverity:
  ai_description: >-
    ### General Description

    Updates the severity of a specific alert in Cyble Vision. This action initiates
    a state change on the external Cyble platform to reflect the new severity level
    and updates the local SecOps alert's additional data to maintain synchronization.


    ### Flow Description

    1. Extracts the action parameters, falling back to the current alert's additional
    properties for the Cyble Alert ID and Cyble Service if not explicitly provided.

    2. Validates the inputs and normalizes the severity value.

    3. Constructs the update payload and sends a PUT request to the Cyble API to update
    the alert's severity.

    4. Updates the local SecOps alert's additional data with the new severity and
    the current synchronization timestamp.

    5. Adds a comment to the SecOps case detailing the successful update.


    ### Additional Notes

    Accepts both SecOps string severities and SecOps integer severities (e.g., "-1"
    = CRITICAL, "2" = HIGH) to ensure playbook mappings work without requiring string
    conversion blocks.
  ai_short_description: >-
    Updates the severity of a specific alert in Cyble Vision and synchronizes the
    local alert's additional data.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the severity of a specific alert in Cyble Vision.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the alert's additional data with the new severity and sync time, and
      adds a comment to the case.
    reasoning: >-
      The action makes a PUT request to the Cyble API to update the severity of an
      alert, which mutates external data. It also updates the local alert's additional
      data and adds a case comment, which mutates internal data. It does not fetch
      data, update entities, or create insights.
