Get a Leaderboard Analytics:
  ai_description: >-
    ### General Description

    Fetches analytics for specified leaderboards within a given date range from Vanilla
    Forums. This action retrieves statistical data about user activity and rankings
    based on the provided leaderboard names and timeframes.


    ### Flow Description

    1. Extracts the action parameters including the comma-separated list of leaderboards,
    the amount limit, and the start and end dates.

    2. Splits the provided leaderboards string into a list of individual leaderboard
    names.

    3. Iterates over each leaderboard name and makes a GET request to the Vanilla
    Forums API (`/v2/analytics/leaderboard`) to fetch the analytics for that specific
    board within the specified date range and limit.

    4. Aggregates the fetched analytics data for all requested leaderboards.

    5. Attaches the aggregated data to the action's JSON result.


    ### Additional Notes

