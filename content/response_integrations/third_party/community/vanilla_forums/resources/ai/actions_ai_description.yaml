Add User:
  ai_description: >-
    ### General Description

    Creates a new user account in Vanilla Forums with the provided details such as
    name, email, role, and password. It also handles username duplicity by optionally
    appending special characters to the username if it already exists.


    ### Flow Description

    1. Extracts action parameters including the user's first name, last name, email,
    role ID, and password.

    2. Validates the provided password to ensure it meets the minimum security requirements
    (at least 6 characters, containing both letters and digits).

    3. Checks if a user with the same name already exists in Vanilla Forums by making
    a GET request to the Vanilla API.

    4. If a duplicate name is found and the `Override Name Duplicity` parameter is
    enabled, iterates through the provided `Additional Identifiers` to generate a
    unique username.

    5. Executes a POST request to the Vanilla API to create the new user account with
    the finalized details.

    6. Returns the newly created user's details as a JSON result.


    ### Additional Notes

    If the password does not meet the required standard, or if all generated usernames
    using the provided additional identifiers are already taken, the action will fail
    and return an error.
  ai_short_description: >-
    Creates a new user account in Vanilla Forums with the specified details, handling
    potential username duplications if configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user account in Vanilla Forums.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Vanilla Forums API to create a new user,
      which mutates external data. It does not fetch contextual data for enrichment,
      nor does it mutate internal SecOps data, update entities, create insights, modify
      alerts, or create case comments.
