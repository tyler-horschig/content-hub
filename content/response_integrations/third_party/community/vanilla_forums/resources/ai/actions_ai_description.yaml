    Generates a random password that meets Vanilla Forums' password complexity requirements.
    The generated password will contain at least one uppercase letter, one lowercase
    letter, and digits to fill the remaining specified length.


    ### Flow Description

    1. Extracts the desired password length from the action parameters.

    2. Validates that the requested length is at least 6 characters.

