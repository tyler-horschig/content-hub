Blocklist - Add Hashes:
  ai_description: >-
    ### General Description

    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
    This action initiates a state change on the external system to prevent the execution
    or presence of the specified malicious files.


    ### Flow Description

    1. Extracts the provided comma-separated list of hashes and the source information
    from the action parameters.

    2. Connects to the Bitdefender GravityZone Control Center API.

    3. Categorizes the provided hashes into MD5 and SHA256 formats.

    4. Submits the categorized hashes to the Bitdefender GravityZone blocklist via
    an API request (`addToBlocklist` method).

    5. Returns the results, including successfully added hashes and any failed ones,
    as a JSON object.


    ### Additional Notes

    Unsupported hash types (anything other than valid MD5 or SHA256) will not be submitted
    to the API and will be returned in the failed hashes list within the JSON result.
  ai_short_description: >-
    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
