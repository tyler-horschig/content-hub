    external_data_mutation_explanation: >-
      Adds the provided file hashes to the Bitdefender GravityZone blocklist.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by adding hashes to a blocklist via the Bitdefender
