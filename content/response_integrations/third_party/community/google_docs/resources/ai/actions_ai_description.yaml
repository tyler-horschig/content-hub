Replace Content:
  ai_description: >-
    ### General Description

    Replaces specific text within a Google Document using the Google Docs API. This
    action takes a Document ID and a JSON-formatted list of search-and-replace rules
    to modify the document's content programmatically.


    ### Flow Description

    1. Extracts the `Document Id` and the `Json` payload containing the text replacement
    rules from the action parameters.

    2. Parses the JSON payload to build a list of `replaceAllText` requests, mapping
    the `text_to_search`, `text_to_replace`, and `match_case` values.

    3. Authenticates with the Google Docs API using the integration's service account
    credentials.

    4. Executes a `batchUpdate` API call to the Google Docs API to apply the text
    replacements to the specified document.

    5. Returns the API response as a JSON result and completes the action.


    ### Additional Notes

    The `Json` parameter must follow a specific structure containing an `items` array.
    Each item in the array must include `text_to_search` (the string to find), `text_to_replace`
    (the string to insert), and `match_case` (a boolean string indicating if the search
    should be case-sensitive).
