Create Content:
  ai_description: >-
    ### General Description

    Creates new content within a specific Google Docs document by inserting text at
    specified indices. This action interacts with the Google Docs API to perform a
    batch update, allowing users to programmatically add text to existing documents.


    ### Flow Description

    1. Extracts the target `Document Id` and the `Json` payload containing the text
    and index locations from the action parameters.

    2. Parses the JSON payload to construct a list of `insertText` requests.

    3. Authenticates with the Google Docs API using the provided integration credentials.

    4. Executes a `batchUpdate` API call to the Google Docs service to insert the
    specified content into the document.

    5. Returns the API response as a JSON result and completes the action.


    ### Additional Notes

    The `Json` parameter must be formatted correctly with an `items` array, where
    each object contains an `index` (integer) and `text` (string) key to specify exactly
    where the text should be inserted.
  ai_short_description: >-
    Creates new content within a specific Google Docs document by executing a batch
    update to insert text at specified indices.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
