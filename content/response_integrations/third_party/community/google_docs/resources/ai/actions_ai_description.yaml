Create Document:
  ai_description: >-
    ### General Description

    Creates a new document in Google Docs and assigns specific sharing permissions
    to designated users.


    ### Flow Description

    1. Extracts the document title, role, and target email addresses from the action
    parameters.

    2. Authenticates with the Google Docs and Drive APIs using the provided credentials.

    3. Makes an API call to Google Docs (`documents().create`) to create a new document
    with the specified title.

    4. Iterates through the provided email addresses and makes API calls to Google
    Drive (`permissions().create`) to assign the specified role (owner, writer, or
    reader) to each user.

    5. Retrieves the newly created document's metadata via the Google Drive API (`files().get`)
    and returns it as a JSON result.


    ### Additional Notes

    Multiple emails can be provided in the 'Emails' parameter by using a semicolon
    (`;`) as a separator. The action explicitly disables email notifications when
    granting permissions.
  ai_short_description: >-
    Creates a new document in Google Docs and assigns specific sharing permissions
    to designated users.
