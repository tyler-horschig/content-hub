Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Imgbb service to ensure the integration is configured
    correctly. This action verifies the provided API key by attempting to upload a
    sample image payload to the Imgbb API.


    ### Flow Description

    1. Retrieves the API key from the integration configuration.

    2. Makes an HTTP POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    with a hardcoded, sample base64 image payload.

    3. Evaluates the HTTP response to confirm successful authentication and connectivity.

    4. Returns a success message if the connection is established and the upload succeeds.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    that the credentials are valid and the service is reachable.
  ai_short_description: >-
    Tests connectivity to the Imgbb service by uploading a sample image payload to
    verify the API key.
