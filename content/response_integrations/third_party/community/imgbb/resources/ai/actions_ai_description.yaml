Upload Image From File Path:
  ai_description: >-
    ### General Description

    Uploads an image from a specified local file path to the Imgbb service and retrieves
    the resulting image URL. This action is useful for hosting images externally and
    obtaining a shareable link.


    ### Flow Description

    1. Extracts the `Image File Path` parameter provided by the user.

    2. Reads the image file from the local directory and converts it into a base64
    encoded string.

    3. Sends a POST request to the Imgbb API with the base64 image data.

    4. Parses the API response to extract the generated image URL.

    5. Attaches the image URL as a link and the full response as a JSON result to
    the action.


    ### Additional Notes

    - Ensure the file path provided is accessible by the environment executing the
    action.

    - The uploaded image is set to expire in 600 seconds (10 minutes) as per the hardcoded
    API URL parameter.
  ai_short_description: >-
    Uploads an image from a local file path to Imgbb and returns the generated image
    URL.
