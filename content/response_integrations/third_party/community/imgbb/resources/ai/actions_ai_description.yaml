    external_data_mutation_explanation: >-
      Uploads a sample image payload to the Imgbb service to verify connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to the Imgbb API to upload a sample image,
      which mutates external data (creates a new image record on the service). It
      does not fetch contextual data, mutate internal SecOps data, update entities,
      create insights, modify alerts, or create case comments.
