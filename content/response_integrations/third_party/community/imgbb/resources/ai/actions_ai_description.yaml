Upload Image From Base64:
  ai_description: >-
    ### General Description

    This action uploads a base64-encoded image to the Imgbb service and retrieves
    the resulting hosted image URL.


    ### Flow Description

    1. Extracts the base64 image string from the action parameters.

    2. Makes an HTTP POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    containing the base64 data.

    3. Parses the JSON response to extract the generated image URL.

    4. Attaches the image URL as a link and a JSON result to the action's output.


    ### Additional Notes

    The uploaded image is configured to expire in 600 seconds (10 minutes) based on
    the hardcoded API URL parameter in the script.
  ai_short_description: >-
    Uploads a base64-encoded image to the Imgbb service and retrieves the hosted image
    URL.
