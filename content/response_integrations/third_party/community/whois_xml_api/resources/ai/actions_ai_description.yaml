      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and applies the filter `if
      (entity.entity_type == EntityTypes.HOSTNAME and not entity.is_internal) or entity.entity_type
      == EntityTypes.URL`. This means it explicitly targets Hostname and URL entities,
      and filters them based on their `entity_type` and `is_internal` attributes.
  outcome_categories:
