Get Domain Details:
  ai_description: >-
    ### General Description

    Retrieves WHOIS registration details for a specified domain using the WHOIS XML
    API. It fetches domain metadata and optionally checks domain availability, returning
    the results as a JSON object for use in subsequent playbook steps.


    ### Flow Description

    1. Extracts the target domain name and availability check preference from the
    action parameters.

    2. Constructs an HTTP GET request to the WHOIS XML API (`https://www.whoisxmlapi.com/whoisserver/WhoisService`).

    3. Executes the API call to fetch the domain's WHOIS details.

    4. Parses the response and attaches the data as a JSON result to the action and
    context details.


    ### Additional Notes

    This action operates on a specific domain provided as an action parameter rather
    than iterating over case entities.
