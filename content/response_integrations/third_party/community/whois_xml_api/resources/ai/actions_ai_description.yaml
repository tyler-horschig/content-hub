Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities using the WHOIS XML API. This action retrieves
    WHOIS registration data and updates the entities' additional properties with the
    extracted registrant details, providing valuable context for investigations.


    ### Flow Description

    1. Iterates through the target entities provided to the action.

    2. Filters the entities to process only external Hostnames and URLs.

    3. Makes an HTTP GET request to the WHOIS XML API (`https://www.whoisxmlapi.com/whoisserver/WhoisService`)
    for each valid entity.

    4. Parses the JSON response to extract the `registrant` details from the `WhoisRecord`.

    5. Updates the entity's `additional_properties` dictionary with the extracted
    registrant data.

    6. Appends the raw JSON response to the action's JSON results.

    7. Calls the SecOps platform to update the enriched entities.


    ### Additional Notes

    This action requires the WHOIS XML API integration to be configured with a valid
    API key. Internal hostnames are automatically skipped.
  ai_short_description: >-
    Enriches external Hostname and URL entities by retrieving WHOIS registration data
    from the WHOIS XML API and updating the entities' additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the WHOIS XML API to fetch WHOIS records,
      meaning it fetches data. It does not perform any state-changing operations on
      external systems (no external mutation). It updates the entities in the platform
      using `siemplify.update_entities`, meaning it can update entities. It does not
      create insights, modify alert data, or create case comments.
  entity_usage:
