Ping:
  ai_description: >-
    ### General Description

    Checks connectivity to the WHOIS XML API to verify that the integration is configured
    correctly and the provided credentials are valid.


    ### Flow Description

    1. Extracts the API key from the integration-level configuration.

    2. Makes an HTTP GET request to the WHOIS XML API using a hardcoded test domain
    (`google.com`).

    3. Evaluates the response content to ensure the API key successfully authenticated.

    4. Returns a successful connection message if the authentication passes, or raises
    an exception if it fails.


    ### Additional Notes

    This is a standard ping action used primarily during integration setup or troubleshooting
    to verify network connectivity and credential validity. It does not process alerts
    or entities.
  ai_short_description: >-
