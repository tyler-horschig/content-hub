Revoke Access:
  ai_description: >-
    ### General Description

    Revokes access for a specific employee in Hibob based on their email address.
    The action checks if the employee exists and verifies their current invitation
    status before initiating the revocation process.


    ### Flow Description

    1. Extracts the target employee's email address from the action parameters.

    2. Makes a GET request to the Hibob API to retrieve the employee's details and
    current status.

    3. Evaluates if the employee exists and whether they are already uninvited.

    4. If the employee is active, makes a POST request to the Hibob API to revoke
    their access (uninvite).

    5. Returns a JSON result indicating whether the employee exists and if the revocation
    was successfully performed.


    ### Additional Notes

    If the employee does not exist or is already uninvited, the action will complete
    successfully but indicate in the JSON result that no revocation was performed.
