Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with properties retrieved from Hibob. This action fetches
    detailed user information from the Hibob platform and appends it to the entity's
    additional properties within Google SecOps.


    ### Flow Description

    1. Initializes the Hibob integration and retrieves API credentials.

    2. Iterates through the target entities provided in the case.

    3. Filters the entities to process only those of type `USER`.

    4. Makes a GET request to the Hibob API (`/v1/people/{employee_identifier}`) to
    fetch user details.

    5. Flattens the retrieved JSON data and prefixes the keys with "Hibob".

    6. Updates the entity's `additional_properties` with the flattened data and marks
    the entity as enriched.

    7. Updates the entities in Google SecOps and returns the raw user data as a JSON
    result.


    ### Additional Notes

    The action extracts a "Get User Image" parameter in the code, but it is not utilized
    in the main flow to fetch or attach images.
  ai_short_description: >-
    Enriches User entities by fetching detailed user information from Hibob and appending
    it to the entity's additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Hibob API to fetch user details. It does
      not mutate external data. It updates internal entities by modifying their `additional_properties`
      and setting `is_enriched` to True, then calls `siemplify.update_entities`. It
      does not create insights, modify alert data, or create case comments.
