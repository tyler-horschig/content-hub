Send Invitation:
  ai_description: >-
    ### General Description

    Sends an invitation to a new or previously disabled employee to log into the Hibob
    system. This action triggers an onboarding or reinvitation flow within Hibob for
    the specified user.


    ### Flow Description

    1. Retrieves the employee's email and the welcome wizard name from the action
    parameters.

    2. Queries the Hibob API (`GET /v1/people/{employee_identifier}`) to fetch the
    employee's details using their email.

    3. Checks if the employee exists and verifies their current invitation status.

    4. If the employee exists and is not already invited, fetches the list of available
    welcome wizards from the Hibob API (`GET /v1/onboarding/wizards`).

    5. Matches the provided wizard name to retrieve its corresponding ID.

    6. Sends a POST request to the Hibob API (`POST /v1/employees/{employee_identifier}/invitations`)
    to dispatch the invitation to the employee using the matched wizard ID.

    7. Returns the execution results and outputs a JSON containing the invitation
    status.


    ### Additional Notes

    The "Welcome Wizard Name" parameter is case-sensitive and must exactly match the
    name configured in Hibob (Settings -> Flows).
  ai_short_description: >-
    Sends an invitation to a new or previously disabled employee to log into the Hibob
