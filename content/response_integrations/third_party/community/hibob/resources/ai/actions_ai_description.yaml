Get User Image:
  ai_description: >-
    ### General Description

    Retrieves the profile image of a specific employee from Hibob using their email
    address. The action returns the image as a base64 encoded string along with its
    URL.


    ### Flow Description

    1. Extracts the `Employee's Email` from the action parameters.

    2. Makes a GET request to the Hibob API (`/v1/people/{email}`) to fetch the employee's
    details and retrieve their internal identifier.

    3. Makes a GET request to the Hibob API (`/v1/avatars/{identifier}`) using the
    internal identifier to fetch the user's avatar image.

    4. Converts the retrieved image content into a base64 encoded string.

    5. Populates the JSON result with the base64 string, the image URL, and a boolean
    indicating if the image exists.


    ### Additional Notes

    If the user is not found or does not have an image associated with their profile,
    the action will gracefully handle the response and return a JSON result indicating
    that the image does not exist.
