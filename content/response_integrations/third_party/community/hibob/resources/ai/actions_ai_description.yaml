    correctly and credentials are valid.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Token).

    2. Sends a GET request to the Hibob `/api/user` endpoint via the `HibobManager`.

    3. Evaluates the HTTP response to determine if the connection is successful.

    4. Returns a boolean value and a success or failure message to the SecOps platform.


