Upload User Image:
  ai_description: >-
    ### General Description

    Uploads an image from a provided URL to a specific employee's profile in Hibob.


    ### Flow Description

    1. Extracts the employee's email and the image URL from the action parameters.

    2. Calls the Hibob API (`get_user_details`) to retrieve the employee's details
    and extract their unique identifier.

    3. If the employee exists, makes a PUT request to the Hibob API (`upload_user_image`)
    to update the user's avatar with the provided image URL.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    The action requires a valid, publicly accessible image URL and an existing employee
    email in Hibob to successfully update the profile.
