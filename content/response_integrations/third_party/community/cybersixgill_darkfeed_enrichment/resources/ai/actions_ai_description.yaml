Enrich Actor:
  ai_description: >-
    ### General Description

    Enriches Threat Actor entities using Cybersixgill Darkfeed. It retrieves information
    about a threat actor's activity in the underground, including shared IOCs, areas
    of activity, targets, and techniques.


    ### Flow Description

    1. Iterates over target entities and filters for Threat Actor entities.

    2. Makes an API call to Cybersixgill to fetch threat actor enrichment data.

    3. Updates the entity's properties, marking it as enriched and suspicious, and
    appending the retrieved data to its additional properties.

    4. Generates case insights, entity tables, and JSON results containing the enrichment
    details.


    ### Additional Notes

    The action relies on the Cybersixgill Darkfeed integration configuration for authentication.
