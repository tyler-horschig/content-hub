Enrich Domain:
  ai_description: >-
    ### General Description

    Enriches Domain (Hostname) entities using Cybersixgill Darkfeed. This action retrieves
    threat intelligence regarding compromised sites or suspicious domains sold on
    the dark web. It updates the entity's suspicious status, enriches its properties,
    and generates an insight with the analysis results.


    ### Flow Description

    1. Iterates over target entities and filters for Hostname entities.

    2. Makes an API call to Cybersixgill to query threat intelligence for each domain.

    3. If data is found, updates the entity's `is_enriched` and `is_suspicious` flags
    to true.

    4. Enriches the entity's additional properties with the retrieved data (e.g.,
    Confidence, Severity, Mitre Tactic).

    5. Creates a case insight and adds an entity table with the enrichment results.


