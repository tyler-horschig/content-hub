Create Instance:
  ai_description: >-
    ### General Description

    Creates a new instance for a specific AMI (Amazon Machine Image) in AWS EC2.


    ### Flow Description

    1. Extracts the provided action parameters including Image ID, Instance Type,
    Max Count, Min Count, and Security Group IDs.

    2. Initializes the AWS EC2 manager with the provided credentials.

    3. On the first run, calls the AWS EC2 API (`run_instances`) to create the requested
    instances.

    4. Checks the state of the newly created instances. If any instance is in a "pending"
    state, the action returns an in-progress status to wait for completion.

    5. On subsequent runs, calls the AWS EC2 API (`describe_instances`) to check the
    status of the pending instances.

    6. Once the instances reach the "running" state, the action completes successfully
    and outputs the instance details as a JSON result.


    ### Additional Notes

    This is an asynchronous action that will continue to run until the created instances
    are fully running or an error occurs.
