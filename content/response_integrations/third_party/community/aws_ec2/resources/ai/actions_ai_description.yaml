Delete Instance:
  ai_description: >-
    ### General Description

    Deletes specific EC2 instances in AWS. This action initiates a termination request
    for the provided instance IDs, effectively shutting down and removing the instances
    from the AWS environment.


    ### Flow Description

    1. Extracts the provided instance IDs from the action parameters.

    2. Iterates through the list of instance IDs.

    3. Makes an API call to AWS EC2 (`terminate_instances`) to delete each instance.

    4. Checks the current state of the instance to verify if it is 'shutting-down'
    or 'terminated'.

    5. Returns the count of successfully deleted instances and their details in a
    JSON result.


    ### Additional Notes

    Deleted instances may remain visible in the AWS console for approximately one
    hour after termination.
