Authorize Security Group Egress:
  ai_description: >-
    ### General Description

    Adds or updates outbound IP permissions (egress rules) to a specific security
    group in an Amazon Web Services (AWS) Virtual Private Cloud (VPC). This action
    modifies the firewall rules of the security group to allow specific outbound traffic.


    ### Flow Description

    1. Extracts the `Group ID` and `IP Permissions` from the action parameters.

    2. Parses the `IP Permissions` JSON string into a dictionary.

    3. Initializes the AWS EC2Manager with the provided integration credentials.

    4. Calls the AWS EC2 API (`authorize_security_group_egress`) to add the specified
    egress rules to the security group.

    5. Returns the response from AWS as a JSON result and outputs a success or failure
    message.


    ### Additional Notes

    The `IP Permissions` parameter must be provided in a valid JSON format as expected
    by the AWS API.
  ai_short_description: >-
    Adds or updates outbound IP permissions (egress rules) to a specific security
    group in an AWS VPC.
