Authorize Security Group Ingress:
  ai_description: >-
    ### General Description

    Adds or updates inbound IP permissions (ingress rules) for a specific security
    group in an AWS Virtual Private Cloud (VPC). This action interacts with the AWS
    EC2 service to modify network access controls by applying the specified ingress
    rules.


    ### Flow Description

    1. Extracts the target Security Group ID and the IP permissions (provided in JSON
    format) from the action parameters.

    2. Initializes the AWS EC2 client using the integration's configured credentials
    and region.

    3. Makes an API call to AWS EC2 (`authorize_security_group_ingress`) to apply
    the specified ingress rules to the security group.

    4. Returns the AWS API response as a JSON result and outputs a success or failure
    message to the case wall.


    ### Additional Notes

    The IP permissions must be provided in a valid JSON format that matches the AWS
    boto3 specification for `IpPermissions`.
