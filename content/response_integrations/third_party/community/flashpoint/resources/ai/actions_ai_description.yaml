    limit, and indicator type.

    2. Initializes the FlashpointManager with the provided API key.

    3. Sends a GET request to the Flashpoint API (`/indicators/{basetypes_path}`)
    to fetch the indicators matching the specified query and filters.

    4. Attaches the retrieved data as a JSON result to the action's output.


