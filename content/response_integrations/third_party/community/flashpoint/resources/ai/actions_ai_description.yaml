IOC_Enrichment:
  ai_description: >-
    ### General Description

    Enriches indicator entities using Flashpoint. It queries the Flashpoint API for
    threat intelligence attributes related to the entity identifier, updates the entity's
    properties, marks it as suspicious if data is found, and creates an insight.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Makes a GET request to the Flashpoint API (`/indicators/attribute`) to retrieve
    enrichment data for each entity's identifier.

    3. If data is found, attaches the raw JSON report to the entity.

    4. Flattens the enrichment data and updates the entity's `additional_properties`
    with a "FlashPoint" prefix.

    5. Marks the entity as enriched and suspicious.

    6. Creates an insight for the entity indicating it was marked as suspicious by
    Flashpoint.

    7. Returns a summary message and the JSON results.


    ### Additional Notes

    The action processes all entity types without filtering.
  ai_short_description: >-
    Enriches indicator entities by querying the Flashpoint API for threat intelligence
    attributes, updating entity properties, and generating insights.
