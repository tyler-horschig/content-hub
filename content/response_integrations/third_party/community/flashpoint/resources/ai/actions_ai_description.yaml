Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Flashpoint API to verify integration credentials and
    network access.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Initializes the Flashpoint manager.

    3. Makes a GET request to the Flashpoint `/all/search` API endpoint with a basic
    test query (`+basetypes:(forum) +Carding +Exploit`) to verify authentication and
    connectivity.

    4. Returns a success message if the connection is established and data is returned,
    otherwise returns a failure message.


    ### Additional Notes

    This is a standard ping action used primarily during integration setup or troubleshooting
    to ensure the SOAR platform can successfully communicate with the Flashpoint service.
