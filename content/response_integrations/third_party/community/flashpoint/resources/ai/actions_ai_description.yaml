Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint API to retrieve specific threat
    intelligence data. This action allows users to interact with various Flashpoint
    endpoints by providing a custom JSON payload and specifying the target URL path.


    ### Flow Description

    1. Extracts the `Query Content` (JSON payload) and the `New Query URL` (API endpoint
    path) from the action parameters.

    2. Initializes the Flashpoint manager using the integration's API key.

    3. Makes a POST request to the specified Flashpoint API endpoint, passing the
    parsed JSON query content as the request body.

    4. Retrieves the response and attaches the raw JSON results to the action's output
    in the SecOps platform.


    ### Additional Notes

    - The `Query Content` parameter must be a valid JSON string representing the payload
    expected by the target Flashpoint endpoint.

    - Although the underlying API call uses an HTTP POST method, this action is primarily
    designed for complex search queries (e.g., `/all/search`) and fetching data, rather
    than mutating external state.
  ai_short_description: >-
    Executes a custom JSON-formatted query against a specified Flashpoint API endpoint
    and returns the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by sending a POST request to a Flashpoint API endpoint
      (acting as a complex search query). It does not mutate external data (as it
      targets search endpoints), nor does it mutate internal SecOps data, update entities,
      or create insights.
  entity_usage:
