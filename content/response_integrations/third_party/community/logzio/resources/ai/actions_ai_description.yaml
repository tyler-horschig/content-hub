logzio-get-logs-by-event-id:
  ai_description: >-
    ### General Description

    This action fetches the logs that triggered a specific security event in Logz.io.
    It retrieves the logs as a paginated list in JSON format and attaches them to
    the case as insights.


    ### Flow Description

    1. Extracts the Logz.io API token and region from the integration configuration.

    2. Extracts the `alert_event_id` and `page_size` from the action parameters.

    3. Constructs the appropriate Logz.io API endpoint URL.

    4. Sends a POST request to the Logz.io API (`v2/security/rules/events/logs/search`)
    to fetch the initial page of logs associated with the event ID.

    5. If the total number of available logs exceeds the page size, it concurrently
    fetches the remaining pages using a thread pool.

    6. Aggregates all retrieved logs into a single JSON structure.

    7. Adds the aggregated logs to the action's JSON result.

    8. Creates case insights containing the retrieved log data.


    ### Additional Notes

    The action uses concurrent requests to efficiently handle pagination and retrieve
    large sets of logs.
  ai_short_description: >-
    Fetches the logs that triggered a specific security event in Logz.io and attaches
    them to the case as insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
