json-adapter:
  ai_description: >-
    ### General Description

    Converts raw JSON logs (specifically designed for Logz.io accounts) into a standardized
    JSON format compatible with Siemplify playbooks by extracting specific fields.


    ### Flow Description

    1. Extracts the raw JSON data and the comma-separated list of fields to search
    from the action parameters.

    2. Parses the raw JSON and iterates through its `results` array.

    3. Searches for the specified fields within each result object.

    4. If a field is found, maps it to a standardized format containing `entityType`
    and `entityIdentifier`.

    5. Aggregates the mapped results and outputs them as a JSON result to be used
    in subsequent playbook steps.


    ### Additional Notes

    The action completes successfully only if at least one requested field is found
    in the provided JSON. It operates entirely locally on the provided input and does
    not make any external API calls.
