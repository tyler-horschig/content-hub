Ping:
  ai_description: >-
    ### General Description

    Pings the Logz.io API to test and validate connectivity to both the Logz.io security
    and operations accounts. It verifies the provided API tokens and ensures the integration
    is correctly configured to communicate with the Logz.io service.


    ### Flow Description

    1. Extracts the Logz.io security token, operations token, region, and custom endpoint
    from the integration-level configuration.

    2. Validates the format and presence of the provided tokens.

    3. Constructs the API endpoint URL based on the specified region or custom endpoint.

    4. Sends an HTTP GET request to the Logz.io `v1/account-management/whoami` API
    endpoint using the operations token.

    5. Sends an HTTP GET request to the same endpoint using the security token.

    6. Evaluates the HTTP response status codes (expecting 200 OK) to confirm successful
    connectivity and retrieves the account name.


    ### Additional Notes

    This is a utility action primarily used to verify integration health and credentials.
    It does not interact with SOAR entities, modify any external state, or alter case
    data.
  ai_short_description: >-
    Pings the Logz.io API to test and validate connectivity to both the Logz.io security
    and operations accounts, ensuring the integration credentials are valid.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the Logz.io API solely to validate connectivity
      and credentials. It does not fetch contextual data for alerts or entities, nor
      does it perform any state-changing operations (POST/PUT/DELETE) to mutate external
      data. It does not call any SOAR SDK methods to mutate internal data, update
      entities, create insights, modify alerts, or create case comments.
