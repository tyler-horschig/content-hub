logzio-search-logs:
  ai_description: >-
    ### General Description

    Searches logs in a Logz.io operations account using a specified Lucene query and
    time range. This action retrieves historical log data matching the provided criteria
    and returns it as a structured JSON result for further analysis.


    ### Flow Description

    1. Extracts the Logz.io API token, region, and custom endpoint from the integration
    configuration.

    2. Retrieves the search query, size limit, and time range (`from_time`, `to_time`)
    from the action parameters.

    3. Constructs a JSON request body containing the Lucene query and time filters.

    4. Sends a POST request to the Logz.io `v1/search` API endpoint to fetch matching
    logs.

    5. Parses the response and extracts the log entries from the `hits` array.

    6. Attaches the retrieved logs as a JSON result to the action output.


    ### Additional Notes

    This action does not operate on specific entities. The maximum number of logs
    returned per query is limited to 1000. Time parameters accept various formats
    supported by the `dateparser` library, including Unix timestamps and relative
    times.
  ai_short_description: >-
    Searches logs in a Logz.io operations account based on a provided Lucene query
    and time range, returning the matching log entries as a JSON result.
