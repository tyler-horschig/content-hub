Ping:
  ai_description: >-
    ### General Description

    Pings the Superna Zero Trust API to verify connectivity and health status. This
    action acts as a basic healthcheck to ensure the integration can successfully
    communicate with the Eyeglass appliance.


    ### Flow Description

    1. Extracts integration-level configuration parameters, including the API token,
    Eyeglass IP address, and SSL verification settings.

    2. Constructs the healthcheck API endpoint URL (`/sera/v1/healthcheck`).

    3. Executes an HTTP GET request to the constructed endpoint.

    4. Evaluates the HTTP response and returns the execution status (Completed, Failed,
    or Timed Out) along with the response text or error message.


    ### Additional Notes

    This action does not require any specific entities to run and is primarily used
    for diagnostic and connectivity testing purposes.
  ai_short_description: >-
    Pings the Superna Zero Trust API healthcheck endpoint to verify connectivity and
    system health.
