Superna Snapshot Critical NAS Data:
  ai_description: >-
    ### General Description

    Initiates a snapshot of critical NAS data using the Superna Zero Trust API. It
    triggers a ransomware critical paths snapshot on the configured Eyeglass appliance
    to secure data states.


    ### Flow Description

    1. Retrieves integration configuration parameters including the API token, Eyeglass
    IP, and SSL verification settings.

    2. Constructs the API endpoint URL for the ransomware critical paths snapshot
    (`/sera/v2/ransomware/criticalpaths`).

    3. Executes an HTTP POST request to the Superna Zero Trust API to trigger the
    snapshot process.

    4. Returns the API response text as the result value and updates the execution
    state based on the success or failure of the request.


    ### Additional Notes

    This action does not operate on specific entities and relies entirely on integration-level
    configuration parameters to communicate with the Superna Zero Trust appliance.
