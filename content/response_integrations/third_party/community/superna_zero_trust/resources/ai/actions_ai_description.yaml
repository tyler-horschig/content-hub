      The action makes an HTTP GET request to fetch healthcheck data from the Superna
      Zero Trust API, so fetches_data is true. It does not perform any state-changing
      operations (POST/PUT/DELETE) on external systems, nor does it mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
