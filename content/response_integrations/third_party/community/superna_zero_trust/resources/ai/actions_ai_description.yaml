Superna Zero Trust User Lockout:
  ai_description: >-
    ### General Description

    Locks out a suspected user from all Superna-protected NAS storage. This action
    resolves user permissions to data and applies a deny read permission to SMB shares
    to prevent unauthorized access.


    ### Flow Description

    1. Extracts the target `UserName` from the action parameters.

    2. URL-encodes the provided username to ensure safe API transmission.

    3. Constructs the API endpoint URL using the configured Eyeglass IP.

    4. Sends an HTTP POST request to the Superna Zero Trust API (`/sera/v2/ransomware/lockout/{user}`)
    to initiate the lockout process.

    5. Returns the API response and updates the action execution status based on the
    success or failure of the request.


    ### Additional Notes

    This action does not operate on SOAR entities directly; it relies entirely on
    the explicitly provided `UserName` parameter to determine which user to lock out.
  ai_short_description: >-
    Locks out a specified user from all Superna-protected NAS storage by applying
    a deny read permission to SMB shares via the Superna Zero Trust API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a POST request to the Superna Zero Trust API to lock out a user and apply
