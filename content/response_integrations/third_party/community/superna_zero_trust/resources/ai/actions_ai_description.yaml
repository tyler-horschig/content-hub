    NAS storage. This action restores the user's access by interacting directly with
    the Superna Zero Trust API.


    ### Flow Description

    1. Extracts the target `UserName` from the action parameters.

    2. URL-encodes the username to ensure safe transmission in the API request.

    3. Constructs the API endpoint URL using the configured Eyeglass IP and the `/sera/v2/ransomware/unlock/{user}`
    route.

    4. Executes an HTTP POST request to the Superna Zero Trust API to unlock the specified
    user.

    5. Returns the API response text as the result value and updates the action execution
    state based on the success or failure of the request.


    ### Additional Notes

    This action mutates external state by restoring user access on the Superna platform.
    It operates strictly based on the provided username parameter and does not process
    or iterate over SOAR entities.
