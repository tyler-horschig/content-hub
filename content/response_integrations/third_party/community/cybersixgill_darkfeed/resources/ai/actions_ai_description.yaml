Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill Darkfeed API to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Extracts the Client ID and Client Secret from the integration configuration.

    2. Initializes the Cybersixgill client.

    3. Makes an API call (`get_access_token`) to the Cybersixgill API to verify authentication
    and network connectivity.

    4. Returns a success message and a boolean result if the connection is successfully
    established.


    ### Additional Notes

    This is a standard ping action used to verify integration credentials and network
    connectivity. It does not perform any enrichment, data manipulation, or interact
    with case entities.
  ai_short_description: >-
    Tests connectivity to the Cybersixgill Darkfeed API by attempting to retrieve
    an access token using the provided integration credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to retrieve an access token for connectivity
      verification, but it does not fetch contextual data for alerts/entities, mutate
      external data, mutate internal data, update entities, create insights, modify
      alert data, or create case comments.
