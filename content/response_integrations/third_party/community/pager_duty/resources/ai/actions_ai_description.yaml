    This action queries the PagerDuty API to find an exact match for the specified
    email and returns the user's profile details as a JSON result.


    ### Flow Description

    1. Extracts the target email address from the action parameters.

    2. Makes an HTTP GET request to the PagerDuty API (`/users`) using the provided
    email as a query parameter.

    3. Iterates through the returned user list to find an exact match for the email.

    4. Returns the matched user details as a JSON result to the playbook or case.


