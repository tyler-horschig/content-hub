Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in PagerDuty using the provided details such as title,
    email, urgency, and body. It interacts with the PagerDuty API to generate the
    incident and returns the created incident details as a JSON result.


    ### Flow Description

    1. Retrieves the action parameters (Title, Email, Urgency, Details) and integration
    configurations.

    2. Initializes the PagerDuty API client.

    3. Sends a POST request to the PagerDuty API (`/incidents`) to create a new incident
    with the specified parameters.

    4. Returns the created incident data as a JSON result and completes the action.


    ### Additional Notes

    None.
  ai_short_description: >-
    Creates a new incident in PagerDuty with the specified title, urgency, and details.
