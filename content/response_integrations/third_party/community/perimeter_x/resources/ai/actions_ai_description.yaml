Ping:
  ai_description: >-
    ### General Description

    The Ping action is used to test connectivity to the Slack API using the configured
    integration parameters. It ensures that the provided credentials are valid and
    the service is reachable.


    ### Flow Description

    1. Extracts the Slack API Key and Slack Channel from the integration configuration.

    2. Initializes the PerimeterXManager with the extracted credentials.

    3. Executes a POST request to the `https://slack.com/api/auth.test` endpoint to
    verify authentication.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration. It is primarily used for diagnostic and
    setup verification purposes.
  ai_short_description: >-
    Tests connectivity to the Slack API to verify the integration configuration and
    credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Slack 'auth.test' endpoint to verify
      credentials. It does not fetch contextual data for entities, mutate external
      data, mutate internal data, update entities, create insights, modify alert data,
      or create case comments.
