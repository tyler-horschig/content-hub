Gather Remote Agent Datapoints:
  ai_description: >-
    ### General Description

    Gathers diagnostic datapoints and logs from the remote agent machine where the
    action is executed. It collects system load information, agent status, file details,
    and error logs to assist in troubleshooting integration and connector issues.


    ### Flow Description

    1. Extracts the integration name and optional connector name from the action parameters.

    2. Collects agent status information by reading local configuration files (e.g.,
    `agent_status.json`).

    3. Gathers system load data by executing local commands such as `lscpu`, `uptime`,
    and `free`.

    4. Retrieves file information for the agent directory.

    5. Parses and collects error logs from the main agent log and specific connector
    runner logs.

    6. Outputs all collected diagnostic information to the action's log.


    ### Additional Notes

    This action is primarily used for support and troubleshooting purposes. It executes
    local shell commands on the agent host to gather the required telemetry.
  ai_short_description: >-
    Gathers diagnostic datapoints, system load information, and error logs from the
    remote agent machine for troubleshooting purposes.
