Download File To Base64:
  ai_description: >-
    ### General Description

    Downloads a file stored in Google Drive and encodes its content as a Base64 string.
    This action is useful for retrieving files from Google Drive to be used in subsequent
    playbook steps, such as submitting to a sandbox or attaching to an email.


    ### Flow Description

    1. Extracts the `File Id` parameter provided by the user.

    2. Initializes the Google Drive API client using the integration credentials.

    3. Makes an API call to Google Drive to retrieve the file's metadata and content.

    4. Encodes the downloaded file content into a Base64 string.

    5. Returns the Base64 string along with file metadata (name, type, size) as a
    JSON result.


    ### Additional Notes

    The file ID can be found in the Google Drive file URL (e.g., `https://drive.google.com/drive/u/0/folders/{file-id}`).
