Add Permission:
  ai_description: >-
    ### General Description

    Adds a specific permission role (owner, writer, or reader) to a file stored in
    Google Drive for one or more specified email addresses.


    ### Flow Description

    1. Extracts the file ID, role, target email addresses, and notification preference
    from the action parameters.

    2. Initializes the Google Drive API client using the provided credentials.

    3. Iterates through the provided email addresses.

    4. Makes a POST request to the Google Drive API (`permissions().create`) for each
    email to grant the specified role on the file.

    5. Returns a success message indicating the permissions were granted.


    ### Additional Notes

    Multiple email addresses can be provided by separating them with a semicolon (`;`).
    An optional notification email can be sent to the users being granted access.
  ai_short_description: >-
    Adds a specific permission role to a file stored in Google Drive for one or more
    specified email addresses.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specific permission role (owner, writer, or reader) to a file in Google
      Drive for the provided email addresses.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Google Drive API to create a new permission
      for a file, which mutates external data. It does not fetch contextual data,
      mutate internal SecOps data, update entities, or create insights.
