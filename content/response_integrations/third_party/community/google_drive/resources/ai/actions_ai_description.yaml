    1. Extracts the Base64 string, file name, and target email addresses from the
    action parameters.

    2. Connects to the Google Drive API using the provided credentials.

    3. Uploads the file to Google Drive by decoding the Base64 string via an API call.

    4. If email addresses are provided, iterates through them and makes API calls
    to grant 'writer' permissions for the newly uploaded file.

