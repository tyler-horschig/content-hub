Delete User:
  ai_description: >-
    ### General Description

    Deletes or disassociates a user account from Zoom. It can optionally transfer
    the user's existing meetings, webinars, and recordings to another specified user
    before deletion.


    ### Flow Description

    1. Extracts the target user's email and transfer preferences from the action parameters.

    2. Checks if the user has existing recordings, webinars, or meetings (if transfer
    options are enabled) via GET requests to the Zoom API.

    3. Executes a DELETE request to the Zoom API to remove or disassociate the user,
    transferring data to another specified user if applicable.

    4. Returns a JSON result indicating whether the deletion was successful.


    ### Additional Notes

    The action does not operate on SecOps entities but relies on the explicitly provided
    email parameter.
