Create Meeting:
  ai_description: >-
    ### General Description

    Creates a scheduled or instant meeting in Zoom. This action initiates a new meeting
    session on the Zoom platform based on the provided configuration parameters.


    ### Flow Description

    1. Extracts the provided action parameters, including the meeting topic, type,
    start time, duration, time zone, recording preferences, and the host's email address.

    2. Initializes the Zoom API client using the integration credentials.

    3. Makes a POST request to the Zoom API (`/users/{host_email}/meetings`) to create
    the meeting.

    4. If the meeting is successfully created, attaches the meeting join URL as a
    link to the action results and saves the full meeting details as a JSON result.

    5. Returns a success or failure status based on the API response.


    ### Additional Notes

    - The meeting type can be set to 'Instant' or 'Scheduled'. If set to 'Instant',
    the 'Scheduled' meeting configurations (like start time) will be ignored.

    - The start time should be provided in GMT format (`yyyy-mm-dd hh:mm:ss`).
  ai_short_description: >-
    Creates a scheduled or instant meeting in Zoom.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new scheduled or instant meeting in Zoom.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Zoom API to create a new meeting, which
      mutates external data. It does not fetch enrichment data, mutate internal data,
      update entities, or create insights.
