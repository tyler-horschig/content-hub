  ai_description: >-
    ### General Description

    Fetches a specific meeting recording stored in the Zoom cloud using the provided
    Meeting ID. This action retrieves the recording details and provides a direct
    link to the recording.


    ### Flow Description

    1. Extracts the `Meeting ID` parameter from the action configuration.

    2. Initializes the Zoom API client using the provided integration credentials.

    3. Makes a GET request to the Zoom API (`/meetings/{meeting_id}/recordings`) to
    retrieve the recording details for the specified meeting.

    4. Extracts the `share_url` from the API response.

    5. Attaches the recording URL as a link to the action results.

    6. Adds the complete recording details as a JSON result to the action.


