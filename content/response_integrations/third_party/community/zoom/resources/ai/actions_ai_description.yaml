Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with Zoom properties by retrieving user details from the
    Zoom API. The action fetches contextual information about the user and appends
    it to the entity's additional properties within the SecOps platform.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `USER`.

    3. For each valid user entity, makes a GET request to the Zoom API (`/users/{user_email}`)
    using the entity's identifier.

    4. Flattens the retrieved JSON user data and prefixes each key with "Zoom".

    5. Updates the entity's `additional_properties` with the flattened data and marks
    the entity as enriched (`is_enriched = True`).

    6. Updates the entities in the SecOps platform and returns the raw user data as
    a JSON result.


    ### Additional Notes

    - This action only operates on entities of type `USER`.

    - If a user is not found in Zoom, the action will log an error for that specific
    entity and continue processing the remaining entities.
  ai_short_description: >-
    Enriches User entities by retrieving and appending user details from the Zoom
    API to the entity's additional properties.
