    Creates a new user account in Zoom.


    ### Flow Description

    1. Extracts the First Name, Last Name, Email, and User Type from the action parameters.

    2. Initializes the Zoom API client.

    3. Checks if a user with the provided email already exists by making a GET request
    to the Zoom API (`/users/{email}`).

    4. If the user does not exist, sends a POST request to the Zoom API (`/users`)
