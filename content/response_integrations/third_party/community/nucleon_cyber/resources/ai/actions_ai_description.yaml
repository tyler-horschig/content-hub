Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the NucleonCyber API by making a request to the active
    threats feed.


    ### Flow Description

    1. Extracts integration configuration parameters (Username, Password, client name,
    client id) and the action parameter (limit).

    2. Makes a POST request to the NucleonCyber API endpoint (`https://api.nucleoncyber.com/feed/activethreats`).

    3. Evaluates the response status code.

    4. Returns a successful connection message if the status code is 200, otherwise
    raises an exception.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    with valid credentials.
