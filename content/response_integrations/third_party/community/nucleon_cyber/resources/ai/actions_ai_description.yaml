GetIPs:
  ai_description: >-
    ### General Description

    This action makes an API call to the Nucleon Cyber Active Threats API to retrieve
    a JSON object containing recently collected cyber intelligence data.


    ### Flow Description

    1. Extracts the integration configuration parameters and the action parameter
    (`limit`).

    2. Sends an HTTP POST request to the Nucleon Cyber Active Threats API endpoint
    (`https://api.nucleoncyber.com/feed/activethreats`) using the provided credentials
    and limit.

    3. Validates the response status code to ensure successful authentication.

    4. Extracts the `data` section from the API response.

    5. Adds the retrieved data as a JSON result for use in subsequent playbook steps
    and attaches it to the action result context.


    ### Additional Notes

    Although the action uses an HTTP POST request, it functions as a data retrieval
    operation to fetch the threat feed.
  ai_short_description: >-
    Retrieves recently collected cyber intelligence data from the Nucleon Cyber Active
    Threats API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making an HTTP POST request to the Nucleon Cyber
      API to retrieve active threats. It does not mutate external data (the POST is
      used for querying the feed), nor does it mutate internal data, update entities,
      create insights, modify alert data, or create case comments.
  entity_usage:
