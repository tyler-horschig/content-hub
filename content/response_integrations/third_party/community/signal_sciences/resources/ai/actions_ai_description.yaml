Add IP to Block List:
  ai_description: >-
    ### General Description

    Adds specific IP addresses to the block list of a designated site in Signal Sciences.
    This action initiates a state change on the external Web Application Firewall
    (WAF) to prevent network traffic from the specified IP entities or manually provided
    IP addresses.


    ### Flow Description

    1. Extracts the site name, note, and any manually provided IP addresses from the
    action parameters.

    2. Collects IP addresses from the target entities (filtered by `ADDRESS` type)
    and combines them with the manually provided IPs, removing any duplicates.

    3. Retrieves the current block list for the specified site using the Signal Sciences
    API (`GET /corps/{corp_name}/sites/{site_name}/blacklist`).

    4. Iterates through the collected IPs, validating whether each is a valid IPv4
    or IPv6 address.

    5. Checks if the IP is already present in the retrieved block list. If it is,
    the IP is skipped but marked as successful.

    6. If the IP is not in the block list, makes an API call (`PUT /corps/{corp_name}/sites/{site_name}/blacklist`)
    to add it to the block list.

    7. Returns a JSON result containing the successfully added and failed IPs.


    ### Additional Notes

    - Supports both IPv4 and IPv6 addresses.

    - If an IP address is already present in the block list, the action will not attempt
    to add it again but will still report it as a successful operation.
  ai_short_description: >-
    Adds specific IP addresses to the block list of a designated site in Signal Sciences
    to prevent network traffic from those sources.
