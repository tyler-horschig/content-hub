Add IP to Allow List:
  ai_description: >-
    ### General Description

    Adds specified IP addresses to the Allow List for a specific site in Signal Sciences.
    This action ensures that the provided IP addresses are permitted to access the
    site without being blocked by Signal Sciences rules.


    ### Flow Description

    1. Extracts the `Site Name`, `Note`, and any manually provided `IP Address` values
    from the action parameters.

    2. Collects IP addresses from the target entities that match the `ADDRESS` entity
    type.

    3. Retrieves the current allow list for the specified site using the Signal Sciences
    API (`GET /corps/{corp_name}/sites/{site_name}/whitelist`) to check for existing
    entries.

    4. Iterates through the collected IP addresses, validating each as a proper IPv4
    or IPv6 address.

    5. If an IP address is not already in the allow list, it makes an API call (`PUT
    /corps/{corp_name}/sites/{site_name}/whitelist`) to add it with the provided note.

    6. Returns a summary of successfully added and failed IP addresses, along with
    a JSON result containing the operation details.


    ### Additional Notes

    - The action supports both IPv4 and IPv6 addresses.

    - If an IP address is already present in the allow list, the action will skip
    adding it again and mark it as successful.
  ai_short_description: >-
    Adds specified IP addresses (from parameters or entities) to the Allow List for
    a specific site in Signal Sciences.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified IP addresses to the allow list for a specific site in Signal
      Sciences.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making a PUT request to add IPs to the Signal
      Sciences allow list. It does not fetch contextual enrichment data for the user,
      update internal entities, create insights, modify alert data, or create case
      comments.
