Remove IP from Allow List:
  ai_description: >-
    ### General Description

    Removes specific IP addresses from the allow list of a designated site in Signal
    Sciences. This action ensures that previously trusted IP addresses are no longer
    exempt from standard security monitoring and blocking rules.


    ### Flow Description

    1. Extracts the target site name and any manually provided IP addresses from the
    action parameters.

    2. Collects IP addresses from the target entities in the case that match the `ADDRESS`
    entity type.

    3. Retrieves the current allow list for the specified site from the Signal Sciences
    API via a GET request.

    4. Iterates through the collected IP addresses, validating their format (IPv4
    or IPv6).

    5. For each valid IP, checks if it exists in the retrieved allow list.

    6. If a match is found, sends a DELETE request to the Signal Sciences API to remove
    the IP from the allow list.

    7. Outputs a summary of successfully and unsuccessfully removed IP addresses.


    ### Additional Notes

    The action will skip invalid IP addresses and log a warning. If an IP address
    is not found in the allow list, the action will treat it as successfully removed
    and continue execution.
