Get Trust Monitor Events:
  ai_description: >-
    ### General Description

    Retrieves DUO Trust Monitor events from the specified number of days in the past.
    This action connects to the DUO Admin API to fetch historical security events
    and returns them as a structured JSON result for further analysis or processing
    within the SOAR platform.


    ### Flow Description

    1. Extracts the `Number Days Back` parameter to determine the search timeframe.

    2. Calculates the start and end timestamps (in milliseconds) based on the current
    time and the specified days back.

    3. Authenticates with the DUO Admin API using the integration's configured credentials.

    4. Makes an API call (`get_trust_monitor_events_by_offset`) to fetch the Trust
    Monitor events within the calculated timeframe.

    5. Appends the retrieved events to the action's JSON result.


    ### Additional Notes

    Requires DUO Admin API keys configured in the integration settings. The action
    does not operate on specific entities but rather fetches global event logs based
    on the provided time window.
