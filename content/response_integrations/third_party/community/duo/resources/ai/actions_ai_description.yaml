Ping:
  ai_description: >-
    ### General Description

    Verifies the authentication credentials and connectivity to the DUO Auth API.
    This action ensures that the integration keys are valid and that the signature
    is being generated properly.


    ### Flow Description

    1. Extracts the API Hostname, Auth Secret Key, and Auth Integration Key from the
    integration configuration.

    2. Initializes the DUO Auth client using the provided credentials.

    3. Calls the `/check` endpoint via the DUO SDK to validate the keys and signature
    generation.

    4. Returns a success message if the connection is verified, or an error message
    if the check fails.


    ### Additional Notes

    This is a utility action primarily used to test integration connectivity. It does
    not process entities, fetch threat intelligence, or modify any external or internal
    data.
