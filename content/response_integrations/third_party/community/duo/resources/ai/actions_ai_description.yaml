Get Users by Name:
  ai_description: >-
    ### General Description

    Queries the DUO Admin API to retrieve user, authentication, and device data for
    a specified username. This action is useful for gathering contextual information
    about a user's multi-factor authentication (MFA) status and associated devices
    directly from DUO.


    ### Flow Description

    1. Extracts the target `Username` from the action parameters.

    2. Authenticates with the DUO Admin API using the integration's configured credentials
    (API Hostname, Admin Secret Key, Admin Integration Key).

    3. Calls the `get_users_by_name` API endpoint to fetch the user's data.

    4. Parses the response to extract the `user_id` and the full user data payload.

    5. Returns the aggregated user information as a JSON result to the SecOps platform.


    ### Additional Notes

    - This action requires DUO Admin API keys to be properly configured in the integration
    settings.
