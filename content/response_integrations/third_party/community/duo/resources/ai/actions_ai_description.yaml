Get Authentication Logs for User:
  ai_description: >-
    ### General Description

    Retrieves user data and authentication logs for a specified user from DUO MFA
    over a defined number of days. It analyzes the logs to identify and count successful
    authentication sources (such as IP addresses, locations, OS, applications, and
    devices) and filters them against a specified threshold to help determine normally
    seen authentication sources.


    ### Flow Description

    1. Extracts the target username, number of days back, and authentication threshold
    from the action parameters.

    2. Authenticates with the DUO Admin API using the provided integration credentials.

    3. Makes an API call to `get_users_by_name` to retrieve the user's DUO ID.

    4. Makes an API call to `get_authentication_log` to fetch the user's authentication
    logs for the specified timeframe.

    5. Parses the logs to count successful authentications grouped by IP, state, OS,
    application, endpoint key, authentication device, and factor.

    6. Filters the grouped sources, retaining only those that meet or exceed the authentication
    threshold.

    7. Returns the aggregated data and raw logs as a JSON result.


    ### Additional Notes

    Requires DUO Admin API keys. If rate limiting occurs during the API calls, the
    action will automatically pause for 60 seconds and retry the request.
  ai_short_description: >-
    Retrieves user data and authentication logs for a specified user from DUO MFA,
    analyzing and filtering successful authentication sources against a threshold
    to identify known safe entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches user data and authentication logs from the DUO API (fetches_data=true).
      It does not perform any state-changing operations on external systems (can_mutate_external_data=false)
      or internal SecOps data (can_mutate_internal_data=false). It does not update
      entities, create insights, modify alert data, or create case comments.
