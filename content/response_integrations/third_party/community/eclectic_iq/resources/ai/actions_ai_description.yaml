    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to test connectivity. It does not fetch contextual
      data for alerts/entities, mutate external data, mutate internal data, update
