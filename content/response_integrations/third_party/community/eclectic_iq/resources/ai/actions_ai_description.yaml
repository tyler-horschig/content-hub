Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities using EclecticIQ. This action retrieves threat intelligence
    data, including observables and associated entities, from the EclecticIQ platform
    to provide additional context for the target entities.


    ### Flow Description

    1. Iterates through all target entities provided in the case.

    2. Makes a GET request to the EclecticIQ API (`/api/v2/observables`) to fetch
    observable information for the entity identifiers.

    3. Makes a GET request to the EclecticIQ API (`/api/v2/entities`) to fetch associated
    entity information based on the retrieved observable IDs.

    4. Makes a GET request to the EclecticIQ API (`/api/v2/sources`) to fetch source
    information and resolve source IDs to human-readable names.

    5. Parses the retrieved data and updates the entities' additional properties with
    the enrichment data.

    6. Adds entity links, entity tables, and JSON results to the action's output.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    The action marks successfully processed entities as enriched (`is_enriched = True`).
    If any entities are not found in EclecticIQ, they are listed in the output message.
  ai_short_description: >-
    Enriches entities by retrieving threat intelligence data, observables, and associated
    entity context from EclecticIQ.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the EclecticIQ API to fetch observables, entities,
      and sources data (fetches_data=true). It does not perform any state-changing
      operations on external systems (can_mutate_external_data=false). It updates
      the internal entities with the retrieved enrichment data by calling `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
