Send Entities to EclecticIQ:
  ai_description: >-
    ### General Description

    Sends entities from the current case to EclecticIQ as sightings. It can also optionally
    create an indicator entity in EclecticIQ based on the provided parameters.


    ### Flow Description

    1. Extracts the configuration and action parameters, including the EclecticIQ
    Group Name and the Create Indicator flag.

    2. Retrieves the source ID for the specified group from EclecticIQ via a GET request
    to `/private/groups/`.

    3. Constructs a sighting payload containing case details (title, description,
    priority, etc.) and the extracted entities that match supported types.

    4. Optionally constructs an indicator payload if the Create Indicator parameter
    is set to true.

    5. Makes a PUT request to the EclecticIQ API (`/api/v2/entities`) to create the
    sighting and/or indicator.

    6. Adds a comment to the case and an entity link to the action results upon success.


    ### Additional Notes

    Supported entity types include Hostname, Address, Process, File Name, File Hash,
    URL, Email Message, CVE, Credit Card, Phone Number, Threat Actor, and Domain variants.
  ai_short_description: >-
    Sends case entities to EclecticIQ to create sightings and optionally indicator
    entities.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates sighting and optionally indicator entities in EclecticIQ.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the EclecticIQ API to create sighting and
      indicator entities, which mutates external data. It does not fetch contextual
      enrichment data. It adds a comment to the case using `siemplify.add_comment`,
      which creates a case comment.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: true
      child_process: true
      cluster: false
      container: false
      credit_card: true
      cve: true
      cve_id: true
      database: false
      deployment: false
      destination_domain: true
      domain: true
      email_message: true
      event: false
      file_hash: true
      file_name: true
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: false
      process: true
      service: false
      source_domain: true
      threat_actor: true
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `if
      entity.entity_type in ENTITY_MAP`. The `ENTITY_MAP` contains specific entity
      types like HOSTNAME, ADDRESS, PROCESS, PARENTPROCESS, CHILDPROCESS, FILENAME,
      FILEHASH, PARENTHASH, CHILDHASH, URL, EMAILMESSAGE, CVEID, CREDITCARD, PHONENUMBER,
      CVE, THREATACTOR, SOURCEDOMAIN, DESTINATIONDOMAIN, and DOMAIN. Therefore, it
      filters by entity type and targets these specific types.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
