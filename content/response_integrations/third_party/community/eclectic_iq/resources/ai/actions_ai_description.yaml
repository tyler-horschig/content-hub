Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the EclecticIQ platform to verify that the integration is
    configured correctly with valid credentials and network access.


    ### Flow Description

    1. Retrieves the integration configuration parameters (URL, API Token, Verify
    SSL).

    2. Initializes the EclecticIQManager and executes a test connectivity function.

    3. Makes an HTTP GET request to the `/api/v2/sources` endpoint on the EclecticIQ
    platform.

    4. Evaluates the HTTP response to determine if the connection was successful.

    5. Returns a success or failure status based on the response.


    ### Additional Notes

    This is a utility action primarily used during setup or troubleshooting to ensure
    the SOAR platform can communicate with the EclecticIQ instance.
  ai_short_description: >-
    Tests connectivity to the EclecticIQ platform to verify credentials and network
    access.
  capabilities:
