      cve_id: true
      database: true
      deployment: true
      destination_domain: true
      domain: true
      email_message: true
      event: true
      file_hash: true
      file_name: true
      generic: true
      host_name: true
      ip_set: true
      mac_address: true
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: true
      process: true
      service: true
      source_domain: true
      threat_actor: true
      threat_campaign: true
      threat_signature: true
      url: true
      usb: true
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` without applying any type-based
      or property-based filtering. It extracts the identifiers of all target entities
      and queries EclecticIQ for observables. Therefore, it runs on all supported
      entity types and does not filter by any specific attributes.
