Enrich Entity Action Example:
  ai_description: >-
    ### General Description

    This action enriches entities within Google SecOps by appending a timestamp and
    an enrichment flag. It processes entities based on the specified "Entity Type"
    parameter, allowing users to target specific types such as IP, Hash, User, or
    all available entities.


    ### Flow Description

    1. Extracts and validates the "Entity Type" parameter provided by the user.

    2. Determines the target entity types based on the parameter selection.

    3. Iterates over the eligible entities within the alert scope.

    4. For each entity, generates enrichment data containing a current timestamp and
    an "enriched" status flag.

    5. Appends the enrichment data to the entity and constructs a data table with
    the results.

    6. Returns a success message listing the identifiers of all successfully enriched
    entities.


    ### Additional Notes

    This is a sample action designed to demonstrate how to build an enrichment action
    that interacts with entities in Google SecOps. It does not interact with any external
    third-party APIs.
  ai_short_description: >-
    Enriches specified entities with a timestamp and an enrichment flag for demonstration
    purposes.
