Async Action Example:
  ai_description: >-
    ### General Description

    This action executes asynchronously, pausing and re-evaluating until a specified
    tag is attached to a given list of cases (or the current case). It leverages the
    Google SecOps API to fetch case overview details and inspects the tags of each
    case, completing only when the condition is met or the timeout is reached.


    ### Flow Description

    1. Extracts the provided Case IDs and the target Case Tag to wait for.

    2. If no Case IDs are provided, defaults to the current case ID.

    3. Fetches case overview details for each case using the Google SecOps API (`get_case_overview_details`).

    4. Checks if the target tag is present in the case's tags.

    5. If all cases have the tag, the action completes successfully.

    6. If any cases are missing the tag, the action suspends itself and waits for
    the next asynchronous iteration to check again.


    ### Additional Notes

    This is an asynchronous action. Ensure the timeout settings in the IDE are configured
    appropriately to allow sufficient waiting time.
  ai_short_description: >-
    Waits asynchronously until specified cases (or the current case) have a specific
    tag attached.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action reads internal case data using `get_case_overview_details` to check
      for specific tags. It does not fetch external contextual data, mutate external
      systems, mutate internal case data, update entities, or create insights/comments.
