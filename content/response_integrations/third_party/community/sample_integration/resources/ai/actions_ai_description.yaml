Simple Action Example:
  ai_description: >-
    ### General Description

    Fetches exchange rate data for specified currencies and timeframes from the vatcomply.com
    API. It allows users to specify currencies via a comma-separated string or a dropdown
    list, and define a timeframe (e.g., Today, Last 7 Days, Custom) to retrieve the
    relevant financial data.


    ### Flow Description

    1. Validates and extracts the provided currency and timeframe parameters.

    2. Makes a GET request to the vatcomply.com API to retrieve exchange rates for
    the specified dates and currencies.

    3. Formats the retrieved data into data tables and case wall links.

    4. Optionally attaches the raw JSON results to the current case.


    ### Additional Notes

    This action does not operate on Google SecOps entities. The delta between 'Start
    Time' and 'End Time' cannot exceed 7 days.
