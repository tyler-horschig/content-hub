Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Country Flags service by attempting to retrieve the
    flag for a hardcoded country code ("us").


    ### Flow Description

    1. Attempts to load a local cache file (`flags.json`) containing previously fetched
    flags.

    2. Checks if the flag for the United States ("us") is present in the cache.

    3. If not found, makes an HTTP GET request to the Country Flags API (`https://www.countryflags.io/us/flat/64.png`)
    to fetch the flag image.

    4. Returns a successful execution state if the flag is successfully retrieved
    or found in the cache.


    ### Additional Notes

    This action is primarily used as a Ping/connectivity test for the integration.
    It does not process any SOAR entities or require input parameters.
  ai_short_description: >-
    Tests connectivity to the Country Flags service by attempting to fetch a sample
