Get Country Flag:
  ai_description: >-
    ### General Description

    Retrieves the national flag of a specified country as a base64-encoded string.
    It can fetch flags based on a directly provided two-digit country code or by extracting
    country codes from specific fields within the additional properties of target
    entities.


    ### Flow Description

    1. Initializes the action and attempts to load a local cache file of previously
    fetched flags.

    2. Reads the provided parameters for direct country codes or entity fields containing
    country codes.

    3. Iterates through target entities. If an entity has a matching field in its
    additional properties, it extracts the country code.

    4. Checks the local cache for the flag. If not found, makes an HTTP GET request
    to `countryflags.io` to download the flag image.

    5. Converts the downloaded image to a base64 string and stores it in the results
    JSON.

    6. Repeats the fetch and conversion process for any directly provided country
    code parameter.

    7. Updates the local cache file with any newly fetched flags and returns the base64
    data in the action's JSON result.


    ### Additional Notes

    The action relies on `countryflags.io` for fetching the images. It uses a local
    caching mechanism within the run folder to reduce redundant API calls.
  ai_short_description: >-
    Retrieves a country's flag as a base64-encoded string from countryflags.io, using
    either a directly provided country code or by extracting country codes from the
    additional properties of target entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to countryflags.io to fetch image data,
      so it fetches data. It does not perform any state-changing operations on external
      systems (no POST/PUT/DELETE). It does not mutate internal SecOps data (like
      updating entities or adding insights), it only returns a JSON result and updates
      a local cache file.
