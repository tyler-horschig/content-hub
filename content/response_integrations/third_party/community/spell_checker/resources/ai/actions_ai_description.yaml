Spelling Check:
  ai_description: >-
    ### General Description

    Analyzes a provided text string to identify misspelled words and suggests likely
    correct spellings based on word frequency. It utilizes a local spell-checking
    library configured with a custom allowlist of common technology and cybersecurity
    terms.


    ### Flow Description

    1. Retrieves the input text from the action parameters.

    2. Cleans the text by removing special characters, URLs, and email addresses using
    regular expressions.

    3. Processes the cleaned text to identify unknown or misspelled words using the
    local `SpellChecker` library.

    4. Generates a list of suggested candidate corrections for each identified misspelled
    word.

    5. Outputs the findings as a JSON result and a formatted data table within the
    SecOps platform.


    ### Additional Notes

    This action operates locally using a Python library and does not make external
    API calls. It processes raw text input and does not operate on or modify SecOps
    entities.
  ai_short_description: >-
    Analyzes a provided text string to identify misspelled words and suggests likely
    correct spellings based on word frequency.
