Trigger Azure Build:
  ai_description: >-
    ### General Description

    Triggers a pipeline build in Azure DevOps for a specified build definition ID
    and variables. This action initiates a new build process on the external Azure
    DevOps platform and asynchronously monitors its execution status until completion.


    ### Flow Description

    1. Extracts the `Build Definition Id` and `Build Variables` from the action parameters.

    2. Makes a POST request to the Azure DevOps API (`/_apis/build/builds`) to trigger
    a new build pipeline.

    3. Retrieves the generated build ID from the API response.

    4. Asynchronously polls the Azure DevOps API via a GET request to check the status
    of the triggered build.

    5. Continues polling until the build finishes, then returns the final build status
    and result to the SecOps platform.


    ### Additional Notes

    This is an asynchronous action. It will yield execution and periodically wake
    up to query the Azure DevOps API until the triggered build reaches a completed
    or failed state.
  ai_short_description: >-
    Triggers a pipeline build in Azure DevOps using a specified build definition ID
    and variables, and asynchronously monitors its execution status until completion.
