Wait Until Web Resource Is Up:
  ai_description: >-
    ### General Description

    This action checks if a specified web resource is accessible and responding successfully.
    It operates asynchronously, repeatedly polling the provided URL until a successful
    HTTP response is received, effectively pausing the playbook execution until the
    resource is available.


    ### Flow Description

    1. Extracts the target `URL` from the action parameters.

    2. Makes an HTTP GET request to the specified URL with a 5-second timeout.

    3. Evaluates the HTTP response status code.

    4. If the response is successful (HTTP OK), the action completes successfully
    and returns `True`.

    5. If the response is unsuccessful or times out, the action returns an `INPROGRESS`
    status, causing the SOAR platform to re-execute the action later until the resource
    is up.


    ### Additional Notes

    This is an asynchronous action designed to pause playbook execution until a specific
    web service, endpoint, or resource becomes available. It does not process entities
    or return complex data structures.
