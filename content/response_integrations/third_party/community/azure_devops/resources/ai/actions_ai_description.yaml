Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Azure DevOps instance to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Initializes the connection using the provided integration configuration parameters
    (Personal Access Token, Organization, and Base URL).

    2. Authenticates to the Azure DevOps API.

    3. Makes an API call (`get_projects`) to retrieve the first page of projects as
    a connectivity test.

    4. Returns a successful result if the API call completes without errors, or a
    failure message if an exception occurs.


    ### Additional Notes

    This action is typically used during integration setup to verify credentials and
    network access. It does not require any action-specific parameters.
  ai_short_description: >-
    Tests connectivity to the Azure DevOps instance by attempting to authenticate
    and fetch the first page of projects.
