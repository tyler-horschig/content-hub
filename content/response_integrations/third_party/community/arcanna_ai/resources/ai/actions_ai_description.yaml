Get Arcanna decision:
  ai_description: >-
    ### General Description

    Retrieves the AI decision for a specific event from Arcanna.ai. This action polls
    the Arcanna API to check the status of an event's inference and returns the decision
    once it is available.


    ### Flow Description

    1. Extracts the Job ID, Event ID, retry count, and retry interval from the action
    parameters.

    2. Initializes the Arcanna client with the provided API key and URL.

    3. Enters a polling loop, making a GET request to the Arcanna API (`/api/v1/events/{job_id}/{event_id}`)
    to fetch the event status.

    4. If the status is `pending_inference`, the action waits for the configured interval
    and retries.

    5. If the status is `OK`, the action attaches the response as a JSON result and
    completes successfully.

    6. If the status is `ERROR` or the retry period expires without a decision, the
    action fails.


    ### Additional Notes

    Ensure the retry count and seconds per retry are configured appropriately to allow
    enough time for the Arcanna AI model to process the event and generate a decision.
  ai_short_description: >-
    Retrieves the AI decision for a specific event from Arcanna.ai using a polling
    mechanism.
