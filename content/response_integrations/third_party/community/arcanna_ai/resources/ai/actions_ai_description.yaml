Export full event:
  ai_description: >-
    ### General Description

    Retrieves the full details of a specific event from Arcanna.ai using the provided
    Job ID and Event ID. This action is useful for extracting the complete JSON payload
    of an event that has been processed or stored by an Arcanna job.


    ### Flow Description

    1. Extracts the `Job ID` and `Event ID` from the action parameters.

    2. Initializes the Arcanna.ai client using the integration's configuration credentials
    (API Key and URL).

    3. Makes an HTTP GET request to the Arcanna.ai API (`/api/v1/events/{job_id}/{event_id}/export`)
    to fetch the event details.

    4. Returns the retrieved event data as a JSON result attached to the action.


    ### Additional Notes

    This action does not operate on SecOps entities. It relies strictly on the provided
    Job ID and Event ID parameters to locate and export the event.
