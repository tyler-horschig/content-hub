Update alert priority:
  ai_description: >-
    ### General Description

    Updates the priority of the current alert in Google SecOps based on the provided
    input.


    ### Flow Description

    1. Retrieves the current alert identifier from the execution context.

    2. Extracts the `Priority` parameter and validates it against the allowed values.

    3. Verifies that the Google SecOps (Siemplify) version is 5.6 or higher.

    4. Makes a POST request to the internal Google SecOps API (`/external/v1/sdk/UpdateAlertPriority`)
    to update the alert's priority.


    ### Additional Notes

    The priority must be one of the following values: Informative, Low, Medium, High,
    or Critical.
