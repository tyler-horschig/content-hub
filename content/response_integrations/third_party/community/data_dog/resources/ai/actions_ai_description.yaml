Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DataDog platform using the provided integration configuration
    credentials.


    ### Flow Description

    1. Extracts the API Key and APP Key from the integration configuration.

    2. Initializes the DataDog manager.

    3. Makes a GET request to the DataDog `/api/v1/validate` endpoint to verify the
    credentials.

    4. Returns a success message if the connection is valid, or a failure message
    otherwise.


    ### Additional Notes

    This is a utility action primarily used to verify that the integration is configured
    correctly and can communicate with the DataDog API.
