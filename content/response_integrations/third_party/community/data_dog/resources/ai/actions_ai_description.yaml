Get Beautiful Metric:
  ai_description: >-
    ### General Description

    Analyzes a provided JSON string containing DataDog metric timeseries points to
    calculate statistical values. This action acts as a utility to process and format
    timeseries data, returning a structured JSON object with the calculated statistics.


    ### Flow Description

    1. Extracts the `Series` parameter containing the timeseries points in JSON format.

    2. Parses the JSON to extract the `pointlist`, `start`, `end`, `unit`, `aggr`,
    and `expression` values.

    3. Iterates through the timeseries points to extract raw metric values.

    4. Calculates the sum, average, minimum, and maximum of the raw metric values.

    5. Constructs a JSON object with the calculated statistics and original metadata.

    6. Returns the constructed JSON object as the action's result.


    ### Additional Notes

    Although this action is part of the DataDog integration and initializes the DataDog
    manager, it does not make any external API calls. It strictly processes the data
    provided in the `Series` parameter.
  ai_short_description: >-
    Analyzes a provided JSON string of DataDog metric timeseries points to calculate
    and return statistical values such as sum, average, minimum, and maximum.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
