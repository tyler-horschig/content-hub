    `Priority`, and the `Unaggregated` flag.

    2. Initializes the Datadog API client using the provided API and Application keys.

    3. Makes a GET request to the Datadog API (`/api/v1/events`) to fetch events matching
    the specified query parameters.

    4. Evaluates the response and attaches the retrieved events to the action's JSON
    result.

    5. Outputs a success or failure message based on whether events were found.


