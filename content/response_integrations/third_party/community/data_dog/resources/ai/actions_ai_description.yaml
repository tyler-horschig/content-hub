Get Event Details:
  ai_description: >-
    ### General Description

    Retrieves the details of a specific event from DataDog using the provided Event
    ID. This action fetches the event's metadata and payload directly from the DataDog
    platform.


    ### Flow Description

    1. Extracts the `Event ID` from the action parameters.

    2. Initializes the DataDog API client using the integration's API and APP keys.

    3. Makes an HTTP GET request to the DataDog API (`/api/v1/events/{event_id}`)
    to fetch the event details.

    4. If successful, returns the event details as a JSON object and marks the action
    as successful.

    5. If the event is not found or an error occurs, marks the action as failed.


    ### Additional Notes

