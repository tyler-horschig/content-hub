Update Alert:
  ai_description: >-
    ### General Description

    Updates a specific alert in the Vorlon platform based on a provided JSON payload.
    This action allows users to modify alert attributes, such as status or linked
    alerts, directly within the external Vorlon system.


    ### Flow Description

    1. Extracts the `Alert Object` parameter containing the JSON payload.

    2. Validates and parses the provided string into a JSON object.

    3. Initiates a PUT request to the Vorlon API (`/rest/v1/alerts/update`) with the
    parsed JSON payload to update the alert.

    4. Retrieves the updated alert details from the API response and attaches them
    to the action's JSON results.


    ### Additional Notes

    The `Alert Object` parameter must be a properly formatted JSON string. An example
    format is `{"alert_id": "1234567890", "apply_to_linked_alerts": false, "new_status":
    "dismissed"}`.
