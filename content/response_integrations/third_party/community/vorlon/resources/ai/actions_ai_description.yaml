Get Connection Summary:
  ai_description: >-
    ### General Description

    Retrieves a connection summary for a specific service from the Vorlon server.
    This action allows analysts to query connection telemetry based on service IDs,
    instance IDs, time ranges, and connection types, returning the aggregated summary
    as a JSON result.


    ### Flow Description

    1. Extracts the action parameters including Service ID, Instance ID, From/To times,
    Connection Type, and Secret IDs.

    2. Initializes the VorlonManager to authenticate and establish a session with
    the Vorlon API.

    3. Makes an HTTP GET request to the `/rest/v1/connections/summary/{service}` endpoint,
    passing the provided filters as query parameters.

    4. Retrieves the connection summary and attaches it to the action's JSON result.


    ### Additional Notes

    - The `Service ID` parameter is mandatory and typically represents the service
    name or app name.

    - Time filters (`From` and `To`) must be provided in the exact format: `YYYY-MM-DDTHH:MM:SS`
    (e.g., `1970-1-1T00:00:00`).
