Get Alerts:
  ai_description: >-
    ### General Description

    Retrieves alerts from the Vorlon platform based on specified filtering criteria.
    This action allows users to query alerts by requesting service, responding service,
    alert IDs, time range, and status, returning the matching alerts as a JSON result.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the Vorlon API client and authenticates using client credentials.

    3. Makes a GET request to the Vorlon `/rest/v1/alerts` endpoint with the provided
    filters (e.g., status, time range, service IDs).

    4. Retrieves the matching alerts and attaches them to the action's JSON result.


    ### Additional Notes

    If no alerts match the criteria, an empty JSON object is returned.
  ai_short_description: >-
    Retrieves alerts from the Vorlon platform based on specified filtering criteria
    such as service IDs, time range, and status.
