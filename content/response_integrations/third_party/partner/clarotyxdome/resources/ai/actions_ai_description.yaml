Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Claroty xDome platform to verify that the integration
    is configured correctly.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (Host, API Token, and
    Verify SSL).

    2. Initiates an HTTP POST request to the Claroty xDome `/api/v1/alerts/` endpoint
    with a minimal payload to validate authentication and network access.

    3. Evaluates the response and returns a successful execution state if the connection
    succeeds, or a failed state with an error message if it fails.


    ### Additional Notes

    This action is primarily used as a diagnostic tool during integration setup and
    does not interact with case entities or modify any data.
