EnrichXDomeAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP and MAC address entities by querying Claroty xDome for asset information
    and associated vulnerabilities.


    ### Flow Description

    1. Iterates through the target entities, filtering for IP (ADDRESS) and MAC addresses.

    2. Validates the entity identifier format using regular expressions.

    3. Makes a POST request to the Claroty xDome `/api/v1/devices/` endpoint to retrieve
    device details matching the IP or MAC address.

    4. Extracts the device UID and makes a subsequent POST request to the `/api/v1/device_vulnerability_relations/`
    endpoint to fetch associated vulnerabilities.

    5. Summarizes the vulnerabilities and updates the entity's `additional_properties`
    with the enriched data.

    6. Marks the entity as enriched and updates it within the SecOps platform.


    ### Additional Notes

    Unsupported entity types or invalid formats are skipped and logged as failed.
