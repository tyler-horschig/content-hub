EnrichAlerts:
  ai_description: >-
    ### General Description

    Retrieves alert details from Claroty xDome using a specific alert ID and enriches
    the current Google SecOps alert with the retrieved information. The action fetches
    fields such as alert name, status, and MITRE ATT&CK techniques, appending them
    to the alert's additional properties and security results.


    ### Flow Description

    1. Extracts the Claroty xDome alert ID from the action parameters.

    2. Makes an HTTP POST request to the Claroty xDome API (`/api/v1/alerts/`) to
    fetch the alert details matching the provided ID.

    3. Parses the response to extract relevant alert fields and MITRE ATT&CK information.

    4. Enriches the current Google SecOps alert by appending the extracted data to
    its additional properties and security results.

    5. Returns the fetched alert data as a JSON result.


    ### Additional Notes

    The Claroty xDome API uses a POST request with a filter payload to query for specific
    alerts.
  ai_short_description: >-
    Retrieves alert details from Claroty xDome by ID and enriches the current Google
    SecOps alert with the fetched metadata and MITRE ATT&CK information.
  capabilities:
