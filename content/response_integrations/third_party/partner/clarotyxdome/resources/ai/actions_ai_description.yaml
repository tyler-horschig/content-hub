AddVulnerabilities:
  ai_description: >-
    ### General Description

    Retrieves vulnerability information for entities from Claroty xDome. It identifies
    devices by UID, IP address, or MAC address, fetches associated vulnerabilities,
    and enriches the entities with vulnerability details, counts, and status.


    ### Flow Description

    1. Iterates through target entities.

    2. Checks if the entity identifier matches a Claroty xDome UID format.

    3. If not a UID, makes an API call (POST `/api/v1/devices/`) to Claroty xDome
    to find the device by IP or MAC address and retrieve its UID.

    4. Makes an API call (POST `/api/v1/device_vulnerability_relations/`) to Claroty
    xDome using the device UID to fetch associated vulnerabilities.

    5. Enriches the entity's additional properties with the retrieved vulnerability
    data, count, and vulnerability status.

    6. Updates the entities in the Google SecOps platform and returns the results
    as JSON.


    ### Additional Notes

    The action supports IP addresses, MAC addresses, and Claroty xDome UIDs as entity
    identifiers.
  ai_short_description: >-
    Retrieves and appends vulnerability information from Claroty xDome to entities
    based on their IP address, MAC address, or device UID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device and vulnerability data from Claroty xDome via POST
      requests (fetches_data=true). It does not mutate external data. It updates the
      entities with the retrieved vulnerability data using `siemplify.update_entities`
      (can_update_entities=true). It does not create insights or modify alert data.
  entity_usage:
    entity_types:
