Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP address entities using threat intelligence data from Stairwell. This
    action retrieves detailed information about the IP, evaluates its malicious probability,
    and updates the entity within the SecOps platform.


    ### Flow Description

    1. Extracts integration configuration parameters.

    2. Filters the target entities to process only IP Address entities.

    3. For each IP address, makes a GET request to the Stairwell API (`/labs/appapi/enrichment/v1/ip_event/{ip}`)
    to fetch threat intelligence data.

    4. Updates the entity's additional properties with the retrieved enrichment data
    and marks it as enriched.

    5. Evaluates if the IP is suspicious based on the Stairwell verdict.

    6. If suspicious, generates an entity insight with the analysis results.

    7. Attaches a data table and JSON results to the action output.

    8. Updates the modified entities in the SecOps platform.


