Enrich Hostname:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using threat intelligence data from Stairwell. This
    action retrieves contextual data and reputation verdicts for hostnames, updates
    the entities with the findings, and generates insights if the host is deemed suspicious.


    ### Flow Description

    1. Filters the target entities to include only those of type Hostname.

    2. Iterates over the filtered entities and extracts their original identifiers.

    3. Makes a GET request to the Stairwell API (`/labs/appapi/enrichment/v1/hostname_event/{hostname}`)
    to fetch enrichment data.

    4. Updates the entity's additional properties with the retrieved data (e.g., DNS
    records, opinions) and marks the entity as enriched.

    5. Evaluates the returned report to determine if the hostname is suspicious based
    on its verdict.

    6. If suspicious, generates an insight and attaches it to the entity.

    7. Adds a data table and JSON results containing the report details to the action's
    output.

    8. Updates the entities within the Google SecOps platform.


