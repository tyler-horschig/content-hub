Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches file hash entities using threat intelligence data from Stairwell. This
    action retrieves detailed file information such as malicious probability, detection
    labels, and file metadata to provide context on potential threats.


    ### Flow Description

    1. Extracts integration configuration parameters (API credentials).

    2. Filters target entities to include only File Hash entities.

    3. Iterates through the filtered entities and makes a GET request to the Stairwell
    API (`/labs/appapi/enrichment/v1/object_event/{file_hash}`) to fetch file enrichment
    data.

    4. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Evaluates if the file is suspicious based on the returned verdict and malicious
    probability. If suspicious, attaches an insight to the entity.

    6. Adds a data table and JSON results to the action output.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    This action only processes entities of type File Hash. Other entity types will
    be ignored.
  ai_short_description: >-
    Enriches file hash entities with threat intelligence data from Stairwell, updating
    entity properties and creating insights for suspicious files.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, suspicious status, and adds insights to the case
      wall.
    reasoning: >-
      The action fetches data from the Stairwell API via a GET request (fetches_data=true).
      It does not mutate external data. It mutates internal data by updating entities
      (`siemplify.update_entities`) and creating insights (`siemplify.add_entity_insight`).
  entity_usage:
