Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stairwell API to ensure the integration is configured
    correctly and can communicate with the platform.


    ### Flow Description

    1. Initializes the StairwellManager using the provided integration-level configuration
    parameters (API Key, API Root, etc.).

    2. Calls the `test_connectivity` method, which makes a test GET request to the
    Stairwell API to enrich a hardcoded dummy hostname (`www.google.com`).

    3. Evaluates the response and returns a successful execution state if the connection
    is established and the API responds without errors.


    ### Additional Notes

    This action does not process any case entities or modify any data. It is strictly
    used for diagnostic and verification purposes.
