    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and maps them to Recorded
      Future format using `map_secops_entities_to_rf`. This function filters entities
      by checking if their `entity_type` is in `ENTITY_PREFIX_TYPE_MAP_LIST_OPS`,
