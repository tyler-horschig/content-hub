Add List Entities:
  ai_description: >-
    ### General Description

    Adds SecOps entities to a specified Recorded Future list. The action can add specific
    entities based on provided parameters (Entity ID, or Entity Name and Type) or
    default to adding the target entities associated with the case.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Determines the target entities to add: uses `Entity ID` if provided, uses `Entity
    Name` and `Entity Type` if provided, or defaults to mapping the case's target
    entities to Recorded Future format.

    3. Initializes the Recorded Future API client.

    4. Fetches the specified list from Recorded Future using the `List ID`.

    5. Executes a bulk add operation to append the entities to the list.

    6. Returns the results, including the number of successfully added, unchanged,
    and errored entities.


    ### Additional Notes

    When defaulting to case target entities, the action maps supported SecOps entity
    types (Address, Domain, Hostname, URL, FileHash, EmailMessage) to their corresponding
    Recorded Future formats.
  ai_short_description: >-
    Adds SecOps entities to a specified Recorded Future list.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entities to a specified list in Recorded Future.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST/PUT request (via `bulk_add`) to Recorded Future to add
      entities to a list, which mutates external data. It does not fetch data for
      enrichment, nor does it mutate internal SecOps data, update entities, or create
      insights.
  entity_usage:
