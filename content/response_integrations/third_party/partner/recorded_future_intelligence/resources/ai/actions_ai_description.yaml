Detonate File:
  ai_description: >-
    ### General Description

    Submits a file to the Recorded Future Sandbox for detonation and analysis. This
    action retrieves the file from a specified source, uploads it to the sandbox,
    and waits for the analysis to complete to return the threat intelligence report.


    ### Flow Description

    1. Extracts the file from the specified source (GCP Bucket or Local File System)
    using the provided file path.

    2. Makes an API call to submit the file to the Recorded Future Sandbox (Hatching
    Triage) for detonation.

    3. Periodically queries the sandbox via API to check the status of the analysis.

    4. Once the analysis is complete, retrieves the detailed detonation report.

    5. Creates a case insight with the analysis results and attaches the report data
    to the action's JSON results.


    ### Additional Notes

    This is an asynchronous action that will continue to run and check the status
    until the sandbox finishes processing the file or a timeout is reached.
  ai_short_description: >-
    Submits a file to the Recorded Future Sandbox for detonation and retrieves the
    analysis report.
