    | Entity ID | string | No | ID of the entity to add. |

    | Entity Name | string | No | Name of the entity to add. |

    | Entity Type | string | No | Type of the entity to add. |


    **Parameter Notes:**

    If `Entity ID`, `Entity Name`, and `Entity Type` are not provided, the action
    defaults to using the Case Target Entities.
