Add Analyst Note:
  ai_description: >-
    ### General Description

    Publishes a new Analyst Note to Recorded Future. This action allows analysts to
    create and attach notes to Recorded Future intelligence directly from the SOAR
    platform.


    ### Flow Description

    1. Iterates over all target entities in the case and collects their identifiers.

    2. Appends the collected entity identifiers to the provided `Note Text`.

    3. Makes an API call to Recorded Future to publish the analyst note using the
    specified `Note Title`, `Note Text`, and `Topic`.

    4. Returns the JSON response containing the details of the published note.


    ### Additional Notes

    This action does not filter entities by type; it collects all available target
    entities and includes them in the note text.
  ai_short_description: >-
    Publishes a new Analyst Note to Recorded Future, appending the identifiers of
    all target entities to the note text.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Publishes a new analyst note to Recorded Future.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to Recorded Future to publish an analyst note,
      which mutates external data. It does not fetch data, mutate internal data, update
      entities, create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
