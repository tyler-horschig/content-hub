Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Recorded Future. This action retrieves threat intelligence
    about the CVE, including risk scores, triggered rules, and links. It evaluates
    risk based on a threshold, updates the entity's suspicious status, and generates
    an insight with the analysis results. It can also optionally submit detections
    back to Recorded Future Collective Insights.


    ### Flow Description

    1. Iterates over target entities and filters for CVE entities.

    2. For each CVE, makes an API call to Recorded Future to fetch enrichment data.

    3. Optionally submits the detection to Recorded Future Collective Insights via
    an API call.

    4. Evaluates the risk score against the provided threshold.

    5. Updates the entity's properties, enrichment status, and suspicious flag if
    the threshold is exceeded.

    6. Creates a case insight with the risk details and evidence.


    ### Additional Notes

    The action will only submit to Collective Insights if the 'Enable Collective Insights'
    parameter is true, the global configuration allows it, and the alert is not from
    Recorded Future itself.
