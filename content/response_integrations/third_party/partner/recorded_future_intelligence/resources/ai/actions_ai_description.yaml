  ai_description: >-
    ### General Description

    Submits URL entities to the Recorded Future Sandbox (Hatching Triage) for dynamic
    analysis and detonation. This action initiates a sandbox analysis session for
    the specified URLs and retrieves the resulting behavior report and threat score.


    ### Flow Description

    1. Iterates over the target entities and filters for URL entities.

    2. Makes an API call to submit each URL to the Recorded Future Sandbox for detonation.

    3. Operates asynchronously, periodically querying the sandbox API to check the
    status of the submitted samples.

    4. Once the analysis is complete, fetches the overview report for each URL.

    5. Generates a case insight containing the HTML detonation report and attaches
    the JSON results and data tables to the action output.


    ### Additional Notes

    This is an asynchronous action. It relies on the Sandbox API URL and API Key configured
    at the integration level.
