Search Hash Malware Intelligence:
  ai_description: >-
    ### General Description

    Queries Recorded Future to retrieve malware intelligence and sandbox reports for
    SHA256 file hashes that have been previously analyzed. This action helps analysts
    understand the behavior and threat level of a file without needing to detonate
    it again.


    ### Flow Description

    1. Iterates over the target entities, filtering for `FILEHASH` entities that have
    an identifier length of 64 characters (indicating a SHA256 hash).

    2. For each valid hash, makes an API call to Recorded Future's malware intelligence
    endpoint to fetch existing sandbox reports within the specified date range.

    3. Generates a case insight for each hash, containing the sandbox report details,
    scores, signatures, and network flows.

    4. Returns the report data as a JSON result.


    ### Additional Notes

    This action does not submit new files for detonation; it only searches for existing
    reports. It specifically requires SHA256 hashes to function correctly.
