DHCP Lease Lookup:
  ai_description: >-
    ### General Description

    Retrieves DHCP lease information from Infoblox Threat Defense with DDI based on
    specified filter criteria. This action allows analysts to query the Infoblox service
    for active or historical DHCP leases using parameters such as IP address, MAC
    address, or hostname.


    ### Flow Description

    1. Extracts the provided action parameters including the DHCP lease filter, offset,
    limit, and sorting preferences.

    2. Validates the `Offset` and `Limit` parameters to ensure they are valid integers.

    3. Makes an HTTP GET request to the Infoblox API (`/api/ddi/v1/dhcp/lease`) using
    the provided filter criteria.

    4. Parses the returned DHCP lease records and constructs a CSV-formatted data
    table for display.

    5. Attaches the raw JSON response and the data table to the action's results in
    the SecOps platform.


    ### Additional Notes

    This action does not operate on SecOps entities directly. It relies entirely on
    the provided filter string to query the Infoblox service. Ensure the filter syntax
    matches the Infoblox API requirements.
