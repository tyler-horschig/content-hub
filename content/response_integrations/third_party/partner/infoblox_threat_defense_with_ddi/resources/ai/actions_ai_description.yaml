Get Custom List:
  ai_description: >-
    ### General Description

    Retrieves the contents of a custom list from Infoblox Threat Defense.


    ### Flow Description

    1. Extracts the provided parameters including Custom List ID, Name, Type, Tag
    Filter, Tag Sort Filter, Offset, and Limit.

    2. Validates the integer parameters (Offset, Limit, Custom List ID).

    3. Makes a GET request to the Infoblox API (`/api/atcfw/v1/named_lists`) to retrieve
    the custom list(s) based on the provided filters.

    4. Parses the response and adds the results as a JSON object and a data table
    to the action result.


    ### Additional Notes

    If a Custom List ID is provided, it takes precedence over Name and Type. If Name
    and Type are provided, they are used to filter. Otherwise, it retrieves all custom
    lists matching the tag filters.
