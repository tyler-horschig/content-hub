Create Custom List:
  ai_description: >-
    ### General Description

    Creates a new custom list for use in security policies in Infoblox Threat Defense
    with DDI.


    ### Flow Description

    1. Extracts the provided action parameters including the list name, type, items,
    description, confidence level, threat level, and tags.

    2. Validates the required parameters and ensures the provided items are valid
    indicators (IPv4, IPv6, or domains).

    3. Makes a POST request to the Infoblox API to create the new custom list with
    the specified payload.

    4. Returns the details of the newly created custom list, adding them to the action's
    JSON result and a data table.


    ### Additional Notes

    There are no additional notes for this action.
