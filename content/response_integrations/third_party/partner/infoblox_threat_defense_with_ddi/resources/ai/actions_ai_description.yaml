Create Network List:
  ai_description: >-
    ### General Description

    Creates a new network list in Infoblox Threat Defense to define where security
    policies should be applied. This action interacts with the Infoblox API to create
    a network list containing specified items, such as IP addresses or CIDRs, and
    returns the details of the newly created list.


    ### Flow Description

    1. Retrieves the network list name, items, and description from the action parameters.

    2. Validates the required parameters and converts the comma-separated items into
    a list.

    3. Makes a POST request to the Infoblox API (`/api/atcfw/v1/network_lists`) to
    create the network list.

    4. Parses the API response and attaches the network list details as a JSON result
    and a data table in the case wall.


