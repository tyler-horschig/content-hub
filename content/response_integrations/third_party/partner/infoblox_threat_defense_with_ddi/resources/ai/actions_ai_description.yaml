"Initiate Indicator Intel Lookup With Dossier":
  ai_description: >-
    ### General Description

    Initiates an indicator investigation using Infoblox Dossier. This action queries
    Infoblox Threat Defense for threat intelligence related to a specific indicator
    (such as an IP, URL, Host, Email, or Hash).


    ### Flow Description

    1. Extracts the provided indicator type, indicator value, sources, and the wait
    preference.

    2. Validates the indicator value to ensure it is not empty.

    3. Makes a GET request to the Infoblox Dossier API (`/tide/api/services/intel/lookup/indicator/{type}`)
    to initiate the lookup.

    4. If `Wait for Results` is true, the action waits for the lookup to complete
    and retrieves the threat intelligence data, formatting it into a table.

    5. If `Wait for Results` is false, the action immediately returns the Job ID and
    status for asynchronous tracking.

    6. Attaches the raw JSON response and the constructed data table to the action
    results.


    ### Additional Notes

    This action does not automatically update entities or create insights. It relies
    on manual parameter inputs rather than iterating over case entities.
