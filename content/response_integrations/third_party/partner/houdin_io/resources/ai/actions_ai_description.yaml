Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches compatible entities (URL, Public IP, Domain, FileHash) by launching a
    threat analysis scan on Houdin.io and retrieving the results. The action appends
    the threat score, AI analysis, and analysis sources to the entities' additional
    properties.


    ### Flow Description

    1. Iterates through the target entities and filters for compatible types: URL,
    Domain, FileHash, and external IP addresses.

    2. Initiates a scan for each compatible entity by making a POST request to the
    Houdin.io API.

    3. Polls the Houdin.io API via GET requests to retrieve the completed scan results.

    4. Updates the entities' additional properties with the retrieved threat score,
    AI analysis, and analysis sources.

    5. Returns the enrichment data as JSON results and updates the entities in the
    platform.


    ### Additional Notes

    - The action runs asynchronously. It is recommended to adjust the script timeout
    value in the Google SecOps IDE as needed.

    - Only public (external) IP addresses are processed; internal IP addresses are
    skipped.
  ai_short_description: >-
    Enriches compatible entities such as URLs, Public IPs, Domains, and FileHashes
    by launching a scan on Houdin.io and appending the threat analysis results to
    the entities' additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a new scan task on the Houdin.io platform via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to Houdin.io to launch a scan, which creates
      a scan task on the external system (mutating external data). It then makes GET
      requests to poll the scan results (fetching data). It updates the internal entities
      with the retrieved data using `siemplify.update_entities`. It does not create
      insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: true
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them based on
      `entity.entity_type` matching `URL`, `ADDRESS`, `DOMAIN`, `FILEHASH`, or `DestinationURL`.
      For `ADDRESS` entities, it further filters by checking if the IP is external
      using the entity's `identifier` (`isIPExternal(entity.identifier)`). Therefore,
      it targets Address, Domain, File Hash, and URL entities, filtering by entity
      type and identifier.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches threat intelligence and analysis results for indicators (IP,
      URL, Domain, FileHash) from Houdin.io, which matches the 'Enrich IOC' expected
      outcome. It does not submit a file, update alerts, or perform containment actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
