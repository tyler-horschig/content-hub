Scan Artifact:
  ai_description: >-
    ### General Description

    Launches a scan on a specified artifact using the Houdin.io platform and retrieves
    the scan results. It supports various artifact types such as IPv4, IPv6, URL,
    Domain, MD5, SHA1, and SHA256.


    ### Flow Description

    1. Extracts the `artifact` and optional `scanOn` (scanner list) parameters from
    the action configuration.

    2. Makes a POST request to the Houdin.io API to launch a new scan job for the
    provided artifact.

    3. Polls the Houdin.io API using a GET request to retrieve the scan results once
    the job is completed.

    4. Returns the scan results as a JSON object to the Google SecOps platform.


    ### Additional Notes

    The action runs asynchronously. It may be necessary to adjust the script timeout
    value in the Google SecOps IDE depending on the expected duration of the scans.
  ai_short_description: >-
    Launches a scan on a specified artifact using the Houdin.io platform and retrieves
    the scan results.
