    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | scanOn | Multi-Choice | No | (Optional) An array of scanners you want Houdin
    to use. |
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Houdin.io API.


    ### Flow Description

    1. Initializes the Houdin.io client using the provided API key.

    2. Makes a POST request to the `/ping` endpoint of the Houdin.io API.

    3. Evaluates the HTTP response status code to determine connectivity.

    4. Returns a success message if the connection is established, or an error message
    if the connection fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Houdin.io service.
  ai_short_description: >-
    Tests the connectivity to the Houdin.io API to ensure the integration is configured
