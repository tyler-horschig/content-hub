Add Comment To Issue:
  ai_description: >-
    ### General Description

    Adds a comment to a specified issue in Wiz. This action interacts with the Wiz
    GraphQL API to append a note or comment to an existing issue, facilitating communication
    and tracking of issue resolution directly from the SOAR platform.


    ### Flow Description

    1. Extracts the `Issue ID` and `Comment` parameters provided by the user or playbook.

    2. Initializes the Wiz API client using the integration's authentication credentials.

    3. Constructs a GraphQL mutation (`CreateIssueComment` / `createIssueNote`) containing
    the target issue ID and the comment text.

    4. Executes a POST request to the Wiz GraphQL endpoint to append the comment to
    the issue.

    5. Returns the JSON representation of the newly created comment and outputs a
    success message.


    ### Additional Notes

    Ensure that the provided `Issue ID` is valid and exists within the Wiz environment,
    otherwise the GraphQL API will return an issue not found error.
  ai_short_description: >-
    Adds a comment to a specified issue in Wiz using the Wiz GraphQL API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment/note to a specific issue in the external Wiz platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a GraphQL mutation (POST request) to add a comment to an
      issue in Wiz, which mutates external data. It does not fetch contextual data
      for enrichment, mutate internal SecOps data, update entities, or create insights.
