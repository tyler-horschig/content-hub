Get-TI-Search-Info:
  ai_description: >-
    ### General Description

    Searches for Domain, IP Address, File Hash, Bank Card, and Email entities in the
    Group-IB Threat Intelligence database. The action retrieves threat intelligence
    data from various collections and returns the aggregated results as a JSON object.


    ### Flow Description

    1. Gathers target entities and determines their type (Domain, IP, Hash, Email,
    or Credit Card) based on the format of their identifier.

    2. Initializes the Group-IB TI API client (poller).

    3. For each valid entity, queries the Group-IB TI global search API to identify
    which collections contain relevant data.

    4. Iterates over the identified collections and extracts the data using a generator.

    5. Optionally parses the extracted data using mapping keys if the `Enable mapping
    parser` parameter is enabled.

    6. Aggregates the results and attaches them to the action's JSON result.


    ### Additional Notes

    This action relies on the Group-IB TI global search API. Entities that do not
    match the supported formats (Domain, IPv4, MD5/SHA1/SHA256, URL, Email, Credit
    Card) are ignored.
  ai_short_description: >-
    Searches for Domain, IP Address, File Hash, Bank Card, and Email entities in the
    Group-IB TI database and returns the threat intelligence results as JSON.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Group-IB TI API using `poller.global_search`
      and `poller.create_update_generator`. It does not mutate external data. It adds
      the results as JSON to the action result but does not update entities, create
      insights, or modify internal case/alert data.
