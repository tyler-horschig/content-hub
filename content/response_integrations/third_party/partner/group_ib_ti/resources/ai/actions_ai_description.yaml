Get-Collection-Info-Async:
  ai_description: >-
    ### General Description

    Extracts data from the Group-IB Threat Intelligence database based on a chosen
    collection. It is designed to run periodically to fetch fresh updates and returns
    the collected data as a JSON result.


    ### Flow Description

    1. Extracts configuration parameters including the collection name, start date,
    and portion limit.

    2. Initializes a connection to the Group-IB TI API.

    3. Determines the sequence update number based on the provided start date or a
    previously saved timestamp.

    4. Makes a GET request to the Group-IB TI API to retrieve the specified collection
    data in portions.

    5. Parses the retrieved data, optionally applying a mapping parser if enabled.

    6. Appends the parsed data to the action's JSON result.


    ### Additional Notes

    This action ignores any input entities and operates solely based on the provided
    parameters. It is typically used as a scheduled job or a starting trigger to ingest
    threat intelligence data.
  ai_short_description: >-
    Extracts threat intelligence data from the Group-IB TI database for a specified
    collection and returns it as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
