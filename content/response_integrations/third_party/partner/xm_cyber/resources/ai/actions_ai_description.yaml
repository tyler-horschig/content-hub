Enrich Entities:
  ai_description: >-
    **General Description**

    Enriches HOSTNAME and USER entities with data from the XM Cyber platform. This
    action retrieves contextual metadata and threat exposure details for the specified
    assets and identities.


    **Flow Description**

    1. Extracts entities from the alert's security events.

    2. Filters the target entities to include only supported types (HOSTNAME and USER).

    3. Skips entities that are already enriched in the event or have been enriched
    within the last 24 hours.

    4. Makes a GET request to the XM Cyber API (`/api/secopsPublisher/entities`) to
    fetch enrichment data for the remaining entities.

    5. Updates the entities' additional properties with the retrieved data and marks
    them as enriched in Google SecOps.


    **Additional Notes**

    The action supports both API key and OAuth token-based authentication.
