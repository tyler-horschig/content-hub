Ping:
  ai_description: >-
    ### General Description

    Tests the configuration credentials and connectivity of the XM Cyber integration.


    ### Flow Description

    1. Retrieves the integration-level configuration parameters (Authentication Type,
    Base URL, and API Key).

    2. Initializes the API manager with the provided credentials.

    3. Makes a POST request to the `/api/auth/` endpoint to verify the connection
    to the XM Cyber server.

    4. Returns a success message if the connection is successfully established, or
    an error message if it fails.


