Calculate Risk Score:
  ai_description: >-
    ### General Description

    Calculates a risk score based on XM Cyber enrichment fields present in alert events
    and entities. It generates a structured JSON object containing the aggregated
    risk scores and other properties, which can be used by playbooks for filtering
    alerts and making automated decisions.


    ### Flow Description

    1. Retrieves security events and target entities from the current alert.

    2. Filters entities to include only supported types (User and Hostname).

    3. Extracts action parameters for various risk score components (e.g., AD Risk
    to Domain, Is Critical Asset, User without MFA).

    4. Iterates over the alert's events and entities to calculate individual risk
    scores based on their existing properties and the configured parameters.

    5. Aggregates the calculated scores and properties into a final JSON object.

    6. Adds the generated JSON object to the action's result for use in subsequent
    playbook steps.


    ### Additional Notes

    This action does not make any external API calls. It relies entirely on data already
    present in the alert's events and the entities' additional properties (specifically
    those populated by previous XM Cyber enrichment actions).
  ai_short_description: >-
    Calculates a risk score based on XM Cyber enrichment fields present in alert events
    and entities, generating a structured JSON object for playbook use.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
