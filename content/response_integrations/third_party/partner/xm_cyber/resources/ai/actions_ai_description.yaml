    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action processes existing event and entity properties to calculate a risk
      score. It does not make any external API calls (fetches_data=false), does not
      mutate external data, does not update entities, and does not create insights
      or case comments. It only adds a JSON object to the action result.
