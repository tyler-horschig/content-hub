Push Breach Point Data:
  ai_description: >-
    ### General Description

    This action adds a breach point label to all entities or selected entities from
    the events and SecOps entities based on defined criteria inputs and pushes these
    labels to XM Cyber.


    ### Flow Description

    1. Authenticates to the XM Cyber API.

    2. Fetches the action parameters: Parameter, Operator, Value, and Attribute Name.

    3. Validates the input parameters to ensure they match expected formats and operators.

    4. Iterates over the current alert's security events and target entities to find
    entities matching the defined criteria.

    5. Pushes the breach point data (labels) to the matching entities in XM Cyber
    via a POST request to `/api/entityInventory/applyImportedLabelsOnEntities`.

    6. Returns a success or failure message along with the list of entities that were
    updated.


    ### Additional Notes

    The action supports filtering entities based on various parameters like entityID,
    Affected Entities, Compromise Risk Score, etc. It specifically targets User and
    Hostname entity types.
