Ping:
  ai_description: >-
    **General Description**

    Tests connectivity to the DomainTools API to ensure the integration is configured
    correctly.


    **Flow Description**

    1. Retrieves the integration configuration parameters (Username, API Token, Verify
    SSL).

    2. Initializes the DomainToolsManager, which inherently makes an API call to DomainTools
    (`account_information`) to fetch available products and validate credentials.

    3. Outputs a success message if the connection is established and credentials
    are valid.


    **Additional Notes**

    This action does not process any entities or modify any data. It is strictly used
    for diagnostic purposes.
