Get WhoIs History:
  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and URL entities by retrieving WhoIs history data from
    DomainTools. This action provides historical registration details, registrar information,
    and registrant data for the specified domains.


    ### Flow Description

    1. Extracts the `Domain` parameter if provided. If provided, it creates a temporary
    domain entity for processing.

    2. If the `Domain` parameter is not provided, the action iterates over the case's
    target entities, filtering for Domain, Hostname, and URL types.

    3. For each entity, it extracts the domain name from the identifier.

    4. Makes an API call to the DomainTools `whois_history` endpoint to fetch historical
    WhoIs records.

    5. Parses the retrieved data and appends it to the entity's `additional_properties`.

    6. Generates JSON results, entity-specific CSV tables, and a summary data table.

    7. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    If the `Domain` parameter is specified, the action will ignore the case entities
    and only process the provided domain.
