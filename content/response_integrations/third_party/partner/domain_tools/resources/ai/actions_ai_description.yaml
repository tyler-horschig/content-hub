Investigate Domain:
  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and URL entities using DomainTools Iris Investigate.
    This action retrieves comprehensive threat intelligence data, including risk scores,
    identity information, registration details, and hosting data. It updates the entities
    with the enriched data, marks them as enriched, and provides the results in JSON
    and CSV formats.


    ### Flow Description

    1. Extracts the `Domain` parameter if provided; otherwise, it processes the target
    entities (Domain, Hostname, URL).

    2. Extracts the domain name from the entities or the provided parameter.

    3. Chunks the domains into batches of 100 to optimize API calls.

    4. Makes an API request to the DomainTools Iris Investigate endpoint to fetch
    threat intelligence data for the domains.

    5. Parses the API response to extract risk scores, analytics, identity, registration,
    and hosting information.

    6. Updates the `additional_properties` of the entities with the retrieved data.

    7. Marks the successfully processed entities as enriched (`is_enriched = True`).

    8. Updates the entities in the Google SecOps platform.

    9. Attaches the results as JSON and creates data tables for the case.


    ### Additional Notes

    If a specific domain is provided in the `Domain` parameter, the action will only
    process that domain and ignore the target entities.
