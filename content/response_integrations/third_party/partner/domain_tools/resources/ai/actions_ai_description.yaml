Get Domain Rdap:
  ai_description: >-
    ### General Description

    Enriches external domain entities with DomainTools threat intelligence data by
    retrieving parsed domain RDAP information. This action fetches registration details,
    contacts, and statuses for the specified domains and updates the entities with
    the retrieved data.


    ### Flow Description

    1. Extracts the `Domain` parameter if provided, or iterates over target entities
    of types URL, Hostname, and Domain.

    2. Extracts the domain string from the entity identifier or the provided parameter.

    3. Makes a GET request to the DomainTools API to fetch parsed domain RDAP data.

    4. If data is found, adds a CSV table result for the entity.

    5. Enriches the entity's `additional_properties` with the flattened RDAP data.

    6. Updates the entities in the platform and attaches JSON results.

    7. Creates a summary data table for all successfully enriched entities.


    ### Additional Notes

    If the `Domain` parameter is provided, the action will run on a dynamically created
    domain entity instead of the case entities.
  ai_short_description: >-
    Enriches domain, URL, and hostname entities with parsed domain RDAP information
    from DomainTools.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the DomainTools API (fetches_data=true). It does
      not mutate external data or internal data. It updates entities with the retrieved
      RDAP data (can_update_entities=true). It does not create insights, modify alert
      data, or create case comments.
