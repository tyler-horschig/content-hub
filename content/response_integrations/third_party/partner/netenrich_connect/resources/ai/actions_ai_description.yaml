    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to test connectivity but does not fetch
      contextual data for alerts/entities, mutate external data (it sends an empty
      payload just to check reachability), mutate internal data, update entities,
      create insights, modify alerts, or create case comments.
