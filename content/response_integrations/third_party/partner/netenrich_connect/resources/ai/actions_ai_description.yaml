Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Resolution Intelligence Cloud API by sending a ping
    request to the configured webhook URL.


    ### Flow Description

    1. Extracts the webhook URL, token, and SSL verification settings from the integration
    configuration.

    2. Sends an HTTP POST request with an empty JSON payload to the configured webhook
    URL.

    3. Evaluates the HTTP response status code.

    4. Returns a successful result if the status code is 200 or 400, otherwise returns
    a failure with the status code or error message.


    ### Additional Notes

    This action is primarily used to verify that the integration is correctly configured
    and can communicate with the Resolution Intelligence Cloud platform. It does not
    require any action-specific parameters or entities to run.
  ai_short_description: >-
    Tests the connectivity to the Resolution Intelligence Cloud API by sending a ping
    request to the configured webhook URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
