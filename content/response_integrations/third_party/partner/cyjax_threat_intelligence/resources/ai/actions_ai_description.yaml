List Data Breaches:
  ai_description: >-
    ### General Description

    The "List Data Breaches" action queries the Cyjax Threat Intelligence platform
    to retrieve a list of email addresses and associated information collected from
    data breaches. It allows filtering by a specific query string and a date range.


    ### Flow Description

    1. Extracts the `Query`, `Since`, and `Until` action parameters.

    2. Validates the provided date formats to ensure they match the expected ISO8601
    standard and that the start date is not after the end date.

    3. Initializes the Cyjax API client using the integration's authentication token.

    4. Makes a GET request to the Cyjax `/data-leak/credentials` API endpoint to fetch
    data breaches matching the search criteria.

    5. Automatically paginates through the API responses to retrieve up to a maximum
    of 1000 records.

    6. Formats the retrieved data into a CSV table (Data Breach Results) and attaches
    the raw JSON results to the action's output.


    ### Additional Notes

    To prevent memory and performance issues, the action's automatic pagination is
    hard-capped at retrieving a maximum of 1000 records. If the limit is reached or
    a partial error occurs during pagination, a note is appended to the output message.
  ai_short_description: >-
    Queries the Cyjax Threat Intelligence platform to retrieve a list of data breaches
    and compromised email addresses based on specified search criteria.
