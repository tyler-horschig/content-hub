Enrich IOCs:
  ai_description: >-
    ### General Description

    Enriches Indicators of Compromise (IOCs) using Cyjax threat intelligence. This
    action retrieves threat intelligence data, including GeoIP, ASN, and sightings
    information, for the provided entities and updates their properties within the
    case.


    ### Flow Description

    1. Retrieves all target entities attached to the current case.

    2. Iterates through the entities and makes a GET request to the Cyjax API (`/indicator-of-compromise/enrichment`)
    for each entity's identifier.

    3. Parses the API response to extract relevant threat intelligence, such as GeoIP,
    ASN, and sightings data.

    4. Clears any previous Cyjax enrichment data from the entity's additional properties
    to ensure fresh data.

    5. Updates the entity's additional properties with the newly retrieved enrichment
    data and sets the `is_enriched` flag to true.

    6. Saves the updated entities back to the case and outputs a JSON result along
    with a data table containing the enriched IOC details.


    ### Additional Notes

    While the code processes all target entities without explicit type filtering,
    the supported IOC types for Cyjax enrichment typically include Domain, Email,
    Hostname, FileHash-MD5, FileHash-SHA1, FileHash-SHA256, IPv4, IPv6, URL, and CVE.
  ai_short_description: >-
    Enriches Indicators of Compromise (IOCs) by retrieving threat intelligence, GeoIP,
    ASN, and sightings data from Cyjax and updating the entities within the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the Cyjax API (`/indicator-of-compromise/enrichment`).
      It does not mutate external data. It updates internal entities by calling `siemplify.update_entities`
      to append enrichment data to `additional_properties` and set `is_enriched` to
      True. It does not create insights, modify alert data, or create case comments.
