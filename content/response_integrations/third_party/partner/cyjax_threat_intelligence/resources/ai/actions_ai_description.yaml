Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps SOAR and the Cyjax instance by making
    an authenticated API call. It validates the provided asset configuration parameters
    and verifies that the credentials have the necessary permissions.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Token and Verify SSL).

    2. Initializes the Cyjax API manager.

    3. Makes a GET request to the `/indicator-of-compromise` endpoint with a limit
    of 1 to test authentication and connectivity.

    4. Returns a successful execution state if the connection is established, or fails
    if an error occurs.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Cyjax API.
