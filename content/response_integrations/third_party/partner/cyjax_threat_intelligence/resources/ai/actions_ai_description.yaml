Domain monitor:
  ai_description: >-
    ### General Description

    Retrieves information from the Cyjax Domain Monitor feature, which tracks brands
    against newly registered global domains and certificate transparency logs (CTL).
    This action allows analysts to search for potential malicious domains matching
    specific keywords or timeframes.


    ### Flow Description

    1. Extracts the `Query`, `Since`, and `Until` parameters provided by the user.

    2. Validates the date formats and ensures the `Since` date is not greater than
    the `Until` date.

    3. Makes a paginated GET request to the Cyjax API (`/domain-monitor/potential-malicious-domain`)
    to fetch the domain monitor results.

    4. Parses the returned data and constructs a CSV table containing the matched
    domains, keywords, discovery dates, and sources.

    5. Attaches the CSV table and the raw JSON results to the action's output.


    ### Additional Notes

    The action automatically handles API pagination but is hard-capped at retrieving
    a maximum of 1000 records to prevent memory issues or excessive API usage.
  ai_short_description: >-
    Retrieves information from the Cyjax Domain Monitor feature to track brands against
    newly registered global domains and certificate transparency logs.
