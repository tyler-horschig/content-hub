Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP, Hostname, MacAddress, and URL entities using Darktrace. It retrieves
    device and endpoint details, and optionally fetches connection data for internal
    endpoints. The action updates the entities with the retrieved information and
    can generate insights based on the findings.


    ### Flow Description

    1. Iterates over the target entities, filtering for supported types: Address (IP),
    Hostname, MacAddress, and URL.

    2. For URL entities, extracts the domain part to use as the identifier.

    3. Makes GET requests to the Darktrace API (`/devices`, `/endpointdetails`, or
    `/devicesearch`) to fetch device or endpoint details based on the entity type
    and identifier.

    4. If the `Fetch Connection Data` parameter is enabled and a device ID is found,
    makes a GET request to `/deviceinfo` to retrieve connection data for the specified
    hours backwards.

    5. Enriches the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    6. If the `Create Endpoint Insight` parameter is enabled and the retrieved data
    corresponds to a device, creates an insight for the entity.

    7. Updates the successfully processed entities in the platform and attaches the
    results as JSON and data tables.


    ### Additional Notes

    The action extracts the domain part out of URL entities before processing. If
    no connection data is found or the entity is not an internal device, the connection
    data step is skipped.
  ai_short_description: >-
    Enriches IP, Hostname, MacAddress, and URL entities by retrieving device, endpoint,
    and connection details from Darktrace.
