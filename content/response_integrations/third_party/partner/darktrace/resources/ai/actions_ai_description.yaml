Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query in Darktrace to retrieve historical events or telemetry
    data based on specified criteria and timeframes.


    ### Flow Description

    1. Extracts the search query, timeframe, start time, end time, and result limit
    parameters.

    2. Calculates the exact start and end times based on the provided timeframe, which
    can be relative to the current time or the alert's start/end times.

    3. Makes a GET request to the Darktrace Advanced Search API (`/advancedsearch/api/search/`)
    with the base64 encoded query parameters.

    4. Retrieves the search results and attaches them to the action's JSON results.


    ### Additional Notes

    The action can dynamically adjust its search window based on the alert's start
    and end times if configured to do so.
