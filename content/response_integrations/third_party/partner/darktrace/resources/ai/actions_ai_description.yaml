List Similar Devices:
  ai_description: >-
    ### General Description

    Lists similar devices to the specified endpoint in Darktrace. This action queries
    Darktrace for a device matching the provided IP, Hostname, or MAC Address, and
    then retrieves a list of similar devices based on the identified device's ID.


    ### Flow Description

    1. Initializes the Darktrace API client and tests connectivity.

    2. Iterates over the provided target entities, filtering for supported types (IP
    Address, Hostname, MAC Address).

    3. For each entity, makes a GET request to the Darktrace API to find the corresponding
    device.

    4. If the device is found, makes another GET request to retrieve similar devices
    using the device's ID and the specified limit.

    5. Attaches the list of similar devices to the entity as a CSV table and adds
    the raw data to the JSON results.


    ### Additional Notes

    - Supported entity types: IP Address, Hostname, MAC Address.

    - If no device is found for an entity, or if no similar devices exist, the entity
    is marked as failed.
