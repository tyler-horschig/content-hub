Update Model Breach Status:
  ai_description: >-
    ### General Description

    Updates the status of a specific model breach in Darktrace. This action allows
    analysts to remotely acknowledge or unacknowledge a model breach directly from
    the SOAR platform.


    ### Flow Description

    1. Retrieves the current status of the specified model breach from Darktrace via
    a GET request.

    2. Evaluates if the requested status (Acknowledged or Unacknowledged) is already
    applied to the model breach.

    3. If the status needs to be changed, sends a POST request to the Darktrace API
    (`/modelbreaches/{model_breach_id}/acknowledge` or `/modelbreaches/{model_breach_id}/unacknowledge`)
    to update the state.

    4. Returns a success message indicating the status was updated or was already
    in the desired state.


    ### Additional Notes

    - The action requires a valid Model Breach ID.

    - If the model breach is not found in Darktrace, the action will fail and return
    an error message.
  ai_short_description: >-
    Updates the status (Acknowledged or Unacknowledged) of a specific model breach
    in Darktrace.
