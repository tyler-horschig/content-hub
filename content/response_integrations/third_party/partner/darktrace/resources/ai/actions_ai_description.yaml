List Endpoint Events:
  ai_description: >-
    ### General Description

    Retrieves the latest events related to specific endpoint entities (IP Address,
    Hostname, MAC Address) from Darktrace. This action queries the Darktrace API to
    find the device associated with the entity and then fetches historical telemetry
    and event logs based on the specified timeframe and event types.


    ### Flow Description

    1. Extracts the provided action parameters, including the desired event types,
    timeframe, and maximum events to return.

    2. Iterates through the case's target entities, filtering for supported types:
    IP Address, Hostname, and MAC Address.

    3. For each valid entity, makes a GET request to the Darktrace API (`/devices`
    or `/devicesearch`) to resolve the entity identifier to a Darktrace Device ID
    (`did`).

    4. If a device is found, makes subsequent GET requests to the Darktrace API (`/details`)
    for each specified event type to retrieve the relevant historical events within
    the given timeframe.

    5. Aggregates the retrieved events and attaches them to the action's results as
    JSON data and case data tables.


    ### Additional Notes

    - Events are returned in the UTC timezone.

    - Supported event types include: `connection`, `unusualconnection`, `newconnection`,
    `notice`, `devicehistory`, and `modelbreach`.

    - If the "Custom" timeframe is selected, the "Start Time" parameter becomes mandatory.
