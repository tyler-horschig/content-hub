Ping:
  ai_description: >-
    ### General Description

    Tests connectivity and authentication with the ANYRUN TI Feeds service. This action
    is used to verify that the integration is configured correctly and can successfully
    communicate with the ANYRUN API.


    ### Flow Description

    1. Extracts integration configuration parameters, including the API key, proxy
    settings, and SSL verification preferences.

    2. If a proxy is enabled, tests the proxy connection.

    3. Initializes the `FeedsConnector` and executes the `check_authorization` method,
    which makes an API call to the ANYRUN TI Feeds service to verify the API key and
    network connectivity.

    4. Returns a successful execution state if the connection is established, or a
    failed state if an error occurs.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity and authentication with the ANYRUN TI Feeds service to ensure
    the integration is configured correctly.
  capabilities:
