Wipe Mobile Device:
  ai_description: >-
    ### General Description

    Remotely erases or wipes a managed mobile device using the Jamf Pro ERASE_DEVICE
    MDM command. This action initiates a state change on the external device to completely
    wipe its data, with optional configurations for preserving data plans or returning
    the device to service.


    ### Flow Description

    1. Extracts the integration configuration and action parameters, including the
    target Mobile Device ID.

    2. Initializes the JamfManager to authenticate with the Jamf Pro API.

    3. Retrieves the mobile device details via a GET request to the Jamf Pro API to
    obtain its management ID.

    4. Sends a POST request to the Jamf Pro MDM commands endpoint to initiate the
    `ERASE_DEVICE` command with the specified options (e.g., preserve data plan, return
    to service).

    5. Returns the command execution status and details as a JSON result.


    ### Additional Notes

    Requires the Mobile Device ID. Options like 'Return to Service' require specific
    profile data or bootstrap tokens to be provided in the parameters.
