Assign to Group:
  ai_description: >-
    ### General Description

    Assigns computers to a specific computer group in Jamf Pro. This action allows
    bulk operations by accepting comma-separated lists of computer IDs, names, or
    serial numbers to add multiple devices to a group simultaneously.


    ### Flow Description

    1. Extracts the target `Group ID` and the lists of computer identifiers (`Computer
    IDs`, `Computer Names`, `Computer Serial Numbers`) from the action parameters.

    2. Validates that at least one valid computer identifier is provided across the
    three optional parameters.

    3. Constructs an XML payload containing the computers to be added to the group.

    4. Makes a PUT request to the Jamf Pro API (`/JSSResource/computergroups/id/{id}`)
    to update the computer group membership.

    5. Returns a JSON result with the operation status and outputs a summary message
    detailing the processed computers.


    ### Additional Notes

    Computer names are not required to be unique in Jamf; the API will act on the
    first matching record found. Using Computer IDs or Serial Numbers is highly recommended
    for reliable identification.
  ai_short_description: >-
    Assigns computers to a specific computer group in Jamf Pro using computer IDs,
    names, or serial numbers.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specified computers (by ID, name, or serial number) to a computer group
      in Jamf Pro.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Jamf Pro API to update a computer group's
      membership, which mutates external data. It does not fetch data for enrichment,
      nor does it mutate internal SecOps data, update entities, create insights, modify
      alerts, or create case comments.
