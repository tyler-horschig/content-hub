  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Logic | Dropdown | No | Specify what filter logic should be applied.
    |

    | Filter Value | String | No | Specify what value should be used in the filter.
    If "Equal" is selected, action will try to find the exact match among results
    and if "Contains" is selected, action will try to find results that contain that
    substring. "Equal" works with "title" parameter, while "Contains" works with all
    values in response. If nothing is provided in this parameter, the filter will
    not be applied. |

    | Time Frame | Dropdown | Yes | Specify a time frame for the search. If "Custom"
    is selected, you also need to provide "Start Time". |

    | Start Time | String | No | Specify the start time for the search. This parameter
    is mandatory, if "Custom" is selected for the "Time Frame" parameter. Format:
    ISO 8601 |

    | End Time | String | No | Specify the end time for the search. Format: ISO 8601.
    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

    | Max Catalogs To Return | String | No | Specify how many catalogs to return.
    Default: 50. |
List Entity Breaches:
  ai_description: >-
    ### General Description

    This action queries SpyCloud to return information about breaches related to specific
    entities. It supports IP Address, User, and URL entities, enriching them with
    the retrieved breach data.


    ### Flow Description

    1. Retrieves action parameters including Catalog Filter, Time Frame, and Max Breaches
    To Return.

    2. Calculates the start and end timestamps based on the provided Time Frame.

    3. If a Catalog Filter is provided, makes an API call to SpyCloud to retrieve
    catalogs and find the matching catalog ID.

    4. Iterates over the supported target entities (Address, User, URL).

    5. For each entity, determines the appropriate breach type (ips, emails, usernames,
    domains) and makes an API call to SpyCloud to fetch breach data.

    6. If breaches are found, enriches the entity with breach data, marks it as enriched,
    and updates the entity in Google SecOps.

    7. Adds the breach details to the JSON results.


    ### Additional Notes

    The action supports Address, User, and URL entities. For URL entities, the domain
    part is extracted and used for the search. User entities are checked if they match
    an email format to determine the correct breach type (emails vs usernames).
  ai_short_description: >-
    Queries SpyCloud to retrieve breach information related to IP Address, User, and
    URL entities, enriching the entities with the findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from SpyCloud via GET requests (fetches_data=true).
      It does not mutate external data or internal data other than entities. It updates
      entities with enrichment data (can_update_entities=true). It does not create
      insights, modify alert data, or create case comments.
  entity_usage:
