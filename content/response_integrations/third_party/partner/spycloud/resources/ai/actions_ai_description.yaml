      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES` includes `EntityTypes.ADDRESS`,
      `EntityTypes.USER`, and `EntityTypes.URL`. Therefore, it targets Address, User,
      and URL entities, filtering strictly by entity_type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches breach information for entities (IPs, Users/Emails, Domains)
      from SpyCloud and enriches the entities with this data. This aligns with the
      'Enrich IOC' (for IPs, Domains) and 'Enrich Asset' (for Users/Emails) categories,
      as it returns threat intelligence and contextual metadata about breaches.
