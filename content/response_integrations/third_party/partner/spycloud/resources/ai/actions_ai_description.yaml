List Catalogs:
  ai_description: >-
    ### General Description

    Lists available catalogs in SpyCloud based on specified filtering criteria and
    timeframes. This action retrieves a list of breach catalogs from the SpyCloud
    service and returns them as a JSON result and a data table.


    ### Flow Description

    1. Extracts action parameters including filter logic, filter value, timeframe,
    and the maximum number of catalogs to return.

    2. Calculates the start and end timestamps based on the provided timeframe or
    custom start/end times.

    3. Makes a GET request to the SpyCloud API (`/enterprise-v1/breach/catalog`) to
    retrieve the catalogs matching the initial criteria.

    4. Applies additional client-side filtering if the "Equal" logic is selected to
    match the exact catalog title.

    5. Limits the number of returned catalogs based on the `Max Catalogs To Return`
    parameter.

    6. Returns the results as a JSON object and constructs a data table named "Available
    Catalogs" with the findings.


    ### Additional Notes

    This action does not operate on entities. It is a general data retrieval action
    that queries the SpyCloud service for available catalogs.
  ai_short_description: >-
    Lists available breach catalogs in SpyCloud based on specified filtering criteria
    and timeframes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the SpyCloud API to fetch catalog data. It
      does not perform any state-changing operations on external systems, nor does
      it mutate internal data, update entities, create insights, modify alerts, or
      create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over `siemplify.target_entities` or use any entity-specific
      identifiers. It operates independently of entities to fetch a list of catalogs
      from SpyCloud. Therefore, all entity type and filter flags are false.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves a list of available breach catalogs from SpyCloud. This
      does not match any of the specific expected outcomes such as Enrich IOC, Search
      Events, or Get Alert Information.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
