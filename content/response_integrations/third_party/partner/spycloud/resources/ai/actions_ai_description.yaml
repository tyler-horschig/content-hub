    entity. Default: 1. Maximum: 1000. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud server to ensure that the integration is configured
    correctly.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, API Key, Verify SSL).

    2. Initializes the SpyCloudManager.

    3. Makes a GET request to the SpyCloud ping endpoint (`/enterprise-v1/breach/catalog/1`)
    to test connectivity.

    4. Validates the response and returns a success or failure message.


    ### Additional Notes

    This action is typically used for troubleshooting and verifying credentials. It
    does not require any action-specific parameters as it relies entirely on the integration-level
    configuration.
