Get Object Id:
  ai_description: >-
    ### General Description

    Fetches object IDs from BloodHound Enterprise based on provided object names.
    This action queries the BloodHound Enterprise API to retrieve the unique identifiers
    for a given list of object names, which can be used in subsequent actions.


    ### Flow Description

    1. Extracts the comma-separated list of object names from the action parameters.

    2. Initializes the connection to the BloodHound Enterprise API using the provided
    integration credentials.

    3. Iterates through each provided object name and makes a GET request to the `/api/v2/search`
    endpoint to fetch the corresponding object ID.

    4. Consolidates the retrieved object IDs and returns them as a JSON result.


    ### Additional Notes

    Ensure that the provided object names exactly match the names in BloodHound Enterprise
    to successfully retrieve their IDs.
