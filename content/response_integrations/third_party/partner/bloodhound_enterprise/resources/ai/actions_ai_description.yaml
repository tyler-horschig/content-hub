Ping:
  ai_description: >-
    ### General Description

    Tests the connection to the BloodHound Enterprise server to verify credentials
    and network connectivity.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (BloodHound Enterprise
    Server, Token ID, and Token Key).

    2. Initializes the BloodHound Enterprise manager with the provided credentials.

    3. Makes a GET request to the `/api/v2/available-domains` endpoint to verify connectivity
    and authentication.

    4. Returns a successful execution state if the connection succeeds, or fails if
    an error occurs.


    ### Additional Notes

    This is a utility action primarily used during integration setup or troubleshooting
    to ensure that the SOAR platform can successfully communicate with the BloodHound
    Enterprise API.
