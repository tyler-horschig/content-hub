Fetch Assets:
  ai_description: >-
    ### General Description

    Fetches detailed asset information from BloodHound Enterprise based on provided
    object IDs. This action retrieves primary asset details and, for Azure objects,
    enriches the response with related entity counts.


    ### Flow Description

    1. Extracts the `Object IDs` parameter and splits it into a list of individual
    IDs.

    2. Manages asynchronous execution by processing one object ID per run to prevent
    timeouts.

    3. Makes a GET request to the BloodHound Enterprise API to search for the object
    and determine its type.

    4. Makes subsequent GET requests to fetch primary asset details based on the object
    type (Directory, Azure, or Base).

    5. If the object is an Azure type, makes additional GET requests to fetch related
    entity counts.

    6. Aggregates the fetched asset information and adds it to the action's JSON result.


    ### Additional Notes

    This action supports asynchronous execution and will return an INPROGRESS state
    until all provided object IDs have been processed.
