Does Path Exists:
  ai_description: >-
    ### General Description

    Checks if an attack path exists between multiple combinations of principals (source
    and destination nodes) in BloodHound Enterprise.


    ### Flow Description

    1. Extracts the `Event Details` parameter containing JSON pairs of `FromPrincipal`
    and `ToPrincipal`.

    2. Parses the input to identify all principal pairs.

    3. Iterates through each pair and makes a GET request to the BloodHound Enterprise
    API (`/api/v2/graphs/shortest-path`) to determine if a path exists between the
    start and end nodes.

    4. Aggregates the results and outputs a JSON object containing the path information
    for each pair.

    5. Returns `true` if all checked paths exist, otherwise `false`.


    ### Additional Notes

    This action relies on the `Event Details` parameter to specify the target nodes
    rather than standard SOAR entities.
  ai_short_description: >-
    Checks if an attack path exists between specified source and destination principals
    in BloodHound Enterprise.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the BloodHound Enterprise
      API to check for the existence of an attack path. It does not mutate any external
      data, nor does it mutate internal data, update entities, create insights, modify
      alert data, or create case comments. It only returns a JSON result to the playbook.
