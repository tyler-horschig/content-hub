Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Group-IB DRP API. This action is used to ensure that
    the integration is properly configured and can successfully communicate with the
    external service.


    ### Flow Description

    1. Initializes the action and retrieves the integration-level configuration parameters
    (API credentials and URL).

    2. Constructs a poller instance to manage the API connection.

    3. Sends a test GET request to the `violation/list` endpoint of the Group-IB DRP
    API.

    4. Evaluates the response and outputs a success message if the connection is established,
    or an error message if the request fails.


    ### Additional Notes

    This is a utility action primarily used for testing and validating the integration's
    connection settings. It does not process entities or modify any data.
