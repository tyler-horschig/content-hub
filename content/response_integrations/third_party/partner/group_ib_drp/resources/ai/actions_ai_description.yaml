URL-Approve:
  ai_description: >-
    ### General Description

    Approves Digital Risk Protection (DRP) violation URLs in Group-IB by matching
    the target entities of the action. This action interacts with the Group-IB DRP
    API to submit an approve request for each matching URL entity.


    ### Flow Description

    1. Gathers target entities and their types from the action's scope.

    2. Parses the current alert's security events to build a mapping of violation
    URLs to violation UIDs.

    3. Iterates over the target entities, filtering specifically for `DestinationURL`
    entities.

    4. For each valid entity, retrieves its corresponding violation UID from the mapping.

    5. Submits a POST request to the Group-IB DRP API (`violation/change-approve`)
    to approve the violation.

    6. Aggregates the results (approved, failed, unmapped) and outputs a summary message.


    ### Additional Notes

    The action does not abort if a single entity fails; it aggregates failures and
    exits with a failed state only if at least one entity could not be approved.
  ai_short_description: >-
    Approves Digital Risk Protection (DRP) violation URLs in Group-IB for matching
    URL entities.
