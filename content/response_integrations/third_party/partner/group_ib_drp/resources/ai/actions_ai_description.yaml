URL-Reject:
  ai_description: >-
    ### General Description

    Rejects Digital Risk Protection (DRP) violation URLs in Group-IB DRP. It maps
    the action's target entities (Destination URLs) to violation UIDs found in the
    alert's security events, then submits a rejection request to the Group-IB DRP
    API for each matched URL.


    ### Flow Description

    1. Retrieves target entities and the current alert's security events.

    2. Parses security events to build a mapping of violation URLs to their corresponding
    violation UIDs.

    3. Iterates through the target entities, filtering for `DestinationURL` types.

    4. Matches each URL entity to its violation UID.

    5. Sends a POST request to the Group-IB DRP API (`violation/change-approve`) with
    `approve: False` to reject the violation.

    6. Aggregates the results and returns a summary message indicating successful,
    failed, and unmapped rejections.


    ### Additional Notes

    The action will not fail entirely if a single entity fails; it aggregates failures
    and exits with a failed state only if at least one entity could not be rejected.
