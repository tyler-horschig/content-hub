Get Violation Details:
  ai_description: >-
    ### General Description

    Fetches Group-IB DRP violation details for URL entities. This action retrieves
    comprehensive violation information associated with specific URLs and attaches
    the findings as case insights.


    ### Flow Description

    1. Extracts `violation_url` and `violation_uid` from the current alert's security
    events to build a URL-to-UID mapping.

    2. Iterates over the target entities, filtering for those of type `DestinationURL`.

    3. Looks up the corresponding violation UID for each entity's identifier.

    4. Makes an API call (`search_feed_by_id`) to Group-IB DRP to fetch the violation
    details for the identified UID.

    5. Parses the response to extract scores, status, dates, and other relevant metadata.

    6. Creates a case insight for each successfully processed entity containing the
    violation details.

    7. Aggregates all fetched data and returns it as a JSON result.


    ### Additional Notes

    - The action will only process entities that have a matching `violation_url` in
    the alert's security events.

    - If an API call fails for any entity, the action will complete with a failed
    execution state.
  ai_short_description: >-
    Fetches Group-IB DRP violation details for URL entities by mapping them to violation
    UIDs found in alert events, retrieving the data via API, and creating case insights
    with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Group-IB DRP API using `search_feed_by_id`.
      It does not mutate any external data. Internally, it creates case insights using
      `siemplify.create_case_insight` but does not update entities or modify alert
      data.
