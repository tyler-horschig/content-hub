Delete Messages:
  ai_description: >-
    ### General Description

    Deletes specified email messages from recipient mailboxes using Abnormal Security.
    This action serves as a specialized version of the 'Remediate Messages' action
    with the remediation action hard-coded to 'delete'.


    ### Flow Description

    1. Extracts the action parameters including the source, messages JSON, remediation
    reason, and optional tenant IDs.

    2. Parses the provided 'Messages JSON' string into a list of structured message
    objects.

    3. Makes a POST request to the Abnormal Security API (`/v1/search/remediate`)
    to submit a delete request for the specified messages.

    4. Outputs the activity log ID and attaches the full API response to the action's
    JSON result.


    ### Additional Notes

    The 'Messages JSON' parameter must be a valid JSON array of message objects, typically
    obtained from the JSON result of a prior 'Search Messages' action. A single message
    ID is not sufficient for this action.
  ai_short_description: >-
    Deletes specified email messages from recipient mailboxes via the Abnormal Security
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes specified email messages from recipient mailboxes via the Abnormal Security
      API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data or update internal SOAR data. It makes a POST
      request to an external API to delete emails, which mutates external data.
