Get Activity Status:
  ai_description: >-
    ### General Description

    Checks the status of a remediation operation in Abnormal Security using the Activity
    Log ID returned by the Remediate Messages action. This action is designed to be
    polled until the status reaches a terminal state (success, partial_success, or
    error).


    ### Flow Description

    1. Extracts the `Activity Log ID` and optional `Tenant IDs` from the action parameters.

    2. Makes a GET request to the Abnormal Security API (`/v1/search/activities/{activity_log_id}/status`)
    to retrieve the current status of the remediation activity.

    3. Evaluates whether the returned status is in a terminal state.

    4. Outputs the raw JSON response and sets the action's execution result based
    on the completion status.


    ### Additional Notes

    If the activity is still in progress, the action will return a successful execution
    state to allow for continued polling. The `Tenant IDs` parameter is optional and
    generally ignored by the status endpoint, as the tenant scope is resolved from
    the API key.
  ai_short_description: >-
    Checks the status of a remediation operation in Abnormal Security using the Activity
    Log ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
