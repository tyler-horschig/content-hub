Unremediate Threat:
  ai_description: >-
    ### General Description

    Reverses a remediation on an Abnormal Security threat. This action acts as a convenience
    wrapper for posting a threat action with the action set to "unremediate". It can
    operate on a specific Threat ID provided as a parameter or iterate over ThreatSignature
    entities.


    ### Flow Description

    1. Extracts the `Threat ID` and `Message IDs` parameters.

    2. Checks for target entities of type `THREATSIGNATURE`. If found, extracts their
    identifiers to use as threat IDs.

    3. If no entities are found, falls back to the provided `Threat ID` parameter.

    4. Iterates over the collected threat IDs and makes a POST request to the Abnormal
    Security API (`/v1/threats/{threat_id}`) with the action set to "unremediate"
    and the specified message IDs.

    5. Aggregates the results and adds them to the action's JSON result.


    ### Additional Notes

    If target entities of type `THREATSIGNATURE` are provided, the action will process
    them and ignore the `Threat ID` parameter. The `Threat ID` parameter is only used
    if no valid entities are found in the scope.
  ai_short_description: >-
