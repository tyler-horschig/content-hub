Remediate Messages:
  ai_description: >-
    ### General Description

    Takes automated remediation actions on email messages identified as threats in
    Abnormal Security. This action allows users to delete, move to inbox, or submit
    messages to d360 based on a provided JSON array of message objects.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the target
    action, source, remediation reason, and the JSON array of messages.

    2. Parses and validates the provided `Messages JSON` to ensure it contains the
    required message objects.

    3. Makes a POST request to the Abnormal Security API (`/v1/search/remediate`)
    to apply the specified remediation action to the messages.

    4. Retrieves the Activity Log ID from the API response and attaches the full response
    to the action's JSON results.

    5. Returns a success message containing the Activity Log ID, which can be used
    to track the completion status of the remediation.


    ### Additional Notes

    The `Messages JSON` parameter requires full message objects (typically obtained
    from the JSON result of a prior 'Search Messages' action) rather than bare message
    IDs. To remediate a single threat using its ID, use the 'Remediate Threat' action
    instead.
