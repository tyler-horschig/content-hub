Get Case:
  ai_description: >-
    ### General Description

    Retrieves full details of a specific Abnormal Security case by its ID, including
    case status, severity, affected employees, and analysis summary.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the Case
    ID.

    2. Initializes the Abnormal Security API manager.

    3. Makes a GET request to the Abnormal Security API (`/v1/cases/{case_id}`) to
    fetch the case details.

    4. Returns the retrieved case information as a JSON result.


    ### Additional Notes

    Cases are a distinct resource from threats and do not appear in the SIEM threat-log
    event body, so this field does not auto-fill from a threat event. Enter the case
    ID directly, or chain it from a prior List Cases / Get Case step.
