ANYRUN TI Lookup:
  ai_description: >-
    ### General Description

    Performs threat intelligence lookups using ANY.RUN based on provided entity identifiers
    and types or a raw query. It retrieves threat intelligence summaries and attaches
    the results to the case wall.


    ### Flow Description

    1. Extracts action parameters including Lookup Depth, Query, Identifiers, and
    Types.

    2. If a raw query is provided, it executes a lookup against the ANY.RUN API using
    the query.

    3. If no query is provided, it iterates through the provided entity types and
    identifiers, mapping them to ANY.RUN supported types (e.g., address, domain, filehash).

    4. Makes a GET request to the ANY.RUN API to fetch threat intelligence data for
    each item.

    5. Attaches the JSON summary of the report to the case wall.

    6. Adds comments to the case containing the lookup URLs and a final summary report
    with verdicts (Suspicious, Malicious, Unknown).


    ### Additional Notes

    The action relies on the ANY.RUN API key configured in the integration. It processes
    entities based on the Identifiers and Types parameters rather than the standard
    target entities list.
  ai_short_description: >-
    Performs threat intelligence lookups using ANY.RUN based on provided entity identifiers
    or a raw query, attaching the resulting threat summaries and verdicts to the case
    wall.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments and attaches JSON summaries to the case wall.
    reasoning: >-
      The action makes a GET request to the ANY.RUN API to fetch threat intelligence
      data (fetches_data=true). It does not mutate external data. It mutates internal
      data by adding case comments and attaching JSON summaries to the case wall (can_mutate_internal_data=true,
      can_create_case_comments=true). It does not update entities or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: true
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: true
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: true
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action receives entity identifiers and types as comma-separated strings
      via parameters. It iterates over these and processes them only if their type
      matches one of the supported types defined in Config.ENTITIES (address, ipset,
      destinationurl, domain, process, filehash). Therefore, it targets Address, IP
      Set, URL, Domain, Process, and File Hash entities, filtering them by entity
      type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches threat intelligence (verdicts, summaries) from ANY.RUN for
      specific IOCs (IPs, domains, URLs, hashes) or a raw query. This aligns with
      the 'Enrich IOC' category. It does not mutate external state or update alerts.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Lookup Depth | String | Yes | Specify the number of days from the current date
    for which you want to lookup. |

    | Query | String | No | Raw query with necessary filters. Supports condition concatenation
    with AND, OR, NOT and Parentheses (). |

    | Identifiers | String | Yes | The target case entity identifiers. |

    | Types | String | Yes | The target case entity types. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ANY.RUN TI Lookup service to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Extracts integration configuration parameters, including the API key, SSL verification
    settings, and proxy details.

    2. If proxy settings are enabled, verifies the proxy connection.

    3. Makes an API call to the ANY.RUN TI Lookup service to check authorization (`connector.check_authorization()`).

    4. Returns a successful execution state if the connection is established, or a
    failed state if an error occurs.


    ### Additional Notes

    This action does not interact with entities or modify any data. It is solely used
    for diagnostic purposes to validate API credentials and network connectivity.
  ai_short_description: >-
    Tests connectivity and authorization with the ANY.RUN TI Lookup service.
