Get Compliance Info:
  ai_description: >-
    ### General Description

    Retrieves compliance information for specified frameworks from Orca Security.
    This action fetches compliance scores, passed/failed test results, and framework
    descriptions, providing visibility into the organization's compliance posture.


    ### Flow Description

    1. Extracts the provided framework names, result limit, and the flag to create
    an insight.

    2. Initializes the Orca Security API client.

    3. Makes a POST request to the Orca Security API (`/api/serving-layer/compliance/frameworks/overview`)
    to fetch compliance data for the specified frameworks.

    4. If the `Create Insight` parameter is enabled, generates a case insight containing
    the compliance information.

    5. Populates a data table with the compliance details and attaches the raw JSON
    response to the action results.


    ### Additional Notes

    If no framework names are provided, the action will return information about all
    available frameworks up to the specified limit.
