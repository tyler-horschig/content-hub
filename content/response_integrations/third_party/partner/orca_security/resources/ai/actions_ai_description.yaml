Get Asset Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific assets in Orca Security using their
    Asset IDs. The action can optionally fetch vulnerabilities related to the assets
    and create case insights with the enriched data.


    ### Flow Description

    1. Extracts the provided Asset IDs and configuration parameters.

    2. Validates the maximum number of vulnerabilities to fetch.

    3. Iterates over each provided Asset ID.

    4. Makes an API call to Orca Security to retrieve the asset details.

    5. If configured, makes an additional API call to fetch vulnerabilities associated
    with the asset based on the specified severity.

    6. Aggregates the retrieved data into JSON and CSV formats.

    7. If enabled, creates a case insight for each successfully processed asset.

    8. Returns the aggregated results and a summary message.


    ### Additional Notes

    - The action requires valid Orca Security API credentials (API Key or API Token).

    - The maximum number of vulnerabilities that can be fetched per asset is 100.
  ai_short_description: >-
    Retrieves detailed information and optionally related vulnerabilities for specific
    assets in Orca Security using their Asset IDs, and can create case insights with
    the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes API requests to Orca Security to fetch asset details and vulnerabilities.
      It does not mutate external data. It creates case insights but does not update
      entities or modify alert data.
