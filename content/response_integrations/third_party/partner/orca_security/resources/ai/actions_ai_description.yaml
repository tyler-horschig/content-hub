Add Comment To Alert:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alert in Orca Security.


    ### Flow Description

    1. Extracts the `Alert ID` and `Comment` parameters.

    2. Initializes the Orca Security API client with the provided credentials.

    3. Makes a PUT request to the `/api/alerts/{alert_id}/comment` endpoint to add
    the specified comment to the alert.

    4. Returns the JSON response containing the added comment details and completes
    the action.


    ### Additional Notes

    None.
