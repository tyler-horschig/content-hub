Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert in Orca Security. This action allows users to change the status
    of an alert, snooze or unsnooze it, and initiate the verification process for
    a specific alert ID.


    ### Flow Description

    1. Validates the provided parameters to ensure at least one update action (Status,
    Verify Alert, or Snooze State) is requested.

    2. If requested, initiates the verification process for the alert via the Orca
    Security API.

    3. If requested, snoozes the alert for the specified number of days.

    4. If requested, updates the status of the alert (e.g., Open, In Progress, Close,
    Dismiss).

    5. Retrieves the updated alert data from Orca Security and attaches it to the
    action's JSON results.


    ### Additional Notes

    If "Unsnooze" is selected without a specific status, the alert status defaults
    to "Open".
  ai_short_description: >-
    Updates the status, snooze state, or verification state of a specific alert in
    Orca Security and returns the updated alert details.
