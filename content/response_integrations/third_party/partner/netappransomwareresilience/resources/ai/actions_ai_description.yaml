    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Blocks a user from accessing resources protected by NetApp Ransomware Resilience.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the NetApp Ransomware Resilience API to block
      a user. It mutates external data by changing the user's access status. It does
      not fetch contextual data, update internal entities, or create insights.
