Block User:
  ai_description: >-
    ### General Description

    Blocks a user from accessing resources protected by NetApp Ransomware Resilience.
    This action initiates a state change on the external service to prevent the specified
    user and/or client IPs from accessing protected storage resources.


    ### Flow Description

    1. Extracts the `User ID`, `User IPs`, and `Duration` parameters from the action
    configuration.

    2. Makes a POST request to the NetApp Ransomware Resilience API (`users/block-user`)
    to block the specified user and/or IPs for the given duration.

    3. Retrieves the API response and attaches it to the action's JSON result.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    - The `User IPs` parameter is required for NFS but optional for CIFS.
  ai_short_description: >-
    Blocks a user from accessing resources protected by NetApp Ransomware Resilience.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
