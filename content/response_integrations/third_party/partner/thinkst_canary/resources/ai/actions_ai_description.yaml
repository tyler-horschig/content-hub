    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the `/ping` endpoint to verify connectivity.
      It does not fetch contextual data for alerts/entities, mutate external data,
      mutate internal data, update entities, create insights, modify alert data, or
      create case comments.
