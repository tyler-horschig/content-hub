Acknowledge Console Alert:
  ai_description: >-
    ### General Description

    Acknowledges an alert on the Thinkst Canary console. This action interacts with
    the external Canary Console to mark a specific incident as acknowledged, changing
    its state in the external system.


    ### Flow Description

    1. Retrieves the `AlertId` from the additional properties of the current alert's
    security events.

    2. Makes a POST request to the Thinkst Canary API (`/incident/acknowledge`) using
    the extracted incident ID.

    3. Returns a success message if the incident is successfully acknowledged on the
    console.


    ### Additional Notes

    This action relies on the alert containing an `AlertId` in the additional properties
    of its security events, which is typically populated when the alert is ingested
    by the connector.
  ai_short_description: >-
    Acknowledges an alert on the Thinkst Canary console by extracting the incident
    ID from the current alert and sending an acknowledgment request to the Canary
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Acknowledges an incident on the Thinkst Canary Console.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Canary Console API to acknowledge an
      incident, which mutates external data. It does not fetch data, update entities,
      create insights, or modify internal SecOps data.
