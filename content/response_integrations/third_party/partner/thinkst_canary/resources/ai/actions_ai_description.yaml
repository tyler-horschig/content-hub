Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity and authentication to the Thinkst Canary Console. This action
    ensures that the integration is properly configured with valid credentials and
    can successfully communicate with the external service.


    ### Flow Description

    1. Extracts the API Key, Console Hash, and Verify SSL settings from the integration
    configuration.

    2. Initializes the ThinkstActionManager with the extracted credentials.

    3. Makes an HTTP GET request to the `/ping` endpoint of the Canary Console API.

    4. Evaluates the response and returns a success message if the connection is established
    and authenticated, or an error message otherwise.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration. It does not interact with or modify any
    case entities.
  ai_short_description: >-
    Verifies connectivity and authentication to the Thinkst Canary Console using the
    provided integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
