Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Infoblox API service. This action verifies that the
    provided integration credentials and network settings are correct and that the
    Infoblox server is reachable.


    ### Flow Description

    1. Retrieves integration parameters (API root, username, password).

    2. Initializes the Infoblox API manager.

    3. Makes a GET request to the Infoblox API schema endpoint (`/wapi/v2.13.1/?_schema`)
    to verify connectivity.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

