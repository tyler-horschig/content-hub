Update RPZ CNAME Rule:
  ai_description: >-
    ### General Description

    Updates an existing Response Policy Zone (RPZ) CNAME rule in Infoblox NIOS to
    modify DNS behavior.


    ### Flow Description

    1. Extracts and validates the provided parameters including Reference ID, Name,
    RP Zone, and Rule Type.

    2. Determines the canonical name based on the selected Rule Type (e.g., Block,
    Passthru, Substitute).

    3. Makes a PUT request to the Infoblox API to update the specified RPZ CNAME rule
    using its Reference ID.

    4. Returns the updated rule details and attaches them as a JSON result and a data
    table in the case wall.


    ### Additional Notes

    The action requires the Reference ID of the existing rule. If the Rule Type is
    set to 'Substitute (Domain name)', a Substitute Name must be provided. The action
    will fail if the Reference ID is invalid or not found.
