Create Host Record:
  ai_description: >-
    ### General Description

    Adds a host record to Infoblox with associated IP addresses. When configured for
    DNS, it also creates corresponding A/AAAA and PTR DNS records. This action is
    useful for IPAM and DNS inventory management.


    ### Flow Description

    1. Extracts the provided action parameters including the host name, IP addresses,
    and DNS configurations.

    2. Validates the input parameters to ensure correct formatting.

    3. Initiates a POST request to the Infoblox API to create the host record.

    4. Returns the created host record details in JSON format and as a data table.


    ### Additional Notes

    Ensure that the provided host name belongs to an existing DNS zone in Infoblox.
  ai_short_description: >-
    Adds a host record to Infoblox with associated IP addresses and optionally creates
    corresponding DNS records.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new host record in Infoblox with associated IP addresses and optionally
      DNS records.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Infoblox API to create a new host record,
      which mutates external data. It does not fetch contextual data for alerts, mutate
      internal SecOps data, update entities, create insights, or add case comments.
