Create RPZ CNAME Rule:
  ai_description: >-
    ### General Description

    Adds a CNAME rule to an existing Response Policy Zone (RPZ) in Infoblox NIOS to
    override DNS behavior. This action can be used to block, allow (passthru), or
    substitute DNS resolution for specific domains or IP addresses.


    ### Flow Description

    1. Extracts the action parameters including the rule name, RP zone, rule type,
    object type, and any additional configurations.

    2. Validates the required parameters and parses the additional parameters JSON
    if provided.

    3. Makes a POST request to the Infoblox NIOS API (`/record:rpz:cname` or related
    endpoints based on the object type) to create the RPZ CNAME rule with the specified
    canonical behavior.

    4. Returns the created rule details as a JSON object and a CSV table.


    ### Additional Notes

    The behavior of the rule is determined by the `Rule Type` parameter. For example,
    'Block (No data)' or 'Block (No such domain)' will prevent resolution, 'Passthru'
    will allow resolution by bypassing other RPZ rules, and 'Substitute (Domain name)'
    will redirect the resolution to the provided `Substitute Name`.
  ai_short_description: >-
    Adds a CNAME rule to an existing Response Policy Zone (RPZ) in Infoblox NIOS to
    override DNS behavior.
