Search RPZ Rule:
  ai_description: >-
    ### General Description

    Searches for a specific Response Policy Zone (RPZ) rule by its name within Infoblox
    NIOS. This action retrieves the configuration and details of the specified RPZ
    rule based on the provided object type and rule name.


    ### Flow Description

    1. Extracts the action parameters: Object Type, Rule Name, Output Fields, and
    Limit.

    2. Validates the Limit parameter to ensure it is a positive integer.

    3. Formats the requested output fields by combining them with default return fields.

    4. Makes a GET request to the Infoblox API (`/{object_type}`) to search for the
    RPZ rule matching the provided criteria.

    5. Parses the API response and attaches the raw JSON results to the action's output.

    6. Constructs and attaches a data table displaying up to the maximum allowed records
    for quick analyst review.


    ### Additional Notes

    This action does not operate on SecOps entities. It is purely a search/fetch operation
    against the Infoblox NIOS platform.
