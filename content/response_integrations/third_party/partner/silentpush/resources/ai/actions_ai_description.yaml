Screenshot URL:
  ai_description: >-
    ### General Description

    Generates a screenshot of a specified URL using the Silent Push integration. This
    action triggers an on-demand scan of the provided URL, retrieves the resulting
    screenshot URL, and verifies its accessibility.


    ### Flow Description

    1. Extracts the target URL from the action parameters.

    2. Calls the Silent Push API (`explore/tools/scanondemand`) to request a screenshot
    of the URL.

    3. Parses the API response to extract the generated screenshot URL.

    4. Verifies the screenshot URL by attempting to download the image via an HTTP
    GET request.

    5. Returns the original URL and the screenshot URL as a JSON result.


    ### Additional Notes

    - The action verifies the accessibility of the generated screenshot URL but does
    not attach the image file to the case or save it locally.

    - Although the script contains a loop that prints entity identifiers, the core
    logic operates solely on the provided `URL` parameter and does not functionally
    process entities.
