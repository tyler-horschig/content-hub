    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new feed in the Silent Push platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Silent Push API to create a new feed,
      which mutates external data. It does not fetch contextual data, update internal
      entities, create insights, modify alert data, or create case comments.
