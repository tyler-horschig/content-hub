Run a Workflow:
  ai_description: >-
    ### General Description

    Triggers a Torq workflow by sending a POST request to a configured Torq webhook.
    The action passes a custom JSON input object and can optionally include the current
    alert payload. It also supports polling the Torq Public API to retrieve the final
    execution output if credentials are provided.


    ### Flow Description

    1. Retrieves integration configuration and action parameters.

    2. Gathers minimal case and environment context, and optionally extracts the current
    alert payload.

    3. Constructs a JSON payload containing the workflow input, context, and alert
    data.

    4. Sends a POST request to the Torq webhook URL to initiate the workflow execution.

    5. If polling parameters are provided, makes GET requests to poll the Torq Public
    API to monitor the execution status.

    6. Returns the execution results, including the final output and status, to the
    Google SecOps platform.


    ### Additional Notes

    The action requires a valid Torq Webhook URL and Secret. Polling functionality
    requires Torq API credentials.
