Create a Case:
  ai_description: >-
    ### General Description

    Creates a case in Torq by invoking a Torq workflow via a Webhook. It sends the
    current alert payload and optional deduplication or correlation keys to the external
    system. If Torq API credentials or a Bearer token override are provided, the action
    will also poll the Torq Public API to retrieve the final execution output.


    ### Flow Description

    1. Reads integration configurations and action-specific parameters (e.g., Deduplication
    Key, Correlation Key).

    2. Collects the current case context and alert data from Google SecOps.

    3. Constructs a JSON payload containing the source, action, context, alert details,
    and optional keys.

    4. Makes a POST request to the configured Torq Webhook URL to trigger the workflow.

    5. If configured, polls the Torq Public API (via GET requests) to retrieve the
    final execution status and output.

    6. Returns the execution results and output to the SecOps platform as a JSON result.


    ### Additional Notes

    Requires a valid Torq Webhook URL and Webhook Secret configured in the integration.
    Polling for execution results requires valid Torq API credentials (Client ID/Secret)
    or a Bearer token override.
  ai_short_description: >-
    Creates a case in Torq by invoking a workflow via Webhook and optionally polls
    for the execution results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a Torq workflow via Webhook to create a case in the Torq platform.
    fetches_data: true
