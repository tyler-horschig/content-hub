    initiates a state change in the external Doppel platform by submitting the entity
    details, and returns the created alert information.


    ### Flow Description

    1. Extracts the `Entity` parameter provided by the user.

    2. Initializes the DoppelManager with the integration credentials.

    3. Makes a POST request to the Doppel API (`/v1/alert`) to create an alert for
    the specified entity.

    4. Retrieves the response from the API and attaches the created alert details
    to the action's JSON result.


