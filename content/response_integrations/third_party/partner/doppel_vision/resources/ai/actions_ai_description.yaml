    | Alert_ID | String | No | Unique identity for each specific alert in Doppel tenant.
    Either this or 'Entity' must be provided. |

    | Entity | String | No | Entity to be alerted. Either this or 'Alert_ID' must
    be provided. |

    | Queue_State | Dropdown | Yes | Queue state value of the Alerts. Values: "doppel_review",
    "needs_confirmation", "monitoring", "taken_down", "actioned", "archived". |

    | Entity_State | Dropdown | Yes | Entity state of Alerts. Values: "active", "down",
    "parked". |
