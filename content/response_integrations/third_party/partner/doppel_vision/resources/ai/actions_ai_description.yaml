Create Abuse Alert:
  ai_description: >-
    ### General Description

    Creates a new abuse alert for a specified entity value in the Doppel system. This
    action initiates a request to Doppel's abuse box to register the provided entity.


    ### Flow Description

    1. Extracts the target entity value from the action parameters.

    2. Makes a POST request to the Doppel API (`/alert/abuse`) to create the abuse
    alert for the specified entity.

    3. Retrieves the response from Doppel and stores the created alert details in
    the action's JSON result.


    ### Additional Notes

    The action will fail if the provided entity value is invalid or is considered
    protected (e.g., google.com) within Doppel's system.
