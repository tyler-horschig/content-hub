    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the IPInfo API to fetch domain information.
      It does not mutate external data. It updates the internal entities with the
      fetched data using `siemplify.update_entities`, but does not create insights,
      modify alert data, or create case comments.
