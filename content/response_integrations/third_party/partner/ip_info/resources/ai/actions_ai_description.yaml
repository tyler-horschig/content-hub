Get Domain Information:
  ai_description: >-
    ### General Description

    Retrieves domain information for Hostname entities using the IPInfo service. This
    action enriches the entities with contextual data about the domain.


    ### Flow Description

    1. Filters the target entities to identify those of type Hostname.

    2. Iterates through each Hostname entity and extracts the domain name from its
    identifier.

    3. Makes a GET request to the IPInfo API (`/domains/{domain_name}`) to fetch domain
    information.

    4. If information is found, updates the entity's `additional_properties` with
    the flattened domain data and marks the entity as enriched.

    5. Attaches an entity table containing the flattened domain information to the
    action results.

    6. Updates the enriched entities within the Google SecOps platform.

    7. Returns a JSON result containing the fetched domain information for all successful
    entities.


    ### Additional Notes

    None.
  ai_short_description: >-
    Retrieves domain information for Hostname entities using the IPInfo service and
    enriches the entities with the fetched data.
