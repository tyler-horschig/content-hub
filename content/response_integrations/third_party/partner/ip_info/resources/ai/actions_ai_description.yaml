Ping:
  ai_description: >-
    ### General Description

    Checks the validity of the API token and the connection to the IPInfo service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Token, Verify
    SSL).

    2. Initializes the IPInfoManager.

    3. Executes a ping request by making a GET request to the IPInfo API using a test
    IP address (8.8.8.8).

    4. Validates the response to ensure the token is valid and the connection is successful.

    5. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the IPInfo API.
  ai_short_description: >-
    Checks the validity of the API token and the connection to the IPInfo service
