Get IP Information:
  ai_description: >-
    ### General Description

    Retrieves detailed information for IP address entities using the IPInfo service.
    This action enriches the entities with contextual data such as location, ASN,
    and organization details, providing analysts with better visibility into the IP
    addresses involved in an alert.


    ### Flow Description

    1. Filters the target entities to include only those of type `ADDRESS`.

    2. Iterates through the filtered IP entities and makes a GET request to the IPInfo
    API to fetch information for each IP address.

    3. If successful, updates the entity's `additional_properties` with the retrieved
    data and marks the entity as enriched (`is_enriched = True`).

    4. Attaches the fetched information as an entity table and a JSON result.

    5. Saves the updated entities back to the platform using `siemplify.update_entities`.


    ### Additional Notes

    If the action fails to fetch information for a specific entity, it logs the error
    and continues processing the remaining entities.
