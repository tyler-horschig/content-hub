IP Timeline Lookup:
  ai_description: >-
    ### General Description

    Retrieves the activity timeline for IP address entities using GreyNoise. This
    action fetches historical data showing changes over time based on a specified
    field and granularity, enriches the entities with this data, and generates an
    insight with the timeline details.


    ### Flow Description

    1. Extracts the `Days`, `Field`, and `Granularity` parameters from the action
    configuration.

    2. Retrieves IP address entities from the target entities list.

    3. Iterates through each IP entity and makes an API call to the GreyNoise `timeline`
    endpoint to fetch historical activity.

    4. If timeline data is found, enriches the entity's additional properties with
    the timeline data and marks it as enriched.

    5. Generates an HTML insight displaying the timeline activity and attaches it
    to the entity.

    6. Updates the entities in the platform and returns the results as JSON.


    ### Additional Notes

    - Requires a valid GreyNoise API key configured in the integration.

    - The `Days` parameter must be a valid positive integer.
