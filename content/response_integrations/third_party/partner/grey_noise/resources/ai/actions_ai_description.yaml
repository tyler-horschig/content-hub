    ### General Description

    Enriches CVE entities using GreyNoise to retrieve intelligence such as CVSS scores,
    EPSS scores, and active threat data.


    ### Flow Description

    1. Retrieves CVE entities from the case.

    2. Validates the format of each CVE identifier.

    3. Makes an API call to GreyNoise (`cve_lookup`) to fetch CVE details.

    4. Updates the entity's additional properties with the retrieved enrichment data
    and marks it as enriched.

    5. Generates and attaches an HTML insight to the entity.

    6. Updates the entities in the platform and returns the JSON results.


