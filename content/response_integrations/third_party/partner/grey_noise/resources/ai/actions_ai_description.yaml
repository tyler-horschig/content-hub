IP Lookup:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using GreyNoise. It retrieves comprehensive intelligence
    including classification, actor attribution, tags, associated CVEs, and business
    service information to provide context on the IP's behavior and reputation.


    ### Flow Description

    1. Retrieves IP Address entities from the current case.

    2. Checks the GreyNoise API key tier to determine if it is a Community or Enterprise
    key.

    3. If using a Community key, makes individual GET requests to the GreyNoise API
    for each IP address. If using an Enterprise key, makes a single batch GET request
    to the GreyNoise API for all IP addresses.

    4. Evaluates the API response to determine if the IP is found in the GreyNoise
    dataset and whether its classification is suspicious or malicious.

    5. Updates the entity's `additional_properties` with the enrichment data, marks
    it as enriched, and updates its suspicious status.

    6. Generates an HTML insight containing the IP intelligence overview (including
    tags, CVEs, and business service info) and attaches it to the entity.

    7. Updates the entities in the platform and returns the raw JSON results.


    ### Additional Notes

    The action automatically adjusts its lookup strategy (individual vs. batch) based
    on the provided GreyNoise API key tier. Community tier keys have limited data
    availability compared to Enterprise keys.
