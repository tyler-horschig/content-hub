Execute GNQL Query:
  ai_description: >-
    ### General Description

    Executes a custom GreyNoise Query Language (GNQL) query to search GreyNoise threat
    intelligence data. This action allows analysts to retrieve a collection of IP
    addresses and their associated scanning telemetry that match specific search criteria.


    ### Flow Description

    1. Extracts the provided GNQL query, maximum results limit, and formatting preferences
    (Quick, Exclude Raw).

    2. Makes an API request to the GreyNoise `query` endpoint to execute the GNQL
    search.

    3. Automatically paginates through the API responses using the scroll token until
    the requested maximum number of results is reached or all available data is fetched.

    4. Aggregates the retrieved records and attaches them to the action's JSON result.


    ### Additional Notes

    This action does not operate on specific case entities but rather performs a global
    search against the GreyNoise dataset. The 'Quick' parameter can be used to reduce
    the payload size by returning only the IP address and its classification or trust
    level.
  ai_short_description: >-
    Executes a custom GNQL query to search GreyNoise threat intelligence data and
    returns the matching records.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the GreyNoise API using a GNQL query. It does not
      mutate any external data, nor does it update internal entities, create insights,
      modify alert data, or create case comments.
