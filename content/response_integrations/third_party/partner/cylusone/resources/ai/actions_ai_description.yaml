Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cylus platform using the provided integration credentials.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (Base URL, API Key,
    Verify SSL).

    2. Initializes the API manager to handle the connection.

    3. Makes a GET request to the `/rest/v1/assets/by-ip` endpoint using a test IP
    address (`10.0.0.5`) to verify that the API is reachable and the credentials are
    valid.

    4. Returns a successful result if the connection is established, or fails the
    action with an error message if the connection or authentication fails.


    ### Additional Notes

    This action is intended solely for verifying the integration setup and does not
    process alerts or entities.
  ai_short_description: >-
    Tests connectivity to the Cylus platform using the provided integration credentials
    to ensure the API is reachable and authentication is successful.
