EnrichAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP address entities by retrieving asset information from the CylusOne
    platform. The action fetches contextual asset details associated with the IP and
    updates the entity's additional properties with the retrieved data.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those with the `ADDRESS` entity type.

    3. Validates that the entity's identifier is a properly formatted IPv4 address.

    4. Makes an HTTP GET request to the CylusOne API (`/rest/v1/assets/by-ip`) to
    fetch asset data for the validated IP address.

    5. Parses the returned asset data, compacts it, and appends it to the entity's
    `additional_properties`.

    6. Marks the entity as enriched (`is_enriched = True`) and updates the entity
    within the Google SecOps platform.


    ### Additional Notes

    - The action strictly requires IPv4 addresses; other formats or entity types will
    be skipped or return an error.

    - Extracted properties are prefixed with `Cylus_` in the entity's additional properties.
  ai_short_description: >-
    Enriches IP address entities by retrieving asset information from the CylusOne
    platform and updating the entity's additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the CylusOne API to fetch asset data (fetches_data=true).
      It does not mutate external data (can_mutate_external_data=false). It updates
      the internal entities with the fetched data by calling `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
