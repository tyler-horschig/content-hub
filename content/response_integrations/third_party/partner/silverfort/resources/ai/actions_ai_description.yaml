Get Entity Risk:
  ai_description: >-
    ### General Description

    Retrieves risk information for a specific user or resource from Silverfort. This
    action returns the current risk score, severity, and risk factors associated with
    the provided identity or resource.


    ### Flow Description

    1. Extracts the `User Principal Name` and `Resource Name` parameters.

    2. Validates that at least one of the parameters is provided.

    3. Makes a GET request to the Silverfort Risk API (`/v1/public/getEntityRisk`)
    to fetch the entity's risk data.

    4. Returns the retrieved risk score, severity, and risk factors as a JSON result.


    ### Additional Notes

    Either the `User Principal Name` (for users) or `Resource Name` (for resources)
    must be provided for the action to execute successfully.
