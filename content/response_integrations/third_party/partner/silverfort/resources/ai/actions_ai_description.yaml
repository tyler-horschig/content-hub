Change Policy State:
  ai_description: >-
    ### General Description

    Enables or disables an authentication policy in Silverfort. This action provides
    a quick way to toggle a policy's active state without modifying its underlying
    configuration.


    ### Flow Description

    1. Extracts the `Policy ID` and the desired state (`Enable Policy`) from the action
    parameters.

    2. Makes a POST request to the Silverfort API (`/v1/public/changePolicyState`)
    to update the policy's state.

    3. Returns a JSON result containing the policy ID, the requested state, and the
    final status.


    ### Additional Notes

    This action does not operate on entities and relies entirely on the provided action
    parameters.
