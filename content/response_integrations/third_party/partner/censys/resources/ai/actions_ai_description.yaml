Create Related Infrastructure Job:
  ai_description: >-
    ### General Description

    This action initiates a CensEye job to discover related infrastructure for a given
    target (host, web property, or certificate) in Censys. The job runs asynchronously
    and returns a job ID that can be used to monitor status and retrieve results.


    ### Flow Description

    1. Extracts the target type and target value from the action parameters.

    2. Validates the target value based on the selected target type (e.g., IP address
    format for Host, domain:port for Web Property, SHA-256 for Certificate).

    3. Makes a POST request to the Censys API to create a new CensEye related infrastructure
    job.

    4. Returns the job ID, state, and creation time as a JSON result.


    ### Additional Notes

    - The action does not wait for the job to complete. Use the corresponding actions
    to retrieve the job status and findings.
  ai_short_description: >-
    Initiates an asynchronous CensEye job in Censys to discover related infrastructure
    for a specified host, web property, or certificate, returning a job ID for tracking.
