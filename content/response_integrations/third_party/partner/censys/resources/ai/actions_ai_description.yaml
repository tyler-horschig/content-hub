Initiate Rescan:
  ai_description: >-
    ### General Description

    Initiates a live rescan for a known host service or web origin on the Censys platform.
    This action triggers a scan for a specific IP and port or hostname and port, returning
    a scan ID that can be used to monitor the scan's progress.


    ### Flow Description

    1. Extracts the action parameters including IOC Type, IOC Value, Port, Protocol,
    and Transport Protocol.

    2. Validates the provided parameters, ensuring the port is a valid integer and
    the IP address is valid if the IOC type is a Service.

    3. Makes a POST request to the Censys API (`/v3/global/scans/rescan`) to initiate
    the rescan.

    4. Retrieves the scan ID, creation time, and task information from the API response.

    5. Returns the scan ID and task count as the action result and attaches the raw
    JSON response.


    ### Additional Notes

    The scan may take several minutes to complete. The returned scan ID can be used
    in subsequent actions to monitor the scan's status.
