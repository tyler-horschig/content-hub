Get Related Infrastructure Results:
  ai_description: >-
    ### General Description

    Retrieves the detailed pivot results from a completed CensEye job, formats them
    into a table with 5 columns, and generates Censys search URLs for each pivot.
    This action allows analysts to review related infrastructure findings directly
    within the SOAR platform.


    ### Flow Description

    1. Extracts the `Job ID` parameter provided by the user or a previous action.

    2. Validates the presence of the `Job ID`.

    3. Makes an HTTP GET request to the Censys API (`/v3/threat-hunting/censeye/jobs/{job_id}/results`)
    to fetch the job results.

    4. Parses the returned pivot results, calculating the total assets across all
    pivots.

    5. Formats the parsed data into a CSV table and attaches it to the action's results.

    6. Attaches the raw JSON response to the action's results for further playbook
    processing.


    ### Additional Notes

    - The action retrieves a maximum of 50 results per job as per Censys API limitations.

    - The generated table includes clickable Censys search URLs for each pivot to
    facilitate further investigation.
