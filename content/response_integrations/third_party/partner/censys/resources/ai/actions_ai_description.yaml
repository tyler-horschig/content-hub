Get Rescan Status:
  ai_description: >-
    ### General Description

    Retrieves the current status of a scan by its ID using the Censys API. This action
    allows users to monitor the progress of previously initiated scans and determine
    when scan results are available.


    ### Flow Description

    1. Extracts the `Scan ID` parameter.

    2. Validates the `Scan ID` to ensure it is a non-empty string.

    3. Initializes the Censys API manager with the provided integration credentials.

    4. Makes a GET request to the Censys API to retrieve the scan status for the specified
    ID.

    5. Adds the raw JSON response to the action results.

    6. Evaluates the scan status based on the `completed` flag in the response.

    7. Returns the appropriate execution state (`COMPLETED`, `INPROGRESS`, or `FAILED`)
    and an output message detailing the status.


    ### Additional Notes

    The action supports asynchronous execution and will return an `IN_PROGRESS` status
    if the scan is still running, allowing the SOAR platform to poll the status until
    completion.
