Get Host History:
  ai_description: >-
    ### General Description

    Retrieves the event history for a specific host (IP address) using Censys. This
    action allows users to view historical scan data, track infrastructure changes
    over time, and identify when services were added, removed, or modified.


    ### Flow Description

    1. Extracts and validates the `Host ID` (IP address), `Start Time`, and `End Time`
    parameters.

    2. Makes a GET request to the Censys API (`/v3/global/asset/host/{host_id}/timeline`)
    to fetch the host's event history within the specified time range.

    3. Handles pagination to retrieve up to a maximum threshold of records, reversing
    the time parameters as required by the API.

    4. Returns the historical events as a JSON result and constructs a data table
    for the action output.


    ### Additional Notes

    The action handles partial data collection if pagination fails midway, returning
    the successfully fetched pages along with a warning in the output message. If
    the total number of events exceeds the maximum table display limit, the full results
    are still available in the JSON output.
