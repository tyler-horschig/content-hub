Get Related Infrastructure Job Status:
  ai_description: >-
    ### General Description

    Retrieves the current status of a CensEye job by its ID. It supports asynchronous
    execution and returns an IN_PROGRESS status if the job is still running, allowing
    playbooks to poll until completion.


    ### Flow Description

    1. Extracts the `Job ID` parameter provided by the user or playbook.

    2. Makes an HTTP GET request to the Censys API (`/v3/threat-hunting/censeye/jobs/{job_id}`)
    to fetch the current status of the job.

    3. Evaluates the returned job state (COMPLETED, FAILED, or INPROGRESS).

    4. Attaches the raw JSON response to the action results.

    5. Returns the appropriate execution state and output message to the SOAR platform.


    ### Additional Notes

    This action is designed to be used asynchronously in playbooks to poll for job
    completion. It does not operate on entities.
