Enrich Certificates:
  ai_description: >-
    ### General Description

    Enriches FILEHASH entities representing SSL/TLS certificates using the Censys
    Platform API. This action retrieves comprehensive certificate intelligence, including
    issuer, subject, validity periods, and SANs (Subject Alternative Names), to provide
    deeper context for the indicator.


    ### Flow Description

    1. Extracts `FILEHASH` entities from the target entities list.

    2. Validates the entity identifiers to ensure they are valid SHA-256 fingerprints
    (exactly 64 hexadecimal characters).

    3. Makes a POST request to the Censys API (`/v3/global/asset/certificate`) to
    fetch certificate data for the valid fingerprints.

    4. Parses the API response and extracts relevant enrichment data (e.g., `subject_dn`,
    `issuer_dn`, `not_before`, `not_after`, `is_self_signed`).

    5. Clears any previous Censys certificate enrichment data from the entities.

    6. Updates the entities' `additional_properties` with the new enrichment data
    and sets `is_enriched` to true.

    7. Saves the updated entities and attaches the raw certificate data as JSON results.


    ### Additional Notes

    - Entities that do not match the `FILEHASH` type or have invalid SHA-256 fingerprint
    formats are skipped.

    - The action processes valid certificate IDs in a single batch API call for efficiency.
  ai_short_description: >-
    Enriches FILEHASH entities representing SSL/TLS certificates by retrieving comprehensive
    certificate intelligence from the Censys Platform API.
