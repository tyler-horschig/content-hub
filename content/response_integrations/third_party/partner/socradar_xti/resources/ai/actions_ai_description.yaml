Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specific tag from an existing alarm in SOCRadar. This action interacts
    with the SOCRadar API to modify the metadata of an external alarm by removing
    a designated tag.


    ### Flow Description

    1. Extracts the `Alarm ID` and `Tag` parameters provided by the user.

    2. Calls the SOCRadar API to fetch the current details of the specified alarm
    to verify if the tag is currently applied.

    3. If the tag is present, makes a POST request to the SOCRadar API (`alarm/tag`
    endpoint) to remove the tag from the alarm.

    4. Returns the JSON response from the API and completes the action.


    ### Additional Notes

    The SOCRadar API uses a toggle mechanism for tags. To ensure idempotency, the
    action first checks if the tag exists on the alarm before attempting to remove
    it. If the tag is not present, the action will succeed without making a modification
    request.
