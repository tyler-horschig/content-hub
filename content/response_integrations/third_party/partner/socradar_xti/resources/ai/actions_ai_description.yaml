Enrich Indicator:
  ai_description: >-
    ### General Description

    Enriches an indicator (IP, domain, hash, URL) using the SOCRadar IOC Enrichment
    API. This action retrieves threat intelligence details including threat score,
    severity, categorization, classifications, history, and optionally AI insights.


    ### Flow Description

    1. Extracts the indicator value and optional parameters (Include AI Insight, Fields)
    from the action configuration.

    2. Validates the presence of the required IOC Enrichment API Key.

    3. Makes a POST request to the SOCRadar API (`ioc_enrichment/get/indicator_details`)
    to fetch threat intelligence data for the provided indicator.

    4. Calculates a severity label (CRITICAL, HIGH, MEDIUM, LOW) based on the returned
    numeric risk score.

    5. Appends the enriched data, including the calculated severity and risk score,
    to the action's JSON results.

    6. Outputs a summary message detailing the enriched indicator, score, severity,
    active categories, and remaining API credits.


    ### Additional Notes

    - This action requires a specific 'IOC Enrichment API Key' to be configured in
    the integration settings.

    - Setting 'Include AI Insight' to true will increase the response time and consume
    more API credits.
