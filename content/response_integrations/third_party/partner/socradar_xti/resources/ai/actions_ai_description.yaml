Add Tag:
  ai_description: >-
    ### General Description

    Adds a specific tag to an existing SOCRadar alarm. This action interacts with
    the SOCRadar API to update the alarm's metadata with the provided tag.


    ### Flow Description

    1. Extracts the `Alarm ID` and `Tag` from the action parameters.

    2. Initializes the SOCRadar API client.

    3. Fetches the current details of the specified alarm via a GET request to check
    existing tags.

    4. If the tag is not already present, makes a POST request to the SOCRadar `alarm/tag`
    endpoint to add the tag to the alarm.

    5. Returns the API response as a JSON result and completes the action.


    ### Additional Notes

    The action is idempotent; it checks if the tag already exists on the alarm before
    attempting to add it, preventing duplicate tag errors.
