Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific SOCRadar alarm. This action interacts with the SOCRadar
    API to append analyst notes or updates directly to the specified alarm's timeline.


    ### Flow Description

    1. Extracts the target Alarm ID, Comment text, and optional User Email from the
    action parameters.

    2. Initializes the SOCRadar API client with the provided integration credentials.

    3. Makes a POST request to the SOCRadar API (`alarm/add/comment/v2`) to append
    the comment to the specified alarm.

    4. Returns the API response as a JSON result and completes the action.


    ### Additional Notes

    Ensure the provided Alarm ID is valid and accessible by the configured API Key.
  ai_short_description: >-
    Adds a comment to a specific SOCRadar alarm via the SOCRadar API.
