Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SOCRadar API. This action verifies that the integration
    is configured correctly and can successfully communicate with the SOCRadar platform
    using the provided credentials.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, Company
    ID, Verify SSL).

    2. Initializes the `SOCRadarManager` with the extracted parameters.

    3. Calls the `test_connectivity` method, which makes a GET request to the `incidents/v4`
    endpoint with a limit of 1 to verify API access.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not process any entities or alerts. It is solely intended for
    diagnostic purposes to ensure the integration is functional.
