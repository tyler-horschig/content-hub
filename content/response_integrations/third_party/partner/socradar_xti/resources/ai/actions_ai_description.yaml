    1. Extracts the target `Alarm ID` and the new `Severity` level from the action
    parameters.

    2. Initiates a POST request to the SOCRadar API (`alarm/severity` endpoint) to
    update the specified alarm's severity.

    3. Returns a success message and attaches the JSON response from the API to the
    action results if the operation is successful.

    4. If the operation fails, the action catches the exception and fails gracefully
