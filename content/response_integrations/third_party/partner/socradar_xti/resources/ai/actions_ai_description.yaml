Rapid Reputation:
  ai_description: >-
    ### General Description

    Performs a quick reputation lookup for a specific entity (IP, hostname, URL, or
    hash) using the SOCRadar Rapid Reputation API. It retrieves the risk score, severity,
    whitelisting status, and threat intelligence sources associated with the provided
    entity value.


    ### Flow Description

    1. Extracts the `Entity Value` and `Entity Type` parameters.

    2. Validates that the `Entity Type` is one of the supported types (ip, hostname,
    url, hash).

    3. Makes a GET request to the SOCRadar Rapid Reputation API (`/threatfeed/rapid/reputation`)
    using the provided entity details and the Rapid Reputation API Key.

    4. Calculates a severity label (CRITICAL, HIGH, MEDIUM, LOW) based on the returned
    risk score.

    5. Appends the retrieved reputation data, including the calculated severity and
    risk score, to the action's JSON results.


    ### Additional Notes

    - This action requires the "Rapid Reputation API Key" to be configured in the
    integration settings.

    - The action operates on a manually provided entity value rather than iterating
    over case entities.
