Change Alarm Status:
  ai_description: >-
    ### General Description

    Changes the status of a specific SOCRadar alarm. This action allows analysts to
    update the lifecycle state of an alarm directly in the SOCRadar platform, optionally
    adding comments and updating related findings.


    ### Flow Description

    1. Extracts the `Alarm ID`, `Status`, and optional parameters (`Comments`, `Email`,
    `Update Related Findings`) from the action configuration.

    2. Validates the input, specifically ensuring that an email is provided if the
    user chooses to update related findings.

    3. Makes a POST request to the SOCRadar API (`alarms/status/change`) to update
    the alarm's status.

    4. Returns the API response as a JSON result and completes the action with a success
    or failure message.


    ### Additional Notes

    Valid statuses include: OPEN (0), INVESTIGATING (1), RESOLVED (2), PENDING_INFO
    (4), LEGAL_REVIEW (5), VENDOR_ASSESSMENT (6), FALSE_POSITIVE (9), DUPLICATE (10),
    PROCESSED_INTERNALLY (11), MITIGATED (12), and NOT_APPLICABLE (13).
