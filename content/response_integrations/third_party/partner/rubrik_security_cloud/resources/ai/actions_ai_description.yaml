    1. Extracts the provided IOCs, scan name, cluster IDs, time range, and snapshot
    limits from the action parameters.

    2. Validates the input parameters, ensuring correct date formats and integer values.

    3. Initializes the Rubrik Security Cloud client using the provided service account
    credentials.

    4. Executes a GraphQL mutation (`startTurboThreatHunt`) to start the scan on the
    Rubrik platform.

    5. Returns the generated Hunt ID and outputs a data table with the scan details.


    ### Additional Notes

