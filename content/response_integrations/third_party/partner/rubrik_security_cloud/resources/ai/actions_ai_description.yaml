    values of the IOC's. |

    | Start Date | String | No | Filter the snapshots from the provided date.\nFormat
    supported:  yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ |

    | End Date | String | No | Filter the snapshots until the provided date.\nFormat
    supported:  yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ |

    | Max Snapshots Per Object | String | No | Maximum number of snapshots to scan
    per object. |

    | Min File Size | String | No | Minimum size of the file in bytes that will be
    included in the scan. |

    | Max File Size | String | No | Maximum size of the file in bytes that will be
    included in the scan. |

    | Paths To Include | String | No | Paths to include in the scan. Supports comma
    separated values. |
Get CDM Cluster Connection State:
  ai_description: >-
    ### General Description

    Retrieves the connection state information for a specific Cloud Data Management
    (CDM) cluster in Rubrik Security Cloud. This action queries the Rubrik GraphQL
    API to determine the current connection status of the specified cluster and its
    nodes.


    ### Flow Description

    1. Extracts the `Cluster ID` parameter provided by the user or playbook.

    2. Initializes the Rubrik Security Cloud API client using the configured service
    account credentials.

    3. Executes a GraphQL query (`CDM_CLUSTER_CONNECTION_STATE_QUERY`) to fetch the
    connection state of the specified cluster.

    4. Parses the returned data to extract the connection state for the cluster's
    nodes.

    5. Constructs a data table containing the cluster ID and its connection state,
    and attaches the raw JSON response to the action results.


    ### Additional Notes

    - The action will fail if the provided Cluster ID is invalid or if the cluster
    cannot be found.

