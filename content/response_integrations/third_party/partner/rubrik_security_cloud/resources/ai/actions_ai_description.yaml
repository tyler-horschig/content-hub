Get Sonar Sensitive Hits:
  ai_description: >-
    ### General Description

    Retrieves sensitive data hits detected by Rubrik Sonar for a specific object within
    a configurable lookback period. Sonar is Rubrik's data classification and sensitive
    data discovery engine. This action helps analysts identify if a specific object
    contains sensitive information based on recent scans.


    ### Flow Description

    1. Extracts the `Object Name` and `Lookback Days` parameters.

    2. Calculates the search date based on the lookback period.

    3. Initializes the Rubrik Security Cloud client.

    4. Makes a GraphQL query (`SONAR_POLICY_OBJECTS_LIST_QUERY`) to retrieve the list
    of Sonar policy objects for the calculated date.

    5. Filters the retrieved objects to find the one matching the provided `Object
    Name`.

    6. Makes a second GraphQL query (`SONAR_OBJECT_DETAIL_QUERY`) to retrieve detailed
    sensitive hits for the matched object.

    7. Returns the raw results as a JSON object and constructs a data table with the
    findings.


    ### Additional Notes

    - The action returns up to 20 records in the data table to prevent UI clutter.

    - If no object is found with the specified name, or if no snapshots are available,
    the action will fail with an appropriate error message.
  ai_short_description: >-
    Retrieves sensitive data hits detected by Rubrik Sonar for a specific object within
    a configurable lookback period.
