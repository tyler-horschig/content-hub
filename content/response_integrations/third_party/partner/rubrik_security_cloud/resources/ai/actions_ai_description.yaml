Advanced IOC Scan:
  ai_description: >-
    ### General Description

    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik Security
    Cloud objects. It supports various scan configurations including IOC types, date
    ranges, file size filters, and path inclusions/exclusions.


    ### Flow Description

    1. Extracts and validates action parameters including the target Object IDs, IOC
    configurations, and scan filters.

    2. Initializes the Rubrik Security Cloud API client.

    3. Executes a GraphQL mutation (`startBulkThreatHunt`) to start the advanced threat
    hunt scan on the specified objects.

    4. Returns the scan details and outputs a data table with the hunt results.


    ### Additional Notes

    Requires valid Rubrik Security Cloud credentials. The action does not operate
    on SOAR entities but relies on explicitly provided Object IDs and IOC values.
  ai_short_description: >-
    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik Security
    Cloud objects using custom configurations like date ranges, file sizes, and path
    filters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new advanced threat hunt scan on the specified Rubrik Security Cloud
      objects.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a GraphQL mutation (`startBulkThreatHunt`) to initiate a
      new advanced threat hunt scan on Rubrik Security Cloud. This changes the state
      of the external system by creating a new scan job (can_mutate_external_data=true).
      It does not fetch contextual data for entities, nor does it update internal
      SOAR entities, insights, or case comments.
