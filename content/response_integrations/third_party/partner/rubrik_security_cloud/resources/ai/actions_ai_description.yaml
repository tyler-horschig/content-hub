IOC Scan Results:
  ai_description: >-
    ### General Description

    Retrieves the results and details of a specific Turbo or Advanced Threat Hunt
    (IOC scan) from Rubrik Security Cloud. This action fetches comprehensive information
    about the scan's status, matched snapshots, and object metrics based on the provided
    Hunt ID.


    ### Flow Description

    1. Extracts the `Hunt ID` parameter provided by the user or playbook.

    2. Makes a POST request to the Rubrik Security Cloud GraphQL API to execute the
    `threatHuntDetailV2` and `threatHuntObjectMetrics` queries.

    3. Parses the returned data to extract the threat hunt details, including status,
    start/end times, and scan metrics.

    4. Outputs the raw JSON response and constructs a formatted data table containing
    the scan results.

    5. Evaluates the scan status; if the hunt is still `PENDING` or `IN_PROGRESS`,
    the action returns an `IN_PROGRESS` execution state to support asynchronous playbook
    execution.


    ### Additional Notes

    This action supports asynchronous execution. If the threat hunt is still running,
    the action will pause and re-execute until the scan completes or fails. It does
    not operate on SOAR entities.
