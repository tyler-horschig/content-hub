Ping:
  ai_description: >-
    ### General Description

    Tests connectivity and verifies authorization with the ANYRUN Sandbox service.
    This action ensures that the provided API key and network configurations (such
    as proxy and SSL settings) are valid and can successfully communicate with the
    ANYRUN API.


    ### Flow Description

    1. Extracts integration-level configuration parameters, including the API key,
    SSL verification flag, and proxy settings.

    2. If a proxy is enabled, attempts to establish a connection through the proxy
    to verify its configuration.

    3. Initializes the `BaseSandboxConnector` and makes an API call (`check_authorization`)
    to verify the provided credentials.

    4. Returns a successful execution state if the connection and authorization succeed,
    or a failed state with an error message if they do not.


    ### Additional Notes

    This is a standard ping action used primarily during integration setup to validate
    connectivity. It does not require any action-specific parameters or entities to
    run.
