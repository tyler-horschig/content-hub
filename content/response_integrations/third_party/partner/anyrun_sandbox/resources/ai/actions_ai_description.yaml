File Android Analysis:
  ai_description: >-
    ### General Description

    Submits a case attachment to the ANY.RUN Sandbox for analysis using an Android
    Virtual Machine. This action uploads the file, monitors the analysis task, and
    retrieves the resulting behavior report and Indicators of Compromise (IOCs).


    ### Flow Description

    1. Retrieves the first attachment from the current case.

    2. Submits the attachment to the ANY.RUN Sandbox API (`run_file_analysis`) using
    the specified Android VM parameters.

    3. Adds a case comment containing a link to the interactive analysis session.

    4. Polls the ANY.RUN API for the task status until the analysis is complete.

    5. Retrieves the HTML analysis report from the API and saves it as a new attachment
    to the case wall.

    6. Retrieves the IOCs from the analysis report and adds them as a case comment.

    7. Retrieves the final analysis verdict and completes the action.


    ### Additional Notes

    The action will fail if no attachments are found in the case.
  ai_short_description: >-
    Submits a case attachment to the ANY.RUN Sandbox for analysis using an Android
    Virtual Machine, retrieves the analysis report, and attaches the results and IOCs
    to the case.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
