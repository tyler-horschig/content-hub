File Windows Analysis:
  ai_description: >-
    ### General Description

    Submits a file attachment from the case to the ANY.RUN sandbox for dynamic analysis
    in a Windows environment. It retrieves the analysis report, extracts indicators
    of compromise (IOCs), and attaches the results to the case.


    ### Flow Description

    1. Retrieves the first available file attachment from the case.

    2. Initiates a new file analysis task in the ANY.RUN sandbox using the provided
    environment parameters (OS version, bitness, network settings, etc.) via the `run_file_analysis`
    API call.

    3. Adds a case comment containing a direct link to the interactive ANY.RUN analysis
    session.

    4. Polls the ANY.RUN API (`get_task_status`) until the analysis task completes.

    5. Retrieves the HTML analysis report (`get_analysis_report`) and saves it as
    an attachment to the case wall.

    6. Retrieves the IOC report (`get_analysis_report`), formats the suspicious and
    malicious indicators, and adds them as a case comment.

    7. Retrieves the final analysis verdict (`get_analysis_verdict`) and completes
    the action.


    ### Additional Notes

    The action requires an active ANY.RUN API key and supports extensive customization
    of the sandbox environment, including OS version, network routing (Tor, Proxy,
    FakeNet), and privacy settings.
