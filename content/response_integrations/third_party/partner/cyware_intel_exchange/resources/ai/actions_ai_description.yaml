Create Intel in Cyware Intel Exchange:
  ai_description: >-
    ### General Description

    This action creates a new intelligence record in Cyware Intel Exchange (CTIX)
    for the provided entities.


    ### Flow Description

    1. Retrieves the target entities from the case to be used as indicators.

    2. Validates the provided parameters, including Title, Description, Metadata Confidence
    Score, and Deprecates After.

    3. Iterates over the target entities and prepares the payload for each indicator.

    4. Makes a POST request to the Cyware CTIX API (`/conversion/quick-intel/create-stix/`)
    to create the intelligence record.

    5. If the creation is successful, polls the Cyware CTIX API via a GET request
    (`/conversion/quick-intel/receive-report/`) to check the status of the quick intel
    creation task.

    6. Returns a JSON result containing the creation and status responses for each
    processed indicator.


    ### Additional Notes

    The action processes all target entities attached to the case without filtering
    by entity type.
