    ### General Description

    Adds a note to existing threat data objects (indicators) in Cyware Intel Exchange
    based on the entities attached to the case.


    ### Flow Description

    1. Retrieves all target entities attached to the current case.

    2. Performs a bulk lookup via the Cyware Intel Exchange API to resolve the entity
    identifiers to their corresponding indicator IDs.

    3. Iterates over the successfully resolved indicators and makes a POST request
    to the Cyware API to add the specified note to each indicator.

    4. Collects the responses and returns them as a JSON result.


    ### Additional Notes

    Entities that are not found in Cyware Intel Exchange during the lookup phase will
    be skipped.
