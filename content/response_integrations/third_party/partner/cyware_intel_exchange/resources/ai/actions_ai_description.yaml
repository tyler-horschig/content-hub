Add IOCs to Allowed list:
  ai_description: >-
    ### General Description

    Adds specified indicator entities to the allowed list (whitelist) in Cyware Intel
    Exchange (CTIX). This action helps in preventing known good indicators from triggering
    false positive alerts by explicitly marking them as allowed.


    ### Flow Description

    1. Extracts the target entities attached to the current case.

    2. Retrieves the `IOC Type` and `Reason` parameters provided by the user.

    3. Makes a POST request to the Cyware CTIX API (`/conversion/allowed_indicators/`)
    to add the extracted entity identifiers to the allowed list under the specified
    IOC type.

    4. Returns a summary message detailing the number of newly created, already existing,
    and invalid indicators, along with the raw JSON response.


    ### Additional Notes

    The action processes all attached entities regardless of their SecOps entity type,
    but they are all submitted to Cyware CTIX under the single specified 'IOC Type'
    parameter.
  ai_short_description: >-
    Adds specified indicator entities to the allowed list (whitelist) in Cyware Intel
    Exchange (CTIX).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified IOCs to the allowed list (whitelist) in Cyware CTIX.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to Cyware CTIX to add indicators to an allowed
      list, which mutates external data. It does not fetch contextual data, update
      internal entities, create insights, modify alerts, or create case comments.
