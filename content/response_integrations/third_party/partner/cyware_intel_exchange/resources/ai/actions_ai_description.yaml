Get IOC Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about threat data objects (IOCs) from Cyware Intel
    Exchange based on the target entities in the case. The action fetches basic details,
    enriched data, and relations, and updates the entities with the retrieved threat
    intelligence.


    ### Flow Description

    1. Retrieves the target entities from the case.

    2. Extracts action parameters including 'Enrichment Data', 'Relation Data', and
    'Fields'.

    3. Makes an API call to the Cyware Intel Exchange bulk lookup endpoint to fetch
    details for the provided IOCs.

    4. Parses the response and constructs a data table with the IOC details.

    5. Enriches the matching entities with the retrieved data (e.g., analyst score,
    confidence score, TLP) and marks them as enriched.

    6. Updates the entities in the Google SecOps platform.

    7. Returns the raw JSON response and execution status.


    ### Additional Notes

    The action limits the displayed table records to a maximum of 10 for readability,
    but all retrieved data is available in the JSON result and entity additional properties.
  ai_short_description: >-
    Retrieves detailed information about threat data objects (IOCs) from Cyware Intel
