Create Task for IOCs:
  ai_description: >-
    ### General Description

    Creates a task for threat data objects (IOCs) in Cyware Intel Exchange.


    ### Flow Description

    1. Retrieves the action parameters including task text, priority, status, deadline,
    and optional assignee email.

    2. Validates the input parameters, ensuring the text length does not exceed 2000
    characters and the deadline is within acceptable limits (up to 365 days).

    3. If an assignee email is provided, makes an API call to Cyware Intel Exchange
    to retrieve the corresponding user ID.

    4. Extracts the identifiers of the target entities and performs a bulk IOC lookup
    via the Cyware API to retrieve their internal Cyware object IDs.

    5. For each valid IOC found, makes an API call to create a task in Cyware Intel
    Exchange with the specified details and assignee.

    6. Returns the task creation results as JSON and updates the action status.


    ### Additional Notes

    The deadline is calculated in days from the current execution time. If an assignee
    email is provided but not found in Cyware Intel Exchange, the action will fail.
