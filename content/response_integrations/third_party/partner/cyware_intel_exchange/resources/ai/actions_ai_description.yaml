Manage Tags in IOCs:
  ai_description: >-
    ### General Description

    Manages tags for Indicator of Compromise (IOC) entities within Cyware Intel Exchange.
    This action allows users to either add or remove specified tags from the target
    entities in the external threat intelligence platform.


    ### Flow Description

    1. Extracts the target entities from the case and the specified tags from the
    action parameters.

    2. Retrieves the list of available tags from Cyware Intel Exchange to resolve
    tag names to their corresponding IDs.

    3. Looks up the target entities in Cyware to resolve their corresponding object
    IDs.

    4. If the operation is set to 'Add Tag', it creates any missing tags in Cyware
    and then assigns the tags to the resolved IOCs.

    5. If the operation is set to 'Remove Tag', it removes the specified tags from
    the resolved IOCs.

    6. Returns a JSON result containing the response from the Cyware API.


    ### Additional Notes

    Entities that are not found in Cyware Intel Exchange will be skipped. If an 'Add
    Tag' operation includes tags that do not currently exist in Cyware, the action
    will attempt to create them automatically.
