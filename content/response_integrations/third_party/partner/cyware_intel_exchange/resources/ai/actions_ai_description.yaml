Mark IOCs False Positive:
  ai_description: >-
    ### General Description

    Marks multiple Indicator of Compromise (IOC) entities as false positives within
    Cyware Intel Exchange. This action updates the threat intelligence platform to
    recognize the specified indicators as benign, helping to reduce future false positive
    alerts.


    ### Flow Description

    1. Retrieves the target entities from the Google SecOps case.

    2. Calls the Cyware Intel Exchange API (`/ingestion/openapi/bulk-lookup/indicator/`)
    to resolve the entity identifiers to their corresponding internal Cyware Object
    IDs.

    3. Filters out any entities that are not found in Cyware Intel Exchange.

    4. Calls the Cyware Intel Exchange API (`/ingestion/threat-data/bulk-action/false_positive/`)
    via a POST request to mark the resolved Object IDs as false positives.

    5. Returns a JSON result containing the response from the Cyware API.


    ### Additional Notes

    Entities that do not exist in Cyware Intel Exchange will be skipped during the
    execution.
