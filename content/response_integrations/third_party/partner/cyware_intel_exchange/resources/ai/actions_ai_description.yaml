Get Allowed IOCs:
  ai_description: >-
    ### General Description

    Retrieves a list of allowed (whitelisted) Indicators of Compromise (IOCs) from
    Cyware Intel Exchange (CTIX). This action allows analysts to fetch indicators
    that have been marked as safe, optionally filtering them by a specific IOC type
    or creation timestamp.


    ### Flow Description

    1. Extracts the `IOC Type` and `Created From` parameters provided by the user.

    2. Validates the `Created From` parameter to ensure it is a valid epoch timestamp
    if provided.

    3. Makes a GET request to the Cyware CTIX API (`/conversion/allowed_indicators/`)
    to fetch the allowed IOCs matching the criteria.

    4. Iterates through the paginated API response to aggregate all matching allowed
    IOCs.

    5. Constructs a CSV-formatted data table containing the retrieved IOCs (up to
    a maximum display limit) and attaches it to the case.

    6. Returns the complete list of retrieved IOCs as a JSON result.


    ### Additional Notes

    - The action handles pagination internally to ensure all matching records are
    retrieved from the API.

    - If the number of retrieved IOCs exceeds the maximum table records limit (10),
    only the first 10 records will be displayed in the case wall table, but the full
    dataset will be available in the JSON result.
