OCR Image:
  ai_description: >-
    ### General Description

    The OCR Image action performs optical character recognition (OCR) on a provided
    image file or base64 encoded string to extract text. This action operates locally
    and requires execution on a Remote Agent with the `tesseract-ocr` package installed.


    ### Flow Description

    1. Validates the input parameters to ensure that either a base64 encoded image
    or a file path is provided.

    2. Verifies that the action is executing on a Remote Agent.

    3. If a base64 string is provided, decodes the data and writes it to a temporary
    file.

    4. Uses the `pytesseract` library to process the image file and extract readable
    text.

    5. Returns the extracted text as a JSON result.


    ### Additional Notes

    If both "Base64 Encoded Image" and "File Path" are provided, the action prioritizes
    and processes the "Base64 Encoded Image".
