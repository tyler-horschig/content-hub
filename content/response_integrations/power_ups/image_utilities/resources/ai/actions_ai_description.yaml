Convert File:
  ai_description: >-
    ### General Description

    The Convert File action converts a specified file between PNG and PDF formats
    locally on a Remote Agent. It utilizes local image processing libraries to transform
    the file and outputs the path to the newly generated file.


    ### Flow Description

    1. Validates the input parameters, ensuring the action is executing on a Remote
    Agent and that the input and output formats are different.

    2. Verifies the existence of the source file at the provided `Input File Path`.

    3. Converts the file format:
       - If converting from PDF to PNG, it uses the `pdf2image` library (which relies
    on the system's `pdftoppm` utility) to extract and save the first page as a PNG.
       - If converting from PNG to PDF, it uses the `PIL` (Pillow) library to convert
    the image to RGB format and save it as a PDF.
    4. Saves the newly converted file to the system's temporary directory with a timestamped
    filename.

    5. Returns the output format and the new file path in the action's JSON results.


    ### Additional Notes

    - This action **must** be run on a Remote Agent.

    - When converting from PDF to PNG, the Remote Agent must have `poppler-utils`
    installed to provide the required `pdftoppm` dependency.

    - This action operates entirely locally on the file system and does not make any
    external API calls or interact with SOAR entities.
  ai_short_description: >-
    Converts a specified file between PNG and PDF formats locally on a Remote Agent,
    returning the path to the newly generated file.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action reads a local file, converts its format using local Python libraries,
      and writes the output to a temporary directory. It does not fetch data from
      external APIs, mutate external system data, mutate internal SOAR data, update
      entities, create insights, or add case comments.
