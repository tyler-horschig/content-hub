Rasterize Content:
  ai_description: >-
    ### General Description

    The Rasterize Content action converts complex content, such as URLs, HTML, or
    Email bodies, into fixed bitmap image formats (PNG) or PDFs using a headless browser.
    This action requires a Remote Agent to function correctly.


    ### Flow Description

    1. Validates the input parameters and ensures the action is running on a Remote
    Agent.

    2. Initializes a headless browser session using Playwright.

    3. Depending on the `Input Type`, either navigates to the provided URLs or loads
    the provided HTML/Email content into the browser.

    4. Waits for the specified page state (e.g., NETWORK_IDLE) or a specific CSS selector
    to ensure the content is fully loaded.

    5. Captures a screenshot (PNG) and/or generates a PDF based on the `Output Type`.

    6. Exports the generated files by attaching them to the current case and/or returning
    their file paths in the JSON results.


    ### Additional Notes

    This action requires Playwright and Chromium dependencies to be installed on the
    Debian-based Remote Agent container. If "Full Screen" is enabled, the "Height"
    and "Width" parameters are ignored for the screenshot.
  ai_short_description: >-
    Converts vector or complex content (URL, HTML, Email) into a fixed, bitmap image
    format (PNG, PDF) using a headless browser, and attaches the result to the case
    or returns the file path.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
