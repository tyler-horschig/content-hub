Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity and validates the environment setup for the Image Utilities
    integration. Specifically, it ensures that the action is running on a Remote Agent
    and verifies the installation of required local dependencies, such as the Tesseract
    OCR engine and Playwright browser binaries.


    ### Flow Description

    1. Validates that the action is being executed on a Remote Agent.

    2. Verifies the presence of the Tesseract OCR engine by attempting to retrieve
    its version locally.

    3. Verifies the installation of Playwright and Chromium dependencies by attempting
    to launch a headless browser instance.

    4. Returns a success message if all checks pass, or raises a detailed setup error
    with installation instructions if any dependency is missing.


    ### Additional Notes

    This action does not interact with external APIs or process any case entities.
    It strictly performs local environment validation to ensure subsequent Image Utilities
    actions can execute successfully.
  ai_short_description: >-
