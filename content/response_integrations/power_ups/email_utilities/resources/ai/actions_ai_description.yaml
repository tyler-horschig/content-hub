Parse Case Wall Email:
  ai_description: >-
    ### General Description

    This action parses an EML or MSG file that has been attached to the case wall.
    It extracts the email's headers, body, attachments, and observed entities such
    as URLs, email addresses, IP addresses, and file hashes. It can optionally create
    new entities in the case based on the extracted data and save the extracted attachments
    back to the case wall.


    ### Flow Description

    1. Retrieves attachments from the case wall for the target alerts.

    2. Identifies the relevant EML or MSG file to parse.

    3. Parses the email content, extracting headers, body, and attachments.

    4. Extracts observed entities from the email body and subject.

    5. Optionally creates new entities in the case based on the extracted data.

    6. Optionally saves the extracted attachments back to the case wall.

    7. Updates existing filename entities with the new attachment IDs if applicable.

    8. Returns the parsed email data as a JSON result.


    ### Additional Notes

    The action supports custom regular expressions for entity extraction and can automatically
    fang or defang entities.
