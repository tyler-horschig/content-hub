Parse EML Base64 Blob:
  ai_description: >-
    ### General Description

    Parses a base64 encoded EML file string and extracts its metadata, body content,
    and nested attachments. This action is a utility that processes raw email data
    and returns a structured JSON representation of the email's components.


    ### Flow Description

    1. Retrieves the base64 encoded EML string from the action parameters.

    2. Decodes the base64 string into a UTF-8 formatted string.

    3. Parses the decoded string into an email message object.

    4. Extracts email metadata including sender, recipient (To, CC, BCC), subject,
    and date.

    5. Extracts the text and HTML body content from the email payload.

    6. Iterates through the email's attachments; if any attachment is identified as
    a multipart EML file, it recursively extracts its metadata and content.

    7. Compiles the extracted data and returns it as a JSON object in the action results.


    ### Additional Notes

    This action operates entirely locally within the SOAR platform and does not interact
    with any external APIs or services. It does not operate on case entities.
