Analyze Headers:
  ai_description: >-
    ### General Description

    Analyze Headers accepts a JSON object containing a list of Email headers. The
    action validates the SPF, DMARC, ARC, and DKIM records in the email. It also checks
    to see if any of the relay servers are denylisted by querying multiple RBLs and
    enriches them with geo-location and IP whois information.


    ### Flow Description

    1. Retrieves the `Headers JSON` parameter containing the email headers.

    2. Parses the JSON and extracts key fields such as From, To, Subject, MessageID,
    and Date.

    3. Validates SPF, DMARC, MX, and DNSSec records for the domains.

    4. Verifies DKIM and ARC signatures.

    5. Parses the routing hops from the `received` headers.

    6. Queries DNSBL (pydnsbl) to check if any relay IPs or domains are blacklisted.

    7. Retrieves WHOIS and geo-location data for the relay IPs using IPWhois and DbIpCity.

    8. Returns the comprehensive analysis as a JSON result.


    ### Additional Notes

    This action performs multiple external DNS and API lookups (e.g., DbIpCity, IPWhois,
    pydnsbl) to validate and enrich the email headers.
  ai_short_description: >-
    Analyzes a JSON object of email headers to validate SPF, DMARC, ARC, and DKIM
    records, checks relay servers against RBLs, and enriches them with geo-location
