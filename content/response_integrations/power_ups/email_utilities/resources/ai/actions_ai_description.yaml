Parse Base64 Email:
  ai_description: >-
    ### General Description

    Parses an EML or MSG file provided as a base64 encoded string. It extracts the
    email's headers, body, attachments, and nested emails, identifying observed URLs,
    domains, IP addresses, and email addresses within the content.


    ### Flow Description

    1. Retrieves the base64 encoded EML or MSG string and decoding parameters.

    2. Decodes the base64 string to binary content.

    3. Determines if the content is an OLE file (MSG) or standard EML.

    4. Parses the email structure, extracting headers, body text, and attachments.

    5. Recursively processes any attached emails or nested MSG files.

    6. Extracts observables such as URLs, domains, IPs, and email addresses from the
    body and headers.

    7. Returns the parsed email data as a JSON object in the action results.


    ### Additional Notes

    This action is an improved version of the standard EML parser and supports both
    EML and MSG formats.
