Analyze EML Headers:
  ai_description: >-
    ### General Description

    Analyzes an EML file or a list of email headers to extract and evaluate header
    information. It checks for anomalies such as mismatched sender addresses, missing
    Message-IDs, and suspicious routing details.


    ### Flow Description

    1. Retrieves the Base64 encoded EML file or JSON-formatted header list from the
    action parameters.

    2. Decodes and parses the input to extract the email headers.

    3. Analyzes the headers to extract domains and addresses from the routing information.

    4. Evaluates the headers against a set of rules to generate recommendations and
    identify potential anomalies (e.g., mismatched `Return-Path` and `From` headers).

    5. Returns the extracted headers, domains, addresses, and analysis results as
    a JSON object.


    ### Additional Notes

    This action operates entirely locally on the provided input and does not make
    any external API calls.
  ai_short_description: >-
    Analyzes an EML file or a list of email headers to extract routing information
    and evaluate the headers for potential anomalies or suspicious characteristics.
