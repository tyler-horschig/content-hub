Calculate Timestamp:
  ai_description: >-
    ### General Description

    Calculates a new timestamp by applying a specified time delta (forward or backward)
    to a baseline starting time. This utility action is useful for determining time
    windows for queries or establishing deadlines based on alert or case creation
    times.


    ### Flow Description

    1. Extracts the baseline timestamp based on the selected `Input Type` (Current
    Time, Alert Creation Time, Case Creation Time, or a Custom Timestamp).

    2. Validates the provided custom timestamp and its format, if the custom input
    type is selected.

    3. Parses the provided `Timestamp Delta` (e.g., +30M, -1d) to determine the shift
    amount, unit, and direction.

    4. Calculates the new shifted timestamps using the parsed deltas.

    5. Formats the resulting timestamps according to the specified `Output Timestamp
    Format` (or defaults to epoch time).

    6. Returns the original and calculated timestamps as a JSON result.


    ### Additional Notes

    This is a local utility action that performs date and time mathematics. It does
    not interact with external APIs, nor does it modify any case, alert, or entity
    data within the platform.
  ai_short_description: >-
    Calculates a new timestamp by moving forward or backward from a specified baseline
    time using a defined time delta.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
