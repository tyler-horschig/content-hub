Convert Time Format:
  ai_description: >-
    ### General Description

    Converts a given datetime string or timestamp from one format to another using
    the Arrow library. It allows for time shifting and timezone adjustments, providing
    a flexible utility for standardizing time formats within playbooks.


    ### Flow Description

    1. Retrieves the input datetime string, source format, target format, time delta,
    and timezone parameters.

    2. Parses the input string according to the provided source format, or processes
    it as a Unix timestamp (10 or 13 digits) if applicable.

    3. Applies any specified time shift (in seconds) to the parsed datetime to adjust
    it into the future or past.

    4. Converts the datetime to the specified timezone if one is provided.

    5. Formats the resulting datetime into the desired output format and returns it
    as the action's result.


    ### Additional Notes

    This is a utility action that performs local calculations. It does not interact
    with external APIs, nor does it modify case entities or internal SecOps data.
