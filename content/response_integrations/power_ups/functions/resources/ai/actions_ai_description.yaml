    ### General Description

    This action performs various basic Pythonic string manipulation functions on a
    provided input string. It supports operations such as case conversion, whitespace
    stripping, substring counting, replacement, regex operations, base64 encoding/decoding,
    and JSON serialization.


    ### Flow Description

    1. Retrieves the input string and the selected function from the action parameters.

    2. Retrieves optional parameters (`Param 1` and `Param 2`) if required by the
    selected function.

    3. Executes the chosen string manipulation logic (e.g., `Lower`, `Replace`, `Regex`,
    `EncodeBase64`).

    4. Returns the manipulated string as the action result and provides an output
    message detailing the transformation. For the `Split` function, it also attaches
    a JSON result containing the split array.


