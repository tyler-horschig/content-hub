Detect Hash Type:
  ai_description: >-
    ### General Description

    Detects the most likely hash type (such as SHA-256, MD5, SHA-1, or SHA-512) for
    provided hash strings and FILEHASH entities. It utilizes a local library to identify
    the hash format and updates the corresponding entities with the detected type.


    ### Flow Description

    1. Retrieves the `Hashes` parameter and splits the comma-separated string into
    a list of individual hashes.

    2. Iterates through the provided hashes, using the `hashid` library to determine
    the hash type, and records the result.

    3. Iterates through the case's target entities, filtering specifically for those
    with the `FILEHASH` entity type.

    4. Determines the hash type for each FILEHASH entity's identifier.

    5. Updates the entity's `additional_properties` dictionary with the detected hash
    type.

    6. Saves the updated entities back to the platform using `siemplify.update_entities`.

    7. Outputs the combined results as a JSON object.


    ### Additional Notes

    - If a hash type cannot be determined or is not among the supported types (SHA-256,
    MD5, SHA-1, SHA-512), it is marked as "UNDETECTED".

    - This action runs locally and does not make any external API calls.
  ai_short_description: >-
    Detects the most likely hash type (such as SHA-256, MD5, SHA-1, or SHA-512) for
    provided hash strings and FILEHASH entities, updating the entities' additional
