Create Thumbnail:
  ai_description: >-
    ### General Description

    Creates a Base64-encoded thumbnail from a provided Base64 image string or a JSON
    array containing Base64 images. It resizes the image to the specified dimensions
    using the Python Imaging Library (PIL) and returns the new Base64 string as a
    JSON result.


    ### Flow Description

    1. Extracts the action parameters including the Base64 image string, thumbnail
    size, input JSON, and image key path.

    2. Checks if an `Input JSON` is provided. If so, it parses the JSON, iterates
    through the items, and extracts the Base64 image string using the specified `Image
    Key Path`.

    3. If no `Input JSON` is provided, it uses the directly provided `Base64 Image`
    string.

    4. Decodes the Base64 string into an image object.

    5. Resizes the image to the specified X and Y pixel dimensions.

    6. Encodes the resized image back into a Base64 string (PNG format).

    7. Returns the resulting Base64 string(s) as a JSON result to the playbook.


    ### Additional Notes

    This action operates entirely locally within the script execution environment
    and does not interact with external APIs or services. It is primarily used as
    a utility function to manipulate image data within a playbook flow.
