Detect IP Type:
  ai_description: >-
    ### General Description

    Evaluates provided IP addresses and IP Address entities to determine whether they
    are IPv4 or IPv6 formats. The action updates the entities with the detected IP
    type and outputs the results as JSON.


    ### Flow Description

    1. Retrieves the optional comma-separated list of IP addresses from the action
    parameters.

    2. Evaluates each provided IP address against IPv4 and IPv6 regular expressions.

    3. Iterates through the target entities, filtering specifically for those with
    the type `ADDRESS`.

    4. Evaluates each entity's identifier against the regular expressions to determine
    its IP type.

    5. Updates the entity's `additional_properties` with the detected `IPType` (IPV4,
    IPV6, or UNDETECTED).

    6. Saves the updated entities back to the platform and outputs the combined results
    as a JSON object.


    ### Additional Notes

    This action operates entirely locally using regular expressions and does not interact
    with any external services or APIs.
  ai_short_description: >-
    Evaluates provided IP addresses and IP Address entities using regular expressions
    to determine and record whether they are IPv4 or IPv6 formats.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
