SanitizeHTML:
  ai_description: >-
    ### General Description

    Sanitizes a provided HTML fragment by parsing it according to the HTML5 parsing
    algorithm and stripping or escaping disallowed tags, attributes, and styles. It
    uses the Bleach library to ensure the output is safe and properly formatted, handling
    unclosed or misnested tags.


    ### Flow Description

    1. Extracts the input HTML fragment and configuration parameters (allowed tags,
    attributes, styles).

    2. Configures the Bleach sanitizer based on the provided allowlists and boolean
    flags.

    3. Processes the input HTML to remove or escape any elements not explicitly permitted.

    4. Returns the sanitized HTML string as the action result.


    ### Additional Notes

