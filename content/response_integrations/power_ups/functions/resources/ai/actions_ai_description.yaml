Time Duration Calculator:
  ai_description: >-
    ### General Description

    The Time Duration Calculator calculates the time elapsed or the difference between
    two specified datetime values. It returns the calculated duration broken down
    into years, days, hours, minutes, and seconds, providing a structured JSON output
    for use in subsequent playbook steps.


    ### Flow Description

    1. Extracts the two input datetime strings (`Input DateTime 1` and `Input DateTime
    2`) and their respective strftime formats.

    2. Evaluates each input: if the value is "now", it assigns the current UTC time;
    otherwise, it parses the string using the provided format.

    3. Checks if the parsed datetime objects are timezone-aware, localizing them to
    UTC if they are not.

    4. Calculates the total duration between the two datetime objects.

    5. Formats the duration into distinct time units (years, days, hours, minutes,
    seconds).

    6. Outputs the calculated duration as a JSON result and sets the total seconds
    as the script's primary result value.


    ### Additional Notes

    This is a utility action that performs local calculations. It does not interact
    with any external APIs, nor does it process or modify case entities.
