Defang Text:
  ai_description: >-
    ### General Description

    Defangs input text by modifying URLs, IP addresses, and email addresses to prevent
    accidental execution or clicking of malicious links.


    ### Flow Description

    1. Extracts the provided `Input` text parameter.

    2. Applies regular expressions to replace 'http' with 'hxxp' and dots with '[.]'
    in URLs.

    3. Applies regular expressions to replace dots with '[.]' in IPv4 addresses.

    4. Applies regular expressions to replace '@' with '[at]' and dots with '[.]'
    in email addresses.

    5. Returns the defanged text as a JSON result.


    ### Additional Notes

    This action operates entirely locally using regular expressions and does not make
    any external API calls or interact with external systems.
