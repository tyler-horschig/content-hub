Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the GitSync repository and the Chronicle SOAR server. This
    action verifies that the integration is configured correctly by attempting to
    authenticate and communicate with both the Git server and the SOAR platform.


    ### Flow Description

    1. Extracts integration configuration parameters (e.g., Repo URL, Branch, credentials).

    2. Validates the format of the configured Commit Author.

    3. Initializes the `GitSyncManager` to establish a connection.

    4. Tests connectivity to the Chronicle SOAR server by fetching the system version.

    5. If a Git server fingerprint is provided, tests the Git connection and verifies
    the fingerprint by fetching the repository's head tree.

    6. Returns a success message if all connections are successful.


    ### Additional Notes

    This action is primarily used as a diagnostic tool to ensure the integration's
    settings are valid and network connectivity is established.
  ai_short_description: >-
    Tests connectivity to the GitSync repository and the Chronicle SOAR server to
    verify integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only performs read operations (fetching system version and git head
      tree) to verify connectivity. It does not fetch contextual data for alerts/entities,
      nor does it mutate any external or internal data, update entities, or create
      insights.
