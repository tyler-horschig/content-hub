Add Entity to File:
  ai_description: >-
    ### General Description

    This action adds the identifiers of target entities to a specified local file
    on the execution environment. It ensures that each entity identifier is only added
    once, preventing duplicate entries within the file.


    ### Flow Description

    1. Retrieves the target filename from the action parameters.

    2. Constructs the full file path (defaulting to the `/tmp/` directory).

    3. Acquires a file lock to prevent concurrent modification issues from other actions.

    4. Reads the existing entity identifiers from the file.

    5. Iterates through the target entities and checks if their identifier is already
    present in the file.

    6. Appends the identifier to the file if it does not exist; otherwise, skips it
    and marks the result as false for that entity.

    7. Writes the updated list back to the file and releases the lock.


    ### Additional Notes

    The action operates on all entity types and uses a file locking mechanism to support
    concurrent executions safely. It does not interact with any external APIs.
  ai_short_description: >-
    Adds the identifiers of target entities to a specified local file, ensuring no
    duplicate entries are created.
