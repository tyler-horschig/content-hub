    internal_data_mutation_explanation: >-
      Adds a new file attachment to the case wall in Google SecOps.
    reasoning: >-
      The action does not fetch external data or mutate external systems. It mutates
      internal data by adding an attachment to the case wall via the `save_attachment_to_case_wall`
      API. It does not update entities, create insights, modify alert data, or create
      standard case comments.
