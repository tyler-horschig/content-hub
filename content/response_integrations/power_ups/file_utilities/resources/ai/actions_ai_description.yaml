Count Files:
  ai_description: >-
    ### General Description

    The Count Files action is a utility designed to count the number of files within
    a specified directory that match a particular file extension.


    ### Flow Description

    1. Retrieves the target folder path, the desired file extension, and the recursive
    search preference from the action parameters.

    2. Constructs a search pattern by combining the folder path and the file extension.

    3. Executes a file system search using the `glob` module to locate all matching
    files.

    4. Calculates the total number of discovered files and outputs this count as the
    action's result.


    ### Additional Notes

    This action interacts with the local file system of the environment where the
    script is executed.
