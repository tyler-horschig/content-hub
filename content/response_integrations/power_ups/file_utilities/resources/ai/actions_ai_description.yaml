Save Base64 to File:
  ai_description: >-
    ### General Description

    Saves base64 encoded strings to local files on the SOAR agent or runner. This
    utility action is useful for converting base64 data back into binary files for
    further processing or analysis.


    ### Flow Description

    1. Retrieves the base64 strings, filenames, and optional file extensions from
    the action parameters.

    2. Determines the appropriate local folder path for saving the files (either on
    the remote agent or local runner).

    3. Iterates through the provided inputs, decoding each base64 string into binary
    data.

    4. Writes the decoded binary data to the specified filenames on the local file
    system.

    5. Returns a JSON object containing the details of the saved files, including
    their paths and extensions.


    ### Additional Notes

    Supports comma-separated lists for the `Base64 Input`, `Filename`, and `File Extension`
    parameters, allowing multiple files to be processed simultaneously.
