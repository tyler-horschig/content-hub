Create Hash From Base64:
  ai_description: >-
    ### General Description

    Calculates cryptographic hashes for one or more provided Base64 encoded strings.
    This action decodes the input strings and applies the selected hashing algorithm
    to generate the corresponding hash values.


    ### Flow Description

    1. Retrieves the Base64 strings, hash algorithm, and optional names from the action
    parameters.

    2. Splits the Base64 strings and names using their respective separators.

    3. Iterates through the Base64 strings, decodes them, and calculates the hash
    using the specified algorithm (e.g., MD5, SHA1, SHA256) via Python's `hashlib`.

    4. Constructs a JSON object containing the calculated hash, algorithm, and optionally
    the original Base64 string and name.

    5. Returns the list of generated hash objects as a JSON result.


    ### Additional Notes

    This action operates entirely locally and does not interact with any external
    services or APIs. It does not process or modify case entities.
