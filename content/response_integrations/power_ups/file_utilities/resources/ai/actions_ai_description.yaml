Create Archive:
  ai_description: >-
    ### General Description

    Creates an archive file (such as zip, tar, gztar, bztar, or xztar) from a provided
    list of files or a directory path on the local SOAR server. It returns the absolute
    path of the newly created archive.


    ### Flow Description

    1. Extracts the action parameters: Archive Type, Archive Base Name, and Archive
    Input.

    2. Verifies if the hardcoded destination directory (`/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`)
    exists, creating it if it does not.

    3. Evaluates the `Archive Input`. If the input is a directory, it directly creates
    an archive of that directory.

    4. If the input is a list of files, it copies the specified files to a temporary
    directory, creates the archive from that temporary directory, and then deletes
    the temporary directory.

    5. Returns the absolute path of the created archive file as the result value and
    within a JSON object.


    ### Additional Notes

    This action operates entirely on the local file system of the SOAR server. It
    does not interact with external APIs, nor does it process or update case entities.
  ai_short_description: >-
    Creates an archive file from a specified list of files or a directory on the local
    SOAR server and returns the path to the created archive.
