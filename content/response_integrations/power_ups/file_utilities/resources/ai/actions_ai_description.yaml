Add Attachment:
  ai_description: >-
    ### General Description

    Adds a new file attachment to the case wall in Google SecOps using a provided
    Base64 encoded string. This action allows analysts or automated playbooks to attach
    files, evidence, or logs directly to the case for further investigation and record-keeping.


    ### Flow Description

    1. Retrieves the attachment details including Name, Type, Base64 content, Description,
    and Favorite status from the action parameters.

    2. Constructs a case wall attachment object linked to the current case identifier.

    3. Calls the internal Google SecOps API (`save_attachment_to_case_wall`) to save
    the attachment to the case wall.

    4. Returns the attachment metadata as a JSON result.


    ### Additional Notes

    Ensure that the provided Base64 string is properly encoded and represents the
    actual file content. The attachment size should be within the platform's allowed
    limits to prevent upload failures.
  ai_short_description: >-
    Adds a new file attachment to the case wall in Google SecOps using a provided
    Base64 encoded string.
