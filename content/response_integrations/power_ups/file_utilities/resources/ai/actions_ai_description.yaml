Get Attachment:
  ai_description: >-
    ### General Description

    Retrieves attachments from the Google SecOps case or alert wall and returns their
    content as Base64 encoded strings. This action is useful for extracting files
    previously attached to a case or alert for further processing or analysis.


    ### Flow Description

    1. Determines the execution scope and reads the `Attachment Scope` parameter to
    decide whether to fetch attachments for the entire case or just the specific alert.

    2. Queries the internal Google SecOps platform to retrieve metadata for the relevant
    attachments.

    3. Downloads the binary file content (blobs) for each identified attachment.

    4. Encodes the binary content of each file into a Base64 string.

    5. Aggregates the attachment metadata and Base64 strings, returning them as a
    structured JSON object in the action's results.


    ### Additional Notes

