    ### General Description

    Extracts files from a ZIP archive associated with a FILENAME entity. It can handle
    password-protected files using a provided password list or by attempting a brute-force
    extraction. The action can optionally add the extracted files to the case wall,
    create new entities for them, and include their base64 encoded content in the
    JSON result.


    ### Flow Description

    1. Iterates through target entities, filtering for FILENAME entities that contain
    an `attachment_id` in their additional properties.

    2. Retrieves the attachment content from the case wall using the `attachment_id`.

    3. Verifies if the retrieved file is a valid ZIP archive.

    4. Extracts the contents of the ZIP file, utilizing provided passwords or brute-force
    methods if the archive is password-protected.

    5. Optionally adds the extracted files back to the case wall as new attachments.

    6. Optionally creates new entities in the case for the extracted files and links
    them to the original ZIP file entity.

    7. Returns the extracted file metadata (and optionally base64 encoded content)
    in the JSON result.


