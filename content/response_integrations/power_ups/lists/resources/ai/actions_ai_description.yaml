Is String In Custom List:
  ai_description: >-
    ### General Description

    Checks if specific strings exist within a designated custom list in Google SecOps.
    It takes a list of identifiers and a category name, evaluates their presence in
    the custom list for the current environment, and returns the results.


    ### Flow Description

    1. Retrieves the target custom list category and the list of strings (identifiers)
    to check from the action parameters.

    2. Parses the provided identifier list (accepting either a comma-separated string
    or a JSON array).

    3. Iterates through each identifier and checks if it exists in the specified custom
    list category using the internal `any_entity_in_custom_list` method.

    4. Compiles a JSON result mapping each identifier to a boolean value indicating
    its presence in the list.

    5. Returns the total count of found items and attaches the JSON result to the
    action execution.


    ### Additional Notes

    The `IdentifierList` parameter can be provided as a comma-separated string or
    a JSON-formatted list. This action only reads from internal custom lists and does
    not modify them.
