Add String to Custom List:
  ai_description: >-
    ### General Description

    Adds a specified string to a custom list within Google SecOps. This action allows
    users to dynamically populate internal custom lists with new items, which can
    then be used for filtering, matching, or other logic within playbooks.


    ### Flow Description

    1. Retrieves the target custom list category and the string item from the action
    parameters.

    2. Constructs a custom list item object using the provided string, category, and
    the current environment.

    3. Calls the internal platform API (`add_entities_to_custom_list`) to append the
    constructed item to the specified custom list.

    4. Returns a success message indicating the item was added.


    ### Additional Notes

    This action modifies internal SOAR data (custom lists) and does not interact with
    external systems. Despite the internal method name `add_entities_to_custom_list`,
    this specific action operates on a manually provided string parameter rather than
    the case's target entities.
  ai_short_description: >-
    Adds a specified string to a custom list category within the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a new string item to a custom list within Google SecOps.
    reasoning: >-
      The action does not fetch external data or mutate external data. It mutates
      internal data by adding an item to a custom list via `siemplify.add_entities_to_custom_list`.
      It does not update entities, create insights, modify alert data, or create case
      comments.
