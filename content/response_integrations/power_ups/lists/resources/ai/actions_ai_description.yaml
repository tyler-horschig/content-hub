Search Custom Lists:
  ai_description: >-
    ### General Description

    Searches for a specified string within the records of a custom list in Google
    SecOps. This action retrieves custom list records and filters them based on the
    provided categories and search string, returning the matching records as a JSON
    result.


    ### Flow Description

    1. Extracts the `Categories` and `String to Search` parameters from the action
    configuration.

    2. Calls the internal SOAR API (`get_traking_list_record`) to retrieve custom
    list records.

    3. Filters the retrieved records based on the provided categories, if any are
    specified.

    4. Further filters the records to find matches where the specified search string
    is present in the record's `entityIdentifier`.

    5. Returns the matching records as a JSON result and completes the action.


    ### Additional Notes

    - If no values are provided for the search string or categories, the action will
    return all available custom list records.
