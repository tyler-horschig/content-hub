Render Template:
  ai_description: >-
    ### General Description

    This action renders a Jinja2 template using a provided JSON input. It acts as
    a template engine, allowing users to transform JSON data into formatted text or
    HTML using Jinja2 syntax and custom filters. It can optionally include case and
    alert data (events and entities) in the rendering context.


    ### Flow Description

    1. Extracts the execution scope (Alert or Case) and optionally retrieves case
    data (events and entities) if the 'Include Case Data' parameter is enabled.

    2. Parses the provided 'JSON Object' parameter into a Python dictionary or list.

    3. Initializes the Jinja2 environment and loads standard and custom Jinja filters.

    4. Loads the template from either the 'Jinja' or 'Template' parameter.

    5. Renders the template using the parsed JSON input and optional case data.

    6. Returns the rendered output as a JSON result (`html_output`).


    ### Additional Notes

    The action supports custom Jinja filters and can process both single JSON objects
    (dictionaries) and lists of JSON objects.
  ai_short_description: >-
    Renders a Jinja2 template using a provided JSON input to generate formatted text
    or HTML output.
