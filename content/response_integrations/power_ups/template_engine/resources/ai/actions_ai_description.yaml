    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | JSON Object | String | Yes | The raw JSON object that will be used to render
    the template. |

    | Template | String | No | The Jinja2 template to display. Can be a HTML template
    from "Settings->Environment" or added in content box. |

    | Triggered By | String | Yes | The name of the integration that triggered this
    entity insight. |

    | Remove BRs | Boolean | No | Remove all <br> tags from the rendered template.
    |

    | Create Insight | Boolean | No | When enabled, the action will create entity
    insights. Default value of true. |
