Render Template from Array:
  ai_description: >-
    ### General Description

    Renders a Jinja template across an array of inputs. This utility action loops
    through a provided JSON list and applies the specified Jinja template to each
    item, returning a concatenated and formatted string. It is highly useful for transforming
    lists of data into HTML tables, formatted text, or other structured string formats.


    ### Flow Description

    1. Parses the `Array input` parameter as a JSON object. If the input is a single
    object rather than a list, it automatically wraps it in a list.

    2. Initializes a Jinja2 environment, loading a comprehensive set of standard and
    custom filters (e.g., `json2tbl`, `regex_match`, `filter_datetime`).

    3. Iterates through each item in the parsed JSON array.

    4. Renders the provided Jinja template for each item. The current item is accessible
    within the template via the `row` variable.

    5. Concatenates all rendered outputs using the specified `join` character.

    6. Prepends the `prefix` string and appends the `suffix` string to the concatenated
    result.

    7. Returns the final rendered string as the action's main result and attaches
    it to the JSON result under the `html_output` key.


    ### Additional Notes

    This action operates entirely locally within the SOAR platform and does not make
    any external API calls. It does not interact with or modify case entities, alerts,
    or insights.
  ai_short_description: >-
    Iterates through a provided JSON array and applies a specified Jinja template
    to each item, returning a concatenated and formatted string result.
