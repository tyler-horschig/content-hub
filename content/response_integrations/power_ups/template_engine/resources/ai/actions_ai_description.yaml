Entity Insight:
  ai_description: >-
    ### General Description

    Renders a Jinja2 template using a provided JSON object to create Entity Insights
    for target entities. This action acts as a utility to format raw JSON data into
    readable HTML or text insights using the Jinja2 templating engine.


    ### Flow Description

    1. Extracts the provided JSON object, Jinja2 template, and configuration parameters.

    2. Initializes a Jinja2 environment and loads custom formatting filters.

    3. Iterates through the target entities, filtering out those with an 'ALERT' type
    in their additional properties.

    4. Matches each entity against the provided JSON object based on the entity identifier.

    5. Renders the Jinja2 template using the matched JSON data and entity properties.

    6. If enabled, creates an Entity Insight for each matched entity with the rendered
    template content.


    ### Additional Notes

    The input JSON object must be structured to include 'Entity' and 'EntityResult'
    keys to properly map the data to the corresponding target entities.
  ai_short_description: >-
    Renders a Jinja2 template using a provided JSON object to generate and attach
    Entity Insights to target entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data from an external source or mutate external data.
      It processes internal entities and creates insights by calling `siemplify.add_entity_insight`.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
      cve: true
      cve_id: true
      database: true
      deployment: true
      destination_domain: true
      domain: true
      email_message: true
      event: true
      file_hash: true
      file_name: true
      generic: true
      host_name: true
      ip_set: true
      mac_address: true
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: true
      process: true
      service: true
      source_domain: true
      threat_actor: true
      threat_campaign: true
      threat_signature: true
      url: true
      usb: true
      user: true
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` without filtering by a
      specific `entity_type`, meaning it applies to all entity types. It filters entities
      by checking `entity.additional_properties["Type"] != "ALERT"` and matches them
      against the input JSON using `entity.identifier`.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a utility that formats JSON data into an Entity Insight using
      a Jinja2 template. It does not fetch external threat intelligence, mutate external
      state, or perform any of the specific expected outcomes defined in the outcome
      categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
