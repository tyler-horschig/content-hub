Convert Into Simulated Case:
  ai_description: >-
    ### General Description

    Converts the current alert's source file content into a simulated case format.
    It extracts the raw case data from the first entity's additional properties, aligns
    the data fields, and can optionally push the newly formatted case to the platform's
    simulator or save it as a JSON attachment to the case wall.


    ### Flow Description

    1. Retrieves the `SourceFileContent` from the `additional_properties` of the alert's
    first entity.

    2. Modifies the event names and aligns the case data format (e.g., converting
    keys to camelCase, mapping enum fields).

    3. If the `Push to Simulated Cases` parameter is enabled, pushes the aligned case
    data to the platform's simulator via the SOAR API.

    4. If the `Save JSON as Case Wall File` parameter is enabled, attaches the JSON
    data as a file to the case wall.

    5. Returns the aligned case data as a JSON result.


    ### Additional Notes

    This action does not support the case playbook execution scope and will fail if
    run at the case level.
  ai_short_description: >-
    Converts the current alert's source file content into a simulated case format,
    optionally pushing it to the platform's simulator or saving it as a case wall
    attachment.
