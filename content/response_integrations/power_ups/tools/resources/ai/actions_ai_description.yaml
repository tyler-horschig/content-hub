    Appends a specified value to an existing context property or creates a new context
    property with the value within Google SecOps. The action operates at the Alert,
    Case, or Global scope.


    ### Flow Description

    1. Extracts the target scope (Alert, Case, or Global), property key, value to
    append, and delimiter from the action parameters.

    2. Retrieves the existing context property value for the specified key and scope
    using internal Google SecOps SDK methods.

    3. If the property exists, appends the new value using the specified delimiter
    and updates the context property.

    4. If the property does not exist, creates a new context property with the specified
    key and value.

    5. Returns the updated context property value and a success message.


    ### Additional Notes

    This action modifies internal case, alert, or global context data within Google
    SecOps and does not interact with external systems or APIs.
