Find First Alert:
  ai_description: >-
    ### General Description

    Returns the identifier of the chronologically first alert within a given case.
    This action evaluates the creation times of all alerts in the case to determine
    which one occurred first, and can validate if the currently executing alert is
    indeed the first one.


    ### Flow Description

    1. Determines the current execution scope (Alert or Case).

    2. Retrieves the list of alerts associated with the current case.

    3. Sorts the retrieved alerts chronologically based on their creation time.

    4. Identifies the first alert from the sorted list.

    5. If executing in the Alert scope, compares the current alert's identifier to
    the first alert's identifier, returning the identifier if they match, or 'false'
    if they do not.

    6. If executing in the Case scope, directly returns the identifier of the first
    alert.


    ### Additional Notes

    This action operates entirely on internal case data within the Google SecOps platform
    and does not make any external API calls or modify any case data.
