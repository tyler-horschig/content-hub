DNS Lookup:
  ai_description: >-
    ### General Description

    Performs a DNS lookup on Address and Hostname entities to retrieve domain name
    system records. It queries specified DNS servers to retrieve reverse DNS (PTR)
    records for IP addresses and specific DNS record types (e.g., A, AAAA, MX, ANY)
    for hostnames.


    ### Flow Description

    1. Iterates through the target entities provided in the action scope.

    2. For Address entities, performs a reverse DNS lookup against the specified DNS
    servers to find PTR records.

    3. For Hostname entities, performs a forward DNS query for the specified Data
    Type (e.g., A, MX, TXT) against the specified DNS servers.

    4. Aggregates the DNS responses and attaches them to the action's JSON result.


    ### Additional Notes

    The action relies on standard UDP DNS queries and does not update the entities
    or create insights directly; it only returns the JSON results containing the resolved
    records.
