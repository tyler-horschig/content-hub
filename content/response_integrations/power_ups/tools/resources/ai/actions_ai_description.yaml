Lock Playbook:
  ai_description: >-
    ### General Description

    Pauses the current playbook execution until all playbooks associated with the
    previous alert (or all alerts in the case) have successfully completed. This action
    is used to synchronize playbook runs and enforce sequential execution within a
    case.


    ### Flow Description

    1. Determines the current execution scope (Alert or Case).

    2. If running in Alert scope, identifies the current alert's chronological index
    within the case.

    3. If the current alert is the first one, the action completes immediately and
    allows the playbook to continue.

    4. If it is a subsequent alert, the action makes an internal API call (`get_workflow_instance_card`)
    to check the workflow status of the previous alert.

    5. If the previous alert's playbooks are not yet complete, the action returns
    an 'In Progress' state, locking the current playbook.

    6. If running in Case scope, the action checks the workflow status of all alerts
    in the case and pauses until all are complete.


    ### Additional Notes

    This action does not interact with external systems or entities. It relies entirely
    on internal Google SecOps workflow states to manage execution timing.
