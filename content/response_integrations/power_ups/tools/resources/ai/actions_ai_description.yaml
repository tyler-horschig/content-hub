Add Or Update Alert Additional Data:
  ai_description: >-
    ### General Description

    Adds or updates fields within the additional data payload of an alert in Google
    SecOps. It accepts a JSON string or free text, merges it with the alert's existing
    additional data, and saves the updated payload back to the alert.


    ### Flow Description

    1. Retrieves the `Json Fields` parameter and attempts to parse it as a JSON object.

    2. Determines the execution scope (Alert or Case) to identify the target alerts.

    3. Iterates through the target alerts, extracting their current `additional_data`
    payload.

    4. Merges the incoming JSON fields into the existing payload (updating dictionaries,
    extending lists, or replacing raw data).

    5. Calls the Google SecOps API (`update_alerts_additional_data`) to save the modified
    additional data back to the alerts.

    6. Attaches the final processed data as a JSON result to the action.


    ### Additional Notes

    The action supports both single alert and case-wide execution scopes. If the input
    provided in `Json Fields` is not valid JSON, it will be treated as a raw string
    and stored under the `data` key in the alert's additional data payload.
  ai_short_description: >-
    Adds or updates fields in the alert's additional data payload by merging incoming
    JSON or text with the existing data.
