Add Comment to Entity Log:
  ai_description: >-
    ### General Description

    Adds a specified comment to the Entity Log for each target entity within Google
    SecOps. This action allows analysts or automated playbooks to append notes, findings,
    or audit trails directly to the entity's timeline.


    ### Flow Description

    1. Extracts the `Comment` and `User` parameters provided in the action configuration.

    2. Iterates through all target entities currently in scope.

    3. For each entity, makes an internal API call (`add_comment_to_entity`) to append
    the provided comment to the entity's log, attributing it to the specified user.

    4. Aggregates the results and returns a summary message detailing the entities
    that received the comment.


    ### Additional Notes

    This action operates entirely within the Google SecOps platform and does not interact
    with external systems. It processes all entities in the current scope without
    applying any type-based filtering.
