Delay Playbook Synchronous:
  ai_description: >-
    ### General Description

    Temporarily pauses the execution of a playbook for a specified duration, up to
    a maximum of 30 seconds. This action is useful for introducing short, synchronous
    delays between playbook steps without yielding execution.


    ### Flow Description

    1. Extracts the `Seconds` parameter.

    2. Validates that the provided time is a positive integer and does not exceed
    the maximum allowed limit of 30 seconds.

    3. Calculates the target completion time.

    4. Pauses execution using a synchronous sleep loop until the target time is reached.

    5. Returns a success message indicating the delay has completed.


    ### Additional Notes

    For delays longer than 30 seconds, the "Delay Playbook V2" action should be used
    instead.
