Wait for Playbook to Complete:
  ai_description: >-
    ### General Description

    Pauses the current playbook execution until a specified playbook or block running
    on the same alert or case completes. This action is used to synchronize playbook
    executions and manage dependencies between different automated workflows within
    the platform.


    ### Flow Description

    1. Retrieves the target `Playbook Name` from the action parameters.

    2. Determines the current execution scope (Alert or Case).

    3. Makes an internal API call (`get_workflow_instance_card`) to fetch the workflow
    instance details for the relevant alert(s).

    4. Evaluates the execution status of the specified playbook.

    5. If the target playbook is still in progress, pending for a user, or pending
    in the queue, the action returns an in-progress state, causing the current playbook
    to wait.

    6. If the target playbook is completed, failed, terminated, or not found, the
    action completes successfully and releases the lock, allowing the current playbook
    to proceed.


    ### Additional Notes

    This action runs asynchronously. It will continuously poll the status of the target
    playbook in subsequent execution cycles until the target playbook reaches a terminal
    state.
