Attach Playbook to Alert:
  ai_description: >-
    ### General Description

    Attaches one or more specified playbooks (workflows) to an alert within Google
    SecOps. It can optionally prevent duplicate attachments if the playbook is already
    running on the target alert.


    ### Flow Description

    1. Retrieves the target alerts based on the execution scope (Alert or Case).

    2. For each alert, fetches the currently attached workflows using the internal
    SOAR API.

    3. Checks if the requested playbooks are already attached and evaluates the `Allow
    Duplicates` parameter.

    4. Attaches the specified playbooks to the alert using the internal `attach_workflow_to_case`
    method.

    5. Returns a summary message detailing successfully attached playbooks, failures,
    and skipped duplicates.


    ### Additional Notes

    The action supports both Alert and Case execution scopes. If executed at the Case
    level, it will attempt to attach the playbooks to all open alerts within the case.
