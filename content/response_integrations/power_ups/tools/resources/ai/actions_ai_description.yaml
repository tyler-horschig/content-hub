    ### General Description

    Creates new entities and adds them to the requested alert based on a delimited
    string of identifiers. It can also apply custom enrichment data (via JSON) to
    newly created entities or update existing entities if they already exist within
    the case.


    ### Flow Description

    1. Parses the input string of entity identifiers using the provided separator.

    2. Iterates through the extracted identifiers.

    3. Checks if each entity already exists within the case's alerts.

    4. If the entity does not exist, creates it and adds it to the case. If the specified
    entity type is `ADDRESS`, it validates the identifier as a valid IP address before
    creation.

    5. If enrichment JSON is provided, applies the properties to the new entity or
    updates the existing entity's additional properties.

    6. Returns a JSON result detailing which entities were successfully created, enriched,
    or failed.


