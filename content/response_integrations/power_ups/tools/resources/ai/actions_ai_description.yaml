Add Alert Scoring Information:
  ai_description: >-
    ### General Description

    This action adds an entry to the alert scoring database within the Google SecOps
    platform. It calculates the overall alert score based on predefined severity ratios
    (e.g., 5 Low = 1 Medium, 3 Medium = 1 High, 2 High = 1 Critical) and updates the
    alert's context properties with the new scoring information.


    ### Flow Description

    1. Extracts the scoring parameters provided by the user (Name, Description, Category,
    Severity, Source).

    2. Retrieves the current alert scoring information from the alert's context properties
    (`ALERT_SCORE_INFO`).

    3. Appends the new score to the appropriate category and recalculates the overall
    alert score based on the predefined severity thresholds.

    4. Updates the alert context properties (`ALERT_SCORE_INFO`, `ALERT_SCORE`, `ALERT_SEVERITY`)
    with the newly computed values.

    5. Returns the updated scoring data as a JSON result.


    ### Additional Notes

    This action modifies internal alert context properties and does not interact with
    external systems or APIs. It is primarily used for custom risk scoring and alert
    prioritization within the platform.
  ai_short_description: >-
    Adds an entry to the alert scoring database and recalculates the overall alert
    score based on predefined severity ratios.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the alert context properties `ALERT_SCORE_INFO`, `ALERT_SCORE`, and
      `ALERT_SEVERITY` with the newly calculated scores.
    reasoning: >-
      The action does not fetch data from or mutate data in external systems. It mutates
      internal data by updating the alert's context properties (`ALERT_SCORE_INFO`,
      `ALERT_SCORE`, `ALERT_SEVERITY`) using `siemplify.set_alert_context_property`.
      It does not update entities, create insights, or add case comments.
