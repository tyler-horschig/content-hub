    1. Retrieves the `Normalization Data` parameter, which contains a JSON array mapping
    old field names (`entitiy_field_name`) to new field names (`new_name`).

    2. Iterates through all target entities provided in the current scope.

    3. For each entity, checks its `additional_properties` dictionary for the specified
    old field names.

    4. If an old field name exists, its value is copied to the new field name. If
