Delay Playbook V2:
  ai_description: >-
    ### General Description

    Temporarily pauses the execution of a playbook for a specified duration or until
    a specific cron expression is matched. This action is useful for introducing deliberate
    waits in automated workflows, such as waiting for external systems to process
    data or delaying notifications.


    ### Flow Description

    1. Retrieves the configured delay parameters (Seconds, Minutes, Hours, Days) or
    a Cron Expression.

    2. If a Cron Expression is provided, calculates the next execution time based
    on the expression.

    3. If standard time parameters are provided, calculates the target date by adding
    the specified duration to the current time.

    4. Evaluates if the target time has been reached.

    5. If the target time is in the future, the action suspends itself (async mode)
    and waits.

    6. Once the target time is reached, the action completes and allows the playbook
    to proceed.


    ### Additional Notes

    The `Cron Expression` parameter takes priority over the standard time parameters.
    This action runs asynchronously, meaning it will free up platform resources while
    waiting for the target time to be reached.
