Delay Playbook:
  ai_description: >-
    ### General Description

    Temporarily pauses the execution of a playbook for a specified duration. This
    action calculates a future target time based on the provided days, hours, minutes,
    and seconds, and suspends the playbook's progress until that time is reached.


    ### Flow Description

    1. Retrieves the delay duration parameters (Seconds, Minutes, Hours, Days) from
    the action configuration.

    2. Calculates the target completion date and time by adding the specified duration
    to the current UTC time.

    3. Evaluates if the current time has reached or surpassed the target date.

    4. If the target date is reached, the action completes successfully and allows
    the playbook to continue.

    5. If the target date is not reached, the action suspends itself using the platform's
    asynchronous execution state (`EXECUTION_STATE_INPROGRESS`) and will re-evaluate
    at the next execution cycle until the target time is met.


    ### Additional Notes

    This is an asynchronous action that relies on the SOAR platform's async execution
    mechanism to wait without consuming active execution threads. It does not interact
    with any external APIs or modify case data.
  ai_short_description: >-
    Temporarily pauses the execution of a playbook for a specified duration by utilizing
    asynchronous execution states.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
