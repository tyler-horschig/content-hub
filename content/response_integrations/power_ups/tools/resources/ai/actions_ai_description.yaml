Extract URL Domain:
  ai_description: >-
    ### General Description

    Extracts the domain (and optionally the subdomain) from URL strings and entity
    identifiers. It enriches the processed entities by adding the extracted domain
    to their additional properties and can also process a raw list of URLs provided
    as a parameter.


    ### Flow Description

    1. Retrieves the list of URLs provided in the parameters and splits them using
    the specified separator.

    2. Iterates through the provided URLs, extracting the domain (and subdomain if
    configured) using a local parsing library, and appends the results to the JSON
    output.

    3. Iterates through all target entities in the case.

    4. Extracts the domain from each entity's identifier.

    5. If successful, adds the extracted domain to the entity's `additional_properties`
    under the key `siemplifytools_extracted_domain`.

    6. Updates the successfully processed entities in the platform and returns a consolidated
    JSON result.


    ### Additional Notes

    This action performs local string manipulation and does not make external API
    calls to third-party services. Entities that do not contain a valid domain (e.g.,
    file hashes) will simply be skipped or marked as failed without throwing a critical
    error.
