    1. Parses the provided JSON string (expected to be a list of JSON objects) from
    the action parameters.

    2. Iterates through the target entities in the case.

    3. For each entity, searches the JSON objects for a matching key path using the
    specified `Identifier KeyPath`.

    4. If the key path is found, extracts the relevant data (optionally filtered by
    a JSONPath expression).

    5. Flattens the extracted data dictionary, optionally adds a prefix, and appends
    it to the entity's `additional_properties`.

    6. Updates the entities in the Google SecOps platform with the newly enriched
    properties.


