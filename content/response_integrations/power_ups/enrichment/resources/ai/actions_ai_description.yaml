Whois:
  ai_description: >-
    ### General Description

    Queries WHOIS servers to retrieve domain registration and IP allocation information
    for target entities. It supports IP addresses, URLs, email addresses, and domains.
    The action can optionally create new domain entities linked to the original targets
    and mark newly registered domains as suspicious based on a configurable age threshold.


    ### Flow Description

    1. Iterates through the target entities provided to the action.

    2. If the entity is an IP address (`ADDRESS`), it performs an RDAP lookup using
    the `IPWhois` library and fetches geolocation data using the `db-ip.com` API.

    3. For all other entity types, it attempts to extract a domain from the entity
    identifier and retrieves WHOIS data using the `whois_alt` library.

    4. Calculates the domain's age in days based on its creation date.

    5. If the `Create Entities` parameter is enabled and the extracted domain differs
    from the original entity identifier, it creates a new `DOMAIN` entity linked to
    the original one.

    6. Enriches the entities by adding the retrieved WHOIS and geolocation data to
    their additional properties.

    7. If the domain age is below the configured `Domain Age Threshold`, it marks
    the entity as suspicious.

    8. Updates the entities within the SecOps platform and returns the results as
    a JSON object.


    ### Additional Notes

    The action relies on external services like `db-ip.com` for IP geolocation and
    standard WHOIS/RDAP protocols for domain and IP registration data.
  ai_short_description: >-
    Queries WHOIS servers to retrieve domain registration and IP allocation information
    for target entities, optionally creating linked domain entities and marking newly
    registered domains as suspicious.
