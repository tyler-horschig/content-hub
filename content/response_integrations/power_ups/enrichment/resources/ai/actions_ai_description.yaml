    or denylist.


    ### Flow Description

    1. Extracts the 'Field Name' and 'Use Field Name as Whitelist' parameters.

    2. Iterates through all targeted entities in the case.

    3. Calls the internal SOAR API (`get_entity_data`) to retrieve historic entity
    data from the Entity Explorer.

    4. Filters the retrieved fields based on the provided allowlist or denylist, excluding
    predefined system fields.

    5. Updates the entity's attributes or `additional_properties` with the filtered
    fields.

    6. Saves the updated entities back to the case using `siemplify.update_entities`.

    7. Returns a JSON result containing the updated fields for each entity.


    ### Additional Notes

    System fields such as 'Type', 'Environment', 'IsInternalAsset', 'IsSuspicious',
    and others are automatically excluded from being updated to prevent overwriting
    critical entity metadata.
