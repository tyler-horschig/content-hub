Enrich Entity From Event Field:
  ai_description: >-
    ### General Description

    Extracts specified fields from the security events associated with an alert and
    adds them to the `additional_properties` of the target entities. This action allows
    analysts to dynamically enrich entities with contextual data already present in
    the alert's events without querying external systems.


    ### Flow Description

    1. Determines the execution scope (Alert or Case).

    2. Retrieves the target alerts based on the execution scope.

    3. Parses the comma-separated list of fields to extract from the action parameters.

    4. Iterates through each target alert and retrieves its first associated security
    event.

    5. Extracts the requested fields from the event's additional properties.

    6. Identifies the entities associated with the current alert.

    7. Updates the `additional_properties` of these entities with the extracted event
    fields.

    8. Saves the updated entities back to the platform using `siemplify.update_entities`.

    9. Returns a JSON result containing the enriched fields.


    ### Additional Notes

    The action supports both Alert and Case execution scopes. When running in Case
    scope, it processes all open alerts within the case and updates their respective
    entities by matching the entity's alert identifier.
