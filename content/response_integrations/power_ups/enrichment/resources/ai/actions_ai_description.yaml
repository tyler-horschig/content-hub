Enrich Entities from List with Field:
  ai_description: >-
    ### General Description

    Enriches a specified list of entities within a case by appending a custom field
    and value to their additional properties. This action allows analysts to bulk-update
    specific entities with static contextual data directly from the action's parameters.


    ### Flow Description

    1. Retrieves the target list of entities, entity type, delimiter, enrichment field,
    and enrichment value from the action parameters.

    2. Parses the provided list of entities into individual target identifiers using
    the specified delimiter.

    3. Iterates through all entities associated with the alerts in the current case.

    4. Matches the case entities against the parsed target list based on a case-insensitive
    comparison of their identifiers and an exact match of the specified entity type.

    5. Updates the `additional_properties` dictionary of the matched entities with
    the new enrichment field and value.

    6. Saves the updated entities back to the Google SecOps platform via the `update_entities`
    method.


    ### Additional Notes

    This action operates entirely within the Google SecOps platform and does not make
    any external API calls. It relies on exact identifier matches (case-insensitive)
    and entity type matches. Because the entity type is provided as a dynamic parameter,
    this action supports all entity types.
  ai_short_description: >-
    Enriches a specified list of entities within a case by appending a custom field
    and value to their additional properties based on matching identifiers and entity
    types.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the additional_properties dictionary of matched entities within the
      case.
    reasoning: >-
      The action does not make any external API calls to fetch data or mutate external
      systems. It modifies internal data by appending a key-value pair to the `additional_properties`
      dictionary of matched entities and saves these changes by calling `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
