Create Entity Insight From Enrichment:
  ai_description: >-
    ### General Description

    Creates an entity insight based on a formatted message that incorporates data
    from the entity's additional properties. This action is typically used to display
    enrichment results or other contextual data directly on the entity's insight tab.


    ### Flow Description

    1. Retrieves the `Message` and `Triggered By` parameters.

    2. Iterates through all target entities in the case.

    3. Parses the `Message` string, replacing placeholders with corresponding values
    from the entity's `additional_properties`.

    4. Creates a new insight for the entity containing the parsed message.

    5. Returns a success message listing the entities for which insights were added.


    ### Additional Notes

    The `Message` parameter supports a specific placeholder syntax to extract values
    from the entity's additional properties.
  ai_short_description: >-
    Creates an entity insight by parsing a formatted message template and populating
    it with data from the entity's additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights within Google SecOps based on the provided message template
      and entity properties.
    reasoning: >-
      The action iterates over target entities and uses their additional properties
      to format a message. It then calls `siemplify.add_entity_insight` to attach
      this message as an insight to the entity. It does not fetch external data, mutate
      external systems, update entities, modify alerts, or create case comments. It
      mutates internal data by creating insights.
