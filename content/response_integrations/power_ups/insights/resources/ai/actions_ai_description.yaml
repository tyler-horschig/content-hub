Create Entity Insight From JSON:
  ai_description: >-
    ### General Description

    Creates an entity insight based on a provided JSON string. The action parses the
    JSON to find data associated with specific entities and generates a formatted
    message to attach as an insight.


    ### Flow Description

    1. Parses the provided JSON string parameter.

    2. Iterates through all target entities in the case.

    3. For each entity, searches the JSON data for a matching identifier using the
    specified `Identifier KeyPath`.

    4. If a match is found, formats the `Message` string by replacing placeholders
    with corresponding values from the JSON data.

    5. Attaches the formatted message as an insight to the matching entity.


    ### Additional Notes

    The action supports custom pipe functions within the message placeholders (e.g.,
    `default`, `str`, `join`, `count`, `to_str`) to manipulate the extracted JSON
    values before inserting them into the message.
  ai_short_description: >-
    Creates and attaches insights to entities by extracting and formatting data from
    a provided JSON string based on matching entity identifiers.
