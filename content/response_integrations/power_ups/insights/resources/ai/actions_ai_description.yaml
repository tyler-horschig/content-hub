"Create Entity Insight From Multiple JSONs":
  ai_description: >-
    ### General Description

    Creates entity insights by parsing and extracting specific fields from up to five
    provided JSON strings. The action matches the JSON data to the target entities
    based on their identifiers and formats the extracted information into HTML tables,
    which are then attached as insights to the respective entities.


    ### Flow Description

    1. Retrieves up to five sets of Title, Fields, and JSON string parameters.

    2. Parses the provided JSON strings and field definitions.

    3. Iterates through all target entities in the case.

    4. For each entity, searches the parsed JSON data for a matching entity identifier.

    5. Extracts the specified fields from the matched JSON data.

    6. Formats the extracted data into an HTML table.

    7. Attaches the formatted table as an insight to the corresponding entity.


    ### Additional Notes

    The JSON strings must contain an "Entity" field to match against the entity identifiers,
    and an "EntityResult" field containing the data to be parsed.
